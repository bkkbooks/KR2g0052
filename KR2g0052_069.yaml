body:
  text: 閩中理學淵源考卷六十九廣平府知府李清馥撰嘉隆以後諸先生學派余録明代泉南派系自洪永成化以後約數十家其無師友可據者總列以待考訂外此遺録者不少然此數十家者多正嘉以前守一先生之說者嘉隆以後大抵風氣一變多與程朱有違言者矣如遵巖王公與荆川雙江諸公切劘其學亦多良知之餘然其任心廢學之弊未甚紕繆也先公嘗曰宋元以來何王金許也二胡也雲峯雙湖蔡陳林也皆家承師授經學一時也蔡陳林其寡過矣乎謂其規規於師說而不敢背也馥按姚江王氏之學盛行學者多趨簡便宗而和之惟閩掛弟子之録者甚少隆萬以降風氣漸染其所趨異矣然其碩德雅望在吾郡如蘇紫溪黃文簡李文節王恭質何鏡山李衷一諸公亦尚先民是程著言立說猶述舊規可知一代風氣自虛齊先生師弟講明倡起流風數十世未艾仁賢之遺教逺矣哉明史載閩中一代學術多宗虛齊之學其來固有漸矣乾隆戊寅三月望日忠愍周蹟山先生天佐周天佐字宇弼號蹟山晉江人嘉靖十四年進士奉㫖賜歸娶家居菲衣糲食挾册吟誦思通達當世務孜孜如不及於餘事漠如也戊戌拜户部主事分督草場已又督儲德州經理嚴密辛丑九廟災有詔諸臣條時政闕失初御史楊爵疏陳五事詔繫獄數月無敢言者佐謂此乃時政闕失之大因上疏曰求言之道示人以言不若示人以政陛下令諸司條奏闕失此特示人以言耳御史楊爵之獄未釋是未示人以政也夫國家置言官以言為職楊爵所犯在於過直情則可矜古者帝王求諫嘗立毁謗之木毁謗非事君之義矣然而帝王不諱者慮下無直言則上不聞過也漢至文帝時已治安而賈誼方奮其痛哭流涕長太息之談彼豈好為不祥哉天子之尊所少者不在唯諾稱頌之滿庭而在憂治危明之一士在庭諸臣不負此義者獨爵耳聖怒之下一則曰小人一則曰囚犯夫以盡言極諫為小人則為逢迎之君子不難也以抗疏納諫為囚犯又孰不為容恱寡過之臣哉言行君子所以動天地也人君一喜一怒上帝臨之陛下試一思焉其所以怒爵而罪之者果合天心否耶臣願察爵之言原爵之心亟從寬釋仍不吝採行旌其忠讜以勸來者如是而人心恱喜天道降康此求言弭災第一義也疏聞詔廷杖與楊爵同繫獄越三日斃獄中隆慶紀元贈光祿寺少卿廕一子入監讀書按先生送林次崖知欽州序曰嘉靖歲乙未大理寺丞林次崖公以論遼東事觸忌諱謫欽州時吾泉士大夫秩於官者惟次崖為尊及其出也或相與語曰吾泉其衰乎列卿獨一次崖兹且不能容於朝矣豫歎曰不然也夫人才盛衰誠不於其秩之崇卑與其分之疏與戚也吾泉仕者與朝廷疏逺天子寵光所不及天下之所知也至其為國家忠謀不為爵祿牽繫而直言以報天子乃於泉得一人焉亦天下之所知也且豫聞次崖公奏議方上雖中官輩有願一見而相語者曰不識林公何狀夫人如中官且知慕次崖則天下之仰慕次崖公者當何如耶然則泉其盛乎或默而退豫乃戒從䇿馬造次崖公之廬而謁焉公適檢㸃行裝古書浩瀚一見而戲豫曰書其能誤人耶豫曰不然惟次崖能多讀古書故能為今日事次崖公其不負於書書其不誤次崖矣公欣然而笑乃告豫以必去之意曰平生所學為何使今而默默居棘寺指日可得大中丞吾本心幾壞盡矣豫不肖方由秀才被舉到都下居數月見士風與時勢相趨波蕩風靡鮮有存其初志者則嘗竊歎曰今世之官皆壞人心術之具也不如吾秀才輩其好惡與人相近也者幾希豫聞次崖公言甚喜次崖公能不以官害其心也古所謂國有道不變塞焉强哉矯次崖公其人也歟公卜日啓行祖道郊門者皆賢公卿大夫名士行色甚壯豫亦䝉恩賜歸娶方與公同歸是歸也即欲效次崖公之多讀古書他日即欲效次崖公之敢為直言不壞本心兹豫志也并述以請教次崖公非敢言贈也惟公以為何如舊郡志清源文獻按察王堣齊先生春復王春復字學樂號堣齊晉江人嘉靖十七年進士初令泰和有惠政歷南工户二部郎中出守贑州會有大木之役贑當上游春復條上數事視他府費為省閩流賊覘督木官積資鼓行出石城越會昌寖迫雩都執二指揮以逞春復提兵出郭去四十里民皆來集賊聞春復出不敢前釋二指揮遁去贑下流諸郡率保無事擢雲南按察副使駐劄永昌慎固關梁禁民無私入于崖隴川南甸三夷地牟利激怨民夷並安擢廣西布政參政駐劄賓州出繫囚編保甲立獞市期民方賴為安春復遽寖疾逮貴州按察使報至則不起矣春復持重老成言如不出口臨事設議則侃侃擘畫為治持大體不屑屑簿書期會留心教化素不立道學之名遇有講者與剖析微義開關啓鑰聞者詘之令泰和時曾質學於羅整菴歐陽南野二公所著有四書周易疑略自序曰儒者誦法孔門質聖道為依歸而言人人殊莫得一也夫子之門聰明莫若子貢篤實莫若子夏子貢則以多聞見為髙子夏則以篤志力行為實而皆不若顔曾獨得其宗夫其親受業於聖人所見若斯殊也道者著於所感學者止於所知故雖多聞篤行而莫見其多聞篤行之迹焉此顔之所謂愚曾之所謂魯也至一之機見乎感故不待於牽合戒懼之要止於內故未嘗見其在外也按丁氏三陵藳云堣齊先生之為是書也折衷朱說而反覆義理之所安不敢於背朱未嘗徇人之所同信不必於異朱未嘗諱已之所獨得蓋更數載而後就藳翻數藳而始成書云閩書萬厯志丁氏三陵藁疑略序布政薛君恪先生天華薛天華字君恪晉江人嘉靖二十九年進士以南刑部郎考滿入京㑹楊忠愍繼盛以論劾嚴嵩死天華招同志楊豫孫董傳䇿與漳浦朱天球往哭甚哀治具如禮一時有四君子之稱竟以此取懟七年餘始出為重慶守重慶當雕瘵後民多流移為申請蠲稅安集之擢雲南提學副使晉浙江參政廣東按察使隆慶戊辰舉卓異晉本省右布政使卒天華講學勵行所治經術務究大原讀大學獨信孔頴達古本讀易玩先天諸圖讀春秋四傳常以己意推尋當日事即合注疏與否弗論也居官所至以清白稱其文學歐曾有居鄉左戒守官右針尤為學者所誦其左戒之詞曰毋通要路書以務養節則俯仰不瀆毋預塵紛事以務養寂則外內不擾毋循末俗態以務養髙則志行不羞毋受非禮餽以務養亷則彼已不失毋妄結賓從以務養交則戚黨不棄而善彚集毋茍出言語以務養德則靜躁不爽而口過息毋逐戀嗜好以務養神則天倪不伐而和氣全毋厭薄遲鈍以務養重則機心不熾而真性得毋譏訕世短以務養福則不忮人以見直而鬼責消毋虛邀時譽以務養誠則不恕已以見賢而潛德進毋妬嫉俊能以務養才則不設阱以誣善而有奬藉之功毋歆羡汰靡以務養嗇則不競侈以蠧俗而有由禮之漸其右針之詞曰遇暴上思以禮事之則不可辱臨頑民思以仁悟之則不為仇御羣小思以嚴逺之則不啓侮統列屬思以正率之則不傷威寮友有過思隱規而公掩之則忠不失厚庶民有議思靜修而密弭之則微不悛惡受纎介之私思以欺君為懼則勤公愈至叨一命之祿思以報主為心則舉職益謹怨者人所易怵思精白以任之則廷有分謗之士難者人所易避思委質以殉之則朝有仗義之臣即有偏喜思畏天以奉之則無溢實之賞如有暴怒思觀理以忘之則無淫法之罰子應鍾令桂平有惠政閩書萬厯志主政李東明先生春芳李春芳字實夫號東明同安人嘉靖二十九年進士性警敏年十二食餼十六領鄉薦聞羅達夫倡教師事之居官清苦初試户部奉命犒大同軍故事凡遇部使至輒具豐儀為餽春芳一無所持而去授刑部主事執法不阿恤理江西有懷金至者春芳正色拒之守潮省訟牒蠲贖鍰適有倭患軍務旁午春芳歭糗糧繕器械募敢死士激以大義明紀律冒矢石潮得無恙至今祀之以母喪歸著白鶴遺集與郡弟子論道講學年四十二卒同安縣志少參尤思所先生烈尤烈字子偉號思所晉江人嘉靖二十九年進士初授祁門令治尚純約耿介自持擢南京都察院經歷晉户曹員外尋郎禮曹出為江西僉事連遭喪服除仍補江西居頃之自投傳歸起雲南參議竟辭不出烈居官亷歸益貧甚然性甘淡薄不問田宅飄飄鶴翥棲遲巖岫間最後寄傲東禪藋牆蒿牀糲餐裂縷人為不堪初亦有病其矯者久知其亷立始終不渝當道守令髙其風多枉騶過之初烈令祁門時有遺愛民為立祠後不當祠者去輒遭毁惟尤公祠久尚存云所著有三時私識萬厯志雍正間志溫陵藝文參政李序齊先生熙李熙字穆之號序齊晉江人隆慶二年進士選翰林庶吉士丁外艱服除授兵科給事中上疏乞録世廟時言事諸臣請蔡虛齊清從祀孔廟糾中官馮保巨奸當斥逐旁及戎政互市振恤阜財諸疏皆有建白世廟升遐髙新鄭相欲令臺省掊擊諸閹盡逐先朝舊時左右同列有受新鄭指者以語熙熙不可已新鄭竟去相幾陷不測同列始服新鄭去則江陵居正代之偵熙與新鄭忤諷為排不附己者熙復不應久之疏論談司馬沐黔國劉都護不法事司馬張私人也為所擠謫南豐丞怡然就道既至直指檄修江右通志棲白鹿洞召諸青襟與談論名理一時士子彬彬向風焉量移寧國令擢南刑部主事出守髙州擢廣西備兵副使所至詢民疾苦剖斷疑獄籌畫戎務風化肅然遂引疾致仕道升雲南參政舟次惠州卒熙孝友道義有古人風一落清華棲遲海服為政以恩信蒞人精勤任事每言士大夫立身行已為要至於窮通得喪蓋有命焉所著有私警録八戒及詩文藏于家閩書恭質王麟泉先生用汲王用汲字明受號麟泉晉江人隆慶二年進士授淮安推官升常德同知萬厯丁丑入為户部員外郎時江陵張相奪情柄國假歸治葬楚中督撫藩臬千里外奔赴獨巡按御史趙應元稱疾不會馳疏乞休長臺者希張相㫖以飾疾規避劾罷之用汲發憤上疏大略謂御史用不會葬忤柄臣而御史大夫阿意借事糾彈竊恐憑社煬竈之奸復見今日謂宜别白忠邪永戒朋比疏入黜為民於是直聲大震癸未張相沒専恣狀露得重譴用汲自田中拜刑部員外郎尋遷廣東按察僉事遷尚寶卿大理少卿不二歲躋九列所至一意孤行絶不與時上下如爭王文成學術偏詖不稱廡祀都御史胡某銜諸生吳仕期書詆江陵奪情嗾屬吏捕斃之宜正辟不止謫戍皆與時議異同疏雖不行朝議凛焉丙戍晉順天府尹丁亥晉南京副都御史總督操江會剿太湖劇盜殱其魁捷聞賜金幣己丑晉南京兵部侍郎改吏部商丘宋太宰某推轂天下賢士大夫多所咨詢辛卯晉尚書南刑部以脾疾乞歸用汲鯁直亷介本於天性為諸生時郡困島夷客兵飽餼餉不發一矢即陳書直指言狀郡守嗔以非書生事輒抗聲曰范希文做秀才時便以天下為己任矧鄉井事耶佐淮安常德二郡囊無長物當削籍時僑居郡中鶉衣藜食教授生徒自給及致尚書事歸蔬布無改卒年六十六贈太子少保諡恭質舊郡志太僕王尹卿先生任重王任重字尹卿晉江人隆慶二年進士授廣州推官州守與舶司交搆事連任重竟不自明升柳州同知久之事白擢守其府持法方嚴豪家忌之調貴陽以馳傳左遷維揚同知年餘遷雲南曲靖守按察副使移陜西行太僕寺卿復遷雲南參政山東按察使専董漕儲事竣遷雲南右布政使以疾乞歸豫太僕寺卿致仕任重自幼慤淳浮沉邊徼悉心官理滇中先後削平逆酋任重劻勷為多為諸生時慨然欲紹濓洛關閩之學常粘太極圖西銘于座壁及守曲靖值江右李中丞材分憲金騰遂以學往復相質顧任重功専實踐非第於唇吻尋求也持身重循禮法終日正襟危坐誡子孫以孝弟勤儉夜將就枕必誦孝經小學二章雖耋不輟曰惟義理可頥性詩書可陶情年七十八卒任重與王恭質俱南鄉人為書生出入相隨其質行又相類里人並稱焉舊郡志新郡志閩書按察張洞齊先生治具張治具字明遇號洞齊晉江人隆慶五年進士授永淳令即詢民瘼為豁浮賦三百石有賈人子賂當道請鑿礦爭之不得設重稅困之立報罷移臨海作追徵全法考民稱便擢為御史巡視倉庫兼河道持重舉大體事事治辦丁內艱服闋赴補扈從神宗謁陵還過老子宫具疏請罷逸遊以光盛典上嘉納之命按南畿復按湖廣旌亷汰貪鋤豪强慎聽訟在臺十一載三按大都所至皆有建竪轉江西副使遷參政升四川按察使播州民苦楊酋殘暴避入內地時議驅之治具謂播人即吾人方離穽而復納之非情為設法安戢會江西巡撫追訾計吏事請量移不赴調歸卒治具篤行長者外坦中嚴於倫情甚厚嘗自言平生所為惟此念不欺人咸信之以為慥慥君子所著有尚書會解四書初說諸儒辦㫖初東集等書葉文忠銘其墓李衷一撰行狀云公嘗謂平生惟好賢一念不能自己解組歸或坐竟日語移時無疾言遽色非禮義不以道非國家事不以及終日無䙝媟之容一動一止光縉目擊之而道存云子國裳己卯鄉薦萬厯志霞草雍正問志李氏景壁集葉相國蒼長史李南藜先生文纘李文纘别字南藜南安人嘉靖辛酉鄉薦銓易州知州升常德府同知轉岷府長史林下餘三十載壽八十餘稽古博文期以羽翼經傳下至星卜律厯亦所窮究篝燈讀誦至老不衰所著有易解禮記庭說書經大指四書口授旁及子史算法律厯凡若干卷又嘗定冠婚喪祭諸禮而鄉飲儀節參考尤詳邑人士多就之學閩書南安邑志文學王次山先生宗澄王宗澄字志濓晉江人為郡學生天性孝友操履純固動有矩度言恥及利與兄宗源宗濬俱以學行重當時著易經兒說為世指南一時名德如蘇氏濬黃氏一龍張氏冕並游其門按公有易經兒說門人蘇紫溪亦有易經兒說豈師弟相授不嫌其同耶闕疑待考躬張氏冕撰墓志王氏恥堂先世乞言同知黃昭卿先生潛黃潛字昭卿晉江人父泰令武康潛為諸生時以學廩讓兄當起貢辭同廩者貼貢資同學髙其誼讀書太學授嵩明州同知會州守缺潛署州篆易土城為石可捍卻夷酋徙學宫以興文事壩普沙河於張家山時其蓄泄潤溉田疇州人永利之潛在州二載盡心民事次第舉行多此類州人相與祠之潛刻厲書史題讀書處曰靜養一心之神動觀萬物之變又有四難四要針以自警四難曰急躁之心難攝粗浮之心難馭誇大之言難收匆遽之事難理其四要曰心要寬綽氣要和平言要簡寡事要尋思平昔言動取與影衾不愧學者宗之孫國鼎閩書舊郡志通判洪鳳明先生受洪受字鳳明同安人潛心力學於經傳多所發明在庠教授稱大師所著有易經從正録滄海紀十卷嘉靖乙丑以貢歷國子助教䕫州通判卒于官縣志閩書行人孫先生振宗孫振宗晉江人嘉靖四十一年進士仕行人卒深於易有易學說約行世閩書周命申先生祐周祐字命申同安人學問該博隱居教授傳易說於漳郡漳之易學至今宗之閩書李先生如玉李如玉同安人纂集周禮會注十五卷嘉靖八年令其子詣闕進詔嘉之如玉究心禮書有司以禮奬勸給冠帶榮之閩書蘇通宏先生鼎實蘇鼎實字通宏晉江人性警悟絶意仕進究心伊洛之學著尚書明說四書注補性理約言人物傳評古今鑒略閩書黃參陵先生道煥黃文煥後改道煥字孔成號參陵生平博極羣書為文不落時蹊教子嚴肅著有尚書遺籝集解雍正問郡志文學劉廷純先生録劉録字廷純惠安人為文學諸生纂述疏義教授生徒所著有學庸口義詩經直解讀詩記至易書春秋大小戴諸篇各為輯略孝事父母宗戚鄉里處之得宜人稱型範閩書閩中理學淵源考卷六十九
