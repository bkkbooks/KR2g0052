body:
  text: 閩中理學淵源考卷二十九廣平府知府李清馥撰莆陽陳氏家世學派西山真氏曰丞相正獻陳公道德風烈為阜陵名相第一舊傳公築第既成有訝其門太庳者公曰異時使竈婢乳媪可開乃佳耳縉紳傳誦以配太祝齋郎廳事語其示二子詩曰興來文字三杯酒老去生涯萬卷書遺汝子孫清白在不須夏屋太渠渠此正落成時所賦也太史公有言使晏子而在豫雖為之執鞭所欣慕焉僕之於公亦云馥嘗按紫陽文公於公尤極嚮慕其沒也越境祭之今觀公貽謀之雅傳訓之嚴宜乎家珍輩出厥後文龍忠肅公并從叔忠武以祚移殉難與文謝諸賢先後同節其家學原本於忠孝者歟正獻陳福公先生俊卿陳俊卿字應求莆田人紹興八年進士授泉州觀察推官秩滿秦檜察其不附己抑之纍官殿中侍御史湯思退専政首疏罷之時災異數見金陵侵軼之勢已成公為張浚辨讒有旨移浚守建康內侍張去為隂阻用兵且陳避敵計以搖成算公請按軍法髙宗稱為仁者之勇除權兵部侍郎金主亮渡淮公受詔整浙西水軍李寶因之遂有膠西之捷孝宗受禪有志恢復屬張浚閫外事以公沈靜有謀命為中書舍人充江淮宣撫判官會和議方堅召還除禮部侍郎參贊軍事初浚謀大舉北伐公以為未可已而邵宏淵兵潰思退議罷浚都督公奏復之因為思退所擠纍疏請罪以寶文閣待制知泉州奉祠及思退既竄太學諸生伏闕下乞召還公乾道元年入對極論朋黨之弊除吏部侍郎同修國史錢端禮起戚里為參政窺相位公進讀寶訓因言本朝家法外戚不宜預政端禮銜之尋出知建寧逾年擢吏部尚書拜同知樞密院事面奏曽覿龍大淵怙恩竊柄孝宗為出二人中外稱快遂以公參知政事先是禁中密旨直下諸軍宰相多不預聞公奏自今百司承御筆處分事須奏審方行從之樞副劉珙進對忤旨詔降奉祠公奏請留乃命珙帥江西四年授尚書右僕射同門下平章事兼樞密使以用人為己任時虞允文宣撫四川公薦其才堪大用孝宗即召允文以為右相既而帝意頗向允文公亦數求去遂以觀文殿學士知福州陛辭勸上逺佞親賢修政攘敵淳熙二年起判建康兼江東安撫召對垂拱殿命坐賜茶從容為孝宗言曰臣去國十年見都城穀賤人安惟朝士奔走權門公然趨附無復顧忌廉恥道喪矣上命二府飲餞浙江亭公再至建康八上章告老後以少師魏國公致仕十三年卒年七十四上聞嗟悼輟朝贈太保諡正獻公孝友忠敬得於天資清嚴好禮終日無惰容平居恂恂若不出口在朝正色危言分别邪正勢無顧避所奏請皆關治亂安危之大者雅善汪應辰李燾尤敬朱子屢嘗論薦其薨也朱子不逺千里哭之為狀其行有集二十卷子守定宓俱從朱子受學焉朱子撰行狀莆陽文獻閩書將作監陳師中先生守陳守字師中正獻公次子正獻嘗館朱子於白湖仰止堂使子弟受業焉守寬宏剛直用蔭歷工部員外郎凡六授郡符三持使節俱以廉介稱除奉直大夫晚為將作監卒閩書道南源委承奉陳師德先生定陳定字師德正獻公第三子人品甚髙年十二三已知為己之學每每欲見古人歸宿處林光朝與之特厚既長與其兄守弟宓等俱從學朱文公文公告以聖賢之學必自近而易者始遂反求之平生未嘗應舉以父任為承奉郎卒年三十五文公銘其墓按師德沒在淳熙元年甲午其受業於文公以正獻公命因托吳耕老以書先道其志計年嵗在甲午以前少卿陳允初先生宇陳宇字允初守定宓之羣從文公為同安簿宇往師之過一年年四十始以正獻郊霈恩授承務郎以詞賦魁吏部調監泉州鹽稅改宣教郎遷祕書丞知仁和縣歷太常寺丞三司判戶司部判官改大理正賜服金紫知梧州軍嵗旱手寫救荒十餘事行之屬縣米適四集人以不飢建炎盜起增額且半纍疏仍舊流徙來歸猺獠帖然以安轉太常少卿入奏事引疾歸積階朝議大夫忠宣留公正撰墓志曰君入杭先與豫交色斂然恭氣退然卑豫謂賢公子習使人親近然爾徐而親切反覆即平日之近驗事物之逺寒士之深造處詣有不能逮其後道行名立公相鄉里多談允初賢亟圖用之則老至而歸不復出矣蓋君從晦菴朱公學及於主敬行恕之訓則守之不忽孝禮清忠亮直乃其家教然也留忠宣撰墓志考亭淵源録承事郎陳廉夫先生址陳址字廉夫厚重明敏自幼即有志於學以祖正獻公蔭授承事郎監泉州南安縣鹽稅卒年二十八嘗學於文公公悲其賢而不克就其志也為之志其壙考亭淵源録忠肅陳君賁先生文龍陳文龍字君賁髙祖宋卿與丞相俊卿為初從兄弟陳氏至俊卿始大公濡染先訓厲志殖學工文詞負氣節咸淳四年廷對第一初名子龍度宗為易今名公雅為丞相賈似道禮重由鎮東節度判官歷監察御史先是臺中凡有建白皆呈稿似道公獨不呈襄陽久被圍似道日恣淫樂陽且督師而隂使其黨留己竟失襄陽公上疏極言其失范文虎總師無功似道庇之以知安慶又除趙溍知建康黃萬石知臨安公皆極論之似道大怒黜知撫州旋又使大臣李可劾罷之未幾元兵東下文虎首迎降似道兵潰魯港溍最先遁上悔不用公言起為左司諫尋遷侍御史時邊事棘王爚與陳宜中不能畫一策而日坐朝堂爭私意公疏曰書曰三后協心同底於道今北兵今日取某城明日築某堡而我以文相遜以迹相疑譬猶拯溺救焚而為安步徐行之儀也請召大臣同心圖治無滋虛議其後宜中與爚終不相能而去纍遷公至參知政事於是張世傑文天祥師俱敗元兵已至杭北關公請身督殿旅合江下義丁決一死議不合世傑等遂以益王廣王趨閩衆議降元公乃上章乞歸養既出國門而悔復上疏求還不報乃歸德祐丙子五月益王即位福州改元景炎復以公參知政事八月漳州叛以公為閩廣宣撫使討之公辟前守黃恮招撫民皆頓首謝罪興化石手軍叛復命公為知軍平之十一月元將董文炳阿喇哈等以兵至福州益王趨廣州命公依前官充閩廣宣撫大使於是殫家財募萬兵即興化軍開閫已而降將王世強復導元兵入廣建寧泉福皆降元知福州王剛中遣使徇興化公斬之而縱其副以還使持書責世強剛中負國遂發民兵自守時城中兵不滿千元兵來攻不克使其姻家持書招降之公焚書斬其使乃使林華偵伺境上華即降且導兵至城下通判曹澄孫開門降執公與其家人至文炳軍中不屈左右凌挫之公指其腹曰此皆節義文章也可相逼邪尋命左右引就館元帥索多往來諭意且以母老子幼感動之公曰宋無失德三宫北狩二邸深入瘴煙何必窮兵至此我家世受國恩萬萬無降理母老且死先皇三子岐分南北我子何足關念情詞慷慨索多愀然改容乃械繫送杭州公去興化即不食至杭謁嶽武穆廟大慟幾絶語監者曰吾病矣留宿廟下以其夕卒時年四十六葬西湖智果寺其母繫福州尼寺中聞之曰吾與吾兒同死又何恨哉亦死訃聞詔諡忠肅賜廟號昭忠元至正間朝廷特遣宣使李文虎至郡訪求公子孫將録用無有應之者郡人鄭鉞號舒堂公門客也嘗著公遺事略曰公負六館盛名魁天下士不八年超登政府時事且急惟以上所賜馬自隨每控轡輒於邑淚下及被執薨馬亦尋斃公為人敦信義初授蔭補不以澤其子而以澤其弟繼執政推恩不以恩其門館而以恩其故人即之謙謙若甚懦及當事乃更不草草亦天性自爾景炎公入覲督相文公天祥自金陵來會相與慟哭國事首議分重臣出督不報既而北警傳至即報可而國事去矣公竟不屈死杭文公不屈死燕宋三百年其末造也江閩兩大魁出俱以節死嗚呼公死國豫負公豫負公因記憶述公遺事如右使豫幾年不死假有物色前代逸史者使我遺事得白公大節吾不死又何待哉公從叔瓚寺丞宓之孫也景炎二年以兵攻叛將林華陳淵與通判曹澄孫等誅之復興化軍以其首告於祖廟遂獻於朝端宗嘉其忠義命以通判權守興化且令乘勝與張世傑掎角復福泉二郡凡八月元將索多復破城死之事聞贈兵部侍郎諡忠武餘詳志乘莆陽文獻莆陽志閩書宏簡録龍圖陳復齋先生宓學派黃勉齋先生嘗與李敬子書云近得真景元書嗜學之志甚至得陳師復書亦然此二公者異日所就又當卓然先師沒今賴有此耳又真西山先生跋復齋詩卷曰某乙丑春嘗為自針曰學未若臨卭之邃量未若南海之寬制行劣於莆田之懿處貧愧於義烏之安莆田者指豫師復而言也某與復齋平生故人而每歎其不可及又按先生嘉定三年曽任安溪令志乘載公盡心所及盡力所為惠政甚多安溪士民稱先生不以令名而尊曰復齋先生惟時斯邑僻處山谷讀公所書令丞主簿廳壁記及惠民藥局記安養院記蓋先施之惠養之政而於禮樂或有未遑乎嘗考紫陽文公曽往安溪按事相傳為先儒過化之處後公復蒞兹土又北溪陳氏最後亦蒞於斯未到官而沒是安溪荒僻幽遐至紫陽師弟始開人文之先者也讀公梅堂詩有曰春風祇在襟懷裏試問藍溪吏隱家仰見滿腔惻隱知存心濟物厚矣再考余鄉湖山安之屬里其翠屏山之隂有曰名教堂説者謂紫陽門徒所栖止其姓氏不著是時學紫陽之學者恐儘有人惜姓氏莫考余聞之故友王尚卿得之吾族姪廣文延拱云乾隆辛未五月十三日書龍圖陳復齋先生宓陳宓字師復丞相正獻公第四子少事朱子朱子器異之長從黃勉齋遊稱其胸懷坦然無一毫私欲之纍嘗與書曰忽聞執事志道之篤立行之髙乃如此喜躍不能自勝先生九原之下亦當為之擊節幸吾道之有傳也以父任歷知安溪立安養院以處窮民取廢寺粟若干粥之病則醫藥之死則棺葬之邑有例錢却之良久曰此一例字壞許多賢士大夫安邑士民不名為令而曰復齋先生嘉定七年入監因大旱進奏言宫中飲宴或至無節非時賜豫為數浩繁大臣所用非親即故貪吏靡不得志廉士動招怨尤若能交飭內外一正紀綱天且不雨臣請伏面謾之罪奏入丞相史彌逺不樂而中宫慶夀三牙獻遺至是為之罷却遷軍器監簿轉對言人主之德貴乎明大臣之心貴乎公臺諫之言貴乎直指陳弊事視前疏尤為剴切勉齋見而嘆曰使臣子皆如此國其有不興乎尋請罷歸擢大府丞不拜出知南康軍嵗大祲奏蠲田賦使流民築江隄而給其食造白鹿洞與諸生講解改知南劍州又大旱疫蠲逋賦十數萬且弛新輸三之一躬率僚吏持錢粟藥餌户給之創延平書院悉倣白鹿洞規知漳州未行聞寧宗崩嗚咽纍日無何請致仕寶慶二年提點廣東刑獄章復三上迄不就以直祕閣管崇禧觀拜祠命而辭職名得進職一等致仕三學諸生以起公為請而公沒矣公天性剛毅信道尤篤自言居官必如顔真卿居家必如陶潛而深愛諸葛亮身死家無餘財庫無餘帛庶乎能蹈其語者端平初殿中侍御史王遂首言公事先帝有論諫之直而不及俟聖化之更宜褒身後詔贈直龍圖閣所著有論語注義問答春秋三傳抄讀通鑑綱目唐史贅疣文稿數十卷道南源委考亭淵源録閩中理學淵源考卷二十九
