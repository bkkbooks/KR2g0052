body:
  text: 閩中理學淵源考卷八十五廣平府知府李清馥撰建寧明初諸先生學派按余則亮杜德基丘永錫鄒季和張孟方諸公皆淵源建安之學託志在巖穴山谷惟時武夷雲谷間學侣尚有其人故繫心者嚮往焉非欲戢影寂寞之濱也惜年代寖逺師友莫詳矣黃氏仁溯金華宋氏之傳黃氏福楊氏壽夫李氏鐸各以治經砥行名著廟廊皆建安先正之遺範也兹採其著者載于篇知事余孝友先生應余應字則亮政和人早從江惟志遊以私淑文公之學性凝重寡言笑恆以禮自律家邇闤闠足迹未嘗入縣門早失所恃事繼母與處繼弟以孝友稱洪武初以明經薦起為儒學訓導遷留守司知事越三載坐公文不式免歸執父喪一遵文公家禮邑人稱曰孝友先生雒閩源流閩書司訓鄒季和先生文慧鄒文慧字季和建安人任司訓元末謝職服柴桑巾服與門徒講程朱之學洪武初本郡理學推文慧為首閩書道南源委通志贊禮郎黃淵靜先生仁黃仁字淵靜建安人曾祖定宋末居六合為兵馬副都監仁溫純能詞章少時朝出受易於部使陳孟然暮抵舍質疑於仲父居德內外皆得師學日進如雲集水湧洪武辛亥有司以仁名上福建行中書省試藝棘闈主文衡者為前進士林以順吳尚志江惟志郭麟取舍甚嚴及出榜選中三十人仁居第四年始弱齡耳明年會試南宮銓曹急用材不俟再試擢奉常贊禮郎仁初名文仁有司以犯周西伯諡加水其左曰汶仁及解名中書右丞相汪廣洋曰仁義甚𢎞可冠以汶乎第為名仁仁受學宋文憲濓濓甚愛之為作黃淵靜字辭而仁仲父居德者亦竒男子年十六時中程試髙等諸老生不中譁於庭居德請面試譁者持筆不能下面頸發赤出後改名保元為酆都丞閩書教授杜德基先生圻杜圻字德基崇安人元杜本之孫苦學砥行以先哲為師洪武間以薦舉授甌寧訓導轉溫州教授閩書教授丘永錫先生錫丘錫字永錫崇安人領洪武鄉薦除工科給事自陳願學職改衡州教授永樂四年預修大典改衢州教授宣德七年後預修太宗實録成仍乞原職改建昌教授自筮仕以來凡五典文衡人服其公性嗜學垂老不倦偕其友徐仲禮結社武夷手不輟披卒年八十有文集行世閩書武夷山志訓導張孟方先生矩張矩字孟方廣陵人父伯巖元季為崇安五夫巡檢遂卜居焉依屏山劉氏得其遺書讀之遂通五經諸禮書皆精絶洪武間薦為崇安學訓導通志寺丞黃汝錫先生福黃福字汝錫浦城人博通經史任杭州府訓導勤教善誘升太常博士永樂中預修五經四書大全及性理大全書升本寺寺丞閩書修撰楊先生壽夫楊壽夫建安人父文叔元末與兄恭叔舉浙江鄉試恭叔洪武年薦甌寧訓導改建安壽夫名松以字行通春秋孝友篤摯建文辛巳郡守芮麟薦授縣學訓導秩滿諸生請留升本學教諭歷二十餘年多所造就典考鄉試者五會試者二宣德中楊文貞輩交薦之升翰林院編修預修宣廟實録升修撰正統中致仕閩書李先生鐸李鐸甌寧人涉獵五經尤邃于易洪武中以明經薦授監利教諭為文一主傳注不尚穿鑿誘掖為多閩書簡討蘇伯厚先生庠蘇伯厚名庠以字行政和人父照伯厚自幼以聰敏聞比長博通經史尤精毛詩為文章援筆立就聲譽日起每自沉晦篤意事親講學絶迹不至城府以孝行見重纍薦不起洪武乙丑以明經授建寧訓導後學多所造就升晉府伴讀未赴永樂初預修太祖實録遷翰林侍書復預修永樂大典為總裁升簡討兩典春闈文衡進講東宮卒伯厚學本誠實議論皆有根據在翰林幾十年絶無私謁與禮部尚書鄭公賜有師友之舊未嘗一至其門鄭公嘗請見必規以正言每加敬服其餘出其門者咸操守有品人有一善稱之不絶口對同寮詞氣溫和罕失色于人家庭有禮法服用儉約自號素履有素履集子鑑永樂間官稽勳郎中弟仲簡閩書考分省人物訓導蘇仲簡先生鏡蘇仲簡名鏡以字行善文詞與兄伯厚弟叔敬季雅自相講授洪武初以明經薦授崇安學訓導閩書州判盧士明先生欽盧欽字士明建陽人性好學五經百氏悉能貫解曰讀書非徒記誦將以行之也洪武以明經聘為儋州判卒閩書助教趙志道先生友士學派明代建安師席有立者湮晦莫詳只趙志道先生傳中載鄭文安楊文敏二公曾遊其門其餘有道前修求師訪友皆散見列郡及他邦皆可考焉助教趙志道先生友士趙友士字志道甌寧人宋宗室裔純厚樂易洪武初以明經舉為府學訓導正已率下鄭文安賜楊文敏榮皆出其門官國子助教有文集行世閩書通志文安鄭彥嘉先生賜鄭賜字彥嘉政和人舉洪武十八年進士授監察御史時天下初定法令嚴肅郡邑吏坐罪逮繫者多既解戍命賜就龍江編次其行伍時暑甚賜諭以上恩慰撫之脫其鉗械俾各就居止旦一詣視有疾病羸弱者捐祿米饘粥之皆感悅湖廣布政司奏缺官賜秩滿遂與簡討吳文並出為參議二人同德協力剔弊去蠧清簡寬直最為知名丁內艱服除改北平布政司左參議成祖在藩賜服事甚謹被眷愛而謀國者疑之謫置安東屯未幾召為工部尚書既命督軍務河南拒靖難師成祖即位李景隆言賜罪亞齊黃逮至上問吾何如待汝遂相背耶賜曰亦盡臣職耳上笑釋之改刑部尚書復轉禮部寵遇日隆後衰病不任官冗為侍郎趙羾所間益惶悸周章上心輕之頃之卒上問翰林臣曰賜不病遽死自盡耶楊士竒對曰病矣惶悸不敢就醫藥昨在右順城門外立而仆臣命其屬掖出之語未竟上曰賜故君子才不贍耳其撰文遣祭翰林諸臣退上獨召士竒曰微汝言吾幾疑之遂贈太子少師諡文安賜小心恭慎易直和厚學士解縉嘗於上前稱其足為君子閩書文敏楊勉仁先生榮楊榮本名子榮字勉仁建安人漢太尉後也祖達卿有隂德達卿值嵗儉出積粟食人使為種樹於其縣之龍津召子弟戒之曰樹長勿以售人惟學舍杠梁浮屠老子之宫貧無室廬死無棺椁者則豫之否非賢子孫繇是鄉人獲濟者衆元福建行省左丞阮德柔作萬木圗以美之子榮登省試第一建文二年進士授翰林編修永樂初與解縉楊士竒胡廣黃淮胡儼金幼孜被選入文淵閣付之密務而兩制悉歸焉內閣典機自子榮始時靖難之初朝政鞅掌子榮年最少而最警敏通練一日寧夏報被圍上召七臣獨子榮在示之奏而曰爾後進也寧解此何以禦之子榮對曰聞寧夏城堅士卒習戰敕守臣隄備可耳夜半聞圍解旦召曰何善料也因獨名榮升修撰仁宗立為皇太子以侍講進奉訓大夫右春坊右諭德兼侍講如故五年命視邊甘肅還奏稱旨上手剖瓜賜之明年以父喪給傳歸既葬起復視事明年母喪乞歸上以北行期迫不許明年榮與學士胡廣諭德金幼孜皆扈從八年從征至凌霄峰與廣幼孜及刑部侍郎金純夜失道幼孜墜馬廣純不顧去榮下馬為理鞍轡前復墜讓以所乘馬午見上時上遣人四索三學士及見大喜問故笑語幼孜曰此中多狼爾非楊榮詎能免乎榮謝曰僚友當然上曰胡廣金純獨非僚友耶使掌護衛勇士三百不𨽻于諸將賜駕前先鋒銀牌榮還京請終制賜金幣馳驛敕中官護行趣歸既至復榮官已侍諸皇孫讀書文華殿講授有程度皇太子稱之明年復與廣幼孜從北巡太孫侍行上命榮以間陳説經史兼領尚寶事凡宣詔出令及旗志符驗必得榮奏乃發比還北京命修五經四書性理大全書成宴勞之留北京二年進翰林學士仍兼庶子從還京師明年復從北巡十八年進文淵閣大學士兼翰林院學士明年定都北京營建規制多出于榮會三殿災榮直入麾衛士遷御書圗籍翌日上喜褒賜之榮因與幼孜陳便宜十事報可榮論事激發不能容人過然羣臣或觸帝怒致不測輒從旁寬譬之侍讀李時勉尚書夏原吉皆以榮言得無死都御史劉觀以榮言得無戍邊營善探人主意談言微中以故其説得行嘗謂人曰事君有禮進諫有方為人臣以抗直賈禍吾不為也明年復從出塞軍事大小令參決賚豫優渥師還榮與幼孜皆受上賞明年從征西駐萬全軍務悉委榮晝夜見無時上時稱揚學士不名額森托噶欵塞羣臣議莫定榮獨請往受降而歸師旋明年復北征當是時上凡五出塞榮幼孜輒從周旋險阻未嘗頃刻離大軍抵達蘭河敵逺遁師亦弊上問羣臣當復前否羣臣唯唯惟榮與幼孜獨請班師上許之時浙江守臣言浙麗水與閩政和山賊熾請發兵榮曰愚民苦有司不得已相聚兵出怕益聚不可解遣一介往撫可不煩兵如其言盜果息上御帳殿從容語榮幼孜曰東宮監國久明習政務今歸當付以國事朕將老焉二人頓首還次榆木川上崩中官莫知所措榮與幼孜入御幄議喪事二人議六師在外去京師尚逺祕不發喪以禮斂龍輿所至朝夕進膳如常儀益嚴軍令人莫測或請因他事為敕遣人馳報太子榮曰皇帝大行孰敢稱敕莫若具啓人皆韙之仁宗即位進嘉議大夫太常寺卿兼前職有間進太子少傅兼謹身殿大學士尋敕賜繩愆糾繆之章始大行訃至仁宗哀亂不及詳問當時事痛定乃知賜敕曰先帝崩徂六軍在外卿盡忠謀鎮定果斷加賜白金五十兩綵幣十表裡寶鈔二萬貫白米二十石特升工部尚書前官如故其冬敕護葬山陵敕修太宗實録命榮總裁仁宗崩宣宗即位復命總裁仁宗實録益推心委任榮與楊士竒楊溥協恭輔政天下稱為三楊士竒曰西楊溥曰南楊榮曰東楊而果斷之才卒歸榮也宣宗親征漢庶人棄交趾之議皆自榮發之二年賜敕并銀章五褒豫甚至宣德三年上北征出喜峰口榮與楊溥皆從大獲而還榮獻詩十章又明年兩朝實録成宴勞有加尋進少傅食三祿如故辭大學士祿允之有頃誥贈三代滿三載賜敕諭宣宗崩英宗即位委寄如舊賜豫相屬五年乞歸展墓上使中涓輔行還至武林驛而卒年七十上輟朝一日贈太師諡文敏授世都指揮使榮歷事四朝謀而能斷中官持文書至閣必問東楊在否不在即去嘗會廷臣録囚片言立決衆皆歎服尤喜賓客善交際雖貴盛無崖岸士多歸心嘗疏舉陳循高榖苗𠂻三人自代或謂榮處國家大事隨機應變不愧唐姚崇而不拘小節亦頗類之正統初天下休息榮有力焉榮少從師友慨然有志古名相嘗退朝意甚不樂子讓請曰大人得毋以不肖有所纍乎榮曰非也念吾職重無以報國三代以上之大臣無不怠惰荒寧為懼所以憂戚不在汝輩曾孫旦官吏部尚書尚書楊晉叔先生旦楊旦字晉叔榮曾孫𢎞治庚戌進士歷吏部考功郎中嘗考察京職有被黜而夤緣奏辨奉旨再核馬文升倉卒欲改擬旦曰祖宗來未有此例幸門一開後將謂何竟覆罷升太常少卿歸省還朝中官劉瑾欲要見不得遂以違限出知溫州提督浙江學政瑾誅升順天府尹時武宗未建皇儲與九卿具疏請擇宗室之賢者育于宮中尋奉敕總督京通等倉適回賊犯邊甘肅驛騷奉敕督理糧餉升總督兩廣軍務兼巡撫番禺清逺河源等縣蘇岡十八山滴水巖等塞猺獞負固旦調集官軍土兵分道並擊斬級萬一千有竒俘獲四千一百有竒奪回被掠男女二百三十餘人牛馬輜重不可勝紀璽書褒異以母喪奔歸嘉靖初起掌南院升南吏部尚書旋改北會桂蕚張孚敬以中旨升學士旦率都院疏論忤旨遂為陳洸所誣有旨令致仕科道交章論薦不報旦奉母至孝雖貴顯不衰年七十一危坐而逝通志閩中理學淵源考卷八十五
