body:
  text: 閩中理學淵源考卷七十三廣平府知府李清馥撰文山黃氏家世學派吾郡隆萬間耆舊典型於時蔚起而恬淡清修立身本末有進退大節則共稱文簡黃公也公之學術宗奉紫陽鄒氏元標謂其平生服膺蔡文莊規矩尺寸不踰考公立朝建沃忠言匡持君德丰采德業為世名臣實無愧於文莊矣至退歸林下敦禮耆舊奬掖後生闡發潛德崇厚禮教敬讀田亭草諸製述仰見正學源流實有關世教之作原其家學皆本于守軒朴齋溯逸齋而上積功纍德至公而丕恢前烈其後嗣踵起者學使靜谷公潤中為最著茲特録其先世所以肇基孝弟敦説詩書以貽厥後人者以風世焉處士黃逸齋先生賢黃賢字彥德號逸齋晉江人元處士天麟公其初祖也生五齡母沒鞠于繼母孫氏天資純懿孝養逾於所生長即知讀書好禮維持家務勤儉治生家用是裕且樂施豫周急里閈少年不事事者必喻以為善人多化之長子應登永樂二年進士次惠抱德不仕田亭草家譜傳節録黃守軒先生禮黃禮字廷文號守軒逸齋公曾孫天性至孝而尤篤於信義鄉閭稱之少孤父墳湮沒後籲天祈神大號于鄰墳者三日忽有龎眉老叟指示其處果得證驗相傳為孝感焉家庭之間其教不嚴而肅嘗訓子曰惟謹厚可逺怨惟質實可動人其識之田亭草家譜傳節録文簡黃儀庭先生鳳翔黃鳳翔字鳴周號儀庭晚更號止菴晉江人少小即警敏絶人觀書沉潛經目成誦笥腹不忘稍長習胡氏春秋學於學博蔣與泉鳳翔習其師説本經據傳折衷以己意弱冠即以善春秋聞郡中時王遵巖慎中方設比論文誘教後進得鳳翔藝造廬訪之鳳翔以髫年攝衣冠見不懾不迫步止從容遵巖益大竒與坐語曰生年少而文章氣概俱髙異日者必魁天下遂致鳳翔為諸郎文社交辛酉鄉薦第四自是益肆力文章與臬長張洞齋藩伯洪心齋對壘角藝隆慶戊辰成進士殿試第二人明泉中及第自鳳翔始授編修教習內書堂亡何以疾假里居三載還朝旋丁外艱歸萬厯丙子補故官與修世宗實録成進修撰充經筵官五年同考會試首相張居正奪情起復取中旨罪諸言臣怒新進士鄒元標特甚欲斃之杖下鳳翔昌言於朝曰此孤忠即不使生奈天下綱常何囑門人多方調護鄒得不死頃之有編管諸言事章奏之役鳳翔慨然任之悉編入無隱諱庚辰春居正欲鳳翔再與同考使次相喻意望録其二子鳳翔固辭不赴借奉使益藩避去及壬午秋以次當主試南畿少宰王篆亦欲如張相旨托鄉貴人為先容復謝不往尋遷中允纍升南京國子祭酒省母歸起補北監時方校刻十三經注疏鳳翔上言頃陛下去貞觀政要進講禮經甚善但讀曾子言孝則當珍護聖躬講學記言學則當緝熙聖學察月令篇則當勤勵聖治繹世子篇則當豫建皇儲疏入上嘉納之尋擢禮部右侍郎兼侍讀學士會洮河告警疏言多事之秋陛下宜屏遊宴親政事以圖安攘為今大計惟用人理財二端宋臣有言平居無直言敢諫之臣則臨難無敵愾致命之士頃吏部員外郎鄒元標直聲徑節銓司特擬召用而聖意頓改于前建言遷謫諸臣如潘士藻孫如法亦擬量移而疏皆中寢士氣日摧言路日塞平居祗懷祿養臨難孰肯捐軀為國哉昔宋藝祖欲積縑二百萬易敵人首太宗移上供物為用兵養士之資今户部歲進二十萬初非舊額積為上供陛下富有四海奈何自營私蓄又竊見都城市觀金碧熒煌歲時齋醮絡繹道路經費賚豫外廷莫知與其要福於冥漠之鬼神孰若廣施於孑遺之民命况東南財力已竭西北邊務方殷誠國民交病之日疏入上不能用是時儲位久虛廷臣屢請册立久未得命上意欲國本之定發自宸衷密諭王家屏以明歲舉行且無令外廷知之家屏傳語禮部鳳翔遂與尚書于慎行左侍郎李長春具册立儀以請上怒各奪俸三月并責閣臣不密之失廷臣無敢復言鳳翔獨抗疏爭之不報遂乞休歸壬辰起禮部左侍郎旋改吏部已復升南禮部尚書以母老辭再疏乃優詔許之甲午起復原官更力陳母老準以新銜在籍候用母沒遂不復出甲寅有旨特起而鳳翔已卒年七十有六訃聞豫恤典贈太子少保天啓初諡文簡李氏光縉曰公居官耿介自守所履清班善地未嘗為政府私人華亭興化身出其門一事之以道史館諸公以文章行誼相引重有之不能欵布腹心初抑於江陵偃蹇郎官十餘年及進宫僚淹滯留都旋歸旋起屢起屢辭則公出處之道可知矣公通籍四十七年立朝僅十三年在里居者三十餘年養晦耽寂絶無愠色布衣菲食匡坐小齋不蓄古物書畫亦無園池臺榭之觀用器無雕鏤居室不漆堊林泉多年庭可張羅足迹罕及公門或時以時事枉直利病公言之天性孝友子孫三十餘人訓之以禮悉遵教如之學術一稟紫陽務躬行實踐不設道學之名官中祕時退食之暇惟有楗户讀書老而家居猶然故苞孕極富而撰著獨多嘗自言友天下士則不足尚友古人則有餘壬子春郡守陽公纂修郡乘請公為總裁同事林省菴何匪莪蘇石水光縉亦涉筆其門公曰先輩行誼可稱不妨廣為搜羅第勿作過情之譽則瑕瑜自不相掩凡所進退人物公不自疏舉以公之共事者公但受成而已然每一傳成必經折衷或自再著書成人或病其太寬而直道固存矣公意在寬嚴之間其硜硜為公所包容多矣然有執益堅持益力者公亦不難虛已夫然後知公之心也鄒氏元標謂公服膺蔡文莊學尺寸不踰數十年出處之正不淄不磷何氏喬逺稱公平易忠孝狷介謹嚴為太羮元酒布帛菽粟之先正楷範信知言也所著有嘉靖大政記大政編年録田亭草等書子淳中門廕潤中皓中等俱見科目志閩書鏡明名臣言行録山撰行略新舊郡志李衷一撰本傳何提學黃靜谷先生潤中黃潤中字嗣雨號靜谷文簡公第六子也少頴敏崇禎十年進士初任刑部主事轉禮部員外郎旋出督學中州矢公矢慎所甄拔皆單寒竒士是時烽火相聞絃誦之聲寂然潤中多方誘掖士氣日振未幾有廣東惠潮之命欣然就道旋歸里杜門著書晚節嗜學卒時年七十有一所注解易義杜律禹貢解諸編藏于家田亭草家譜志傳録鴻臚史觀吾先生朝賔學派按觀吾先生清修直節前輩論之詳矣咫亭詹公在南雍時嘗稟學於先生其後與鱗泉王公用汲愚菴郭公惟賢並以抗疏直言先後顯著洊登九列為世名臣云鴻臚史觀吾先生朝賔史朝賔字應之别號觀吾少隨父商崖公宏璉讀書質遲重強力苦識學成為文章演漾汪洋登嘉靖二十六年進士第授刑部主事久之以員外郎署司篆兵部郎楊繼盛疏論嚴嵩納賄蠧國十大罪上怒甚杖繼盛百下之獄嘉靖三十二年也先是獄未下嵩子世蕃私以意授其黨李天榮令預囑朝賔曰必得楊甘心焉即與美擢朝賔正色曰有髙皇帝之律在何可枉也吾寧失官無寧失律及議獄時司冦以下惴惴不知所出朝賔遂擬傅奏事不實律以進部尚書何鰲謂曰更有一比盍思之翼日復尚書曰有之則有減於此尚書乃自比其律且云傅此庶得當朝賔持不可獄數日未上事益急尚書曰急矣雷霆不測如君所執誠是夫固為俱靡耳盍以待後解而侍郎王學益直曰司官徇名豫老矣於是當以詐傳令旨罪絞自為藁授朝賔朝賔既爭不得請署奏末云楊繼盛語雖詿誤心實無他惟陛下憫其狂愚謫發逺戍庶以全好生之仁奏入繼盛竟坐大辟尚書侍郎奪俸而朝賔降三級外調泰州判方繼盛下獄時薦紳相見脅息不敢語及繼盛杖瘡甚同年提獄禁不許關通獄之上朝賔自分重譴與繼盛俱死耳諸公有入獄勞問繼盛者繼盛都閉目不言及朝賔至瞪視曰史應之耶費心多矣朝賔當往泰州别繼盛書曰遇公之事當以死爭賔不死者尚冀公不死也楊復書曰某批姦人腸恨不即死公何苦哉公其珍重判泰州三年量移揚州久之遷南户部以艱歸服闋補工部郎分署張秋鎮通商惠民久之嵩敗徐文正階當事乃以河南僉事擢尚寶少卿尋改南大理丞旋復徙應天府丞久之轉鴻臚卿卒詔賜諭祭朝賔居常訥訥至臨大事決大利害屹然山立不移嘗稱民生利害之端非有惻怛忠誠之心不能體察吾身利害之端非有正直剛毅之守不能鎮定故其所至無論中外並皭然不滓卓有樹立而其最彰明較著者在不屈嚴相與部長持忠愍獄士論韙之歿之日宦槖蕭然居屋數椽不蔽風雨所著有觀吾集及史氏內範藏於家學者稱曰觀吾先生云舊郡志閩書李衷一撰本傳司訓洪積齋先生猷學派按文簡史公撰洪先生周易翼義敘云余家世受易先君子嘗有撰次未就稍長獲遊積齋洪先生之門而始有會也先生束髮窮經老而逾篤至晚年而後論説始定又曰邇來士習好異異説曹興不獨與文莊紫峰二先生刺謬浸尋而操戈紫陽矣二先生書皆已布之學宫日為異論所蝕豫嘗求其書於里孰不得以為恨於是先生子孝亷子愚出其家藏梓之福安黌舍俾小子序而行之先生之説行即二先生之説行也先生淵源於蔡陳而宗朱子之義故云翼義云今録其派繫載于篇司訓洪積齋先生猷洪猷字文振號積齋世家晉江錢嶼里猷性資強毅厚於彛常藩身必以禮遇事尤奮發敢任斷詞正言卓有任道之質而學足以充之弱冠喪父奉母并撫諸弟殫厥心身家貧不支以舌耕佐費一切婚嫁咸取給焉蚤以學名從遊之士數舍而至士相遇講述鮮不名猷之學者平昔毅然能尊師重道其學則繇紫峰虛齋以上遡考亭條分理解孰師箋析之外又復推緣傳注以印合聖賢宗旨誠意諄諄顧不自立門户直於講藝中提掇身心實際用證聖功文章絶去華飾根諸理奧久之司訓江右之南安一如教閩士旨貧生修勢每從謝却間贍之餼律人以恥養人以名言凖履繩居一載當道旌為廣文冠遽疾卒門人史文簡繼偕志其墓所著有易經翼義四書説約子啓哲萬厯丁酉鄉薦纂史文簡撰墓志方伯洪鏡潭先生澄源洪澄源字子定號鏡潭富之從孫萬厯十四年進士授户部主事歷郎中時資深當守郡而桂林守缺里人秉銓或謂可謁銓曹易一名都毋桂也澄源笑不答於是擢守桂林在郡半年謁謝不一行亷仁著聞擢貴州按察副使備兵畢節時宣慰安疆臣地廣兵強澄源外制以法內推以心疆臣畏服播酋楊應龍為變朝廷出師征之命疆臣出征助戰中丞郭子章委澄源監其軍安與楊實相唇齒內懷觀望數張皇以撼澄源不為動疆臣乃進兵攻應龍於大水田大破之斬首無算應龍敗入海囤踰月授首論功賜金帛升貴州按察使踰年轉雲南左布政使未赴卒澄源平昔逡巡樂易及其受脤臨戎有壯夫弗克為者惟不擇利害為趨舍蓋自卻謁銓圖大郡時預見之矣故強酋阻夷莫不歸心其忠誠有以孚之也史文簡贊曰李文節公不輕許可而獨稱澄源制安平播為仁者之勇有百世之功信然哉新郡志改本參史文簡撰本傳副使許賜山先生學派按賜山先生易學一時推重文節李公曾撰墓志追述無異辭其所學所守固可信者矣副使許賜山先生天琦許天琦字大正食廩德化後歸晉江其先世有許稷者舉唐貞元進士賜告歸讀書清源山中因顔其讀書處曰賜恩今為賜恩巖而天琦號賜山不忘祖也嘉靖四十一年進士歷工科給事中贊署長疏止鰲山燈費又疏海防四事轉刑科給事中疏刑名弊源六事既而疏劾兩廣總督其人倚奧援中天琦乃出天琦廣東參議備兵惠州年餘擢滇副憲備金騰兵金騰多雜夷天琦至以化誨為務日進諸生講學羣民庶立鄉約俾相訓迪俗稍稍變方四閲月而嬰疾卒天琦有至性又方嚴無所狎眤絶不為人干請其為給諫時某學子介鄉嫗持八百金為壽天琦叱去之平生獨喜説書講易多自得箋注外一時學者以為指南仕宦所至英髦秀士執經請業屨滿户外所著有周易管見續宋史斷行于世李文節撰公墓志言每見公説書講易多發前人所未發其議論老誠識大體不尚沽激其操行斤斤檢押外不錯寸趾也既貴嗇陋儉約蕭然故諸生時一絹袍十八年云纂李文節撰墓志蔣敬齋先生際春蔣際春字君育别號敬齋世家於泉之福全濵海獨以詩書絃誦著聞父赤山公好行其德開子姓以儒多彬彬者子二際春其仲也際春讀書質魯而敏悟王遵巖特竒其文嘗曰摩空白鶴非樊中物也與兄伯沂泉公稟學于賜山許先生是時賜山坐皋皮講易邑賢豪爭北靣獨賞識于際春所著有四書日抄易經記注並膾炙人口惜無年而卒子光彥孫德璟纂李衷一先生集史氏家世學派按黃恭肅撰史方齋墓志稱史氏先世自寧波入閩數傳至旌孝公仕傳以孝行著成化中詔旌其門方齋即仕傳公元孫與觀吾禮齋少受業伯父商崖公日講四書周易不襲時師皮膚説務根極聖賢垂訓本旨商崖事實未能詳然按其家世亦以見當時父兄之教肅而成之為多逮後大鴻臚朝賔有不可奪大節方齋兄弟以髙蹈名德稱其後嗣踵出為世名臣碩輔皆本于家學云訓導史商崖先生宏璉史宏璉别號商崖晉江縣學嘉靖間司訓金壇以子朝賔官贈刑部主事餘事實未詳按觀吾公朝賔方齋公朝宜禮齋公朝富皆少受學於商崖公其家庭牖教大略詳見方齋公墓志泉郡萬厯志史氏雲臺稿藩伯史方齋先生朝宜史朝宜字直之黃恭肅撰公墓志曰公嘗自言少受業於伯父商崖公日講四書周易不襲時師皮膚説務根極聖賢垂訓本旨翌日答而未悉必使反而更思索之復未悉者責之既悉方與續講後章自是循循孜孜愈久愈覺意味深長公讀書之法然也公既得書意味遂以身膺而服之自綱常倫理之大以至謁見取受一事一物之微茍有畔於聖賢垂訓義理僩然不使少加於其身也弱冠補弟子員屢試髙等士慕公者競學步其舉子業公曰是筌蹄耳君等遜志聖賢義理意見既充詞自足以達之抑士君子立身天地間道德功業職分重矣奚區區舉業效習為也淳菴公患瘡臥牀公躬理藥餌時湯粥扶持起居者五餘月至目不交睫歿而哀且毁執喪必如禮制廬墓讀書者三年嘉靖三十二年登進士第授淮安山陽令山陽田土多荒而賦額廣民多流移當路督計嚴急催徵艱甚公以帑藏備賑飢之蓄遣糴於江南湖北間招賑其流移者而代輸其所逋負蓋存活淮民莫可計數是時倭奴入冦趙文華視師海上獵賄郡邑比過淮公防守封疆保定居民供帳一如常禮送不出境趙恚甚既亷知為苦節吏置之旋丁母憂服闋補户部主事是時東粵亦病倭珠崖孤懸海島守臣率以賄敗朝議遴公以行比至杜絶陋習撫安疲民崇風教以正酣淫之俗肅官針以剔貪殘之吏其治狀為置守以來第一在郡三載即拜公廣東按察副使晉參浙藩總東粵憲東粵之民服其威信不怒而嚴升湖廣右布政楚為江陵相之鄉公覩江陵規局槩以刑名慘刻斫國家元氣不能媕阿任職未數月引疾乞休楚撫固留公乃自馳使特疏再疏司銓者覆請得旨回籍調理且云病痊之日撫按具奏起用公歸治小書室於陋巷仍讀書其中時與禮齋廬居雲臺先塋側以山林泉石為樂足迹未嘗及當道之門時閩撫楚黃州人也以理學相雅重或勸公時致通問可藉薦起復公曰則如勿止止而復仕且援焉非夫矣易稱不恆其德或承之羞而欲豫以羞自承乎竟無隻字往復蓋公清貞之節道義之守終始不易如此初淳菴公宏珂方生公時卜者言當為盛世髙蹈名儒非徒功名富貴士也信不誣矣公閲歷仕路二十四年骯髒直道自號方齋以見志享年六十有八所著有易説及詩文子繼偕裒輯傳之凡十二卷弟朝富鄉會試同榜歷官永州守以清望著聲亦引疾歸卒年九十鄉人以比漢二疏焉纂黃恭肅撰墓志郡守史瑞巖先生朝鉉史朝鉉字貫之號瑞巖晉江人隆慶二年進士父宏詢歷壽沅二州知州朝鉉隨行官邸自沅歸從許賜山天琦受易日以所口授者輯而成書後梓行於武塘官舍朝鉉為人性端介潔修淡尚初令嘉善每蒞政容止儼然人不敢干以私書座右曰公生明嚴生威二者為官針要訣編審按户輕重布之強家無所假貸加意作人授南吏科給事中盡却例儀任三載侃侃多糾繩而劾大璫申信疏十罪南中人德之萬厯乙亥復管大計適同年户垣余懋學者疏時政四江陵憾為刺已內批豫削籍而移忮朝鉉未幾而湖州命遂下朝鉉夷然之任時方溽暑至則躬閲繫囚不待訊爰書而湔雪寃濫者十餘輩其處脂不膩一一如為令時後民思之以配前守黃氏樞并城隍神而三焉纂史文簡撰墓志文簡史聯嶽先生繼偕史繼偕字世程號聯嶽晉江人萬厯壬辰進士殿試第二人授翰林院編修率同官請册立東宫開館講學不報詔使兩粵盡蠲軍興諸賦還升侍讀轉中允未幾由南司業遷南少宰兼署户禮工三部力請盤庫盜帑積弊改詹事疏請致仕家居一年起為吏部侍郎東閣大學士時神宗深居不出繼偕每會廷臣請視朝并力陳備兵措餉不報旋致政歸熹宗即位屢遣行人促入朝視事甫閲月以延綏捷加太子太保兼文淵閣大學士為阮大鋮所忌從中擠之引年疏十八上乃得歸卒於家新郡志閩中理學淵源考卷七十三
