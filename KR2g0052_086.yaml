  - {type: page-break, offset: 0, content: '', id: KR2g0052_WYG_086-1a, image: WYG0460/WYG0460-0802c.png}
body:
  text: 閩中理學淵源考卷八十六廣平府知府李清馥撰成化以後諸先生學派按熊氏熈為勿軒先生之裔少從三山林氏玭學易與虛齋蔡氏同稱高弟若趙蘭溪旻楊天游應詔楊文鋭鏸黄元泰三陽傳稱其授徒傳業一時師廣而門徒莫考矣其餘諸賢或以經術文學著稱或以功績節概垂名皆表表可傳述者嘗考建安風氣宋時開倡首於八閩自游胡朱蔡真熊數家以來遞衍宗風中明以後人才稍替矣然其流風篤厚大抵質有餘而文少遜其守儒服躋顯仕者規矩不踰豈非大賢之烈哉訓導熊文明先生熈熊熈字文明建陽人𢎞治壬子鄉貢士宋勿軒裔孫少從侯官林先生玭學易與晉江蔡虚齋先生同稱高弟授翁源訓導後謝病歸門人感泣道左所著有四書周易管見閩書副使張摶南先生鵬張鵬字摶南浦城人正徳辛未進士授戸部主事督馬厰劾中璫私貸影射之弊衆側目擠陷賴揚一清石珤保持之武廟東巡鵬具疏諫止轉本部郎乞歸養嘉靖初起用補兵部郎陞廣東按察副使監司欲以賄脱二重獄堅執不從自免歸年八十卒鵬博覽羣書尤精理學後祀鄉賢教諭趙蘭溪先生旻趙旻政和人嘉靖中以嵗貢任高安訓導繼擢蘭溪教諭續以年老解組諸生詣學使阮鶚保留鶚曰師徳感人如此耶遂改行祠為書院留講學三載乃歸歸則入受業于湛文簡又二年擴明道學後進從遊甚衆嘉靖壬戌遭倭厲聲罵賊不絶聲閩書舉人楊天游先生應詔楊應詔字邦彦建安人嘗讀書武夷天游峰因號天游山人少時從其祖松宦學祖試叩所欲為應詔言欲盡讀天下好書幹盡天下好事做盡天下好人年二十游庠序謁朱文公祠仰而嘆曰他日不俎豆是非夫也年三十一舉于鄉十上春官不第其時上春官時崑崙山人張詩者見其文稱為司馬子長李太白復生應詔不屑也久之遍遊趙齊魯間卒業南雍得奉常呂涇野柟之學喜其淵源有本遂師事之歸而剏道宗堂華陽山奉祀孔聖并顔曾思孟周程張朱諸賢及涇野其中掲涇野所嘗著教壁間日與叅對年友温陵蔡元偉亦潛心斯道者遂自泉往建相聚砥磨而他諸名公若鄒東廓守益王龍溪畿唐荆川順之魏莊渠校章介菴衮或見而心合或聞而神往也應詔之學以寡慾正心為立本以不愧天為歸的於古今壯猷竒烈忠義慷慨之事崚嶒激發夢寐見之雖沉潛深靜之意少而心懷軒豁殆亦聖門之為狂者所著有閩學源流及困學二録又有五經辨疑四書要義以發聖賢之㫖有衛道録以闢禪有日史以自記子徳輿睦州司訓有士行按明儒學案傳後載有楊天游集閩書文愍李時言先生黙李黙字時言甌寧人正徳十六年進士選翰林庶吉士明年嘉靖改元修迎立功欲倣成祖封尚書茹瑺故事擬執政封爵黙上執政書規之改戸部主事陞兵部貟外郎差閲大同軍士戰馬鎮卒素剽悍動輒嘯呼胡侍郎瓚銜命赴鎮經畧措置乖方卒復譁黙抗疏請亟易帥變遂定調入吏部文選陞騐封郎中議復開國勲臣誠意伯暨常李湯鄧四氏爵䕃真人邵元和以符術方貴幸請封誥黙奏勿予朝論韙之兩與文武會試得葛守禮陸炳等多知名士當武試畢時就兵部宴因辨論賔禮位次忤兵部尚書王憲憲疏劾黙坐謫寧國府通判黙雖坐謫顧世宗心是黙所持以此注識之矣黙判寧國周咨隠痒陶範髦俊纂修郡乗建靖難死亡陳尚書祠精心受事不厭薄官守陞廣東僉事主屯鹽二政陞雲南副使督學政首經術崇行誼購遺書廣厲學官表賢者墓窮荒僻逺文學嚮風歴浙江㕘政按察使左右布政大都端毅亷直所至有聲久之大臣以公輔器薦起太常卿掌南京國子監祭酒事博士等官得備臺諫選自黙發之陞禮部右侍郎改吏部右侍郎尋轉左庚戌秋燕京戒嚴黙奉㫖守正陽門調營兵五千畫守甚設而奏令開門無困居人敵尋引去陞吏部尚書制冢宰非部長卿有殊望者弗與世宗知黙特以卿貳陟異數也嚴嵩當事前此吏部率以疑事嘗嵩嵩得從容持之黙處置堅決莫能短長奏輒報可無有留端為嵩地者遂與嵩郤久之遼東巡撫缺黙推張布政臬臬雖嵩鄉人而素疎上偶問嵩嵩遂力言不任上怒而先是咸寧侯鸞以干請不售為密書疑上上遂罷黙黙歸明年鸞以逆誅會吏部尚書員缺御批特令黙復職召直無逸殿許乗馬禁中眷注益隆未幾加太子少保復兼翰林學士方有爰立之命相嵩每阻其進客有諷明哲自保者黙嘆曰吾備位公卿年幾六十尚復何求惟有致身耳屬嵗大計戒門下毋入一賓客即同直大臣亦浹月不相往來相嵩無所得為人地以此滋不悦而先是嵩子世蕃規機利多請託侵官隂執國政黙微諷嵩曰公身許國久墳墓濡降當在夢寐曷不令嗣君一掃展嵩曰然吾將念之久之不遣復為請嵩曰孰令我一子而不長侍膝下乎君數請去何言之亟也黙曰外言籍籍宜暫行以息之嵩忿然作色於是怨黙益深會工部侍郎趙文華當浙直禦寇欲攘功請視師及還報自施勞伐謂本兵在掌握黙不為引大失望乃摭部試䇿題為謗訕而嵩主之誣奏下獄論死始張經赴西市黙頓足嘆人有先告嵩矣又數數於公卿間摧折文華過當至是兩人引繩批根以償其所交惡夙憾黙既得罪踰年從獄中再上書世宗注覽久之縉紳大夫咸知天威漸霽冀其復用而黙溘然卒矣隆慶改元南吏科給事中岑用賓等為黙訟寃詔復太子少保吏部尚書兼翰林學士遣官祭葬萬厯十三年追贈太子太保諡文愍録其孫銓為國子生黙博學任節矜踔奮激言論截烈屢蹈危機骯髒自如至于擘畫經濟揚㩁風雅亹亹乎星貫川沛發為文章淵宏俊達有秦漢之風所著有羣玉樓稿孤樹裒談建安人物傳朱子年譜諸書皆傳于世明史閩書訓導楊孟岳先生松楊松字孟岳甌寧人正徳中貢士授廣州府訓導作人育才時時以禮教諸生學士黄佐為諸生時貧甚松却其贄重遺贈之佐父善星厯人多竒中而松謂之曰子占人多中余以文占汝子亦竒中如子矣佐果以其年魁多士松以母喪歸貧甚莫自存也乃時時自謂宇宙道義塲中不曾饑餓倒人服闋復授廣之香山香山僻在海隅士習樂游衍躭聲利松時時謂之曰陳公甫非汝隣邑偉儒乎彼以一孝亷倡道白沙崛起南服至今江門烟水白龍池之風月揭揭如在同時握鼎鼐持衡樞者今安在也而况如諸生者樂游衍躭聲利哉諸生聞言咸躍然感奮卒于官閩書徐尚徳先生驥徐驥字尚徳浦城人性恬靜日以經史自娯所著有洪範解訂正及皇華詩一卷通志縣令朱孔温先生煊朱煊字孔温文公十世孫少警穎讀書日記數千餘言舉鄉試非公事不履邑門令薛宗鎧嘆曰朱孔温真儒裔也嘉靖初授江西永豐令永豐俗獷狠囂訟煊一鎮以靜間有犯者必懲而婉諭之秩滿乞致仕囊無餘金居家操行醇謹子姓侍立衣冠肅然推官林子順先生命林命字子順建安人嘉靖癸丑進士令溧陽金壇有聲擢諫垣首疏議革冗官復條閩中致寇六事得借留都積帑及閩中屯鹽之賦肆拾萬餘以充軍餉出參楚藩晉廣東亷訪尋有忌者左遷金華推官量移南部遂解組歸命禔身髙潔居常撮集古人嘉言懿行為正氣錄自警歴官十餘年一秉清白而憂國公忠議論封駁不以詞色假人遇公正輒發憤所著有正氣録十卷春秋訂疑十二卷陽溪堂集十六卷閩書侍郎騰汝載先生伯輪騰伯輪字汝載甌寧人令番禺以徳禮道民若嚴師在上不敢一日遊蕩而嬉會兵鼎沸擊太守門諸司揵户避之伯輪出乃不至亂入為吏部郎出督學兩浙聲教整嚴所掄録號得人歴廣東按察使布政使粤人葉春及以儗之先輩仕粤者莆田彭公韶臨海陳公選華容劉公大夏蒼梧呉公廷舉擢都御史操江南京條上江防八事督撫浙江值嵗凶開倉煮粥令材官四出告糴芻粟麕至力疏請改折漕綱停減織造並見報可颶風起海鹽防海塘堤震壞設方畧發帑脩築春汛海上忽島夷集數艅艎將入犯急率諸將擊之捕首虜百事聞恩賚有差頃之遘疾卒訃聞贈兵部左侍郎䕃一子諭祭葬閩書主事呉公度先生立呉中立字公度浦城人舉隆慶辛未進士疏乞歸養父没服闋遂絶意仕進以著述為事結廬武夷山中十有七年越中太史張元忭入山訪之微諷以仕則曰士各有志萬厯十五年南禮部尚書袁洪愈給事中周邦傑巡按御史楊四知表其脩節詔府縣起送赴部辭乞終隠貽相臣書曰昔唐元和進士費冠卿以禄不逮親永懷罔極隠於池陽九華山長慶中御史李行修薦舉冠卿力辭竟許終隠愚願效之吏部復言聖世禮賢首崇恬退必使清節之臣得被寵榮乃可以亷頑立懦風勸士人詔授禮部儀制司主事竢病痊録用後推南寶丞報至中立已逝矣所著有易銓古本學庸大㫖論格物書性氣説諸書閩書縣令楊文鋭先生鏸楊鏸字文鋭建安人繇貢士授靈武知縣事兄銑友愛情切自少至老手不釋卷建安人士多出其門通判黄元泰先生三陽黄三陽字元泰建陽人黄端公之後繇恩貢任安吉州同知罷運儲常例履畝均輸悉心經營兩視州縣篆亷而有惠擢保定判卒于官吉人祀之三陽通易詩禮三經弱冠便開講席從遊千數三經並授他如天文地理隂陽醫卜靡不究心在官邸署蕭然一編自適所著有易禮詩各講義閩書道南源委田仕濟先生汝楫田汝楫字仕濟建安人喜讀書尤攻性理之學每見地上行蟻輒迂跡避之家畜雞豚非祀先奉親待賓不忍耗殺時時出遊山水吟咏嘯傲盡醉而歸子忠閩書巡撫魏禹卿先生濬魏濬字禹卿松溪人萬厯甲辰進士初授户部主事陞郎中出為廣西提學陞江西副使尋乞歸起山東布政司㕘議遷湖廣按察使時黔蜀交訌苗蠻礦徒表裏為患濬諭以徳意礦徒解散焚其巢千七百餘所陞江西左布政擢都察院右僉都御史巡撫湖廣病卒年七十二通志訓導呉世憲先生從周呉從周字世憲甌寧人博學善文以孝友為學使宗臣所稱萬厯中應貢廷試第一訓導海鹽與友生商𣙜今古致仕杜門所著有石匏集史辨書疑四卷教授李去華先生韡李韡字去華崇安人天啓貢士崇禎壬午試南雍第一選福州教授棄官閉門謝人事著易導史略若干卷閩中理學淵源考卷八十六
