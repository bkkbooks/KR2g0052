  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0052_WYG_026-1a, image: WYG0460/WYG0460-0332a.png}
body:
  text: 閩中理學淵源考卷二十六廣平府知府李清馥撰文肅黃勉齋先生幹學𣲖慈溪黃氏震曰乾淳之盛晦菴南軒東萊稱三先生獨晦菴得年最髙講學最久為集大成晦菴既沒門人如閩中則潘謙之楊志仁林正卿林子武李守約李公晦江西則甘吉父黃去私張元德江東則李敬子胡伯量蔡元思浙中則葉味道潘子善黃子洪皆號髙弟獨勉齋先生強毅自立足任負荷又勿軒熊氏禾撰考亭書院記云公祠以文肅黃氏幹配舊典也從以文節蔡氏元定文簡劉氏爚文忠真氏德秀建安武夷例也我文公體用之學黃氏其庶幾乎餘皆守公之道不二又貢氏師泰撰勉齋先生書院記曰文公門人弟子聰明卓越固不為少然求其始終不渝老而彌篤者先生一人而已先生因劉子澄一拜文公於屏山之後既慨然以斯道自任又曰聖賢墜緒非文公無以明文公遺書非先生無以成則斯文吾道確乎其有所歸矣又先生嘗曰年來學者但見古人有格物窮理之説便馳心於辨析講論之間而不務持養省察之實所以辨析講論者又不原切問近思之意天之所以與我與我之所以全乎天者大本大原漫不加省而尋行數墨入耳出口以為即此便是學問退而察其胸中之所存與夫應事接物無一不相背馳聖人教人決不若是觀此則文公捐館後諸門徒師法漸訛不但微言既絶而大義亦乖勉齋數言實救當時流弊信乎朱門的傳也考朱子門徒在閩中者二百餘在吳越江右楚黔者亦二百餘惟勉齋黃氏之傳獨逺流及元代在閩如勿軒熊氏石堂陳氏明代虛齋蔡氏剩夫陳氏翠矩周氏皆能衍翼宗派崇守家法要皆謹紫陽勉齋北溪瓜山西山諸遺矩其在今日閩海派别宗風墜緒尤可尋遡論者謂國朝先文貞公之學淵源所漸實鄉國之接武云至金華四子則又勉齋先生一派單傳流及明代如章楓山國朝如陸清獻公皆是餘風所及者馥曽過金華仰止先賢詩云鼓棹歸閩路揚帆過越年澄波來活水佳氣起蒼煙文獻渡江後謂朱吕張講學及金華四子忠良靖難前謂宋文憲諸公只疑學派在猶自隔山川乾隆辛未五月念七日文肅黃勉齋先生幹黃幹字直卿閩縣人父瑀以篤行直道聞為饒州司户歷官侍御史所至有聲父歿先生往見清江劉清之清之奇之曰時學非所以處子也今洛陽正傳則在朱仲晦矣盍往學焉即以書為容見之先生歸白母即日行時方大雪既至見文公晝夜勵學不設榻不解帶倦則微坐一椅或至達曙文公語人曰直卿志堅思苦與之處甚有益嘗詣東萊吕氏以所聞於文公者相質正及廣漢張敬夫亡文公與直卿書曰吾道益孤朋友亦難得十分可指擬者直卿明睿端莊造詣甚篤斯道有望於直卿者不輕後遂以女妻之寧宗即位文公奏授先生將仕郎而銓中授迪功郎監台州酒務丁母憂學者聽講於墓廬文公作竹林精舍成遺以書有他時便可代即講席之語及編禮書獨屬以喪祭二編稿成文公見而喜曰所立規模次第縝密有條理他日取家鄉邦國王朝禮倣此更定之病革以深衣及所著書授之手書與訣曰吾道之托在此文公歿先生持心喪三年畢調監嘉興府石門酒庫遷知臨川縣改調新淦縣差通判安豐軍尋知漢陽軍即於郡治後立周程遊朱四先生祠别為屋以館四方之士以病乞祠主管武夷沖祐觀未幾起知安慶府至則金人犯光山安慶去光山不逺民情震恐先生為守禦計請城於朝不待報下即日興工計田出役法均費省城既完後二年金人破黃州沙窩諸關淮東西皆震獨安慶按堵如故時李珏往維揚視師與偕行幹言金欲以十六縣之衆四月攻浮光侵五關五關失守則蘄黃決不可保蘄黃不保則江南危尚書聞此亦已數日乃不聞有所施行何耶珏不能用厥後光黃蘄失果如其言遂立辭去請祠不已俄再命知安慶不就入廬山訪友人李燔陳宓盤旋玉淵三峽間俯仰文公舊迹講乾坤二卦於白鹿書院山南北之士皆來集未幾召赴行在所奏事除大理寺丞不拜為御史李楠所劾遂罷歸初先生在臨川時金華何伯熭為臨川邑丞令其子基師事焉先生告以必有真實心地刻苦功夫而後可基受命又以其學傳同郡王柏柏傳金履祥履祥傳許謙而道益著學者推原統緒以為文公之世適實皆淵源於先生云先生剛介洪毅於師傳盡心致知之學身體之無遺力當官不避難不憚事撫摩凋瘵如護肢體鋤強暴投機制變與衆絶慮營畫守邊備禦籌閫外事如宿將嘗試也比歸老終窶且貧煙火時不繼蔬食餉客危坐講切徹旦夜編禮著書不輟堅壯之志終老彌勵雖暮齡宿疾未嘗倦怠也當時出朱門號髙弟者至衆獨先生強毅有力足任負荷歸而弟子益進巴蜀江湖之士皆來質疑請益如文公時俄命知潮州辭踰月乞致仕特授承議郎歿後數年以門人請諡特贈朝奉郎與一子下州文學諡文肅學者稱勉齋先生貢氏師泰曰南渡後文公集諸儒之大成於時門人弟子聰明卓越固為不少然求其始終不渝老而彌篤者先生一人而已蓋先生有意斯文以陸沈下官不能大行其學固可深慨然聖賢墜緒非文公無以明文公遺書非先生無以成則斯文吾道確乎其有所歸矣先生歿其傳之著者在閩則宓齋陳氏信齋楊氏在浙則北山何氏江以西則臨川黃氏江以東則雙峰饒氏其久而益著者則西山真氏衍義諸書凡今經幃進講成均典教皆出先生講論之餘云所著書説十卷六經講義三十卷禮記集注十四卷論語通釋十卷論語意原一卷及勉齋集行世兄東字仁卿見上文公學派閩書史名儒傳正理學宗傳宋理學宗貢氏勉齋書院記侍郎黃子敬先生師雍黃師雍字子敬閩清人少從黃勉齋學寶慶二年進士為楚州官屬時李全反狀已露師雍密結忠義軍别部都統時青圖之謀泄青被殺時雍不為動秩滿朝議賢之師雍恥出史彌逺門不往見之調婺州教授學政一以吕祖謙為法慕徐僑有清望欲謁之會僑有召命則不往僑聞賢之至闕以其學最聞而李宗勉趙必願趙汝談等亦先後交薦丞相喬行簡許以朝除矣師雍入見勸其歸老行簡不説遂出知龍溪行簡罷史嵩之繼相遷糧料科延至私室謂曰糧料科密邇相府所以處君師雍不顧故與博士劉應起相善應起論嵩之嵩之疑師雍左右之諷御史梅把彈師雍差知邵武久之遷宗正簿拜監察御史論嵩之罷之理宗欲以師雍為侍御史丞相鄭清之沮之曰如此則臣不可留遷起居舍人兼侍講即力乞去清之猶冀其少貶師雍曰吾欲為全人終不屈數月卒被劾罷久之以直寶文閣奉祀起為左史改江西轉運使遷禮部侍郎命下卒於江西官舍師雍為人簡淡寡欲靖厚有守言若不出口而於邪正之辨甚明視外物輕甚故博採公論當官而行愛護名節無愧師友云閩書宋史通志提管鄭中實先生鼎新鄭鼎新字中實仙遊人嘉定十六年進士知晉江縣建問政堂輯論語繫於政者二十四章書之堂壁建縣學文宣王廟闢一堂扁以尊道時真西山守泉殊敬重之尋通判處州監右藏東庫遷國子書庫授都大提管卒鼎新少受業黃勉齋之門問答甚詳而與楊信齋遊嘗考究禮書成編名曰禮學舉要又撰禮樂從宜集居家好義有家孰義莊西山真氏嘗為之記其卒也遺命治喪一以儀禮從事閩書仙遊志教授陳日昭先生如晦子覺伯陳如晦字日昭長樂人從黃勉齋遊嘗讀西山真氏夜氣針作曰須見得冬為四時之夜夜乃一日之冬便是自家嚮晦入息處又見得造化發育之妙便是自家事物周旋處於此敬義夾持動靜交養則兩得之矣遂次其韻為生意針西山得之亟加稱賞一時耆德巨公樂與為道誼交以趙汝騰薦充經筵不果授本州教授卒所著有論語問答及講義文集子覺伯字宗尹咸淳七年進士授泉州教授以古道迪士幼主航海次泉州港覺伯率同列表起居尋命攝州倅扈從入廣拜福建提刑數月罷歸聞崖山師潰憤惋不食且卒命其子曰吾宋臣也題吾墓則係吾於宋閩書提舉李汝明先生鑑李鑑字汝明寧德人嘉定元年進士官終廣東提舉初從黃勉齋楊信齋遊得聞敬義之旨歸與龔剡創六經講社推明師説誘掖後進居官平易近民尤曉兵事嘗督捕贛冦提兵親入梅州界擒陳羅二賊後梅冦猖獗授以州符賊憚鑑威名遁去及蒞廣西值西浙大飢鑑運米千艘全活甚衆閩書葉先生真葉真字未詳三山人經義考林氏耕尚書集解後序曰耕暫攝鄉校學録葉君真里之耆儒嘗從勉齋遊其先世亦從拙齋學與東萊同時又出家藏寫本林李二先生書解及詩説相示較之首尾並同云按耕叟謂葉君真里之耆儒嘗從勉齋遊其先世亦從拙齋學意其人必卓然者且溯其家世學有淵源惜未得紀述可詳姑録其槩待考經義考林氏耕尚書集解後序葉雲叟先生士龍葉士龍號雲叟名與事實籍貫未詳待考按劉後村送葉士龍歸竹林精舍詩曰侍講開甥館三間不至奢少曽居北面老只住東家野筍庖尤美深衣衮未華何時尋舊路去謁玉川茶按此詩後劉公小注云勉齋依文公以居雲叟勉齋髙弟云閩中理學淵源考卷二十六
