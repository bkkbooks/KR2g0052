body:
  text: 閩中理學淵源考卷七十一廣平府知府李清馥撰文節李九我先生廷機學派孟子言君子之澤五世而斬後世率以此而論鄉國汙隆盛衰之運溯其流風餘澤以究人物終始其大致無或爽者明代成化後蔡文莊獨倡宗風隆萬以降學術分判遺澤寖微矣文節私淑鄉先生之教以禮律身以儉範俗其砥礪亷隅猶可以風世也前輩嘗言公和氣盎然無復溪刻一切科名勳業之盛淡若髙禪蕭然數椽中角巾布履不異儒素談及平生事自授徒至直閣進退出處之論詳哉其言之余讀燕居録名臣録家訓諸書仰見典型風節學問源流非僅以茹蘗見長世有謂公刻而隘者豈為確論耶平昔諄諄於薛文清一人其所志所學可想矣余因考彼時風尚波靡而吾郡故老尚有典型也故不禁娓娓述之按公集中與往復相砥勉者有楊氏貫齊文恪黃氏九石諸公為後進楷模貫齊二公已另見餘附交友中待考焉文節李九我先生廷機李廷機字爾張號九我晉江人幼稟氣薄就孰後猶夜啼筋浮睛露鄉父老謂非壽相父母亦憂之然沉靜寡言永日不思睡十歲從黃默堂先生一日以狀元宰相命題破曰名魁天下之選身近天子之光先生喜甚命同學北靣揖之隆慶四年順天鄉薦第一歸讀書永春山中再詣公車張居正延教子不赴戊寅移家授經於毗陵就館座師申時行者二年萬厯十一年會試第一殿試第二人授編修十四年夏持節封趙藩過家置義田贍族人葺先塋葬族人并友人不能葬者纍官宮坊侍皇太子講學每四鼓入長安門寒暑風雨不輟二十四年升祭酒以整齊嚴肅約士曰此髙皇帝之訓今人不守髙皇帝訓輒逺引敷教在寬之文夫所謂寬者乃多方勞來輔翼欲其自得之謂豈以縱弛哉升南京吏部右侍郎署部事二十七年典京察無偏私嘗兼攝户工二部事綜理精密奏行軫恤行户四事商困大蘇外城陵垣多所繕葺他如皇城公署廟祠牌坊橋梁一一修治費皆取節縮公帑竒羡不以煩民或諷以儒臣不宜親俗事曰有俗人無俗事天下國家事何可言俗也時浙人李文政結交近侍廷機告御史置之法改北禮部左侍郎在禮部時妖書事起捕治甚嚴時歸德沈鯉四明沈一貫二相不協會有言楚王假王者江夏郭正域為禮部右侍郎所見復與四明相左江夏訐四明遂成郤江夏引疾去四明之人因借江夏以傾歸德上謂妖書實出江夏手逮訊江夏從人乳媪下多官廷訊五日不决上怒甚詔責會問官有朋友情深君臣義薄之語多官計無所出江夏危甚廷機獨以身保任江夏為之翼護會緹騎緝得皎生光者即以坐之衆在疑信間猶豫未决御史沈裕言於厰璫曰事不决縉紳荼毒矣廷機是御史言生光亦慨然承伏獄上其事後乃决而江夏保無恙署禮部四年立簡易之條以便宗室减外貢入京人數以省邊傳飭殿試之規以間進士定殿試之期以便歲貢創屋以居官施衲以活凍宗藩有所訴請立為明白遂不至賄求胥吏請托中官諸宗德之為立生祠四區上雅重廷機三十二年朝覲之期上於禁中謂左右曰此時京官不忙惟趙世卿李廷機不與外吏相接也褒以忠慎恭勤三十五年以禮部尚書兼東閣大學士入參機務廷機三辭始受命謝恩疏言人臣惟知有主茍可自致於主者無不盡有益於主者無不為不知有身不知有家不知有交遊往來不知有毁譽得喪必無一念不可與主知必無一事不可對主言以是內省有不可則止之訓焉在事九月言者蜂涌遂决意求退上屢詔勉留且遣鴻臚卿及同官宣諭趣出堅臥不起待命首尾五年乃屏處荒廟廷臣猶有繁言至四十年九月疏已百二十餘上乃陛辭出都待命同官葉向髙言廷機已行不可再挽乃加太子太保賜道里費乘傳以行人護歸四十四年卒年七十五贈少保諡文節廷機繫閣籍六年秉政止九月無大過平生遇事有執尤亷潔自授徒至直閣蕭然數椽中角巾布履不異儒素平居言論動稱古人在詞林惟禮節事體咨前輩至行已居官則曰擇善而從可也秀才時館於何憲副元述家何自道居官朝參之勤心志之故仕宦三十年不敢以憚勞養安失禮怠事交游餽餉一切辭却第以節約當治生曰羔羊之詩誦大夫節儉正直夫惟節儉正直出焉雅慕清净畫一之理欲朝列之間遵令甲守職掌省議論以奉法循理為先其時士大夫重氣誼尚建白時時軼越所守官而廷機不喜之以此攻之者衆且急卒之清節皎然不可得而誣也自言曰豫在政府九閲月惟主張四川撤兵全活黔蜀生靈省餉運俾安疆臣兄弟不至為播州之續此一事差足報國耳所著有四書臆說春秋講章通鑑性理刪宋賢事略編大明國史國朝名臣言行録燕居録文集二十八卷學者稱九我先生九我者廷機早失父母取蓼莪之章以自號也明名臣言行録序明史八公撰燕居稿新舊郡志閩書蔣備考蔣氏德璟撰燕居録序曰某少時嘗一再見文節李公於家蕭然數椽中角巾布履不異儒素而談平生事自授徒至直閣進退出處之詳及議代藩安邉撫酋諸大政若以璟為可教者已出燕居録性理纂家訓家禮授之最後以宋賢事彚見遺曰此宋前輩事可師法璟心識之而先君子亦數言公為南少宰時署户工諸曹勤於吏職諸曹郎敬畏之核倉庫繕城工歲省金錢數萬計南公卿嘗語公曰公詞林旦晚且相此俗事不足問公曰有俗人無俗事天下國家事何言俗也世或疑公清而隘及余以諸生見則和氣盎然無復溪刻一切科名勳業之盛淡若髙禪其署柱間用前輩語曰見故人而一笑自有餘歡念平生之百為亦無可恨晏裘幾敝白頭辭天子歸與陶徑就荒黃菊待主人久矣蓋璟一再見而恍然得公之深也比璟踵入詞林叨二春官見公所釐次宗藩條例後人奉若蓍龜所購官房十八座可萬餘金皆節裁部羡蠧為之在辟雍亦各購有官房其意欲使官各有居以養其亷而公家數椽即中人産猶不如也身為亷吏而又能節縮浮費以養人之亷其非徒清可知今諸子貧不能供饘粥而耳視者猶以隘疑之不亦異乎公入直才數月自擬薛文清嘗抗疏云臣學瑄足矣及公沒而葉公文忠馳數百里拜墓下省其家無一物歎曰真不愧文清也嗟乎令公而盡其用與文忠相左右當必有不可量者璟既與同鄉刻公集而二雲曾使君復刻公燕居録以授公子計部百菴君璟與計部兄弟遊見其亷靖有公風因序所受知於公者以見前輩下士之誼而凡讀是録者時以一通置之座右其於學亦思過半矣縣令王在雲先生雍王雍字在雲德化人受業李文節以明經宰浙之雲和氷蘖著聞調富沙歸田二十餘年為鄉先生正直不阿邑有利病輒為别白邑侯亦蓍蔡奉之甚為時推重置義租以供宗族祭祀德化邑志郡守李大堂先生雲階李雲階字大堂德化人初負篋從王都易學繼師李文節萬厯二十五年舉北闈授華容令建劉忠宣大夏祠恤黎淳之後各置祀田若干頃剖决寃獄裁抑勢豪無所回撓歷四薦已署部職竟被多口量遷吉安同知郭青螺鄒南臯兩公皆器重之數攝府篆復代𣙜湖關却例金五千餘為窮民償逋賦兩臺交薦以忤當事致仕歸家居課讀立社論文指示不倦有書數種藏于家新郡志邑志通判單巖泉先生輔單輔字巖泉德化人年少力學從李文節游由恩貢任廣東亷州合浦縣清介執法不阿任六年不取合浦一珠遷通判解綬居鄉家無臧獲妻自炊子自傳茶飯供客李文節髙之為舉鄉賢邑志庶子黃九石先生國鼎黃國鼎字敦柱號九石潛之孫萬厯二十六年進士選庶常授編修使封楚藩毫不受遺會島夷謀互市璫髙寀受賄國鼎移書撫軍逐之李文節病臥荒廟中平昔相善之人多引去甚至有排擊自明非黨者國鼎間一日一視或再卒以此中蜚語國鼎不致辨上疏求去歷右春坊右庶子兼侍讀辭歸後六年再召不起卒國鼎溫良雅度外若易與中實難犯好人之善不能庇人之過喜行善事著有易經初進四書質問郡佐黃谷溪先生懋中黃懋中字有及南安人河清之姪萬厯丁丑選貢入成均積資出令粵之封川革除舊規遷學廟復學塘魚租歲給師生秩滿擢判瓊念親老不欲渡海移檄歸養未幾父訃至服闋補蘇州判掌織造鹽局一切常例毫不茍取署吳縣釋久繫寃獄三載報政堅意乞休兩臺登之薦剡不為少挽歸家鍵户著書有司至厚者弗干以私自號谷溪子初年與蘇紫溪李文節溫晦吾柯立臺劉國徵為文字交氣意相勵年九十三卒封川士民祀之名宦焉李文節先生序其文徵私志曰黃君有及與余為文字交有年辛亥余自內閣賜歸君時過余山莊相與談往事嘗欲借國朝實録觀之豫謂君且負良史才何不取郡邑志雌黃之以憲今啓後實録不必觀可也越數時君書來謂有所修南安文徵私志蓋邑志久廢姑修之以備野史以其副投余觀之屬余為序云南安邑志文徵私志序閩中理學淵源考卷七十一
