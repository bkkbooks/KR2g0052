body:
  text: 閩中理學淵源考卷四十七廣平府知府李清馥撰隆萬以後諸先生學派前輩嘗言古人罷黜百家獨尊孔氏之旨者欲其道術之一也明之中葉喜新立論詆譏前儒漸趨詭僻士習由是多歧其始蓋由一二聰明才辨之徒厭先儒敬義誠明窮理格物之説樂簡便而畏繩束説者謂其端肇於南宋之季朱子彼時曽痛切言之謂此事實關世變明之末造得無類是乎三山先正如葉氏朝榮翁氏興賢盧氏一誠諸公於波靡俗弊之餘獨屹然為師表指南維持終不墜易之碩果詩之典型蓋近之矣郡守盧誠之先生一誠盧一誠字誠之福清人萬厯八年進士授行人歷遷南京户部郎江右守臣為南昌新建二邑諸改折時邑多貴人莫敢難一誠曰南都根本重地四方多故兵食日增虛廪庾以自弱非計之得力格之白下士大夫俎豆王新建招一誠入社講學謝不往曰吾不能口誦程朱而心叛之也出知潮州毫無染指有黠僚管郡𣙜乾沒多以其餘遺一誠一誠怒斥之臺使知其亷欲并屬以𣙜事一誠曰奈何奪丞倅職無已請為稽核可耳凝操峻行為守郡僅見晚嵗居道山麓有朱子石室清隱齋杜門謝客手著四書講述學者奉為指南云通志委道南源副使鄧汝髙先生原嶽鄧原嶽字汝髙閩縣人萬厯二十年進士由户部郎出督滇學升湖廣恭議晉副使卒原嶽巖巖嶽嶽所至以強直稱在滇時稅璫虐𦦨縱爪牙笞辱諸生原嶽捕治之囊以三木璫遜謝乃解葉向髙銘原嶽墓稱閩自國初林子羽王孟敡輩以詩名號十才子其後則有鄭吏部繼之吏部殁絶響矣年來才士蔚起復修明其業而鄧公為之鼓舞其間風雅大振云閩書通志員外郎王永啓先生宇王宇字永啓閩縣人萬厯三十八年進士歷南兵部武選員外郎嘗有德於南部武辨衆建祠雨花臺祀之後擢山東督學參議又轉北户部員外郎著有詩文集及經書説行世王穆仲先生夢谼王夢谼字穆仲古田人鄉舉不第試太學補第一聚徒鄉校學者師之閩書貢士李士殷先生仕黼李仕黼字士殷長樂人表望學校四方名士多出其門家貧却諸生贄禮教人以孝弟修身為本兄弟四人養葬父母皆出其手著五經纂要及貢而卒閩書陳五雲先生名世陳名世字五雲福清諸生母林患脾痛號呼不堪名世嚙指分痛至老左手兩甲猶脫娶王氏奩厚名世承母志分給兄弟之貧者父母卒哀毁幾失明終身孺慕不衰所著有雜記二十四卷禮記彚二百餘卷卒年七十四通志推官林稚虛先生茂槐林茂槐字稚虛福清人萬厯二十三年進士授梧州推官治有異迹著有音韻訂訛字學書考四書經史決疑等書通志侍郎董崇相先生應舉董應舉字崇相閩縣人萬厯二十六年進士初任廣州教授稅璫李鳯恃威寵欲得學宫間地馳射應舉率諸生羣斥之璫氣奪又禁璫繫馬宫牆召為南博士轉南吏部改北敡歷四司所舉髙攀龍鄭三俊劉宗周等皆得召用遷太常少卿疏請安插流民開墾屯田詔拜都察院右副都御史奉命至天津買荒葦地開屯自涿州武清寶坻保定青縣三河延袤千里所屯種一十八萬畝有竒募人開河治閘以便海道嵗兑運四萬八千三百餘石復請葛估屯兵以所入抵餉無轉輸和糴之費書數十上皆得旨崔魏忌之目為黨人因格其議以所屯𨽻州縣遂無成功復遷户部侍郎督理錢法條陳鑿鑿為附璫者誣奏奪職居鄉建築附海城堡及疏水利修學校置社倉義田議官糴嚴海禁論澳課皆造福桑梓暇與諸生講學老而不倦著有崇相集十七卷卒年八十三通志紀事林行甫先生子勉林子勉字行甫閩縣人萬厯恩貢選長泰訓導教士先實行時亷其貧者周之轉泉州府教授相國李廷機每稱為金玉君子擢益府紀事歸著有易經説四卷蓬草五卷石溪集八卷子應典字儀廷以貢選雲和訓導著有經史要二十卷古今竒觀十卷宦遊草二卷龍門集六卷長孫贄卿善詩文有傳硯堂集三十卷季孫榮芬順治辛卯舉人翰林待詔工詞翰有如蘭稿新福州府志閩中理學淵源考卷四十七
