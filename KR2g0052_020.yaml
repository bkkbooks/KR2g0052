body:
  text: 閩中理學淵源考卷二十廣平府知府李清馥撰朱子建寧門人并交友按宋初楊文公以文章節義倡南方人物之始厥後游廣平胡文定述中州學派之源至朱子遷寓建陽學徒雲集親承指要者蔡氏父子為盛若崇安建陽劉氏一門忠節彪炳儒術尤章至末造西山真氏補苴張皇其登第之年皆在慶元之代時學禁方嚴未及門牆後與詹元善蔡節齊諸公互相往復殆私淑諸人者與通判葉晦叔先生文炳葉文炳字晦叔建安人舉進士調晉江簿遲次家居致書請益於朱文公及至官文公告以居官臨民之法時顔師魯為守事多咨之決汀州境上豪民相仇敵帥張忠定選官撫諭衆皆憚行文炳獨請往既至折之以理諸豪皆伏再攝獄攝舶拒絶苞苴不遷就公卿貴人請師魯以與徐誼陳傅良並舉於朝秩滿調劍浦令改閩縣丞未上服母喪既闋調筠州録參前後兩太守寬嚴不同文炳視其所偏資助之嘗言獄事至重當顧理是非不敢徇喜怒獄有巨援文炳爭守入之守有所欲入文炳故緩其事待其自覺露既前後守多愧以服邊事作調兵於州營卒憚行頗洶洶文炳諭以國家豢養厚恩使奮前戮力復白州優賞之皆聽命改秩知仙遊決纍年滯訟出死獄增廩養士像故相葉正簡公於學富室有不便民者纍政不能奪聞部使者窮治之差役久為平民害勸立義役均産通差故例建工役責之僧剎文炳絲毫無所敷配每與同官語曰貪汚自多欲尚侈始小官俸廩幾何百爾皆欲如意不受賂安從得清心寡欲正本澄源乃吾儒功用秩滿造朝會有㫖許曽作縣人言事文炳條便宜三事以獻通判和州將之官服父喪尋卒閩書縣令范伯崇先生念德范念德字伯崇建安人如圭之子娶劉聘君女與文公之配兄弟也初簿廬陵不小其官遇事無所茍遂以幹敏聞就辟吉州從事廬陵民素嚚訟念德致中求情廉勤逮於下悃惻伸於上於是小寃必白奸無幸免因葺其問事之堂榜曰盡心大書噬嗑卦於屏上闢堂後為方丈以會文講學而朱文公為之記受學朱門他日侍文公訪張南軒於長沙同登衡嶽多所倡和文公疾革囑其子在與念德黃幹修正禮書拳拳勉學遷朝奉郎江東帥機宜仕終宜黃令道南源委閩書按范伯崇從文公學最早文公與許順之書云將伯崇論語數段呈李先生疑在孝宗隆興以前及門者縣令楊子權先生與立楊與立字子權建安人受業朱文公之門知遂昌縣因家蘭溪學者宗之稱船山先生所輯有朱子語略二十卷閩書教授李伯諫先生宗思李宗思字伯諫建安人從朱子學朱子稱其教深好修篤志問學登隆興元年進士為蘄州教授専以古人為己之學教人道南源委童蜚卿先生伯羽童伯羽字蜚卿甌寧人沈默寡言好讀書詣雲谷師事朱文公充然有得時學禁方厲遂不求仕進創樓讀書其中文公嘗造訪之名其樓曰醉經堂曰敬義由是伯羽以道自任日以敬義之道化行鄉里趨向彌衆時人以敬義先生稱之所著有四書集成學經衍義羣訓解晦菴語録閩書考亭淵源録縣令葉子是先生湜葉湜字子是甌寧人舉進士以父任調新化簿遭母喪服闋從江淮宣司辟以論軍事不合去尉贑之寧都改承事郎丞惠安縣時守泉者真文忠公文公嘗言僚佐之賢者數人而湜與昭武李方子公晦其最公晦學邃氣平本經術明世用子是堅强介直遇事無難意處劇無倦容他人所不能為與所不敢為者吾盡舉屬之二人徑易不同同歸於是文忠既得二人之助二人亦相得甚歡也湜仕終安仁令壯嵗遊朱文公之門得直養之說故其為人磊落明白無所回𨼆每自謂生平與賔客言者皆可語妻子學士劉圻夫先生子寰劉子寰字圻夫建陽人嘉定十年進士蚤登文公之門能詩文與同邑劉清父齊名官至觀文殿學士自號篁㟳翁劉克莊為序其集閩書道南源委進士劉叔通先生淮劉淮字叔通建陽人紹興二年進士博學能文為詩不事雕刻纂組而平易從容最有餘味朱子嘗當風雪寒夜擁爐讀淮詩而跋之曰豫見叔通詩多矣獨不見此卷豈豫所好者乃叔通大不得意者耶吳稚作感秋詩初發深省其末寄意欲逃之麴蘗之間淮以碩果不食者勵之朱子曰如叔通可謂得朋友之職矣道南源委主簿熊先生以寧熊以寧建陽人少從文公遊舉進士授光澤簿剛直正大一介不妄取豫嘗曰學顔子之學志伊尹之志分內事也有大學釋義中庸續說行世閩書丘子服先生膺丘膺字子服從朱文公遊稱為老友吟句多佳輒酬和之時與往返論辨蔡元定謫舂陵膺載俎逺郊涕泣而别羣儕皆為感動閩書進士陳仲明先生旦陳旦字仲明建陽人登進士與朱文公同榜嘗偕張敬夫從文公游未幾夭喪文公志其祖徽猷公墓深慨惜之閩書宣教郎周居晦先生明仲弟明作周明仲字居晦建陽人官宣教郎常平使者宋若水聞其風節以魏元履所立長灘社倉事屬之明仲力為振葺兼朱子夏貸冬斂收息什二之法三年所收溢於元額弟明作字元興亦從朱子學著有壬子問答語録通志州牧馬次辛先生壬仲馬壬仲字次辛本建陽人從朱子遊擢紹熙元年進士乙科寓東陽遂為東陽人歷仕州縣以廉能稱嘗知古郢撫循兵民捍禦邊寇郡賴以安尋上祠請歸壬仲議論典型詩章閒雅所著有得齊集孫世穎世綸皆以壬仲恩入仕通志推官吳溫父先生居仁吳居仁字溫父父睿知侯官縣有廉聲居仁以特科歷古田尉攸縣丞融州節度推官所至以儒飾吏聽訟必以人倫大誼斷曲直部使者下其所斷為州縣式居官奉法無妄取朱文公稱為真廉吏吳和中先生稚一作吳權字仲和未知是兩人否待考吳稚字和中一作仲建陽人從朱子遊所著有朱子問答朱子卜居考亭鄉人作聚星亭欲畫荀陳遺事於屏無從得本稚考究車服制度時稱博雅州牧吕秀克先生勝已吕勝已字秀克其先建陽人父尚書址死義敕葬邵武因家焉從張南軒朱子講道朱子為和東堂九詠詩工𨽻書得漢法仕湖南幹官歷倅江州知杭州官至朝請大夫自號渭川居士道南源委進士魏孝伯先生應仲魏應仲字孝伯建陽人元履之子舉進士文公貽之書勉其力學以副親庭責望之意因教以起居坐立出入步趨處己待人魏元夀先生椿魏椿字元夀建陽人從朱子游有戊申語録黃德美先生卓黃卓字德美建陽人博學工文尤長於詩嘗與朱文公遊時稱騷壇元白閩書縣尉陳朝瑞先生總龜陳總龜字朝瑞建陽人居與朱文公鄰壯老相從文公嘗與書勉之問答不下百餘章登紹熙四年進士授永豐尉未赴卒著論語解大學儒行編道南源委閩書縣令江德功先生默江默字德功崇安人祖灝歷知郴象二州郡民繪像祠之以廉吏薦進朝散大夫默登乾道五年進士調安溪尉丁外艱歸詣武夷從朱子講學因攜所著易訓解四書訓誥以質朱子曰此先聖未發精奧也每以一意經史無他嗜好德行君子稱之嘗輯本朝典故撰為綱策上於朝略云伊尹告太甲上述成湯之事周公弼成王近陳文武之模敢獻一得之愚用衍萬年之慶孝宗降璽褒美賜緋魚袋後歷宰光澤建寧皆有異政卒於官邑人祠之弟㸃為郢州録參有聲從子塤見真西山學派道南源委監院詹景憲先生淵詹淵字景憲崇安人朱子門人慶元進士授臨江戶掾江西俗囂於案牘有數十年不決者淵一閲皆得其情凡所豫奪人皆無異論部使者知其才檄致幕下監行在車輅院真西山志其墓通志縣丞陳朝弼先生範陳範字朝弼崇安人從朱文公學舉嘉定進士調婺源尉有大辟疑讞範察其不當死令佐受賕文致之範以去就力爭焉後發覺令佐坐削人服其明秩滿調崇仁丞縣令羅必元豫章先生後也日與講論政化大行一日疾作曰不可尸素解官歸道南委源淵源録閩書考亭丁復之先生堯丁堯字復之崇安人篤厚慈良有志為己之學從文公遊而與蔡季通友善早卒文公記其墓考亭淵源録楊子昂先生驤楊驤字子昂崇安人從學文公有己酉甲寅問答族弟道夫楊與立先生黼楊黼字與立崇安人楊仲思先生道夫子若海楊道夫字仲思崇安人與從兄與立子昂同時受學於朱子朱子答書云所論仁字大意得之更宜仔細玩味就實加功子若海游文公之門有語録文修葉先生味道葉味道初名賀以字行更名知道其先括蒼人後居建陽與弟任道俱師事朱子試禮部第一僞學禁行味道對䇿率本程氏知舉胡紘曰必僞徒也遂落第復從朱子於武夷山學禁開登嘉定庚辰進士除鄂州教授理宗訪問朱子門人所及著書部使者以味道聞差主管三省架閣文字遷宗學輪對言人主務學天下之福也必堅志氣以守之謹幾微以驗之正綱常以勵之用忠言以充之至口奏又述帝王傳心之要與四代作歌作銘之㫖授太學博士兼崇政殿說書故事說書之職止講通鑑味道請先論語從之帝忽問鬼神疑伯有之事涉誕味道對曰伯有得罪而死其氣不散為妖為厲國人為之不寧子産立子泄以奉其後寧神之義也三京用師廷臣邊閫交進機會之說味道言開邊浸濶應援倍難科配日繁餽餉日迫民不堪命龎勳黃巢之禍立見時稱見微慮逺凡經筵奏事無不開導引翼求切君身推致於治道遷祕書著作郎卒帝聞訃震悼出內帑銀帛賻喪諡文修升一官故事未有也與蔡仲默黃惠卿劉韜仲童伯羽真西山張洽諸君子友善著有四書說大學講義易會通祭法宗廟廟享郊社外傳經筵口奏故事講義子采見蔡節齊學派道南源委迪功郎祝和甫先生穆祝穆字和甫其先新安人曽祖確名士朱文公外祖也父康國始從文公居崇安穆少名丙與弟癸同事文公遂以儒名性溫行醇文章富贍常著事文類聚方輿勝覽諸司宰執程元鳳蔡杭薦其賢兼録所著書以進除迪功郎子洙山長祝先生洙祝洙景定中為興化軍涵江書院山長舊在家庭講論精密比來涵江闡揚師訓發明經㫖知軍徐直諒薦其學行於朝方欲擢用拂袖歸閩書范益之先生元裕汜元裕字益之游和之先生倪游倪字和之從文公游著有癸丑問答曹先生晉叔曹晉叔從文公遊閩書王先生春卿王春卿按朱子文集卷七有山北紀行詩自注同行諸人有建安王朝春卿疑即此公李秉文先生德之李德之字秉文劉先生子晉劉子晉劉先生定夫劉定夫劉先生叔文劉叔文劉先生季文劉季文劉先生確劉確劉先生淳叟劉淳叟魏元作先生恪魏恪字元作劉先生瑾劉瑾建陽劉先生子禮劉子禮江先生文卿江文卿主簿吳公濟先生楫吳楫字公濟崇安人幼自雄其才謂功名可立取紹興末試鄉省不第遂主盟林壑絶心仕進與朱文公吳郁研窮理學嘗言逐日應接事物之中須得一時寧靜以養精神要使事愈繁而心愈暇彼不足而我有餘文公遣子師事之晚年以特恩調桂林簿閩書詹勝甫先生錙詹錙字勝甫崇安人恬於榮利與朱文公蔡元定江必大諸賢講伊洛之學築涌翠亭聚書千餘卷吟咏其間丘道濟先生義丘義字道濟建陽人隱居不仕與朱子友善所著有易說論語纂訓傳於世從弟膺從朱子學已見上參議劉明逺先生如愚劉如愚字明逺崇安人有才幹善屬文尤善吟咏居鄉日與朱子唱酬從子珙與同登第調海鹽尉終江西帥司參議官建寧郡志劉嶽卿先生甫劉甫字嶽卿崇安人衡子事親至孝武夷山北有水簾洞其棲隱處也劉珙將奏以官甫不願朱子與蔡季通每過其廬惟相與講義理不及利祿嘗約朱子結廬武夷未幾卒朱子有詩挽之建寧郡志閩中理學淵源考卷二十
