body:
  text: 閩中理學淵源考卷七十七廣平府知府李清馥撰萬厯以後諸先生學派按隆萬後吾鄉宿望老成接踵相起惟時學術分離鄉前輩尤守舊榘界限甚嚴其扶樹世教底柱狂瀾諸家集中可證也間嘗考當時所推者如黄氏文簡李氏文節之清脩碩學王氏恭質詹氏咫亭家太常心湖之謇諤孤忠王氏尹卿楊氏貫齋弟文恪之貞規實踐蘇氏紫溪何氏鏡山之紹述前脩李氏序齋郭氏恭定之建白忠懇黄氏毅菴黄氏襄恵之清毅有執蔡氏清憲林氏文穆之負荷大節外此若蘇石水之風猷吕天池之守正王慕蓼莊梅谷之砥節楊日燦劉台巖之家學王三揆朱敬所林甫任陳欲潤之儒修林省菴之夙望鄭孩如蘇子白莊九微之治經黄季􅌢林素菴之講席王忠孝盧若騰何九雲李光龍紀文疇陳履貞等諸公之志節稽其出處本末升沉顯晦各成所學所守而流風餘範卓然可以待質後世據其跡而論其心盖人物是非必百年論定一代川嶽英靈之萃亦於是而可徵矣諸公未能備採爰輯其師友所訂述載於篇其在隆慶間及家學學派者已於前編詳云同知鄭孩如先生維嶽鄭維嶽字申甫别號孩如南安人萬厯丙子經魁銓遂昌教轉五河知縣立方田法濬淮河督役平均陞曲靖府同知以母老歸養維嶽究心聖學兼通禪理每講經論辨無窮又於天文樂律無不究心有知新録四書正脈易經宻義意言禮記解諸書閩書南安邑志襄惠黄鍾梅先生克瓚黄克瓉字紹夫號鍾梅晉江人萬厯八年進士授夀春知州擢刑部郎累官山東布政陞巡撫時税礦病民抗疏極論并劾税監陳増馬堂不法事嚴治其黨蝗旱為災復疏發帑賑濟蠲額外税銀十餘萬陞南户部尚書召理京營戎政改刑部受神光兩朝顧命李選侍移宫克瓉疏論内侍王永福等八人盜案光宗謂其偏庇李氏怒責之乞休不許天啟元年冬加太子太保明年復以兵部尚書協理戎政廷議紅九克瓉述進藥始末力為辨析持議與争三案者異攻擊紛起自是創要典者率推附之屢疏移疾加太子太傅以歸四年魏忠賢盡逐東林召為工部尚書視事數月與忠賢忤復引疾歸三殿成加太子太師崇禎初以薦起南吏部尚書尋致仕歸卒諡襄恵著有數馬集杞憂疏藁百氏繩愆性理集解春秋輯要諸書按黄之先有為宋學士者崖門之難去妻子於海門居焉人號沙堤黄氏有山曰梅林山故公别號曰鍾梅云子道敬户部員外郎道爵刑部郎中嘗劾巡撫熊文燦及弁將趙庭貪懦狀黄公道周稱之著有麗矚亭集姪道瞻有風節道㫤癸未進士雍正九年郡志王氏志道撰墓志明史州守楊日燦先生啟新楊啟新字日燦晉江人萬厯十七年舉人授海門令左遷東筦丞量移武宣令遷左州守卒於官啟新循循朴謹不求人知歴官五載布衣蔬食沒㡬無以殮漢吏悃幅無華庶㡬近之左人祀之名宦著有易經講義子瞿崍丁未進士官至江西副使著有易經疑叢栖霞山人石室藁黄華讀藁二東藁朱敬所先生一泮朱一泮字達宗晉江人生而恂遜嚴重和易齓嵗稱孤既數年得其尊甫手書叢籍中悲涕不止感動家人稍長事母盡孝晚節母氏病風先生晝夜起居不怠志養無方母歿哀毁過當素髪夕改祭奠之日精潔必芬式厥禮儀子性晜弟遵而化之先生少受經書邃於春秋旁通諸經子史厭應舉俗學設帳授徒尊尚誠敬衣冠危坐靡間寒暑雖屋漏之中了無岸幘跛倚之態康莊坦逵肅恭矩步及至曲巷旁途亦紆轉方正不斜側取㨗跡先生平生非禮之事不接於目近利之行不邇諸躬從先生學者儼然尊崇雖至白首貴倨猶憚畏如一日先生之言曰一誠也主一敬也繇敬入誠四勿是也又曰道正氣也精神私氣也吾儒從事於道而葆其精神釋氏第葆精神而已其所攝持亦𩔖於敬遺乎道矣先生以言為塗以行為璽用璽印塗是以學者稱為敬所先生何氏鏡山曰士之不能盡於道者豈非馳慢其外貌哉夫耳目手足人所共見也猶不能矜且攝况夫人所不見之心先民有云繇乎中以應乎外制於外以養其中懿哉斯言先生體之矣先生無麻之蓬不滫之芷卓然自會於聖學而實究之躬行惜乎其名僅止於閭巷吾烏乎敢泯先生哉何鏡山撰本傳文學林志宏先生甫任林甫任字志宏其先燕人元末有諱泰者兄弟皆舉進士為泉州路同知因家泉泰之孫曰觀入明為歸州别駕别駕之孫曰茂森喪妻不娶鄉里多質平焉三傳為甫任之父某以文學為諸生祭酒人稱曰春亭先生甫任幼時動止異凡兒稟學於父父時時稱説古先聖賢有宋諸儒甫任輒欣欣嚮焉弱冠補弟子員以家貧授徒瞿然模範在念繩趨尺步弟子無敢以䙝見遂發憤聖賢之學終日危坐讀書不輟寒暑自六經宋儒以及近世薛胡諸先生所著仰思反求内索外騐以求其是而見諸實踐於是作四面圗纂以自記曰居敬曰立志曰進學曰逺識而曰敬之一字吾持之最堅白刃弗能奪矣夜歸則以日所教者跪正春亭公父子間自為淵源性至孝二親繼沒悲哀慘惻蔬食避内舍者三嵗平生寤寐經籍學問多出自得每念正學精進寡人朋儕中有虚心願質者後進有質美願學者皆樂與誘掖開導其誠意既足動人而光霽又易為親故從逰最盛皆以孝弟忠信為學其言談舉止遇之循然有理者不問知為甫任弟子也年五十三得疾正冠衾而逝所著有詩經翼傳四書管見易録禮録書傳評性理史評及感省集諸編素交友有陳氏欲潤王氏鑄為最善云何司徒撰本傳略遺佚黄季􅌢先生文照黄文照字麗甫同安人參政文炳弟學者稱為季􅌢先生始為諸生數竒遂棄去專性命之學潜心力行自比陳布衣真晟之儔日以談道為事所著有道南一脈孝經仁詮太極圗理學經緯諸書晚又以易學著隠温陵南臺山中嘗出㳺大江以南至雲間訪陳氏繼儒論業大相歡契平生至老手不釋卷性好奬士𩔖遇人有片善必極引重念及朝家宵旰憂勤内外多故疎床敝席不敢自逸見者皆為之興感嘗柬林素菴句云天上有人調玉燭山中許我坐春臺又云四郊多壘懐司馬一籌莫展愧仲連盖憫時念國草茅抱杞憂如此崇禎戊寅南安倉猝之變走者相望富家巨室不知所為照與監司峽江曽櫻講學於筍江出片紙開諭之立散人服其徳化乙酉年九十歸隠故里輪山之北年九十三卒林氏孕昌曰吾郡自紫陽過化以後學脈火傳至蔡文莊師弟薪而楊之近何司徒倡學於泉山家省菴開講於不二又燈而燃之黄氏季􅌢司徒同學友也司徒與閩直指李公先後曽薦於朝未及徵昇文筍江二社奉為北斗先生屏嗜寡慾絶識去智以聖賢之書愉其志以朋友之聚飭其躬枯坐一室著述萬卷八十年來有如一日嘗有取於朱子晚年定論其學以未發為宗其教以躬行為本云同安邑志林素菴先生筍堤集縣令蘇子白先生庚申蘇庚申字子白天啟元年舉人就教易州負笈從學者甚衆遷連山令潔已愛民卒於官連人醵金䕶喪歸著有四書翌箋易經管見雍正九年郡志藩伯潘士鼎先生洙潘洙字士鼎晉江人萬厯戊子鄉薦第一聨第進士教授廬州陞國學博士轉工部主事榷杭州南闗税羨金八千餘悉貯藩庫改吏部歴員外陞郎中時神宗惡吏部諸臣在官在籍盡逐去留者僅四人洙與焉丁外艱服除復補吏部念母假歸久之起為江西㕘政兼理驛傳丁内艱服除補浙江參政備兵嘉湖遷廣西按察陞江西右布政轉廣東左布政卒於官洙涖官所至不妄取一錢家日窘迫終無改悔愛國之誠至沒不衰弟瀾字士觀萬厯甲辰進士授户部主事改兵部歴郎官出為湖廣參政著有文集雍正九年郡志司冦蘇石水先生茂相蘇茂相字宏家號石水晉江人萬厯二十年進士歴户部郎典試貴州調守彰徳遷河南副使尋督學江西晉南尚寳少卿陞太僕正卿晉僉都御史巡撫浙江請修方正學祠厚恤其家詔從之尋丁艱歸以薦人為趙南星所劾天啟五年起為刑部右侍郎改户部總督漕運晉尚書七年秋懐宗立改刑部崇禎元年春回籍尋卒雍正九年郡志清憲蔡遯菴先生復一蔡復一字敬夫號遯菴同安人萬厯二十三年進士弱冠登第疏請歸娶授刑部主事疏劾石星殺平民冒功狀御訊處死中外憚之歴郎署十七年始遷湖廣㕘政分守湖北進按察使右布政使清介自持以疾歸光宗立起故官治兵易州尋遷山西左布政使天啟二年以右副都御史撫治鄖陽嵗大旱布衣素冠自繫於獄遂大雨黔苗為亂貴州巡撫王三善敗沒進復一兵部右侍郎代之喪亡之餘兵食盡絀斗米銀八錢復一勞來撫循人心乃定尋代楊述中總督貴州雲南湖廣軍務兼巡撫貴州賜上方劍便宜從事復一召集諸將吏申嚴紀律前後督師斬馘無算復請敇鄰省諸郡掎角平賊上悉可之因命各省諸鄰郡悉聴復一節制時復一為總督而朱燮元亦以尚書督四川湖廣陜西諸軍以故復一節制不行於境外而復一所遣魯欽等深入四川雲南兵皆不至復一因論事權不専故敗遂自劾罷免聴勘移境上候代復一仍拮据兵事盡瘁不輟竟卒軍中訃聞上嘉其忠勤贈兵部尚書諡清憲任一子官復一好古博學善屬文耿介負大節既歿槖無遺貲有遯菴全集行於世明史雍正九年郡志藩伯王慕蓼先生畿王畿字翼邑號慕蓼晉江人早失怙恃家海東倚依荒郊備嘗困苦塾有書聲壁聴而樂之時輟耕竊讀古人書積久而心靈功深年㡬三十始蔚然黌序間萬厯二十二年鄉薦第一二十六年成進士授餘千令不赴改越州教授遷國子博士轉戸部主事督太倉儲歴吏部出典蜀試遷杭州守濬南湖工竣詔賜金勞之以治行第一召賜宴光禄命督學浙江擢江西參政晉觀察使山西右布政道轉浙江左布政時邉事孔亟兵餉驛騷重以織造之役糜金錢動百萬計屢被嚴㫖督責部推太常卿未下會有劾其餉缺額者遂引疾乞歸畿平生砥節自勵宦㳺二十餘載治行卓然嘗曰國家無輕豢虚餌之爵禄世上無便宜富貴之聖賢二語自奮論學以洛閩為派近世獨服膺薛文清蔡文莊而於王陽明衷其曠論文以韓歐為的近世獨服膺唐應徳王道思而於王元美衷其材故時見之文章議論無非從心性發揮其榘度可為後學步趨即微嬉謔亦且道存吕氏圗南撰樗全集序道晚年友於畿最為得力云無日不晤晤輒憂盛危明惻然於臨深履薄之際而勉我者慕蓼先生云所著有樗全集四書易經解門人施邦曜梓行之當事采譽言特祀瞽宗焉通志蔣雍正九年郡志藁相國撰墓志吕天池撰文集序侍郎吕天池先生圖南吕圗南字爾摶别號天池晉江人萬厯二十六年進士授中書舍人歴禮部郎擢為御史出按粤西浙江尋謝病歸天啟初起為南通政使右參議尋遷左通政使時璫燄方張有監生陸萬齡等請祠璫文廟李映日等請加九錫封王俱嚴駁不上懐宗賜敕有心事皎然守正不阿之語加右都御史旋改南京戸部侍郎總督糧儲會江陵饑軍士聚衆嚻誶變且不測遂抗疏乞留漕糧二十萬石不俟俞㫖便宜給發用是削籍歸家食十餘年築藍水利鄉人頼之嵗時閉影齋居跌宕書史如武榮清溪諸邑志俱與邑侯共脩焉卒年七十有二所著有壁觀堂文集新郡志南安邑志司業莊九微先生竒顯莊竒顯字允元晉江人敏之𤣥孫年十九登萬厯三十四年賢書四十一年進士殿試第二人官至南國子司業三十五而卒著有尚書便覽行世雍正九年郡志文穆林實甫先生釬林釬字實甫同安人萬厯四十四年進士殿試第三人授翰林院編修累官祭酒時璫勢甚張頌徳建祠遍天下一日諸生執呈欲立忠賢像於太學請定判釬曰孔聖師也禮有北面之尊魏公功徳雖盛臣也若並列上座他日主上臨雍謁奠君拜於下臣偃於上於心安乎即稱疾去懐宗即位聞其語嘆曰危行言順君子也召為禮部侍郎拜東閣大學士卒於官諡文穆雍正九年郡志巡撫曾霖寰先生化龍曽化龍字大雲號霖寰晉江人萬厯四十七年進士授臨川令以卓異擢御史崔呈秀惡謝文錦以化龍為所首舉遂出為寧國同知擒斬大盜陞南户部員外丁内艱服除補兵部郎督學廣東衡鑑獨絶所首拔陳學銓葉著謝宗鍹三人先後俱登解首攝海道篆平海寇劉香陞廣西參議士民勒石紀績轉江西副使再轉糧儲道兼巡視漕河擢按察使時有曽鐵面之號後以原銜督江西糧餉丁外艱服除即家起僉都御史巡撫登萊移鎮膠州賊衆十餘萬圍膠督兵固守遣降將擊賊大破之復東昌等二十七州擒偽官二十餘人置法無何闖賊陷京棄官歸卒於家年六十三著有作求堂集雍正九年郡志宰輔蔣八公先生徳璟蔣徳璟字中葆號八公晉江人父光彦江西副使徳璟天啟二年進士選庶常授編修崇禎中歴官少詹事召對陳練兵練將法甚備又上救荒事宜擢禮部右侍郎請徹内操核要典禁伐採濫規止黄冠陪祝太學又請正楊嗣昌聚斂之罪薦侍郎陳子壯顧錫疇祭酒倪元璐等上皆録用壬午廷推閣臣召對言邉臣須久任上問天變何由弭對拯百姓即弭天變近加邉餉千餘萬練餉七百萬民何以堪又増督撫二總兵六副將數十人權不統一何由制勝上然之首輔周延儒常薦徳璟淵博可備顧問文體華贍宜用之代言遂擢徳璟及黄景昉呉甡為禮部尚書兼東閣大學士時延儒甡皆各樹門戸徳璟獨鯁直無所比黄道周召用劉宗周免罪皆其力也開封久被圍自請馳往督戰優詔不允明年進兵備冊凡九邉十六鎮新舊兵食之數及屯鹽民運漕糧馬價悉具復進諸邉撫賞冊及御覽簡明冊上深嘉之諸邉兵馬報戸部者浮兵部者過半耗糧甚多因條十事以責部臣又因召對言文皇設京衛軍四十萬内府軍二十八萬又有班軍十六萬春秋入京操演誠得居重馭輕勢今皆虚冒願脩舊制上不能用甲戌輔臣請行鈔法徳璟力争得免先以軍儲不足嵗給直畿輔山東河南富戸令買豆米百萬輸天津民大困力陳其害上罷之二月上以賊勢漸逼令羣臣會議奏聞都御史李邦華密疏云輔臣知而不敢言翼日上手其疏問何事陳演以少詹事項煜東宫南遷議對上取視黙然徳璟從旁力賛上不答給事中光時亨追論練餉之害徳璟擬㫖向來聚斂小人倡為練餉致民窮禍結悞國良深上不悦詰曰聚斂小人誰也徳璟不敢斥嗣昌以故尚書李待問對上曰朕非聚斂但欲用兵耳徳璟曰所練兵馬何在徒増餉耳且新舊練餉戸部雖并為一州縣追比仍是三餉上震怒責以比友徳璟力辨諸輔臣為申救尚書倪元璐以鈔餉乃户部職自引咎上意稍解明日徳璟具疏引罪旋罷練餉而徳璟竟以三月二日去位給事中汪惟效檢討傅鼎銓等交章乞留不聴徳璟聞山西陷未敢行及知廷臣留已即辭朝移寓外城賊至得亡去丙戌九月卒徳璟熟前代典章及明朝掌故邉塞漕鹽水利刑律莫不究其利弊文章敏贍在詞垣日草二十餘誥勅見者嘆異之明史郡雍正九年志兵備吳竹公先生載鼇呉載鼇字大車號竹公晉江人性至孝母病衣不解帶既卒親負土葬於雒江風雨夜歸有神燈翼之天啟五年成進士逆璫慕其名欲以鼎甲許之不就戊辰入對以忤權貴謫浙臬幕陞金華司李平反寃獄馬文紹等九十餘人嘉湖軍旗之亂以片言諭止之後官至兵備僉事卒於家所著有宙書咫聞十餘種雍正九年郡志主事王愧兩先生忠孝王忠孝字長孺號愧兩恵安人崇禎元年進士授户部主事時朝議輸通津外儲以實京師忠孝督運大通橋催攅有法日輸三萬石會薊督咨部欲得廉慎明決者與共事部推無如忠孝遂提督薊儲監督内官鄧希詔數以難事相窘欲自置兵設餉索倉耗羨忠孝曰升斗皆官物安得耗羨希詔曰餉司能保無額外徵耶忠孝正色曰吾戴吾頭來豈以頭易升斗哉希詔大愠遂拾其未兑濕米疏上之㫖逮下獄及置對抗辭不撓希詔乃羅織成獄以上部堂薊督皆疏言其寃都察院王志道復力為辨上意稍解得削籍遣戌明年希詔所為不法事露論斬忠孝乃得白歸雍正九年郡志掌坊賴宇肩先生垓賴垓字宇肩徳化人崇禎元年進士授平湖令治行為兩浙最召對稱㫖擢翰林院檢討歴右春坊以才名著乞歸養親居近二十年卒雍正九年郡志侍郎陳龍甫先生洪謐陳洪謐字龍甫晉江人宋與桂之裔崇禎四年進士授南户部主事管北新闗盡撤闗防復兑南糧盡塞出入影耗之竇遷員外擢知蘇州蘇賦㡬當天下之半積逋稠叠至即奉削級之命乃下教州縣盡斥諸羨費以充正額終不能逮坐鐫級至盡其聴訟以牒卑訟者令自攝對開誠剖析人皆信服或不欲終訟輒銷牒遣之呉江民變奉檄單車往諭皆羅拜伏罪僅摘為首一人以報流賊薄安慶督撫議撤閶門萬家為防禦計洪謐曰賊必無越江陵趨蘇州之理脱有不虞守請任其咎乃止嘗閲舊牘見倡議毁九學書院為奄祠者擬戌未遣曰罪有大於此者乎趣具獄論死遇童子試與諸生指授題義語温温不啻其父師請嘱不行榜發不限額數務盡能文者而止至今呉士語及猶感涕也恒言天下之亂皆吏不恤民所致故守蘇垂十年一以仁恕為政民號陳母又號陳佛所在肖像祀之本縁賦不遷呉人反以為幸惟恐其去庚辰癸未雙舉卓異第一紀名御屏召赴闕與清亷宴陞山東按察副使備兵登萊未抵任晉太僕寺卿推兵部右侍郎歸卒於家年六十九洪謐學行夙優守蘇循職為一時最與方岳貢齊名晚方大用而未竟其措施云雍正九年郡志給事莊任公先生鼇獻莊鼇獻字任公晉江人崇禎四年進士授庻吉士改兵科給事中上太平十二䇿首在格君心開言路終以折獄用刑謂秦晉蠢動以中州為淵藪必有跋扈釀亂者及今不創禍將靡極又謂畨甲之設本以緝奸盜非以網縉紳中使豈有韜畧何故委以監紀重任語多激切疏入謫浙藩照磨黄公道周贈詩云當年稽首十二策我逺不及莊任公後歸隠葵山廬父墓側以終著有葵山文集雍正九年郡志主事盧牧洲先生若騰盧若騰字牧洲同安人崇禎十三年進士御試召對稱㫖授兵部主事時閣臣楊嗣昌督師湖廣作佛事祈福若騰疏參嗣昌不能討賊止圗佞佛上以新進小臣妄詆元輔嚴㫖切責時論壯之後歸隠海濱卒同時有沈佺期許吉燝俱癸未進士隠居以終通志縣令吳宣伯先生韓起呉韓起字宣伯晉江人崇禎十三年進士授當塗令有恵政文詞古雅海内稱為青嶽先生著有四書易經説雍正九年郡志行人陳喬嶽先生履貞陳履貞字喬嶽晉江人崇禎癸未進士授行人司壯嵗常逰武夷見考亭祠宇傾圮即捐倡脩葺在安平復新朱子書院朝夕禮之惟謹生平孝友凡期功之貧不自贍者悉衣食之同譜稱貸無吝色亦無徳色晚節食貧自適著書課子而外無他與焉雍正九年郡志文學紀先生文疇子許國紀文疇同安人廩生博學有名與子許國並逰黄石齋先生之門稱髙弟著復書史勺等書卒海島許國年二十二舉壬午鄉薦同安邑志孝亷曽弗人先生異撰曽異撰字弗人晉江人移家侯官少孤事母至孝家窶甚嵗飢採薯葉雜糠籺食之妻負畚鋤乾草給爨長史有知其賢欲為地者介然不屑也久為諸生留心經世學詩詭激有竒氣南贑巡撫潘曽紘得王維儉宋史招異撰與徐世溥更定未成而罷崇禎己夘舉於鄉癸未歸卒著有紡綬堂集雍正九年郡志主事林致子先生志逺林志逺字致子同安人年二十六舉于鄉力學博聞勵志弗衰九上公車癸未始成進士授工部主事假歸奉慈幃結茅清溪仙峰嶺稱陶菴先生著有歴代史白年七十二卒雍正九年郡志監丞黄明立先生居中黄居中字明立晉江人萬厯乙酉舉人博通典籍得未見書必手自校録授上海教諭遷南國子監丞僑寓金陵蔵書萬卷年八十餘著書不輟人稱海鶴先生子虞稷有才名國朝康熙己未年以博學宏詞徵雍正九年郡志温陵楊氏家世學派按隆萬間楊貫齋兄弟以篤學姱脩躋顯仕為時碩彦鏡山先生撰貫齋傳稱理學文章庶㡬兼之撰文恪傳稱一代完行名臣盖二公家學一時推重信有道之儒也再考公尊人􅍭山公宦歸而貧其貽謀以光大其家者厥有自矣今撮先輩論述敘其家學著于編布政楊貫齋先生道會楊道會字惟宗號貫齋晉江人隆慶二年進士初令黄巖息訟緩徵歴工部郎擢南户部主事乞省親歸起補原官丁内艱服闋補工部尋榷木南闗張居正授指令伺察不報受督責久之張病六曹堂官皆為設齋祈福大司空出俸金首事道會謂此臣子事君父禮某不敢預聞者為道會懼而江陵相自此不起道會亦未嘗自言出守安慶丁外艱服除知台州黄巖故台治也將至民襁負道迎不絶倭寇不敢犯境遷廣西按察副使與巡撫微不合即投檄歸居二年起為其省提學使者會臬僚多缺悉委署篆兩平猺亂既成功又仰屋嘆曰猺雖平乎吏墨而刻豪蠧而侵此亂本也其可勿問尋遷湖廣參政分守荆南道有香璫久與士大夫為難道會至驚為神人轉布政右使值楚宗獄起諸司尚日夜治楚獄不休道會語左使楚宗始事者已坐罪若株連及人人恐生他變左使乃列上罪狀為數等得㫖施行又語楚撫誅戮之後宜停楚刑一年以示寛楚撫奏上報可道會復時時嘆曰楚氛之起國戚㡬頓牽纒斯長亦因諸公操之太甚令某在事當不其然亡何轉左自親王而下皆具禮待之曰大家巨族且厚本支況天潢乎庚戌因入覲乞歸許之其入覲也李文節時為言者所攻迸居荒廟道會毎過從譚至夜分道會為誦白沙詩茫茫宇宙人無數㡬箇男兒是丈夫以壯其志云道會貞而不諒和而不流生平不齒榮利未嘗一失足權貴人門嘗言理學盡於性理往鑑備于綱目因取性理精言採入程朱全書近思録為性理抄脩史依春秋綱目例纂成自作論賛有史綱節要又有詩禮二鈔周禮詳節四書商求等集蔵於家弟道恒道賔見蘇阜山學派道南源委新郡志林素菴續小學閩書通志文恪楊惟彦先生道賓楊道賔字惟彦晉江人道會從弟萬厯十四年廷試擢及第第二人授翰林院編修累遷國子祭酒少詹事禮部侍郎尚書缺攝篆者久之充經筵日講記注起居累疏乞歸不許奉命有事齋宫禮未成以疾擁還遂没道賔為國子祭酒時疏請東宫行齒胄禮表進三國志五代史論斥閹䜿公貨財以古為鑑詞切而直與諸國子按古射儀行之射圃縣省日之賞以誘勸之以推明髙皇帝建立射圃學宫之意其攝尚書禮部疏陳五事曰葆清明平且之氣以澄聖衷曰召閣部大臣入對以決壅鬰曰復章奏批發之規以尊主權曰慎内批中發之㫖以杜羣疑曰去形跡體面之套以振事功上萬夀節道賔縁華封三祝之意推而衍之請上勵精圗治所以為受天之夀祝命東宫諸王出就傅所以為受天之多男子祝捐爵出禄脩廢官補大僚所以為受天之富祝每遇進講盥頮焚香端坐待旦入視部務退邸舍作春秋通鑑講章隨事發明借古為喻講讀久輟道賔言太子天下本培養宜厚諭教宜勤宋臣程顥有言與近習處久熟便生䙝慢與士大夫處久熟便生敬愛此確論也宜亟渙玉音卜期開講䝉恤諸大臣諡典久闕道賔言國初大臣議祭議葬即與議諡後因請乞紛紜乃令會議𩔖奏今萬厯三十一年以至今日閲五年矣物故大臣其人非一不及此時一為分别將來耆舊不存事跡湮廢揣摩任意毁譽失真豈國家慎重勵世褒賢之大典哉宜下臣部以三年或五年為期博採公論酌擬奏聞著為成規從之道賔起家翰林以至掌部嘗分試禮闈兩主鄉試一主會試所得皆知名賢士居家孝友盡誠與人煦温引已反躬靡有繫吝至乎義所不可事所當為不肯茍為徇巽作箴自警大㫖謂貴常可賤富常可貧須立定根脚我不必是人不必非須剖破藩籬性命為輕名節為重須審度權度名位非求可得禍患非避可免當勘破機闗箴成遂為絶筆時年五十八耳當朝士大夫皆曰楊公達生若是立為請贈諡得贈禮部尚書諡文恪遣使營葬䕶喪恤終之典恩數獨隆閩書舊郡志新郡志洛陽劉氏家世學派按劉公可先生三世樸學古行其仕者皆清徳恬節有名於時而賡台先生尤惓惓家庭訓誡其秉心砥行欲與古人相上下於時會頽靡之日獨世篤謹厚風規以為一時坊表故特録之少卿劉台巖先生𢎞寶劉𢎞寳字公可號台巖晉江人萬厯十四年進士選翰林院庶吉士授户科給事中首上疏勸上御經筵召還直言諸臣而糾大璫之横不法者人以為得大體進工科都給事中察水衡錢數諸令甲所不急一意撙省即中貴人必執誼力争之時江西困陶型三呉困機杼徐淮上下瀕河困墊溺𢎞寳請陶型無徵竒巧機杼宜舒其期河堤亟築亟潰民困版築宜厚其僱直而驅諸罷民佐之責治河大臣折厥衷諸請復故道及請浚七百餘里陸地别通漕皆讕甚宜一切報罷他所論奏平反率𩔖是會科臣序遷視資之後先為内外𢎞寳遜同官自請外補遂出為浙江參政分部台州會有言水被淮泗祖陵者上切責治河大臣部覆波及坐謫潮陽典史以謫籍卒於家後以登極恩贈太常寺少卿𢎞寳清介仁厚蔬糲終身所居不蔽風雨其端榘正範雖夜分盛暑必衣冠與人交毋問少長惻怛至到望之知為有徳君子也嘗手抄薛文清讀書録躬行一稟之在恵潮時訪李見羅楊復所二公相切劘居常逡巡韜抑不露意氣而遇事必言輒復委婉曲盡事情公卿間尤以此多之於是公望蔚然所著有尚書説諫垣遺藁子廷焜雍正九年郡志史文簡先生撰墓志文學劉賡台先生廷焜劉廷焜字子曦號賡台台巖之子有名諸生間餼于庠奉父母至孝友恭于兄弟篤古質慤無一毫流俗之氣其方嚴勤儉出於天性酷嗜書史矻矻孜孜留心古今治亂興亡之大機及聖賢學問經濟可以禆身心捄世務者手記目識無虚日月即之而介久之欵欵中孚如金石其臨事祇慎不敢造次其於敬之一字被服終身以求無愧家學其誡鱗長之言曰汝也當官若稍懈偷從不自愛䕶來也又曰處不競之地避緇染之塗可以讀書可以修身可以承先世之風節又曰爾其請教於老成練士又曰聖人處事每從忠厚戒刻薄兒綜覈甚善吾慮兒之為怨府也又曰儕輩之交宜謙和静定斂蔵鋒鍔吾慮兒處同事自恃直道未能降心相從也又曰京師逰客附聲射利多有窺矙往來宜慎吾子念之又曰弊役衙蠧剪除固當乃吾視吾子若不能頃刻容者發之太驟恐施之過當吾願吾子之審處熟思也又曰少年臨事接物易入輕率恍惚吾子念之凡累言爾爾莫非義方云何司徒撰墓志參議劉孟龍先生鱗長劉鱗長字孟龍晉江人𢎞寳之孫垂髫時受學於何公鏡山萬厯四十七年進士天啟初授工部主事時有臯門及浚湟之役中官馬誠掲開工費三十萬鱗長僅以六千金竣事誠怒欲中以禍會丁外艱服除補街道㕔大璫估保橋運石費四十萬鱗長核用萬金大忤魏璫削職懐宗立起原官司節慎庫以臺省擅行支放事累逮詔獄謫倅毘陵適大宗伯孫公慎行倡學東南鱗長師事焉轉南户部視學兩浙厯官至四川參議時張獻忠破雲南賊黨率衆寇蜀鱗長毅然以恢復為己任屢與賊戰有功復䕫慶等郡會闖賊陷京棄官歸卒于家新郡志閩中理學淵源考卷七十七
