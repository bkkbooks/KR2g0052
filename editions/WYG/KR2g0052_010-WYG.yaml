body:
  text: 閩中理學淵源考卷十廣平府知府李清馥撰海濵四先生學𣲖海濵四先生者忠文陳公襄助教周公希孟祭酒鄭公宏中教授陳公季慈同時倡學於閩者也閩自唐歐陽四門開人文之先海濵四先生繼之先哲嘗述宋初安定徂徠泰山三先生倡學於周程未起之先功不可忘若四先生在閩倡學於楊羅李朱未起之日功亦豈可没哉按楊文靖公撰浦城學記曰國家慶厯中詔天下郡縣立學是時陳先生襄以經術德義為一時儒宗適主縣簿孜孜以教育人材為務又朱子曽言安定胡氏規模雖稍疏然却廣大著實如孫明復春秋雖過當然占得氣象好如陳古靈文字尤好嘗過台州見一豐碑説孔子之道甚佳此亦是時世漸好故此等人出有魯一變氣象其後遂有二先生若當時稍加信重把二先生義理繼之則可以一變而乃為王氏所壊亦是氣數使然觀此則古靈與孫胡諸先生同時羽翼明道而先哲共以儒宗追許之也又按蔣氏垣叙閩學源流曰四先生倡明道學德動朝廷遂召陳季慈為國子直講厥後道南勃興劉修撰藻林文昭之竒黄勉齋幹諸公繼之儒道盛行故吕東萊詩云路逢十客九青衿半是同忩舊弟兄最憶市橋燈火静巷南巷北讀書聲朱子見當時諸儒輩出大書海濵鄒魯四大字扁於西闗譙樓則海濵四先生實操道化之始以丕變舊俗云今備列伊洛諸學𣲖而繼之以宋初海濵四先生者葢溯閩學興廢所自其漸有因尚論啟迪開倡之功其淵源豈可誣哉再按陳氏襄劉氏彞陳氏祥道兄弟闡述經説至今言禮者因之所謂代用其書垂諸國胄者也後之欲擬議陳請經師進於俎豆者似當倣古者樂祖祭於瞽宗之義歟謹述以俟採擇乾隆庚午九月十四日書忠文陳古靈先生襄陳先生襄字述古侯官人少孤自立出逰鄉校與鄭穆周希孟陳烈為友一時學者沉溺彫琢之文所謂知天盡性之説皆迂濶之而莫之講先生與三人者始相與倡之海濵聞者始皆驚笑四人者不為變守之益堅躬行於家達於州閭久之信從者衆由是閩中士人宗之稱為海濵四先生先生舉慶厯二年進士調簿浦城攝令事縣多世族以請托脅持為常先生欲革其俗每聽訟召數黠吏前立私謁者不得發老奸縮手慶厯中詔天下郡縣立學是時先生以經術德義為一時儒宗孜孜以教育人材為務遂繕學舍學成使邑之子弟造焉先生為入學講説不斁士風翕然知河陽縣留意教化時富弼為郡守一見即禮遇之至和二年富公入相首以文學政事薦公召試秘閣校理判祠部出知常州濬導蘇常二州積水之患民害以除郡庠下窄公更為經始晨入其中授諸生經義旁決郡事由是興學造士請顧臨秘校主教事毘陵學者盛於二浙將行閲公帑雜收無名錢輸償無力官逋入為開封府推官鹽鐵判官神宗立奉使契丹以設席小異不即坐契丹移檄疆吏坐出知明州熈寧元年還鄉省松楸是冬被召二年夏到闕遷尚書刑部郎中同脩起居注知諌院改侍御史上殿劄子進誠明説上學校貢舉劄子又論青苗法不便乞貶王安石吕惠卿以謝天下又乞罷韓絳政府以杜大臣争利而進者不聽召試知制誥先生以言不行辭乞補外上惜其去留修起居注復懇辭諭以手詔乃就職安石累擠之上不許踰年擢知制誥尋直學士院益為安石所忌摘其書詔小失出知陳州徙杭州入為樞宻直學士知通進銀臺司兼侍讀判尚書都省元豐三年卒年六十四贈少師諡忠文家居古靈時稱古靈先生先生蒞官所至務興學校講求民生利病在經筵上顧遇甚厚訪以人才舉司馬光吕公著韓維可備心膂不宜久外鄭俠愚直敢言願乞生還又薦范純仁程顥張載蘇軾蘇轍等三十三人上不能盡用葉氏祖洽撰行狀門人孫覺撰墓誌劉氏彞撰先生祠堂記略曰先生於學志在考古以治其性為本事君以建其忠為業始與里人陳烈周希孟鄭穆友善同志於道比仕則彞也又以經術政事更相磨琢而鋭於經綸天下大務尤能受盡言樂聞已過喜於為善而夙夜弗忘者詩與易也故其鈎考皆得姬孔幾微之藴傳注所至弗迨其籓籬矣度量淵廣長於包荒樂於教民其職精於治體其政先於變俗其仁勤於濟衆其交貴於謙光故其出入中外裕裕然弗以進退榮辱動其心焉每曰惟大人為能格君心之非吾徒之事也其講求賢才以永基祚莫若興起學校教之經術用其德行之為要云故常州之學人材輩出世以其功比安定胡公焉其記文元祐八年延平陳了翁先生瓘為之書刋于碑石云所著易講義一卷中庸講義一卷郊廟奉祀禮文三十卷古靈集二十五卷孫宇累官知州曽孫塏官終端明殿學士諡清毅皆有聞於時宋史靈閩書集陳古先生與陸學士説天下士儒惟言泉福建興化諸郡為盛其間中髙第歴顯官福吾天子之民者為不少然而守是土者奉天子詔令外興學養士無如此急也泉之學興久矣養士之資與器莫不備具但未有能舉之者執事之去是邦士儒之望固如何宜舉之也然興學之本要在得士得士之要在於擇守長守長賢則上下服上下服則舉所有之士莫不備至矣某嘗聞州之進士有蔡黄庭楊舒辛維莊覃王實李翼者皆善講説而黄庭維覃尤有行檢黄庭通三傳不善臨幹學事但可講授耳舒有老學然困於貧窮時不能固陳從古葢長者若崔虞臣郭堪陳説者皆有材行文學可使為之長而堪通講郡經吕鑑許蕃柯適柯述柯迪皆雋邁有詞學蕃作事近古有節槩適述迪皆有志於古而勇於道一學之中若盡得此十數人者同居而和相厲以道而執事政有餘閒之時不憚煩勞日往臨之俾有宗主有賢行者尊寵之有才美者長育之有不能招來者以身下之有貧窮難安者以資養之有不能長者以禮退之有不能羣者以義導之有過缺未至者以道厲之有不率教者以法移之如此行之數月則舉郡之士皆必興於學矣賢人事業未必不由此而光大也某之所聞葢得於士大夫間未必盡詳抑猶有不知者尚在執事求而擇之也士患有其道而無其位與其地耳既有其道又得其位與地然而不為之者真可惜也伏惟執事留意焉與福州蔡學士書某聞有道之士不假言辭而後通非有道之士言辭雖亟通而其志愈辱而窮長樂小人父母之邦也太守長民也治其土以保安先人之墳墓而已又為之氓詩曰維桑與梓必恭敬止假使至者絶庸常人茍不一候其起居通其言辭尚為廢禮矧遇執事禮宜如何今反箝口黙黙無一字以通左右豈無説焉竊念古人之相待茍其心相通其道相同雖去之千百年立言行事和合如一况生而同俗學而同道仕而同時哉則其所相待者宜愈昵也夫道者所以冒天下而非私於一身先進之於人與己同道雖往者呼之不與己同道雖來者拒之固不必言而後通不言而後以為不同也至於後進亦然與己同道則合而不求不與己同道雖求而不合亦不必言而後從不言而後為不恭也小人之待執事持此説焉二者又自患乎已之道未有所立非進取之時言之無益兹固弗言皆所以懈執事也方欲引退林壑求其二三友生終始力學以成志其庶幾得朝夕繼見執事為之師資可進而後進焉今兹尚縻於官不得即去言念君子憂心不遑歲晏伏惟起居萬福謹先奉書以聞左右伏冀憐察常州請顧臨祕校主學書某竊以東南之學廢而不振也已久安定先生之去吳興葢十餘年天下學者之興較之當時固已寖盛而東南之士又常倍之然而魁竒特起之才禮樂愷悌之風反不如吳興昔時之盛何也豈非庠序之教所由廢興也歟某之不肖領郡于兹雖不敢以斯道為己任然常患近世之士溺於章句之學而不知先王禮義之大上自王公下逮士人其取人也莫不以善辭章者為能守經行者為迂濶而士之榮辱亦從而應之以是天下之士習非舍是固已塗瞶其耳目而莫之能正矣某自蒞事以來惟日汲汲以興學養士為先務以明經篤行為首選其心如是直將以待夫有志之士焉耳彼州人之子弟與夫四方之學者輕千里而至其亦有望於兹也雖然德薄任重知不足以獨當其責思得先生老成之士為之表率而未能也伏惟足下才足以宰制於人義足以矯厲於時其所為文又有以驚動時人之耳目今將表一學之生徒而教之以德行道藝之術所宜無讓也謹遣諸生躬詣門下以請答周公闢書某前月領書及將公儀詩序其文與韓退之相比甚善甚善續承教命予字曰述古者使之慎取堯舜周孔之作而侈大之甚非余敢當也抑嘗聞字者朋友之職大體有激勸則不敢有辭讓云比辱書勸諭諄誨以古聖人經籍大㫖為之依歸又見吾黨於平生交逰中所補者大近予亦以閒燕之隙觀詩及書以稱道堯舜文武之德而慎簡之自餘三禮書紀綱文章易春秋天人之説猶所未至葢力不足故也予觀唐室若子厚輩皆有名於當時至於韓文公未始以一言稱譽其道者豈非駁而不純者乎自秦漢以來去聖日逺耼周楊墨釋子之説衣被天下故後之習孔子者多聞見則易慎擇之則難自予來居西山窮且病吾道無一相往來獨混然與浮屠居幸望其少過蓋亦難矣足下近以予不助二教者心誠有之亦嘗患今之人不若古故予未易言之前日豫章公來此篤信他道予亦以言排之自時復有書相往來俱以理勝且未嘗屈己之道以從彼之欲此足下知予心所處者如何耳孔子曰攻乎異端斯害也已孟子曰生於其心害於其事作於其事害於其政此之謂也雖然亦豈謂登泰山之髙不測東海之深哉大抵知名教有歸耳昔人有言曰摧枯朽者易為力㧞深根者難為功自唐韓退之擯二氏當時葢六百年有餘矣迨今歴世寖逺枝葉延蔓後復有為退之者雖持獨智豈易為力哉知季甫比日於吾儒有功鄭第晦居菌山抑有逺志冀足下慎而折衷之天其意者將以有為也詩云庶幾夙夜以永終譽在二三故人勉旃足下比眼疾安否盛夏炎燠善自愛某無力書不能多云天台縣孔子廟記皇祐元年孔子聖人之大備者也使得百里之國以為政於天下雖堯舜不可及已為天子者不以有己聽命以治其天下為諸侯者不以有己聽命以治其國則必期月而為東周矣惜乎天民之不遇命也自唐以來天下郡縣始立孔子廟追尊王爵春秋釋奠天子以下皆執弟子禮世以為尊用孔子之道如是豈其然耶生而有盛德於民死以祭禮報之如曰尊用其道則未也天下之文弊久矣自周至於今宜黜浮偽尚忠厚百物或有失職者宜正名王澤或有壅滯者宜任大臣逺近官政或有冗濫者宜能官人賢者以政不賢者以禄教或有未至者宜興學校隆師儒禮或有未脩者宜教民冠昏喪祭樂或有未作者宜考五聲十二律放鄭衛豪傑或有未出者宜㧞賢才舉逸民鰥寡孤獨或有未養者宜弛力舍禁授田以制取財以節民之蠧或有未去者宜黜佛老戎狄之患或有未備者宜足兵孔子之道用必先於此數者夫能立廟以守其祭祀尚無得禮者而况於用乎天台縣有孔子廟不脩縣令石牧之始至歲十月相縣之城南隅大作新廟屋總六十有二楹先樹正殿塑孔子南向左右十哲曽子自餘弟子六十有一人與諸儒傳經者二十有一人皆圖諸壁間皆以其所追爵等降如周之服冕圭璧惟孟軻荀卿楊雄韓愈氏服儒服焉中樹講堂圖古之儒服禮樂之器於其兩壁後又設學舍生師講習咸有位序祭器在西房庖厨在東房周迴門廊環以墻宇又考古器作籩豆簠簋樽罍俎爵之屬十二月廟成明年春秋釋奠入而行禮生徒與事品物如制像圖尊嚴籩俎新嘉神明燕喜人物觀化先兹邑民不識儒學又故廟湫隘與民雜居侮慢不尊至是耳目間覺始有學者嗟乎石君可謂有志矣區區小邑而能為孔子立廟制度以禮春秋以時祀之俾民不忘是己無愧於心如其欲用孔子則天也非力之所能及也天其不欲以斯道覺斯民也則其已矣乎如欲以斯道覺斯民也石君之志其必有遇矣備考忠肅陳氏瑩中詩曰迺翁德望如邱山北斗以南誰可班熈寧天子自㧞擢報君常以人所難忠誠皎皎落諌疏史臣編綴不敢刪當年十語九十用真譽聞隨公議還三十三公半台輔經筵薦墨猶未乾雖然年位俱不極却得千載聲名完薦賢之家門必大來者繩繩知可觀右司諫陳氏公輔䟦云公輔為兒童時聞陳宻學先生名今四十年始遇其長嗣中散來官臨海得公遺文而觀焉方熈寧間新法用事大臣以權利籠取天下士而一時沽榮希進之徒争相傾附公獨忠憤激發忘身許國與君實獻可諸公出力排之公有青苗疏論尤詳知此法一行騷動天下胎禍之端自此始使當時從其言豈復有今日事哉建炎二年九月縣令黄仲實先生頴黄頴字仲實莆田人嘗從陳襄學於毘陵質疑於孫莘老為襄莘老所愛重元祐間舉經明行修不就時天下弗就舉者二人而頴其一適莘老為中丞因哲宗問及條其學行以對詔降袍笏即家起之更三期母促之行始調清溪尉歴知長泰縣劍浦簿郡守方全道以改官薦力辭請畀同列知長泰縣晨興治事日中與諸生講肄有職田穀三百餘石悉與耕民尋權龍溪尉卒二縣士民齎賻金帛其子公坦一無所受公坦舉進士官終通直郎莆田邑志閩書少師傅元通先生楫傅楫字元通仙逰人少自刻勵從孫覺陳襄學襄女妻之治平四年登進士調楊州司户參軍楊守遇僚屬厲甚楫遇事未嘗希守意至捕其從者寘法守内不能平欲以煩劇困之檄攝天長令發摘隱伏姦猾屏跡轉福清丞帥曽鞏知其人與鈞禮歴大谷令則鞏弟布為帥曰是吾兄所重者卒部使交薦改知龍泉孫覺為御史中丞語之曰君盍少留朝廷且用君楫曰仕宦所樂居中者免外臺督責耳今俯首權門與外臺奚擇遂去不顧道除太學博士居四年未嘗一跡大臣門既滿徑赴銓曹楫嘗受知曽鞏及是布方執政薦為太常博士徽宗為端王就學資善堂升楫記室參軍進侍講翊善時官僚多與中人涖事者狎楫獨穆然不可親一府嚴憚之五年不遷鄒浩得罪貶楫以贐行免官徽宗即位召為司封員外郎歴監察御史國子監司業起居郎拜中書舍人曽布自以於楫有汲引恩冀為之用楫持正略無所傾下凡命令有不當用人有未厭悉極論之布大失望徽宗以舊學故多所延訪楫每以遵祖宗法度安静自然為言歸則削稿雖至親莫得而聞他日李清臣勸徽宗清心省事徽宗曰近臣中惟傅楫嘗道此然後人始知其所以啟迪君心者切至如此在朝歲餘見時事寖異竊嘆曰禍始此乎遂上疏丐去以龍圖待制知亳州卒年六十一徽宗念其藩邸舊臣賜絹三百匹子諒友謙受義夫仙逰志閩書助教周公闢先生希孟周先生希孟字公闢侯官人通五經尤䆳於易知州劉䕫曹頴叔蔡襄皆親至學舍質問經義部使相繼論薦詔賜粟帛授將仕郎試國子監四門助教充本州學教授三表力辭不許卒門人曽伉等七百人相與塑像祀之於五福寺所著有易義詩義春秋義雜文等書閩書通志舊三山志侍郎劉道元先生䕫劉䕫字道元崇安人大中祥符八年進士累遷屯田員外郎權侍御史會李昭改製大樂鐘磬䕫奏樂之大本與政化通不當輕易其器願擇博學之士以補卿丞凡四方獻妄説以要進者請一切罷之帝善其言歴三司户部判官直史館知陜西改太常少卿知廣州所至有亷名桂陽盜起䕫以右諫議大夫龍圖閣直學士知漳州兼湖南安撫使初至遣人諭降不從乃舉兵擊敗之境内獲安河北大水民流為盜詔諭京東守備進䕫給事中樞宻直學士以往至即發廪賑饑全活甚衆盜賊衰息上賜書褒諭大臣議欲復河故道䕫極言不可遂罷遷工部侍郎知福州嘗親至周希孟學舍質問經義以户部侍郎致仕歸武夷山嘗遇隱者得養生術蔬食獨居退居一閣家人罕見其面至老手足耳目强明如少壯時不治財産所收私田餘穀以賑鄉里貧人英宗即位改吏部侍郎前數日自作遺表卒年八十三富文定公弼稱其天賦絶識孫公沔稱其進為卿相退為神仙范文正公仲淹稱其髙風孤躅賀監以後一人其見重於名流如此閩書宏閩學源流簡録祭酒鄭閎中先生穆鄭先生穆字閎中侯官人好學深造心仁氣正勇於為義進退容止動依禮經門人從學以千數四冠鄉書遂登皇祐五年進士第主簿夀安召為國子監直講積官太常博士乞納一秩先南郊追封考妣從之改集賢較理求外補通判汾州熈寧三年召為岐王侍講嘉王出閣改諸王侍講府僚闕員御史陳襄請擇人神宗曰如鄭穆德行乃宜左右凡居館閣三十年而在王邸一紀非公事未嘗及執政之門講説有法岐嘉二王咸敬禮焉元豐三年加朝散大夫出知越州奏免鑑湖連年水溢民逋官租萬緡元祐初除直集賢院拜國子祭酒毎諸生請益無間寒暑雖童子必朝服延接以禮送迎諸生皆尊事其經術服其教訓俄兼荆揚二府侍講揚徐二府翊善拜給事中兼祭酒五年除寳文閣待制仍祭酒六年請老提舉洞霄宫公卿大夫各為詩贈行空學出祖汴東門外都人觀者如堵明年卒年七十五子瓘事推官閩書録宏簡州牧余景召先生祖奭余祖奭字景召莆田人初名祖禹唐校書鎬之後未冠補太學生為學官鄭穆范祖禹及同舍生胡安國宗澤所器愛登元符三年進士通判建州鄉人林學淵母老逺倅邠慨然請易之自邠移蘭㑹地大震公私廬舍陷折祖奭若有神䕶置隙地者迺亟拯傷殘活數百人瘞死賑饑恩䘏備至蘭人德之代還主管福建轉運司文字屬葉儂叛挺身諭賊以功轉南恩州海寇卓全髙沿海焚掠祖奭内嚴控制外示間暇賊不敢犯召對指陳時弊忤秦檜意引疾乞祠歸封文安縣開國男祖奭性至孝居母喪廬墓父喪過時猶毁瘠甘露降於塋林者兩月因名其墳菴曰甘露城子武弼武揚莆陽文獻閩書教授陳季慈先生烈陳先生烈字季慈侯官人性孝友居親喪勺飲不入口者五日自壯及老奉事如生學行端飭動據禮文里中賢父兄以訓子弟必舉先生言行示之冠婚喪祭請而後行從學者常數百鄉薦試京師不遇遂絶意仕進仁宗屢詔不起曰吾學未成也公卿郡守鄉老交章稱賢嘉祐中以為本州教授歐陽修司馬光等言於朝右為國子直講皆不就陳襄薦先生心仁氣剛才智篤越學聖人之言而踐其實稽先王之法而適於時博通群經尤明典禮文章淵源浩博肆筆而成求之今日鮮有倫儷安貧力學積四十年著書數萬言未見其止累降召命辭謝不至世以烈為潔身獨行之士非知烈者也烈學師孔孟足興事業伏望陛下以禮特聘賜對清閑使陳二帝三王之術六經四子之要當世之務必有以上稱尊賢重德之舉元祐初部使者復申薦之詔從其尚以宣德郎致仕明年復教授本州在職不受廪俸鄉里遺問絲毫無所納卒年七十六宋史閩書三山劉氏家世學𣲖馬恭敏撰鳳岡劉氏諸賢祠記曰劉氏諸賢祠祀宋名儒劉公彞康夫藻砥礪五先生尚遺其三初議或未之考耶馥按三賢者樂昌令嘉譽迪功郎世南并子玠也再按閩書劉氏之初其先泉人後徙居閩至若虚先生舉進士仕至尚書屯田員外郎知邵武軍有進退大節通五經大要又欲措之脩身治官之用不為空言宜其家學樸茂代有聞人也夫當洛學未開之先彞從胡安定學康夫從周希孟學皆能傳述經㫖根柢道德彬彬乎魯一變之風迨秘閣修撰藻樂昌令嘉譽從羅李逓傳中州𣲖的至孫曽等又出紫陽拙齋勉齋諸公之門信乎家多異才也夫山川炳靈代不世有况乎萃一門之英潛心大業是淑於家庭者淵源有自禀之師訓者啟迪尤深也再按閩書劉氏彞康夫藻三先生屬閩縣劉氏嘉譽世南砥礪子玠五先生屬長樂似分𣲖兩支但恭敏祠記稱諸賢並生一門而巡撫龎惺菴與監察雙江曽竪華表題曰一門道學觀此則諸先生雖分兩𣲖而皆係一族無疑况恭敏屬三山舊獻其撰述似不至差訛故今仍舊記列為家學云尚書郎劉叔揚先生若虚劉若虚字叔揚其先泉人徙居閩縣父甫仕錢吳越鄉閭稱亷孝若虚舉咸平五年進士以大理評事知永嘉縣還上所為文章真宗召試就遷寺丞知温泉縣移通判保定軍再遷太常博士通判洪州改尚書屯田員外郎知邵武軍卒蔡襄銘其墓若虚嚴明有大略通五經大㫖摘其㫖義以為脩身治官之用不茍為利禄學丁謂為宰相私天下士士必歸我乃得進聞若虚名欲屈見之若虚辭不往居家事親親有疾不食酒肉居親側雖大暑中夕必嚴衣冠其莅官敏於决疑静於臨劇初若不更意慮及施下皆當理要守法不貸而民不敢怨子奕异孫康夫姪彞閩書通判劉象伯先生奕劉奕字象伯天聖八年進士歴知滎陽縣慶厯間用兵韓魏公為經略使辟奕鳳翔府判官兵民事劇多倚辦集時連年兵敗民窮奕上書朝廷言兵所以敗民所以窮之狀格不報歴通判漳州潤州漳浦縣有䖍民四百餘人入縣買官所賣鹽令捕之民因鬭拒令遂鞫其私販窮治之其法應死囚久繫瘦殍相屬奕為察其非私販而出其不鬭拒者坐法數十人而已卒於潤州歛無新衣囊無餘貲民集錢二百千以賻奕妻辭郤之奕於文章要以道理為的不茍為聲律其論性情推明孔子之法力教於人開曉其路從之學者咸以吾道自處閩書評事劉成伯先生异劉异字成伯隱居不仕鄉人號曰隱君後以州郡薦强起授將仕郎大理評事按選舉志載天聖八年進士閩書教授劉公南先生康夫劉康夫字公南幼聰敏不嬉玩名竒童父奕卒潤州僚佐憐而厚賻之康夫尚幼謂母曰勿汚吾父却不受服除就府學庠周先生希孟門人數百而康夫獨見推重其居家嚴憚遇親族有恩故鄉人師其孝悌仁愛而康夫亦以敦厚風俗崇奬名教為己任主鄉校者三十餘載從㳺千餘人部刺史張伯王元絳程師孟皆優禮之治平中舉孝亷本道以康夫應詔坐後時罷熈寧中廣東人乞請主番禺學朝廷下其事索所為文進志述二十七篇竟以未仕不合格止異日大臣有言於天子曰劉康夫天下士惜其幾老不得用將有特詔事遂成寢復主温陵學士之精敏勤勵者必見推許而荒慢怠㳺者必見斥罰其引經質問雖終日不倦泉人蔡彰録其温陵教授之功以傳諸人初康夫不為詞賦莆陽蔡公襄勉使為之一試而魁中由是屢薦至元祐中以特奏名舉前未唱名二日卒鄭俠表其墓謂康夫性純孝居喪盡禮葢年未弱冠而所以慎終大事者成人有所不逮葢其事親事長與夫恤窮撫稚訓養豪雋成就才哲發於誠心施於行事無不可以勒金石感鬼神為文下筆千百言若不繇思慮而羽翼詩書根柢仁義雖素搆無以過之所著有經訓若干卷雜文及古律詩若干卷其在熈寧苗役之役康夫嘗狀其事為之圖籍以獻竟不報又嘗擬乙丑廷䇿其略云去冬今春積隂常寒陽氣不逹恐有以臣議君以子改父者乃致斯譴因具言更張所宜而未嘗示人既亡而遺藁在笥見者始知公之憂其君與民為何如門人諷誦緒餘遵承規矱皆可以致主安民垂之文字而示後之學者云閩書俠省志鄭西塘文集撰墓表徵士劉孟潛先生渙劉渙字孟潛太子洗馬仲甫之孫隱釣北溪之上歌詩自娱元祐中鄉人千餘薦之郡守許懋乞應逸民之詔懋聞于朝渙力辭不就子達夫閩書教授劉宣子先生達夫劉達夫字宣子元豐中入太學以父渙年老歲一歸省父卒遂無仕進意隱居北山數十年崇寧中舉遺逸有司以應詔授松江簿擢温陵教授有薦于朝者召見將仕以中都官辭曰非志也遷越州教授卒按選舉志載政和二年進士書閩修撰劉先生藻劉藻懐安縣人按馬氏森撰鳳岡劉氏諸賢祠碑記云秘閣修撰藻從羅豫章學以孝聞於朝賜粟帛并名其里為錫類著禮書易解按閩書福州英舊傳遍考未得此公名字只韋布傳云劉藻字昭信閩縣人與王普任文薦同以禮學稱朱子所謂三山前輩有明禮者此三人是也其傳中改易數語見朱子語類乃與朱子答問之説但閩書劉藻入韋布閩縣人乃未入官者今考馬氏鳳岡劉氏碑記有劉藻者係秘閣修撰似登仕籍而非韋布矣惟著禮書易解二書似相近又考閩書英舊選舉目録内懐安故縣紹興五年乙卯有劉藻係劉偁姪是懐安與閩縣不相符但馬氏碑記中言懐安故縣即諸劉故里似即此劉氏耳再考新福州府志選舉内亦是紹興五年乙卯附王普傳屬懐安縣人竊疑劉公藻或以朱子表章禮學後人立傳只載朱子問答往復之語而他細事或不致詳亦未可知然據馬恭敏稱為羅豫章門徒又以孝德著聞於朝以名其里官至秘閣修撰則當時乃表著人物相去數百載名公鉅儒採志乘者豈有不詳考立傳似不宜有闕漏也今將馬氏祠記附諸劉之後待考并撮其語為傳再按黄氏海道南統緒辨正諸人出處之訛謂紹興之進士禮部員外郎劉藻訛為布衣意即其人但其歴官與馬恭敏祠記未符待考證之縣令劉德稱先生嘉譽劉嘉譽字德稱一名岡長樂人官至樂昌尉嘗受業李延平子世南孫砥礪司理劉景虞先生世南劉世南字景虞受業林之竒與吕祖謙相友善秉禮蹈義鄉邦敬仰官至吉州司理參軍劉履之先生砥劉砥字履之别號存菴六歲時日誦千言至覽忠孝大節輒激憤感慨十歲通九經傳記綴詞賦與其弟礪舉乾道二年童子科嘗讀錫老詩嘆曰此不足習乃治舉子業又嘆曰此不宜專習因徧取伊洛諸書讀之偕弟礪往受業於朱文公文公授之先天太極圖傳充然有得文公晚收禮書砥預編次以時方攻道學益無復仕進意年四十五卒為文醇雅宏博詩不加琢而能達其意著論語解孟子解王朝禮編弟礪劉用之先生礪劉礪字用之别號在軒幼頴悟孝弟與黄勉齋最善朱子答陳才卿書曰禮書得直卿用之漸可整頓又曰二劉到此并手料理方有汗青之日偽學禁興志尚愈篤蔡西山竄道州礪兄弟饋贐特厚子子玠劉君錫先生子玠劉子玠字君錫礪子從黄勉齋學非名士不交非義理之書不存平居退讓若無有及其見義必為不類流俗則尤人所難者以上閩書志参三山郡備考明馬氏森鳳岡劉氏諸賢祠碑記曰劉氏諸賢祠祀宋名儒劉公彞康夫藻砥礪五先生也永樂間當路肇建於懐安邑鄉之八都豈以近里居而追崇表章樹之風聲哉初扁名賢祠督學潘樸溪公改名諸賢祠宋陽山公二山公龍灣公僉議著之祀典毎春秋次丁委官致祭葢自萬厯二年始也夫聖賢之生弗偶五百年必有王者興其間必有名世者唐虞三代氣運隆升應期而出至孔子時降世異故不得位而但與三千之徒大明其道以詔後世孟子没而學絶周濓溪崛起得不傳之緒於遺經以授二程吾閩楊龜山載道而南其一脉所宗者羅豫章李延平視當時諸賢較著朱晦翁則集諸儒之大成濓洛闗閩並稱天下萬世宗之固鄒魯乎濵海者也楊羅李朱皆延建産也其在福則有劉氏諸賢銀青光禄大夫彞從胡安定學居官多治績召對以正學啟沃著七經中義百七十卷明善集居易集各三十卷水經四卷及註禮記大全奉議郎康夫從周希孟學著志述二十七卷秘閣修撰藻從羅豫章學以孝聞於朝賜粟帛并名其里為錫類著禮書易解樂昌令嘉譽從李延平學迪功郎世南從林拙齋學與吕東萊相友善父子潛心問學蹈義秉禮為鄉邦敬仰砥礪中神童科從朱晦菴學嘉其篤志授先天太極圖傳嘗言履之兄弟可與進德以時禁偽學弗仕著王朝禮論語孟子解子玠從黄勉齋學克承父志是皆賢人也而並生於一門世豈有盛於此哉是宜祠而祀之然所祀止五賢尚遺其三初議或未之考耶程叔子謂無善治士猶得以明乎善治之道以淑諸人而傳之後無真儒則天下貿貿然莫知所之是可見澤在當時終不若繼往開來為扶世功大也若劉氏諸賢究其所學皆足以羽翼夫道統則固不可謂之非真儒也是故既崇之學宫列之道南書院又專祠特舉秩文祀典如此其詳悉有以哉今撫龎惺菴公因前監察臺雙江公曾竪華表題曰一門道學既兵火復申題之屬予為之記云明蔣氏以忠龍峰巖記略曰長樂之北有龍峰去縣治十里許里先輩劉砥者與其弟礪當宋乾道間嘗築室讀書其上屬晦翁朱子南逰至邑二公從講學留斯巖最久又翁在巖時曽作讀書處三大字勒於巖今隱隱滅無乃鄭司冦環浦復補書之余為琢石刻諸門内以見朱子之所留而又以明此山非黄冠緇流之所得而有也是為記光禄劉執中先生彞學𣲖按宋初三山劉執中與陳古靈周希孟諸先生皆以經學為邑人倡其時周程尚隱濓洛三山前輩之學以經鳴者皆淵源于四先生及先生云光禄劉執中先生彞劉彞字執中閩縣人若虚從子從胡安定學安定謂其善治水凡所立綱紀規式先生力居多慶厯六年進士為邵武尉調髙郵簿移朐山令邑人紀其事目曰治範熈寧初為制置三司條例官屬以言新法非便罷神宗擇治水官除先生都水丞為兩浙轉運判官知䖍州著正俗方訓斥尚鬼之俗使易巫為醫加直史館知桂州禁與交人互市交阯陷欽亷邕三州坐貶均州團練副使安置隨州又除名為民編𨽻浯州徙襄州元祐初復以都水丞召還病卒贈銀青光禄大夫先生故明胡瑗學神宗熈寧三年召問從學何人對曰臣少從學於安定胡瑗神宗曰某人文章與王安石孰優先生曰胡瑗以道德仁義教東南諸生時王安石方在塲屋修進士業臣聞聖人之道有體有用有文君臣父子仁義禮樂歴世不可變者其體也詩書史傳垂法後世者文也舉而措之天下能潤澤其民歸於皇極者其用也國家累朝取士不以體用為本而尚其聲律浮華之詞是以風俗偷薄臣師瑗當寳元明道間尤病其失遂明體用之學以授諸生夙夜勤瘁二十餘年專功學校始自蘇湖終于太學出于門者無慮二千餘人故今學者明夫聖人體用以為政教之本皆臣師之功也神宗曰其門人今在朝為誰對曰若錢藻之淵篤孫覺之純明范純仁之直温錢公輔之簡諒皆陛下所知也其在外明體適用教於民者迨數十輩其餘政事文學粗出於人者不可勝數此天下四方所共知而嘆美之不足者也神宗悦所著有周禮中義十卷古禮經傳續通解二十九卷洪範解六卷七經中義一百七十卷又有明善集居易集水經注禮記大全等書縣令鄒堯叟先生棐鄒棐字堯叟邵武泰寧人嘉祐中進士調淮陽軍司理參軍丁父憂服除再調南劍州劍浦縣主簿移福州閩清令用薦者改宣德郎知宣城令少有文名工詞賦壯逰四方從中山劉先生彞為學浸灌六經貫穿百氏各得其宗棐為人重厚寡言雖家人未嘗見其喜愠貌温氣和遇事堅正不可以非義回屈初在淮陽卒有受杖不服而肆言守怒欲斬之議不决以其事付棐棐以為事在有司則有常法執之不移士論韙之其蒞官臨民雖冗職必盡力故所至有風績雖當繁劇手未嘗廢書也故其用志益深學之所造者逺矣龜山先生嘗曰余自垂髫誦先生之文及長聞其名藉益甚元豐初家居始獲從先生游焉其卒也龜山為志其墓并為文祭之三山王氏家世學𣲖按曽南豐氏序公文集略曰當先王之跡熄六藝殘缺道術衰微天下學者無所折衷深甫於是奮然獨起因先王之遺文以求其意得之於心行之於己其動止語黙必考於法度而窮達得喪不易其志也文集二十卷其辭反覆辨達有所開闡非世之别集而已又按西麓周氏曰王深甫學於歐陽公與王介甫曽子固劉原甫㳺其文出歐陽體而尤純淡序事曲折不窮特壯偉不及也至於摘經傳語以為賦詞短而意深有味其言哉又南豐撰深甫之弟容季墓銘曰容季孝弟純篤尤刻意學問言行出處常擇義而動容季之伯兄回深甫以道義文章退而家居學者所宗而仲兄向子直亦以文學器識名聞當世容季又所立如此學士大夫以謂此三人者皆世不常有未有同時並出於一家如此之盛云馬氏貴與文獻通考云候官三王之文葢宗師歐陽公者也其大家正氣當與曽蘇相上下故南豐折服其文而深悲其早世然晁陳二家書録並不收入四朝國史藝文志僅有王深甫集纔十卷則止有曽序所言之半而子直容季之文無傳焉亦不能知其卷帙之多少可惜也今備録諸考論著之於編推官王深甫先生回王回字深甫父平仕御史見閩書平卒葬頴州即家焉回敦友孝行質直平恕造次必稽古人舉嘉祐二年進士為衛真簿有不合稱病自免久之在廷多薦者治平中以為忠武軍節度推官知南頓縣命下卒王氏安石誌其墓曰吾友深甫書足以致其言言足以遂其志志欲以聖人之道為己任葢非至於命弗止也故不以小亷曲謹以投衆人耳目而取舍進退去就必度於仁義世皆稱其學問文章治行然真知其人而多見謂迂濶不足趣時合變嗟乎是乃所以為深甫也令深甫而有以合乎彼則必無以同乎此矣曾鞏序其文曰回當六藝殘缺道術衰微之後奮然獨起因先王遺文以求其意得之於心行之於己作為文詞反覆辨達有所開闡其卒葢將歸於蕳也其破去百家傳註推散缺不全之經以明聖人之道於千載之後振斯文於將墜回學者於既溺可謂道德之要言非世之别集而已弟向冏閩書主簿王子直先生向弟冏王向字子直與回同舉進士仕縣主簿為文故有英氣而能力自蟠屈以就法度自其少時則已著數萬言馳騁上下偉麗可喜晚自為不足而悔其少作更欲窮探力取極聖人之㫖要大行則欲發而見之事業窮居則欲推而托之文章將與詩書之作者並而未知其孰後先也冏字容季孝弟純篤自少能為文章長於叙事所為文出輒驚人其為人自重不馳騁衒鬻亦不孑孑取名日與其兄講唐虞孔子之道以求其内言行出處擇義而動其磨礱灌養而不止者方未量其所至而皆不幸蚤卒向冏與兄回之文章皆宗歐陽脩正氣大家欲與曽蘇上下曽鞏序向之文誌冏之墓深推服而悲其蚤世閩書三山陳氏家世學𣲖按三山陳氏祥道以禮學名於元祐間而弟暘著樂書在紹聖之代二書當時皆鈔録進御纂緝禮制者多折衷之所謂代用其書垂諸國胄者也朱子言三山前輩明禮者三人王氏普劉氏藻任氏文薦而祐之兄弟其嚆矢者矣再祐之先生從弟剛中以志節著朱子時此公已載長樂志遺厥歴官謫死事後朱子叩其鄉人表章之見朱子文集今考本傳已詳及之矣兹録其家學載於編秘書陳祐之先生祥道陳祥道字祐之閩清人治平四年進士嘗著禮書百五十卷近臣以聞哲宗詔尚書給筆札抄録除國子監直講遷館閣校勘兼太常博士終秘書省正字祥道為禮書序曰先生之治以禮為本其宫室衣服車旗械用有等其冠婚喪祭朝聘射御有儀即器觀理無非法象之所寓即文觀義無非道義之所藏使人思之知所以教守之知所以禁奢者不得騁無度之心儉者不得就茍難之節竒不得亂常衺不得害正此上下所以辨民志所以定也晚周而下道散於異政法亡於殊俗君子不得以行禮小人得以行非禮兩觀大路朱干玉磬天子之禮在諸侯塞門反坫素衣朱襮諸侯之禮在大夫繇是先王之制浸以掃地天下學者亦失其傳故隨武子不知殽烝孟僖子不知相禮范獻子不知問諱曽子不知奠方魯不知尚羔衛不知立市則時之知禮者葢亦鮮矣漢興叔孫通之綿蕝徒規當時之近功法失於太卑齊魯二生論禮樂必期百年後興言失於太髙賈誼有修禮之志而困於絳灌曹褒有定禮之議而沮於酺敏傅咸極論于晉而誚于流俗劉蕡發䇿於唐而棄於一時繇漢以來千有餘載其間欲起禮法於上者非一君欲成禮法于下者非一臣有是君而下不足副之則禮法終不明有是臣而上不能任之則禮事終不行此龎政薄俗所以繼作唐虞三代之治不復見也今上有願治隆禮之君下有博古明禮之臣都俞賡歌于廟堂窔奥之間四方萬里涵泳德化制作之盛在此時矣臣嘗考六藝百家之文以究先王禮樂之迹凡寓於刑名度數者必辨其志凡藏於道德仁義者必發其藴發憤二十年著成禮書總一百五十卷其於歴代諸儒之論近世聶崇義之圖或正所失或補所闕庶幾古人之髣髴可以類推藏諸巾衍非敢以施當代豈謂伏䝉太皇太后陛下皇帝陛下曲加采聽特給筆札俾寫上進臣自惟淺陋不足備甄録姑用塞明詔又有論語句解與禮書並行於世弟暘姪剛中登第閩書侍郎陳晉之先生暘陳暘字晉之紹聖制科授順昌軍節度推官徽宗初進迓衡集以勸導紹述得太學博士秘書省正字所著有樂書二百卷禮部侍郎趙挺之言其貫穿明備乞援其兄祥道進禮書故事給筆札書成為序上之其文曰臣聞先天下而治者在禮樂後天下而治者在刑政三代而上以禮樂勝刑政而民德厚三代而下以刑政勝禮樂而民風偷恭惟神宗皇帝超然逺覽獨觀昭曠之道本之為禮樂末之為刑政凡所以綱維治具者靡不交修畢振典章文物一何煥然臣先兄祥道是時直經東序慨然興思求以上副神考修禮正樂之意既就禮書一百五十卷哲宗皇帝祗遹先猷詔給筆札繕寫以進有㫖下議太常臣兄且喜且懼一日語臣禮樂治道急務帝王極功比籠絡今昔逮及成書固亦已勤乃寤寐在樂而情力不逮汝勉成之臣䝉先帝擢寘上庠陛下陞之文館編修論次積年于兹著成樂書二百卷曲被誤恩俾録上進臣兄弟得以區區所聞補聖朝萬一制作討論榮幸何如臣竊謂古樂之發中則和過則戾涵三之道叅和為沖氣五六之數一貫為中合故冲氣運而三宫臣焉叅兩合而五聲形焉叅五合而八音生焉二六合而十二律成焉數度雖有不同要之會歸中聲而已過此則衛鄭哇淫而不合於古也樂之有宫也與其有黄鍾也尊而無上者也五聲十二律樂之正也二變以變宫為君四清以黄鍾清為君樂之蠧也夫事以時作固可變也而君不可變太簇大宫夾鍾或可分也而黄鍾不可分既有宫矣又有變宫焉既有黄鍾矣又有黄鍾清焉是兩之也為是説者古無有也聖人弗論也漢唐諸儒之所傅會歟存之則傷教而害道削之則律正而聲和臣是敢辭而闢之也志在華國義在尊君庶幾不失仲尼放鄭聲惡亂雅之意也循其序君子以成焉明其義天下以寧焉樂之時用顧不大哉既上遷太常丞進駕部員外郎為講議司叅詳禮樂官閩書縣令陳彦柔先生剛中陳剛中字彦柔建炎進士性慷慨有志事功官迪功郎紹興初上書言民力凋瘵國用匱乏願罷冗食去虚文以足邦用遷太府寺丞應詔上封事主議恢復忤秦檜意胡銓以言貶韶州剛中作啟賀行有云屈膝請和知廟堂禦侮之無䇿張膽論事喜樞庭經逺之有人又云知無不言願借上方之劍不遇故去聊乗下澤之車檜尤憾之遂與張九成等七人同謫差知安逺縣至縣適有嶺冦來擾究心招撫感瘴而没其妻子扶柩葬於杭州龍井山風篁嶺之沙盆塢新三山郡志朱子文集閩中理學淵源考卷十
