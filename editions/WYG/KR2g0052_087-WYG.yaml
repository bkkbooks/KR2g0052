body:
  text: 閩中理學淵源考卷八十七廣平府知府李清馥撰汀洲洪永宣正以後諸先生學派按長汀自宋徐氏守忠從學胡安定深於經學受知仁宗厥後寥寥故論者謂海濱四先生倡學及楊羅李朱之學興汀中負笈者甚少元明以來儒術奮起從游有道者復斌斌矣攷洪永以降如賴氏先舒氏冕呉氏文旭章氏昱皆能淵源正的􅃀述其師承而清脩實徳尤可風也兹擇其著者載焉董先生璘董璘汀州人永樂中入胄監不仕退充所學莫不淹貫興禮敦讓為鄉閭軌閩書舒廷瞻先生冕舒冕字廷瞻武平人太學生游胡文敬之門得用功之要服膺靡懈冠婚喪祭悉遵家禮父母有疾衣冠侍養終制廬墓三年閩書教授呉景陽先生文旭呉文旭字景陽連城人少篤學不溺時好聞呉聘君倡道遂受業其門應貢授安逺訓導啟迪生徒規教丕振會寇作當道委其𠞰捕直抵賊巢諭以大義賊皆感服當道以能聞遷銅鼓衞學教授丁内艱歸以不得終養為恨隠居不出林下二十餘年絶跡公門其平居敬義自持勢利不入于心睦族周貧訓子孫以勤儉或有過引咎自責年八十餘卒閩書郡守賴伯啟先生先賴先字伯啟永定人舉𢎞治三年進士念親老乞歸養久之始為戸部主事署郎事齎邊餉督鈔闗收京倉糧清西蜀屯田悉著賢聲遷員外郎引疾歸正徳初逆瑾用事例京官養病者致仕逆瑾誅銓部屢檄不起八年擢常徳知府郡小民疲時又修建榮府中官誅求甚峻痛加裁抑民有利病興革則力為之恥為諛説多忤當道勇退而歸先師事羅一峰而與李空同相善教鄉處家後進推仰閩書縣令周文載先生輅周輅字文載上杭人知上饒縣嵗祲請于朝減常賦三之一九年以疾歸閩書教諭謝先生文寶謝文寶連城人潛心經學操筆成文授於潛訓導造就有成遷玉山教諭以疾辭閩書訓導李世玉先生元瑫李元瑫字世玉連城人少年時父患癰躬為吮䑛正徳八年以貢授袁州訓導知府徐璉檄往寧庶人府賀壽還舟將行而庶人反勒諸教官為之傳檄瑫不屈裂冠袍躍入水中以救免歸白知府備兵應王公文成討賊之舉人稱忠孝焉閩書通志主簿舒廷亨先生通舒通字廷亨武平人性鯁直學問淵源正徳七年以平宼有功拔入胄監初任㑹同簿補任東陽所至有聲閩書縣令楊子晦先生昱楊昱長汀人知都昌縣操履端嚴布袍蔬食減偏累民糧嵗旱祈禱輒應民居遭火叩首隨滅致仕歸閩書童克剛先生世堅童世堅字克剛連城人正徳癸酉應貢京師不就嘆曰此時閹寺熏燭道與世違可以隠矣遂結廬於晝錦橋東扁曰尋樂時王文成倡道東南世堅走謁請業歸而沈潛體認充然有得邑人稱曰尋樂先生孫大樑王先生廬淵學派王廬淵先生未詳俟考焉孝亷范文堅先生金范金字文堅上杭人性沈靜寡言從王廬淵受春秋永樂癸卯以經義甲一省正統間典始興陵水二庠教既以疾歸養二十餘年士子樂從之閩書許先生浩志學派許氏浩志亦一時師表教諭許先生浩志許浩志連城人正統中鄉薦以親老就養授同安教諭將奉親之任抵家遇寇發率鄉人登冠豸寨協力保障邑賴生全閩書教授李善徵先生慶孫元泰李慶字善徵連城人受業於許浩志素富文辭尤長詩賦任封川學諭多所造就遷撫州學教授便道抵家值沙寇攻縣與浩志籌辦方畧備禦之寇平偕其徒童昱倡道開講後改任温州卒于官孫元泰字汝嚴講學遵禮胸中具韜畧以嵗貢授太平訓導值倭亂當道延之㕘謀遂致克捷尋告歸會賊先後逼城元泰偕當道贊畫督𠞰以勞致疾卒閩書童道彰先生昱童昱字道彰連城人少從李慶遊甚為器重及長慕呉聘君學私淑其門不樂仕進卜築文溪之東名曰東臯清隠李慶為作東臯清隠賦閩中理學淵源考卷八十七
