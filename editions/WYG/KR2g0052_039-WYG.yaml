body:
  text: 閩中理學淵源考卷三十九廣平府知府李清馥撰邵武黄存齋諸先生學派邵武諸賢學派源委卓乎可述而以經學詩學專門名家者尤可尚已黄氏鎮成之篤志聖學陳氏士元之隠節黄氏清老之通經李氏應龍之師表李氏學遜之易學黄氏元實之凝重嗜學致命遂志黄氏大昌父子之隠徳危氏徳華之不慕榮達嚴氏儀卿之精深詩學皆表表為世羽儀兹特錄其著者列之篇端貞文黄存齋先生鎮成黄鎮成字元鎮邵武人年弱冠即厭棄榮利慨然以聖賢道學自勵號存齋學者稱存齋先生延祐間科目行再試有司不合遂築室城南名南田畊舎作詩寫懷曰白日不停馭頽波竟東馳忽忽年嵗改念此將安歸我欲驅車行太行路嶮􅇖我欲駕方舟滄海無津涯豈不顧行邁出門慎所之有田南山下可以供盛粢中廬在中田可以談詩書上探羲皇際下及商周時聖賢尚淪落㣲生亦何疑懷哉羡門子千載以為期部使者聞其賢相繼論薦不應後以執政薦授江西路儒學提舉命下而卒集賢定諡曰貞文處士所著有尚書通考周易通義中庸章㫖性理發蒙秋聲集閩書錄通志宏簡著述先生尚書通考叙曰書載二帝三王之政政者心與事之所形也是故道徳仁聖統乎心制作名物達於事内外之道合而帝王之政備矣然統乎心者先後古今脗合無二達於事者儀章器物因革無存故求帝王之心易而考帝王之事難矧後儒稽古不過以周為據而秦人滅學周典亦多殘缺廼欲以不完之文上徴隆古之舊斯益難矣昔紫陽之教每語學者謂如堯舜典厯象日月星辰律度量衡五禮六樂禹貢山川洪範九疇之𩔖湏一一理會令透盖讀書窮理即器㑹道乃學者之當務也余方授兒輩以書間或有問不容立答則取關渉考究者㑹萃抄撮或不可言曉者規畫為圖以示之至衆家之說有所不通則間述己見以附於下如舊圖舊說巳備者不復贅出其有未盡則隨條辨析焉嵗月積累寖成卷帙乃次其顛末以便考尋名曰尚書通考竊謂學有本末道無精粗禮樂官名聖人猶問則讀是經者安得不求其故哉方將就正於博洽君子然後退授於家俾為格致之助亦庻乎紫陽夫子之教云爾陳暘谷先生士元陳士元邵武人與黄鎮成同時以文為友隠居不仕有武陽志略武陽耆舊詩宗學者號暘谷先生黄氏鎮成撰武陽耆舊宗唐詩集序曰宗唐詩者武陽耆舊之所作也詩以唐為宗詩至唐而備也盖自唐虞賡歌為雅頌之正至五子之歌有風人之㫖三百篇源流在是下至楚騷漢魏而流於六朝至唐復起開元天寶之間極盛矣一本温柔敦厚雄渾悲壯而忠臣孝子之情傷今懷古之意隠然見於言外可以諷誦而得之矣宋諸大家務自出機軸而以辨博廹切為詩去風雅頌反逺矣及其弊也復有一𩔖衰陋破碎之辭相尚為竒豈不為詩之厄哉吾鄉自滄浪嚴氏奮臂特起折衷古今凡所論辨有前輩所未及者一時同志之士更唱迭和以唐為宗而詩道復昌矣是時家各有集惜行世未久海田換代六丁取將暘谷陳君士元網羅放失得數十家大懼湮没俾鎮成芟取十一刋刻傳逺一以見一代詩宗之盛一以見吾邦文物之懿陳君是心可不謂賢者我朝文治復古諸名家傑作齊驅盛唐是編之行適其逢也敢述卷端提舉黄子肅先生清老黄清老字子肅邵武人黄五經之後也通經博文元泰定四年進士累應奉翰林文字同知制誥國史院編修官遷奉訓大夫出為湖廣行省儒學提舉學者自逺從之率多成就稱樵水先生著春秋經㫖四書一貫數十卷詩存者數千篇有盛唐之風蘇天爵為作碑云閩書經義考李玉林先生應龍李應龍字玉林光澤人西山先生郁之後博學有節操為時師表至元間薦為白鹿洞書院山長及漳州路教授俱不赴所著有春秋纂例孝經集註四書講義閩書李先生學遜李學遜邵武人忠定公九世孫也博學洽聞善天文尤䆳於易為文典雅有法所著有易精觧中星儀象等圖閩書文學黄延美先生元實黄元實字延美邵武人少酷嗜學性凝重寡言終日危坐不少傾倚天厯初試浙闈中式授郡文學以剡薦未授而歸邑有妖民為亂令延元實議討賊賊奄至遂遇害通志黄退圃先生大昌子公紹黄大昌字退圃邵武人黄永存之孫隠徳不仕所著有兼山語錄子公紹字直翁宋咸淳元年進士所著有韻㑹閩書邵武郡志通志危先生徳華危徳華光澤人博覽經史不慕榮達善属文精於詩按志乗邑令金川姚伯和叙徳華詩集畧曰予來宰是邦得卓行之士一人曰危徳華者孤介特立隠居北溪以學業教授諸生不求聞達值元季䘮亂草竊暴横奔走竄伏靡有寜日故其發言興懷未免悲憤激烈其所以嫉奸邪崇節義尊君親上之心炳然著見於言意之表噫先生家貧矣而其志益貞年艾矣而其詩益豪自非飬之有素者其能若是耶邵武郡藝文志閩書嚴儀卿先生羽嚴羽字丹丘一字儀卿邵武莒溪人自號滄浪逋客其為人粹温中有竒氣嘗問學於包克堂自風騷而下講究深到即雜出古人之詩隠其姓名舉以相試悉能辨别其世代門戸自號滄浪逋客有滄浪集二卷同族有嚴仁好古博學嚴參號三休居士俱髙尚世號三嚴云羽詩雖祖唐人然其體裁匀宻詞調清壯無一語軼䋲尺之外同時台人戴石屏深加奬重其子鳯山鳯山子子野半山邑人上官閬風吳潜夫朱力菴吳半山黄則山盛傳宗派殆與黄山谷江西詩派無異閩書郡志按志乗載與滄浪論詩者同里有吳陵字景先上宫偉長號閬風山人吳夢易字潜夫朱正中字叔大號力菴黄裳號則山正中子汝賢字志學俱以詩鳴傳中所謂盛傳宗派者此數人餘俟考閩中理學淵源考卷三十九
