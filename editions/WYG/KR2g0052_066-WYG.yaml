body:
  text: 閩中理學淵源考卷六十六廣平府知府李清馥撰童含山先生學派按先生為紫峰陳氏髙弟當時以易學鳴考志乗未見本傳僅見何怍菴祭先生文惓惓於師授之㫖而稱述其踐履精純葢先正之卓然者兹錄其祭文著之篇端尚待補傳焉童含山先生童闕字闕號含山温陵人何怍菴祭之文曰恭惟夫子天生木鐸昔在紫雲脫屨盈幄嘗升講座抽闗啓鑰朗然髙論聴者聳服隨才髙下藝文商𣙜所經識取靡不騰躍某時在列年方總丱莫知端倪但仰山嶽言雖諄諄未嘗領畧髙乎堅乎至今踧踖追數舊遊後先彫落爰有蔡生立雪游酢手書頌徳如冩衷膜使其尚存必有制作以表丹青以昭宿昔𦕈予小子自慚寡弱伏自宦歸時侍几屩是嵗之春忽䝉枉泊示我歌吟若有所托夫子逝矣今何可復惟是夫子學問淵澤授自紫峰以溯伊洛短檠對静圓木示覺踐履精純孝弟有綽病叟載歌吁嗟命薄敬此誄章以懐棫樸朱荒山先生軫學派按泉自明初諸先正多治易至先生専治毛詩泉人業詩者多宗之維時庠塾間篤尚經學諄諄講明轉相付受猶不失傳習家法爾朱荒山先生軫朱軫字朝矩號荒山晉江人祖伯父都憲簡菴公占其命書喜曰兒當大吾宗比壯長身玉立言笑不茍動止有容儀補邑庠弟子員治詩經是時蔡虛齋易學盛行于泉詩道幾絶軫獨與其師友三五人濳心講究久之有所自得不為時文窘束而於詩人性情及文公傳註融會通貫自成一派泉人業詩者多從之屢困塲屋晚年猶不廢講究軫襟懐坦夷與人無城府居家孝友燕居必以禮雖對妻子僮僕亦無惰容尤留心世務非止於經學専門者門人張天衢狀其行張净峯先生撰墓忠翁比軒徐泗涯易愧虛丘潛軒諸先生學派按四先生一時師表也翁徐未詳易氏為蔡文莊髙弟已别見丘氏潛軒夀民住儒林里與李坦齋鄰而相友善故一泉稟學焉丘濳軒先生夀民丘夀民别號濳軒晉江人有嵓之父夀民家故貧而深於經術四方爭致為弟子師設席安平安平距郡城再舍而遥按衷一李氏曰正徳中贈光祿丘濳軒先生家吾儒林里與先大父贈公坦菴鄰而相友善先考主政一泉公稟學於先生之門先生設臯比安平先考負笈從之於師門為髙足云節錄李衷一先生撰丘兖泉有嵓行狀推官李一泉先生仁李仁字静甫號一泉夙慧七嵗日誦百餘言長習易旁及諸經貧不能購書借輒成誦有欲試其才者與經幾百期以片晷歸仁如期歸之隨叩隨應無隻字遺其善强識如此仁先受業於翁比軒易愧虛徐泗崖丘潛軒諸公最後禀學於從父實渠公時易愧虛倡明蔡虛齋易學士從遊者無慮百數而獨器仁尠少可教年二十補文學掌故與石江莊公韋亭徐公小洛何公結社東湖之濱諸公皆一時知名士獨嚴重仁毎一牘成人人灑然異也仁為文根極於理不以怪迂相髙戊子上賢書久之謁選授惠州府推官悉捐宿業與兄弟無所間在職嚴刑憲洗寃獄却餽遺三嵗奏最擢司農郎值邊急轉餉如流一切按法不可干以私卒時撿囊中僅書數十卷而已蘇氏濬曰余聞之長老曰世廟初年士風未彫其人𩔖多峭直自遂純而不緇蹈必擇地事不避難遇權貴人直藐視之不與俱上下先生其人哉濬不及侍先生然與若子光縉游即之穆穆叩之冷冷至臨大事屹然如山則猶之乎見先生也蘇紫溪撰墓志閩書閩中理學淵源考卷六十六
