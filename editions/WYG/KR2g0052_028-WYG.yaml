body:
  text: 閩中理學淵源考卷二十八廣平府知府李清馥撰主簿陳北溪先生淳學派按紫陽先生莅漳時北溪方始受業由是漳之人士翕然師尊之維時漳士尚未著顯惟鄰郡泉莆間信向相從講貫者為多此見於先生答黄寺丞直卿之書可考也晚嵗曽與陳復齋宓江徳功黙先後莅安溪令簿惜未至官而卒然三先生皆得紫陽緒餘流風所被其澤未冺山川炳耀學派開先然則泉郡之俎豆先生當與黄巖孫蔡白石諸公並請百世祀宜哉至其為學有所得不逺千里質之晦翁晦翁有喟然與㸃之嘆則又告之曰當大作下學之功勿遽求上達之見臨川吳氏言朱門惟勉齋黄直卿識理本原其次北溪陳安卿於細碎字義亦不差云主簿陳北溪先生淳陳先生淳字安卿龍溪人少習舉子業林宗臣見而奇之謂曰此非聖賢之學也授以近思録先生由是盡棄所業益求濂洛遺書讀之曰若是與吾心會蓋真得洙泗之傳者循牆闖門未身其奥吾心恧焉及聞朱子講道武夷欲往從而無資會朱子來守漳州袖所作自警詩為贄朱子讀之恨相見晚與語知其用功深且久直以上達之理發之先生聞語深思益求所未至朱子每語人曰南來吾道得一安卿為喜朱子自漳歸且十年先生復至自述所得朱子曰已見本原矣所闕者下學之功爾自是所聞皆切要語凡三月而朱子卒先生歸追思師訓痛自裁抑無書不讀無物不格日積月累義理貫通洞見條緒凡經傳子史所載紀綱法度禮樂刑政衰興治亂之原得失利害之幾與夫異端邪説似是之非淺深疎密難明之辨無不周詳究勘徹上徹下而於朱子之所以教無復遺恨矣先生僻處陬澨曩時同門諸老皆已零落後來者率累於科舉習於見聞惟鄰郡莆泉間有相信從者嘉定九年以特試寓中都四方友皆來叩質朝士大夫爭館迎焉嚴州守鄭之悌聞其至率僚屬延講郡庠時有竊似亂真自立門庭者教人黙坐求心謂可一蹴而至而以致知格物為支離認人心為道心而是非理欲之所在皆置不聞後生晚出喜奇便簡羣然和之先生極力排之所以發明正學以求指歸則有道學體統等四篇所以排觝異端中其膏肓則有似道似學二辨既歸泉人士師事益衆先生與講解率至夜分惟恐聴者之勞而在巳曽無倦色惟慮人無以受之而不憚傾倒所有以告於是門人随其口授筆之於書大學論孟中庸則有口義仁義禮智心意性情之𩔖随事剖析則有字義詳講仙谿陳沂久往來門下輯一時問答之言為筠谷所聞二卷其深切著明者也先生家故貧事母孝身雖未用而憂時論事感激動人道至晚益尊行著於鄉徳形於言胸中明瑩若太空無雲而其辨説條暢浩乎水涌而山出其推己及人之心甚於饑渴嗜慾不能自遏嘉定十六年授迪功郎主安溪簿泉南諸儒竊自幸有以終教将行竟卒時年六十五矣學者稱北溪先生子榘能讀父書銓次其家集為五十卷有道學體統師友淵源用功節目讀書次序四篇似道似學辨大學中庸論孟口義字義詳講詩禮女學等書道南源委考宏簡録録名儒傳溪文集亭淵源閩書北嚴陵學校講義淳恭承判府寺丞鄭公之悌偕諸廣文先生領邦之羣賢衆俊會於學校謂淳從游晦菴先生之門俾講明大義以開後進區區淺陋辭不獲命輒吐為説四篇一曰道學體統二曰師友淵源三曰用功節目四曰讀書次序以為賢侯作成人材之助願諸同志共切磋之道學體統聖賢所謂道學者初非有至幽難窮之理甚髙難行之事也亦不外乎人生日用之常耳蓋道原於天命之奥而實行乎日用之間在心而言則其體有仁義禮智之性其用有惻隠羞惡辭讓是非之情在身而言則其所具有耳目口鼻四肢之用其所與有君臣父子夫婦兄弟朋友之倫在人事而言則處而修身齊家應事接物出而莅官理國牧民御衆微而起居言動衣服飲食大而禮樂刑政財賦軍師凡千條萬緒莫不各有當然一定不易之則皆天理自然流行著見而非人之所强為者自一本而萬殊而體用一原也合萬殊而一統而顯微無間也上帝所降之衷即降乎此也生民所秉之彞即秉乎此也以人之所同得乎此而虚靈不昧則謂之明徳以人之所共由乎此而無所不通則謂之達道堯舜與塗人同一稟也孔子與十室均一賦也聖人之所以為聖生知安行乎此也學者之所以為學講求踐履乎此也謂其君不能賊其君者也謂其民不能賊其民者也自謂其身不能自賊者也操之則存舍之則亡迪之則吉悖之則凶蓋皎然易知坦然易行也是豈有離乎日用常行之外别自為一物至幽而難窮甚髙而難行也哉如或外此而他求則皆非大中至正之道聖賢所不道也師友淵源粤自羲皇作易首闢渾淪神農黄帝相與繼天立極而宗統之傳有自來矣堯舜禹湯文武更相授受中天地為三綱五常之主臯陶伊傅周召又相與輔相施諸天下為文明之治孔子不得行道之位乃集羣聖之法作經為萬世師而回參伋軻實傳之上下數千年無二説也軻之後失其傳天下騖於俗學蓋千四百餘年昏昏冥冥醉生夢死不自覺也及我宋之興明聖相承太平日久天地真元之氣復會於是濂溪先生與河南二程先生卓然以先知先覺之資相繼而出濂溪不由師傅獨得於天提綱啓鑰其妙具在太極一圖而通書四十章又以發圖之所未盡上與羲皇之易相表裏而下振孔孟不傳之墜緒所謂再闢渾淪二程親授其㫖又從而光大之故天理之微人倫之著事物之衆鬼神之幽與凡造道入徳之方修己治人之術莫不秩然有條理備見於易傳遺書使斯世之英才志士得以探討服行而不失其所歸河洛之間斯文洋洋與洙泗並聞而知者有朱文公又即其微言遺㫖益精明而瑩白之上以達羣聖之心下以統百家而會於一蓋所謂集諸儒之大成而嗣周程之嫡統粹乎洙泗濂洛之淵源必以是為迷塗之指南庶乎有所取正而不差茍或舍是而他求則茫然無定準終不得其門而入矣既不由是門而入而曰吾能真有得乎聖人心傳之正萬無是理也用工節目道之浩浩何處下手聖門用工節目其大要亦不過曰致知與力行而已致者推之而至其極之謂致其知者所以明萬理於一心而使之無所疑也力者勉焉而不敢怠之謂力其行者所以復萬善於已而使之無不備也知不致則真是真非無以辨其行将何所適從必有錯認人欲作天理而不自覺者也行不力則雖精義入神亦徒為空言而盛徳至善竟何有於我哉此大學明明徳之功必以格物致知為先而誠意正心修身繼其後中庸擇善固執之目必自夫博學審問慎思明辨而篤行之而顔子稱夫子循循善誘人亦惟在於博我以文約我以禮而已無他説也然此二者亦非截然判先後為二事猶之行者目視足履動輒相應蓋亦交進而互相發也故知之明則行愈達而行之力則所知又益精矣其所以為致知力行之地者必以敬為主敬者主一無適之謂所以提撕警省此心使之惺惺乃心之生道而聖學之所以貫動静徹終始之功也能敬則中有涵養而大本清明由是而致知則心與理相涵而無顛冥之患由是而力行則身與事相安而亦不復有扞格之病矣雖然人性均善均可以適道而鮮有能從事於斯者由其有二病一則病於安常習故而不能奮然立志以求自拔二則病於偏執私主而不能豁然虚心以求實見蓋必如孟子以舜為法於天下而我猶未免為鄉人者為憂必期如舜而後已然後為能立志必如顔子以能問於不能以多問於寡有若無實若虚然後為能虚其心既能立志而不肯自棄又能虚心而不敢自是然後聖門用工節目循序而進日日有惟新之益能升堂入室惟吾之所欲而無所阻矣此又學者所當深自警也讀書次序書所以載道固不可以不讀而聖賢所以垂訓者不一又自有先後緩急之序而不容以躐進程子曰大學孔氏之遺書而初學入徳之門也於今可見古人為學次第者獨賴此篇之存而論孟次之學者必由是而學焉則庶乎其不差矣蓋大學者古之大人所以為學之法也其大要曰明明徳曰新民曰止至善三者而已於三者之中又分而為格物致知誠意正心修身以至於齊家治國平天下者凡八條大抵規模廣大而本末不遺節目詳明而始終不紊實羣經之綱紀而學者所當最先難講明者也其次則論語二十篇皆聖師言行之要所萃於是而學焉則有以識操存涵養之實又其次則孟子七篇皆諄諄乎王道仁義之談於是而學焉則有以為體驗充廣之端至於中庸一書則聖門傳授心法程子以為其味無窮善讀者味此而有得焉則終身用之有不能盡者矣然其為言大槩上達之意多而下學之意少非初學者所可驟語又必大學論孟之既通然後可以及乎此而始有以灼知其皆為實學無所疑也蓋不先諸大學則無以提挈綱領而盡論孟之精微不參諸論孟則無以發揮藴奥而極中庸之歸趣若不會其極於中庸則又何以建立天下之大本而經綸天下之大經哉是則欲求道者誠不可不急於讀四書而讀四書之法毋過求毋巧鑿毋旁搜毋曲引亦惟平心以玩其㫖歸而切己以察其實用而已爾果能於是四者融會貫通而理義昭明胸襟灑落則在我有權衡尺度由是而進諸經與凡讀天下之書論天下之事皆莫不冰融凍釋而輕重長短截然一定自不復有錙銖分寸之或紊矣嗚呼至是而後可與言内聖外王之道而致開物成務之功用也歟似道之辨或曰今世所謂老佛之道與聖賢之道何如曰似道而非道也蓋老氏之道以無為宗其要歸事清浄令學者修真煉氣以復嬰兒誠為反人理之常世固有脱事物遊方外以事其學者然其説未甚熾固不待論若佛氏之教則充盈乎中華入人骨髄自王公大人至野夫賤𨽻深閨婦女無不傾心信向之而其所以為説者大槩有二一則下談死生罪福之説以誑愚衆然非明識者莫能決一則上談性命道徳之説以惑髙明亦非常情所易辨也夫死生無子理能原其始而知所以生則反其終而知所以死矣蓋無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物此天地所以生人物之始也人得是至精之氣而生氣盡則死得是至真之理所賦其存也順吾事則其沒也安死而無愧始終生死如此而已自未生之前是理氣為天地間公共之物非我所得與既凝而生之後始為我所主而有萬化之妙及氣盡而死則理亦随之一付之大化又非我所能専有而常存不滅於冥漠之間也今佛者曰未生之前所謂我者固已具既死之後所謂我者未嘗亡所以輪回生生於千萬億劫而無有窮已則是形潰而反於原既屈之氣有復為方伸之理與造化消息闢闔之情殊不相合且謂天堂地獄明證昭昭則是天地間别有一種不虚不實之田地可以載其境别有一種不虚不實之磚瓦材木可以結其居與萬物有無虚實之性又不相符况其為福可以禱而得為罪可以賂而免則是所以主宰乎幽隠者元為私意之甚抑非福善禍淫大公至正神明之道也觀乎此則死生罪福之説真是真非瞭然愚者可以不必惑而明智者亦可以自決矣夫未有天地之先只自然之理而已有是理則有是氣有動之理則動而生陽有静之理則静而生隂隂陽動静流行化育其自然之理從而賦予於物者為命人得是所賦之理以生而具於心者為性理不外乎氣理與氣合而為心之靈凡有血氣均也而人通物塞通則理與氣融塞則理為氣隔今就人者言之心之虚靈知覺一而已其所以為虚靈知覺由形氣而發者以形氣為主而謂之人心由理義而發者以理義為主而謂之道心若目能視耳能聴口能言四肢能動飢思食渴思飲冬思裘夏思葛等𩔖其所發皆本於形氣之私而人心之謂也非禮勿視而視必思明非禮勿聴而聴必思聰非禮勿言而言必思忠非禮勿動而動必思義食必以禮而無流歠飲必有節而不及亂寒不敢襲暑無褰裳等𩔖其所發皆原於理義之正而道心之謂也二者固有脈絡粲然於方寸之間而不相亂然人心易危殆而不安道心至隠微而難見以堯舜禹相傳猶致其精於二者之間而一守夫道心之本自告子以生為性則已指氣為理而不復有别矣今佛者以作用是性以蠢動含靈皆有佛性運水搬柴無非妙用専指人心之虚靈知覺者而作弄之明此為明心而不復知其為形氣之心見此為見性而不復知性之為理悟此為悟道而不復别出道心之妙乃至甘苦食淡停思絶想嚴防痛抑堅持力制或有用功至於心如秋月碧潭清潔者遂交贊以為造到業儒者見之自顧有穢浄之殊反為之欣慕舍己學以從之而不思聖門傳授心法固自有克己為仁瑩浄之境與所謂江漢之濯秋陽之曝及如光風霽月者皆其胸中輝光潔白之時乃此心純是天理之公而絶無一毫人欲之私之謂若彼之所謂月潭清潔云者特不過萬理俱空而百念不生爾是固相似而實不同也心之體所具者惟萬理彼以理為障礙而悉欲空之則所存者特形氣之知覺爾此最是至精至微第一節差錯處至於無君臣父子等大倫乃其後截人事粗迹之悖繆至顯處其為理之發端實是大原中已絶之心本是活物如何使之絶念不生所謂念者惟有正不正耳必欲絶之不生須死而後能假如至死之境果無邪心但其不合正理是乃所以為邪而非豁然大公之體也程子以為佛家有个覺之理可敬以直内矣而無義以方外然所直内者亦非是正謂此也觀乎此則性命道徳之説真是真非瞭然髙明者可以不必惑而常情亦可以能辨矣而近世儒者乃有竊其形氣之靈者以為道心屏去道問學一節工夫屹然自立一家専使人終日黙坐以求之稍有意見則證印以為大悟謂真有得乎羣聖千古不傳之秘意氣洋洋不復自覺其為非故凡聖門髙明廣大底境界更不復覩而精微嚴密等工夫更不復從事良亦可哀也哉嗚呼有志於學者其戒之謹之似學之辨或曰今世所謂科舉之學與聖賢之學何如曰似學而非學也同是經也同是子史也而為科舉者讀之徒獵涉皮膚以為綴緝時文之用而未嘗及其中之藴止求影像髣髴略略通解可以達吾之詞則已而未嘗求為真是真非之識窮日夜旁搜博覽吟哦記臆惟鋪排駢儷無根之是習而未嘗有一言及理義之實自垂髫至白首一惟虚名之是計而未嘗有一念闗身心之切蓋其徒知舉子蹊逕之為美而不知聖門堂宇髙明廣大之為可樂徒知取青紫伎倆之為美而不知潛心大業趣味無窮之為可嗜凡天命民彞大經大法人生日用所當然而不容闕者悉置之度外不少接心目一或扣及之則解頤而莫喻於修己治人齊家理國之道未嘗試一講明其梗槩及一旦躐髙科躡要津當任天下國家之責而其中枵然無片字之可施不過直行己意之私而己若是者雖萬卷填胸錦心繡口號曰富學何足以為學峩冠博帶文雅醖藉號曰名儒何足以為儒假若胸臆歐蘇才氣韓栁謂之未曽讀書亦可也然則科舉之學視聖賢之學正猶枘鑿之相反而不足以相通歟曰科舉程度固有害乎聖賢之㫖而聖賢學問未嘗有妨於科舉之文理義明則文字議論益有精神光采躬行心得者有素則形之商訂時事敷陳治體莫非溢中肆外之餘自有以當人情中物理藹然仁義道徳之言一一皆可用之實而有司明眼者得之即為國家有用之器非止一名一第而已也况其氣局髙宏功力至到造道成徳之大全者所謂伊傅周召王佐規模具焉躋至道之域又斯世之所不能舍也但時王立科目之法専指三日之文為名而素行不與在學者讀書而言則以聖師孔子為祖者也吾夫子平日之所以教羣弟子之所以學淵源節目昭昭方冊固有定法正學者所當終身鑽仰斃而後已非可随人遷變者矧自聖朝列祖以至今日已有尊崇之道而荆蜀江浙閩廣及中都之士復多以此為習尚則亦此理在萬世不容冺沒其輕重緩急固有辨也或曰生斯世也非能絶意於斯世而舍彼就此也曰時王之法何可舍也假使孔孟復生於今亦不能舍科目而逺去則亦但不過以吾之學應之而已焉能為吾之累也然則抱天地之性負萬物之靈而貴為斯人者盍亦審其輕重緩急而無甘於自暴自棄也哉告子論性之説五告子論性之説有五而生之謂性一句乃其抉本者蓋性者人所得於天之理若仁義禮智者是也而視物為獨全生者人所得於天之氣若知覺運動者是也而與物為不異告子不知性之為理而指氣以當之故以知覺運動不異也為解而斷為一定之理謂凡有生者皆同是一性更無差别是立个大底意以包之而餘之四説則又就其中推演如食色無善不善二説則正與此同蓋一由其能知覺運動故能甘食悦色也一由其知覺運動之無所異故無善無不善也如杞栁湍水二説則亦不外乎此蓋一由知覺運動之或偏於惡故必待矯揉而後成也一由知覺運動之或混於善惡故之東之西而無所定也夫既以甘食悦色為仁生乎内矣而又反之以為惡既曰無善無不善矣而又反之以為善惡混展轉縱横支離繆戾要之皆只説著氣而非性之謂也夫既以氣為性則仁義禮智之粹然者将與知覺運動之蠢然者相為混亂無人獸之别而且不復識天理人欲所從判之幾矣其為害豈淺鮮哉告子與程張説氣不同告子説氣與程張説氣不同嘗推之氣一也告子生之説所謂知覺運動者是統指夫氣之流行為用者而言程子才稟與張子氣質之性所謂清濁剛柔者是分指夫氣之凝定成體者而言自知覺運動者統言可包得清濁剛柔而清濁剛柔者分言其中亦各具知覺運動但告子之説乃即是以為本性而大為包含之意渾無分别如無星之秤無寸之尺而程張之説則是於本性之外發此以别白其所未盡如大明中閲物象瞭然更無隠漏矣如把栁湍水之説亦氣質意也但程張分明斷作氣質則自不亂此性之本便為精確不易之論告子雖於把栁説著意之惡湍水説著氣之混而意不認作氣質只専作本性看所以不可同日語也初見晦菴先生書十一月吉日學生鄉貢進士陳某謹齋沐裁書百拜請備灑掃之禮於判府寶文侍講先生門下某竊嘗謂道必真有人而後傳學必親炙真任道之人而後有以質疑辨惑而不差自孔孟沒天下貿於俗學蓋千四百餘年得濂溪周子河南二程子者出然後斯道有傳而正學始有宗主自程子至今又百餘年矣見知聞知代不乏人然淵源純粹精極真可以當程氏之嫡嗣而無愧者當今之世捨先生其誰哉而天下學士有志於古欲就有道而正之者非先生亦誰與歸哉某窮鄉晚生愚魯遲鈍居於僻左無明師良友不蚤聞儒先君子之名自兒童執卷而世儒俗學已蠱其中窮年兀兀初不識聖賢門户為何如年至二十有二矣始得先生所集近思録讀之始知有濂溪有明道有伊川為近世大儒而於今有先生然猶未詳也自是稍稍訪尋其書間一二年三四年又得語孟精義河南遺書及文集易傳通書與夫先生所著定語孟中庸大學太極西銘等傳吟哦諷誦反諸身驗諸心於是始慨然敬嘆當時師友淵源之盛抽闗啓鑰如此之至而重自愧覺此身大為孔顔罪人而且益仰先生道巍而徳尊義精而仁熟立言平正温潤精切的實明人心洞天理達羣哲會百聖粹乎洙泗伊洛之㫖凡曩時有發端而未竟者今悉該且備凡曩時有疑辨而未瑩者今益信且白宏綱大義如指諸掌掃千百年之謬誤為後學一定不易之準則辭約而理盡㫖明而味深而其心度澄朗瑩無渣滓工夫縝密渾無隙漏尤可想見於辭氣間故孔孟周程之道至先生而益明所謂主盟斯世獨惟先生一人而已然求於書未如親炙之為浹洽徒言之誦未若講訂服行之為實益故愚生竊不自量嘗欲盡屏世學奔趨席隅面領其梗槩然後退而結茅於清泉茂林以畢其業而終吾樂獨奈何事與心違家窮空甚無千里裹糧之資而二親臞繭又日奪於仰事不給之憂汩沒乎科舉干禄之累而於此第竊有志焉不克實下手専研而精究今三十有二矣十年之間但粗獵涉悠悠蹉跎若存若亡枉逾夫子而立之年未免曹交徒食之計良心蕪沒百無一就駸駸下流甚懼甚恐去年秋賦夤縁有臨安之役自謂是行也此累了未了其歸也道武夷當徑走五夫職洒掃於牆仞之下以紓其所素願不謂命也天窮舊累依然而先生又此來矣某始聞之歡欣鼓舞謂向者十年願見而不可得今乃得親覩儀刑於州閭之近殆天之賜歟既而又自疑曰先生郡侯也某郡之一賤氓也貴賤之分有等且侯門如海府吏森嚴如㦸問學若之何而通請益若之何而便講論若之何而欵故又遲遲者累月屢進而屢趦趄然是學不可一日廢而見賢之心油然動於中終有不容遏且人生聚散不可期幸與賢者並世而生而邂逅又如此其宻邇人未有拒我之形我逆為之辭以自止是果於自暴自棄者也况先生以道學為天下宗師既不得盛行於時猶當私淑於後樂育善誘循循不倦夫豈以鄙夫互童而遽棄之然公庭不敢私請輒冒昧先此導意併録舊日自警之章列於别幅以為贄先生儻以為可教而進之俾獲預罏錘之末稍不失為君子之歸是所願望若不遇焉則亦命也安愚分退守窮廬只遥望門牆以自考而已敬恭俟命不備與黄寺丞直卿某僻處南陬與同門朋友聲問不相接孤陋寡聞惟謹守師訓而已鄉閭諸老在師門者皆已零落在後進輩又絶無此志可誘掖以嗣音惟鄰郡泉莆間却稍有信向相從講貫者庶幾或有一二可望去嵗以特試來中都四方才俊所萃有平昔同門未相識者多得會面然亦所造不齊難得見明而守剛者既而趙計院季仁拉宿書院近三月日頗得與諸友會聚及道嚴陵又為鄭寺丞留郡庠與諸生切磨兩月而歸大抵世上一派禪學年來頗旺於江浙間士夫之有志者多堕其中而嚴尤甚及聴某講説旬月後士方多有警發知聖門實學之所以然而覺邪正二路之由分亦有一二後進未雜可敬兹因參注再至中染未必果能渙然一於改聴易慮則此道在天地間誠可謂凜凜孤立而邪説陂行之惑人心乃如彼其昌熾識者深為之隠憂何時得天開日明然則挽回狂瀾而注之東者獨惟吾兄是賴聞在安慶頗得行志繼聞與時扞格而歸世道之至微在君子自是難於有行且退處里閭為一世之師範蓋随其才質而成就之使師道之傳得以有光然亦未必為無補也與朱寺正敬之某春間經仙里少欵誨諭不勝欣慰别後途中節被脚子撓竟不克入三山與黄寺丞相聚二月末抵家幸爾善適皆庇之及繼得潮陽郭子從寄示先生行狀後段印本不書姓名想是直卿之筆鋪敘得大意頗出甚穏貼然亦有小小造語立字未安處不知前段如何又不得本子如云正統有歸恐只宜作全體有在又如秋霜處恐尚欠温和一節又如有功天下後世處恐欠集諸儒大成底意又如天文地理樂律兵機等𩔖皆吾道中之事自己本分著工夫所以明明徳體用之全止至善精微之極底意思所係不可得而精粗者今乃結上文以道徳光明俊偉如此却分析此節離為二截似出道徳之外不相管屬大抵先生之教所喫𦂳為人至切至要處最是就下學上極著工夫凡上達底妙道精義須從人事千條萬緒中串過來極是著實更無一㸃懸空底意極是縝宻亦無一㸃疎濶底意恐不必如此分開了失其㫖矣又如碑記等文多亦只是發明此理不可與騷賦等文别作一等看蓋理明義精詣極造到自無所往而不通無所發而不當非可拘拘以常迹分别也凡此𩔖文當修刮純粹無病方為盡善盡美不審台意以為何如推官陳伯澡先生沂陳沂字伯澡仙遊人曽祖吉老通春秋三傳學孫吳兵法累有戰功卒陷陣死詔褒忠節祖希造年十六被虜至北庭後乗間歸侍父官臨汀亦以戰沒贈承事郎父光祖少而篤學以明理力行為務北溪陳淳每稱曰世徳吾益友也以父死事補官知英徳縣徳行政事皆有尺律積官朝奉郎沂以父䕃補官調新州推官與太守争死獄竟獲譴罷去自弱冠侍父官南遊始篤志文公之學徧參劉爚廖徳明李方子楊至諸先生之門而陳淳又沂終身所卒業者凡一時及門之士皆推沂為嫡嗣繼復受書易於蔡淵蔡沈若陳宓潘柄蔡和劉彌邵蔡模皆其交遊也平日以禮法自将喪祭一遵朱子家禮淳嘗名其書室曰貫齋為之記云曽氏父子之學參也由貫以達一㸃也游心於一而不必實以貫伯澡始慕㸃名沂今復以貫名齋以上達為髙覺㸃之病而欲參之下學以實之予嘉其立志之審而用功之有序也道南源委載光祖師事陳北溪黄氏海道南統緒辨之謂光祖與北溪友子沂師事北溪今從黄氏改本仙遊志閩書道南統緒州判黄京父先生必昌黄必昌字京父晉江人嘉定十年進士判循州故從陳淳學又切磋於陳宓潘柄二賢有中庸大學講稾閩書鄉貢江先生與權江與權惠安人與黄以翼從學蔡和及陳淳為文古雅兩預鄉貢卓廷瑞先生琮卓琮字廷瑞同安人郡志作永春人從陳北溪游嗜學堅苦以累成功凡所講論能暢北溪之㫖黄宗台先生以翼黄以翼字宗台永春人嘗受業陳北溪蔡白石之門莊毅有立析理精詣暮年記問益富所著有周易禮説道南源委進士王先生稼王稼晉江人清源文獻載公端平二年進士從遊北溪之門其敘北溪字義云郡庠刋西山讀書記成學者争誦之博士葉君病其條目浩穰後進無所從入也曰使西山猶在能無如司馬公作舉要以振通鑑綱領乎稼因以北溪先生字義為告君喜即鋟梓以傳同志初先生講道於稼家塾誨人以辨析名義為急候其體認精實然後随扣大小從容盡其義此書蓋心法也族父雋筆授而成後十年蘇君思恭始出以諗復齋陳公為之敘時讀書行於印圈契合出於一人學者有能即是以求道之指要使吾胸中衡尺不亂然後從一以會萬詳説而反約讀書記一篇貫串無餘藴矣此二先生之盛心而葉君惠教之志也夫河圖八卦洛書九章相為表裏經緯理之自然固不相謀而相合哉芒芒禹甸将皆車轍馬跡問津前塗獨不賴司南之車乎覽者其深味之清源文獻北溪字義序漕舉蔡國賢先生逢甲蔡逢甲字國賢臨漳人父希稷兵部侍郎居官㢘慎公受業陳安卿之門嘗與安卿辨論河圖洛書同異及太極圖西銘之相發明處安卿稱其有特見登咸淳進士詔主廣東漕舉値宋亡不仕自號棄夫作悟道書院於玳瑁山下以終隠焉時髙其誼謂之故宋使公鍵户不出臨沒自題墓碑曰前宋進士蔡逢甲墓著使公講録明儒周公一陽評論同郡先輩謂如公之孤標去首陽不逺而惜其沈冥草澤間世莫有知者子自成以學行名王迪父先生雋王雋字迪父晉江人精敏絶人館陳北溪於家筆授字義行世教授蘇欽父先生思恭蘇思恭字欽父晉江人祖尊己以學行著於鄉公嘉定元年禮部奏名候廷對聞期戚亟歸至辛未始賜第嘗從陳北溪蔡定傑遊篤志朱學踐履堅確除興化軍教授以禮義之實革詞藻之華陳師復諸賢皆推重之調韶州教授有省齋文稿特奏潘叔允先生武以下交友潘武字叔允龍溪人嘉定庚辰特奏名履行端方於書無所不讀與陳北溪為道義交鄉子弟多執經從遊進士趙希流吳仲修皆出其門閩中理學淵源考卷二十八
