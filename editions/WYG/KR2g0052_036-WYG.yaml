body:
  text: 閩中理學淵源考卷三十六廣平府知府李清馥撰温陵傅季謨先生定保學派按宋元間學術派别棼如惟文公之學遞傳不失元代趙公仁甫并姚許竇劉諸公倡明於燕北何王金許衍派於金華二胡一桂炳文定宇陳櫟纂述於新安熊禾陳普林以辨丘葵傳薪於閩海外此若郭公隚歐陽公侊傅公定保盧公琦黄公清老丘公富國鄭公獻翁鄭公杓黄公鎮成練公耒李公學遜吳公海亦皆晦跡甌閩或優游教席或避世杜門確守師說是奮是程若湖湘之際真氏常言淵源最正考仁甫趙公以遺俘北行餘亦寥寥式㣲矣四明之學南渡後宗陸說者多其崇朱子之學者獨黄氏震史氏蒙卿迨元程氏端學端禮亦篤信朱說江右之學如熊氏朋來熊氏良輔董氏真卿亦朱門派的至草廬先生早嵗謹守朱學晚年兼通陸說叙襲朱子舍短集長之論尚非如近世黨同伐異之為也然考公繼魯齋之後為國子師朝議以為非朱學正的有沮之者可見當時持論尤嚴閑道尤謹也噫聖學湮晦毫釐易差諸君子天禀皆出乎等夷而立論稍渉游移者世猶或譏之則夫逈然立異鳴髙與前賢顯䜿幟敵又諸君子所為戒矣今考元一代諸儒學術大抵宗程朱取舍之意雖文學政事各有㫖歸而要皆原本於道徳不謬師承者矣今録其著者載于篇乾隆戊辰七月望後三日書四明之學黄氏溍嘗言祖陸氏而宗楊袁其言朱子之學者自黄氏震史氏䝉卿始按寜波府志史䝉卿傳云先淳熈四君子俱接陸氏象山之傳故四明後學皆以陸氏為宗自黄文潔力崇考亭之訓而䝉卿又能逺接其緒以啟廸後進由是朱子之學盛行於四明教授傅季謨先生定保傅定保字季謨號古直晋江人宋咸淳中禮部奏賦第四知貢舉方逢辰見之驚喜曰閱試文意老於文塲者乃英妙若是時相賈似道沮抑新進未令赴廷試定保歸益力學未幾杭都不守徳祐景炎間屢有諷以仕者皆辭大徳初提學吳濤薦授漳州路學正首以太極圖西銘合而講之聼者悅服改三山書院山長閱三月辭歸授徒養母初環城冡墓皆發於兵傅氏族最蕃定保無論親踈悉封之年五十後始得三子母年九十見諸孫長大至治中以平江路儒學教授致仕其講解能守先儒成說為文温潤典裁定保神暢氣怡與物無競未嘗以非義干人不為矯厲奇絶之行大厯中開奎章閣聘用儒雅學士虞邵菴集將薦之以老疾不可强起中止著有四書講藁及詩文若干卷舊郡志叅新郡志監丞陳衆仲先生旅陳旅字衆仲莆田人父子彦兄震皆一時名士旅幼孤資禀穎異其外大父趙氏學有源委旅得所依於書無所不讀稍長負笈至温陵從鄉先生𫝊公定保游聲名日著用薦為閩海儒學官適中丞馬祖常使泉南一見竒之謂旅曰子館閣器也因相勉游京師既至學士虞邵菴集見所為文慨然曰此所謂我老將休付子斯文者矣即延之館中朝夕相講習自謂得友嘗言曰自衆仲來凡問學修己之事有益於愚陋多矣諸廷臣力薦咸以旅博學多聞宜處師範之選除國子助教滿考諸生為請於朝乞再任元統二年出為江淛儒學副提舉至元四年入為翰林應奉文字至正元年遷國子監丞又二年卒有安雅堂集十三卷虞集為序林泉生稱其學博而通識髙而敏使之裁繁理劇有兼人之能處患制變有濟時之智云閩書道南原委宏簡錄趙先生必暐趙必暐宋宗室家泉州與傅公定保為友其文章議論淵懿浩博為閩南碩儒按泉郡舊志趙必􅋫字伯暐傳末云又有必暐亦宋宗室與𫝊公定保為友今將必暐錄出附傅公交友之後州守盧希韓先生琦學𣲖按先生在元與一時名彦相切劘曽師余氏子賢余稱其經學該貫為人簡重相從十餘年無惰容其所得者深矣先生之經術著作未見藝文志載有圭峰集亦未見余氏子賢疑是三山人俟再考増入州守盧希韓先生琦盧琦字希韓惠安人至正二年進士稍遷知永春縣語具郡志宦跡琦在元末與陳旅林以順林泉生皆以文學為閩中名士少受學於余子賢子賢毎語其友人三山陳忠曰盧希韓經學該貫為人簡重在吾門十餘年不見其有惰容真畏友也及從子賢試浙省子賢道病卒琦不顧試期與其友陳彦博經營大事以歸迨得祿視子賢家如師在時載其弟之官與分廪而食琦僅少忠一嵗每别去見必納拜曰是吾師行君子稱其厚誼嘗以事赴京中道遽還人問其故琦歎曰中原板蕩矣因太息不已晚以近臣薦除守平陽州命下未至而没子杲昺洪武中舉人材得官泉郡志訓導蔡先生復初蔡復初福清人舉明經為書院訓導少從龍江林梅所余大車學易受書又從惠安盧公琦學詩孝友力義琦卒心䘮三年所著有詩銘訓集子仕實見明代科第纂閩書陳先生中立陳中立字誠中莆田人受經於惠安盧公琦以文學著稱作廟建學以教鄉人祀艾軒晦菴夾漈三先生奉盧公主配之日陳經傳為學者剖析宋文憲濓銘其墓曰維古之世不以位世降俗偷位斯貴貴而無能冠狗􅇾豈若夫君賤為庶居家孝友推以義闢廬建學躬訓涖鄉髦如雲聆且肄少長齗齗𩔖洙泗化嚚為良暴更懿醇儒為功斯小試陳子信諸先生學派温陵在元初忠義道徳之英遭蒲賊之難澌滅盡矣然世家舊學抱所藴而托處山澤者尚有可考自延祐後科目方行衣冠襲起克自振勵者亦多晦迹於山長一席溯其秉禮守義之規風流世守出處進退皆足以光史册而炳日星今𩔖次諸賢如莊氏圭復之在元諸葛氏晉王氏彚之在明誠確乎其不可㧞者矣貞士陳子信先生士麟陳士麟字子信南安人性喜學多所周通老宿弗逮毎取諸葛武侯吾心如秤不能為人輕重之言以自儆所居在縣之烏石山種稻盈郊樹桑環宅市書課兒釀酒延客或適意漁獵放浪藪澤間病革囑其子同曰平生慕古今且不起䘮事依禮慎毋用二氏非親知不受弔踰月而𦵏題云有元貞士烏石陳公之墓閩書訓導莊元振先生震孫莊震孫字元振晉江人莊夏之元孫元末薦授郡訓導清源文録徴士莊容齋先生圭復莊圭復字生道號容齋思齊之子晉江青陽人篤志勵行以文學名少從遊於丘葵值宋季流亂手未嘗釋卷誠信孝友建祠宇立祭田宋亡隠於青陽吟咏自如至順間福建閩海道知事清江范梈以圭學行聞於朝詔書屢下終不起年九十一卒於家何鏡山撰莊氏族譜序新志節張廷芳撰墓志蒲先生仲昭蒲仲昭晉江人祖心泉故梅州守察宋國危遂隠身讀書遺詩若干卷劉克莊序之丘釣磯有輓心泉蒲處士詩仲昭既世其業而游居于泉以詩鳴者陳衆仲阮信道王元翰仲昭或師或友皆兼所長叅政王先生彚王彚邵陽人曽祖元為元翰林學士卒贈潞公彚登至正庚辰進士歴貴州行省叅政順帝時言天下羣盗蜂起直諌内廷之非權臣阿實克布哈譛以忤㫖取譴入泉與學士稍講經義朝野交薦固辭不往遂家於泉中閩書檢校諸葛仲昭先生晉諸葛晉字仲昭晉江人以明經授福建行省檢校兵興省檄分治尤溪縣鋤艾豪強有亷能稱境頼保障邑有朱子毓秀舊址後為書院年久没入豪家晉訪復之既成書院池中産瑞蓮二芝草五明興徴聘不仕坐以前代故官謫徙潁上遂卒於潁年七十六子珤杜門飬志娱心經史學正許豹山先生汝翊許汝翊號豹山晉江人大徳十一年鄉舉經術湛深文學該貫授本州學正士服其教年八十致仕所著有孝經析義訓辭全書泉郡新志文苑清漳諸先生學派按清漳為閩山川之極南清淑之氣鍾焉自朱子過化之後王東湖陳北溪親承㫖授講習而丕振之始焉崇尚佛老即變為禮樂之區故朱子有五百年逃墨歸儒之語也元代明卿諸賢一時斌斌儒林之選其隠身岩穴或以薦舉而膺師儒之任者比比矣兹擇其著者載於篇經歴林明卿先生廣發林廣發字明卿龍溪人别號三溪嘗謂陳安卿號北溪髙彦先號東溪蔡汝作號南溪而已號三溪將兼而匹焉生平孝友規言矩行通貫六籍融㑹百氏郡學三聘為諸生師以部使薦授安溪學職邑僚師事之㑹㓂作奉府檄招降授以縣主簿仍謀軍府事每俘至委訊輒曰此平民也府帥問曷辨曰獲於巢穴者為賊捕於井里者為民此皆自井里得之自是俘至多免死陞福建屯田萬戸府經歴所著有三溪集傳世子唐臣見明代後改民弼閩書通志學正王先生吉才王吉才龍溪人篤志古道尤明典禮郡守延為弟子師後為泉州學正吉才親終皆及期耄而已老矣哀慕痛毁有如早䘮雖在家庭亦冠衣斂容人未嘗見其遽言怒色學者稱為益齋先生閩書學正黄君翊先生元淵黄元淵字君翊龍溪人父進本縣學諭元淵至正中薦知漳州路學錄秩滿陞泉州路學正卒郡有朱文公祠宋守方耒所建至元其地為寺元淵自出私錢買城東北隅地别建之作大成殿以祀先聖先賢作祀堂祀文公以黄幹陳淳配别作講堂齋舎處師弟子天厯四年告成至順三年國子助教陳旅告學士虞集曰捐家業以為浮屠老子之宫求福利益者世不勝數元淵觀鄉邦之寥寂慨斯文之冺墜節衣食之資以成義舉書院成而家已貧矣君子其有取於斯乎公其為之記閩書文學周于一先生祐周祐字于一龍溪人能古文詞有僉事左姓者督師漳南祐作邊臣近鑑以獻左曰史才也薦為同安文學進其書于朝以備國史編錄至正七年與門人林弼同舉省闈祐第一楊宗璉先生稷楊稷字宗璉長泰人資性髙雅好古慕學隠遯不仕至正間邑庠缺官令林斡爾聘攝學事振文風變習尚以義理行誼為教士習一新所著有田家樂歌傳于世歌曰田家樂田家樂樂在堯天事耕鑿大兒北壠種白雲小兒南澗飲黄犢婦姑辛苦課蠶桑深夜寒機響茅屋衣食餘饒稅早輸吏不到門犬睡足有時客至問起居啄黍雞肥新醸熟三杯酒後更髙歌盡是田家太平曲延平曹伯大諸先生學派元代科目至仁宗延祐間始酌舊制行之諸賢或以科第顯或以隠佚終砥行立名皆有足稱􅘦之羅李前徽淵源尤可接云兹錄其概著于篇判官曹伯大先生道振曹道振字伯大沙縣人進士第除福州路判官博學通經至正間嘗編次羅仲素文集為十八卷延平府志處士郭先生居敬郭居敬尤溪人博學事親歡順親沒哀毁盡禮嘗摭虞舜而下二十四人孝行之概序而繋之以詩用訓童蒙時虞集歐陽元欲薦于朝居敬牢譲不起終身隐于小村以處士卒判官張在中先生本張本字在中將樂人元統元年㑹試以蒲輪賦得髙選登進士第官至寜都州判官延平府志虞先生真翁虞真翁尤溪人至正間隠南溪山樂道自守不求聞達客非其𩔖不與接遇知書者相對竟日叅訂所疑縣尹許惟敬深加禮重邑志閩中理學淵源考卷三十六
