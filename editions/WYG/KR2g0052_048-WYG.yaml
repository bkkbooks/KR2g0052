body:
  text: 閩中理學淵源考卷四十八廣平府知府李清馥撰福清葉氏家世學派福清在宋王信伯先生開河洛宗派厥後傳之綱山陳氏亦之陳氏藻林氏希逸是此邦實文獻之區也明代葉良時先生以師儒夙學啟迪後嗣為一代元勲碩徳其立論持躬誘掖後進葢祖洛閩而確守鄉先正之遺者明季彼時學術波靡文忠實負荷其責其培植善𩔖扶持正學與吾郡李文節何鏡山諸公相徃復實一時中流砥柱矣贈公葉良時先生朝榮葉朝榮字良時福清人應隆慶改元恩貢授九江通判潔已䘏民負逋畢登佐𣙜闗秋毫不染免商緡無算䑓使者賢之令攝瑞昌令有䟽河功再攝彭澤有修城功擢知養利州築城建學鑿塘墾田暇則與諸生談説經術州俗一新卒之日書卷數函衣裳數襲而已士民立祠祀之生平淡薄勤苦惟讀書窮理為務四書五經性理綱鑑黙誦如流至老無一字遺忘尤精於詩自言吾説詩不在文字於治亂興衰之故燦若指掌五經奥義具在其中茍有用我舉此可行也四方執經者如雲所著有詩經存固四書述訓芝堂藁行世子向髙通志閩書道南源委文忠葉進卿先生向髙葉向髙字進卿福清人朝榮子萬厯十一年進士選庶吉士授編修遷南京國子司業旋領祭酒事士𩔖咸服二十六年召為左庶子充皇長子侍班官礦税横行民不堪命向髙上䟽引東漢西邸聚錢事為鑑不報尋擢南京禮部右侍郎久之改吏部再陳礦税之害又請罷税監髙淮語皆切至妖書獄興移書沈一貫力諌一貫不悦以故滯南京九年後一貫罷沈鯉亦去朱賡獨當國神宗命増閣臣三十五年擢禮部尚書兼東閣大學士與王錫爵于慎行李廷機並命十一月向髙入朝慎行已先卒錫爵堅辭不出明年首輔賡卒次輔廷機為人所論劾久杜門不入直向髙遂獨相者八年當是時神宗在位日久倦勤朝事多廢弛大寮或空署士大夫推擇遷轉之命往往不下上下乖隔謫籍永錮邉餉靳發廷臣部黨勢漸成而中貴人𣙜税開礦四出大為民害向髙用宿望居相位憂國奉公每事執爭効忠藎帝心重向髙禮貌優厚然其言大抵格不用所救正十二三而已其大者鄭貴妃嬖生福王已受封久不之國而光宗日在危疑京師奸人王日乾與亡頼人孔學訟刑部因訐奏孔學受鄭貴妃㫖咀咒聖母皇上擁戴福王謀害東宫向髙聞之具宻掲言貴妃賢明福王賢孝萬萬無此乃奸人所為當静處之一為所動即中外紛擾其禍將大神宗初覧日乾䟽拍案震怒沉吟曰有此大事如何閣臣無一言左右乃以向髙掲進神宗始寛霽次日向髙復勸無發此䟽發則上驚聖母下怖東宫貴妃福王皆不自安湏速定福王之國吉期以息羣喙又為宛轉撑拄承間勸行久之福王始之國皇太子益安向髙力也向髙嘗上䟽言今天下必亂必危之道葢有數端而災傷冦盗物怪人妖不與焉廊廟空虚一也上下否隔二也士大夫好勝喜爭三也多藏厚積必有悖出之釁四也風聲氣習日趨日下莫可挽回五也非陛下奮然振作簡任老成布列朝署取積年廢弛政事一舉新之恐宗社之憂即在廟堂之上其言痛切神宗知其忠愛不能行向髙又言臣屢求去輙蒙恩諭留顧臣不在一身去留而在國家治亂今天下所在災傷死亡畿輔中州齊魯流移載道加中外空虚人才俱盡一旦禍作天下必不罪他人而專罪臣臣何可不去且陛下用臣則當行其言今章奏不發大僚不補起廢不行臣㣲誠不能上逹留何益誠用臣言不徒糜臣身臣溘先朝露有餘幸矣上不省京師大水四方多奏水旱向髙又言自閣臣至九卿䑓省曹署皆空南都九卿亦止存其二天下方靣大吏去秋至今未嘗用一人今人心洶洶思亂特未發耳陛下萬事俱不理以為天下長如此臣恐一發不可收也上亦不省神宗在位四十年之春向髙以歴代帝王享國四十年以上者自三代迄今止十君勸上力行新政因復以用人行政請亦不報向髙志不行無月不求去神宗輙優㫖勉留向髙復言臣進退可置不問而百僚必不可盡空䑓諫必不可盡廢諸方廵按必不可不代中外離心輦轂肘腋間怨聲憤盈禍㡬不測臣方憂陛下孤危而陛下閉塞愈深務與臣下隔絶帷幄不得闗其忠六曹不得舉其職舉天下無一可信之人臣恐自古聖帝明王無此法也四十二年二月皇太后崩向髙乞歸益數章十餘上神宗勉從之加少師兼太子太師遣行人䕶歸向髙在相位務調劑羣情輯和異同然其時黨論已大起未幾又爭李三才之事黨勢乃成向髙嘗右東林時目為黨魁云向髙歸里六年神宗崩光宗立特詔召還未幾熹宗立復賜勅􅃐之屢辭不得命天啟元年十月還朝復為首輔熹宗初政羣賢滿朝天下欣欣望治然熹宗不能辨忠佞魏忠賢客氏漸竊威福時左都御史鄒元標副都御史馮從吾以書院講學為兩給事所訐帝傳諭欲毁書院者屢向髙言講學之禁從古未有言者動謂宗室禍敗皆由講學不思有宋盛時正以濓洛闗閩講明學術比及王淮韓侂胄陳賈輩始立偽學名目搆䧟朱熹諸賢而宋祚遂終太祖設科取士一本宋儒成祖又令儒臣採輯宋儒論學之書為性理大全頒行學宫二百六十餘年一道同風一切决裂防維之事皆有所忌憚而不敢為皇上何輕聽二臣之言而有道學之禁臣為執政而諸儒臣聨翩去國天下後世清議謂何且將與王淮輩同被惡名乞與元標從吾同去熹宗不許向髙為人光明忠厚有徳量好扶植善𩔖再入相事冲主奄人逞煬竈奸時事日非向髙亦稍刓方為圓不能謇直如神宗時然猶數有匡救其後都御史楊漣劾忠賢二十四大罪向髙謂事且决裂深以為非廷臣相繼抗章至數十上或勸向髙下其事可决勝也向髙念忠賢未易除閣臣從中挽回猶冀無大禍乃具奏稱朝廷寵待忠賢厚盛滿難居宜解事權聽歸私第保全終始忠賢不悦猶以外廷勢盛未敢加害其黨有導以興大獄者意遂决内竊國柄日廷杖諸臣而向髙以時事不可為求去决矣上不得已從之加恩以行葢此時求去之䟽又先後六十餘上也是為天啟五年向髙既去韓爌朱國禎相繼為首輔未久皆罷居政府者皆小人清流無所依倚忠賢首誣殺漣光斗等次第戮辱貶削朝士之異己者善類為之一空向髙坦直夷易在朝不以城府待士大夫所建言無非欲破士大夫黨比之習家居布衣徒步與田夫樵牧相應答為文明白條暢遇佳山水意興勃生神韻散朗一似神仙中人平生見講學之人皆空談無實故絶口不道而心實嚮慕之嘗與鄒公元標言公講學必講孔孟而余第講閻羅鄒問故向髙曰不佞老矣填溝壑日近若有欺君傷人害物等事於閻羅殿前對勘不過皆不敢為鄒曰如此則何公之非孔孟也天啟六年卒年六十有九崇禎初謚文忠明史言閩書明臣行錄通志翁氏家世學派按明季三山派系翁氏懋卿葉氏良時皆以正學倡教啟佑後人其最表著者餘俟再考訂續補焉運判翁懋卿先生興賢翁興賢字懋卿侯官人萬厯初以貢司訓建陽歴延平教授與諸生談經講業一禀宋儒傳註遷兩浙運判乞歸著有易經理解十二卷通志文苑文簡翁兆震先生正春翁正春字兆震侯官人父興賢以貢士起家建陽教諭歴兩浙運判粹於易學正春久不得志於㑹塲已謁授龍溪教諭矣大比之年郡太守夢明嵗狀元出龍溪勸駕焉萬厯壬辰廷對第一明代狀元及第典史則曹公鼐廣文則正春無兩也授翰林修撰分校㑹闈主試京省得士最多歴官禮部尚書㑹都御史楊漣䟽論厰璫魏忠賢正春率詹事府僚彈治之辭甚激烈璫矯㫖切責正春隨乞終養歸天啟末起原官尋卒崇禎初諡文簡正春方毅嚴重不妄言笑與人談終日無一狎語為人贍麗典重朝端式其風采知其榘律君子也閩書通志方汝典先生仲䕫學派方汝典先生仲􅇪方仲䕫字汝典侯官人勤修力學教授生徒同時有諸生莊修字治三葉履春字端卿鄭大紳字近吾李時建字行甫趙鐸字孟覺何斌字徳觀楊玉樹字承謨戴穆夫字古度孝亷鄧夀朋字戒從學博王叔俊字升之鄧景卿字叔表俱閩縣人諸生洪勲字孟功郭宗禹字不伐陳秉誠字心源俱侯官縣人皆積學砥行北靣授經後多貴顯云通志天啟以後諸先生學派副使曹能始先生學佺曹學佺字能始侯官人弱冠舉萬厯二十三年進士授户部主事中察典調南京添注大理左寺正居冗散七年肆力於學累遷南京户部郎中四川右恭政按察使蜀府燬於火估修資七十萬金學佺以宗藩條例却之又中察典議調天啟二年起廣西右叅議初挺擊獄興劉廷元輩主瘋癲學佺著野史紀畧直書事本末至六年秋學佺遷陕西副使未行而廷元附魏忠賢大幸乃劾學佺私撰野史淆亂國章遂削籍燬所鏤版廵按御史王政新以嘗薦學佺亦勒閒住廣西大吏揣學佺必得重禍羈留以待已知忠賢無意殺之乃得釋還崇禎初起廣西副使力辭不就家居二十年著書所居石倉園中為石倉十二代詩選盛行於世子白字子章為經生以經學名明史縣令林元圃先生先春林先春字元圃閩縣人天啟五年進士令嘉善狷介自持無一毫茍取任三年撫按交薦亷能擢科員丁艱歸先是嘉善民顧朝衡以不孝聞先春捕治之朝衡脱身至京師投權璫又因籍没魏大中一案先春多忤權璫意遂嗾其黨考功吏以死註冊服闋赴補知為所陷或勸之自白先春不辨而歸先春居家聚徒講學布衣蔬食杜門不出年八十餘終著有易象叅洪範孝經解孟畧等書通志縣令黄維章先生文煥黄文煥字維章永福人天啟五年進士為文淹博無涯涘歴知海陽番禺山陽三縣皆有聲崇禎召試擢翰林院編修時黄道周以論楊嗣昌陳新甲得罪逮問詞連文煥遂與道周同下詔獄獄中箋註楚詞聼直八卷陶詩析義二卷既釋獄乞身歸里著有四書詩經琅環毛詩箋易釋書繹老莊註陶杜詩註秦漢文評漢詩審索詩經考通志齊望子先生莊齊莊字望子閩縣人居齊坑嗜學家貧為人夜舂手足操作而置書其旁注視之遂通㑹曉悉無遺以五經為諸生當萬厯末年閩中文體漸尚軋茁天啟初愈甚莊原本六經不稍雜縱横家言每出筆根極理要情文亹然衡文者無不以國士相賞從游嘗數百人經指示輙掇科第而去而莊栖遲窮巷自甘貧賤者三十年無幾㣲無聊不平之况在其意中著有史論白湖集新福州府志舎人鄭敬生先生羽儀鄭羽儀字敬生閩縣人崇禎十六年進士授中書舍人典試粤中著有戴禮新㫖行世通志進士嚴白海先生通嚴通字白海福清人父蚤喪其母令負布縷帛行鬻市中民部鄭廷楫時為塾師一見異之令白其母就學後登崇禎癸未進士著有白漁集藍閣逸纂春秋箋十餘卷通志閩中理學淵源考卷四十八
