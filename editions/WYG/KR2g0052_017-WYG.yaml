body:
  text: 閩中理學淵源考卷十七廣平府知府李清馥撰朱子福州門人并交友按三山宋初諸賢踵起於時海濵四先生為之倡而劉氏執中陳氏祥道亦皆以經學名家嗣是洛學興王氏信伯親承指授林氏少穎亦師溯同源至紫陽文公丕振道南統緒共推及門髙弟者勉齋黄氏一人而已至若陳北溪潘𤓰山林正卿林子武諸公皆粹然正學淵源由是師法遞習家傳戸誦步仰宗風燦日月而沛江河矣文清鄭景紹先生昭先鄭昭先字景紹閩縣人淳熙十四年進士初授浦城主簿自以未嘗學問乃游朱子之門居官有惠政秩滿之京謁丞相葛邲邲曰君浦城鄭主簿耶擊賊不受賞吾聞君名久矣擢知歸安邑民愛之累官諫議大夫知樞密院事兼叅知政事進右丞相辭不拜卒之夕有大星墜於故室諡曰文清昭先立朝累有奏疏言皆切直在政府沈厚鎮静以愛䕶人才振拔淹滯為己任景獻太子薨議建儲昭先請以仁宗為法上意乃決會旱災求言同列有欲罪上書過直者昭先曰以直言求人乃以言直而罪之耶所著有日湖遺稾五十卷真西山序其文曰公天資寛洪而養以静厚平居怡然自適未嘗見忿厲之容於書無所不讀而又喜聞義理之説故其文章不事刻畫而敷腴豐衍似其為人開禧初某將試詞學科見遺以詩所期甚逺蓋其辱知也舊矣通志道南源委真文忠公集修撰陳北山先生孔碩兄孔夙陳孔碩字膚仲侯官人祖禧父衡皆為朱子所推重孔碩刻志力學好古道以聖賢自期嘗從張南軒吕東萊游東萊死心喪三年後復偕其兄孔夙從學朱子於武夷甚見器重蓋孔碩能於心性上致力故朱子嘗貽書云婺州朋友専事聞見而於自己身心全無功夫彼陸學固有似禪處每勸學者兼取其善云又朱子荅孔碩書云所謂涵養也只要應事接物處之不失此心各得其理而已亦即學規之意蓋勗之也登淳熙二年進士歴處州教授以所聞於三先生者誘進後學多所成就知邵武瑞金二縣除吏部駕閣累遷将作監丞禮部郎中知惠州提舉淮東常平所至有古良吏風嘉定間金人來襲遣子韡募死士合監軍擊破之移曹廣西後丐祠主千秋鴻禧觀累召不起進秘閣修撰年幾八十以眉夀終以子韡貴贈太子太師孔碩素性嚴毅沈静有守利禄不動其心出入中外垂二十年不肯少變所守在朝數忤史彌逺而與楊澹軒葉水心友善著有中庸大學解北山集三十卷行於世學者稱北山先生西山真氏跋其帖稱其辭章翰墨為近世第一兄孔夙慶元五年進士按吕東萊先生在淳熙八年沒時朱子年五十二矣北山從學於吕方從朱門疑在八年後是為中嵗後及門者又朱子與陳膚仲第三書論科舉之學謂近年飜弄得鬼怪百出都無誠實正當意思一味穿穴旁支曲徑以為新奇最是永嘉浮偽纎巧不美尤甚而後生輩多宗師之此是今日莫大之弊今欲革之莫若取三十年前渾厚純正明白俊偉之文誦以為法此亦正人心作士氣之一事也又云大學近修得益精密平實易啟䝉太極西銘通書解義學記諸書各一本云云考之年譜淳熙十五年始出太極通書西銘解義以授學者則此書論科舉之弊年正五十九已是暮年而彼時運會士風亦遞變矣道南源委林擇之先生用中弟允中林用中字擇之號東屏古田人始從林艾軒光朝學後登文公之門與建安蔡季通齊名文公每稱為畏友嘗與何叔京書曰擇之在此討論其人操履甚謹思索愈精大有所益張敬夫帥湖南文公偕用中往訪之聚首年餘有南嶽倡酬集用中早厭科舉業不求仕進石􅗐宰尤溪延掌學政僅為一往士民率化而頑傲者亦莫不翕服趙汝愚帥閩日過其門訪以政事邑宰洪天錫表其門曰通徳學者稱草堂先生著有草堂集林允中字擴之用中弟亦受業朱子之門文公稱其外晦内明外樸内敏三山新志閩書按黄氏海道南統緒辨正林用中為慶元之特科考三山選舉志亦同再按朱子大全集於乾道二年撰林用中擇之字序似初見先生者時朱子年方三十七三年往長沙即令侍行是時延平先生初沒文公方討論中和之㫖集中前後與擇之往復并别集數札多闡道微言再按朱子與林師魯書云去年林擇之不鄙過門以講學為事怪其温厚警敏知所用心皆如老於學者因扣其師友淵源所自則得三人者焉曰程深父曰林熙之而其一人則芸齋公之子師魯云又與擇之書云某奉養粗安舊學不敢廢得擴之朝夕議論相助為多又曰某憂苦如昨至節復不逺痛割不自堪幸朋友不鄙棄責以講習怱怱度日且復支持耳擴之來此相聚極有益其専志苦學非流輩所及但於展拓處終未甚滿人意耳又曰講學之功比舊却覺稍有寸進以此知初學得些静中工夫亦為助不少尚恨未免泛然應接不得専一於此耳讀數札似乾道間往復者又與何叔京書云今年有古田林君擇之者在此相輿講學大有所益區區稍知復加激厲此公之力為多也數書皆有奉親遣日之語疑在乾道五年以前之札擇之及門與何叔京皆相先後林魯山先生師魯林師魯别字魯山古田人朱子門人其父與韋齋公友善朱子跋其遺文云先君子志尚髙潔不妄與人交蓋嘗避地福之古田得芸齋林公而與之游愛其學識行誼有以過人而惜其且将湮沒無聞於世也及仕於朝為之延譽甚力然竟不及試用識者恨之某侍側久聞大略近得其臨終手書數十百言戒其家無用浮屠法然後知其所學之純所守之固見於死生之際又如此云師魯品行純篤講學得朱子遺規林用中師事之按芸齋為師魯先生父别號也其名未詳芸谷似為師魯號嘗考朱子别集乾道五年祭林芸谷師魯文云昔先君與芸齋先生遊而吾師魯又不鄙其愚嘗不逺數百里遇我於潭溪之上蓋將從容講學以進於斯道云又朱子跋芸齋遺文稱師魯為魯山又與林熙之書曰惜師魯美才髙志未克有成朋從零落道學寡助云林丕顯先生謩林謩字丕顯連江人始與吕東萊師事林之竒為同舍生而年又長於東萊及東萊講學授徒謩竟屈首受業東萊曰此閩中瑞物也後叅謁朱子以乏資且老不得時見聞鄉人有從朱子學者輒造門扣問無論晚輩郡文學以禮延致之數日而歸曰向者違親而赴金華為道故也今又安能舍親為人耶凡訓誨諸生必舉其立志用力者勉焉道南源委余占之先生隅余隅字占之古田人朱文公髙弟學問警敏與林用中齊名吕東萊黄勉齋相與往來講明義理著有克齋文集按朱子别集答林擇之書云二余在此日久占之警敏彞孫淳静皆可喜但亦未敢與說向上去恐别生病云又書中有云尢溪學記及克齋記按年月在乾道八年九年撰時文公年方四十三四此書自是九年以後則屬淳熙改元之嵗矣二人似早及門者林熙之先生大春林大春字熙之古田人朱子門人嘗題十六字云仲尼再思曽子三省予何人也敢不修整號慥齋家世宗尚理學子孫以文行世其家朱子曽贈之詩曰君行往返一千里過我屏山山下村濁酒寒燈静相對論心直欲到忘言仁體難明君所疑欲求直截轉支離聖言妙藴無窮意涵泳從容只自知天理生來本不窮要從知覺騐流通若知體用元無間始笑前來説異同十年燈火與君同誰道年來西復東不學世情雲雨手從教人事馬牛風三山新志朱子大全集司法蒋彦禮先生康國蒋康國字彦禮古田人紹興三十七年進士嘗從朱文公講論文公楚詞集解多資之官饒州司法學者稱鼎山先生道南源委助教鄭惟任先生申之鄭申之字惟任長樂人乾道五年進士國子監助教朱子避偽學禁至長樂申之從之遊教授於鄉及門甚衆立文行忠信四齋以處之朱子扁其所居樓曰聚逺三山新志文定鄭信之先生性之鄭性之字信之侯官人弱冠遊朱文公之門嘉定元年進士第一授平江軍節度判官召對以聖學教太子為先除秘書正字輪對乞强國勢宜専大帥之權久邊守之任至萬餘言累遷知袁州召入言執政出一言侍從之臣間有忠憤不然者則立中傷之使人人箝口此非國勢之福時東宫虚位乞早定大計寧宗嘉其請後知贛州改知隆興府以寶章閣待制提舉玉隆萬夀宫進文華閣待制提舉上清太平宫進敷文閣待制知建寧府端平元年召為吏部侍郎入對言陛下比者大開言路以通塞蔽諸臣心茍愛君誰不欲言言不切直何能感動譬如積水久壅一決其勢必盛其聲必激故言者多則易於取厭言之激則難於樂受若少有厭倦動於詞色則讒諂乗間或不自知所奏凡二千餘言擢左諫議大夫言臺臣交章互詆願陛下鑑古今天下安危之變君子小人消長之機公以處之若有闗國體有補治道有益主徳言之過激夫亦何傷拜端明殿學士簽書樞密院事累知樞密院事兼叅知政事加觀文殿學士致仕寶祐二年卒諡文定性之所至為民去害就利尤務崇化厚俗民有骨肉爭訟者輒曉諭諄切不事刑威立朝正直忠厚無所附麗有端平奏議及與陳均同修宋編年備要行於世閩書志考亭淵源録山新通志三曽誠叟先生逢震曽逢震字誠叟閩縣人幼讀書過目成誦慨然有求道志與鄭性之俱從朱文公學恥為塲屋之文胸中渙然洞見道體經史百家無不窺究𨼆居道山家事有無不問也嘗自編録其詩文名月林醜鏡閩書三山新志陳自修先生枅陳枅字自修福州長樂人祖宋霖為同安令與文公為僚友枅因從遊有所録問答道南源委潘立之先生植潘植字立之福州懷安人父滋為林拙齋門徒素務學至老不倦聞鄉閭之善士輒折輩行率其子從之遊後聞晦菴講道武夷遂命植往師事之植遂與其弟柄不逺千里從於武夷植少穎悟讀書不數過輒成誦為文語意雄健流輩推先尤嗜史學自載籍以來上下數千年反覆耽玩其於興亡治亂是非得失之故貫穿出入如指諸掌時方交馳於射䇿決科之習而植與其弟皆以弱冠摳衣有道厲志前修囘視故習若将浼已儕輩至有髙談性理下視程文之誚不顧也家居日以濓洛諸書磨礱浸灌暇則徜徉林壑間以觴咏自娛閨庭之間怡怡如也弟柄見本學派考亭淵源録縣尉林子武先生䕫孫林䕫孫字子武古田人從朱文公遊文公曰子武是有思量的命作堂長嘗與講論一隂一陽之謂道及繼善成性之説又與同邑余隅程若中為心友黨禁起學者懼禍更事他師獨䕫孫與傅定從文公講論不輟文公易簀之際謂之曰道理只是如此且須做堅苦功夫嘉定中特奏名為縣尉有書本義中庸章句并䝉谷集行世丞相江萬里嘗從學為序之閩書源道南源委亭淵録考貢士鄭成叔先生文遹鄭文遹字成叔閩縣人嘉泰甲子貢士幼而聰慧少長刻苦為學口誦手抄昏夜寒暑不輟初治春秋心悟經㫖操筆成文自謂文詞記問未足以為事業及得周程張子之書玩之有得怡然自適聞黄幹得文公之傳遂受業焉幹稱文遹襟度夷曠知識闓爽愛而敬之盡告以所聞嘗語曰成叔茍非其義雖禄之萬鍾而不受人以為信後遂與俱登文公之門交遊皆當世善士文公晚年編集儀禮經傳分畀門人而以喪禮委文遹乃為考經證傳旁通子史引比條律綱目凡例纎悉文公見之大喜曰直卿稱成叔之賢且好學今果然文公歿幹以汲引後學為己任貽書云鄉閭朋友漸知義理者多更賴成叔振拔激昂之使師傳不廢莫大之幸也與同志共立規約大要欲明義利謹操守以厚風俗其事多文遹所定以其素行足以勵衆也文遹深觀黙養玩索益精讀書有未解者危坐終日以思至忘寢食及既得之猶沈潛反覆必極其趣而後已嘗觀周子太極圖而悟孟子性善之㫖本於大易繼善成性之説曰荀揚之徒妄生異論豈知性哉所著有易學啓䝉或問禮記集解喪禮長編有庸齋集遺書凡五十卷考亭淵源録閩書程寶石先生若中程若中字寶石古田人嘉定十六年特奏名從文公學躬行無偽禮度不遺子孫侍側冠服肅然著有槃澗集道南源委山長林正卿先生學蒙弟學履林學䝉字正卿一名羽永福人初從朱子游後卒業於黄勉齋偽學禁起築室龍門菴下講明性命之㫖陳師復守延平作道南書院聘為堂長朔朢設講席執經座下者數百人及師復去任學䝉亦浩然引歸諸生挽留之不可生平識趣髙明文足以發義理行足以激貪懦凡所講論易説朱子皆然之著梅塢集弟學履字安卿亦朱子門人道南源委閩書按朱子語録姓氏林正卿録文公語在紹熙五年甲寅以後所聞時朱子年六十五此為晚嵗從游所聞者其弟學履録語在己未所聞朱子年已七十矣至及門年嵗早暮未詳待考再按真文忠公請三士入尊行堂有雲山鄭先生梅塢林先生信齋楊先生梅塢疑即正卿先生也信齋已見本學派雲山鄭公待考許幼度先生儉許儉字幼度閩清人朱子門人以孝友教家三世不分異丞相鄭性之書孝友扁其堂林羽為之記閩書黄仁卿先生東黄東字仁卿閩縣人按朱子與仁卿書略云所示春秋大㫖甚善此經固當以類例相通然亦先須随事觀理反復涵泳令胸次開濶義理貫通方有意味若便一向如此排定説殺正使在彼分上斷得十分的當却於自己分上都不見得箇從容活絡受用則亦何益於事邪大抵不論看書與日用功夫皆要放開心胸令其平易廣濶方可徐徐旋看道理浸灌培養切忌合下便立己意把捉得太𦂳了即氣象急迫田地陿隘無處著功夫也此非獨是讀書法亦是仁卿分上變化氣質底道理也然看春秋外更誦論孟及看近思録等書以助其趣乃佳若只如此實恐枯燥難見功耳按黄仁卿先生以下諸賢未詳事實今就大全集問答録出亦略得當日求師問學大槩耳餘一二未得全録陳與叔先生夢良陳夢良字與叔長樂人按朱子大全集夢良問云子在川上曰逝者如斯夫不舍晝夜程子曰自漢以來儒者皆不識此義此見聖人之心純亦不已也純亦不已乃天徳也有天徳便可語王道其要只在謹獨竊意其要在謹獨莫是功夫無間斷否答曰川流不息天運也純亦不已聖人之心也謹獨所以為不已學者之事也又問云夫仁者己欲立而立人己欲達而達人能近取譬可謂仁之方也已集注以上一截説仁之體下一截説仁之術而程子於此二截乃合而言曰欲令如是觀仁可以得仁之體答云程子合而言之上下句似不相應不若分做兩截看然惟其仁者之心如此故求仁之術必如此也朱子大全集余彞孫先生範余範字彞孫古田人按朱子大全集範問云有憂有懼者志不勝氣氣反動其心若志立則氣定矣故曰内省不疚夫何憂何懼答曰有憂有懼者内有所慊也自省其内而無所病則心廣體胖而何憂何懼之有夫子之語固已明白完備今以志立氣定為言則是未嘗熟復本文而别生枝節也又問曰文中子曰仁義教之本先生以是繼道徳此先道徳而後仁義之説也答曰此説得之朱子大全集黄升卿先生杲黄杲字升卿閩縣人有辛亥問答唐先生唐􅁮閩縣人蕭先生長夫蕭長夫閩縣人林先生充之林充之古田人林先生好古林好古古田人程先生深父程深父古田人林先生仁實林仁實永福人陳彦忠先生士直陳士直字彦忠閩清人按彦忠先生為朱子門徒僅見姓氏馥家藏先公所遺朱子墨蹟一軸書贈人詩一首後云考亭朱某題贈門人彦忠彦孝昆玉同榜登第其詩云秋闈春榜兩同年昆玉連登豈偶然青領乍辭芹泮路緑袍新醉鳯池筵東南文運今方盛虞典人才古獨先忝我師儒真不負長歌喜極為重編此書為贈彦忠彦孝昆玉二人登第而不繫姓考閩中只三山志有陳正直字彦忠又不列選舉且彦孝亦不著姓名至他省諸門徒無從尋訪今姑附陳氏士直姓氏籍貫下至其詩之真否待共訂之其字蹟筆畫用草筆寫就與文公平昔刻本翰墨似若一轍謹識疑於後云再考朱子大全續集有與葉彦忠一札三段論易傳并屬校學疑亦門人之列未知孰是待再考秘監陳元雩先生宋霖以下交友陳宋霖字元雩一字元滂長樂人登紹興五年進士知同安日適朱子為簿日與講明經義朱子稱其能躬行實踐後陞秘監書問往來不絶孫枅受業朱子之門當時為朱子所友者又有古田程伯榮沈有開傅子淵三山新志縣丞鄧楚材先生林鄧林字楚材福清人年十五以詩義魁鄉校淳熙五年進士登第調太和簿一時如陳止齋朱晦菴吕東萊戴少望皆與之游凡三上書極陳朝政時議欲授以中都幹官或曰鄧林若在中都此謗議之府也遂改石城丞有虚齋文集行世閩書三山新志程良弼先生伯榮程伯榮字良弼古田人與同邑蘇龜齡沈有開傳子淵皆友於朱子閩書三山新志著作郎鄭自明先生鑑鄭鑑字自明連江人乾道間補太學生扣閽言鞠毬事淳熙初釋褐除太學正入對孝宗謂龔茂良曰鄭鑑議論甚切召試館職對䇿論大臣權倖干政孝宗復深嘉之除校書郎遷著作郎權郎官屢引對言時政為時相所惡遂乞外出知台州陛辭劄七上孝宗為改容及辭東宫太子語之曰前後講論無如侍講直切後卒朱文公祭之文有云偉哉自明凜乎有古争臣之風求之近臣則措之鄒陳之間而無怍者也閩書按經籍考鄭思孝曰先髙祖諱鑑字自明號植齋贅於丞相陳正獻之家遂家於莆事孝宗朝忠藎極諫當時晦菴南軒東萊諸賢深敬之三十嵗釋褐三十八嵗即世今所存者惟易經一部閩中理學淵源考卷十七
