body:
  text: 閩中理學淵源考卷七廣平府知府李清馥撰延平陳氏家世學𣲖按延津楊羅李朱四賢之外私淑程門而與龜山師友者忠肅與黙堂二先生為最著考忠肅先世乃祖為光逺先生世卿父為君舉先生偁皆清宦夙學肇啟後人讀王忠文公蒞泉時咏陳公偁祠詩曰九年地主百年祠民自元豐結去思善政在人宜有後堂堂忠肅見公兒今録自君舉先生而下著於編朝議陳君舉先生偁陳偁字君舉沙縣人以父任補太廟齋郎再調羅源令有惠政調通判蔡州力争死獄五人知惠州州有豐湖税民魚湖廢而税尚存偁堤湖數里時蓄洩魚利歸民奏免其課錢凡五十餘萬民建祠祀焉移治宿州用嚴為治獄空訟息召知開封府屬新法行請外知泉州未幾坐開封府陷失青苗錢罷州人聞之期三日裒錢五十萬償負贖留之改知尉州築堤十里以防皖溪之患元豐五年再知泉州歲旱教民用牛車汲水入東湖溉田舊法番商至必使詣東廣否則没其貨偁請立市舶司于泉哲宗立詔從其議以朝議大夫致仕贈特進子瑗汀州推官珏校書郎瓘見下璣知吉州延平府志忠肅陳瑩中先生瓘學𣲖按紫陽先生每以公與元城忠定劉公並論大抵其志氣相同其才畧亦同也王龜齡梅溪自云丱角讀書聞先生長者之論即知欽慕公之為人宦逰絶嶠獨携温公忠肅二畫像以行其為賢哲所心仰可想矣平生學問私淑程門於龜山在師友之間一時英賢林立講習而服行之其踐履篤實百折不挫稱有體有用之學梅溪列韓范司馬十二名臣以公為殿後云再按龜山先生題李丞相送陳幾叟序謂李公視了翁為前輩雖未嘗從㳺而聲氣相求非一日也問道之勤見於斯文惓惓之意厚矣今特附之交友云忠肅陳瑩中先生瓘陳先生瓘字瑩中號了翁沙縣人偁之子少好讀書不務進取父母强之乃應舉元豐二年甲科第三人調湖州掌書記元祐四年僉書越州判官時蔡卞為越州守察其賢每事加禮而先生輒自逺屢乞歸章不得上檄攝通判明州章惇入相先生隨衆道謁惇聞先生名邀與同舟問當世務先生以所乗舟勢偏輕偏重喻之因問今天子待公為政公將奚先惇曰司馬光奸邪所當先辨耳先生曰公誤矣果爾將失天下之望惇厲色曰司馬獨執朝柄不務纘述先烈大更神考之政誤國如此得非奸邪先生曰不察其心而疑其跡則不為無罪若掲為奸邪重復改作則誤國滋甚為今之計惟當消朋黨持中道庶可捄弊惇意雖忤然亦驚異之留先生共飯而别到闕召為太學博士先生聞其與蔡卞方合知必害於正論遂以婚嫁為辭久乃赴官時羣邪得志卞黨薛昻林自議毁資治通鑑板先生聞之因䇿士題特引神宗序文自驚曰此豈神考親製耶先生曰誰言其非也自曰亦神考少年之文耳先生曰聖人之學得之天性豈有少長之異自以告卞卞乃宻令學中置板髙閣不復敢議毁嘗為别試所主文自謂蔡卞曰聞陳瓘欲盡取史學而黜通經之士意在動搖荆公之學也卞怒謀因此害先生先生固預料其如此乃於前五名悉取用王氏學者卞無以發然五名之下往往皆博洽稽古之士先生嘗曰當時若無矯揉則勢必激壊故隨時所以救時不必取快目前也遷秘書省校書郎紹述之説盛行先生入奏哲宗言堯舜禹皆以粤若稽古為訓粤者考論舊事若者順而行之稽者詳其當否所以成帝王之治帝王之孝與士大夫異帝反覆究問語遂移時意甚感悦令再入見有變更時事之意執政聞而憾之出通判滄州知衛州徽宗即位以韓忠彦薦召為右正言遷左司諌蔡京蔡卞羽翼章惇京復隂結權貴徽宗將有大用之意先生上疏力言先後凡十上末疏言翰林學士承㫖蔡京當紹聖之初兄弟在朝贊導章惇共作威福卞則隂為謀畫惇則私斷力行而京則且謀且行惇之矜伐卞之乖悖京實贊之七年之間擠陷言官常安民孫諤董端逸陳次升鄒浩等五人掩朝廷之耳目成私門之利勢言路既絶人皆鉗黙凡所施行得以自恣遂使當日之所行皆為今日之所蔽遂舉京四事皆天下所譏議者為徽宗言之徽宗以先生所論不根罷右司諌添差揚州糧料院將出都併奏所未上四章尋改知無為軍明年還為著作郎遷右司員外郎兼權給事中宰相曽布屢薦先生于徽宗遣人諭意云將大用先生作書投布兼以日録辨國用須知送布言布尊私史而厭宗廟縁邊費而壊先政二者天下所共知而聖主不得聞其説䝉蔽之患莫大於此布得書大怒争辨移時至箕踞誶語先生色不為動徐曰昔所論者國事是非有公議公未可遽失待士禮布矍然改容先生出即録所與布書及日録辨國用須知録以狀申三省乞行竄逐信宿出知泰州崇寧中除名竄袁亷二州五年遇赦移彬州稍遷宣德郎以子正彚在杭告蔡京有動搖東宫之跡杭守蔡薿執送京師先飛書告京事下開封府制獄併逮先生京使權尹李孝夀治其獄獄具正彚坐流海上先生安置通州在通州時復取前在明州時所著日録辨推而廣之名尊堯録釐為八門合論四十九篇而為之序張商英為相獨取其書既上而商英罷又徙先生台州時宰遍令所遇州出兵甲逓送至台每十日一徙且命凶人石悈知州事執至庭大陳獄具將挾以死先生大呼曰今日之事豈被制㫖耶悈曰朝廷令取尊堯集耳先生曰然則何用如此君知尊堯所以立名乎葢以神考為堯主上為舜助舜尊堯何得為罪時相學術粗淺為人所愚君所得幾何亦不畏公議耶悈時已窘先生百端而宰相猶以為怯而罷之在台五年乃得自便纔復承事郎徽宗令再叙一官仍與差遣執政持不行卜居江州復有譛之者至不許輙出城旋令居南康纔至又移楚州使不得一日安處先生平生論京卞皆披摘其處心發露其情慝最所忌恨故得禍最酷劉安世聞其疾使人勉以醫藥曰天下將有賴于公當力加保愛以待時用宣和六年卒于楚州年六十五靖康初詔贈諌議大夫召官其子正彚紹興中髙宗讀尊堯録謂明君臣大分而是之賜諡忠肅先生謙和矜莊通易數言國家大事後多有驗嘗與校書郎范淳夫同事淳夫論顔子不遷怒不貳過唯伯淳有之先生驚問為誰淳夫黙然久之曰不知有程伯淳耶先生深以寡陋為媿作責沈文自責焉子正彚官至直秘閣次子正同敷文閣待制從孫淵見龜山學𣲖所著有了齋集通志録閩書臣名臣傳宏簡名言行録教授林商卿先生彖林彖字商卿仙逰人幼孤隨母鞠於外祖陳次升家以故得盡讀六經百氏之書多聞元祐名臣出處大節與宋累朝典故後僑居真州又得事劉安世任伯雨陳瓘諸公而與任申先象先兄弟為忘年友紹興初嘗為簽樞徐俯禮致而終不受其薦奉母歸閩菽水盡歡母没終喪寓居僧舍不謀婚娶曰吾有弟不至絶先人世不問家事曰吾以付二弟隆興元年春監司帥臣列薦召赴行在力以疾辭其秋丞相陳康伯樞宻黄祖舜令監司郡守敦促之復引疾不就於是陳孝則林孝澤皆泉莆偉人適以憲漕會閩中相繼率數百人以彖名聞參政周葵為轉上之詔再促召亦不赴乾道四年特與進士出身添差興化軍教授未一考卒年七十自號萍齋閩書志仙逰教授陳伯嚮先生葵陳葵字伯嚮閩縣人初入太學試上舍優等中南省第三人擢甲科蔡京籍元符中上書王定等十八人奏乞編置葵其一也謫居衡州三年雷震元祐黨人碑得釋還詔有司許依元考定甲分註官授樂清尉再調建州以陳瓘門人復為京黨劾罷髙宗即位訪求元祐黨人胡世將孟庾宣諭福建以葵應召授承事郎將作監丞尋召對除諸王官教授踰年又以趙鼎黨罷歸葵屢遭躓蹶操尚不改時論髙之閩書直講張聖行先生讀張讀字聖行安溪人紹聖四年以上舍生擢第調頴昌府法曹叅軍除編脩國初會要以父年逾九十求便養通判本州後除王府直講未幾請郡知興化軍時靖康初士卒驕恣一日讙趨庭下乞額外給賜先生正色叱之諸卒感服反告其渠魁即梟於市一郡肅然建炎初被召以疾辭奉祠性至孝居喪廬墓蔬食終制杜門却掃所交皆天下士始與陳瑩中友善既仕為趙清獻范純禮所奬重後與李方叔端叔為蘇黄門客子由作東坡墓銘以示先生先生曰斯文妙盡東坡平生恐仇人復藉此媒蘖不若刮摩之為愈使東坡無此銘萬世之下其不知有東坡乎晚年徙晉江與李文肅邴過從尤宻善屬文閩中碑碣多出其手貲入即分親故之貧者夀八十卒李文肅哭以詩有累日塵生甑經年肘見衿之語嘉熈中邑令趙崇栗表其鄉曰曽子里閩書教授王酉室先生伯起王伯起字聖時福清人曽祖仁繢不受閩王審知偽命終隱南山伯起少逰京師受經于王安石學文於曾鞏樞宻曽孝寛聞其賢延館之奏授將仕郎試國子監簿以假承務郎授嚴州教授力辭不就解官歸題其齋曰酉室一時名人若江公望陳瓘皆與友有詩曰唱道野集卒贈右宣教郎閩書志三山新邵武李氏家世學𣲖按龜山楊文靖公撰李公䕫墓志云余與公同為諸生肄業于上庠挾策考疑時相過從又與陳公了翁亦最相善忠定䟦了翁文云余政和乙未歲自尚書郎謁告迎親霅溪時了翁自天台歸通川與余相遇於姑蘇一再見有忘年之契後四年當宣和之初余以左史論事謫沙陽了翁方居南康余因序送陳淵幾叟并寓書通慇懃了翁荅書辭意懇懇至舉狄梁公及本朝李文靖王文正二公事業以相勉余竊怪公相期太過非所敢當也又後七年靖康改元歲次丙午余䝉異恩自奉常不旬日擢參大政實總軍旅之事踰月冦退宗社已安四方敉寧叨處樞輔追感知己恨公不見及也以上録楊陳二先生語想見一時英賢碩德群聚類處交相期待非偶然也因録李氏家世著之篇端龍圖李師和先生䕫李䕫字師和其先江南人唐末避亂徙居邵武䕫幼孤鞠於外家成童猶未知書而頴悟絶人舅氏資政黄履每器重之因授以書凡耳濡目染過即成誦自是六經諸子百氏之書下至毛鄭箋傳無所不窺學由是日進逮居上庠與龜山楊時最相善元豐三年登進士第為華亭尉又調松溪尉兼主簿遷司封員外郎力請外補除知蔡州朝廷惜其去留為宗正少卿訓辭有曰非清德老儒曷任兹選轉朝請大夫累官集賢館修撰知鄧州兼西南路安撫使䕫下車盡革前弊紀綱大整遂以疾請祠章再上除提舉杭州洞霄宫東歸家於梁溪錫山之傍日以文字為娛子綱為鎮江教官就養子舍及公為尚書郎丐迎養京師除䕫提舉醴泉轉中大夫改右文殿修撰終龍圖閣待制所著文集二十卷禮記義十卷藏於家子四綱維經綸年七十五卒龜山為撰墓志忠定李伯紀先生綱李綱字伯紀其先江南人唐末徙邵武父䕫與楊龜山先生同為諸生肄業上庠相友善公登政和二年進士及第積官監察御史以言事忤權貴改比部員外郎遷起居郎宣和元年京師大水疏言隂氣太盛當以盗賊外患為憂調監沙縣税務七年為太常寺少卿金人渝盟邊報狎至朝議欲避敵公上禦敵五策因語給事中吳敏曰皇太子恭儉聞天下以守宗社可也敏曰監國可乎公曰肅宗靈武之事不逮號不足以復邦而逮號之議不出於明皇後世惜之翼日敏請對因言李綱論與臣同有㫖召公入議公刺臂血上疏於是徽宗内禪之議遂决欽宗即位召對延和殿時遣李鄴使金議割地公奏祖宗疆土當以死守何可尺寸與人欽宗嘉納除兵部侍郎靖康元年以吳敏為行營副使公為參謀金兵渡河徽宗東幸宰執議請上暫避敵鋒太宰白時中謂都城不可守公曰都城宗廟社稷百官萬民所在捨此何之但當整飭軍馬固結民心堅守以待勤王之師欽宗問可將者宰相因推公即除尚書右丞又以公為東京留守公為欽宗力陳所以不可去之意欽宗意頗悟會内侍奏中宫已行欽宗變色倉卒降御榻曰朕不能留矣公泣拜以死邀之欽宗顧公曰朕今為卿勉留治兵禦敵專以責卿公惶恐受命未幾復决意南狩公趨朝則禁衛擐甲乗輿已駕矣公急呼曰爾等願守宗社乎願從幸乎皆曰願死守公入見曰六軍父母妻子皆在都城願以死守萬一中道散歸陛下孰與為衛且敵兵已逼倘知乗輿未逺健馬疾追何以禦之欽宗感悟遂命輟行公傳㫖語左右曰敢復有言去者斬禁衛皆拜伏呼萬歲六軍聞之無不感泣命公為親征行營使以便宜從事公治守戰具不數日畢敵兵攻城公身督戰募壯士縋城下斬酋長十餘人衆數十級金人知有備又聞欽宗已内禪乃退求遣大臣至軍中議和公請行上遣李棁公曰臣恐棁怯懦誤國家欽宗不聽竟遣棁往金人須金幣以千萬計求割太原中山河間地以親王宰相為質棁不措一辭還報公謂所需金幣竭天下且不足况都城乎三鎮國之屏蔽割之何以立國至於遣質即宰相當往親王不當往若遣辯士姑與之議宿留數日大兵四集彼孤軍深入不得所欲亦欲速歸此時與盟則彼不敢輕中國而和可久也宰執議不合公不能奪求去欽宗慰諭曰卿第出治兵此事當徐議之公退則誓書已行所求皆與之以皇弟康王及少保張邦昌為質時朝廷日輸金幣而金人需求不已日肆屠掠四方勤王之師漸有至者种師道姚平仲亦以涇原秦鳳兵來公奏言金人無厭勢非用師不可且彼以孤軍入重地當以計取之今若扼河津絶饟道分兵復畿北諸邑而以重兵臨敵營堅壁勿戰俟其食盡力疲然後以一檄取誓書復三鎮縱其北歸半渡擊之此必勝之計也欽宗深以為然約日舉事會姚平仲急於要功先期夜斫敵營欲生擒斡里雅布及取康王以歸夜半中使傳㫖諭公速援公率諸將旦出封邱門與金人戰却之平仲竟以襲敵營不克懼誅亡去金使來宰相李邦彦語之曰用兵乃李綱姚平仲非朝廷意遂罷公以謝金人太學生陳東等詣闕上書明公無罪軍民集者數十萬呼聲動地至殺傷内侍欽宗亟召公公入見泣拜請死欽宗亦泣命公復為尚書右丞充京城四壁守禦使公下令能殺敵者厚賞衆無不奮躍金人懼稍稍引却且得割三鎮詔及親王為質乃退師除公知樞宻院事公奏請如澶淵故事遣兵䕶送且戒諸將可擊則擊之乃以兵十萬分道並進將士受命踴躍以行宰相咎公盡遣城下兵追敵恐倉卒無措急徴還諸將已追及金人邢趙間遽得還師之命無不扼腕迨公力争復追而將士解體矣詔議迎太上皇還京徽宗還次南都以書問改革政事之故且召吳敏及公公至具道皇帝仁孝思慕欲以天下養之意請陛下早還京師語多調和兩宫徽宗感悟出玉帶金魚象簡賜公時北兵已去太上還宫上下恬然置邊事不問公獨以為憂靖康元年四月公在宻院與同知樞宻許翰議調防秋兵時太原圍未解种師中戰没師道病歸南仲曰欲援太原非綱不可乃以公為河東北宣撫使公即移疾乞致仕且曰此必有建議不容臣於朝者辭章十餘上許翰書杜郵二字遺公公惶恐受命行次懐州有詔罷減諸路所起兵公奏太原之圍未解河東之勢甚危臣出使未幾朝廷盡改前詔臣誠不足任此且以軍法勒諸路起兵而以寸紙罷之臣恐後時有所號召無復應者矣疏上不報御批日促解太原圍而諸將承受御畫事皆專達宣撫徒有節制之名俄又以議和止公進兵毎一次詔下公皆上䟽極論之不報未幾徐處仁吳敏皆罷而相唐恪進聶山陳過庭李囘等公聞之歎曰事無可為矣即上疏丐罷曰自秋以來沿邊探報金人日聚兵為南牧深入之計朝廷日罷兵如太平無事之時無謂和議之使一遣便可恃以為安也乃命种師道代公而召公赴闕尋除觀文殿學士知揚州公奏辭未幾以公專主戰議喪師費財落職予祠責授建昌軍安置再謫江寧及金兵再至欽宗始悟和議之非除公資政殿大學士領開封府事公行次長沙被命按行狀靖康元年冬都城圍急朝命始以京尹召公至次年四月公始聞召命其辭免開封府事表文云果聞鐵騎再犯金城號令阻隔者半年煙火斷絶者千里雖心馳魏闕之下常夢清都而身滯江湖之濵莫陪義旅即率湖南勤王師入援未至而都城失守矣髙宗即位拜尚書右僕射兼中書侍郎趣赴闕力辭不許因上十事以比姚崇一議國是二議巡幸三議赦令四議僭逆五議偽命六議戰七議守八議政本九議久任十議脩德翌日頒公議于朝堂惟僣逆偽命二事留中不出於是公再言留中二事乃今日政刑之大者陛下欲建中興之業而尊崇僣逆之臣何以示四方不問偽命之汙何以厲時節時黄潛善主邦昌甚力公因泣拜曰臣不可與邦昌同列當以笏擊之陛下必欲用邦昌苐請罷臣髙宗頗感動乃貶邦昌潭州吳并莫儔而下皆遷謫有差公又言羣臣能仗節死義者在内惟李若水在外惟霍安國願加贈恤髙宗從之因詔諸路詢訪死節者以聞有㫖兼充御營使入對奏當今之務非有規模而知先後緩急之序則不能以成功所謂規模者外禦彊敵内消盜賊脩軍政變士風裕邦財寛民力改弊法省冗官誠號令以感人心信賞罰以作士氣擇帥臣以任方面選監司郡守以奉行新政俟吾所以自治者政事已脩然後可迎還二聖此所謂規模也至於所當急而先者則在料理河北河東葢河北河東者國之屏蔽也莫若於河北置招撫司河東置經制司擇有才略者為之使宣諭天子恩德所以不忍棄兩河與敵之意有能全一州復一郡者以為節度防禦團練使如唐方鎮之制使自為守非惟絶其從敵之心又可資其禦敵之力此最今日先務也髙宗善其言問誰可任公薦張所傅亮遂以所為河北招撫使亮為河東經制副使開封守闕公薦宗澤髙宗從之時議遣使於金命草表奏言堯舜之道孝悌而已陛下以二聖逺狩不甘寢食此孝悌之至正宜枕戈嘗膽使刑政脩而中國强則二帝不俟迎請而自歸不然雖冠葢相望卑辭厚禮恐亦無益乞降哀痛之詔以感動天下又乞省冗員節浮費髙宗皆從之一日論靖康事髙宗曰淵聖勤於政事覽章奏終夜不寢何以卒致播遷公曰人主之職在知君子小人而進退之則大功可成否則雖衡石程書無益因勸上以明恕盡人言以恭儉足國用以英果斷大事皆嘉納焉又奏臣嘗言車駕巡幸之所闗中為上襄陽次之建康為下陛下縱未能行上䇿當且適襄鄧示不忘故都以係天下之心不然中原非復我有車駕還闕無期矣髙宗乃詔諭兩京以還都之意讀者皆感泣未幾有詔欲幸東南避敵黄潜善汪伯彦實隂主之髙宗意已决綱謂國之存亡於是焉分吾當以去就争之即上疏極論其不可䟽上留中不出已而遷公為尚書左僕射兼門下侍郎黄潜善除右僕射兼中書侍郎公奏招撫經制臣所建明而張所傅亮臣所薦用今潜善沮所與亮正所以沮臣亮竟罷因再疏求去先是公嘗具三疏請募兵買馬與募民出財助兵諌議大夫宋齊愈聞而笑其非策疏論之未幾齊愈以議立張邦昌僭逆附偽之罪坐誅張浚乃劾公以私意殺侍從且論其買馬招軍之罪詔罷為觀文殿大學士奉祠尚書右丞許翰言公忠義捨之無以佐中興會髙宗召見陳東東言潛善伯彦不可任公不可去東坐誅翰遂求退後有㫖奪公職居鄂州公為相僅三月而張所旋以罪去傅亮以母病辭歸招撫經制二司皆廢車駕遂東幸兩河郡縣相繼淪没金人攻京東西殘毁闗輔而中原盜賊蠭起矣紹興二年除觀文殿學士湖廣宣撫使兼知潭州是年荆湖江湘盜以萬數方議屯宿重兵鼎澧嶽鄂荆南一帶以圖恢復中原之漸議未及行而諌官徐俯劉裴論劾復罷奉祠西京崇福宫福州居住四年冬金人及偽齊來攻公具防禦三策詔付樞宻院及三省施行五年詔問攻戰守備措置綏懐之方公奏言宜於防守既固軍政既備之後即議攻討至於守備之宜則當料理淮南荆襄以為東南屏蔽有守備矣然後議攻戰之利分責諸路因利乗便收復京畿以及故都斷以必為之志勿失機會若夫萬乗所居必擇形勝建康江山雄壯地勢寛博宜權駐蹕至於西北之民其心未嘗一日忘宋天威震驚必有結納願為内應者宜給之土田予以爵賞優加撫循使益堅戴宋之心因條上六事髙宗賜詔褒諭除江西安撫制置大使兼知洪州及張浚以吕祉敗引咎罷相言者引漢誅王恢為比公言浚措置失當誠為有罪然其區區徇國之心有可矜者願少寛假以責來效時車駕將幸平江公以為平江去建康不逺徒有退避之名不宜輕動八年朝廷遣王倫使金還與金使偕來以詔諭江南為名公憤懣上疏言卑辭厚幣廢祖宗之業失生靈之望願陛下請詔群臣講明長久之策擇善而從之疏奏雖與衆論不合髙宗曰大臣當如此矣九年除知潭州荆湖南路安撫大使具奏力辭遂允其請十年薨年五十八訃聞朝廷軫悼遣使賻贈撫問其家給喪葬費贈少師官其親族十人孝宗朝諡忠定公筮仕三朝負天下之望以一身用捨為社稷生民安危雖身或不用用又不久而其忠誠義氣凛然動乎逺邇毎宋使至燕山必問李綱趙鼎安否宋史論當時排和議以禦敵為己任者在廷惟公一人而已夫公之進退布衣之士捐生為白於朝非忠所動曷能爾顧反不信於主上取嫉於同列至如張浚賢者亦不免見忌而訾其短嗚呼無亦天未悔禍使然耶公晚年於易尤有所得著易傳内篇十卷外篇十二卷頗取卦變互體為説動有所稽異於今世君子所辨釋又著論語詳説十卷文章歌詩奏議百餘卷又有靖康傳信録奉迎録建炎時政記建炎進退志建炎制誥表劄集宣撫荆廣記制置江右録宋史名臣傳録宏簡文昭林拙齋先生之竒學𣲖按先生學於紫薇吕公本中本中學於尹公和靖至吕公伯恭則先生之門人也李氏士英言行録云公自少講學即聞父祖至論又從㳺楊力叩微㫖復造劉安世陳瓘之門請益公之學問端緒深逺如此吕成公祭公文曰昔我伯祖西垣公即本中先生躬受中原文獻之傳載而之南裴回顧瞻未得所付踰嶺入閩而先生與二李伯仲實來一見意合遂定師生之分於是嵩洛闗輔諸儒之源流靡不講慶厯元祐羣叟之本末靡不咨以廣大為心而陋專門之曖昧以踐履為實而刋繁文之枝葉致嚴乎辭受出處而欲其明白無玷致察乎邪正是非而欲其毫髪不差昕夕函丈聞無不信信無不行前望聖賢大路九軌自謂以必可至又曰里居之良若方若陸旁郡之士若胡若劉更唱迭和於寂寞之濵韜積渟蓄未幾聲光四出而不可遏州黨推擇居東面之席踵門請起至再三不得已而臨之長樂之士知鄉大學知尊前輩知宗正論則皆先生與二李之力焉嗚呼西垣公既不及公道之伸而二李毎皆以布衣老獨先生甫入東觀若將有為而病輙隨之中原諸老之規模迄不得再白於世其用必有所繫矣某未冠綴弟子之末行期待之厚獨出於千萬人之右顧齒髪日衰業弗加脩大懼先生之功力為虚施毎靦然慚惕然恐也惟當與二三子尊所聞行所知使先生未伸之志獨有考焉今謹撮此大略著之篇端文昭林拙齋先生之竒林之竒字少頴侯官人紫薇舍人吕公本中入閩先生甫冠從之學鄉舉赴禮部試行至衢州以不得事親翻然而歸向學益力本中竒之從學者踵至登紹興二十一年進士調莆田簿改尉長汀召為秘書省正字轉校書郎時猶用三經義説先生亟請罷斥上言王氏三經率為新法地晉人以王何清談罪深桀紂本朝靖康禍亂考其端倪王氏實負王何之責正所謂邪説淫辭之不可訓者或傳金人南侵先生作書抵當路言久和畏戰人情之常故彼常以虚聲恫喝示我以欲戰之意非果欲戰所以堅吾和也吾果欲與之和宜無憚於戰則其權常在我矣以痺疾乞外由大宗正丞提舉閩舶奉祠家居吕公祖謙因之受學卒年六十五有尚書集解春秋周禮論論語孟子講義楊子解義道山記聞拙齋集行世學者稱拙齋先生諡文昭從子子冲閩書志三山新潘先生滋潘滋懐安人林先生之竒髙弟也黄勉齋嘗學焉閩書縣丞林通卿先生子冲林子冲字通卿學問德業有聲鄉里從㳺者數百人為南豐簿邑民交頌太守陳岐請脩禮樂書以子冲大儒之後延以特榻子冲隨文釋義補闕訂訛書成周必大楊萬里稱其精宻調將樂丞未上留盱攝郡太學丁外艱以哀毁卒子耕字畊叟衡州教授能傳家學閩書經朱子義考備考孫畊後序曰畊自兒時侍先君旴江官舍郡齋脩刋禮樂書先君實董其事與益國周公誠齋楊先生書問往來訂正訛舛甚悉暇日因與言曰吾家先拙齋書解今傳於世者自洛誥以後皆訛葢是書初成門人東萊吕祖謙伯恭取其全本以歸諸生傳録十無二三書坊急於鋟梓不復叅訂訛以傳訛非一日矣先君猶記鄉曲故家及嘗從先拙齋逰者録得全文及歸方尋未獲不幸此志莫償畊早孤稍知讀書則日夕在念慮間汩汩科舉業由鄉選入太學䟦涉困苦如是者三十餘年淳祐辛丑僥倖末第閒居需次得理故書日與抑齋今觀文陳公虚齋今文昌趙公參考講求摳趨請益抑齋出示北山先生手蹟具言居官婺女日從東萊先生學東萊言吾少侍親官於閩從林少頴先生學且具知先拙齋授書之由時抑齋方閲六經尤加意於林吕之學虚齋亦倣朱文公辨安國書著本㫖畊得互相詰難其間凡諸家講解搜訪無遺一日友人陳元鳳儀叔擕書説拾遺一集示予蠧蝕其表蠅頭細書云得之宇文故家葢宇文之先曽從拙齋學親傳之藁也其集從康誥至君陳此後又無之遂以鋟本參校康誥酒誥梓材召誥皆同鋟本自洛誥至君陳與鋟本異其詳倍之至是益信書坊之本誤矣當令兒輩作大字謄出以元集歸之然猶未有他本可以參訂也又有一朋友云建安書坊余氏數年前新刻一本謂之三山林少頴先生尚書全解此集葢得其真刋成僅數月而書坊火今板本不存矣余亦未之信因遍索諸鬻書者乙巳春仲一老丈鶉衣銜袖踉蹡入門喜甚揖余而言曰吾為君求得青氊矣開視果新板以尚書全解標題書坊果建安余氏即倍其價以鬻之以所謄本參校自洛誥至君陳及顧命以後至卷終皆真本向者麻沙之本自洛誥以後果偽矣朋友轉相借觀以為得所未見既而畊暫攝鄉校學録葉君真里之耆儒嘗從勉齋逰其先世亦從拙齋學與東萊同時又出家藏寫本林李二先生書解及詩説相示較之首尾並同葢得此本而益有証騐矣嗟夫此書先拙齋初著之時毎日誦正經自首至尾一遍雖有他務不輟貫穿諸家旁搜逺紹會而稡之該括詳盡不應於洛誥以後詳略如出二手今以諸本參較真贗曉然信而有徵可以傳而無疑矣書解自麻沙初刻繼而婺女及蜀中皆有本然承襲舛誤竟莫能辨柯山夏氏解多引林氏説自洛誥以後則畧之僅有一二語亦從舊本往往傳訛東萊解只於禹貢引林三山數段他未之詳東萊非隱其師之説葢拙齋已解者東萊不復解而惟條暢其義嗟夫書自安國而後不知其幾家我先拙齋裒集該括自壯及耄用心如此之勤用力如此之深始克成書而傳襲謬誤後學無從考証我先君家庭授受中更散亡極意搜訪竟無從得畊恪遵先志又二十餘年旁詢博問且疑且信又得宇文私録又得余氏新刋全解又得葉氏録家藏寫本稽驗新故訂正真贗參合舊聞而後釋然以無疑確然而始定然則著書傳後豈易云乎哉畊既喜先拙齋之書獲全又喜先君縣丞公之志始遂顧小子何力之有抑天不欲墜廢斯文故久鬱而獲伸歟不然何壁藏汲冡之復出也淳祐丁未之歲石鼓冷㕔事力甚微學廪粗給當路諸公不賜鄙夷捐金撥田悉有所助三年之間補葺經創石鼓兩學輪奐鼎新書板舊帙缺者復全於是慨然而思曰吾先君未償之志孰有切於此者吾先世未全之書豈容緩於此者實為子孫之責也乃會書院新租歲久之積因郡庠憲臺撥鏹之羡撙學㕔清俸公給之餘計日命工以此全書亟鋟諸梓字稍加大匠必用良板以千計字以五十萬計釐為四十卷始於乙酉之孟冬迨明年夏五月而畢是書之傳也亦難矣哉亦豈茍然哉舊本多訛畊偕次兒駿伯重加㸃校凡是正七千餘字今為善本庶有補於後學淳祐庚戌夏五嗣孫迪功郎衡州州學教授兼石鼓書院山長畊謹書鄧均曰觀林君畊叟序述其先王父全書始末兩世訪求志亦苦矣先是抑齋陳先生為僕言閩學源流開教甚悉乃知始於紫薇吕公載道而南而拙齋先生實親承心學拙齋著書多而於尚書尤注意即少頴先生書解是也然自洛誥以後傳者失真世不得其全書為恨先生之猶子諱子冲登癸丑科為南豐簿嘗分教盱江再轉為丞僕頃在庠序尚及識縣丞公於文席縣丞公在盱據勘遺文多矣獨於拙齋全書散佚之餘訪求而未得不幸齎志以殁又數十年而先生之孫畊始克摹就豈其書之泰阨固自有時耶拙齋雖不克竟其用而傳聖賢之心夀斯文之脉其功大矣縣丞公刻志世其學而畧不獲施於用至畊而全書始出以傳惟拙齋之學卓然光明久而益昌何容繪畫畊字畊叟暨先生甫三世其孜孜問學多識往行好脩者也君子曰無忝厥祖淳祐十年七月既望按畊叟序中言抑齋今觀文陳公疑即北山先生之子韡時為觀文殿學士後諡忠肅言虚齋今文昌趙公者考三山藝文志趙公以夫有虚齋樂府二卷疑即此公也二公淵源正學宋季士林多推重之閩中理學淵源考卷七
