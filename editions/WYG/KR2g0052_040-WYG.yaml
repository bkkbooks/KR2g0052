body:
  text: 閩中理學淵源考卷四十廣平府知府李清馥撰福寜陳石堂先生普學派按經義考閔氏文振作傳曰石堂先生聞恂齋韓氏倡道浙東負笈之㑹稽從之游韓之學出慶源輔氏朱門髙弟也淵源所自屹為嫡派故其學甚正嘗曰聆韓先生夜誦四書如奏九韶令人不知肉味故其用功本諸四書四書通然後求之六經云又張清恪公困學錄曰石堂學求自得其用功求之六經不貴文辭不急利祿惟真知實踐求無愧于聖賢馥嘗考先生在莆十八年受徒講學晚年所造益髙出其門者皆能衍續其緒餘讀字義諸編可見源流所本矣陳石堂先生普陳普字尚徳别號懼齋寜徳之石塘人所居有石堂山學者稱石堂先生初淳熈間朱文公過石塘異其風土曰後數十年此中當出儒者能讀天下書十八九普生當理宗淳祐甲辰鷓鴣百數繞屋稍長入鄉塾有大人志聞韓翼甫倡道浙東負笈從遊韓之學出慶源輔氏輔朱門髙弟也宋鼎既移决意卷藏朝廷三使辟為本省教授不起開門授徒巋然以斯道自任四方及門嵗數百人舘里之仁峯僧舍至不能容建州劉純父聘主雲莊書院熊勿軒留講鼇峯丞相劉文簡屬脩黄楊二家䘮祭禮因并晦庵所纂為三十卷尋講饒廣在徳興初庵書院尤乆嘗與游翁山范天碧謝子詳極論太極之㫖晚在莆中十有八年造就益衆出其門者如韓信同楊琬余載黄裳軰並以正學為時所宗嘗曰性命道徳五常誠敬等字在四書六經中如斗極列宿之在天五嶽四凟之在地舎此不求更學何事少壯時銳然有經世志謂三代之治莫善井田作書數千言欲上於朝屬不仕而止著字義一卷凡百五十三字出授門人識者謂比之程正思陳安卿詳畧適中而立義措辭為尤精又有四書句觧鈐鍵學庸㫖要孟子纂圖周易觧尚書補㣲四書六經講義渾天儀論天象賦詠史詩斷凡數百卷元延祐乙卯卒於家年七十二論著叙禮論畧曰某年十五六讀曲禮少儀知愛之而淪於時俗科舉之習三十四十始脫時文而患難屢遭東西奔走頗聞熊去非自少用心禮樂而貧踪賤武合并良難丁酉嵗受平山劉純父之招始見去非於山中書冊填坐屢空晏如覽記浩博㑹欲求輔於朋友備書册闢室堂廣談論取晦翁黄楊之書脩補以示方來而未就也顧余雖志求古而未嘗渉晦翁黄楊之藩輒用去非成規更為求要質鬼神告白知友共取十七篇注䟽及晦翁所釐三十五卷勉齋信齋䘮祭二禮及圖循去非熟路詳加考訂重為比𩔖云楊先生琬楊琬未詳待考黄先生裳黄裳未詳待考丘先生和仲丘和仲按石堂先生字義序中畧云乙巳嵗樵丘叔文之仲子和仲年十七從余學每講說遇此等字必為之深論而多言之和仲每聞輒悚然察其貎若有以真契黙㑹而自得於問答之外者雖蒙其家學源流端的浹洽是亦其所受於天者清厚與等夷異故也讀序中知和仲属邵武人其家學源流待考餘詳字義原文余先生載余載按余氏載石堂字義序識後云先師舊學於浙維則韓氏翼甫韓氏學於朱門之輔氏盖問學淵源厥有自來嘗語云疇昔予聆韓先生夜旦莊誦朱子四書如奏九成簫韶令人不知肉味又云性命道徳五常誠敬等字在六經四書中如斗極列宿之在天五嶽四凟之在地非深於知道者未易為斯言又嘗述字義一卷以授學者云後繫云泰定乙丑八月戊寅門人合沙余載謹識讀余氏此序知先生為三山人其事跡待考餘詳余氏載原識後韓伯循先生信同學派宋季老成凋落一二典型抱道深山如存碩果求有教席聲應之雅不可以多數也福寜僻在濵海鼎革之後絃誦不衰諸賢猶能公其道以傳其人以是知大賢過化之澤所貽逺矣韓伯循先生信同韓信同字伯循福寧州人㓜穎悟工詩文既壯受業陳石堂遂刋落華藻究心濂洛闗閩之學陳嘆曰吾耄矣得斯人飲水俟命復何恨哉延祐四年應江浙舉不合歸即杜門不出自是四方書幣日至弟子請業者戸外屨滿著四書標註書經疏文三禮易經旁註書觧集史𩔖纂及詩文十卷閩書道南源委鄭先生轙鄭轙字子乗福寧人縂角時即與林珙受業於韓公信同韓公嘗稱曰福寜二君可續吾閩五賢理學韓卒二君俱心䘮三年著有詩文集閩書道南源委訓導林仲恭先生珙林珙字仲恭福寜人少從韓公信同游篤信力行為文以理勝舉明經不受強補本州訓導未半載以疾辭晚年授生徒以開來學為己任閩書道南源委黄吉甫諸先生學𣲖按吉甫諸賢或以文學該博志學精專或以礪行修名託志風雅如謝氏臯羽父子鄭氏邦壽皆名教中卓然有立者歟欲以詩人嘯咏觀之殆未可同年語矣餘皆出處凛然可以扶持敎道者今錄其著者載於篇黄吉甫先生履翁黄履翁字吉甫寧徳人學問該博以林駉所著源流至論未備復為彚纂别集一十卷閩書進士孫先生駪孫駪寧徳人少入太學同舍生俞晰善經學駪師事之既登進士官浙中猶造晰廬考業既老務學如年少至正三十年掌本縣教事閩書進士林景和先生仲莭林仲莭字景和福寧人少聪敏領解浙江舉泰定進士有書經義四靈賦行世陳貢父先生自新陳自新字貢父號敬齋福寧州人通五經精易本傳義而推衍以皇極經世從逰者甚衆著有起興集等書行世道南源委靖莭鄭邦夀先生君孝鄭君孝字邦夀福寧人年十七舉咸淳進士朝士交薦竟不起家庭孝謹内外無間言後進多師之及卒學者私謚之曰靖莭先生著五經解疑梅壑集通志黄洵饒先生寛黄寛字洵饒福寧人力學古文耿介自重能怡其親世亂避兵歸益貧父母兄嫂四䘮不能𦵏以憂感卒無後袁天禄并其四䘮𦵏之於石潭宣城貢師泰為誌銘所著有四書附纂時事直紀閩書鄭伯直先生忠鄭忠字伯直雅好經術或勸之仕曰山林朝市其趨一也著家訓畧曰讀書修徳以清白為世規力田務農以勤儉為家法閩書謝君啟先生鑰子翺謝鑰字君啟福寧人性至孝居父母䘮哀毁廬墓終身不仕方氏鳳曰謝君臯羽其父鑰以春秋學為婦翁繆正字烈所噐重嘗著春秋衍義十卷左氏辨證六卷藏於家子翺别有傳道南源委閩書經義考謝翺字臯羽福寧之長溪人後徙建之浦城父鑰性至孝著春秋衍義左氏辨證傳於時翺世其學咸淳初試進士不第慨然求諸古以文章名家落魄漳泉二州間信公文天祥逾海至閩開府延平檄州郡大舉勤王之師翺傾家貲率鄉兵數百人赴難長揖軍門遂參軍事聲􅏒梁楚已别去宋亡天祥被執翺匿民間流離乆之間行抵勾越多閥閱故大族而王監簿諸人方延致㳺士日以賦詠相娛樂翺時出所長諸公見者皆自以為不及不知其為天祥客也然終不自明且念久不去人將虞我矣乃去而之越之南鄙依浦陽江方鳳時永康吳思齊亦依鳳居三人無變志又皆髙年遂俱客吳氏里中得其餘日以自適一不問當世事翺嘗上㑹稽循山左右窺祐思諸陵西走吳㑹東入鄞過蛟門臨大海所至歔欷流涕晚愛睦州山水浮七里瀬登嚴子陵釣臺設天祥主北向舉酒再拜號哭以竹如意擊石歌曰魂朝往兮何極暮歸來兮關水黒化為朱鳥兮有咮焉食歌已竹石俱碎失聲哭人莫詰其誰何惟鳯與思齊深悲之初江端友吕居仁朱翌辟地白雲源源故方干所居在釣䑓之南翺率其徒游焉願即此為塟地作許劍錄及翺居錢唐至元乙未病革語其妻劉曰我死必以骨歸方鳯𦵏我許劍之地鳯聞訃訖如其言與吳思齊方幼學方濤馮桂芳翁登登弟衡𦵏翺子陵臺南以文稾殉伐石表之曰粤謝翺墓方鳯字韶卿由太學生授容州教授治毛氏詩同郡黄溍柳貫皆出其門吳思齊字子善其學本之外祖陳亮用䕃補官攝嘉興丞數以書干宋臣用事者遇事不以富移不以貧屈自號全歸子翺素慕屈平託逺遊自號晞髪子每執筆時瞑目遐思身與天地俱忘語人曰用志不分鬼神將避之明胡氏仲申稱其論著之文辭隠指㣲大要類其行事閩書何氏鏡山撰稱其詩直遡盛唐以上卓有風人之餘文嶄㧞峭勁雷電恍惚出入風雨中婺睦人士翕然從之至元甲午去家武林西浙乙未卒年四十七閩書明胡仲申撰傳宋詩抄撫漕繆允成先生烈繆烈字允成福安人嗜學孝親上舎省試皆第一舉進士添差福州教授日率子弟講明正學遷正字授撫漕侍郎著春秋講義仲山集閩書林先生天書林天書名詔以字行福寜人勵行濟貧咸淳四年授晉江尉思尼父不入危邦之訓以疾乞歸後八年宋亡元初屢薦不起閩書閩中理學淵源考卷四十
