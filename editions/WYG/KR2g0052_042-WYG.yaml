body:
  text: 閩中理學淵源考卷四十二廣平府知府李清馥撰吳聞過先生海學派邵氏銅撰聞過齋集序畧曰閩自陳述古季慈鄭閎中周公闢劉執中五先生倡道於前繼而楊龜山羅仲素李延平三先生出至朱夫子集羣賢之大成益講明於後道徳入人之深世號海濱鄒魯又如胡文定致堂五峯籍溪蔡西山父子劉白水屏山黄勉齋陳北溪真西山潘𤓰山熊勿軒諸賢彬彬輩出文行表表皆可師法故閩之士習不以浮文勝質為先而以躬行寔踐為急俗尚之淳清修苦節有東漢名賢之風又曰先生氣質剛明學識醇正平日踐履篤實生元季繹騷之時邁徳於身自蔽於不耀之地駸駸乎不知老之將至此其可惜云按邵公叙述先生繋於諸儒學派之後以先生實元代遺民維道脉之緒者也余繋之明者葢一代之興必有耆儒夙學為邦典型如存碩果以繼前修而啟来學顧守先待後之責寄焉耳熊氏勿軒之繋於元吳氏聞過之繋於明皆一轍也今考其派系載於篇乾隆丁丑四月下澣書吳聞過先生海吳海字朝宗閩縣人元季四方盗起隠居不仕學周程張朱之學一時名人如貢師泰林泉生藍晦王翰皆雅重之翰甞仕元海數勵之至翰卒以節著海教養其子偁底於成立焉明初部使者欲薦於朝力辭免既而徴詣史局復力辭居家採摭古今孝子順孫節婦烈女與兄弟之相友愛娣姒之能和睦者附以感應禍福以教鄉里又著書言楊墨佛老為六經之賊管商申韓為治道之賊遺事外傳為史氏之賊蕪辭荒説為文章之賊皆足惑人欲上之人悉取其書而禁絶之使天下曉然知正道慕鄒魯之風平生虛懐樂善有規過者欣然立改因顔其齋曰聞過為文嚴整雅奥咸有矩程而一歸諸理後學咸宗仰之著聞過齋集八卷學者稱聞過先生道南源委明史分省人物考簡討王孟􅆒先生偁王偁字孟􅆒永福人父翰仕元元亡棄官匿永福山中遂家焉後以節著偁少孤其母手疏先人之蹟與古今豪傑大畧教之從父友吳海學於書無所不通弱冠領鄉薦乞歸養母母没廬墓六年永樂初以薦授翰林院簡討進講經筵修永樂大典時内外儒臣及四方韋布麕集閣下惟偁學博思深解縉第偁人品當在蘓子瞻之列其文亦相𩔖詩則力追漢唐每擬薦以自代顧其為人氣節英邁議論爽發常有壁立千仞抗舉浮雲之志遇知己與談吐凌駕超越視餘子𤨏𤨏不啻卧之地下以此名譽雖彰謗亦随之尋坐事謫交趾從總兵張輔幕下時解縉出為交趾恭議督饟化州言偁於輔携以自随偁與縉因共徃廣東觀其山川言其可鑿贑江通南北道具草入奏㑹車駕北征縉見東宫還漢庶人怒縉且欲䧟東宫遂言於上上怒縉滋事勞民并偁皆逮獄相繼死獄中所著有虚舟集子振以祖父死非命屏跡不仕有司屡薦不起亦能詩閩書新福州府志侍讀林尚黙先生誌林誌閩縣人年十四嵗從王偁學日記數千言時出論辨見鋒鋩以折長者偁曰此非所以求益為字曰尚黙因痛自克治沉潜學問涵浸淳蓄久而益富永樂中鄉㑹試皆舉第一殿試一甲第二名授翰林院編修預編性理及四書五經大全諸書陞修撰歴官右諭徳兼侍讀宣徳元年預修两朝實録卒誌於學無不研究後學多從質問經義性恬於世利蚤失父事母孝宗族有貧而依異姓者悉歸而撫之與人交必誠必信每公退輒閉一室以詩文自娛所著有周易集説蔀齋集通志源道南委分省人物考博士林志仁先生慈學派按先生在明初力學稽古其徒姚氏忠又以篤學稱餘事實未詳兹特錄其派繋焉博士林志仁先生慈林慈字志仁長樂人力學稽古嫻於文詞洪武間以明經薦任本縣訓導歴國子博士有詩集通志姚用恕先生忠姚忠字用恕懐安人師事國子博士林志仁慈朝夕講誦久之明理篤學深得聖賢之㫖節儉恬淡雅好山水不樂仕進自號耕雲山人閩書訓導林于野先生同學派林于野先生以力學稱後游寓同安故三山學派無可考者兹特錄之訓導林于野先生同林同字于野閩縣人博學力行安貧樂道居家教授後進日踵其門洪武中寓居同安户部郎李文郁師事之力薦於朝授同安訓導至官二日卒所著有銅魚集閩書長樂陳氏家世學派潘氏稼堂序陳氏詩系曰閩中詩人陳伯騶示余以先代之詩曰四朝詩系其稱詩也自香草堂集以下四十餘家其叙系也自信州公以下二十餘世終明之代成進士及舉於鄉者百有餘人凡兩尚書一侍郎禁近方靣若干人又多賢而能文㡬於人人有集考其淵源則三忠實始基之所謂三忠者宋景炎中陳氏之祖曰榮者率子弟起義兵以行軍司馬知福新縣與元兵力戰而敗榮及其子宗傳姪吉成皆死之陳氏之族死者一百七十七人其後多隠居教授不仕躬修於家至有五世同居者至明初仲進首膺薦辟仲完繼入翰林浸昌浸大至明季甲科乃絶家運與國祚相為盛衰如此按陳氏二百餘年科名爵禄蟬聨弗替而不知其根本皆由於一門貞忠炳蔚其後世子孫尤能韜晦潜隠歴百年而後興天之所以祚忠孝者如此其逺且大也今録其著者載於篇縣令陳伯康先生仲進陳仲進字伯康長樂人耿介尚氣節洪武六年以儒士授宜陽丞攝孟津最調韓城久之擢令江山上特㫖褒其惠政後坐勘灾忤㫖被逮仲進曰吾以一身活萬命含笑地下矣既而釋之而仲進已卒歸櫬經江山父老泣留衣冠葬之子孫遂家江山弟仲完子登全從子洵仁閩書通志新郡志掌坊陳先生仲完陳仲完名完以字行洪武十八年進士授延平訓導改寜國縣永樂初用薦擢翰林編修尋陞左春坊左賛善奉命授皇孫經貌恭氣和詞意懇欵多所補益其持身恭慎平居言如不出至討論古今據理是非確不可奪仁宗在東宫嘗問其所長對曰職所當為不敢茍有畏避仁宗甚重之歴官廿年不遷怡然自足仁宗恒言春坊如仲完者不易得也及即位仲完前一年卒楊文貞士竒為傳惜之通志閩書中書陳思孝先生登陳登字思孝洪武三十年以儒士授羅田丞調蘭谿浮梁皆有治績永樂中以薦召入翰林預修國史授中書舎人為人諒直博渉經史自三代秦漢以降鐘鼎金石劖冡刻石靡不黙識既入中書凡國家有大制作篆籀之文皆出登手且負直不媕婀於所交遊靣舉過失國史實録稱為剛正之士閩書侍講陳果之先生全陳全字果之授翰林編脩修大典書召赴行在與修四書五經性理大全擢侍講署翰林院事公勤篤慎所著有䝉菴集子陵領鄉薦本字叔鹵耿介好古有詩文若干卷閩書蔣氏閩學源流羅宗譲先生泰學派按黄未軒先生撰羅氏繹墓誌曰羅繹父泰以學問文章重一時雖未甞仕進然其弟澤登永樂甲辰進士為名御史繹與兄紋同領永樂丁酉鄉薦為名師儒其他及門之士躋巍登膴者不可勝數皆教澤所及再考林尚黙先生撰羅處士泰麗澤軒記述其師曰林友從其友曰鄭介叔意必當時表著者其詳莫得考矣然觀黄公未軒所賛林公尚黙所記其一時師資庭訓俱可追述兹録傳中所及姓氏并附著其家學載於篇羅宗譲先生泰羅泰字宗讓福清人少從鄉先生宋瑜受春秋經既卒業於訓導林友從潜心易㫖故其學精於易春秋一時同遊如進士鄭澄初主事鄭介叔知縣鄭彦韜文學鄭廷玉鄭希晦林範伯輩咸與切磋講明鄉後學皆師尊之隠居教授凡四十餘年與諭徳林誌侍郎薩琦尤友善勵行至老不衰宣徳壬子應天尹聘司文衡泰辭曰布衣也以一鄉之善淑一鄉之人則可敢去取畿甸士哉平生好古遵禮輕財逹生母喪家貧數年不能葬語及未甞不泣下也年四十妻死不娶曰吾有子矣有覺非集行世建安楊文敏榮志其墓弟澤舉進士子紋繹俱領鄉薦閩書通志鄭先生宣學派按長樂瀕倚海壖朱子當日為學禁時曽避跡是邦其髙第弟子如黄文肅勉齋劉履之用之皆此邦産也明代名人輩出陳氏仲進鄭氏世威諸公已别録矣至馬氏鐸李氏琪以巍科並著而馬公本傳稱其初受禮於鄭氏宣遂旁通易詩書子史百家故特録之鄭先生宣傳闕脩撰馬彦聲先生鐸馬鐸字彦聲其先樂平人宋宰相廷鸞之弟廷龍者自樂平来徙家廷龍之後有弟兄三人曰隆曰傑曰鈞皆舉進士鐸初受禮於先輩鄭宣遂旁通易詩書子史百家為文援筆立就永樂十年廷試與閩縣林誌俱在及第之列成祖知其同郡試之對曰風吹不響鈴兒草鐸應聲雨打無聲皷子花見誌對遲成遂以為第一鐸對盖出夢語故響荅如是既授翰林修撰成祖一再幸北京命獻陵監國鐸與諸臣侍勞艱不避獨任不辭獻陵屢顧學士楊士竒曰馬鐸可謂質實無二自是翰林學士國子祭酒司業有公務出皆命鐸署攝鐸耿介伉直表裡一致處事平恕而臨義執言自奉儉約與人交盡誠遇危難急濟之閒暇皷琴讀書名其書室曰梅巖閩書閩中理學淵源考卷四十二
