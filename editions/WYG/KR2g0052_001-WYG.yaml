body:
  text: 閩中理學淵源考卷一廣平府知府李清馥撰文靖楊龜山先生時學派閩學開自有唐歐陽四門倡起彼時人文未著也宋初所謂海濱四先生者與安定泰山徂徠同時其學已有近裏之功彼時朋類未孚也至龜山先生得中州正學之的上肩周程統緒下啟羅李朱厯代相傳之奥于是聖學彰明較著而鄒魯濓洛之㣲言大義萃于閩山海嶠矣夫程伯子以吾道之南贈屬其行不再三傳而紫陽集諸儒之大成是天欲開伊洛之道之南亦即魯鄒之道之南也昔賢心與道會妙契天合遂持符如左券信乎斯文之興喪豈非天哉自是而後遂有海濱鄒魯之稱我國朝道運昌明列聖肇基啟佑聖祖崇儒重道表章有宋諸儒由朱子而來至今五百餘嵗矣實應王者受命之期而我皇上躬􅈾統緒顯闡于天命人心之本以聖繼聖千古而同符者矣謹按文靖楊公為程門髙弟聖祖仁皇帝曽賜匾額顔曰程氏正宗由是閩士愈爭自濯磨禮陶樂淑之化於前尤有烈也溯吾閩宗風者其必以延津為星宿云文靖楊龜山先生時楊先生諱時字中立其先京兆人五世祖唐末入閩寓南劍之將樂遂家焉先生資稟仁厚不為崖異夸絶之行以求世俗名譽性至孝喪母哀毁如成人事繼母尤謹熈寧九年年二十四登進士第授汀州司户不赴杜門力學元豐四年年二十九授徐州司法又不赴以師禮謁見程明道先生於穎昌後告歸明道送之出門謂坐客曰吾道南矣六年官徐州八年明道先生卒先生聞之設位哭寢門而以書訃告同學者旋丁繼母憂服闋赴調䖍州司法元祐五年丁外艱服除八年赴調至京遷瀛州防禦推官又師事伊川先生於洛年盖四十矣一日伊川瞑坐先生與游定夫侍立不去及覺門外雪深一尺先生嘗疑張横渠西銘近於兼愛與二程辨論往復聞理一分殊之說始豁然無疑紹聖元年知瀏陽縣四年伊川以黨論送涪州編管時先生在任滿寓瀏陽元符二年歸家先是從二先生學者甚衆而先生獨歸杜門不仕者累年沈浸經書推廣師說窮探力索務極其趣於是沙陽陳淵投書問學崇寧元年以諫垣薦除荆州教授大觀元年知餘杭事是年伊川先生卒政和初待次毘陵二年赴蕭山縣任先生厯官所至皆有恵政浮沈禄仕不求聞達而徳望日重四方之士不逺千里從之遊稱曰龜山先生四年年六十二請祠退居餘杭後寓毘陵乆之而先生年已七十矣是時蔡京當國天下多故會蔡京客張觷言於京曰宗社危在旦夕宜亟引舊徳老成置諸左右庶㡬猶可及會有使髙麗者國王問龜山先生安在使回以聞六年以秘書郎召到闕遷著作郎入對奏陳言熈寧之初大臣文六藝之言以行其私祖宗之法紛更殆盡元祐繼之盡復祖宗之舊熈寧之法一切廢革至紹聖崇寧凡元祐之政事著在令甲皆焚之以滅其跡自是分為二黨縉紳之禍至今未殄願明詔有司條具祖宗之法但有宜於今者舉而行之當損益者損益之一趨于中而已徽宗首肯之除邇英殿説書時朝廷方圖燕雲虚内事外先生知時勢將變陳論政事十餘條執政不能用而金人已入境先生激切上言今事勢如積薪已燃當自奮勵進賢退奸以竦動觀聴若示以怯懦之形委靡不振則事去矣又謂今日所急者莫如収人心請罷免夫之役及京城聚斂東南花石之害極論天下積憤鬱而不得發者㡬二十年欲致人和去此三者且言山東之民凋弊已甚所仰者東南而已二浙災傷之餘瘡痍未合更誅求不已則前日方臘之事可以為鑒昔唐方用兵之時裴度復相則先開謁禁以延見士大夫為急故能有成功自元和以後數用兵宰相不得休沐李徳裕在位雖遽書警奏皆從容裁決率午漏下還第盖鎮安人心不可不如是耳已而欽宗嗣位金人日迫大臣方以推恩晉秩争議行幸莫念軍計先生乞對言聞勤王之兵漸有至者宜召將領議戰守之計諸葛亮曰有制之兵無能之將不可以敗無制之兵有能之將不可以勝今諸路烏合之衆不相統一而不立統帥雖唐李郭以九節度之師不免敗衂不可不慮又言上皇痛自引咎禪位而宰執遷叙安受不辭此何理也主辱臣死大臣宜任其責而皆為竄亡自全之計陛下孤立何賴焉童貫為三路總帥金人侵疆棄軍而歸朝廷置而不問故梁方平何灌相繼而遁使敵騎得以長驅而前其誤國已甚當正典刑以為臣子不忠之戒疏入欽宗大喜擢右諫議大夫金兵既退先生上殿極言和議之非時議者欲割三鎮以講和先生疏言河朔朝廷重地三鎮河朔要藩今一旦棄之距京無藩籬之固且聞三鎮之民欲以死拒之萬一不守則數州之衆朝廷寧坐視不救乎急宜命衆出師并乞召用种師中劉光世問以方畧可否不可專守和議疏上欽宗詔出師而議者多持兩端先生復抗疏力争凡所論多切時務皆不報會李綱罷太學生伏闕上書乞留軍民集者數萬吴敏乞用先生以靖太學因召對先生言諸生忠於朝廷非有他意但擇老成有行誼者為之長貳則將自定欽宗曰無逾於卿遂以先生兼國子祭酒先生遂言蔡京用事二十餘年蠧國害民㡬危宗社人所切齒而論京罪者莫知其所本也盖京以繼述神宗為名實挾王安石以圖身利故推尊安石無所不至今日之禍實安石有以啟之因詳舉安石邪說乞正其學術之謬追奪王爵明詔中外毁去配享之像疏上詔罷安石配享猶留從祀時士習王氏學取科第已數十年忽聞先生説紛然闢之於是諫官馮澥上疏詆先生又會學宫紛争有㫖並罷先生即上章乞出除給事中請益力遂以徽猷閣直學士奉祠又懇辭直學士之命有㫖楊時學行醇固諫諍有聲改徽猷閣待制高宗即位除工部侍郎兼侍講召赴行在至則勸上典學納諫及修建炎會計録加恤勤王之兵連章丐外二年以老疾乞出除龍圖閣直學士予祠歸家四年上章告老致仕優遊林泉以著書講學為事紹興五年四月卒年八十三近臣朱震奏楊某據經論事不愧古人所著三經義辨有益學者乞下本州鈔録仍請優恤其家有㫖贈左中大夫紹興十二年贈少師諡文靖先生在東郡所交皆天下士先達陳瓘鄒浩皆以師禮事先生渡江以來東南學者推先生為程氏正宗與胡氏安國往來講論尤多先生浮沈州縣四十九年晚在諫省僅九十日凡所論列皆切于世道而其大者則闢王氏經學排靖康和議使邪說不作凡紹興初崇尚元祐學術而朱晦菴張南軒之學得程氏之正其源委脈絡皆出於先生昔程純公嘗指喜怒哀樂未發之中令先生反求其後羅豫章李延平遞相祖述令學者静中體認大本未發氣象分明所謂龜山門下相傳指訣胡文定云據龜山所見在中庸自明道先生所授此其源流所本與按先生中庸義序自云昔在元豐中嘗受學明道先生之門得其緒言一二未及卒業而先生沒文定所謂自明道先生所授者此也吕氏本中撰行狀嘗聞前輩長者以為明道先生温然純粹終身無疾言遽色先生實似之胡文定公安國誌其墓曰自孟子没遺經僅在而聖學不傳所謂見而知之者世無其人則有西方之傑窺見閒隙遂入中國舉世傾動靡然從之於是人皆失其本心莫知所止而天理滅矣宋嘉祐中有河南二程先生得孟子不傳之學於遺經以倡天下而升堂覩奥號稱髙弟在南方則廣平游定夫上蔡謝顯道與先生三人是也先生天資夷曠濟以問學充養有道徳器早成閒居和樂色笑可親臨事裁處不動聲色與之遊者雖羣居終日飲人以和而鄙薄之態自不形也推本孟子性善之説發明中庸大學之道當時公卿大夫之賢者莫不尊信之熈寧初代余典教渚宫始獲從先生遊三十年間出處險夷亦嘗覸之熟矣視先生一飯雖蔬食脆甘若皆可於口未嘗有所嗜也每加一衣雖狐貉緼袍皆適於體未嘗有所擇也平生居處雖敝廬厦屋若皆可以託宿未嘗有所羨而求安也故山之田園皆先世所遺守其世業亦無所營増豆區之入也老之將至沈伏下僚厄窮遺佚若將終身焉然則先生于斯世所欲不存果何求哉心則逺矣凡訓釋論辨以闢邪説存于今者其傳寖廣諸所建白深切著明而先生之學於河南小嘗試之其用已如此所謂援而止之而止必有以也進不隱賢必以其道豈不信乎世或以不屑去疑先生盖淺之為丈夫也又與楊大諫書曰楊先生造養深逺燭理甚明混迹同塵知之者鮮知之者知其文學而已不知者以為蔡氏所引先生無求於人蔡氏焉能凂之朱晦菴曰龜山先生晚嵗一出人多議之惟胡文定之言曰當時若能聴用決須救得一半此語最公又曰龜山此行固是有病但只後人又何曽夢到他地位在惟胡文定以栁下恵援而止之而止比得極好云所著有校正伊川易三經義春秋禮記解學庸語孟解易春秋孟子義辨字解論日録奏議龜山文集明成化元年從祀孔子廟廷國朝康熈四十五年准學臣沈涵之請賜御書程氏正宗懸於祠子迪附見家學宋史撰胡文定公墓誌學年譜録伊川淵源録知統道南源委聖楊文靖公語録先生曰自堯舜以前載籍未具世所有者獨宓犧所畫八卦耳當是之時聖賢如彼其多也自孔子刪定繫作之後更秦厯漢以迄于今其書至不可勝記人之所資以為學者宜易於古然其間千數百年求一人如古之聖賢卒不易得何哉豈道之所傳固不在於文字之多寡乎夫堯舜禹臯陶皆稱若稽古非無待於學也其學果何以乎由是觀之聖賢之所以為聖賢其用心必有在矣學者不可不察之也六經不言無心惟佛氏言之亦不言修性惟揚雄言之心不可無性不假修故易止言洗心盡性記言正心尊徳性孟子之言存心養性君子務本言凡所務者惟本而已若仁之於孝悌其本之一端耳盖為仁必自孝悌推之然後能為仁也其曰為仁與體仁者異矣體仁則無本末之别孔子曰老者安之朋友信之少者懷之此無待乎推之也孟子曰老吾老以及人之老幼吾幼以及人之幼此推之也推之所謂為仁狼跋之詩曰公孫碩膚赤舄几几周公之遇謗何其安閒而不迫也學詩者不在語言文字當想其氣味則詩之意得矣事道與祿仕不同常夷甫家貧召入朝神宗欲優厚之令兼數局如登聞鼓染院之類庻㡬俸給可贍其家夷甫一切受之不辭及正叔以白衣擢為勸講之官朝廷亦使之兼他職則固辭盖前日所以不仕者為道也則今日之仕須是官足以行道乃可受不然是茍祿也然後世道學不明君子之辭受取舎人少能知之故常公之不辭人不以為非而程公之辭人亦不以為是又曰孟子對人君論事句句未嘗離仁此所謂王道也曰安得句句不離乎仁曰須是知一以貫之之理曰一以貫之仁足以盡之否曰孟子固曰一者何曰仁也仁之用大矣今之學者仁之體亦不曽體究得人臣之事君豈可佐以刑名之説如此是使人主失仁心也人主無仁心則不足以得人故人臣能使其君視民如傷則王道行矣或勸先生解經曰不敢易也曽子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎夫傳而不習以處已則不信以待人則不忠三者胥失也昔有勸正叔先生出易傳示人者正叔曰獨不望學之進乎姑遲之覺耄即傳矣盖已耄則學不復進故也學不復進若猶不可傳是其言不足以垂後矣黄氏東發云按此説則近世紛紛解經者可戒矣知合内外之道則禹稷顔子之所同可見盖自誠意正心推之至於可以平天下此内外之道所以合也故觀其意誠心正則知天下由是而平觀其天下平則知非意誠心正不能也兹乃禹稷顔回之所以同也君子之治心養氣接物應事唯直而已直則無所事矣康子饋藥孔子既拜而受之矣乃曰丘未達不敢嘗此疑於拂人情然聖人慎疾豈敢嘗未達之藥既不敢嘗則直言之何用委曲㣲生髙乞鄰醯以與人在今之君子盖常事耳顧亦何害然孔子不以為直以所辭康子之言觀之信乎其不直也李似祖曹令徳問何以知仁曰孟子以惻𨼆之心為仁之端平居但以此體究乆乆自見因問似祖令徳尋常如何説𨼆似祖云如有𨼆憂勤䘏民𨼆皆疾痛之謂也曰孺子將入於井而人見之者必有惻𨼆之心疾痛非在已也而謂之疾痛何也似祖曰出於自然不可已也曰安得自然如此若體究此理知其所從來則仁之道不逺矣二人退余從容問曰萬物與我為一其仁之體乎曰然問論語言仁處何語最為親切曰皆仁之方也若正所謂仁則未之嘗言也故曰子罕言利與命與仁要道得親切唯孟子言仁人心也最為親切黄氏東發云按此提掇最得要吴審律儀勸解易曰易難解曰及今可以致力若後力衰却難曰某嘗觀聖人言易便覺措辭不得只如乾坤兩卦聖人嘗釋其義於後是則解易之法也乾之初九潜龍勿用釋云陽在下也又曰龍徳而𨼆者也又曰下也又曰陽氣潜藏又曰𨼆而未見行而未成此一爻耳反覆推明至五變其說然後已今之釋者其於他卦能如是推明乎若不能爾則一爻之義只可用之一事易三百八十四爻爻指一事則是其用止於三百八十四事而已如易所該其果極於此乎若三百八十四事不足以盡之則一爻之用不止於一事亦明矣觀聖人於繫辭發明卦義尚多其説果如今之解易者乎故某嘗謂説易須髣髴聖人之意然後可以下筆此其所以未敢茍也問中庸只論誠而論語曽不一及誠何也曰論語之教人凡言恭敬忠信所以求仁而進徳之事莫非誠也論語示人以其入之之方中庸言其至也盖中庸子思傳道之書不正言其至則道不明孔子所罕言孟子常言之亦猶是矣易曰君子敬以直内義以方外夫盡其誠心而無偽焉所謂直也若施之於事則厚薄隆殺一定而不可易為有方矣敬與義本無二所主者敬而義則自此出焉故有内外之辨其實義亦敬也故孟子之言義曰行吾敬問必有事焉而勿正心勿忘勿助長既不可忘又不可助長當如何著力曰孟子固曰至大至剛以直養而無害則雖未嘗忘亦不助長曾子曰士不可以不𢎞毅人須能𢎞然後有容因言陳述古先生云丈夫當容人勿為人所容論西銘曰河南先生言理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等或曰如是則體用果離而為二矣曰用未嘗離體也且以一身觀之四體百骸皆具所謂體也至其用處則履不可加之於首冠不可納之於足則即體而言分在其中矣孟子一部書只是要正人心教人存心養性収其放心至論仁義禮智則以惻𨼆羞惡辭讓是非之心為之端論邪説之害則曰生於其心害於其政論事君則欲格君心之非正君而國定千變萬化只説從心上來人能正心則事無足為者矣大學之脩身齊家治國平天下其本只是正心誠意而已心得其正然後知性之善孟子遇人便道性善永叔却言聖人之教人性非所先永叔論列是非利害文字上儘去得但於性分之内全無見處故説不通人性上不可添一物堯舜所以為萬世法亦只是率性而已所謂率性循天理是也外邉用計用數假饒立得功業只是人欲之私與聖賢作用天地懸隔仲素問横渠云氣質之性如何曰人所資稟固有不同者若論其本則無不善盖一陽一隂之謂道隂陽無不善而人則受之以生故也然而善者其常也亦有時而惡矣猶人之生也氣得其和則為安樂人及其有疾也以氣不和則反常矣其常者性也此孟子所以言性善也横渠説氣質之性亦云人之性有剛柔緩急强弱昏明而已非謂天地之性然也今夫水清者其常然也至於汩濁則泥沙混之矣泥沙既去其清者自若也是故君子於氣質之性必有以變之其澄濁而求清之議歟語羅仲素云今之學者只為不知為學之方又不知學成要何用此事體大須是曽著力来方知不易夫學者學聖賢之所為也欲為聖賢之所為須是聞聖賢所得之道若只要博通古今為文章作忠信愿慤不為非義之士而已則古來如此等人不少然以為聞道則不可且如東漢之衰處士逸人與夫名節之士有聞當世者多矣觀其作處責之以古聖賢之道則畧無毫髮髣髴相似何也以彼於道初無所聞故也今時學者平居則曰吾當為古人之所為纔有事到手便措置不得盖其所學以博通古今為文章或志於忠信愿慤不為非義而已而不知須是聞道故應如此由是觀之學而不聞道猶不學也語仲素曰西銘只是發明一箇事天底道理所謂事天者循天理而已語仲素曰某嘗有數句教學者讀書之法云以身體之以心驗之從容黙會於幽閒静一之中超然自得於書言象意之表此盖某所為者如此仲素問盡其心者知其性如何是盡心底道理曰未言盡心須先理會心是何物又問心之為物明白洞達廣大静一若體會得了然分明然後可以言盡未理會得心盡箇甚能盡其心自然知性不用問人大抵須先理會仁之為道知仁則知心知心則知性是三者初無異也横渠作西銘亦只是要學者求仁而已聞正叔云古之學者四十而仕未仕以前二十餘年得盡力於學問無他營也故人之成材可用今之士十四五以上便學綴文覓官豈嘗有意為已之學夫以不學之人一旦授之官而使之事君長民治事宜其效不如古也故今之在仕路者人物多凡下不足道以此黄氏東發云按此極中時病士大夫宜反求其所謂學學者若不以敬為事便無用心處致一之謂敬無適之謂一文集辱示髙文用意精深益見好學之篤夫養氣之道如治苗然舍之而不耘則有稂莠之傷助之長則揠之而槁矣其説是也然将不舍而耘之則宜奈何與夫助之長者又何辨此近似之際體之者尤當慎擇也又曰反諸身者反求諸身也盖萬物皆備於我非自外得反諸身而已反身而至於誠則利人者不足道也又曰生之謂性未有過也告子論生之所以謂之性則失之矣老氏之有無佛氏之色空盖将明天下之賾非有人物之異也老子以有生于無又曰有無之相生是不知有無一致矣正䝉謂萬象為太虚中所見物則物與虚不相資卒陷於浮圖以山河大地為見病之説山河大地正指物言之也若謂指物言之可也則浮圖見病之說不足非矣此與佛氏以心法起滅天地更當究觀所謂心法起滅天地之㫖未易以一言攻之也更詳味之如何或有未盡無惜疏示與楊仲逺書其三克己者揚雄所謂勝己之私是也反身而誠則常體而足無所克也故前書論反身與克己異意耳更詳考之告子知生之謂性而不知生之所以謂之性故失之非生之謂性有二説也特告子未達耳其四諸子之學折諸聖人猶望洋向若其辨自屈也儒佛之論造其極致則所差眇忽耳其義難知而又其辭善遁非操戈入室未易攻也雖横渠之愽辨精深猶未能屈之為城下之盟况餘人乎置而勿論可也要當深造而自得之則其辨自見矣近日治經讀史如何家居既不為外事湮汩諒須精到也或有論議寄示為幸其六夫聖人人倫之至也豈有異於人乎哉堯舜之道曰孝弟不過行止疾徐而已皆人所日用而昧者不知也夏葛而冬裘渴飲而饑食日出而作晦而息無非道也譬之莫不飲食而知味者鮮矣推是而求之則堯舜與人同其可知也已然而為是道者必先乎明善然後知所以為善也明善在致知致知在格物號物之多至於萬則物盖有不可勝窮者反身而誠則舉天下之物在我矣詩曰天生蒸民有物有則凡形色具於吾身者無非物也而各有則焉反而求之則天下之理得矣由是而通天下之志類萬物之情參天地之化其則不逺矣夫入徳之門有宜先傳者有後倦者其序不可誣也若洒掃應對則門人小子所宜先傳者茍於成人而復使為之則或倦矣然聖人所謂性與天道者亦豈嘗離夫洒掃應對之間哉其始也即此而為學其卒也非離此以為道後倦焉者皆由之而不知者也故曰有始有卒者其唯聖人乎某之所聞如此答李杭伊川先生在時世人迂怪之論皆歸之以為訕笑今往矣士大夫尊信其學者漸衆殊不可曉也先生語録傳之浸廣其間記録頗有失真者某欲收聚刪去重複與其可疑者公幸閒居無事可更博為尋訪恐有遺失聞朱教授在洛中所傳頗多康侯皆有之候尋便以書詢求異時更相校對稍加潤色共成一書以傳後學不為無補先生之門所存惟吾二人耳不得不任其責也與游定夫其六致知必先於格物物格而後知至知至斯知止矣此其序也盖格物所以致知格物而至於物格則知之者至矣所謂止者乃其至處也自脩身推而至於平天下莫不有道焉而皆以誠意為主茍無誠意雖有其道不能行也故中庸論天下國家有九經而卒曰所以行之者一一者何誠而已葢天下國家之大未有不誠而能動者也然而非格物致知烏足以知其道哉大學所論誠意正心脩身治天下國家之道其原乃在乎物格推之而已若謂意誠便足以平天下則先王之典章文物皆虚器也故明道先生嘗謂有關雎麟趾之意然後可以行周官之法度正謂此耳與學者其一學之廢乆矣詖淫邪遁之辭盈天下士溺於所習㝠行而已予嘗考之周官司徒以知仁聖義忠和六徳教萬民夫仁與聖孔子不敢居而先王以是教萬民者葢天地萬物一性耳無聖賢知愚之異故顔子曰舜何人也予何人也有為者亦若是孟子亦曰人皆可以為堯舜故學者必以聖人為師猶之射者棲鵠於侯以為的司徒以仁聖教民盖亦棲鵠之義與之為的耳然仁之為仁聖之為聖必有在矣學者未知仁聖之所以為仁聖雖有學猶虚器也世之論者以謂仁者愛而已矣盖未嘗究觀孔子之言耳知孔子之言仁則聖亦從而可知矣浦城文宣王殿記學始於致知終於知止而止焉致知在格物物固不可勝窮也反身而誠則舉天下之物在我矣詩曰天生蒸民有物有則凡形色之具於吾身無非物也而各有則焉目之於色耳之於聲口鼻之於臭味接乎外而不得遁焉者其必有以也知其體物而不可遺則天下之理得矣天下之理得則物與吾一也無有能亂吾之知慮而意其有不誠乎由是而通天下之志類萬物之情贊天地之化其則不逺矣則其知可不謂之至矣乎知至矣則宜有止也譬之四方萬里之逺茍無止焉則將焉歸乎故見其進未見其止孔子之所惜也古之聖人自誠意正心至於平天下其理一而已所以合内外之道也世儒之論以髙明處已中庸處人離内外判心迹其失是矣故余竊謂大學者其學者之門乎不由其門而欲望其堂奥非余所知也蕭君欲仁志學之士也録示大學一篇求余言以題其後其意盖非茍然者故聊為發之茍於是盡心焉則聖人之庭户可䇿而進矣欲仁其勉之哉題蕭欲仁大學篇後學士廖用中先生剛以下門人廖剛字用中順昌人少從陳瑩中及楊龜山學崇寧五年登第宣和初自漳州司録除國子録擢監察御史蔡京當國論奏一無所避以親老乞補外出知興化軍欽宗即位以右政言召丁父憂服闋除工部員外郎以母疾歸紹興元年盜起旁郡官吏悉逃去部使者檄剛撫定剛遣長子遲諭賊賊知剛父子信義亦散去除本路提㸃刑獄尋召吏部員外郎遷起居舎人權吏部侍郎兼侍講除給事中丁母憂服闋復拜給事中言江淮兵備莫若屯田可以免待哺轉餉之患為三説以獻時朝廷推究章惇蔡卞誤國之罪追貶其身仍詔其子孫不得官於朝於是章傑自郎中出知婺州蔡僅自大府丞提舉江東茶鹽事剛封還詔書謂如此豈足以示懲有㫖悉與之祠遷刑部侍郎乞補外除徽猷閣直學士知漳州漳俗侈靡喪娶踰制剛立條約諭之值日食求言剛請正建國儲君之號布告中外異時雖百斯男不復更易乃可以承天意示大公髙宗讀之竦然詔拜御史中丞奏臣職糾奸邪當務大體若捃摭細故非臣本心又奏經費不支盜賊不息事功不立命令不孚及兵驕官冗之弊時諸將恃功希恩所請多廢法剛隨事論列至于四五諸将肅然鄭億年與秦檜有連遂得美官邉報至從官會都堂剛謂億年曰公以百口保金人今已背約有何面目在朝廷乎因顯疏其惡億年奉祀去復乞起舊相之有徳望者處以近藩秦檜聞之曰置我何地耶改工部尚書以王次翁代其任次翁劾剛薦劉昉陳淵相為朋比以徽猷閣直學士提舉亳州明道宫明年致仕以紹興十三年卒著詩經註解性理小學集註學者稱古溪先生子四人遲過遂遽皆秉麾節邦人號為萬石廖氏閩書簡録道南源委延平府志宏宗正陳知黙先生淵陳淵字知黙初名漸字㡬叟沙縣人瑩中從孫淵初受業程門獨先於瑩中繼亦受業龜山與羅豫章為友龜山稱其深識聖賢㫖趣妻以女當知餘杭時嘗送南歸詩云㡬年夢想到親闈身逐行雲萬里飛苕水未殊沂上樂春風無負舞雩歸紹興五年近臣廖剛胡寅等薦充樞密院編修丞相李綱重其行為布衣交至是為江南西路安撫制置大使辟為制置司機宜文字七年詔舉直言以胡文定安國薦召對改官賜進士出身除監察御史遷右正言入對言比年以來恩恵太濫賞給太厚又論程頥王安石學術同異髙宗曰楊時之學能宗孔孟其三經義辨理甚當對曰楊時始宗安石後得程頥師之乃悟其非髙宗曰觀三經義解具見安石穿鑿矣對曰穿鑿尚小至於道之大原安石無一不差上曰云何對曰聖賢所傳止有論孟中庸論語主仁中庸主誠孟子主性安石皆昧其原仁道至大論語隨問隨答以愛人語樊遲特其一端而已安石遂以愛為仁其言中庸則謂中庸所以接人髙明所以處已孟子七篇專發明性善而安石取揚雄善惡混之言至謂無善無惡又溺於佛其失性逺矣因論和議願以和為息戰之權以戰為守和之具章五上益梗切秦檜惡之復疏論其親黨鄭億年檜益怒遂解言職除宗正少卿以何鑄論罷管台州崇道觀十五年卒著有黙堂集三十卷閩書道南源委簡録宏朝請林朝彦先生宋卿林宋卿字朝彦仙遊人崇寧五年進士與廖剛同造陳了翁受教了翁徐曰頭項直宋卿言下領悟為多又嘗從楊龜山學召試秘書省正字出知恭州時邉臣多以拓地䝉賞瀘南帥司因奏開溪費州置一州二縣宋卿疏以為不可徽宗詔罷其役龜山聞之曰朝彦真百鍊鋼也時尚書省令䕫路斂十萬縑充燕山軍需宋卿言䕫門至隘人心易搖事遂已又請蠲恭民宿逋二十萬八千餘緡米十五萬四千餘石自受俸非祿令所著者一介不取家繪生祠奉之靖康中僑寓涪陵之朝亭日與其士大夫倡酬自適涪人以宋卿才學出處與黄太史相後先因號小涪尹和靖見之曰溪費一奏皆自養氣中得之薦於張浚辟㕘謀軍事力辭建炎三年以涪守王擇仁及河北帥臣薦充湖南帥司㕘議浚視師江上欲以宣撫判官辟不就及還朝首薦之蒙召乞祠終朝請大夫莆陽文獻源閩書道南委運判盧公圭先生奎盧奎字公圭邵武人居太學作毋我論為衆所推號盧毋我講學於楊龜山所論仁及忠恕一貫皆的確有味登政和間進士仕至江西運判有筆録十卷道南源委閩書主簿蕭子莊先生顗蕭顗字子荘浦城人天資樸實少孤事母以孝聞母喪廬墓有靈芝之異與李郁陳彦羅從彦同受業楊龜山之門嘗答友人書云士之所志舍仁義何為哉仁必欲熟義必欲精仁熟則造次顛沛有所不違義精則利用安身而徳崇矣後以累舉得官為清流簿終嵗而歸徜徉閭里朱韋齋嘗師事之道南源委閩書陳先生好陳好初名豪晉江人受業楊龜山後在太學與陳東上書留李綱東被誅變名游瓊州即家焉閩書提刑黄用和先生鍰黄鍰字用和浦城人政和五年進士從楊龜山學甚見器重及為工曹守將髙其才多委以事適諸邑大水按視官希部使者意多不以實聞鍰獨減蠲田租十之八使者怒加誚責終不可奪再調西安丞靖康初李綱宣撫河東辟幕屬髙宗朝拜監察御史首陳七事深䝉嘉納一日問孟子與齊梁國君問答之說鍰對詞義敷暢髙宗曰卿可謂非堯舜之道不陳王前因諭曰黄鍰論人君治心事甚詳當處以諫職㑹有阻之者除江西提㸃刑獄乞祠歸鍰在臺越月風節凜然縉紳推賢天下誦直有奏議雜著論語類觀唐史篤論共二十卷建寧府志委道南源通志廖仲辰先生衙廖衙字仲辰将樂人龜山姪壻善為詩論議得龜山壼奥而年不永學士江全叔先生琦江琦字全叔建陽人宣和三年進士文學行誼知名當世從遊多鉅人長者覃思春秋之學著春秋經解三十卷辨疑一篇楊龜山見而稱之又著語孟說各五卷仕永州學教授厯官宣教郎終徽猷閣學士建寧府志道南源委閩書參議章希古先生才邵章才邵字希古崇安人以父䕃補官少時謁楊龜山先生先生教以熟讀論語才邵玩味躬行世目為篤實君子厯典賀辰二州改荆湖北路參議官楊遵道先生迪以下家學楊迪字遵道龜山子也髫齡已能力學既冠益貫穿古今孝友和易中外無間言平居無喜愠色至急人困乏而樂其為善與人辨論綱振條析發㣲詣極氷解的破聞者欽聳退而察其私言若不能出諸口盖度不身踐不茍言也抱經遊伊川之門以藐然少年同門之士咸斂手推先伊川少然可雅器許之嘗答龜山書曰令子好學美質當成逺器其於易春秋尤精朱韋齋撰墓志云予不及識公自来閩中多從龜山門士遊間論近世學者至公皆曰吾不及也官至奉議大夫朱韋齋先生撰墓志畧楊仲逺先生敦仁以下交友楊敦仁字仲逺將樂人元祐三年進士龜山先生答書云得所恵書謂能不變於俗此固區區所望道廢千年學士大夫溺於異端之習乆矣士志於道者非見善明用心剛往往受變而不自知此俗習之移人甚可畏也若夫外勢利聲色不為流俗詭譎之行以是為不變於俗則於學者未足道也吾子勉之又曰為己之學正猶饑渴之於飲食非有恱乎外也以為弗飲食則饑渴之病必至於致死人而不學則失其本心不足以為人然古之善學者必先知所止知所止然後可以漸進倀倀焉莫知所之而欲望聖賢之域多見其難矣又常與往返論養氣克己之學異端佛老之非閩書集楊龜山先生文延平郡志宣教郎翁好徳先生邵翁邵字好徳順昌人初名醇篤信好古博學工文元豐八年進士調崇安尉時劉韐在布衣邵待以國士遷丞福清亷謹方正當路聞其名欲羅致之檄至公堂猶責以苛邵拂衣面有棄官意檄者愧悔委曲慰安之已而以疾歸里縣令俞偉大興學政屈邵主師席堅讓不出友人楊龜山貽書敦譬不獲已應之數州之士負笈雲集官至宣教郎又龜山先生常與書曰某愚無似加以齒少視公為前輩每辱眷遇進之為執友之遊顧何足當自惟直諒多聞之益所得於長者多矣延平府志生楊龜山先文集審律吴國華先生儀吴儀字國華世為延平人自少篤志彊學老益不懈六經百代之書無所不究窮探博取自信不疑尤深於詩易皆有成説晚益玩心於象數音律之學自為一家崇寧五年詔求天下遺逸部使者以先生應詔辭不就已而敦迫之乃乗驛就道授將仕郎太晟府審驗音律未㡬府罷先生亦浩然而歸不復出先生為人剛毅篤實洞見城府而善善惡惡無所容貸其事親以孝顯交朋友以義著嘗漁釣橘溪之上時或行歌松蹊竹疃莫窺其際龜山先生撰先生墓誌言吴氏以學行著聞鄉閭者有三人焉曰某字及之曰熈字季明而審律先生其一也當嘉祐治平之間士方以聲律偶儷之文争名於時而三人者獨與切磋以窮經學古為務不事科舉退老於家若将終身焉其後季明以經行被召不赴授某官而審律先生晚亦出仕獨及之老於布衣予視三人者為前輩而少得從審律遊最厚云又龜山嘗與先生往復論王氏學嘗題其釣臺及咏歸堂豫章羅氏曽師事焉自號審律學者稱為審律先生閩書生楊龜山先集吴季明先生熈吴熈字季明博學勵操與兄國華齊名時稱雙璧或從之談道論文傾心㵼意語以勢利俛焉不答元祐間陳瑩中瓘以其兄弟學行言於郡守延至學為諸生講經薦於朝被召不赴授某官按道南原委載得召赴闕兹從龜山先生文集楊先生希旦楊希旦将樂人自少文行知名屢舉不第退老於家詩書自娱敦樸夷易晬然長者之風龜山先生言某嘗侍先生燕閒善言懿行飫聞習見又為序其集言其詩文清切平易不尚雕琢閩書志延平府閩中理學淵源考卷一
