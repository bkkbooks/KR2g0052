body:
  text: 閩中理學淵源考卷二十五廣平府知府李清馥撰建陽蔡氏家世學派考劍建間斯時儒術昌明風流世篤人材多萃乎一家一門閩中武夷胡氏而後蔡氏以九儒著蓋得父師之教根源逺矣國録蔡守信先生諒蔡諒字守信家建陽其先弋陽人唐昭宗時八世祖爐從王潮入閩為建陽長官卜居麻沙鎮累傳至伯禧宋真宗時以神童授春官伴讀賜詩褒美弟伯充生諒紹聖四年繇鄉貢入太學除大名司訓擢太學録崇寧間表勸徽宗以剛仁勤儉又語蔡京曰清慎正直宰臣之度司馬光吕公著何等人品而目為奸邪且鐫之石也京大怒即棄官歸寄傲雲谷西山間自號首陽居士子發孫元定曽孫淵沆沈元孫格模杭權自牧堂先生發至静軒先生權皆潔行績學詮經衛道世稱蔡氏九儒云閩書蔡氏九儒書名儒傳處士蔡牧堂先生發蔡發字神與博達古今深究治道清修苦節世人賢之承國録君嚴訓有志當世而復秉執剛毅不能與世俗相俯仰因去游四方見聞益廣邃於易象天文地理三式之説無所不通而皆能訂其得失中年乃歸築室於武夷之陽其間屢遭盜賊水火之變履危蹈險而浩然不以屑意雖一介之微不取杜門掃軌専以讀書教子為事晚號牧堂老人元定在娠時先生嘗以聖賢像設别室使妻詹氏日夕瞻仰以踵太任胎教之風故元定生而穎悟十嵗即教使讀西銘稍長遂以程氏語録邵氏經世張氏正蒙授曰此孔孟正脉也文公朱先生謂公平生所以教其子者不干利禄而開之以聖賢之學其志識髙逺非世人所及云所著有地理發微天文星象諸書子元定九儒書閩書運幹蔡復齋先生沆蔡沆字復之西山次子承父春秋之屬未得要領一日讀易悟曰易一卦一爻為義各異謂春秋以一例該衆事可乎讀書至道心人心則嘆云春秋二百四十餘年間諸侯大夫行事發於道心者無幾聖人於賵仲子納郜鼎皆據大義以止私欲一書綱領在此矣作春秋五論而自為之序初遵父命嗣表伯虞氏更名知方及父謫舂陵領鄉舉從母命歸宗以季子梓後虞氏嘗教學者以敬為入徳門户義為一身主宰復為學者遷善改過之幾又講明復卦言當以不逺復為法以頻復為戒官至兩浙運幹學者稱復齋先生子楠欄閩書書九儒處士蔡素軒先生格蔡格字伯至節齋先生長子性質沖澹躬耕不仕與從弟覺軒久軒静軒自相師友由始至終未嘗少懈時有以佛老之教惑亂衆聴者格與學者講明孟子盡心章以力詆之作至書以警之又著廣仁説以自勵其衛道甚嚴年七十卒學者稱素軒先生九儒書文肅蔡久軒先生杭蔡杭字仲節號久軒九峯先生次子紹定二年進士歴諸王宫大小學教授遷校書郎奏對論正心及内降斜封之弊又言權奸不可復用國本不可不早定理宗嘉納其言淳祐中任浙東提刑遇事立斷人不敢干以私召為國子司業兼資善堂翊贊續以試國子祭酒歴遷工部侍郎權吏部尚書除端明殿學士同知樞密院事寶祐四年拜參知政事落職張磻具奏蔡杭精通經術忠直敢言同僚罕及請復其祠禄以勵清節逾年復端明殿學士予祠致仕卒諡文簡以犯祖諱更諡文肅嘗論劾參知政事劉之傑黨于史嵩不叶物議又論京尹余晦凌辱三學及奏權奸丁全不可用即不待報去在州郡所至祀先儒旌忠節舉遺逸表行義寶祐中奉勅建西山精舍後復奉勅建廬峰書院前後頒賜御書大字先生致政家居皆敬刻本山之石崖修明先聖先賢及先世祀事平生孝友出於天性四時祭祀仍遵伯父節齋遺制遇期功緦麻之喪必素衣以終月數及治喪毋得用浮屠法子公亮大理司直墓志書閩書九儒山長蔡静軒先生權蔡權字仲平九峯先生季子聰明英毅孝弟忠信儀刑子孫肄業於家庭兄弟聯席自相師友以兄恩補承務郎授廬山書院山長教授鄉閭講明義理一日拜龜山先生祠士友請正席臯比因取龜山楊文靖公求仁齋記與諸生講明極其詳密上下咸稱其得家學心傳焉著參同契論以斥二氏衍三問説以自省戒平生講讀之外視富貴利達若將凂之者天性髙潔有祖父風獨處静室幽軒終日怡怡學者稱静軒先生九儒書文節蔡西山先生元定學派按西山先生之學得之晦菴文公相從講授閲四十年真文忠公撰九峯墓表云聘君以師事文公而文公顧曰季通吾老友也凡性與天道之妙他弟子不得聞者必以語季通焉異篇奥傳微辭邃義多先令討究而後親折衷之故嘗輯其問答之辭曰翁季録者蓋引以自匹也此端平二年真公所述後十四年為淳祐九年公之孫杭作朱子語録後序亦言先師嘗有親自刪定晚嵗與先大父西山講論之語及性與天道之妙名曰翁季録者久未得出以流行於世豈斯文之顯晦固有時乎是此書在宋季已莫可尋覓矣先文貞公曽言國朝浙西某家購得是書秘藏多年後經播遷復散佚豈斯文終不傳於世也耶然先生之遺書微義今尚有考前哲謂大者如河圖洪範之説太極經世之㫖所以輔益於朱子者不少其髙深要妙處後學亦未能卒讀也文公嘗曰季通平生學問多謙讓皆寓於某集中是則讀文公集者尤得尋玩其大略一二則是書雖亡謂之存可也噫西山雲谷兩燈相望今去五百載想象芳規者猶如瞻日月而摩星斗矣文節蔡西山先生元定蔡元定字季通生而穎異八嵗能詩十嵗日記千百言牧堂示以二程邵張之書曰此孔孟正脈也先生深涵其義辨析益精讀書西山絶頂忍饑啖薺乾道間見文公朱子於崇安遂師事焉文公扣其學大驚曰此吾老友也不當在弟子之列凡講論諸經奥義諸弟子所不得聞者必以語先生四方來學者必俾先從先生討論而後折衷之文公嘗論中庸已發未發之㫖謂人自嬰兒至老死雖語黙動静之不同然大體莫非已發先生不以為然謂未發之時要涵養一節功夫引程子敬而無夫便是喜怒哀樂未發謂之中後二年文公再與辨論始悟其説而悉反之由是益奇先生故先生每至必留講數日往往通夕對牀不暇假寐諸從文公遊者歸必過先生之家聴其言論不忍去去皆充然有所得淳熙戊申太常卿尤袤祕書少監楊萬里薦於朝特召辭以疾鄉人稱為聘君築室西山将老焉韓􅇑胄擅政設學禁以空善𩔖一時臺諫承風排擊先生知不免謂學者劉礪曰化性去偽惡得無罪及沈繼祖劉三傑為言官連疏譏詆文公并及先生遂坐謫道州州縣捕甚急不辭家而行或曰姑緩之先生曰獲罪於天天可逃乎文公與從遊者數百人餞别蕭寺中坐客有興嗟泣下者文公微視先生不異平時因喟然曰朋友相愛之情季通不挫之志可謂兩得之矣而先生亦賦詩云執手笑相别無為兒女悲與其子沈行三千里脚為流血既至諸州士子從遊者日衆有名士挾才簡傲非笑前修者亦心服謁拜執弟子禮人為語曰初不敬今納命愛先生者謂宜謝遣生徒先生曰彼以學來何忍拒之若有禍患豈閉户所得免乎貽書訓子曰獨寢不愧衾獨行不愧影庶可傳之子孫勿以余得罪故而遂懈焉一日謂沈曰吾欲安静還造化舊物可謝客閲三日卒時慶元四年也年六十四𦵏建陽縣崇泰里翠嵐之山先生卒文公哭之慟誄之曰精詣之識卓越之才不可屈之志不可窮之辨不可復得而見矣天之生是人也果何為耶嘉定三年􅇑胄既誅贈迪功郎賜諡文節先生與文公遊最久精識博聞同輩皆不能及義理洞見大原尤長於天文地理樂律厯數兵陣之説凡古書奇辭奥義過目輒解文公嘗曰人讀易書難季通讀難書易又曰造化微妙惟深於理者能識之吾與季通言而不厭因自輯所與先生問答者號曰翁季録蓋引以自匹也先生居家以孝弟忠信儀型子孫而教人以性與天道為先自本而支自源而流聞者莫不興起嘗言文公教人以訓詁文字為先下學上達固是常事然世衰道微邪説交作學者未知本源未必不惑於異端之説也故文公晚年接引後學亦無隠然者文公疏釋四書及諸經通鑑綱目近思録與先生多所參訂啓䝉一書則屬先生起稾至論易推本河圖洛書邵氏皇極經世書先天圖往往與先生往復而有發焉平生問學多寓於文公集中所著書有大衍詳説律吕新書燕樂源辨皇極經世太乙潛虚指要洪範八陣圖説隂符經解及詩柬雜説若干卷學者稱西山先生明嘉靖間從祀啟聖公祠國朝康熙四十五年從學臣沈涵之請賜御書紫陽羽翼四大字匾於祠子三淵沆沈皆能紹父之學道南源委名儒傳名臣言行外録蔡氏九儒書翁竹林先生易翁易字粹翁建陽人通六經尤長春秋嘗與計偕從劉爚遊因得登朱文公蔡西山之門遂不介心青紫講明奥義往返辨難悉得㫖歸晚嵗授徒竹林精舍學者稱竹林先生子甫字景山寶慶二年進士既仕後尤勵志讀書薦知西安縣除直講太常博士累官太傅少卿出知江西轉運使兼守豫章改知泉州未赴卒以忠悃著聲所著有蜀漢書浩堂𩔖稾讀書壁記丘子陵先生崈丘崈字子陵按西山集言丘子陵才學優長相随謫所辛勤不懈其志餘俟考再按建寧選舉志載丘密甌寧人紹興十八年進士未知即此公否處士蔡節齋先生淵學派劉氏爚撰蔡西山先生墓志曰先生居家以孝悌忠信儀刑子孫而教人也以性與天道為先自本而支自源而流聞者莫不興起常言文公教人以訓詁文字為先下學上達固是常事然世衰道微邪説交作學者未知本原未必不惑於異端之説也故文公晚年接引後學亦無隠然者按節齋為西山先生長子稟學家庭授易學宗㫖又深探無極太極之妙所著有易學訓解太極圖解等書其從事學問本原者蓋家學之標的也前儒嘗論文公近思録首編太極道體諸篇名為近思而實逺思似非初學階梯竊嘗妄議宋世周程張諸儒所以繼絶學者在闡發道體本原而太極一篇即論學之統體也子思子中庸首篇首發性道之㫖萬世宗之近思之録其亦祖述中庸之意歟西山先生所謂文公接引後學之苦心意在斯乎再按公所著易説甚多其太極圖解一篇草廬吳氏嘗譏之先儒闡析微言非後學所敢輕議謹敘述其説與同志訂厥疑焉其云易有太極易變易也夫子所謂無體之易也太極至極也言變易無體而有至極之理也先儒皆以太極二字便為萬化之原而於易之一字但目為易書故太極圖特以無極而太極發明易有太極之㫖其所謂無極而太極者蓋亦言其無體之易而有至極之理也以其無樞紐根柢之形實為天下之大樞紐大根柢也而太極本無極者以其為天下之大樞紐大根柢而初非有樞紐根柢之形也聖人謂之太極者所以指夫天地萬物之理也周子謂之無極者所以著夫無聲無臭之妙也是以無極之説實有得於太極之一言或以為周子妄加者謬也按此條吳氏草廬嘗議蔡氏謂周子於太極之上加無極正是解夫子易有太極之易字而其解易字亦曰易變易也澄謂變易屬乎隂陽豈可以言無極蔡氏自知其説之病乃引易無體之説以救之而曰變易無體之中有至極之理也朱子以易為隂陽之變易有太極者言隂陽變易之中有至理以為主宰也蔡氏既以變易無體為理矣而又曰中有至極之理然則理中復有一理乎變易無體已是言理而又曰有至極之理可乎又曰流行乎乾坤中之易非易有太極之易也果有二等易乎又曰隂陽動静之間是流行中之太極與夫子所言太極降一等果有降一等之太極乎蔡氏所解卦爻彖象多有發明朱子未到處澄纂言中亦取其説但易解後别有大傳易説一卷主於破其師太極在隂陽中之説於道之大本大原差了故有此兩般易兩般太極之謬談云云按節齋所著易解數種及太極通㫖諸書今皆佚而存者少矣吳氏所論或易解中及太極通㫖之論耳若就現今九儒書中所存太極圖解一篇其解易有太極易字謂變易無體而有至極之理亦言其生生不已變動不居無動静無方體而有至理焉耳朱子語𩔖曽言易有太極是生兩儀即所謂易也但先倒説此一句故曰易有太極細玩朱子所論正涵程夫子動静無端隂陽無始之意蔡氏解易有太極似與朱夫子之言不異但以易有太極欲合無極而太極之㫖語意似乎不同蓋易有太極之易字指氣而言而無極二字言其無方所無紀極泛言其無形狀而有此道理耳故朱子曰周子之言有無以有無為一也蔡氏原未説到是理至論流行乾坤中之易非易有太極之易此在蔡氏易書中之論有疵處朱門如陳北溪先生亦曽指摘易説大槩依本義而大義與本義不同多涉元妙此不具録云再按朱子言無體者或自隂而陽或自陽而隂無確定底故云無體也此交易變易之義也至論其體則謂之易語𩔖云與易無體句不同各自説一箇道理而已其理則謂之道則是太極矣又朱子答吳晦叔曰夫易變易兼指一動一静已發未發而言之也太極者性情之妙也乃一動一静未發已發之理也故曰易有太極言即其動静闔闢而皆有是理也若以易字専指巳發為言是又以心為已發之説也此固未當程先生言之明矣此數句解易有太極極得其要領按此則節齋之論易有太極之㫖似與朱子合欲以易有太極之義合於無極則誠如草廬先生所辨摘者矣乾隆壬申二月書處士蔡節齋先生淵蔡淵字伯静西山先生長子也清修苦節有父風與弟沈躬耕不仕内學於父外師事晦菴文公西山嘗曰淵宜紹吾易學沈宜演吾皇極數而春秋則以屬知方焉西山舂陵之謫仲黙從侍先生奉母家居文公曰季通素患難行乎患難伯静艱貞近之道訃音聞先生哀毁骨立一以文公家禮為準廬於墓側泣血三年與當世絶丁母憂年及耳順哀毁踰禮文公髙弟黄幹廖徳明張洽萬人傑輔廣陳孔碩既折年輩以從之游學徒包揚陳文蔚潘柄楊復李燔林䕫孫李閎祖李方子葉采沈僩戴䝉劉彌劭皆執經抱疑以質其學真徳秀陳宓陳韡黄自然王埜莫不曲巷過門以問出處之實理亂之由真公參大政欲以大學為對先生以為實之以事則理有據而言之易入不然無益真公深敬服西山留意宗法先生繹先志而修明之建祠堂立儀約規條整然其謹於禮有如此者先生平生於易中庸太極説最所加意更定數四嘗謂周子無極而太極之説得於易有太極之一言易者變易無體即無極之義著太極圖解一篇發明此㫖見門人翁酉所序及郡守王氏遂所撰墓志至先生之教知行不偏敬義兼備内主於敬而發之以直行之以恕言之有常而動之可則嘗曰屋漏不愧暗室不欺獨行不愧影獨寢不愧衾皆先世之訓服而行之雖妻孥之言未有不可告人者亦未有不可告於天者暴慢鄙悖之人一見先生尊敬斂衽蓋素履之懿有以動其秉彞好徳之良心焉所著有易傳訓解易象意言卦爻辭㫖古易協韻大傳易説象數餘論太極通㫖化原聞辨中庸通㫖大學思問論孟思問讀詩思問體仁擬議性情機要等書學者稱為節齋先生端平三年卒年八十一子四格柄植棟九儒書閩書翁思齋先生泳翁泳字永叔始祖郜唐昭宗朝謫次從王潮入閩泳篤志好學從蔡節齋游與熊竹谷蔡覺軒為同門友註釋河洛運行講義學者稱思齋先生閩書侍講葉仲圭先生采葉采字仲圭初從蔡節齋受易學又嘗從李果齋陳安卿游安卿以其好髙妙少循序屢折而痛砭之自是屏斂鋒芒駸趨著實構漁隠精舍問學日進淳祐元年登進士第授邵武尉歴景獻府教授遷祕書監論郡守貪刻遷樞密檢討知邵武軍作郡乗築祠郡泮以祀朱子復置田若干頃祀朱子於光澤以果齋配累官翰林侍講乞歸所著近思録嘗以進呈理宗稱善又著解集西銘性理等書閩書道南源委進士翁先生酉翁酉别號思齋崇安人紹定五年進士九儒書詹先生樞詹樞崇安人好學粹文不茍仕進邑令陳樵子重建武夷精舍延樞與熊蒙正為士人講説後輩欣然從遊此公竢再考文正蔡九峰先生沈學派按先生於尚書及洪範數稟學於家庭卒之書成垂世不媿父師之託蓋一門潛心大業推本於牧堂西山貽謀者逺矣余嘗向慕彼時師友林立講磨切究其扶翼正學淵源為可稽也西山真先生嘗言某之生也後不及拜聘君床下復得與先生昆季及公晦諸公游比年退處念一相從於廬峰幔亭間迄不可得而坐中客如先生與公晦父皆不復存然後知一日之會為千載之訣其亦可悲也夫觀此想見當時英賢一時聚散皆為正學顯晦所闗噫自文公之後勉齋黄氏節齋九峰蔡氏雲莊劉氏果齋李氏諸髙弟維持者數十年其後獨西山與鶴山私淑之餘仔肩道脈朱蔡之學賴以不墜師友從遊啟迪之功其所繫豈小哉文正蔡九峰先生沈蔡沈字仲黙西山先生季子也與伯兄淵次兄沆皆從文公遊先生年僅三十即屏去舉子業一以聖賢為師及西山坐謫舂陵先生随侍從行繭足走三千里至則父子相對以禮義相怡悦西山卒䕶喪歸於道有遺金義不可受者固却之曰吾寧随所止而殯不以累吾親也初西山以洪範之數久失其傳獨心得之未及論著曰成吾書者沈也文公晚年訓傳諸經略備獨書未及為整環視及門求可付者遂以囑先生先生既受父師之託凜凜常若有負蓋沈潛反復數十年然後克就其序書略曰二帝三王之治本於道二帝三王之道本於心得其心則道與治可得而言矣後世人主有志於二帝三王之治不可不求其道有志於二帝三王之道不可不求其心求心之要舍是書何以哉晚卜居九峰雖當世名卿物色訪求不屑就也平居仰觀俯察黙坐終日瞭然有見於天地之心萬物之情反求諸躬衆理具備信前聖之言不予欺也西山嘗著律吕新書八陣圖皆為文公所歎重然學者鮮窮其微間以叩先生無不毫分縷解者真公文忠撰先生墓誌云某生也後不及拜聘君牀下而喜觀其書嘉定中始見君后山未幾過余于洪都之郡齋留止數月暇則相從質問得所未悟後三年将之潭詣諸君以别户庭幽潔竹樹茂美如適君平子陵之居伯仲聯席衣冠偉然若圖繪中見古人物會李公晦蔡元思繼至引觴命爵名論迭發雜以辨争竟日散去未知離别之可重也比年退念一相從廬峰幔亭間迄不可得而坐中客如君與公晦皆無復存然後知一日之會為千載之訣其亦可悲也夫君承家學淵源河洛由祖槩孫後先一轍言學之有本者必推焉紹定三年卒年六十四諡文正學者稱為九峰先生子模杭權九儒書真文忠撰墓誌侍郎黄元輔先生自然黄自然字元輔甌寧人嘉定末教授郡學以理學誨諸生齋宿問辨率至夜分及漕廣西猶捐俸餘助修禮殿官至吏部侍郎郡志教授蔡覺軒先生學派按宋季山長教席多為名賢栖託之處蓋當時遺逸傳經之儒視此職者為重其在朝廷之上者亦以此職慎擇其選而待之不輕余讀揆席范謝諸公交薦覺軒先生之奏牘可考焉其曰布衣蔡某承累世之心學有經濟之大才自考亭師友散亡之後如某者未見其比是淳祐間有學有守之儒也曰處以學職必能倡率士𩔖知所嚮方是欲責成於秉鐸者作養人才之事也夫推許在大賢之列而量才為學校之官當時選授教職由揆席薦舉其鄭重如此故一代人才萃蔚由此道也延及元代儒宗文師此席尚磊落相望溯學脈稽文獻者不禁憮然於諸賢教授蔡覺軒先生模蔡模字仲覺九峰先生長子操行髙潔風度夷坦隠居篤學一以聖賢為師王埜創建安書院請任席長淳祐中太守王遂薦之於朝堅以疾辭後宰相謝方叔等薦乞表異以勸後學詔補迪功郎添差本州教授令有司録所著書并訪以所欲言模疏言敬義為萬世帝王心學大㫖价人大師等六者為國家守邦要道及請頒白鹿洞學規於天下嘗輯文公之書為續近思録及易傳集解河洛探賾大學衍論語孟集疏等書學者稱覺軒先生九儒書教授熊古溪先生剛大熊剛大建陽人嘉定七年進士少穎敏從蔡節齋黄勉齋遊問學精専操行篤至為建安教授所著有詩經註解性理小學集解學者稱古溪先生性理大全儒閩書蔡氏九書按蔡氏九儒書載先生撰牧堂地理發微序自言初受業於覺軒先生之門蓋皆得蔡氏一家師承所自矣今總附之覺軒學派焉侍講翁丹山先生合翁合字叔備崇安人七嵗能文辟童選登嘉禧二年進士歴官有聲賈似道謫建州合上言建實文公朱子闕里三尺童子亦知向善聞似道名咸欲嘔吐況見其面乎乞投荒裔以禦魑魅似道坐責授髙州團練副使循州安置景定中擢侍講號丹山所著有丹山集建陽郡志備考蔡氏九賢著述書名紀略曰蔡氏九賢著述甚富惜今無全而文公敘述伊洛諸儒遺言季通之力為多真西山先生撰九峰墓誌云文公顧曰季通吾老友也凡性與天道之妙他弟子不得聞者必以語季通焉異篇奥傳微辭邃㫖多先令尋討而後親折衷之故嘗輯其問答之辭曰翁季録者蓋引以自匹也而翁易行實述又云易學啟䝉一書季通研精覃思屢年而後就晦菴復刪潤之始克成書他如近思録之所討論伊洛淵源録之所𩔖集通鑑綱目之所草定太極通書西銘之所講辨季通靡不盡心故每稱其考訂精密又云季通平生著述多謙讓寄寓於某書集中云見九儒書蔡氏書堂實跡曰南山草堂在崇安縣武夷二曲兠眉峰下牧堂公創書堂三間為游息之所嘉定戊辰公孫淵沈兄弟復搆書堂於舊址相與講學其中後文肅公杭因祖父之舊而堂搆焉故曰咏歸堂又顯慶堂在建陽永忠里麻沙鎮北象岩晴雪山下紹興間牧堂公創書堂三間教其子元定公讀書之所又西山精舍在建陽崇泰里西山與雲谷對峙四面壁立山頂平曠有前湖後湖兩水歸内淳熙乙未元定公築室結廬建石門城圍與雲谷文公兩燈相望往來講道理宗朝御書西山二大字頒賜文肅公杭刻於本山之西南崖又大明堂在建陽崇泰里雲谷廬峰之下慶元間九峰公沈受文公之命作書集傳創書堂二棟五植寶祐三年理宗御書廬峰二大字頒賜文肅公杭刻於本山之岩何氏喬遷潭陽文獻蔡氏卷引略曰蔡氏爐弋陽郡人生唐宣宗大中中拜鳳翔節度使再授東昌刺史昭宗朝謫次從王潮入閩為建陽長官同劉少府翺節度使翁郜同時入閩而長官後卜居麻沙鎮水北四世出九賢者孫名梅實為西山先生之派祖梅四傳至伯禧宋真宗朝以神童授春官伴讀賜詩伯禧之弟伯充為西山先生曽祖伯充之子名諒字守信由太學授國諭伯充之叔名琇生子襄字君謨随父居興化之莆田伯充之孫名發號牧堂子元定諡文節厥後朱文公自五夫遷居考亭築書堂於雲谷而文節亦自麻沙卜居後山築室西山所謂疑難堂懸兩燈相望因號西山閩中理學淵源考卷二十五
