body:
  text: 閩中理學淵源考卷七十五廣平府知府李清馥撰學博何怍菴先生家世學派按鏡山先生著我私志志私族也何氏譜系志逖基公之孫至元末兄弟以軍役他移始分派一郡城一潯渼一漳江我私志録自五世祖諱安字叔恭始叔恭先生領洪武丙子鄉薦授開建江山二縣儒學教諭通毛詩春秋二經數傳至怍菴先生專精學易兼治宋儒書遂開大理司徒一派蔚為儒林楷模其家學源本固逺有端緒矣文簡黄公嘗曰怍菴先生於先中允公為􅒼壻先公嘗謂小子某曰何先生後學師表也爾宜以師道事之然則怍菴當日為吾郡師資典憲載之名賢碩彦集中可考也至其敦詩説禮一門父兄子姪自相師友鼎革後培所忠寅諸公歸隠終老其飭躬範家典型猶在至今述舊徳者稱家學未艾云兹録其畧載於編學博何怍菴先生炯何炯字思黙號怍菴晉江人專精易學治宋儒書有名諸生褎然為後輩師表士從㳺者以數百人嘉靖中應貢試内廷世宗親擢第一授安福訓導立教必本忠孝擇周程張朱遺言之切於讀書者刻之學舍以教生徒從其邑先生鄒文莊守益講徳論業舉祀鄉賢申奬節孝事皆闡實徳雖貴勢不少徇所賞識士如傅應楨劉臺皆以氣節顯遷靖江教諭其教一如安邑士莫不仰其方嚴樸直以古君子尊之嘗於學齋召諸生月試之靖僻邑諸生為時義外史傳朦如炯試目必先論策後經義以進其才識邑士遂有達者性至孝早孤念禄不逮養孺慕不替衰白脩家譜以識先徳嚴寝堂以肅先祀編次泉郡先哲之文章為清源文獻裒王忠文真文忠二公守泉之文章政教為温陵留墨二書並刻於郡齋莊氏履豐撰文集序稱其所傳著大指在實學實行以究乎彞常之極故其為文體物切理意鑄性鎔澹然而文黯然而質蒼然而老於骨卓然而髙深於裁盖絶不為浮異詭瑰之辭所謂孝弟之言藹如仁義之言粹如也子喬遷喬逺别見學派舊郡志氏我私志莊撰文集序大理何齊孝先生喬遷孫運亮附何喬遷字齊孝晉江人與弟司徒喬逺世其尊人廣文公炯學同習戴氏經初治博士言有聲最後攻古文辭俊潔典亮矩矱歐曽萬厯丙子舉鄉試第四人授建陽縣教諭却贄給貧以宗朱扁其堂刻潭陽文獻於學齋中擢國子學正大司成委校二十一史進大理寺評事讞獄多所平反卒於京師所著有廷尉集孫運亮字忠寅崇禎癸未進士授廣東海康縣知縣甲申後與林下諸先達共結詩社環堵蕭然嘗稱述先訓以為家規云著有草間集咏史癸甲草諸編舊郡志新郡志何氏家譜庶常何培所先生九雲何九雲字舅悌號培所鏡山仲子也萬厯壬子舉于鄉天啟辛酉鏡山起用少卿九雲侍京師同里相國蔣八公黄石齋黄東崖太史莊羮若鄭大白銓部林素菴皆為文章性命之交東崖復特薦于朝丁丑下第授漳平教諭端嚴率士捐俸搆布衣陳先生祠又築講堂於東山寺側每釋奠先期親視捐俸修文廟刻宋名臣言行録舉先朝未祀鄉賢中允景公暘以下十人癸未登進士第授庻常讀中秘書不浹旬而際國難誓死以父未葬自賊營逃遁南歸歸後扁其軒曰東湖閒史與二三遺老結社山中順治己丑年卒年六十九雲嗜好經籍癸丑北返過維揚鹹使者為鏡山門徒馳書相問淮商欲夤縁納賄九雲叱之曰柰何以不肖之行辱我故人閣部曽二雲㕘藩泉州聞九雲名造庭下交九雲不受刺不庭謁既成進士或謂公宜見政府早為地九雲曰某平生不敢喪其所守其出處大節𩔖此所著有荷野集新郡志平邑志漳何氏家譜戶部翁海門先生堯英翁堯英字熙采號海門晉江人少警穎博學强記善属文嘉靖十九年鄉薦六上春官謁選得懐集平粤賊三載報考功召為太僕寺丞歴户部員外郎旋歸杜門謝客捐餘俸搆祠堂祭器讀書於諸史百家靡所不窺顧獨潜心易傳太極諸書所著有易傳節解太極圗説教民歌詩文論藁諸篇蔵于家卒之十餘年登懐集循吏邑志又數年祠名宦又數年祠鄉賢采公評也堯英為何怍菴髙弟清源文獻載其贈張月洲天衢之洛容序略曰余友月洲張先生分教西粤之洛容人咸謂逺且陋非所以處先生先生怡然喜以為吾舊逰之地也居易俟命志之所至即至矣無所謂險易逺邇也世稱豪傑之士翔奮君子之林者可多數哉然或陟據通顯或投置冷落或騰茂初年或收功末路其途不同其趨一也士所遇亦何常之有余觀漢興重文學爾雅博士學官著之功令維時言詩無如魯申公者年九十餘矣其徒王臧趙綰等力薦於朝當是時安車駟馬弟子傳從天子為親問治亂之事力行一言何其壯也今先生詩學為世名家年未逮申公而志不讓焉何有途之險易逺邇哉先生行矣申公退居謝賔客弟子自逺方受業至者猶以千餘人先生方銜天子新命涉萬里以教出平生之素變一方之士夙莫横經口傳心授隨材培植之又以其餘大肆力文章俾與栁栁州頡頏上下皆先生夙志亦餘事也聖天子夀考作人嘉恵文學重儒術制作以崇化本庸知不有嘗受先生詩如臧綰輩者言之于朝安車蒲輪以迎令濟濟多士乗軺傳從者相踵耶夫老驥垂耳於林坰人將以外閑下乗視之然壯心猶在一試之羊腸太行顧盼千里先生勲業毋𩔖是乎於是先生躍然曰詩云周道如坻其直如矢又云人之好我示我周行吾與子相從筆研之好有年矣切磋之功吾何以報子也請敬服斯言楊文恪撰墓志清源文獻少卿李存孝先生纉李纉字存孝晉江人受經何怍菴之門嘉靖二十九年進士授戸部主事丁艱服除補禮部遷祠祭司郎中迂直不善彌縫為嚴嵩所擠出為景府長史景王初之國從官中貴人勢張甚所至魚肉小民纉請王以法繩之横者乃戢未㡬王薨召為鴻臚少卿禮儀肅嚴清節益振尋罷歸新郡志何鏡山撰墓志通判沈震卿先生維龍沈維龍字震卿號宗西晉江人嘉靖三十七年鄉薦維龍少孤事母獨至又上奉其祖母其喪父時年方十三侍父病隨醫調藥至廢寝食父歿哀毁如成人至宗中立祠立田脩墳脩譜無不獨任事叔友弟敦族睦宗尤謹始仕廣之翁源革除奸蠧雅重儒術置學田贍士一日單騎入賊壘下賊千衆而生擒其譎酋梁忠既平餘黨聴撫歴蕪湖縣去供應節省民力興學教士視翁源有加旬月承重祖母憂服除補浙之慶元居五年遷恵州通判旋拂衣歸養杜門讀書數武之田不展十畆之桑常閒與人言下氣怡辭而一歸於孝弟忠信之行嘗自銘以示子孫曰予幼而壯壯而老有所勉有所戒有所教皆臨深履薄之意云何鏡山先生撰本傳王先生應篤王應篤南安人承箕子為諸生受業於何怍菴先生其殁也怍菴嘆曰是予之髙弟也走唁承箕承箕有十子應篤其三獨以孝稱問所以孝則凡承箕志與事咸體而為之承箕仕凡門内賓祭諸政一以委焉嘉靖之季邑中寇賊輙發人塚應篤募死士與寇為出入發大父柩竁扶之歸得無恙倡脩祖祠為族人先事繼母毋怠伯兄遘疾奉湯藥卧起與俱宗族不能婚喪者皆助以舉他如扶人困阨不遺餘力云何鏡山先生撰王孝子傳司徒何鏡山先生喬逺學派余嘗讀鏡山公文集載王未齋傳而知怍菴先生與公為一時典型師表維挽狂瀾之砥柱也公生於萬厯之代至崇禎初年捐館維時士風譚説異矣公之言曰當嘉靖之時晉江有蔡松莊先生講易松莊之墅弟子雲從而吾先子怍菴與之相亞當是時王文成之學方新學士大夫多議其簡徑而閩中諸先正去考亭尤近尊守其致知力行之説以合於聖門博文約禮之義不敢一毫離於繩尺其為功甚勤而其踐履甚實及乎今日而始講性命以為髙扣𤣥虚以為歸求之躬行實踐之際茫然背馳不見其影響而去諸先正之學逺矣嗚呼公之言如此其為世道慮也不亦深切著明哉即此見公之篤信師説遵主朱學淵源相紹􅃀乎不移後之論公者亦莫過於公所自述者矣公著作宏富如名山蔵閩書包羅涵蓄列代英賢言行昭然可考即公之志事亦具見於是矣嘗論學曰主静莫如居敬致虚莫若明理此尤救明季末流之弊林氏素菴曰泉自紫陽教鐸以後學脈薪傳蔡文莊陳紫峰何鏡山家省菴相繼互有發明諒哉再公門人林氏如源撰公遺事曰司徒佳話記云如源侍公于鏡山嘗取名山蔵翻閲公曰此藁猶未定吾每喜閲者刪改按此乃公暮年之語詳於佳話中閩書亦暮年之作疑亦未為定本今併及之又按先生門徒莫得盡詳有從衷一而從先生者俱不重載今據集中所見及校刻公集諸姓氏録其著者載于篇司徒何鏡山先生喬逺何喬逺字穉孝號匪莪學者稱為鏡山先生父怍菴公炯潜脩篤學為靖江教諭子四季即喬逺稍長讀書過目成誦厭塾師句讀贈公獨教之年十四五即攻古文詞有志聖賢之學未肯俛首舉子業以希急售年十九與兄大理喬遷同領鄉書時與楊文恪道賔莊户部履明李左相夢麟山人黄克晦結社稱五子萬厯十四年成進士除刑部主事歴儀制司郎中時光宗為皇第一子十二齡未冊立神宗傳諭禮部將三皇子并封以待將來有嫡立嫡無嫡立長喬逺上疏以祖訓無待嫡之條請行冊立於是并封議寢考功郎趙南星被斥陳泰來顧允成等俱論救鐫秩喬逺抗疏極言之倭攻朝鮮急大司馬石星闇懦至為請封貢喬逺疏言其以和欺主因進累朝馭倭故事力阻之而星堅持已説疏竟不行坐累謫廣西布政司經厯以事假歸思北山先墓在焉且為贈公手植荔園遂之鏡石結土椽世傳鏡山是也里居二十年中外交薦不起光宗即位即召為光禄少卿喬逺以為大行而得遷非臣子所忍言九月光宗崩熹宗即位葉文忠鄒忠介二公先後以書道出處之義天啟元年始赴闕移太僕王化貞駐兵廣寧主戰喬逺畫守禦䇿力言不宜輕舉無何廣寧竟棄經撫繼逃合疏請并逮治時傳為五少卿疏初喬逺與鄒元標馮從吾皆於林居考徳為事而汪應蛟楊東明髙攀龍曹于汴一時同志并起廢籍因城南建首善書院科臣朱童䝉劾之喬逺言書院上樑文實出臣手義當并罷再疏不允仍用為光禄卿上薦舉疏舉同縣李光縉永春李開芳同安黄文照海澄丁玉明龍溪張燮及華亭陳繼儒有㫖議覆盖薦舉久已不行喬逺復倡發之會舊病作方志乞歸旋有銀臺之命言者謂其因病得陞喬逺聞之即日出國門方上辭疏熹宗以喬逺舊學清脩起用未久不許再堅辭疏凡五上乃晉户部右侍郎以歸入里門即便道鏡山作客位帖引太祖戒汪仲魯告歸不得輙通郡邑官長作祠堂帖引孔子鄉黨恂恂戒子弟不得横取人財横辱人箠楚以慢父母虐兄弟會郡守移建朱子祠為泉山書院延主教事魏璫竊柄屢欲起喬逺以收人望不赴益與社中講論切磋躬行之學戊辰已巳間鄭芝龍肆氛海上喬逺開誠約束欣然就撫李魁竒再叛獨言招我非何侍郎不可喬逺毅然親至中座慷慨諭以禍福弭耳不敢動收囘巨艦利器當事因掃平之崇禎二年臺省交薦特起南京工部右侍郎具疏引年甚切屬有邉警慨然曰此豈臣子髙卧時也立就道甫入都即上疏言敵盤踞内地須日夜撓亂之毋以塘報為了事截殺為虚名請開鎮江之練湖以通運道懐宗嘉其老成體國署戸工二部署事二月乃乞骸歸懐宗以清名慰留再力請乃許猶復上開海禁一疏入閩至建陽遍拜考亭諸儒祠墓崇化里有横渠子孫在焉為書祠記以西銘一篇括盡仁體而要以完天所生為主無常變死生一以順受天命還稟天則發程朱之㫖既抵家脩羅一峰書院於月之三八日與鄭孩如唐見梅韋衷芹黄季􅌢張𤣥中率諸門人集講曽撰講懲忿窒慾二解且言人於一嵗之中循省善念㡬多惡念㡬多庻漸漸有遷善改過近裏著已之意語極切至常題一聨座右曰人心中無私便聖天理内行事最樂海内以喬逺與鄒南臯馮仲如趙鶴儕並稱崇禎四年卒年七十四喬逺終始四朝後先一節安貧樂道鞠躬厲行平生徳容沖粹與人交洞見肺腑自少勵志前脩既立朝以文章氣節自砥里居多年益加意學問因人設教誘廸以躬行語黙之常扁其齋曰寡過又曰自誓取古人誓墓之義命其堂曰耻躬每與許敬菴李見蘿范晞陽洪桂渚諸公論學不分别門户不支離心性惟欲於庸徳庸行中步步繩尺庶不負終嵗讀書求友之意大學士葉文忠向髙問林宗伯欲楫曰何穉孝何如人也答曰文章氣節人皆知之其深於道學人未必知也葉曰穉孝吾未嘗見其講學林曰惟不講學乃真道學耳因具述其平生得力惟自誓寡過不求人知文忠以是序閩書稱其平生篤學真脩無愧宋儒云所著有釋大學釋武城釋大誥召誥洛誥他纂述之作在刑曹有獄志在禮曹有膳志而大者輯明十三代遺事為名山蔵集一代賢士大夫所論著擇其雅馴兼收衆體為皇明文徵又纂閩書百五十卷自著詩文百餘卷有萬厯泰昌天啟崇禎等集壬申七月福建巡撫鄒維璉以大學士史繼偕等公舉理學名臣題請特祠祀于學宫之左隅贈工部尚書予諡後未得諡九年興泉道曽櫻為建理學名臣坊十六年賜祭葬子九雲見家學明史行畧家學新郡志宫賛鄭大白先生之鉉鄭之鉉字道圭號大白晉江人博通經史天啟壬戌進士選庻常授簡討纂脩神宗實録時魏璫竊柄之鉉浩然求去丁外艱哀毁㡬殆居家五載於後彦多所奬進旋起授宫賛冊封岷藩事竣念母馳歸至莆病卒按先生曽與何培所九雲林讓菴𦙍昌傅渼溪元初王何稱之驥黄石眉日昇黄東厓景昉同結社為文沒後東厓先生為撰行狀新郡志通志湘隠堂自識給事李元馭先生焻李焻字元馭晉江人崇禎甲戌進士殿試二甲一名授禮部主事擢兵科給事中召對陳禦敵宜以守為戰平賊宜以剿為撫上首肯久之差封益藩還遷禮科督餉江西再往粤東至武林病卒新郡志給事傅渼溪先生元初傅元初字子仁晉江人祖道唯鄉薦累官按察副使里居為李文節所重元初崇禎元年進士授浮梁令建議漕運折色民立祠祀之直指舉卓異入部會丁外艱服除擢工科給事中條議屯政馬政及閩海利源悉軍國至計以劾南吏科為所中罷歸卒於家所著有尚書撮義四卷自跋云齋頭索居餘忠耿耿輙温尚書舊聞參合經史要求真實經濟而訓詁經生之習愧未免焉林氏𦙍昌序曰吾郡襟江帶海扁舟上下可以溯洄然郡士大夫鮮有為此㳺具者渼溪傅子既卜其尊人宅兆於渼溪復以一葉作江上岵廬風朝月夕乗潮往來而省視焉余問舟中往來所讀何書渼溪曰吾幼從父祖讀尚書開卷見放齊舉𦙍子為千古諂􅆺之祖驩兠薦共工為千古朋比之祖當時未設諫官知人之哲獨推聖帝然四岳舉舜未嘗論賞薦鯀不效未嘗議罪吾忝諫官每念二祖列宗用人行政之大克嫓美於典謨因撮史合經名為撮義夫猶是幼從父祖所讀尚書也一日林子攜榼舟中與渼溪泛逰筍江浯溪溜諸勝訪曽子霖寰於法石曽化龍别號則撮義已成帙刋傳海内矣余既羨渼溪之思竒而才敏志孝而願忠顧竊歎以其烺烺天球之章為坎坎河干之具因為朗誦説命三篇拜手颺言曰君家傅巖濟川作楫亦惟代言納誨啟沃乃心今撮義稱引古昔揚扢昭代閑邪陳義足為經筵啟沃之資當宁側席旁求吾子其以尚書進為恭黙遜志稽古訓之一助巨川之濟有如此舟豈獨借岵廬於江上哉曽子曰善請書之為撮義序按此序林氏筍堤集脱漏未刻雍正間郡志朱氏經義考林維清先生如源林如源字維清晉江人五嵗而孤七嵗而通文史年二十餘舉有司不遇築室於其所居馬鞍山之旁名堂曰五因盖因山因水因樹因石因其先人故所逰盤之跡結而隠焉讀書其中老至不知遍借書籍於人録其佳話分為四科人倫庶物靡不攟載惟所常目則罷抽揚星霜七更藁楮四易命其兒夢叶夢甲夢斗手書之而名之曰五因閒抄又有綱目集要史評八閩名山志掇名志何司徒佳話順治戊子年卒年七十三子四二為名諸生有名於時季曰麟禎比部林先生竒㯣林竒㯣字未詳按鏡山先生撰竒㯣父東井林公太毓墓誌云林氏之世有太平守鉞賢士大夫也與吕涇野顧東橋屠赤水張甬川同時而與之㳺好子太毓受業里中先輩李白齋公及吾先子怍菴公卒年僅四十有四太宜人黄氏督比部兄弟讀書兼晨夜比部歌鹿鳴守澧州太宜人八十四矣愀然曰爾第為余作五斗耶家人自澧還問政亷平乎無他及三載秩滿丁蔡母憂癸亥補東牟得贈公為奉直大夫而黄太宜人封母也此時太宜人九十又一比部君居比部事實未詳其受業鏡山先生見萬厯集校刻門人今錄出待考何司徒撰林太毓墓志御史徐奕開先生縉芳徐縉芳字奕開晉江人榮之孫萬厯辛丑進士李徳御先生登卿李登卿字徳御從鏡山先生受業黄氏季􅌢云吾黨中不可一日無徳御黄鳴晉先生黄鳴晉名未詳從鏡山先生受業與修閩書黄麗甫先生黄麗甫名未詳林氏素菴曰鏡山髙弟黄麗甫蚤以毛詩登壇盖鏡山早嵗得鄭道圭而詩名益顯晚得黄麗甫而詩情益豪抑麗甫先世竹溪肖竹二公文章徳業為世所宗家有衣鉢又不徒學鏡山者矣餘事實未詳筍堤集郭先生望奎郭望奎晉江石湖里人祖孝義先生始遷郡城中孝義先生名尚謙以至孝文學名見志乗望奎為諸生楚楚者嘗受學於鏡山先生餘未詳待考核焉何公撰孝義先生傳後縣令潘士雅先生藻潘藻字士雅以明經仕寧徳訓導處諸生如朋友切磋共之士皆樂從遷廣東長樂知縣視民疾苦如其自身不取民一錢也以其兄瀾仕廣憲迴避改官歸卒平生錚錚志古人臨沒猶與予談曽氏之學請與必有正是托孤寄命之根其卓見如此何司徒文集宗伯林平菴先生欲楫學派按先生撰鏡山何公志狀云某從壬寅嵗以文字受知鏡山遂托門牆考徳問業溯吾鄉彼時英髦陶鑄鏡山之門者為多也厥後先生歴官清要物望巋然於後輩亦多所奬進如吾宗餘隠先生光龍其一也再考先生館甥張􅃀菴潜夫疑在及門之列今并附之其餘待考先生著述今存者易勺一書國朝督學汪公薇及諸前輩序言表章備矣獨友清堂文集未見馥從乾隆丁丑寓郡齋託友人從先生家購覔無得先生舊里在郡之南鄉其族裔太常林氏洪烈為吾先公辛未所得士因是訪先生的系近頗式微而篇籍亦荒渺莫問可勝嘆哉謹識之尚有待訪求云己卯四月望前二日書於雲津山館宗伯林平菴先生欲楫林欲楫字仕濟號平菴晉江人萬厯癸夘鄉薦第一三十五年成進士選庶吉士授編修假歸起充廷試掌卷官使封益藩還掌起居注戊午典浙試假歸泰昌初起左中允天啟元年轉右諭徳陞右庶子擢少詹事晉禮部右侍郎六年遷南吏部懐宗立陞禮部尚書掌詹事朝議誅毛文龍力言不可與閣忤假歸三載召脩實録甲戌充殿試讀卷官教習館員引疾去戊寅起掌部職楊相嗣昌議増兵餉欲楫力言三空四盡之秋以窮民養驕兵未見其利復具民窮兵荒疏力指時弊不報差視鍾山陵寢還至天津連疏以疾乞休歸卒於家所著有易勺老子勺日記友清堂集雍正年間郡志閩中理學淵源考卷七十五
