body:
  text: 閩中理學淵源考卷九十一廣平府知府李清馥撰福寧明初諸先生學派福寧僻在海隅宋時名流輩出延至元代儒宗尚踵起相承至明如蔣氏悌生林氏珙陳氏自新林氏偉高氏頤皆精専儒學教士傳業稱躬行實體之儒雖元之遺獻而實有明一代倡學之師也程氏鉅夫謂自鄉儒先游紫陽之門而絃誦衣冠盛自鄭氏樵師氏古教授而經術明其所由來尚矣訓導蔣仁叔先生悌生蔣悌生字仁叔福寧人檢身勵行雅不出仕洪武初舉明經任本州訓導教誘諄諄多所成就著五經蠡測五卷微詞隠義多發前人所未發閩書道南源委訓導林仲恭先生珙林珙字仲恭福寧人篤信力行以開來學為己任舉明經授本州訓導雖窮約泰如也助教林孔徵先生文獻林文獻一姓陳字孔徵福寧人博通經學旁及子史舉明經授國子助教立教有方生徒仰之閩書縣令高應昌先生頤高頤字應昌福安人孝友天性臨財以義親沒廬墓三年教授鄉校旬暇輒至墓所拜哭洪武間舉孝亷召對稱㫖遂授海鹽知縣卒于官著詩集傳解閩書源委道南陳貢父先生自新子孟龍陳自新字貢父號敬齋寧徳人通五經精易本傳義而推衍以皇極經世書從遊者衆著有起興集等書行世子孟龍字霖卿博學能文洪武初舉明經歴廣東僉事林先生偉子仕䕫林偉寧徳人學問該博與高頤余復為友義方之教甚嚴子仕䕫學行俱粹以亷能見稱官通直郎孫祖泰知建昌軍給諫林廷吉先生文迪林文迪字廷吉寧徳人𢎞治乙丑進士授刑科給事中遇事敢言奉命清糧卒於廣西文迪性敏質粹學博識醇著有五峰遺稿通志長史周質夫先生斌學派按周質夫先生在明初以經學著識楊文敏於童年授之以業後為國子師多士悦服固亦一時師範也長史周質夫先生斌周斌字質夫寧徳人嫺雅夷曠明詩禮二經教授建寧嚴立教條作新士習與郡大夫語皆政教大端雲南平進賀表稱㫖賜金幣秩滿太祖召至便殿承顧問以質直見重拜中都國子司業約度明信諸生悦服陞齊府左長史輔翼開陳一以正道丁内艱卒楊文敏公微時斌一見竒之親授以業語之曰子器識非常他日逺到惜予老不及見也所著有國子先生文集閩書縣令陳鼎夫先生新陳新字鼎夫福安人永樂十二年以貢入國子從楊文敏公學知海陽縣時賦重民困求其弊悉去之每春巡省田野勸課農桑始終不倦閩書陳先生廣學派按先生及門者多而獨著莊敏林公觀莊敏立朝讜論出處諸大節其熏炙師門所得多矣攷莊敏之門如林氏恂恂言行嘗論學者必以養素自重為先一時師友講習固有淵源哉陳先生廣陳廣寧徳人隠居授徒多所成就林莊敏聰嘗受業焉既貴寓書於廣稱其自得真趣非語言所能形容者閩書莊敏林季聰先生聰林聰字季聰寧徳人正徳己未進士為刑科給事中景泰元年轉都給事時當英廟之世承平日久言路茀塞聰感激論事無諱及英廟北狩以後益與同官葉文莊盛矯厲奮發所彈劾皆切近内侍及當柄大臣多因以下獄去者迨額森將送英廟還廷議迎駕景帝既即位有日不利駕還心欲薄其禮聰獨請備鑾輿鹵簿景帝廢英廟皇太子自立己子衆唯唯署牘聰獨難之方欲極論而罷尋遷春坊司直大學士商輅言六科不可無聰仍補吏科都給事中領司直俸戸部侍郎張睿國子祭酒劉鉉並用母喪奪情聰上疏侍郎六卿之亞祭酒師儒之宗忠孝大節不可少欠乞命依例守制不聴復上言君親人道大倫忠孝臣子大節未有忠君不繇孝親薄親能厚君者也禮臣有父母之喪君三年不呼其門髙皇帝定制斬衰之服父母皆一冒喪匿喪俱有罰禁所以扶綱常維世教豈不嚴哉曩者國家多事内外近侍方面等官奪情起復此令共濟時艱一時權宜也今邊事寧謐方面已皆不許而在京猶或踵舊臣誠愚昧以為大臣之中有一身去就係國安危猶若可言若一槩為例弊且貪戀名爵亷恥不顧視天親若路人希異數如常事伏望當金革之不試舉先朝之舊章禆益世道殊非淺鮮景帝所立太子薨聰上大寶八事及脩徳弭灾二十條中言今三尺兒童悉念太上皇徳獨恥皇太子見深何故見廢時日曷喪之謡繼出臣不知為誰陛下幸而聴臣仍將太子立為東駕又言陛下宜虚已省躬戒玩好之蕩心戒嬪御之燕溺戒用度之過奢戒逸樂之忘返戒爵濫施戒刑濫及又言唐虞三代無有釋道之教齋醮之事然而享壽益髙傳祚益久庶政惟和萬事咸寧自漢以後或捨身施佛或迎骨入禁信非不専奉非不至而壽未見隆祚未見永治未見古若二教亡益明甚近者在京寺觀既有齋糧以飯僧又有燈油以供佛一月而齋幾度旬日而醮幾壇甚至内府亦行脩設供奉之費既多齎襯之儀不少雖曰内帑實出民脂以為為民祈福而民艱自如以為為國禳灾而天灾屢見伏望悉行停罷庶幾當務為急聰平居恂恂不為竒異遇事正色讜論􅃀不可奪景泰中諫議之臣惟聰與葉盛為首稱嘗領會試考官汲汲焉恐失一士吏部選註未嘗或徇私請輒指斥改易當事者外雖敬憚中實銜之尚書何文淵以選法不公為聰論罷聰復時時忤大學士陳循都御史王文循文諷諸御史劾聰十三道􅄎等奏聰自劾去何文淵之後數挾制吏部尚書王直紊亂選法詔多官廷鞫以大臣専擅選法論坐當斬并劾直等阿勢聴囑而大學士髙穀獨持正議保持之禮部尚書胡濙亦曰給事七品官也儗以大臣囑託公事也儗以選法二者不合遂不與疏歸卧病不朝上遣中使往問對曰臣故無疾也聞欲殺林聰不覺驚悸景帝始知聰被搆左遷國子學正英宗復辟超遷左僉都御史賑山東饑全活甚衆還遷右副都御史捕江淮鹽賊籍其魁而已三年丁内艱明年起復固辭終制不允至署院曹欽反錦衣官校報復仇怨凡欽姻識一切逮繫人心知寃度無免理聰力爭出之又一時幸功者妄取首級京師人至不敢夜出門聰按論捕賊功必生獲其人成化二年江淮旱饑人相食右僉都御史呉深巡視民瘼無狀命聰代之九載秩滿陞右都御史七年出巡撫大同逾年致仕越二年起掌南院事又三年召入為刑部尚書加太子少保又明年乞致仕不許十八年卒贈少保諡莊敏所著有見菴文集奏議八卷閩書林先生林寧徳人嘗從林莊敏游安貧樂善恂恂言行諭學者必以養素自重為先年八十餘閩中理學淵源考卷九十一
