body:
  text: 閩中理學淵源考卷五廣平府知府李清馥撰文靖李延平先生侗學派按濓洛元公開主靜之宗又伊洛二先生訓門人常以靜坐嘆其善學厥後龜山遞傳豫章以及延平祖述師説引學者為入道之根朱子嘗言李先生教人大抵令於靜中體認大本未發時氣象分明即處事應物自然中節此乃龜山門下相傳指訣然當時親炙之時貪聼講論又方好章句訓詁之習不得盡心於此至今若存若亡無一的實見處辜負教育之意每一念此未嘗不愧汗沾衣也此文公答何氏叔京書之語然文公於羅先生靜坐論中又言不可偏求之靜大約在北宋時程門諸公不無專守靜虚之弊流及南渡其弊尤深於是掃去聞見只求一心文公見彼時流風偏弊之漸引伊川只用敬不用靜之語故起而掲出敬之一字以救末流之差而師門授受之㫖何曽錯誤後之論學者訾議且上及濓溪主靜之宗豈不誣哉嘗考朱子他日答張南軒書云來教謂言靜則溺於虚無此固所當深慮然此二字如佛氏之論誠有此患若以天理觀之則動之不能無靜猶靜之不能無動也靜之不能無養猶動之不可不察也至靜之中盖有動之端焉是乃易所謂見天地之心而先王之所以至日閉闗盖當此之時則安靜以養乎此爾固非逺事絶物而偏於靜之謂來教又謂某言以靜為本不若遂言以敬為本此固然也然敬字工夫通貫動靜而必以靜為本故某向來輒有是語今遂易為敬雖若完全然却不見敬之所施有先有後則亦未得為諦當也西山先生論主靜一條録此書與二先生靜敬之義叅論先公纂文公語類亦録此書附後評曰朱子此書於敬靜之義盡矣盖一動一靜無時不敬而必以靜者為主不專一則不能直遂不翕聚則不能發散理固如此且當其動時亦須先一收斂打疊而後應豈可以為動而遽隨之此皆所謂主靜之㫖而持敬之要也馥謹按周子主靜之義考之二先生所論朱子所辨晰西山所録先公所纂述闡發精確如此説靜方不入於空寂大學定而後能靜亦是從收歛凝定説起此洙泗㣲言周程之所以淵源於此者羅李朱遞相授受後先一轍朱子後來每説持敬者救時之弊而平昔論學亦未嘗擯却靜之一字而指斥其禪宗惟在學者善觀之或疑觀未發前氣象多鄰于空寂者豈知李先生嘗曰黙坐澄心體認天理此正用未發前功失曰黙坐澄心即存養曰體認天理即省察此從事戒懼慎獨之功者也文公嘗曰舊聞李先生曰人固有無喜怒哀樂之時然謂之未發則不可言無主也觀此則是中有所主非戒懼慎獨之功不可又曰先言慎獨然後及中和此意亦嘗言之此則戒懼慎獨後方能養成此中和心體是又從事大本大原完養深厚周宻此子朱子所述見答于林擇之書國朝栢鄉魏貞菴先生嘗言延平平日存養省察之功未有所遺正合戒懼慎獨之學又先公曽言周子主靜之義曰人言靜故無欲而不知無欲故靜也知靜故無欲則必專其功于靜專其功于靜者釋老之學也無欲故靜則必如聖門所謂戒謹恐懼以完其未發之中而後可吾儒之學也延平先生論學本㫖遞相師授自有本末不出戒懼慎獨之義朱子輓先生詩曰河洛傳心後毫釐復易差淫辭方眩俗夫子獨名家意彼時流弊已然矣後世託言心學者可無辨乎文靖李延平先生侗李先生諱侗字愿中南劍州劍浦人年二十四聞郡人羅公從彦得河洛之學於龜山楊文靖公之門以書謁之遂往師焉初見時終日相對靜坐只説文字未嘗及一雜語羅公極好靜坐先生退入室中亦靜坐羅公令靜中看喜怒哀樂未發前氣象而求所謂中者乆之而知天下之大本真有在乎是也由是操存益固涵養益熟觸處洞然發必中節從之累年授春秋中庸語孟之説既而屏居山田結廬水竹之間謝絶世故餘四十年簞瓢屢空怡然自適其事親從兄有人所難能者閨門内外肅穆若無人聲而衆事自理生事素薄而處之有道凡親故鄰里貧不能婚嫁者節衣食以賑助之長者事之盡禮少者賤者接之盡道其答問後學窮晝夜不倦隨其淺深必語以反身自得而可入于聖賢之域嘗謂學者曰學問不在多言但黙坐澄心體認天理則雖一毫私欲之發亦退聼矣又曰學者之病在於未有洒然氷解凍釋處縱有力持守不過茍免顯然尤悔而已若此者恐未足道也其語中庸則曰聖賢之所以開悟後學者無遺䇿矣而所謂喜怒哀樂之未發謂之中者又一篇之要指也必也體之於身實見是理如顔子之嘆卓然若有所見而不違乎心目之間然後擴充而往無所不通語春秋則曰春秋一事各是發明一例如觀山水徙步而形勢不同不可拘以一法又嘗曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可知矣若直以文字求之悦其詞義以資誦説其不為玩物喪志者㡬希以故未嘗為講解文字然其辨析精微毫釐畢察嘗以黄魯直所稱周濓溪胸中灑落如光風霽月為善形容有道氣象學者存此於胸中庶㡬遇事廓然而義理少進又云講學切在深濳縝宻然後氣味深長蹊徑不差若概以理一而不察乎其分之殊此學者所以流於疑似亂真之説而不知也朱韋齋松與先生為同門友嘗與沙縣鄧廸語及先生曰愿中如氷壺秋月瑩徹無瑕非吾曹所及遂命朱晦菴往師焉後晦菴撰先生行狀稱先生資禀勁特氣節豪邁充養完粹無復圭角精純之氣達于面目色温言厲神定氣和語黙動靜端詳閑泰自然之中若有成法平居恂恂於事若無甚可否及其酬酢事變斷以義理則有截然不可犯者蚤歳聞道即棄塲屋超然逺引若無意于當世然憂時論事感激動人其論治道必以明天理正人心崇節義勵亷耻為先本末具備可舉而行異端之學無所入於其心然一聞其説則實知其詖淫邪遁之所以然而辨之於錙銖毫忽之間盖其徳純道備學術通明既不求知於世亦未嘗輕以語人庶㡬乎遯世不見知而不悔者年七十有一卒諡文靖學者稱延平先生生平不著書不作文所傳有延平問答及語録行世子友直信甫皆舉進士信甫見家學理宗朝追贈諡文靖萬厯四十二年從祀孔廟國朝康熈四十五年從學臣沈涵之請賜御書靜中氣象四大字匾于祠行狀南誌銘道源委宋史閩書書初見羅豫章先生書侗聞之天下有三本焉父生之師教之君治之闕其一則本不立古之聖賢莫不有師其肄業之勤惰涉道之淺深求益之先後若存若亡其詳不可得而考惟洙泗之問七十二弟子之徒議論問答具在方冊有足稽焉是得夫子而益明也孟氏之後道失所傳枝分派别自立門户天下真儒不復見於世其聚徒成羣所以相傳授者句讀文義而已耳謂之熄焉可也恭惟先生鄉丈服膺龜山之講席有年矣况嘗及伊川先生之門得不傳於千五百歳之後性明而修行完而潔擴之以廣大體之以仁恕精深微妙各極其至漢唐諸儒無近似者至於不言而飲人以和與人並立而使人化如春風發物盖亦莫知其所以然也凡讀聖賢之書粗有識見者孰不願得受經門下以質所疑至於異論之人固當置而勿論也侗之愚鄙徒以習舉子業不得服役於門下今日拳拳欲求教於先生者以謂所求有大於利禄也抑侗聞之道之可以治心猶食之充饑衣之禦寒也身有廹於饑寒之患者遑遑焉為衣食之謀造次顛沛未始忘也至於心之不治有沒世不知慮者豈愛心不若口體哉弗思甚矣侗不量資質之陋妄意於此徒以祖父以儒學起家不忍墜箕裘之業孳孳矻矻為利禄之學兩終星紀雖知真儒有作聞風而起固不若先生親炙之得於動靜語黙之間目擊而意㑹也今生二十有四歳矣茫乎未有所止燭理不明而是非無以辯宅心不廣而喜怒易以揺操履不完而悔恡多精神不克而智巧襲揀焉而不淨守焉而不敷朝夕恐懼不啻猶饑寒切身者求充饑禦寒之具也不然安敢以不肖之身為先生長者之累哉與教授公書侗塊處山樊絶無曩昔師友不聞道義之訓朝夕兀坐頼天之靈尚得以舊學尋繹以警釋貧憊而已其他亦何足言苦於無侣可以縱歩前造齋館以承近日餘論臨紙馳情又與教授公書侗塊處山間絶無過從頼有經史中古人心迹可以探賾雖粗能遣釋朝夕然離羣索居不自知其過者亦多矣尚何敢疏一二於吾兄者邪忽得不外指示所志一一諦思足見别後造道之深欽服欽服侗文采鄙拙未嘗輙敢發一語近為朋遊見廹有一二小詩輙不揆録去求教取笑而已非敢以報來辱也便次有以警誨者千萬勿恡至懇至懇與羅博文書元晦進學甚力樂善畏義吾黨鮮有晚得此人商量所疑甚慰又曰此人極頴悟力行可畏講學極造其微處某因此追求有所省渠所論難處皆是操戈入室須從原頭體認來所以好説話某昔於羅先生得入處後無朋友㡬放倒了得渠如此極有益渠初從源頭善處下工夫來故皆就裏面體認今既論難見儒者路脉極能指其差誤之處自見羅先生來未見有如此者又云此人别無他事一味潛心於此初講學時頗為道理所縳今漸能融釋於日用處一意下工夫若於此漸熟則體用合矣此道理全在日用處熟若靜處有而動處無即非矣與劉平甫書學問之道不在於多言但黙坐澄心體認天理若真有所見雖一毫私欲之發亦自退聽矣乆乆用力於此庶㡬漸明講學始有力也又與劉平甫書大率有疑處須靜坐體究人倫必明天理必察於日用處著力可見端緒在勉之爾答問上丁丑六月二十六日書云承諭涵養用力處足見近來好學之篤也甚慰甚慰但常存此心勿為他事所勝即欲慮非僻之念自不作矣孟子有夜氣之説更熟味之當見涵養用力處也於涵養處着力正是學者之要若不如此存養終不為己物也更望勉之戊寅七月十七日書云某村居一切只如舊有不可不應接處又難廢墮但靳靳度日爾朝夕無事齒髪已邁筋力漸不如昔所得於師友者往來於心求所以脱然處竟未得力頗以是懼爾春秋且將諸家熟看以胡文定解為凖玩味乆必自有㑹心處卒㸔不得也伊川先生云春秋大義數十炳如日星所易見也唯微辭奥㫖時措從宜者所難知爾更須詳考其事又玩味所書抑揚予奪之處看如何積道理多庶漸見之大率難得學者無相啓發處終憒憒不灑落爾問吾十有五而志于學一章横渠先生曰常人之學日益而莫自知也仲尼行著習察異于他人故自十五至於七十化而知裁其進徳之盛者與伊川先生曰孔子生而知之自十五至七十進徳直有許多節次者聖人未必然亦只是為學者立下一法盈科而後進不可差次須是成章乃達兩説未知孰是先生曰此一叚二先生之説各發明一義意思深長横渠云化而知裁伊川云盈科而後進不成章不達皆是有力處更當深體之可爾某竊以謂聖人之道中庸立言常以中人為説必十年乃一進者若使困而知學積十年之乆日孳孳而不倦是亦可以變化氣質而必一進也若以鹵莽滅裂之學而不用心焉雖十年亦只是如此則是自暴自棄之人爾言十年之漸次所以警乎學者雖中才於夫子之道皆可積習勉力而至焉聖人非不可及也不知更有此意否問或問禘之説一章伊川以此章屬之上文曰不知者蓋為魯諱知夫子不欲觀之説則天下萬物各正其名其治如指諸掌也或以為此魯君所當問而不問或人不當問而問之故夫子以為不知所以微諷之也餘如伊川説云龜山引禮記禘嘗之義大矣治國之本也不可不知也明其義者君也能其事者臣也不明其義君道不全不能其事為臣不全非或人可得而知也其為義大豈度數云乎哉蓋有至􅄨存焉知此則於天下乎何有此數説不審孰是先生曰詳味禘自既灌以下至指其掌看夫子所指意處如何却將前後數説皆包在其中似於意思稍盡又未知然否問子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣熹謂曽子之學主於誠身其於聖人之日用觀省而服習之蓋已熟矣惟未能即此以見夫道之全體則不免疑其有二也然用力之乆而亦將有以自得故夫子以一以貫之之語告之葢當其可也曽子於是黙會其㫖故門人有問而以忠恕告之蓋以夫子之道不離乎日用之間自其盡已而言則謂之忠自其及物而言則謂之恕莫非大道之全體雖變化萬殊於事為之末而所以貫之者未嘗不一也然則夫子所以告曽子曽子所以告其門人豈有異㫖哉而或者以為忠恕未足以盡一貫之道曽子姑以違道不逺者告其門人使知入道之端恐未曽盡曽子之意也如子思之言忠恕違道不逺乃是示人以入道之端如孟子之言行仁義曾子之稱夫子乃所謂由仁義行者也先生曰伊川先生有言曰維天之命於穆不已忠也乾道變化各正性命恕也體會于一人之身不過只有盡己及物之心而已曾子於日用處夫子自有以見之恐其未必覺此亦是一貫之理故卒然問曰參乎吾道一以貫之曽子於是領㑹而有得焉輙應之曰唯忘其所以言也東坡所謂口耳俱喪者亦佳至於答門人之問只是發其心耳豈有二耶若以謂聖人一以貫之之道其精微非門人之問所可告姑以忠恕答之恐聖賢之心不如是之支也如孟子稱堯舜之道孝弟而已人皆足以知之但合内外之道使之體用一源顯微無間精粗不二滚同盡是此理則非聖人不能是也中庸曰忠恕違道不逺特起此以示人相近處然不能貫之則忠恕自是一忠恕爾十一月十三日書云吾人大率坐此窘窶百事驅遣不行唯於稍易處處之為庶㡬爾某村居兀坐一無所為亦以窘廹遇事窒塞處多毎以古人貧甚極難堪處自體即啜菽飲水亦自有餘矣夫復何言來諭以為人心之既放如木之既伐心雖既放然夜氣所息而平旦之氣生焉則其好惡猶與人相近木雖既伐然雨露所滋而萌蘖生焉則猶有木之性也恐不用如此説大凡人理義之心何嘗無唯持守之即在爾若於旦晝間不至梏亡則夜氣存矣夜氣存則平旦之氣未與物接之時湛然虚明氣象自可見此孟子發此夜氣之説於學者極有力若欲涵養須於此持守可爾恐不須説心既放木既伐恐又似隔截爾如何如何己卯六月二十二日書云聞不輟留意於經書中縱未深自得亦可以驅遣俗累氣象自安閑也己卯長至後三日書云今學者之病所患在於未有洒然氷解凍釋處縱有力持守不過只是茍免顯然尤悔而已似此恐皆不足道也庚辰五月八日書云某晚景别無他唯求道之心甚切雖間能窺測一二竟未有洒落處以此兀坐殊憒憒不快昔時朋友絶無人矣無可告語安得不至是耶可歎可懼示諭夜氣説甚詳亦只是如此切不可更生枝節尋求即恐有差大率吾輩立志已定若看文字心慮一澄然之時略綽一見與心會處便是正理若更生疑即恐滯礙伊川語録中有記明道嘗在一倉中坐見廊柱多因黙數之疑以為未定屢數愈差遂至令一人敲柱數之乃與初黙數之數合正謂此也夜氣之説所以於學者有力者須是兼旦晝存養之功不至梏亡即夜氣清若旦晝間不能存養即夜氣何有疑此便是日月至焉氣象也某曩時從羅先生學問終日相對靜坐只説文字未嘗及一雜語先生極好靜坐某時未有知退入室中亦只靜坐而已先生令靜中看喜怒哀樂未發之謂中未發時作何氣象此意不唯於進學有力兼亦是養心之要元晦偶有心恙不可思索更於此一句内求之靜坐㸔如何往往不能無補也承恵示濓溪遺文與頴濵語孟極荷愛厚不敢忘不敢忘通書向亦曽見一二但不曽得見全本今乃得一見殊慰卑抱也二蘇語孟說儘有可商論處俟他日見靣論之嘗愛黄魯直作濓溪詩序云舂陵周茂叔人品甚高胸中洒落如光風霽月此句形容有道者氣象絶佳胸中洒落即作為盡洒落矣學者至此雖甚逺亦不可不常存此體段在胸中庶幾遇事廓然於道理方少進願更存養如此羅先生山居詩某記不全今只據追思得者録去顔樂齋詩云山染嵐光帶日黄蕭然茅屋枕池塘自知寡與真堪笑頼有顔瓢一味長池畔亭曰濯纓詩云擬把冠纓掛墻壁等閒窺影自相酬邀月臺詩云矮作墻垣小作臺時邀明月瀉襟懐夜深獨有長庚伴不許庸人取次來又有獨寐榻白雲亭詩皆忘記白雲亭坐處望見先生母氏墳故名某向日見先生將出此詩邀月臺詩後兩句不甚愜意嘗妄意云先生可改下兩句不甚渾然先生别云也知鄰鬭非吾事且把行藏付酒杯蓋當作此數絶時正靖康間也聞召命不至復有指揮今來亦執前說辭之甚佳葢守之已定自應如此縱煎廹擾擾何與我事若於義可行便脫然一徃亦可也某嘗以謂遇事若能無毫髪固滯便是洒落即此心廓然大公無彼己之偏倚庶幾於道理一貫若見事不徹中心未免微有偏倚即渉固滯皆不可也未審元晦以為如何為此說者非理道明心與氣合未易可以言此不然只是說也庚辰七月書云某自少時從羅先生學問彼時全不渉世故未有所入聞先生之言便能用心静處尋求至今淟泊憂患磨滅甚矣四五十年間毎遇情意不可堪處即猛省提掇以故初心未嘗忘廢非不用力而迄於今更無進步處常竊静坐思之疑於持守及日用儘有未合處或更有關鍵未能融釋也向來嘗與夏丈言語間稍無間因得一次舉此意質之渠乃以釋氏之語來相淘終有纎巧打訛處全不是吾儒氣味㫖意大段各别當俟他日相見劇論可知大率今人與古人學殊不同如孔門弟子羣居終日切磨又有夫子為之依歸日用間相觀感而化者甚多恐於融釋而脫落處非言説可及也不然子貢何以謂夫子之言性與天道不可得而聞耶元晦更潛心於此勿以老邁為戒而怠於此道為望所云見語録中有仁者渾然與物同體一句即認得西銘意㫖所見路脉甚正宜以是推廣求之然要見一視同仁氣象却不難湏是理㑹分殊雖毫髪不可失方是儒者氣象又云便是日月至焉氣象一段某之意只謂能存養者積久亦可至此若比之不違氣象又迥然别也今之學者雖能存養知有此理然旦晝之間一有懈焉遇事應接舉處不覺打發機械即離間而差矣雖存養熟理道明習氣漸爾銷鑠道理油然而生然後可進亦不易也來諭以謂能存養者無時不在不止日月至焉若如此時却似輕㸔了也如何某兀坐於此朝無一事若可以一來甚佳致千萬意如此然又不敢必覬恐侍旁乏人老人或不樂即未可更須於此審處之某尋常處事毎值情意廹切處即以輕重本末處之似少悔吝願於出處間更體此意問性相近也習相逺也二程先生謂此言氣質之性非性之本尹和靖云性一也何以言相近葢由習相逺而為言熹按和靖之意云性一也則正是言性之本萬物之一源處所以云近但對逺而言非實有異品而相近也竊謂此説意稍渾全不知是否先生曰尹和靖之説雖渾全然却似没話可説學者無着力處恐須如二先生謂此言氣質之性使人思索體認氣質之説道理如何為有力爾蓋氣質之性不究本源又由習而相逺政要玩此曲折也問太極動而生陽先生嘗曰此只是理做已發㸔不得熹疑既言動而生陽即與復卦一陽生而見天地之心何異竊恐動而生陽即天地之喜怒哀樂發處於此即見天地之心二氣交感化生萬物即人物之喜怒哀樂發處於此即見人物之心如此做兩節㸔不知得否先生曰太極動而生陽至理之源只是動静闔闢至於終萬物始萬物亦只是此理一貫也到得二氣交感化生萬物時又就人物上推亦只是此理中庸以喜怒哀樂未發已發言之又就人身上推尋至於見得大本達道處又滚同只是此理此理就人身上推尋若不於未發已發處㸔即何縁知之蓋就天地之本源與人物上推來不得不異此所以於動而生陽難以為喜怒哀樂已發言之在天地只是理也今欲作兩節㸔切恐差了復卦見天地之心先儒以為静見天地之心伊川先生以為動乃見此恐便是動而生陽之理然於復卦發出此一段示人又於初爻以顔子不逺復為言此只要示人無間斷之意人與天理一也就此理上皆収攝來與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶皆其度内爾妄測度如此未知元晦以為如何有疑更容他日得見劇論語言既拙又無文采似發脱不出也元晦可意㑹稍詳之㸔理道通否辛巳上元日書云昔嘗得之師友緒餘以謂學問有未愜適處只求諸心若反身而誠清通和樂之象見即是自得處更望勉力以此而已承諭近日學履甚適向所耽戀不洒落處今已漸融釋此便是道理進之效甚善甚善思索有窒礙及於日用動静之間有拂戾處便於此致思求其所以然者久之自循理爾五十知天命一句三先生之説皆不敢輕㸔某尋常㸔此數句竊以謂人之生也自少壯至於老耄血氣盛衰消長自不同學者若循其理不為其所使則聖人之言自可以馴致但聖賢所至處淺深之不同爾若五十矣尚昧於所為即大不可也横渠之説似有此意試一思索㸔如何承録示韋齋記追往念舊令人凄然某中間所舉中庸終始之説元晦以為肫肫其仁淵淵其淵浩浩其天即全體是未發底道理惟聖人盡性能然若如此㸔即於全體何處不是此氣象苐此無甚氣味爾某竊以謂肫肫其仁以下三句乃是體認到此逹天徳之效處就喜怒哀樂未發處存養至見此氣象儘有地位也某嘗見吕芸閣與伊川論中説吕以為循性而行無往而非禮義伊川以謂氣味殊少吕復書云云政謂此爾大率論文字切在深潛縝宻然後蹊徑不差釋氏所謂一超直入如來地恐其失處正坐此不可不辨某衰晚碌碌只如舊所恨者中年以來即為師友捐棄獨學無助又渉世故沮困殆甚尚存初心有端緒之可求時時見於心目爾壬午四月二十二日書云吾儕在今日止可於僻寂處草木衣食茍度此歲月為可他一切置之度外惟求進此學問為庶幾耳若欲進此學須是盡放棄平日習氣更鞭䇿所不及處使之脱然有自得處始是道理少進承諭應接少暇即體究方知以前皆是低㸔了道理此乃知覺之效更在勉之有所疑便中無惜詳及庶幾彼此得以自警也壬午五月十四日書云承諭處事擾擾便似内外離絶不相該貫此病可於静坐時收攝將來㸔是如何便如此就偏着處理會久之知覺即漸漸可就道理矣更望勉之也壬午六月十一日書云承諭仁一字條陳所推測處足見日來進學之力甚慰某嘗以謂仁字極難講説只㸔天理統體便是更心字亦難指説唯認取發用處是心二字須要體認得極分明方可下工夫仁字難説論語一部只是説與門弟子求仁之方知所以用心庶幾私欲沉天理見則知仁矣如顔子仲弓之問聖人所以答之之語皆其要切用力處也孟子曰仁人心也心體通有無貫幽明無不包括與人指示於發用處求之也又曰仁者人也人之一體便是天理無所不備具若合而言之人與仁之名亡則渾是道理也來諭以謂仁是心之正理能發能用底二箇端緒如胎育包涵其中生氣無不純備而流動生發自然之機又無頃刻停息憤盈發洩觸處貫通體用相循初無間斷此説推擴得甚好但又云人之所以為人而異乎禽獸者以是而已若犬之性牛之性則不得而與焉若如此説恐有礙蓋天地中所生物本源則一雖禽獸草木生理亦無頃刻停息間斷者但人得其秀而最靈五常中和之氣所聚禽獸得其偏而已此其所以異也若謂流動發生自然之機與夫無頃刻停息間斷即禽獸之體亦自如此若以為此理唯人獨得之即恐推測體認處未精於他處便有差也又云須體認到此純一不雜處方見渾然與物同體氣象一叚語却無病又云從此推出分殊合宜處便是義以下數句莫不由此而仁一以貫之蓋五常百行無往而非仁也此説大槩是然細推之却似不曽體認得伊川所謂理一分殊龜山云知其理一所以為仁知其分殊所以為義之意蓋全在知字上用着力也謝上蔡語録云不仁便是死漢不識痛癢了仁字只是有知覺了了之體段若於此不下工夫令透徹即何縁見得本源毫髪之分殊哉若於此不了了即體用不能兼舉矣此正是本源體用兼舉處人道之立正在於此仁之一字正如四德之元而仁義二字正如立天道之隂陽立地道之柔剛皆包攝在此二字爾大抵學者多為私欲所分故用力不精不見其效若欲於此進歩須把斷諸頭路静坐黙識使之泥滓漸漸消去方可不然亦只是説也更熟思之某幸得早從羅先生遊自少時粗聞端緒中年一無佽助為世事淟汨者甚矣所幸比年來得吾元晦相與講學於頽惰中復此激發恐庶幾於晚境也何慰如之封事熟讀數過立意甚佳今日所以不振立志不定事功不成者正坐此以和議為名爾書中論之甚善見前此赦文中有和議處一條又有事廹許便宜從事之語蓋皆持兩端使人心疑也要之斷然不可和自整頓綱紀以大義斷之以示天下向背立為國是可爾此處更可引此又許便宜從事處更下數語以暁之如何某不能文不能下筆也封事中有少疑處已用貼紙貼出矣更詳之明道語云治道在於修己責任求賢封事中此意皆有之矣甚善吾儕雖在山野憂世之心但無所伸爾亦可早發去為佳謝上蔡語極好玩味蓋渠皆是於日用上下工夫又言語只平説尤見氣味深長今已抄得一本矣謹以奉内恐亦好看也問熹昨妄謂仁之一字乃人之所以為人而異乎禽獸者先生不以為然熹因以先生之言思之而得其説復求正於左右熹竊謂天地生萬物本乎一源人與禽獸草木之生莫不具有此理其一體之中即無絲毫欠剩其一氣之運亦無頃刻停息所謂仁也先生批云有有血氣者有無血氣者更體究此處但氣有清濁故稟有偏正惟人得其正故能知其本具此理而存之而見其為仁物得其偏故雖具此理而不自知而無以見其為仁然則仁之為仁人與物不得不同知人之為人而存之人與物不得不異故伊川夫子既言理一分殊而龜山又有知其理一知其分殊之説而先生以為全在知字上用着力恐亦是此意也先生勾出批云以上文大概得之它日更用熟講體認不知果是如此否又詳伊川之語推測之竊謂理一而分殊此一句言理之本然如此全在性分之内本體未發時看先生抹出批云須是兼本體已發未發時看合内外為可合而言之則莫非此理然其中無一物之不該便自有許多差别雖散殊錯糅不可名狀而纎㣲之間同異畢顯所謂理一而分殊也知其理一所以為仁知其分殊所以為義此二句乃是於發用處該攝本體而言因此端緒而下工夫以推尋之處也蓋理一而分殊一句正如孟子所云必有事焉之處而下文兩句即其所以有事乎此之謂也先生抹出批云恐不須引孟子説以證之孟子之説若以㣲言恐下工夫處落空如釋氏然孟子之説亦無𨼆顯精粗之間今録謝上蔡一説於後玩味之即無時不是此理也此説極有力大抵仁字正是天理流動之機以其包容和粹涵育融漾不可名貎故特謂之仁其中自然文理密察各有定體處便是義只此二字包括人道已盡義固不能出乎仁之外仁亦不離乎義之内也然則理一而分殊者乃是本然之仁義先生勾斷批云推測到此一段甚宻為得之加以涵養何患不見道也甚慰甚慰前此乃以從此推出分殊合宜處為義失之逺矣又不知如此上所推測又還是否更乞指教先生曰謝上蔡云吾常習忘以養生明道曰施之養則可於道則有害習忘可以養生者以其不留情也學道則異於是必有事焉勿正何謂乎且出入起居寧無事者正心待之則先事而迎忘則渉乎去念助則近於留情故聖人心如鑑所以異於釋氏心也上蔡録明道此語於學者甚有力蓋尋常於静處體認下工夫即於閙處使不着蓋不曽如此用功也自非謝先生確實於日用處下工夫即恐明道此語亦未必引得出來此語録所以極好玩索近方看見如此意思顯然元晦於此更思看如何唯於日用處便下工夫或就事上便下工夫庶幾漸可合為己物不然只是説也某輒妄意如此如何如何問熹又問孟子養氣一章向者雖䝉曲折面誨而愚意竟未見一總會處近日求之頗見大體只是要得心氣合而已故説持其志無暴其氣必有事焉而勿正心勿忘勿助長也皆是𦂳切處只是要得這裏所存主處分明則一身之氣自然一時奔凑翕聚向這裏來存之不已及其充積盛滿睟面盎背便是塞乎天地氣象非求之外也如此則心氣合一不見其間心之所向全氣隨之雖加齊之卿相得行道焉亦沛然行其所無事而已何動心之有易曰直方大不習無不利而文言曰敬義立而徳不孤則不疑其所行也正是此理不審先生以為何如先生曰養氣大概是要得心與氣合不然心是心氣是氣不見所謂集義處終不能合一也元晦云睟面盎背便是塞乎天地氣象與下云亦沛然行其所無事二處為得之見得此理甚好然心氣合一之象更用體察令分暁路陌方是某尋常覺得於畔援歆羡之時未必皆是正理亦心與氣合到此若髣髴有此氣象一差則所失多矣豈所謂浩然之氣耶某竊謂孟子所謂養氣者自有一端緒須從知言處養來乃不差於知言處下工夫儘用熟也謝上蔡多謂於田地上面下工夫此知言之説乃田地也先於此體認令精審認取心與氣合之時不倚不偏氣象是如何方可看易中所謂直方大不習無不利然後不疑其所行皆沛然矣元晦更於此致思看如何某率然如此極不揆是與非更俟他日面㑹商量可也問熹近看中庸鬼神一章竊謂此章正是發明顯㣲無間只是一理處且如鬼神有甚形迹然人却自然有畏敬之心以承祭祀便如真有一物在其上下左右此理亦有甚形迹然人却自然秉彛之性才存主着這裏便自見得許多道理參前倚衡雖欲頃刻離而遁之而不可得只為至誠貫徹實有是理無端無方無二無雜方其未感寂然不動及其既感無所不通濓溪翁所謂静無而動有至正而明達者於此亦可以見之不審先生以為何如先生曰此段看得甚好更引濓溪翁所謂静無而動有作一貫暁㑹尤佳中庸發明顯㣲之理於承祭祀時為言者只謂於此時鬼神之理昭然易見令學者有入頭處爾但更有一説若看此理須於四方八面盡皆収入體究來令有會心處方是謝上蔡云鬼神横渠説得來别這箇便是天地間妙用須是將來做箇題目入思慮始得講説不濟事又云鬼神自家要有便有要無便無更於此數者一併體認不可滯在一隅也某偶見如此如何如何壬午八月九日書云此箇氣味為上下相咻無不如此者這箇風俗如何得變某於此有感焉當今之時茍有修飭之士須大段涵養韜晦始得若一旦齟齬有所去就雖去流俗逺矣然以全體論之得失未免相半也使衰世之公子皆信厚湏如文王方得若未也恐不若且誦龜山與胡文定梅花詩直是氣味深長也如何龜山詩欲驅殘臈變春風只有寒梅作選鋒莫把踈英輕鬭雪好藏清艷月明中右渚宫觀梅寄康侯韜晦一事嘗騐之極難自非大段涵養沈潜定不能如此遇事輒發矣亦不可輕㸔也如何如何十月朔日書云承諭近日㸔仁一事頗有見處但乍喧乍静乍明乍暗仔細㸃檢儘有勞攘處詳此足見潜心體認用力之效盖湏自見得病痛窒礙處然後可進因此而修治之推測自可見甚慰甚慰孟子曰夫仁亦在乎熟之而已乍明乍暗乍喧乍静皆未熟之病也更望勉之至祝至祝癸未五月二十三日書云近日涵養必見應事脱然處否須就事兼體用下工夫久久純熟漸可見渾然氣象矣勉之勉之答問下李延平初間也是豪邁底人到後来也是磨琢之功在鄉若不異扵常人鄉曲以上底人只道他是個善人他也畧不與人説待問了方與説羅仲素先生嚴毅清苦殊可畏李先生終日危坐而神彩精朗畧無隤墮之氣問延平先生言行曰他却不曽著書充養得極好凡為學也不過是恁地涵養将去初無異議只是先生睟面盎背自然不可及明道教人静坐李先生亦教人静坐㸔来須是静坐始能収斂羅仲素都是著實仔細去理會李先生氣象好熹初為學全無見成規矩這邉也去理會尋討那邉也去理會尋討後来見李先生較説得有下落更縝宻李先生説人心中大叚惡念却易制伏最是那不大段計利害乍往乍来底念憲相續不斷難為驅除今㸔得来是如此或問近見廖子晦言今年見先生問延平先生静坐之説先生頗不以為然不知如何曰這事難説静坐理會道理是不妨只是討要静坐則不可理會得道理明透自然是静今人都是討静坐以省事則不可嘗見李先生説舊見羅先生説春秋某心嘗疑之以今觀之是如此盖心下熱閙如何㸔得道理出須静方㸔得出所謂静坐只是打疊得心下無事則道理始出道理既出心下愈明静矣行夫問李先生謂常存此心勿為事物所勝先生答之云云頃之復曰李先生涵養得自是别真所謂不為事物所勝者古人云終日無疾言遽色他真個是如此尋常人去近處必徐行出逺處行必稍急先生去近處也如此出逺處亦只如此尋常人呌一人呌之一二聲不至則聲必厲先生呌之不至聲不加於前也又如坐處壁間有字某毎常亦湏起頭一看若先生則不然方其坐時固不㸔也若是欲看則必起就壁下視之其不為事物所勝大率若此常聞先生後生時極豪邁一飲必數十盃醉則好馳馬一驟三二十里不迴後来却收拾得恁地醇粹所以難及問先生所作李先生行状云終日危坐以騐夫喜怒哀樂之前氣象為如何而求所謂中者與伊川之説若不相似曰這處是舊日下得語太重今以伊川之語格之則其下工夫處亦是有些子偏只是被李先生静得極了便自見得是有個覺處不似别人今終日危坐只是且收斂在此勝如奔馳若一向如此又似坐禪入定淳問延平欲扵未發之前觀其氣象此與楊氏體騐扵未發之前者異同如何曰這箇亦有些病那體騐字是有個思量了便是已發若觀時恁著意看便也是已發問此體騐是著意觀只恁平常否曰此亦是以不觀觀之或問延平先生何故騐於喜怒哀樂未發之前而求所謂中曰只是要見氣象陳後之曰持字良久亦可見未發氣象曰延平即是此意若一向這裏又差從釋氏去李先生云舜之所以能使瞽瞍底豫者盡事親之道共為子職不見父母之非而已昔羅先生語此二句只為天下無不是底父母不以道得富貴不處不以道得貧賤不去是説處這事君子去仁惡乎成名是主宰處終食造次顛沛是操存處李先生説得好舊曽問李先生顔子非助我者處李先生云顔子扵聖人根本有黙契處不假枝葉之助也如子夏乃枝葉之助問灑掃應對是其然必有所以然者如何曰所以然者亦只是理也惟窮理則自知其皆一致此理惟延平之説在或問格物中與伊川差合雖不顯言其窮理而皆體此意吾與回言終日章集注載李先生之説甚分明問李先生謂顔子扵聖人體段已具體叚二字莫只是言個模様否曰然孟子養氣一章李先生曰配是襯貼起来又曰若説道襯貼却是兩物氣與道義只是一滾發出来後来思之一滾發出来説得道理好襯貼字却説得配字極親切必有事焉而勿正心勿忘勿助長熹舊日理會道理亦有此病後見李先生説病去聖經中求義遂刻意經學推見實理始信前日諸人之誤也李先生説一步是一步如説仁者其言也訒熹當時為之語云聖人如天覆萬物云云李曰不要如是廣説湏窮其言也訒前頭如何要得一進步處必有事焉由此可至君子三變改過遷善由此可至所過者化李先生説熹舊見李先生時説得無限道理也曽去學禪李先生云汝恁地懸空理㑹得許多而面前事却又理㑹不得道亦無幽妙只在日用間著實做工夫處理㑹便自見得後来方曉得他説故今日不至無理㑹耳李先生嘗云人之念慮若是於顯然過惡萌動此却易見易除却怕扵匹似間底事爆起来纒繞思念将去不能除此尤害事延平先生嘗言道理湏是日中理㑹夜裏却去静坐地思量方始有得熹依此説去做真箇是不同李先生云書不要㸃㸔得更好李先生言事雖紛紜須還我處置熹少時亦曽學禪只李先生極言其不是後来考究畢竟佛學無是處李先生當時説學已有許多意思只為説敬字不分明所以許多時無捉摸處闢佛者皆以義利辯之此是第二義及見李先生之言初亦信未及且理㑹學問㸔如何後漸見其非李先生説横渠説不湏㸔非是不是只是恐先入了費力向時諸前輩毎人各是一般説話後見李先生較説得有下落説得較縝宻仁字心字亦湏畧有分别始得記得李先生説孟子言仁人心也不是将心訓仁字此説最有味試思之吕與叔論民可使由之處意思極好昔侍李先生論近世儒佛雜學之弊因引其説先生亦深然之凡百但以此等意思存之便自平實李文名侗師事羅仲素先生羅嘗見伊川後卒業龜山之門深見稱許其棄後學久矣李文獨深得其閫奥經學純明涵養精粹延平士人甚尊事之請以為郡學正雖不復應舉而温謙慤厚人與之處久而不見其涯鬱然君子人也先子與之遊數十年道誼之契甚深中和二字皆道之體用舊聞李先生論此最詳後来所見不同遂不復致思今乃知其為人深切然恨己不能盡記其曲折矣如云人固有無所喜怒哀樂之時然謂之未發則不可言無主也又云致字如致師之致又如先言慎獨然後及中和此意亦嘗言之但當時既不領畧後来又不深思遂成蹉過孤負此翁耳熹記頃年汪端明説沈元用問尹和靖伊川先生易傳何處最切要尹云體用一源顯㣲無間此是最切要處後舉問李先生先生曰尹說固好然湏是㸔得六十四卦三百八十四爻都有下落處方始説得此話若學者未曽子細理會便與他如此説豈不誤他余聞之悚然始知前日空言無實全不濟事自此讀書益加詳細熹自延平逝去學問無分寸之進汩汩度日無朋友之助未知終何所歸宿春秋工夫未及下手而先生棄去然嘗畧聞其一二以為春秋一事各是發明一例如㸔風水移步換形但以今人之心求聖人之意未到聖人灑然處不能無失耳此亦可見先生發明之大㫖也李先生曰受形天地各有定數治亂窮通斷非人力惟當守吾之正而已然而愛身明道修已俟時則不可一日㤀於心此聖賢傳心之要法或者放肆自佚惟責之人不責之已非也李先生曰陰陽之精散而萬物得之凡麗扵天附扵地列扵天地之兩間聚有類分有群生者形者色者莫不分繫於陰陽又曰陽以燥為性以奇為數以剛為體其為氣炎其為形圎浮而明動而吐皆物扵陽者也陰以濕為性以耦為數以柔為體其為氣凉其為形方沈而晦静而翕皆物扵陰者也李先生曰動静真偽善惡皆對而言之是世之所謂動静真偽善惡非性之所謂動静真偽善惡也惟求静于未始有動之先而性之静可見矣求真于未始有偽之先而性之真可見矣求善扵未始有惡之先而性之善可見矣李先生曰虚一而静心方實則物乗之物乗之則動心方動則氣乗之氣乗之則惑惑斯不一矣則喜怒哀樂皆不中節矣思索義理到紛亂窒塞處湏是一切掃去放教胸中空蕩蕩地了却舉起一㸔便自覺得有下落處向見李先生曽如此説来今日方真實騐得舊見李先生説理會文字須令一件融釋了後方便理㑹一件融釋二字下得極好此亦伊川所謂今日格一件明日又格一件格得多後自脱然有貫通處此亦是他真曽經厯來便得如此分明今若一件未能融釋而又欲理㑹一件則第二件又不了推之萬事事事不了何益人若著些利害便不免開口告人却與不學之人何異向見李先生説若大段排遣不去只思古人所遭患難有大不可堪者以自比則亦可以少安矣始者甚卑其説以為何至如此後來臨事却覺有得力處不可忽也昔聞延平先生之敎以為為學之初且當常存此心勿為他事所勝凡遇一事即當且就此事反復推尋以究其理待此一事融釋脱落然後循序少進而别窮一事如此既久積累之多胸中自當有灑然處非文字言語之所及也詳味此言雖其規模之大條理之密若不逮於程子然其工夫之漸次意味之深切則有非他説所能及者惟嘗實用力於此者為能有以識之未易以口舌爭也格菴趙氏曰程子言若一事窮未得且别窮一事延平則言且就一事推尋待其融釋脱落然後另窮一事其言不同葢程子以人心各有明處有暗處若就明處推去則易為力非為一事未窮得而可貳以二参以三也若延平則專為不能主一者之戒李先生居處有常不作費力事所居狹隘屋宇卑小及子弟漸長逐間接起又接起㕔屋亦有小書屋然甚齊整瀟灑安物皆有常處其制行不異於人亦常為任希純敎授延入學作職事居常無甚異同頺如也真得龜山法門亦嘗議龜山之失李先生不著書不作文頺然若一田夫野老正蒙知言李先生極不要人傳冩及看舊嘗看正䝉李甚不許然李終是短於辨論邪正葢皆不可無無之即是少博學詳説工夫也李先生之學云常在目前只在戒謹不睹恐懼不聞便自然常存顔子非禮勿視聽言動正是如此熹初師屏山籍溪自見於此道未有所得乃見延平熹赴同安任時年二十四五矣始見李先生曽與他説禅李先生只説不是却倒疑李先生理會此未得再三質問李先生為人簡重却不甚會説只敎看聖賢言語熹意中道禪亦自在且將聖人書來讀日復一日覺得聖賢言語漸漸有味囬看釋氏之説漸漸破綻鏬漏百出李先生云頼天之靈常在目前如此安得不進蓋李先生為黙坐澄心之學持守得固龜山之學以身體之以心驗之從容自得於燕閒靜一之中李先生之學出於龜山源流是如此李先生敎學者於靜中看喜怒哀樂未發之氣象為如何伊川謂即思即是已發道夫謂李先生之言主於體認程先生之言專在涵養其大要實相表裏舊見李先生常説少從師友幸有所聞中間無講習之助幾成廢墜然頼天之靈此箇道理只常在心目間未嘗敢忘此可見其持守之功矣然則所見安得而不精所養安得而不熟邪學者須常令胸中通透灑落恐非延平先生本意此説甚善大扺此箇地位乃是見識分明涵養純熟之效從真實積累功用中來不是一旦牽强著力做得灑落兩字本是黄太史語後來延平先生拈出亦是且要學者識箇深造自得底氣象以自考其所得之淺深熹蚤從延平李先生學受中庸之書求喜怒哀樂未發之㫖未達而先生没聞張敬夫得衡山胡氏學則往從而問焉敬夫告余以所聞亦未之省也暇日檢故書得當時往還書藁一編題曰中和舊説獨恨不得奉而質諸李氏之門然以先生之所已言者推之知其所未言者其或不逺矣熹生十有四年而先君子棄諸孤遺命來學於籍溪胡公先生草堂屏山二劉先生之門先生飲食敎誨之皆無不至而屏山獨嘗字而祝之曰木晦於根舂容華敷人晦於身神明内腴後事延平李先生先生所以敎熹者葢不異乎三先生之説而其所謂晦者則猶屏山之志也通書者濓溪夫子之所作也熹自蚤歲即幸得其遺編而伏讀之初葢茫然不知其所謂而甚或不能以句壯歲獲遊延平先生之門然後始得聞其説之一二比年以來潛玩既久乃若粗有得焉往年誤欲作文近年頗覺非力所及遂已罷去不復留情其間頗覺省事講學近見延平李先生始畧窺門户而疾病乗之未知終得從事於斯否耳大概此事以涵養本原為先講論經㫖特以輔此而已李先生意只是要得學者靜中有箇主宰存養處李先生敎人大扺令於靜中體認大本未發時氣象分明即處事應物自然中節此乃龜山門下相傳指訣附錄羅先生與陳黙堂書曰承喻聖道甚微有能於後生中得一箇半箇可以與聞於此庶幾傳者愈廣吾道不孤又何難之不易也從彦聞尊兄此言猶著意詢訪近有後生李愿中者向道甚鋭曽以書求敎趨向大扺近正謾錄其書并從彦所作小詩呈左右未知以為然否勉李愿中詩五首已見羅豫章先生集陳淵答李先生書云仲素晦迹求志人罕知者吾友獨能自㧞流俗而師尊之其為識慮豈淺淺者所能窺測聖學無窮得其門者或寡況堂奥乎孔子之門從遊者三千獨得顔子為殆庶又不幸短命道之難也如此文公彊志博見凌高厲空自受學于李先生􅅲然如將弗勝於是斂華就實反博歸約文公學靡常師出入於經傳泛濫於釋老自受學于李先生洞明道要頓悟異學之非專精致誠剖微窮深晝夜不懈至忘寢食而道統之傳始有所歸矣文公常言自見李先生為學始就平實乃知向日從事於釋老之説皆非延平於韋齋為同門友先生歸自同安不逺數百里徒歩往從之延平稱之曰樂善好義鮮與倫比又曰頴悟絶人力行可畏其所論難體認切至自是從遊累年精思實體而學之所造者益深矣羅博文云延平先生之傳廼某伯祖仲素先生之道河洛之學源流深逺陳淵語孟師説䟦有曰孟子饑者甘食渇者甘飲與人能無以饑渇之害為心害則不及人不為憂矣仲素思之累日疏其義以呈龜山龜山云此説甚善但更於心害上一著猛省留意則可以入道矣今日李君愿中以其遺書質予其格言要論自為一家之書閲其學益進誦其言益可喜信乎自心害而去之也自仲素之亡傳此書者絶少非愿中有志於吾道其能用心如此專乎劉將孫䟦豫章藁曰考亭朱氏出延平李氏延平李氏出豫章羅氏今朱氏之書滿天下延平豫章之遺言緒論未有聞者將孫一來延平適兵革之後慨然求之耆舊間久乃得延平答問其詞語渾樸皆當以三隅反者且自謂不能發揮以文又久之得豫章家集又非延平比愚于是益信二先生之所以上接伊洛而下開考亭者初不在於言也按豫章集此䟦後有元貞第二春廿有二日廬陵後學劉將孫手書劉公係延平敎授也李先生行狀節錄初龜山先生倡道東南士之遊其門者甚衆然語其潛思力行任重詣極如羅公者葢一人而已先生既從之學誦講之餘危坐終日以驗夫喜怒哀樂未發之前氣象為何如而求所謂中者若是者葢久之而知天下之大本真有在乎是也葢天下之理無不由是而出既得其本則凡出于此者雖品節萬殊曲折萬變莫不該攝洞貫以次融釋而各有條理如川流脉絡之不可亂大而天地之所以高厚細而品類之所以化育以至于經訓之微言日用之小物折之於此無一不得其𠂻焉由是操存益固涵養益熟精明純一觸處洞然泛應曲酬發必中節又嘗曰學者之病在於未有灑然氷解凍釋處縱有力持守不過茍免顯然悔尤而已若此者恐未足道也又嘗曰今人之學與古人異如孔門諸子羣居終日交相切磨又得夫子為之依歸日用之間觀感而化者多矣恐於融釋而脱落處非言説所及也不然子貢何以言夫子之言性與天道不可得而聞也邪墓誌銘節錄元晦之為人應宸所畏也審於擇善嚴于衛道遺佚窮困而不以外物易其所守之錙銖其事先生久益不懈以為每一見則所聞必益超絶葢其上達不已日新如此也應宸守福唐聞先生之言行于元晦為詳他日移書屈致先生不予鄙惠然來臨庻幾聞所未聞焉至三日方坐語忽疾作而已不救矣其孫䕶䘮以歸將以二年八月庚申葬于所居山之左而以銘見屬應宸于先生雖不獲從容敬請以畢其所欲見之志而其景慕之誠非茍然者祭李延平先生文朱文公撰道䘮千載兩程勃興有的其緒龜山是承龜山之南道則與俱有覺其徒望門以趨惟時豫章傳得其宗一簞一瓢凛然高風猗歟先生早自得師身世兩忘惟道是資精義造約窮深極微凍解氷釋發於天機乾端坤倪鬼秘神彰風霆之變日月之光爰暨山川草木昆蟲人倫之正王道之中一以貫之其外無餘縷析毫差其分則殊體用混圓隱顯昭融萬變並酬浮雲太空仁孝友弟灑落誠明清通和樂展也大成婆娑邱林世莫我知優哉遊哉卒歲以嬉迨其季年德盛道尊有來摳衣發其蔽昏侯伯聞風擁篲以迎大本大經是度是程税駕云初講義有端疾病乗之醫窮技殫又曰嗟惟聖學不絶如綫先生得之既厚以全進未獲施退未及傳殉身以没孰云非天熹也小生丱角趨拜恭惟先君實共源派誾誾侃侃斂袵推先氷壺秋月謂公則然施及後人敢渝斯志從游十年誘掖諄至春山朝榮秋堂夜空即事即理無幽不窮相期日深見勵彌切蹇歩方休鞭繩已掣安車暑行過我衡門返斾相遭凉秋已分熹於此時適有命召問所宜言反覆敎詔最後有言吾子勉之凡兹衆理子所自知奉以周旋幸不失墜歸裝朝嚴訃音夕至失聲長號淚落懸泉何意斯言而訣終天輓李先生詩河洛傳心後毫釐復易差淫辭方眩俗夫子獨名家本本初無二存存自不邪誰知經濟業零落舊烟霞其二聞道無餘事窮居不計年簞瓢渾謾興風月自悠然灑落濓溪句從容洛社篇平生行樂地今日但新阡其三岐路分南北師門數仭髙一言資善誘十載笑徒勞斬板今來此懷經痛所遭有疑無與析揮淚首頻搔備考後學趙氏師夏撰先生文集序曰延平李先生之學得之仲素羅先生羅先生之學得之龜山楊先生龜山葢伊洛之高弟也先生不特以得於所傳授者為學其心造之妙葢有先儒之所未言者今觀此編與行述之所紀智者觀之當見之矣始我文公朱先生之先人吏部公與延平先生俱事羅先生為道義之交故文公先生於延平為通家子文公㓜孤從屏山劉公學問及壯以父執事延平而已至於論學葢未之契而文公毎誦其所聞延平亦莫之許也文公領簿同安反復延平之言若有所得者於是盡棄所學而師事焉則此編所錄葢同安既歸之後也文公先生嘗謂師夏曰余之始學亦務為儱侗宏濶之言好同而惡異喜大而耻於小於延平之言則以為何為多事若是天下之理一而已心疑而不服同安官餘以延平之言反覆思之始知其不我欺矣葢延平之言曰吾儒之學所以異於異端者理一分殊也理不患其不一所難者分殊耳此其要也今文公先生之言行布滿天下光明俊偉毫厘必辨而有以㑹其同曲折致詳而有以全其大所謂致廣大而盡精微極高明而道中庸本末兼舉細大不遺而及門之士亦各随其分量有所依據而篤守循序而漸進無憑虚蹈空之失者實延平先生一言之緒也世之學者其尊信文公之道者則以為聰明絶世故其探討之微有不可及至於不能無疑者則又以為其學出於性習之似得之意好之偏而已而不知師弟子之間離合從違之際其難也如此嗚呼此葢為千古計也豈容有一毫曲徇茍合相為容悦之意哉北海王耕道舊讀此書而悦之攝郡姑孰取之刋之郡齋以畀學者其惠宏矣師夏贊貳于此因得述其所聞于後以告同學者葢丙辰夏夜之言也幸貰其僣嘉定甲戌三月望日後學趙師夏謹識黄東發先生日抄讀延平先生集曰按程門高弟如謝上蔡楊龜山末流皆不免畧染禪學惟尹和靖堅守不變其後龜山幸三傳而得朱文公始裒萃諸家而辨折之程門之學因以大明故愚所讀先儒諸書始於濂溪終於文公所傳之勉齋以究正學之終始焉次以龜山上蔡以見其流雖異而源則同焉又次以和靖以見源雖異而其流有不變者焉次以横浦三陸以見其源流之益别焉然上蔡龜山雖均為畧染禪學而龜山傳之羅仲素仲素傳之李延平延平亦主澄心静坐乃反能救文公之㡬陷禪學一轉為大中至正之歸致知之學豪釐之辨不可不精葢如此故又次延平於此以明心學雖易流於禪而自有心學之正者焉此書文公所親集延平之學以涵養為功夫以常在心目之間為效驗以脫然洒落處為超詣之地文公之問多本論語多先孝弟此皆學者所當熟味序此書者廖徳明載文公之言謂先生𨼆㞐不仕燕間體察黙而成之非他人能及若夫經綸天下之大經措諸事業時有勞逸之殊遇故二程因發明敬字合内外貫動静敬附錄云明蔡松莊元偉考徳錄曰喜怒哀樂未發之中與發而中節之和是戒懼慎獨後養成心體如此李延平先生是如此説朱子章句不從其説後來累悔不及改正謂孤負此翁今當以延平之説為定國朝孫夏峰竒逢曰人固有無喜怒哀樂之時然中無所主㝠然不靈與醉夣何異固不可謂之未發未發謂中發而中節謂和非戒懼慎獨之後焉能有此中和乎延平以此指授晦翁其所陶鑄深矣國朝魏貞菴裔介曰後世之學者葢亦習於格物窮理之説主敬脩身之言然於大本之卓然者未能有見則沈潛淵黙之中既失所以自養而浮游怠惰之氣遂無所以勝之此所以遇物而為物所乘處事而為事所紛發而不能中節舛錯叢脞其端皆起於此也李延平受學於羅仲素羅仲素受學於楊龜山龜山則伊洛之高弟也其學問源流固已有所自矣至其所謂學者則惟在静中看喜怒哀樂未發前氣象而求所謂中嗚呼中者何即所謂天命之性也天命之性不可見故於喜怒哀樂未發時驗之此時情欲不萌思慮未動而天之所以與我者固渾然其全偹於此體認涵養主宰豈語言文字之所及乎朱元晦曰先生之學云嘗在目前只是戒謹不睹恐懼不聞便自然常存顔子非禮勿視聽正是如此而又曰吾儒之所以異於異端者理一而分殊也理不患其不一所難者分殊耳即此二段見先生之學内而不遺乎外𨼆而不遺乎顯有得於形下形上之一致道心人心之密㡬也夫以朱元晦豪傑之才聖賢之質猶嘗汎濫於諸家出入於佛老而延平有以正之後來考究乃漸見其非是元晦之所以為大儒者延平成之也延平之功顧不偉哉王氏云顔子沒而聖人之學亡夫聖學豈遂亡也由延平澄心體認天理之説求之則顔子之不逺復無祗悔不遷怒不貳過之學或庶㡬焉又曰佛氏者流著有心經於諸經之中自尊為無上妙義然不過大易艮卦彖辭艮其背不獲其身行其庭不見其人之説葢於人心之危者似已絶其㡬矣而於道心之微者未嘗有所窺也人心情也道心性也惟精惟一以執厥中則道心之微者不雜於人心之危矣佛氏但言心而不知性彼防其心之變則以為五蘊皆空聖賢言心而必言性黙察其心之理則以為五性皆實實而未嘗不虚則喜怒哀樂之未發謂之中之謂也虚而未嘗不實則發而皆中節謂之和之謂也易曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮易無思也無為也寂然不動感而遂通天下之故此可謂善於形容中體者矣李延平之觀喜怒哀樂未發氣象朱元晦以為龜山門下相傳指訣夫豈徒觀其氣象而已哉正觀其天下之大本耳觀其上天之載無聲無臭者耳由是以戒懼慎獨存天理遏人欲是之謂上達之超詣也而豈空觀者流哉或曰延平但言觀未發子今益之以戒懼慎獨豈延平之學高而有所遺與曰非也延平答元晦曰常存此心勿為他事所勝即欲慮非僻之念自不作矣孟子有夜氣之説更熟味之當見涵養用力處也於涵養處著力正是學者之要觀此語則涵養省察之説延平未有所遺而元晦之得力於延平固昭然可考矣先文貞公觀瀾錄曰延平學於豫章豫章學於龜山屏山白水籍溪則韋齋托孤朱子禀學焉然其終身誦説師承列為七賢而釋奠於精舍延平一人而已誦其詩讀其書則諸子高而延平卑也故道以切近精實為至又榕村語錄曰延平受學羅仲素仲素受學於龜山朱子於楊羅皆有微辭獨延平無間然滄洲精舍祀七人周程張邵司馬及延平意可見已承議郎羅宗禮先生博文羅博文字宗禮一字宗約祖畸太常博士從祖為仲素先生博文用祖廕補將仕郎福州司戸㕘軍再調静江府觀察支使時秦檜用事士大夫以忤意竄斥南來道出府下者博文皆善遇之至竭廪奉鬻衣服以濟其乏改知瑞金縣始至嵗歉先事儲偹及饑發粟賑贍躬親厝置又推其餘以及旁縣縣故多盜計獲渠魁數人寘諸法在官餘九月會張魏公都督江淮辟為幹辦公事以嗣位恩轉通直郎賜五品服使募兵江西又糴建康皆有成績得知和州未上而吏部侍郎汪公應辰制置全蜀辟為㕘議官汪既虚心好問博文亦推誠啓告成都之政遂最天下博文之助為多嘗以致遺錢不得辭却蓄之公帑取二程遺文與他名臣論奏纂述之可垂世者募工鋟板横渠張子之家避地流落貧不自振為言汪公延置府學士大夫遊宦貧不能歸或不幸死不克葬者皆出俸金以振業之累遷承議郎秩滿自請奉祠得管台州崇道觀卒朱晦菴為撰行狀曰公資禀和粹沉静寡欲處已待人一主誠敬聞人之善稱慕如不及視人患難困乏如切其身經營周救必盡其力聞天下士有一言一行之㡬乎道至或千里求之嘗從同郡李愿中先生遊聞河洛所傳之要多所發明于是喟然歎曰儒佛之異無他公私之間耳由是沛然自信其守益堅其亦受學于李先生之門先生為某道公之為人甚詳其于從辟江淮也喜而言曰張公高明閎大有餘而宗禮以精密詳練佐之募府無過事矣時某未識公也及先生沒乃獲從公遊而得其志行之美然後益信先生為知人然公自是入蜀相望數千里日夜望公之還得復相與講其舊學而公乃以喪歸惜其不及大為時用又傷吾道不幸而失此人焉所編有延平語錄黄氏震曰此書本名欽佩録然其所載多高深閒又造語如諸子之立論者視朱文公所編答問似不同云朱子文集府延平志御史李先生信甫以下家學李信甫名友諒以字行文靖侗次子同兄友直登紹興二十七年進士第厯監察御史出知衢州善政善教不沗家學擢廣東憲以特立不容罷去閩書志延平府閩中理學淵源考卷五
