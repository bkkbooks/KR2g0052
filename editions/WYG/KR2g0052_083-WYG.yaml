body:
  text: 閩中理學淵源考卷八十三廣平府知府李清馥撰黄石齋先生道周學派黄石齋先生道周黄道周字幼元號石齋漳浦之銅山人少負竒節以孝聞年十四慨然有四方之志不肯治舉子業抵博羅謁韓大夫日纘韓家多異書得盡覽所未見嘗即席酒酣援筆立就數千言名大噪天啓二年第進士選庶吉士歴編修監修國史實録故事經筵展書官奉書膝行道周謂膝行非禮也平步進魏忠賢目攝之不為動未幾乞歸葬父石養山結廬其下旋丁内艱服闋還朝崇禎三年典試浙江以神宗實録成晉右中允明年冬故相錢龍錫坐袁崇煥事被逮道周草疏救之貶秩鐫三級而龍錫卒得減死科臣有銜道周者摭浙江典試事蜚語上聞疏乞休許之瀕行上小人勿用疏葢指輔臣温體仁周延儒也上怒削籍還至浙江學者聞道周至為築大滌書院而稟學焉歸至石養山守墓如新喪時踰年以有司請講學於郡治紫陽祠門人自逺至者可千人乙亥起補原官時方久旱五月内繫兩尚書道周疏請慎喜怒以回天意六月又上疏曰陛下下詔求言省刑獄然方求言而建言者輒斥方清獄而下獄者旋聞當此南北交訌奈何與市井細民申勃磎之談脩睚眦之隙乎時温體仁方招奸人興東林復社之獄故道周言及之晉左諭徳掌司經局疏陳有三罪四恥七不如語遷少詹事侍經筵會鄭三俊下吏講官黄景昉救之道周上疏推奬旨下切責再疏以支飾譴道周前有疏纂述洪範月令等書未就乞寛假數月去有㫖得卒業時楊嗣昌奪情入閣陳新甲奪情起宣大總督道周草疏分劾同日上之上持疏不下及召對與嗣昌爭辨上前犯顔諫諍不少退沮貶江西布政司都事未任巡撫解學龍以道周才堪輔導薦上怒疑為黨削籍逮治詞連黄文煥陳天定董養河文震亨俱下詔獄户部主事葉廷秀太學生涂仲吉先後疏救並杖戍道周繫獄時吏日奉紙筆乞書道周為書孝經百二十本在獄兩年感明夷事著易象正方草十二圖錦衣校徵急道周恬然謂曰俟吾畫一圖成就逮耳擁之去至北寺與仲吉廷秀對簿受械鞫時奸黨必欲殺道周尚書劉澤深等謂道周不宜以建言誅得遣戍廣西既而嗣昌敗周延儒蔣徳璟乗間為上言得免戍復故官疏乞致仕歸講學於邑之明誠堂及江東鄴山郡邑有司逺近鄉大夫士畢至凡一再會而燕都變作初道周未第時渡釣龍江舟覆溺焉恍惚見一人前導至一殿額曰倪黄館選時元璐名第一道周第二一死北都一死南都出處始終若前定然著述甚富奏疏經解詩文旁及天文厯數共四十餘種二希堂集行狀通志儒林録張蒼巒先生若化張若化字雨玉號蒼巒世居漳浦之丹山弱冠師事黄石齋得聞明誠之學旁及律厯經綸諸務靡不淹貫崇禎丙子舉於鄉兩上公車不第而弟若仲以庚辰捷南宫因留京師時石齋以言事下北寺獄若化青衣小帽雜厮役中時時進獄問起居左右之若化事父母以志養食貧茹苦嘗搗栢葉以代園蔬諸孫嘗之喀喀不得下咽若化茹而甘焉山居四十年足不及城市未嘗以姓名通有司勵志獨行不標講學之名疾惡守義凛不可犯雖骨肉至親不少假而惻隠所周悉力於人者不少靳時值兵荒盜賊蜂起羣相戒曰慎勿犯張公廬鄉人依以避難終其身盜不入境丹山在羣山中巉巖阻絶日夕雲霧往來茅茨數椽上漏下濕豺虎交横時曳杖孤往登陟羣峭徜徉泉石嘯歌自得人咸異之年六十六正襟危坐無疾而終子士楷能繼父志潛心性命之學稱儒宗焉張次巒先生若仲張若仲字聲玉號次巒生而韶秀讀書明理以不欺方寸為本嚬笑不茍作止語黙持之以敬若性成焉崇禎丙子與兄若化同舉於鄉庚辰成進士例選州牧性亷靜不願任煩劇改授益府長史居官清儉簡貴以禮匡宗藩請崇寛大戒嚴切不納以去就爭之益藩為之改容以母病乞休歸母沒既葬為土室處其傍聞狐兔嘷嘯輒泣下嗚嗚山居五十年清修獨善藝圃一區果蔬薯蕷度給賓祭餘悉種梅竹栽蒔灌溉身自為之時蓑箬牽犢飯隴畆與野夫雜處晚嵗益務為敦篤飲人以和遇鄉里有爭訟勸之以誠久而化焉邑濱海有蝗起羣飛蔽天觸禾稼草木葉噉盡民多聚泣或泥首禳之獨若仲所居數里内外無蝗患里賴以安嵗丁卯秋夜風雨大作所居屋盡拔若仲獨寢地上無恙黎明人視之毛髮為悚年八十四以壽終鄉人稱若仲兄弟為丹山二先生而不名與兄若化同祀鄉賢二希堂集張端卿先生士楷張士楷字端卿漳浦人父若化弱冠師事黄石齋先生得聞明誠之學士楷幼穎異稍就外傅即學為詩歌古文詞超然獨往下筆立就弱冠一意屏棄舉子業潛心性命以主敬為根本嘗謂精一之學九思盡之作九思注録太極圖説定性書西銘敬齋箴各為題詞參曲禮内則小學諸書為敬學科條務合天則而不苦於拘攣以授學者為言行準漳南學者爭師之其論經濟之本必在存養之熟從性命中起經濟還從經濟中求性命斯内聖外王之學也平生踐履純懿端重温克望之如泥塑接之和氣藹然而義之所在剛介不撓雖妻孥不以情恕千駟萬鍾不以易也自學道後益卑視文藝然文益深造詩直逼少陵凡天文地輿厯象律吕無不洞覽卒年四十有七論者以士楷方漢汝南黄憲憲好臧否人物時露圭角中涵養所得未知於楷何如也所著有濮沿山人集談學録明儒林列傳土室庸言藝苑提宗靜學編等書郡志蔡時培先生春溶賴繼瑾附蔡春溶字時培龍溪人賴繼瑾字敬儒平和人二人者少倔强負志節仝受業于黄道周之門道周器之林子篤先生邁佳林邁佳字子篤詔安人潛心力學從薛欽宇黄石齋二先生遊著環中一貫圖説究論天人事物之藴薛以一庵子呼之年八十餘猶與同志講易忘倦云洪阿士先生思洪思字阿士龍溪人年十三隨其父遊黄石齋之門容止甚飭石齋器之及石齋出山思稍長乃自附於鄴山之徒日以詩歌自放末年憫其師文字散軼乃出收文于江上士大夫多重之其詩激楚清越不落時流作章草甚佳晚復入山而卒著有洪圖六經洪圖六史及敬身録郡志陳祝皇先生天定陳天定字祝皇龍溪人與文穆林公釬為中表嘗師事之天啓五年成進士遭魏璫方張不釋褐而歸日與友人談經史操時藝選政海内操觚家多宗之而陳氏説書尤盛行于世會漳中不靖二十四將躪海濱窺于郡郡守施邦曜與共商捍敵之䇿天定繕鄉兵輕衣治戎自城以東皆主之築土堡於鎮門兩㟁以固郡圉賊嘗一夜以輕舟泊浦頭天定乗月黑要之賊幾不得出自是不得内犯嵗復饑天定捐貲勸賑聚米分恤活饑民無數民為立碑紀其事崇禎辛未璫燄既熄始廷獻授官行人未幾林文穆卒遂請䕶喪以歸著有陳氏説書及慧山詩文全集若干卷行于世學者稱為慧山先生郡志凃徳公先生仲吉凃仲吉字徳公鎮海凃一榛季子生而骯髒喜談節義時論未之許也稍長入太學聞時事闕失輒頓足或時為流涕一日在金陵聞黄石齋道周下詔獄時方飲投觴而起曰仲吉當一行為朝廷保正士遂間闗赴闕上書上覽疏大怒杖仲吉於長安門外復下錦衣獄鞫指使者錦衣喬可用盛陳刑具仲吉曰吾閩南男子見義而動死即死耳寧足怖耶可用拶其指盡折仲吉不少挫既而懷宗亦稍悟乃與道周俱論戊未幾復赦還郡志紀石青先生許國紀許國字石青同安後麝人與父文疇並受業於黄石齋先生石齋弟子數百人許國年最少許以掉臂獨行年二十二舉崇禎壬午鄉試同安縣志王載卿先生仍輅王仍輅字載卿漳浦人少宰志道之孫從張端卿遊家既落恒敝衣冠有姑妻於貴人仍輅不往貴人餌以千金終不顧率妻子入珠溪萬山中暮年乃還於牆東舊址築數椽曰狐死首邱耳嘗置一笠為亭四面編蘆障之竟老其中郡志張紹和先生燮張燮字紹和廷榜之子萬厯甲午舉人聰明敏慧博極羣書結社芝山之麓與蔣孟育髙克正林茂桂王志逺鄭懷魁陳翼飛稱七才子與黄道周尤稱交好道周嘗云文章不如張燮一時逺近鉅公咸造廬式訪校書萬石山中刻有七十二家文選行世郡志范介卿先生方范方字介卿同安人後遷漳之長泰天啓元年鄉試第一性耿介聯同志為社異趣者擯不入與銅山黄石齋道周浯州盧閑之若騰熊山沈復齋佺期尤以氣節相髙期不負所學一試春官不第見逆閹濁亂時事日非歸里閉户却掃無復仕進意崇禎改元閹黨伏法乃更北上以石齋薦授國子監助教遷户部主事晉員外郎流賊李自成陷京師方聞賊入整冠帶坐部署賊執之問倉鑰誰掌曰我掌匙安在曰頭可斷匙不可得也遂抗賊不屈死之其子登楓同之弟子員甫冠婚自家來省適值難方揮之不去殮方畢號痛出血數升絶吭於其旁有老僕為藁葬於都城同安義塋登楓附焉清漳何氏家世學派考何公經學樸茂先正皆推重無異詞其書誠足為後學指南今撮其畧著于篇為何氏家學云何𤣥子先生楷何楷字𤣥子漳浦鎮海衞人生有異質書過目不忘天啟五年登進士時魏璫肆毒朝紳楷不謁選而歸崇禎時起户部主事𣙜滸墅闗事竣進員外郎七年詔簡部曹為言官大臣多推楷改刑科給事中流寇陷鳳陽燬皇陵楷疏劾撫臣楊一鵬按臣呉振纓下獄語侵輔臣温體仁王應熊旋復劾兩人朋比行私言振纓為體仁私人一鵬為應熊座主情面重則祖宗之陵寢為輕朋比濃則天下之刺譏不恤語甚切至忤㫖鐫一級復疏請罷内操上又不從是時上憤在廷之臣多貪庸顧身家視君國輒泄泄思欲痛整齊之于是詔獄繁多司寇諸曹郎日不暇給有言者上疑為偏䕶舉朝皆結舌無敢言楷乃疏陳慎刑八議娓娓千言援祖制明國典寄匡救于將順之中天子知其諷切也一時獄稍寛楷自以身為言官不得黙朝廷每有大事時政有得失嘗侃侃敷陳議保舉言擇相請停秋決及言海寇宜𠞰併駮諸大臣情弊即皇陵一案楷已得罪尤復再申前説謂二輔輕視祖宗勇䕶私黨政本何地相率為比尤而效之弊將何極及應熊陳辨楷復駁其明㫖未下應熊何知置辨必有往來偵探漏禁中語者應熊竟由此罷去葢天子亦知其敢言雖不能悉從然顧心志之未幾改工科都給事中時火星逆行天子減膳脩省兵部尚書楊嗣昌方主欵因歴引前史惑帝意楷疏駁其立言本心附會罔上及嗣昌奪情柄政楷又疏劾其非忤㫖貶二秩為南京國子監丞旋丁内艱乃歸講學于紫芝書院服闋諸大臣請復原官上不許既而國用匱乏朝廷思用鈔乃召楷問鈔法至南都而京城已陷矣楷博綜羣書寒暑不輟尤䆳于經所輯古周易訂詁詩世本古義最精博春秋繹尚少四公然皆為學者所傳云郡志閩中理學淵源考卷八十三
