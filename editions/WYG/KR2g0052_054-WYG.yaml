body:
  text: 閩中理學淵源考卷五十四廣平府知府李清馥撰恭清陳時周先生茂烈學派按白沙之學明代諸公共議之謂其近於禪學然其髙風素節亦可追已時周先生師事白沙其省身克己之録未知與師門宗㫖如何攷之林公見素誌公墓曰隠􅇆粹行對天地而質鬼神其人品在黄憲管寧之右當時莆中諸公推許亦無異詞其操履可想矣恭清陳時周先生茂烈陳茂烈字時周莆田人也先世瑞安人曽大父以軍功𨽻興化衛總旗於是遂為莆人茂烈方髫年繼父戎役厲志不與羣兒伍晝入署夜歸則讀書祖母憐其孱弱亟止之乃覆燈黙誦不輟年十八慨然嘆曰善學聖人者莫如顔曽顔之克己曽之省身夫非學之法歟作省克録自考𢎞治九年第進士嘗使廣東一切餽贐悉卻之是時新㑹陳獻章以理學倡東南茂烈則往執弟子禮語累日獻章甚喜告以學須静一於是退作静思録佩其言終身為吉安理官十餘年入為監察御史袍服樸素騎一牝馬身若無官顧獨繫風紀之重有尚書佀子受賂而崔志端者亦為尚書故道流也皆以内援蟠結不能去茂烈再劾佀罷之崔仍留茂烈意未得而㑹其母張年七十有七老矣遂疏乞終養去家居身自治畦一奚奴拾薪服食麄糲夜卧不能具一帷短牀敝席漠如也太守以其作苦遣二力助之三日白守曰是使野人多事且溢口食也遣還茂烈雖不究於仕然故具經濟才其在吉安持大體開至誠廸以民􅃔上下信服有婦嫠家富族人利其貲誣婦且别適特為白之令終所至民有嫁妾者妾娠縁妻悍去之比生子歸承父業族羣争不决乃驗以女兄特類争者遂服時守張嚴鷙而茂烈以寛佐之當道或深文皆徐為申釋明允公恕既去而有遺思力耕養母者若而嵗銓部稔其行清苦奏改晉江教諭以資養辭既而守臣復上其孝行貧苦狀武宗嘉之詔視侍郎潘禮故事月給米三石茂烈復辭古人行傭負米皆以為親臣即貧應未至此且母年八十有六來日無多願以身力作報母囏勞不願當廪賜上不允間四嵗母卒茂烈抱疾强起號泣寢地疾遂亟未幾亦卒所産惟一女以身後屬司冦林俊俊為治其䘮立族子逺揚為後海内大夫士聞而傷之御史王應鵬以狀聞謂茂烈亷如石守道而所養獨純孝如徐仲車而所處尤困天子悼焉詔所司表宅里曰孝亷仍恤其家茂烈嚮道甚蚤比聞新㑹之教契悟亦深安貧樂志泰然自足日坐斗室究極五經四書之㫖以身體驗隨得隨録嘗曰儒有向上工夫詩文特土苴耳嘗與友人論學書曰承示胡敬齋書日不釋手議論精切用心良苦假所修如之當於吾道中求之也恨生晚而未考其世焉至於論白沙一峰二先生與丘文莊張東白頗有抑揚盖一時之言而非盖棺之論也文莊二公吾不及知一峰之志節尚矣白沙之學而疑其禪非真知白沙者也人一心也其用一耳士以記誦辭章競科名日趨於下矣向上將誰主耶世方以是相率任道者憂之故曰古人棄糟粕糟粕非真傳又曰莫笑世間無著述真儒不是鄭康成正懼其功倍於小學而妨此大道也白沙之初見康齋而歸也閉戸窮盡古今典籍又築臺静坐不出閾外者數年深潛静思真積力乆心悟理融而自得之妙非人所能知也敬齋亦學於康齋同門者也諒未及面而資麗澤之益又未知其發言之由無怪乎其作疑也自今攷之敬齋懼學者舍下學而躐於上逹若白沙則懼學者逐口耳而忘乎身心也竊嘗細玩尊徳性道問學一章學聖賢之法備矣然人之氣禀不一清者知之勝淳者行之勝無偏廢焉所入異而所造一矣安得起敬齋於九原相與細詳又曰萬物備於我反而求之於心身無限欠缺無限病痛至於中之欺慊冷煖自知若夫愧影愧衾嚴切之功無踰於此烈雖鄙薄每自檢㸃勉循規矩今事至教先以治病為急若病去藥除則終身之訓也其持論如此林貞肅俊曰時周領悟既深而充養益熟隠􅇆粹行對天地而質鬼神第其人品當在黄憲管寧之右焉天啓辛酉諡恭清越章録莆陽文獻教諭郭約之先生克一郭克一字約之惠安人為人坦夷有志趣嘗講學於莆以弟子禮見如賔陳先生先生語以為學當涵養本原不在枝葉繁辭克一深佩服之領正徳癸酉鄉薦癸未試春官乙榜授歸善教諭歸善學在郭外殿宇敝壊諸生徒寄空籍於學分齋肄業之規弛甚克一慨然振而興之倡率諸尚義者鳩材募功重新學舍俾士有歸息而嚴立條教以約束之躬為講説經㫖士心竦然諸司行部至惠州者莫不嘆賞居三年丁母憂歸卒於家邑志侍郎鄭山齋先生岳鄭岳字汝華號山齋莆人南湖先生露之裔七嵗而孤頼母林兄嵎食貧而撫教之踰弱冠登𢎞治六年進士授刑部主事論囚東市錦衣千戸張福恃勢越坐岳奏論語渉中貴㫖下詔獄堂官疏救得釋轉員外郎湖廣按察僉事宗藩侵民田累奏不决岳竟歸之民荆岳嵗饑設法賑活甚衆常徳守刑貨黷濫捕其左右置之法守解印綬去南臺㑹薦天下方面官十七人岳與焉正徳初擢廣西兵備副使征黒松洞奏㨗調廣東尋擢江西按察使振揚風紀為逆濠所忌連擢其地左右布政使濠横奪民田億萬計民設寨聚守濠諷總制剿以兵岳力沮之副使李夢陽御史江萬實相訐奏下藩臬㑹勘岳欲平其理而夢陽務求勝濠從而嗾之執岳憲司舊役考掠誣岳用公堂銀文致送濠禁錮事聞下鎮廵勘報濠左右夾持成獄臺省暨江西撫臣交疏其枉遣大理寺卿燕忠給事中黎奭覆勘竟為濠所陷自誣服罷後濠反伏誅起四川左布政使以母䘮未終制不赴嘉靖初陞右副都御史廵撫江西至則民擁道聚觀手額相慶岳奏賑恤受兵郡縣定討逆功及贈祀死事之臣皆報可甫三月擢大理寺卿輔臣以擁立世宗功議封伯岳遺書内閣所厚蔣冕勸其辭避林俊以司冦召至協􅇆守法一無所假勘事陜西正總兵官李隆罪前後凡四上疏皆切時政陞兵部侍郎大同兵變赦而復叛岳宻令總兵桂勇斬首惡數人事遂定已而勘報及大璫弟姪名岳駁正之權倖側目又以議禮忤㫖奪俸言官風聞媒糵其短因力請致仕歸凢十五年卒於家岳嚴毅端諒好禮勤書老猶不懈尤喜奬掖後進事寡母甚孝念兄鞠哀恩罄官俸以報搆蒲坂祖祠益祭田治先世諸墓至於開渠造橋建社有利於鄉族者槩不惜費所著有山齋净藁吟藁奏議駁藁莆陽文獻莆陽志畧等書享年七十二子泓字士流初為逆濠所陷謫戍赦回䕃授詹事府録事疏歸終養莆陽縣志騏撰本傳柯維閩書閩中理學淵源考卷五十四
