body:
  text: 閩中理學淵源考卷三十七廣平府知府李清馥撰建寜熊勿軒先生禾學派按勿軒熊氏禾史載從浙東輔漢卿先生學石堂陳氏普又從輔氏門人浙東韓維則學輔氏則又朱門髙弟也熊氏師於輔氏年嵗按之可疑另有辨附後熊陳二公為有元一代大儒閩海憲使許公序熊集有立綱常關世教紹統緒之稱此許公疑為魯齋公之後辨見下史稱陳氏尊聞紹言屹然為朱門嫡派其出處髙風與劉静修文文山謝疊山胡庭芳同出一轍也閩中元代之學二公為首倡之再熊公勿軒諸前哲叙述多繫之宋考邵氏續宏簡錄補列在元儒盖諸老彫謝而先生如存碩果且一代風教必有一二師表為典型倡率雖宋之遺民而實元之文獻也故特表而出之至丘氏富國亦從學輔氏同為宋世之遺民云再余輯閩中元代學派惟熊陳丘氏得輔氏之學以衍其緒今續考熊公自述受業浙中劉敬堂考劉敬堂即金仁山先生是熊公亦承金華三子之傳也莆中林氏以辨父子亦皆遞承𤓰山潘氏復齋陳氏派别朱門一綫之傳頼以不墜又泉南有傅定保盧琦數公一時師席外此寥落無聞何耶盖剛正直方之氣折於偽學黨錮之餘而秉道抱徳之徒所以長徃山林韜光晦匿即有授徒講藝亦荒略姓氏而不著豈當時操簡叙述者多缺而不書乎抑學術升降盛衰之候有絶有續固有時耶嗟乎公生季祚去文公之時百有餘嵗矣老成彫謝典型獨守鼎革後抱道空山脩明六經毅然以斯文自任至今仰洪源書堂巋然與滄洲雲谷蔚峙而長存也公平生著作悉稟文公家法於易詩書春秋小學四書皆有集義又有三禮通解其撰三山五賢祠記確尊五先生位置諸賢而進退之持論堅卓不渉游移尤見閑道之謹又論孔庭祀典至今多行其說其撰文公書院記致詳於全體大用之學而推求晚年充飬於大本大原之地追遡延平李氏喜怒哀樂未發前體騐真切功夫而終之以敬貫動静之㫖以為聖人復起不易斯言嗚呼先生叙述文公之學即先生精詣造道之學也公師承確有淵源數十年不求聞達其扶世立教繼徃表㣲之功逺矣嘗讀公送胡庭芳序言曩遊浙中因受業於敬堂劉先生得聞文公晚年所以與勉齋黄先生潛室陳先生論學之㫖然後乃知文公之學與世之所言者不同也觀此則公於劉公授受之際淵源卓矣劉公已詳考本末另記附後再按公雅志紹先不在魯齋草廬白雲諸公下今許吳白雲已從祀廟庭竊撿遺史如公與胡公一桂胡公炳文陳公櫟熊公朋來吕公大圭丘公葵出處皆有本末其纂述有關於名教補苴有功於經學似皆祀典不可缺之人尚有待於表章之後賢云熊勿軒先生禾熊禾字去非號勿軒又號退齋建陽人雨錢公十六世孫世居鰲峰之陽總角能文志濓洛關閩之學訪朱子門人輔氏而從遊焉登宋度宗咸淳十年進士授寜武州司户參軍宋亡不仕束書入山築洪源書堂從學者數百一時多士若胡庭芳劉省軒詹君履皆從之遊日以周孔之說相磨礲於朱子諸書是信是行後歸故山復創鰲峰書堂以周程朱張五賢為道統正派祀之以配先師而邵馬不與焉初謝疊山聞先生名自江右來訪及㑹共訴宋亡之痛抱持而哭因相與講論夫子之道而胡公庭芳素明易學自江西挾道相訪相講切者十有七年嘗謂秦漢以下天下所以無善治者儒者無正學也儒者所以無正學者六經無全書也考亭朱子集正學大成生平精力在易四書詩僅完藁書開端未及竟雖九峰蔡氏猶未大暢厥㫖三禮雖有通解缺而未補尚多至勉齋黄氏信齋楊氏粗完䘮祭二書而授受損益精意竟無能續若春秋則不過發其大義而已豈無所俟於來學乎兵難之餘學徒觧散文集燬亡早嵗成春秋通觧一書又厄于火兼以齒髪向衰易詩書僅得就緒春秋更加重纂則皇帝王霸之道亦或粗備惟三禮乃文公與門人三世未了之書且周官六典原不缺當復其舊而儀禮十七篇且欲各附禮記傳義以為之兆庭芳當分任此責以畢吾志其後竟修儀禮未及成書卒福寜陳益方足而成之以為禮編嘗取朱子諸書擇其至精且要者為一編名曰文公要語而以邵氏張吕及朱氏門人之說為附錄又為小學集疏大學尚書口義凡三十卷今行于世者有春秋通觧大學廣義易講義書說四書標題三禮考異經序學解先生嘗脩考亭書院而為之記及後有求考亭書院記於草廬吳公者因聞先生所作則以手加額曰江南有人矣予奚置喙其論孔廟祀典後世多行其言云閩書源委道南厯代名儒傳續宏簡錄家傳行狀熊勿軒先生文考亭書院記曰周東遷而夫子出宋南渡而文公生世運升降之㑹天必擬大聖大賢以當之者三綱五常之道所寄也道有統羲軒邈矣陶唐氏迄今六十二甲辰孟氏歴叙道統之傳為帝為王者千五百餘嵗則堯舜禹之於冀也湯尹之於伊亳也文武周公之於岐豐也自是以下為霸為強者二千餘嵗而所寄僅若此儒者幾無以藉口於來世嗚呼微夫子六經則五帝三王之道不傳㣲文公四書則夫子之道不著人心無所以主利欲持世庸有極乎七篇之終所以近聖人之居而尚論其世其獨無所感乎嗚呼由文公以來又百餘嵗矣建考亭視魯闕里初名竹林精舎後更滄州宋理宗表章公學以公從祀廟庭始錫書院額諸生世守其學重惟文公之學聖人全體大用之學也本之身心則為徳行措之國家天下則為事業其體則有健順仁義中正之性其用則有治教農禮兵刑之具其文則有小學大學語孟中庸易詩書春秋三禮孝經圖書西銘傳義及通鑑綱目近思錄等書學者學此而已今但知誦習公之文而體用之學曽莫之究其得謂之善學乎矧曰體其全而用其大者乎公之在考亭也門人蔡氏淵嘗言其晚年閒居於大本大原之地充養敦厚人有不得窺其際者盖其喜怒哀樂之未發蚤聞師說於延平李先生體騐已熟雖其語學者非止一端而敬貫動静之㫖聖人復起不易斯言矣嗚呼此古人授受心法也世之溺口耳之學何足以窺其㣲哉公之修三禮自家鄉至邦國王朝大綱小紀詳法畧則悉以屬之門人黄氏幹且曰如用之固當盡天地之變酌古今之宜而又通乎南北風氣損文就質以求其中可也使公之志克遂有王者作必來取法矣嗚呼古人為治之大經大法平居既無素習一旦臨事惟小功近利是視生民亦何日䝉至治之澤乎秦人絶學之後六經無完書若井田若學校凡古人經理人道之具盡廢漢猶近古其大機已失之矣當今治宇一統京師首善之地立胄學興文教文公四書方為世大用此又非世運方升之一機乎邵氏觀化所謂善變之則帝王之道可興者以時考之可矣誠能於此推原羲軒以來之統大明夫子祖述憲章之志上自辟雍下逮庠序祀典教法一惟我文公之訓是式古人全體大用之學復行于天下其不自兹始乎今公祠以文肅黄氏幹配舊典也從以文節蔡氏元定文簡劉氏爚文忠真氏徳秀建安武夷例也我文公體用之學黄氏其庶幾乎餘皆守公之道不貳其侑公也甚宜公以建炎庚戌生於劍之南溪父吏部韋齋先生之仕國也公藴經世大業屬權奸相繼用事鬱鬱不得展道學為世大禁公與門人益務堅苦泊如也慶元庚申殁於考亭後十年庚午疆塲事起又六十七年丙子宋亡公之曾孫浚以死節著嗚呼大聖大賢之生其有關於天地之化盛衰之運者豈可以淺言哉夫子之六經不得行於再世而公之四書乃得彰於當代公之身雖詘於當時而公之道卒信於其後者天也過江來中州文獻欲盡自左丞覃懐許公衡倡明公學家誦其書人尊其道凡所以啟沃君心栽培相業以開治平之原者皆公餘澤也三山郡泮五賢祠記曰僕於雲谷之陽鰲峯之下剏小精舎中為夫子燕居配以顔曽思孟次以周程張朱或曰文公竹林精舎以六君子從祀先朝取其法行之太學達於郡縣今邵馬二賢不與無乃非文公初意邪曰從祀之典凡先儒之有功徳於聖門者咸在若夫配食先聖非其道徳功言足以得夫聖統之正傳者不足以與此也此五先生吾無間然者矣若夫邵馬張吕諸賢固已秩在從祀矣非去之也文公贊六君子乃一時景行先哲之盛心而竹林之祠増延平先生為七賢又以致其平生尊敬師傳之意是固各有攸當非可以此為疑也嵗在癸卯之夏三山郡泮議剏新詞郡博士東武劉叔敬諗予曰泮舊有道立堂按舊碑盖取師道立善人多之義自濓溪而下凡十有五人首六君子次廣平游氏龜山楊氏豫章羅氏延平李氏次晦庵朱氏南軒張氏東莱吕氏西山蔡氏勉齋黄氏丙子兵戈之後司文臺典教職者又益以北山陳氏信齋楊氏毅齋鄭氏說齋楊氏庸齋趙氏凡五人皆學於文公亦所以昭是邦文物之懿也但考之郡志西山真氏帥三山時嘗剏尊道閣祀文公但以勉齋配道立堂舊祠亦止於勉齋今亷臺之長恪齋嚴公更創新祠欲復尊道之舊而議者言人人殊子其有以教之僕曰是祠若仍道立之名則為隆師道而設姑仍其舊可也但師弟子不應皆北坐南向勉齋以下北山信齋諸賢皆北靣受經於文公者乃侈然並居南靣之列此則有不可不正者若更尊道之名則為隆道統而設其祠固當止於五先生他有不得而與焉邵馬張吕諸賢自有從祀彜典廣平龜山豫章延平西山諸賢則建劍鄰郡各有專祠稽之禮經國無先師則合於鄰國勉齋為朱門道統單傳又不但三山一邦之望莫若正西向侑食之位雖不合於鄰國可也西山尊道初意亦正如此時旴江徳臣李君亦曰饒之石洞亦以夫子居中配以顔曾思孟周程張朱五賢勉齋繼之時曲阜孔君申卿實主其議遂白之嚴公首以為允於是繪像立祠更扁尊道又以僕嘗與聞斯義且屬為記適莆陽史侯有刋脩禮書之約遂不得竟其事繼㑹莆陽博士永嘉宋蜀翁議創先賢祠亦以下問僕援此答之皆以為允但有以程張坐次為疑者盖横渠於二程為表叔端平從祀之典張先於程竹林七賢之祠與六君子之贊則程先於張二者不同議卒靡定僕曰横渠之學得於二程臯比之撤與夫平居議論歴歴可考聞道在先固有所受也但當以竹林之祠為正此乃學校之公不得與家庭之私例論矣於是莆之新祠位置遂定㑹孔君以三山士友之請屬記於史侯深言尊道之祠止於五賢不及邵馬者乃萬世道統所係惟當以此為定孔君又言曲阜舊有五賢祠乃祀荀楊諸賢今祠已燬歸當請之衍聖公更議以此五賢易之此不惟大明洙泗之正傳亦以一洗漢唐之陋習扶世立教抑邪崇正之功宏矣因其行也力贊勉之私竊自謂山中一時綿蕝之禮或者因莆福二郡以為之兆亦區區之志也忽三山朋友以書來詰謂舊祠邵馬以下凡十有四人皆從改撤公議之戈莫不倒指於首議之人子當何以觧之且賢牧鄉賢二祠亦聞有所建白若其果然慎勿復言可也余蓋深歎世衰道㣲之餘學校無公論廼至於此自可忘辨然斯道所關則亦不可以不直者輒申其義或者倘有察焉亦學校風化之一助也敬齋銘箴䟦曰按南軒張子敬齋銘專以敬為宅心之要蓋心存則衆理具而萬事之綱舉矣非心存之外别有所謂敬也朱子之箴不過發其未盡之藴程子曰制於外所以養其中吾未見外貌之肆而中心之存者故所貴乎動静弗違表裏交正也後之學者見箴不見銘但有矜持拘廹而無從容涵養之功甚者以擎跽曲拳為敬看得敬字多死而不活嗟夫聖賢之學不講人心失其所為主理乖事謬世道隨之豈小故哉南軒集中敬齋記有曰萬事具萬理萬理在萬事而其妙著於人心一物不體則一理息一理息則一事廢敬者貫萬事統萬理而為萬物之主宰者也致知所以明是心也敬者所以存是心而勿失也又曰心生生不窮者道也敬則生矣生則惡可已也怠焉則放放則死矣此千古聖賢傳授心法之妙學者深體而屢省之哉送胡庭芳序曰宋南渡初武夷文定胡公造行都有以程氏之學盛行為言者公輒愀然曰吾方以程氏之學不行為懼何謂盛行耶豈誦習其說者皆可以言程氏之學耶余讀書武夷山中有胡君庭芳自新安擕一編書來訪究其業盖自朱氏而尤粹於易留山中三閱月相與考訂推象數之源極義理之歸書成余已為繫語其後矣又復相與推究文公所論他經大㫖重惟詩書二經訓義已具獨三禮通觧猶未完書而春秋則僅發其㫖要白鹿臨漳所刋尚有望於後之人余知非其任而竊有志焉春秋一經蓋竭精力者九年而稿本燼於丙子之厄俯仰十載學植荒落余交遊多矣論經說理鮮有如君者何幸得因切磋究之相與纂述以成一家言胡君曰諾歸將考𨽻一經焉明年春當賫糧武夷山中以畢斯業臨行且求一言為别余深有感於文定胡公之言而告之曰前所云亦誦習其言而已文公殁且百年門人傳習寖益失真余以為文公之學不行文公之道不傳也曩遊浙中嘗因受業於敬堂劉先生得聞文公晚年所以與勉齋黄先生潜室陳先生論學之要㫖然後乃知文公之學其體全體其用大用與世之所言第以資誦說者固不同也蓋必有以出乎其外者乎因我同志輒發其端君之學源於盤磵董先生江東文獻風流猶有足證其以予言參之殆有合乎否耶且以告江東士君子之學自朱氏者識熊勿軒先生傳後嘗聞之治經者必守家法講學者必歸踐行要其派别必本於師𫝊友授此古人博習親師論學取友其淵源不可誣也余自壬戍歸里後蒐輯閩中師友累年考訂墜緒莫尋竊念海濵載籍荒落殘闕湮没者多矣况欲網羅列代尚友千載搜討於離索之餘抑又難已因得之名家著作可補一二者如宋初莆陽蔡君謨執經於三山周公闢邵武黄簡肅中早薫炙於舅氏游定夫先生晉江梁文靖克家實為永春陳休齊知柔門人温陵劉叔文為朱子之髙弟晉江梁夀卿椿選設教於安溪來蘇建立書院實友於吕時可中洪陽巖天錫諸公俱於師友考中詳之矣獨建陽熊氏勿軒先生未見確然可據者今讀先生行狀載友於胡一桂庭芳其本傳載訪文公之門人輔氏而從焉行狀為建寜府訓導天台李讓撰本傳書前翰林偰處約述二篇未詳所作年月先後獨傳中詳載公生於宋理宗淳祐七年丁未卒於元仁宗皇慶元年十月葬於鰲峯之横瀝今讀熊公文集師於輔氏未見叙述一語惟送胡氏庭芳序有曰曩遊浙中嘗因受業於敬堂劉先生得聞文公晚年所以與勉齋黄先生潜室陳先生論學之要旨然後乃知文公之學其體全體其用大用與世之所言第以資誦說者固不同也因我同志輒發其端又云吾子之學源於盤磵董先生江東文獻風流猶有足證其以余言參之殆有合乎按此則公之受業於敬堂者所得必深而發端於同志欲兩證其所學此其師承根柢有在矣而傳言輔氏者絶無及焉累年蓄疑莫釋自戊辰七月輯公傳藁無從考證逮乾隆壬午往浙歸途於蘭邑書坊中購得金氏履祥先生文集鈔本共三卷卷一首帙書後學喻良能香山校下列刋刻門人十人首曰熊鉌熊瑞林景熈方逢辰汪夢斗陳淳鄧虎張偘許棐羅願捧讀再四竊疑熊公師於仁山本集中全無叙及其疑與師輔氏同且陳氏淳疑閩中北溪名氏已是勉齋一輩人年嵗已久不應在弟子之列歸里來忽忽六載於今嵗閏七月間雨窗重閱仁山先生本傳及張氏祖年金華正學編乃知金公本姓劉因避錢武肅王嫌故以金易劉遂恍然公所述聞之於師者恐即金公也且又述勉齋潜室二公所以發明文公晚年所造元元本本自非金華的傳其能如此斷制耶其曰敬堂者考金公字吉甫晚嵗卜築仁山因以為號又號次農所謂敬堂未有顯證然考魯齋王氏栢受學於北山何氏基時北山授以立志居敬之㫖遂著敬齋箴畫出一敬字為日用躬行之則及讀金仁山祭北山文定公文曰甲寅季秋時始受學截斷為人一語夢覺謂古聖賢一敬畏心曽子終身臨淵履氷然所謂敬匪拘匪懾常以為重則罔或越又祭魯齋王文憲公文曰卒於北山師資就正有的其傳立志居敬讀此知公於何王二公反覆授受於敬之一言實溯洛閩心法與程門尹公以敬為入門之要者一脈實相脗合縱未得敬堂為仁山稱號確證然彼時任重詣極恪佩師訓用力於敬者非異人任矣再按熊公送胡氏序作於宋端宗景炎丙子後十年適當元世祖至元乙酉之嵗蓋世祖一統至此已六年矣公宋代遺民避榜名未定書鉌字或稱其師舍改姓而從舊姓抑亦寓勝國君臣之義云爾或尚有敬堂其人亦未可知惜金華諸名集無從搜訪尚俟博考者訂正之再考輔氏漢卿雖朱子晚嵗所得門徒然考漢卿本傳初事吕東萊後卒業於晦翁即朱子語錄亦云向在臨安相聚見伯恭門徒無及之者伯恭於淳熈八年卒先朱子卒二十年則輔氏從學於朱子之門年亦非壯矣及考魏氏鶴山䟦朱文公所與輔漢卿帖云先友漢卿端方而沉碩文公深所許與徃來書帖當不止此云云此則漢卿身後鶴山所述之語也鶴山卒於嘉熈元年後十一年勿軒方生則偰氏叙勿軒訪文公之門人輔氏而從遊一語似無可據矣偰氏叙述於勿軒音容未逺之初而余謬訂於勿軒巳徃四百五十餘年之後是檢前人之愆不禁爽然失矣嗟乎師友道逺末世託名標榜互相依傍者多然在昔髙自位置恥學於師者亦有之昔河汾門人多有顯達迨修隋史而遺其師不立傳以致千載若明若昧是師友所係匪淺矣今考仁山之集校者喻氏良能著忠義傳二十卷文集數十卷兄弟皆宋季遺民一時名徳則校訂繫名豈茍哉至刋刻數公姓氏亦皆表表千載可以傳信者也夫金公當日之文固不藉數公而顯而數公亦非藉金公之文以傳也予固感金熊二公傳習本末皆關彼時斯道絶續之交碩果之㑹也故不禁娓娓具述焉乾隆丁亥閏七月望後一日丁未清馥謹識教授李士則先生文李文字士則崇安人聰敏篤學遊熊勿軒之門與杜本友善談議間一以講學為事聲聞四馳學者羣然取正皇慶初舉為蘓州學教授教授虞善繼先生光祖虞光祖字善繼崇安人㓜受學於熊勿軒博綜經史為文有跌宕氣官邵武學教授安子仁先生實安實字子仁崇安人哀長吉曾孫也以哀為嫌遂易今姓師事熊勿軒聚徒講學其憂憤鬱懣之氣往徃發之文章及卒建安翁植誄之曰子仁氣激乎鯨海學傳於鰲峯絶塵險詞㧞神牙而破鬼膽鈎元幽思出月脇而穿天心廸教郎江繼祖先生志江志字繼祖事熊勿軒私淑文公刻意精詣士從遊者隨材質髙下皆有所得延祐中嵗大侵至殺人相食志毁家賑恤邑令夾谷山夀列薦省劄授廸教郎陳先生蒙正陳蒙正未詳其鄉里考陳公送熊先生東歸序有曰癸卯之冬退齋熊先生至某往就學焉亦受業其門者又曰書之可通足跡之可至疑是閩邦之士也俟再考學正詹先生君履詹君履邵武人按熊先生送詹君履學正序畧云記甲申嵗世祖某年余始卜居武夷之南邑里秀俊相與遊從者固不乏人而穎異成材者指亦未易多屈當路崇植儒官奬引士類惟儒官一途為㨗徑於是年盛力强欲藉以奮身者胥出焉隠屏之下曲溪之濵嵗嵗作贈語餞友朋散出郡邑蓋不少矣樵居閩上遊徃徃㧞其尤一人為之正曰劉某今年拔其尤一人為之錄曰詹君履皆武夷舊游也君履行有日同舎各致贈言之義余將何以告子則謂之曰當路遴選儒官一途非但可資以進身也涵養徳器脩礪學業正在此時云全文詳著述後不具錄劉希泌先生應李以下交友劉應李字希泌初名棨韜仲孫謹厚莊重博習脩潔舉咸淳十年進士調建陽簿宋亡不仕與熊勿軒胡廷芳講道洪源山居十有二年後建化龍書院與莒潭聚徒講授厚給課試悉倣州縣法林先生若存陳子芳林若存福清人陳子芳寜徳人按熊先生祀典議畧曰遵道之祠只及周程張朱五先生而不及司馬邵氏嘗以此求正於鄉先生福清林若存謂此論直可質無疑而俟不惑且謂康節作長厯書建成元吉作亂秦王世民誅之可與温公作通鑑書諸葛入冦同科此亦一証寜徳陳子芳謂此說巳是程子亦曰堯夫直是不恭又曰堯夫根本不帖帖地其不滿温公處亦多更以此參之當益明矣觀此則林陳二公皆當時耆徳與勿軒先生相切劘者本傳未得俟再考増入魏先生夢斗魏夢斗見熊先生考亭書院記與公分教大小學者未詳籍貫俟詳考増入劉先生邊劉邊建安人與熊勿軒友善工詩文所著有讀史摭言行世閩中理學淵源考卷三十七
