body:
  text: 閩中理學淵源考卷十四廣平府知府李清馥撰蔡貞白先生蒙叟學派蔡公以宿儒倡教於國初傳稱其學博古通今里中達官顯仕皆北面焉蓋亦一時人師也助教蔡貞白先生䝉叟蔡䝉叟閩縣人博古通今𨼆居教授弟子從逺方至者常滿諌議陳從易洎里中顯達者十餘人皆北面焉郡守李欣薦授本州助教年八十餘卒號貞白子著繩子三卷凡五十七篇博士吳儀之先生千仞吴千仞字儀之侯官人師事蔡蒙叟為髙弟文雅風流鄉邦仰之累官太常博士知䖍州卒丘憲古先生程學派經義攷云少海鄭氏自言其學出於富沙丘先生按丘氏之學莫可攷惟馬公廷鸞稱少海所著易卦疑難圖讀之時有會心必宿儒所著觀此亦可溯其師說之源流也鄭氏傳之潘冠英潘籍貫未詳待攷進士丘憲古先生程丘程字憲古政和二年進士建陽人按朱氏經義攷馮椅曰憲古之學傳鄭東卿東卿之學傳潘冠英潘說在十三卦處内象極當而少海所撰無之蓋聞之鄉人于公梁國輔于親授之於潘也沙隨程迥可乆曰丘先生嘗有詩曰易理分明在畫中誰知易道盡難窮不知畫意空箋註何異丹青欲畫風其學傳之東卿云朱竹坨經義攷志建寧府選舉目主簿鄭少海先生東卿鄭東卿字少海侯官人紹興二十七年特奏名為永嘉簿所著有易卦疑難圖按朱氏經義考陳振孫曰其書以六十四卦為圖外及六位皇極先天卦氣等圖各附一論說未有繫辭解自言其學出於富沙丘先生以為易理皆在畫中於是日畫一卦週而復始乆而後有所入又馬廷鸞曰此書本五行卦氣之說而象數義理出焉無朱子發之之瑣碎戴師愈之矯偽讀之時有會心者又董真卿曰東卿自稱合沙漁父大易約解九卷易說二卷宋志及馮氏作周易疑難圖三十卷紹興丁巳自為序朱氏經義考郡志選舉目邵宋舉先生整學派按邵彦明先生清傳闗西之學子宋舉先生整從合沙鄭少海學又整偕從子秀山景之從籍溪胡先生學箕裘厥有由來矣再按閩書邵整字宋舉古田人自稱䝉谷遺老攷道南原委及閩中諸志乗俱同獨邵氏宏簡録作劉整入在元儒詳攷其傳劉整字宋舉古田人亦稱䝉谷遺老其餘俱符疑是錯誤且整之父在北宋時從闗西遊則整南宋以後人物也或别有劉姓亦未可知但不應籍貫俱同獨姓氏異耳再按合沙為三山舊名云邵宋舉先生整邵整字宋舉古田人自號䝉谷遺老與族人景之以家學自相友教授生徒百餘人少從合沙鄭少海學易傳六十四卦圖說及春秋元經其纂集圖序甫訖而卒道南統緒謂整及景之亦胡籍溪學派閩書緒道南統州守蘇顒之先生大璋蘇大璋字顒之古田人父鴻以陰徳聞大璋少頴悟年十餘通周易大義事母孝慶元進士嘉泰中邑大水墊溺饑饉大璋方舉進士上章乞常平使者躬為賑濟民頼存活司教道州闡揚正學召試館職除秘書正字累遷著作郎轉對力言禁錮偽學之非忤大臣意累乞外知吉州子士穆知福安縣閩書志新三山陳世德先生光學派按永春桃源志乗載朱子曽至其處至今尚有留墨意其時蔡氏兹鍳識朱子有塲屋之知陳氏光蘓氏升又與朱子同登進士第而陳氏知柔又友誼最篤者必經過訪無疑也公與休齋文靖義兼師友皆為一時典型之望稽文獻者於此邦尤惓惓焉僉判陳世徳先生光陳光字世徳家永春民蘓里之碧溪妙齡力學潜𨼆幽僻閉户讀書手不釋卷歲首則裹糧從師歲暮方歸侍赴鄉試榜黜無愠色即就市鬻紙歸同行詢之云欲備抄冩同行不覺􅅓笑光答曰後三歲復大比後果登紹興戊辰進士第與朱子同年嘗進經筵講解丞相梁克家舊從受業休齋陳知柔與之為友手抄六經解一字差誤即毁其板復手抄之其誠敬學問如此尤工為古文所居之山人以文章名之官封州僉判權知新州承務郎髙東溪先生登學派漳江之學至北溪得紫陽之傳而逓衍繁盛然在靖康間時有東溪髙先生者以忠言志節著聲朱子涖漳曽新其祠宇又為之記言先生學博行髙志節卓然有頑亷懦立之操其有功於世教豈可與𨼆忍回䕶以濟其私而自託於孔子之中行者同日語哉按東溪之學亦一時倡起之師也承務郎髙東溪先生登髙登字彦先漳浦人少孤力學刻志勵行宣和間為太學生金人犯京師與陳東等上書乞斬蔡京童貫王黼梁師成李邦彦朱勔等六賊以謝天下廷臣復建和議割三鎮奪种師道李綱兵柄公與東再抱書詣闕軍民不期而會者數萬帥臣王時雍縱兵欲盡殱之公與十人屹立不動欽宗即位擢吳敏張邦昌為相敏白李邦彦無辜乞復用公上言陛下以東宫踐祚人人跂足以觀新政柰何相吳敏張邦昌復再納邦彦大失天下之望人心自此離矣自是章凡五上皆不報因謀南歸初金人至六館諸生將遁去公與林邁等請隨駕金人退師敏遂諷學官羅織公等屏斥還鄉紹興二年廷對極意盡言無所顧忌有司惡其直授下州文學尋有旨附第五甲乃授廣東富川主簿憲臣董棻聞其名檄讞六郡獄復命兼賀州學事公請復學舍舊田又抵囚於法秩滿士民乞留不獲歸至廣新興大饑帥連南夫曰撫彫瘵者莫如髙主簿遂檄往發廪賑貸全活萬計因奏辟終其任紹興八年赴政事堂審察遂上疏萬言作蔽主蠧國害民各上下二篇上之髙宗稱善下中書秦檜惡其譏已格之授静江府古縣令至静江廣西帥沈晦問公何以治縣公條十餘事晦曰此古人之政今日詐疑不可行也對曰忠信可行蠻貊患誠不至耳豪民秦琥武斷鄉曲持吏短長公白置之法一郡稱快古縣秦檜父舊治檜實生此帥胡舜陟謂公祠之公曰檜為相無狀曷以祠為舜陟怒移荔浦丞康寧代公適公亦以母病乞去舜陟遂創檜祠而自為記且摭秦琥事誣以專殺罪逮捕詣獄適舜陟先以事下獄死矣事卒白勑還家至廣漕帥鄭鬲趙不棄辟公攝歸善令委考試潮州公摘經史要語命題䇿閩浙水災所由皆屬意時事時丞相趙鼎在潮謂曰天下主文多矣未有如公忠誠愛君者留語終日郡守季仲文馳達檜檜怒坐以舜陟所奏取旨編管容州省符下漳州公適歸舊𨼆與學者講論州遣使臣謝大作持示之公讀畢即上馬大作曰少入告家人無害也公曰君命敢稽耶大作愕然比夜廵檢領百卒挾兵刃至公曰若賜死亦當拜勑乃就法大作感公忠義為泣下奮劒叱廵檢曰汝欲何為省符在我手無他語也吾當以死捍之公至謫所授徒自給種植蔬竹為終焉之計聞朝廷政事少失輒顰蹙不樂大則慟哭隨之容本窮陬聞公至執經從者數百人為講大學中庸之㫖教方行而疾作臨卒所言皆天下大計公事母至孝嘗奉母舟行阻風方念乏晨羞忽有白魚躍入其學以慎獨為本所著有家論等篇及東溪集後二十年丞相梁克家以其事聞追復迪功郎胡銓為作忠辨後五十年朱子守漳為作祠堂記奏加褒贈閩書名宏簡録臣傳主簿林實夫先生宗臣林宗臣字實夫龍溪人乾道二年進士受業髙東溪登之門官至主簿一見陳安卿淳心異之謂曰子所習科舉耳聖賢大業則不在是因授以朱文公所編近思録安卿卒為儒宗實夫啟之也户曹黄葉叔先生京黄京字葉叔龍溪人紹興二年進士初在郡學與髙登相友善至是又同舉進士登調桂嶺簿京調連州户曹並以清白稱秩滿歸里聞登以直言斥恬無仕進意時年未四十性樂施予所識闕乏者厚賙之鄉里稱為長者縣令李康成先生則學派按清漳志稱先生等聚徒講學文章行誼各有可觀列之儒林其徒如楊彦侯諸公皆其卓然者也今附於後縣令李康成先生則李則字康成龍溪人少孤力學試太學不得志浩然東歸教授生徒至百餘人如楊汝南李恂諸公皆師事之累薦鄉書前列紹興十二年以特科授桂嶺簿攝富川令調徳化令所至皆有惠政轉通直郎致仕公學兼得之蘇程二家其教人必以仁義為本自號益壯翁縣令楊彦侯先生汝南楊汝南字彦侯龍溪人擢紹興十五年進士郡守李彌遜竒其材勉就宏詞科中書以其文崛竒不署至是登第初調贑州教授改廣州教授摭詩春秋中庸要語著經說三十篇以授學者乃進表於朝祭酒楊椿覧之曰真今之師範也即薦改秩知福州古田縣以亷平公勤自警尤以教化為先務脩學舍置學田俾諸生質疑問難亹亹不倦又造安福橋長六十丈以濟渉者與廬陵楊萬里以節義相勉與髙登尤相友善扁其所居堂曰不欺自號快然居士鄉居講學戸外屨常滿焉其文章語意清新有騷人典則云縣令李顧言先生恂李恂字顧言龍溪人性敏好學舉進士任縣尉以捕盗賞改知晉江縣後知邵武軍以宮觀致仕初恂登第與史浩同甲及浩當軸累召不起時論髙之子必直必正皆廕補官必直任興化軍郡守葉嗣忠先生廷珪學派按嗣忠先生為一時名彦在泉郡治績綽有政聲志乗載公知泉州清静簡易時通淮門之河塞通淮門者水門也郡城諸水故趨巽方環學宫而東之未有汲潮汐引之入者紹興十六年守葉公闢通淮門引入舟檝直抵學宫前語人曰十年後當有大魁至期梁文靖克家應之後去官郡人祠於清源下洞其為宰時不拜張邦昌偽詔大節尤卓然平昔與朱公喬年相友善在温陵與傅公安道相往復其門徒如陳正獻諸公皆為一時碩彦今列其學泒著於篇郡守葉翠巖先生廷珪葉廷珪字嗣忠號翠巖甌寧人少嗜書貧無可讀其曽祖以差役至京傾槖市歸因得盡讀之政和五年累除武邑丞時興燕山之役廷珪三部軍餉一粒不食轉知徳興縣張邦昌偽詔至不肯拜中興後差知福清縣縣瀕海民困鬻鹽廷珪創増鹽錢稍獲其便又有煮鹽利害圖及書州縣往往遵用之召為太常寺丞輪對乞搜訪遺書補中秘府髙宗嘗問方今禮樂之事廷珪以兵革未息禮樂未遑為對秦檜聞之不說未幾出知泉漳二州廷珪性喜讀書肄業郡學升貢上庠登名桂籍入仕四十餘年未嘗一日去手毎聞士大夫家有異書無不借讀讀無不終卷嘗恨無貲不能盡冩作數十大冊擇其可用者手抄之名曰海録文多者為海録雜事細碎者為海録碎事其未知故事所出者為海録未見事其事物興造之原為海録事始其詩人佳句曽經前軰稱道者為海録警句圖其有事跡著見作詩之繇為海録本事詩獨碎事文字最多初謂之一四録言其自一至四字有可取者皆録之後改為碎事毎讀文字見可録者信手録之既知泉州公餘無事因取類之為門七十五為卷二十有二事多新竒未經前人引用者復好為詩與吏部員外郎朱喬年以詩相善喬年議論少許可獨喜稱廷珪詩在泉中與傅自得一見如平生會即談詩一日誦其所作郡齋羅漢詩示自得末句云幾多雁鶩行間吏衙退頻來禮釋迦自得謂廷珪予毎讀韋蘇州詩今朝郡齋閒欲問楞迦字未嘗不廢卷太息想像蘇州之風流藴藉而知其當時之政泉故劇郡公使吏軰優㳺如此此可觀公廷珪欣然以為會心之友按續文獻通考載廷珪篤學醇雅葉顒陳俊卿黄祖舜皆出其門云郡志通續文獻考正簡葉子昻先生顒葉顒字子昻顗弟紹興二年進士由南海簿累遷司農丞以薦召對除將作監簿出知處州青田令獻羨錢百萬顒詰令何從得羨命以代本縣民戸輸納夏租歴陞右司諌孝宗即位擢吏部侍郎權尚書論典選一途衣冠之所從出而吏胥得權其柄是使入銓曹與吏為市出銓曹與民為市也乃編上七司條例一書孝宗悅著為令乾道初召對便殿問卿當官何先對曰清亷臣分公忠實要孝宗曰卿無忘此言除端明殿學士拜㕘知政事兼同知樞密院事武臣梁俊彦請税沙田蘆塲奏罷戸部侍郎請两淮行鐵錢力持不可尋進尚書左僕射兼樞宻使引薦汪應辰王十朋陳良瀚等十人可備執政禁從䑓諌之選又極論龍大淵曽覿竊弄威福二人俱斥去㑹冬至郊雷雨作孝宗手詔飭大臣顒引漢故事上印綬即日出闗抵家卒贈少師諡正簡福建通志莊定黄繼道先生祖舜黄祖舜字繼道福清人宣和六年進士累任至軍器監丞入對言縣令付銓曹專用資格曷若委郡守汰其尤無良者上然之權守尚書屯田員外郎徙吏部員外郎出通判泉州將行言抱道懐徳之士不應讀書干禄乞自科舉後有學行脩明孝友純篤者縣薦之州州延之庠序以表率多士其卓行尤異者州以名聞亦鄉舉里選之意下其奏禮部遂留為倉部郎中遷左司郎中權刑部侍郎兼詳定勅令司兼侍講進論語講義上命金安節校勘安節言其書詞義明粹乃令國子監板行故資政殿學士楊愿家乞遺表恩祖舜言愿陰濟秦檜中傷善類因寢其命秦熺卒贈太傅祖舜言熺預其父檜議今不宜贈帝傳之秩追奪之遷同知樞宻院事金主亮侵淮劉汜敗王權走上將誅權以厲其餘祖舜言權罪當誅汜不容貸劉錡有大功聞其病已殆權汜誅錡必愧忿以死是國家一敗兵而殺三將得無快於敵乎上嘉納薨於官諡莊定所著有易說國風小雅說禮記說歴代史義及遺文十五卷新郡志按朱子語類卷一百一内載五峯說區以别矣用禮記勾萌字音林少頴亦曽說與黄祖舜來如此是祖舜亦似從少頴講論者其受學未詳待攷閩中理學淵源考卷十四
