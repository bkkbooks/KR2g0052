body:
  text: 閩中理學淵源考卷十八廣平府知府李清馥撰朱子泉州門人并交友泉自唐歐陽四門先生開閩學之先迨五季俗敝波靡宋興此邦人文漸著賢哲踵生惟時周程派系多屬上游至子朱子臨莅同安闡明聖學崇奨名教泉之學士斌斌嚮風矣厥後陳後之劉叔文楊至之許順之親承言論蔡白石陳北溪遞衍師説與吕樸鄉丘吉甫後先輩出時謂之清源别派志乗載考亭道脉傳入温陵所著錄者二十餘人若傅氏竹𨼆父子陳氏知柔黄氏維之與公知契尤篤至末造吕丘諸賢或𨼆身明志或守義不辱嗚呼豈特其亮節可風哉亦平昔辨志居業為有本也夫泉之習尚在嘉祐治平之際猶以勲業名位為烜赫迨至朱子啟發講明風氣一變重以王梅溪真西山漸摩徳化禮教大明尚論者知朱真諸大儒之澤矣而遞續師傳羽翼斯義諸君子亦皆持道化之盛也回溯風猷寧能忘崇仰哉柯國材先生翰柯翰字國材同安人孝謹誠慤自守介然及門授經人以百數文公朱子簿同安屬治學事引翰自助翰内行峻潔衆嚴憚之久皆化服葺廬以居取揚子所謂三年通一經者以名其堂文公為作一經堂記按紫陽文公門徒惟同安諸生受業最早有柯國材翰許順之升陳氏齊仲徐氏元聘諸先生考文公與國材書云戴陳二生趣向文辭皆可觀固知其所自矣有友如此足以為仁敢以為足下賀而僕亦将有賴焉又云某自延平逝去學問無分寸之進汩汩度日無朋友之助未知終何所歸宿云云又曰李君好學禮賢其志可嘉國材想亦推誠與之講論有可采處若得同為此來真寡陋之幸又曰石文相聚所談何事其篤誠好學已不易得而議論明快想講論之際少所凝滯也又云前此以陳許二友好為髙竒喜立新說往往過於義理之中正故常因書箴之蓋因其病而藥之非以為凡講學者皆當畫於淺近而遂止也又云凡此皆石文書中未及盡布者或因講論之次間為及之并以呈齊仲順之不知如此卑説還可髙意否二公更不及别書也徐文惠書云有疑難數板却未見之豈封書時遺之邪觀書中諸人陳許二友似指齊仲順之徐文未知是元聘否李君并戴陳二生未詳石丈疑是同安丞石整子重朱子與往復書甚多係會稽人又按淳熙四年二月文公祭國材文曰余少之時承吏君里實始識君敬慕興起致君序室以表後生講誦洋洋徳義振聲又曰惟君之徳剛毅近仁望之可畏即之可親云云道南源委郡志邑志朱子大全集許順之先生升許升字順之别號存齋同安人生長華宗視紛華勢利無足動心獨有志聖賢之道朱子簿同安公年十三即從講學淬勵五年秩滿復從北歸覃思研精學力大究朱子稱其學専用心於内嘗書存齋二大字授之使扁書院復為之記臨别宿雲際寺朱子送以詩曰薄暮投花縣聯車入翠微長林生缺月永夜照寒扉清話欣無斁離懷悵有違勉焉彊毅力千里要同歸又云門前三徑長蒿萊愧子殷勤千里來校罷遺書却歸去此心原自不曽灰至家朱子兩與書微示養氣修齊之意在衰絰之年動閑禮度擬古自裁朱子嘉之令校程氏語録公曲折訂正論量朱子答書甚悉居家偕同志陳齊仲肄業净𨼆寺又與石子重徐元聘柯國材陳汝器王近思等友善後遍交四方之士若范伯崇廖徳明林擇之許敬之等或相過從或往來書問論道肄業朱子稱其恬淡静退無物欲之累所著有孟子説禮記文解易解等書並湮滅無傳按文公與王近思札云汝器諸友相聚日所講者何事即傳中陳汝器否又朱子大全集門人姓氏録有林汝器同安人未知孰是舊志新志稾闕書陳先生齊仲陳齊仲同安人從文公游文公勉其務實徐先生元聘徐元聘同安人號芸齋名未詳文公曽為作芸齋記附文公與順之書曰國材元聘為況何如昨寄得疑難來又是一般説話大抵齋仲順之失之太幽深順之尤甚而三公失之太執著執著者有時而通幽深者蕩而不返矣中間一條平坦官路却無人行著只管上山下水是甚意思因書可録此意及二序送之為致不及書之意范伯崇學大進劉徳明者亦稍識理趣皆可喜耳伯崇去年春間得書問論語數段其説甚髙妙因以呈李先生李先生以為不然令其慤實做功夫後來便别此亦是一格也然其當時髙妙之説亦只是依諸先生説而推言之過當處耳非如順之所示硬將文義抝横説却也切宜速改至祝至祝按文公與許順之書言國材元聘為況何如書中又言李先生則諸人皆在孝宗隆興以前及門者故列在前云縣丞陳後之先生易陳易字後之永春人從朱子游朱子嘗稱後之及安卿為學頗得蹊徑次第又與楊至書云彼中朋友後之講論可師或問延平驗中於未發之前是何氣象易曰持守良久亦自可見蔡和恒請質焉淳熙四年以明經登鄉薦慶元二年進士仕終福州懷安丞居喪叅酌古禮不用浮屠鄉閭化之著有語孟解新郡志藳劉叔光先生鏡劉鏡字叔光惠安人厭科舉之習淳熙間從朱子學主於涵養體察稱髙弟附劉叔文先生劉叔文名未詳朱子與楊至之書云彼中朋友後之講論可師叔文持守可法諸友若能頻與切磋必有益也又與李亢宗書云陳後之持守見識皆不易得劉叔文守得亦好但未知後來所見如何耳按二公為師門稱許如此其為髙弟無疑再按朱子稱彼中朋友後之講論可師叔文持守可法後之陳易字則叔文亦劉之字也所云彼中朋友似均屬泉人再按劉鏡字叔光惠安人其學主涵養體察稱髙弟朱子集中泉郡諸門徒多掛及其姓氏即往復書中亦多及之獨遺劉叔光鏡或疑叔光叔文字畫相近或傳寫差訛或别有其人謹将叔文録附叔光傳後待考焉備考朱子答劉叔文書曰所謂理與氣決是二物但在物上看則二物渾淪不可分開各在一處然不害二物之各為一物也若在理上看則雖未有物而已有物之理然亦但有其理而已未嘗實有是物也大凡看此等處須認得分明又兼始終方是不錯只看太極圖熹所解第一段便見意思矣若未會得且虚心平看未要硬便主張久之自有見處不費許多閑説話也如此虚心理會不得時却守取舊來所見未為晚耳如或未然且放下此一説别看他處道理尚多或恐别因一事透著此理亦不可知不必守此膠漆之盆枉費心力也又曰細詳來喻依舊辨别性氣兩字不出須知未有此氣已有此性氣有不存性却常在雖其方在氣中然氣自氣性自性亦自不相夾雜至論其徧體於物無處不在則又不論氣之精粗而莫不有是理焉不當以氣之精者為性性之粗者為氣也來説雖多只以此意思之便見得失如云精而又精不可名狀所以不得已而强名之曰太極又曰氣愈精而理存焉皆是指氣為性之誤又引通書解云云亦是不察隂陽二字是形而下者便指為誠不知此是誠之流行歸宿處不可便指為誠也又引無極之真以為真固是理然必有其氣是以可與二五妙合而凝此尤無理矣夫真者理也精者氣也理與氣合故能成形豈有理自有氣又與氣合之理乎其間瑣細不暇一一辨論但更看太極圖解第一段初兩三行便見理之與氣各有去著不待如此紛紜矣楊至之先生至楊至字至之晉江人遊文公之門蔡元定奇之妻以女焉著天道至徳天道至教二圖以發明為士希聖盡人合天大㫖記所聞於朱子者為語録二卷按文公答楊至之書略曰向嘗面説至之有膚淺之病不知曽究其所以然而加濬治之功否後之歸永春後曽復來否子順子能為學復何如彼中朋友後之講論可師叔文持守可法諸友若能頻與切磋必有益也漳州朱飛卿近到此病作未得細講陳淳者書來甚進異日未可量也讀此書知泉漳彼時學徒次第尋學𣲖者即此可想見大略此書在知漳州以後之札中言後之即陳易叔文詳見叔文補傳楊子順先生履正楊履正字子順晉江人朱子門人朱子稱其為學細宻有生徒數百人按文公答子順書云學雖以躬行力踐為極然未有不由講學窮理而後至又曰來書所論為學大意似已得之但賢者本自會説説得相似却不為難只恐體之未實即此所説皆是空言不濟事耳又曰至之粗疎不如子順細宻云王近思先生力行王力行字近思同安人與陳易楊至楊履正劉鏡淳熙間皆游朱文公之門公謂其明敏有餘而少持重因勉以為己功夫自是苦學善問深得㫖趣所著有朱氏傳授支派圖文公語録一卷大全集載其問答甚多按朱子語録姓氏載王近思録文公語在紹興二年辛亥所聞時文公年六十二在知漳州後也其受業文公年嵗傳中載在淳熙間再按文公與許順之書云徐柯二文及汝器近思諸友相聚説何等話云云徐似指徐元聘柯似指柯國材考文公淳熙四年有祭柯國材文則此公當在淳熙四年以前及門無疑也李子能先生亢宗李亢宗字子能泉州南安人刻志問學服習儉素儼然一儒生無貴介氣習文公稱之按文公答李子能書略曰累承喻及為學之意甚善但如此用力頭緒太多令人紛擾無進步處故程先生説涵養須是敬進學則在致知張子文先生巽張巽字子文一字深道五代漳州刺史清溪之裔父寓奉議郎知臨江軍嘗與張南軒共學淳熙中南軒講學長沙城南書院寓遣子巽從之游及歸贈以二詩指示為學根本且致屬望之意其詩曰秋風木葉落送客麗樵東豈懷兒女戀愛此趣味同至理無轍迹妙在日用中聞言有不信渠自馬牛風吾子實所畏立志髙冥鴻卓然遊聖門不受異説訌切磋豈不樂愧非斵鼻工於皇太極藴精微浩無窮願言終玩繹黙參元化工又曰人言底柱險袖手不敢邇孰知人心危毫釐千萬里由來事物繁酬酢無披靡雖云應不難要且辨真偽良知本易直天機驗所起涵濡自日新日新乃無蔽聖學非空言要領故在此吾子端發源所進渺涯涘我雖念不敏詎敢忘所止後會儻有時深功同舉似南軒之教使人先察天理人欲之分而培養擴充以復其性其於聖賢微言多以所自得義理為之解説明透灑落人人易曉巽既受師傳以歸杜門玩養寡交於人人亦鮮知之者是時晦菴之學盛行於泉謂之清源别派其學者如楊至至之陳易後之輩持守講論多可觀惠安有劉鏡叔光者稱為髙弟巽間從之遊因得所聞於晦菴者未能釋然曰恐晦菴之教不止此也乃走武夷謁晦菴晦菴以所嘗與南軒講論中和之㫖告之曰此某與南軒晚年畫一功夫也臨别又請教晦菴曰南軒記嶽麓某記石鼓合而觀之知所用力矣巽退而喜曰吾固謂其不止是也既歸日從事於涵養體察久益明静人或勸其著述對曰尊其所聞則髙明矣行其所知則光大矣吾於所聞所知尚未能加意安敢妄作有草堂在錦溪之上學者稱為錦溪先生惠安邑志按文公撰衡州石鼔書院記在淳熙十四年丁未夏四月時文公年五十八子文在作記後從學自屬晚年矣郎中髙穎叔先生禾髙禾字穎叔泉州晉江人淳熙八年進士歴福清仙遊令知惠州除將作監丞大理寺正兵部郎中奉祠卒陳宓作墓誌其略曰公端方而重和易以莊色夷氣清可畏而愛始微有知則知學問日開日益卓然早茂叔伉倅臨漳朱文公時綰郡符公執子姪門弟子禮卑以恭文公深器之義利之間辨析杳微非所當得一介不取待人接物宛若處子或意外干以私正色拒絶雖賁育不能抗歴州縣持使節閩廣之人至今頌之林先生巒林巒晉江人文公門人能推所聞以講學閭里按先生曽以所為文三篇以質文公公答書略曰學之道非汲汲乎辭必其心有以自得之則其見乎辭者非得已也今足下類多採摭先儒數家之説以就之所以自得者何如哉足下改之甚善又答書論中庸喜怒哀樂未發數章末云讀書且虚心看此一處文義令語意分明趣味浹洽乃佳切不可妄引他處言語來相雜非惟不相似且是亂了此中正意血脉也黄先生謙黄謙南安人父命之入郡學習舉業謙棄去從學於文公公曰既是父命習舉業何不習郡學舉業與理學不相妨如拂父之命則父子相夷矣何以學為徐先生應中王賔徐應中同安人王賔晉江人俱進士按朱子為同安簿請徐王二先生充學賔申縣劄曰縣學教集生徒漸成次第但職事員數既多又皆頗有分職以此不得専意教導竊見本縣進士徐應中留意講學議論純正進士王賔天資樸茂操理堅慤求之流輩未見其比乞從縣司行下本學具禮敦請赴學特給厨饌待以賔客之禮不惟使生徒覩其言行得以矜式庶幾士民向風有所興勸云按朱子申請本縣徐應中王賔以充學賔俱稱進士考閩書諸志登科年分無可考疑是遺録今當以朱子申請為據入之學派中蓋平昔必經薰炙無疑也許子春先生景陽許景陽字子春同安人從文公游文公稱其説話意趣儘好恨不得欵曲議論閩書按朱子大全文集卷七詩編内有山北紀行詩詩末自註同行諸人云廬陵許子春景陽温陵吳兼善仲達又考大全别集朱子題折桂院行記在淳熙八年辛丑内有温陵許景陽則景陽又屬温陵人俱不可曉又考黄勉齋先生集與余瞻之書云廬陵書信遞去良久旦夕雖有回訊當得尋便納往景陽書向説比亦收書看周禮甚有味亦作書挽其歸恐遂為廬陵人未可知也按此或是温陵遷寓廬陵耳再按羅氏大經鶴林玉露載朱文公帖稱景陽姓許字子春季章姓劉名黼皆廬陵醇儒從文公學羅亦廬陵人云縣令黄景傅先生巗孫黄巗孫字景傳惠安人寶祐四年進士授仙谿尉興學校修邑志治梁橋水利一以義理之學為政作思賢堂以祀前尉段全凌景陽二公并作堂記咸淳間令尤溪重新南溪書院建四齋及講堂以棲學者復作夫子燕居堂録朱子所作太極通書西銘三書解及與門人問答書疏散見文集語類中者及後儒之説有發明者申以己意薈萃成篇倫類通貫名曰輯解刋於書院未幾通守福州又校刋西山讀書記皆行於世郡守曽泰之先生秘以下交友曽秘字泰之同安人乾道五年進士與朱子友善薦授國子監丞知惠州繕亭驛増冷泉叱馭秀麓等菴以濟行者後知漳州卒按朱子於淳熙十年撰漳州龍巖縣學記曽言温陵曽君秘來嗣其丞職又曰嘗從吾友石許諸君遊是必能誦其所聞以先後之者意曽公在同安時與朱子相識石許疑是石子重許順之否待考提舉趙彦忠先生悰趙悰字彦忠父思誠為泉州守因居晉江悰與朱子友善為福建運管以鹽法病民請恤竈户均敷額嵗衍鹽百萬斤知惠州覈吏欺弊得米七千斛錢五萬緡公入既充斥其餘以惠民政以最聞歴提舉常平卒於官子誼聚書萬卷知富陽縣説守南恩州郡志州守儲行之先生用儲用字行之晉江人淳熙十一年進士知建陽有惠政朱子亟稱之會黨禁起罷去後道縣治民擁車大呼曰此好官長我輩共思之起知襄陽鄧民樊快明率衆來附制司欲𠞰之用爭於朝復力言於制閫大恚之罷用歸時海寇犯泉境與守真徳秀合謀抵海島擒其酋餘黨遁去後直文華閣知惠州未上卒子耀知雷州郡志州守蔡光烈先生兹以下知舊蔡兹字光烈永春人問學有聲從遊甚衆蚤以明經領鄉薦復以詞賦第紹興十二年進士仕至南恩守秩滿雅有林泉之想丞相梁克家當軸除兹廣徳憲控辭甚力遂掛冠歸築室東偏扁曰燕堂後取邵康節齒髮既衰非昔日林泉能老是長春之句復改其堂曰長春日與賔友觴咏其間兹嘗於紹興二年為建州貢院考官謂人曰吾取中一後生讀其三䇿皆欲為朝廷措置大事他日必非常人乃朱熹也其巨眼如此按傳中稱紹興二年為建州貢院考官取中朱子考紫陽年譜朱子生於建炎四年庚戌至紹興二年壬子方三嵗其年分傳寫錯誤無疑蔡公於紹興十二年登第朱子於紹興十七年貢於鄉十八年登第意蔡公自是登第後為建州考官否謹識之待考查永春舊志泉郡舊志閩書諸書相沿皆作紹興二年疑皆承誤閩中理學淵源考卷十八
