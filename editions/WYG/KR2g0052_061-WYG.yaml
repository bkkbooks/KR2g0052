body:
  text: 閩中理學淵源考卷六十一廣平府知府李清馥撰通判蔡東洛先生潤宗學𣲖何氏名山藏言虛齋與陳布衣陳紫峰羅整菴諸公皆不立門戸不開講堂卓然聖人之道躬脩君子也虛齋身自力學而教人恒循舉業以入曰不如是法堂前草深一丈矣今考諸門徒講說踐履確循榘度無軼師門宗㫖其篤信好學者歟再按恭肅黄葵峰諸公皆經先生指授為世名臣其為學卓然儒者凖䋲而恭肅於諸經皆有論述前輩嘗言吾鄉自蔡文莊而後行脩學富必推黄恭肅淵源有自來矣今錄其著者載於篇通判蔡東洛先生潤宗蔡潤宗字克昌晉江人好古力學作止起居終日嚴肅受蔡文莊易學轉授生徒學者師之尚書黄光昇蔡克廉吏部梁懐仁傅夏器其最著也領嘉靖四年鄉薦除餘杭令節約里甲勸民務孝弟力田刻所著四書講章易學正言以教士左遷寜國教授擢南國子博士以父憂歸服除補北京出為建昌府通判尋稱老乞歸杜門養恬家無擔石充然自得不屑求人足跡未嘗及郡邑監司守令往往造廬加禮間一出接終不及門報謝士大夫益以此重之閩書郡志新郡志藁恭肅黄葵峰先生光昇黄光昇字明舉别號葵峰晉江人父綬接蔡文莊學派光昇登嘉靖八年進士為吏部選人即明法律書數考論國家掌故授長興令理煩治劇紀綱肅然擢刑科給事中以艱歸服闋起兵科以剛介不阿時相出為浙江僉事遷參政修築海塘以收水利厯廣東按察使時海冦為患光昇下令能捕獲者與所獲財物冦遂息安南莫正中與莫浤翼爭立敗而來歸其酋范氏潘氏以兵攻欽州索正中殊急光昇密授主將俞大猷方畧伏兵挫之二酋奔浤翼斬之以獻尋率其黨聴命安南以安已而復有討定猺黎及俘新會賊功遷右副都御史巡按四川疏止採辦丹砂麩金及勻停水陸郵傳嵗省民財數十萬會建三殿需巨木市鬻有法不湏加派工成擢兵部侍郎總四川湖廣貴州三省討叛苗撫降二十八寨召入工部尋進南戸部尚書嚴嵩竊柄政以賄成諸督撫無能徒手保位者光昇自疏議外絶不為私交時光昇著廉名且有督木撫苗功嵩亦採輿論以艱鉅相畀意不能無望也嵩敗華亭徐階雅相知遂力推轂焉自南京入長司冦時世宗暮年譴戮不測階與光昇斡旋調劑求生法外寓生法中良亦有獨苦者所讞楊選嚴世蕃海瑞三獄委曲平停得從寛減給事中沈束以言事囚繋十六年光昇疏乞蠲宥有㫖放為編民光昇在事久屢欲告歸華亭固挽之曰藉公清徳以風庶僚比華亭為髙拱擠去光昇亦請老家居隆慶四年召為南京刑部尚書髙拱以内閣典銓嗾私人用稽命論劾竟罷還里公賦性剛毅自縣令至司冦所至訟獄得平引大體逹情事生平論學一以考亭為主重實踐而擯𤣥虛故其褆身居官確有榘矱筮仕四十餘載未嘗以寸楮尺帛濡跡權門先世田廬之外無所増拓食不重味衣不襲帛里居謙退約飭宗族屏絶紛囂日惟焚香著書矻矻終老弗懈卒年八十一贈太子少保謚恭肅著有四書紀聞讀易私記讀書愚卷讀詩蠡測春秋采義厯代紀要昭代典則陶集杜律註解數百卷藏于家而讀易私記學者尤尚之子喬棟事父至孝以䕃授臨安知府有廉名著十二經傳習錄讀書管見按公為司冦時所讞三獄當時衆論未允而擬海剛峰子罵父律尤貽物議今細閲閩書公本傳云海瑞為户部主事嘉靖末上疏直攻上身上怒甚讀之至手顫已感其忠留中月餘尋疾甚逮繫之下㫖内閣罵瑞詈君不絶口光昇擬子罵父律以進留中未下會上崩得釋葢上天也而又聖躬疾甚當其怒時至不可忍孰謂先臣而後君不擬重律進者上怒瑞瑞立死矣寜少安上意俾就長繫寛解或有日葢其用心之㣲如此當光昇之為刑部也世廟在位久雄斷淵衷羣臣無能測嬰鱗之僇其時三尺未易直伸而衆喙復難盡置光昇委曲平停求生法外寓生法中良亦有獨苦者此段閩書叙述獨詳可見恭肅之出脫剛峰處在此傳云父有爭子以子原有諫親之義也引此以斷其亦前輩委曲之苦衷乎論世者自有所考云舊郡志閩書黄文簡撰行状道南源委新郡志通志吏部梁宅之先生懐仁梁懐仁字宅之號學泉晉江人宋文靖公克家之裔九嵗而孤嘉靖四年年十六舉鄉試八年登進士懐仁有異質敏慧絶羣周嵗識字三嵗誦書四嵗善草書吟詩至子史經傳無不能讀時翕然稱曰神童既登名禮部人視其文章翰墨如璠璵結綠一時希覯片言隻字必爭取珍藏之初授南京吏部騐封主事方鍵戸讀書銳志慕古閱三月卒士大夫莫不嗟痛之所著有國朝功臣年表讀史日抄詩文數百首舊郡志清源文獻吏部傅廷璜先生夏器傅夏器字廷璜南安人年二十三登嘉靖辛夘亞魁不第久之發憤為舉業之文嵗置甕几下投所作文嵗終展視甕為滿矣嘉靖庚戌會試擢名第一廷對抗直指切權要嚴嵩覽而惡之尋遣人招致門下拒不可以此不得入史舘除儀制司主事徙光祿丞改吏部稽勲郎中與其長不合拂衣歸即所居坂田之野灌田以自給絶跡有司之門郡人髙之少專心易學既登賢書沉酣於六籍百家二十年制科之文傳誦海内卒年八十六著有文集四卷新郡志􅄁墓志提舉黄仰槐先生廷楫黄廷楫字才逺號仰槐晉江人少受易學於蔡東洛易愧虛二先生丙午鄉薦授浙江處州推官在郡精心讞獄厯湖廣均州守時嘉靖末年禱祈祀事薦幣設塲無虛日廷楫䖍躬應之禮有叙而民不擾旋左遷貴州斷事至則兼署郡邑篆聲績復自裒然擢雲南提舉甫及期遂掛冠廷楫厯官五邑以名義自持性孝友甫七嵗父槐東公没於齊聞訃哀踊識者異之性好書晚慕趙特峰家學假所纂之書錄之至㤀年云何鏡山集運判林龍峰先生同學派陳氏儲秀撰公傳畧曰東山林公龍峰余少慕其學而公已登仕矣壬辰始得會公京邸見其于于然瞿瞿然若無足甚異于人及叩其論吐領其緒餘則皆於虚齋易學為獨得其深三為儒官而志不懈一任鹽職輒以沙城之事乞歸甘心寒氈之薄而不能一日茍安於利賄之地公之志誠有所不為也而其不能以大有所為者非固薄夫富貴功名而不為也葢欲以道徳處於富貴功名之間故其進也無所求進而知有所重也其退也無所利退而不忘於所守也顧未能大有作為而竟其所學然以身而不失乎出處禮義之中而足以興頑起懦于時進無所媚以求用退而不失義於其鄉公之學誠為有臻于實用矣運判林龍峰先生同林同字宜正晉江人自言初受學李雁山雍方知趨向既𨽻鄉校從蔡虚齋學始知本原鄉後進若洪新齋陳訒菴林六川陳見吾皆師之𢎞治十四年領鄉薦授樂陵教諭丁外艱服除補丹徒復丁内艱服除補萬載擢金華教授所至以平生所傳習者為諸生講明午前生員午後俊秀早晚有常寒暑不倦其于廟廡神案必致清潔祭祀必極其誠巡按唐龍學使邵銳大加嘆賞邵出視學同率諸生迎見長揖不跪邵甚喜之召諸生進講則文義敷暢知其勤于訓諭既遷教授臨别嘆曰如公真徳浮于位也典試湖廣陜西所得悉知名士陞兩浙運判清公自守不刻不濫商竈皆悦嘗觧鹽税至太倉除兊邊外積羨千餘吏謂例屬解官同不納盡白貯部帑内閣張孚敬家處海上亦竈籍也海上士大夫懼海賊時至共言孚敬議即瀕海一帯築沙城二十里駕言灶丁沙地摧崩宜築城為衛者張以告浙省當事諸公莫不唯唯運使問同同曰築沙城士大夫欲之若灶丁者未嘗欲也費且不貲奈何專之於是立案堂下案具二紙或願或否令各畫紙已而無一畫願者遂報罷于御史會張亦罷相御史如同言居兩月張復召入御史大悔遂劾落同官乃張竟不行御史言而同乞歸矣同弱不勝衣而内養充完節概健勁呐不出口而講論道徳性命極中肯綮里居薄田自給課兒孫讀書約以義方搆祠堂脩譜牒閭閈有鬭者質以一言而解時與野老相聚談民風農事卒年八十六所著有正學䝉引龍峰遺集龍峰其别號也􅃇郡志書新郡志委閩道南源推官易愧虛先生時中學派按愧虚先生之學確守文莊榘矱誠奉一先生之言者及門王公遵巖時稱髙弟世有疵議者謂公亦雜於良知之㫖考公去虛齋先生未逺如淨峰次崕諸先正公皆與往復辨論其撰紫峰行狀敘述蔡氏淵源亦無軼師門宗㫖至同時如吕涇野魏莊渠諸賢公俱與造膝相從致書願見皆欲證其平昔所聞以為端的曽與莊渠書曰自得見君子以來廓若發矇始知正學之有所在而此生之幾於虛過奉以周旋時有警省不敢喪己於流俗之中溺志於技藝之末耳夫涇野莊渠皆彼時論學所與為正宗者也公之心折如此豈如龍溪諸賢専言超躐徑悟者大决藩籬而不返者哉附先生於易氏之門者見鄉邦典型未逺緒言派别尚有可稽云推官易愧虚先生時中易時中字嘉會號愧虚晉江人初從蔡文莊學厠於末席文莊方講知言養氣之章時中舉以詰質酬應有條理文莊首頷之年四十舉鄉試已蔚然為碩儒授東流縣教諭隨材𨗳接為諸生開說諄悉邑人御史宋邦輔强直廢居條十二美贈之自謂無愧辭陞夏津知縣邑故寡訟時中曰吾至將多日坐堂上屏𨽻偃扑民有事具來吐實還以曲直鞭贖都弛重者撻遣而已皆爭來言訟遂多矣齊東故習州縣吏事中丞御史監司奔伏如輿臺時中雍容跪起用下士事上大夫禮有御史作威輒忿詬曰易某侮我或以謂時中時中曰以禮事上為恭非禮侮也御史自倒其恭侮吾不誤也吏部召試臺諫以年自實不就除順天府推官都御史胡守中不法下獄有㫖推勘時中窮竟之有為胡釋憾者謀中以他事時中方念母遂乞終養歸夏津人繪像祠之林比部瓊實書其石以宋仙居令陳襄為比既終養道出山東夏津人聞舊邑公還牽擕數舍迎舟曳挽羣持棗栗脩脯以獻歡聲載兩涘至别有哭失聲者時金陵王公以旂以中丞赴留臺聯舟河中為之嗟嘆賦詩有斯民信是同三代循吏元非拂衆情之句至家築室奉母母年九十一而終時中七十矣毁不勝䘮宗黨稱孝焉時中形癯神清温恭而莊和氣溢於靣目語不華蔓無悅人之容而有浸漸醉人之益無驚世之論而有篤近扶世之憂一見知其有道君子也時中學専一家不務該泛間語王慎中曰某以羸疾不得致力於書甚恨孤陋時中誠多疾其不務博要以修質反約為功殆以㣲辭訓其徒歟閩書王遵巖撰行狀主事尤見洲先生麒尤麒字國楨别號見洲晉江人少有大志篤學力行初受業易愧虛先生之門領鄉薦就選山東武城縣尹治當孔道流移轉徙幾不可為麒至問民疾苦條罷不經之費與民休息抑豪强治巨猾一時善良頼以保全折獄多平反每事惟存大體不務苛細與今所稱能吏善逢迎上官意者不侔矣以治行優異行取北上圖書數篋選授戸部四川司主事赴官卒清源文獻閩書郡守田南山先生學派按何公鏡山為田氏族譜序慨採輯志乗者多湮没俊彦特標出數公冀後之考論者有所據依田南山先生其一也今尋訪學派附後并錄何公撰譜序入備考内使後人知公闡潛表幽之㣲㫖云郡守田南山先生嵓田嵓字景瞻號南山晉江人生而俊穎不凡嘗與顧新山讀書城南精舍精思黙契深造獨詣人多有不能及者時蔡虛齋倡道東南嵓授易最早成化丙午領鄉薦明年上春官落第卒業成均司業劉震䆳於易者試其文驚曰學有淵源文以理勝易其深乎命諸子弟師事之一時聞人如徐翰林穆宋都憲晃相與切劘學益宏肆名重京師登𢎞治六年進士第得賜告歸省與弟均州君崑講學於資夀寺正以率物因材施教凡及門者皆有造泉士多爭師之初試南京戸部主事𣙜揚州北闗以廉謹著擢南京吏部騐封郎中尋陞湖廣寳慶知府岷藩校卒獷悍嵓馭之以法戢戢斂畏嵗大饑發廩施粥全活者衆楚地多間曠嵓發金鄰郡糴麥數千斛教民樹藝麥秋至民相語曰生我者田父也以親老乞歸養事父母愉婉篤至晚復不喜紛華築室城北與歐陽石室相望鑿池植柳靜坐終日息機養氣如禪定者鄭司馬山齋嘗謂巡按聶君曰吾榜中求道徳文章正氣人物如田南山何可多得其為名流推服如此在林下二十八載徐給事文􅄎等咸疏其行義於朝屢徵不起嘉靖戊午奉詔進階亞中大夫江南王郡守士俊竪善俗華表以風鄉人云顧新山集郡守林羅峰先生珹林珹字時獻號羅峰晉江人世家陳江之塢為人重厚樸茂言若不能出口而敏慧内通於書獨善悟初從虛齋髙弟田南山受易學有聲儒林虛齋器之曰吾泉後進其在斯乎登𢎞治丙辰進士試政兵部乞歸侍養後就銓授寜國府推官政稱平恕一日忽心動已而果得父坦夷翁訃人謂誠孝所感服除作堂居第之東扁曰萱室意終事母母不悦曰人子之孝親顯親揚名而已若父未封而没奚孝珹乃赴銓補温州推官旋丁内艱服除銓部以寜國之民思之也復予寜國政成入為戸部主事轉員外郎時有宗戚奪民田搆訟二十年不决部使者莫任珹奉命即訊歸其田於民還奏稱㫖晉陜西司郎中出知江西饒州府適姚源兵戈之後生理凋悴公私廢弛珹曰今日之治在徳不在刑去煩苛崇寛大恤疲困日夜拊循其民而噢休之加意學校時以徳業課諸生差其賢否而施勸懲士益勵進正徳己卯宸濠叛宣言過饒士民洶洶欲遁去珹曰彼以虛聲喝我也無恐戒所部團練義勇嚴備時偽檄交至間諜踵於郡邑弗為動已而賊竟向九江南京不犯饒陽會御史王守仁檄至郡提兵赴難克復藩城奏㨗有金綺之賞旋有逹官干以私弗可遂為中傷去官無慍色至家杜門不入城市晚移家郡城之東南作羅峰書舍於宅第之東以圖書杖屨侍老珹深沉有度喜慍不形端坐竟日無惰容親朋羣聚不聞嘲謔之語性孝友奉身甚薄樂周人之急厯宦二十年所至留澤惠去有遺愛無赫赫之名去後民常見思獨立無朋任真自遂或以此取尤置之不校惟相知久處者乃知其忠厚正直可方古君子云林次崖先生撰本傳閩中理學淵源考卷六十一
