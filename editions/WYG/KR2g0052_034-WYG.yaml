body:
  text: 閩中理學淵源考卷三十四廣平府知府李清馥撰莆陽林氏家世學派按林氏九牧著於唐室至宋季積仁之後為矩軒公應成師友於黄氏績林貞肅又言矩軒松湖親事潘瓜山陳復齋傳考亭之學與本傳稍異父子祖孫相繼衍東湖仰止之傳歴元代其孫子泉氏以辨子木氏以順講明正學不衰入明復聨世其美風雲景從玉井子木二派亦有起者獨瑞安州慎齋之裔特盛其詳載明代林氏家學焉宗正林矩軒先生應成林應成字汝夫號矩軒莆田人唐邵州公蘊之後宋兩請進士得之公之子嚴重平粹嘗受學於黄績又親事潘柄陳宓更友其子仲元循仰止規約續講東湖得文公淵源之懿邃見卓識為一時道學推宗咸淳中與子棟同登第歴官宗正寺簿宣撫司機宜宋亡不仕年七十二卒明裔孫刑部尚書諡貞肅俊贊曰莆興道學艾軒始之復齋繼之復齋瓜山偕事文公公事二公獲聞文公咸淳之間父子進士不利于施乃見其志東湖講道戢景逃虛一時相推則有四如文公過吾家題曰門對小壺山樓接尊經閣四時趣興清萬代詩書樂斷墨猶存相傳公逮事焉今考文公卒慶元庚申去公咸淳辛未登第尚六十年豈題述在公祖貢元父兩請時耶林見素集撰宗正寺簿公贊邑令林松湖先生棟林棟字用可號松湖應成長子父子師事潘瓜山陳復齋講道東湖最後棟又事黄氏績友其子仲元與父同登咸淳辛未進士歴知同安縣事有廉直高古之聲慨宋社云屋托興迷途尋焦光舊隱之處講明道學以淑諸人文公之澤注東湖而演迤以盛棟父子達之也裔孫俊贊曰公事陳潘又事于黄父子師友金玉其章建水有泚日遠彌長瀦之東湖臨視泱泱孰利于涉公也其航載遡之源載潄之芳有開道先永裔之慶林見素集撰同安公贊州守林愼齋先生岡孫林岡孫字于高號愼齋棟仲子文公講道東湖復齋瓜山傳其學岡孫之祖若父逮事焉四如與矩軒續東湖之講岡孫偕伯兄教授于野又逮事焉傳介父弟山長子泉同知子木父子兄弟四進士退而益修文公之學型治所就世林門文章世林筆位遇雖不逮關西而物品殆𩔖岡孫終瑞安州知州事狀遺失所附見與子木並廉名明裔孫俊贊曰漢有荀陳宋有胡蔡建陽大成儒宗允賴紫氣停焰脈焉如帯孰引而長以滀以大業維經承巧乃㝠㑹三葉弗辰爰有遺愛綠槐䕃庭久而未艾星流日翔碑板光怪林見素集撰知州公贊山長林玉井先生以辨林以辨字子泉號玉井父栖贈曲陶郡伯以辨通易書春秋尤善說詩皇慶中詔以科目取士以辨不茍求合究心程朱之學福泉之士爭聘為師云郡志閩書黄德遠先生績學派按德遠先生從遊朱門高弟同時學者如長樂趙公以夫諸賢皆相與上下議論至其子四如先生又勵志前修能衍其家學云黄德遠先生績黄績字德遠莆田人滔之裔兄縝寳慶二年進士績少凝重稍長慨然有志求道始游淮浙遍參諸老中年還里聞陳師復潘瓜山得朱子之學于黄勉齋遂師事之集同志十餘人于陳氏仰止堂旬日一講及師復瓜山繼卒遂築東湖書堂請田于官春秋祀焉聚講一如平時向之同門友皆於績質正矣先是郡守楊棟即學宮建尊徳堂以處劉壽翁彌邵劉卒無敢居之者至是邦人推績繼之涵江書院始賜額又以績兼其山長晚聞趙以夫作易通與之上下其議論以夫稱為益友年七十一卒前夕有星隕于書樓之西是日又大雷雨衆皆驚異葢績雖布衣為鄉先生三十年門人著籙牒以數十百計郡邑守令咸加敬禮兄弟皆與劉克莊善克莊目兄曰愛友績曰畏友績有齋名獨不懼克莊為記生平不喜作韻語偶有感興亦得風人之趣著有四書遺說等書子仲元閩書莆陽文獻莆邑志推官鄭帝臣先生獻翁鄭獻翁字帝臣莆田人伯玉裔孫少從鄉先生黄績學第咸淳初進士終漳州推官宋亡至元不仕方是時前輩舊徳多已淪謝後生頗染習俗翁獨以所學傳諸人故家子弟猶賴之不墜其業顧長卿兄弟皆出其門復以績之子仲元及其徒林應承倡仰止之學續東湖之祀鬻田數十畝為春秋釋奠費年七十餘終鄭彝白先生鉞鄭鉞一名少偉字彝白號舒堂莆田人露裔咸淳十年特奏名與黄仲元郭隚俱閩中之望陳忠肅公文龍守興化軍鉞其門客也記忠肅遺事其言痛憤激烈至元不仕嘗與陳子修讐校通志畧盡復夾漈聨比詮次之舊詳見陳旅傳又著孔子年譜仲元序之謂是譜首以陬大夫二事壓卷前書所未有謂儀封人請見為由魯適衛時謂魯公問政及答季康子數問皆歸魯以來事此見又確謂夫子未嘗師郯子謂行乎季孫三月不違斯言非知夫子者此論又高所著有雲我文集亦仲元為序莆陽文獻縣志黄四如先生仲元黄仲元字善甫號四如績之子莆田人少刻意周程張朱呂眞魏及父所傳潘柄陳宓之書以其餘力抄唐宋名文二百餘家文學為一時推重咸淳七年中省闈第五廷對以直言忤時宰賜同進士出身調監瑞安府比較務需次食貧陳忠肅文龍延仲元於二劉祠堂一月兩講為學者師九年捧檄考𩔖試歸過劍州時江萬頃為劍州守留之郡齋未幾萬頃兄萬里招致芝山十年請假歸省明年德祐改元始之官守相陳山泉屈致幕下深喜得人又明年春端明陸秀夫至自平江偶同邸舍一見褒歎飲食必俱炙燭對酌劇談達曙及聞杭陷挑包辭歸資送仲元又留行槖夏五趣仲元赴行都充益王府撰述官兼處置使司幹辦公事景炎元年改刑工部架閣以通直郎陞武學諭遂轉朝奉郎國子監簿兼福建路招捕使司都參議官仲元雖受知諸公屢膺超擢然未嘗供一日職升斗不批券歴曰斯時何時榖而耻也秀夫拜樞使將有異除仲元力辭母老崖山破秀夫盡驅妻子赴海仲元為詩哭之遂更名淵字天叟怡然窮居深入理奥學文必檀弓榖梁學詩必三百篇陶韋柳州推廣先志凡其口講心授莫非仰止傳習之懿而尤嚴東湖之祠晨必謁朔望必參二仲釋菜暇則課守者洒掃風雨則視其葢障雖老不少廢年八十二卒仲元說經間與先儒異同其為文亦𩔖艱深至於奇古處殆不可句云有四書講稿等書藏于家明宋濂歐陽德羅洪先序其集閩書莆邑志莆陽文獻林淑恭先生立之學派考仙遊志乘如林公立之林公磻游公彬王公夢谼皆一時經生家所頌法者也原其所立皆以道徳學術足為師表今錄其派繫可考者著于篇林淑恭先生立之林立之字淑恭仙遊人通六經以禮記三魁鄉書聚徒縣庠如日選丘獻林從周林志之林灝李夢龍蘇國蘭黄君任洪天賦諸先達皆出其門仙遊經學之盛自立之始司直丘渭夫先生獻丘獻字渭夫仙遊人少嗜讀書尤明周禮由鄉舉補太學寳慶二年進士調昭慶軍節度掌書再調江東提刑司幹官諸公交薦其賢除太學錄尋除大理寺司直為人長厚與同列無間言鄉人葉大有尤敬重之官至奉議郎終通判洪先生天賦洪天賦仙遊人祖中元祐六年進士歴河南府少尹國子司業勇退不仕天賦㓜敏悟通六經應童子科登寳慶二年進士歴知陽江古田連江三縣通判循州聽訟不施鞭朴諄諭理道民胥向化以循良稱從弟處厚閩書仙遊志附缺傳林日選嘉定七年進士林從周磻從姪寳慶二年進士林志之磻弟紹定二年進士林灝李夢龍嘉定七年進士仙遊志入儒林傳蘓國蘭欽之孫姪孫總龜寳慶二年進士黄君任端平二年進士縣尉林豈􅈄先生磻學派按仙遊志列先生在儒林又傳稱其通習五經然考藝文於經術未見有發明者所著有典故鈎元之書行于世縣尉林豈􅈄先生磻林磻字豈􅈄嘉定十三年登進士第少負雋聲從遊者衆王邁嘗師事之官止海陽縣尉有典故鉤元六十卷行於世主簿游淑文先生彬學派按先生本傳稱先生工於詩賦又朱氏經義考載先生有讀易四卷興化志載端平中特奏名主簿游淑文先生彬游彬字淑文仙遊人家貧苦學工詞賦有聲一時名士如林澧特延為館賓葉棠王邁皆與為友陳立伯塤伯傅澄皆師事之端明二年特奏名終眞陽主簿仙遊志附缺傳陳立伯寳慶二年進士寵之孫次升曾姪孫陳塤伯次升五世孫傅澄張紹卿先生應辰學派按先生門徒鄭氏起東在明初尚存則公亦宋元間遺徳也餘俟考張紹卿先生應辰張應辰字紹卿徳化人該通經史一時名流黄霆發徐雷開林汝作鄭起東皆出其門有禮記集解鄭先生起東鄭起東字子震徳化人明初入太學為文人明經鄉校師範蔚然黄先生霆發黄霆發徳化人嘉定七年進士徐先生雷開徐雷開徳化人寳慶二年進士林先生汝作林汝作徳化人淳祐七年進士閩中理學淵源考卷三十四
