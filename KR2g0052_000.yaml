body:
  text: 閩中理學淵源考傳記類三總録之屬提要臣等謹案閩中理學淵源考九十二卷國朝李清馥撰清馥字根侯安溪人大學士光地之孫以光地廢授兵部員外郎官至廣平府知府是編本曰閩中師友淵源考故序文凡例尚稱舊名此本題理學淵源考蓋後來所改序稱乾隆己巳而每篇小序所題年月多在己巳之後蓋序作於草創之時成編以後復有所增入也宋儒講學盛于二程其門人遊楊吕謝號為髙足而楊時一派由李侗而及朱子轉輾授受多在閩中故清馥所述斷自楊時而分别支流下迄明末凡其派傳幾人某人又分為某𣲖四五百年之中尋端竟委若昭穆譜牒秩然有序其中家學相承以及友而不師者亦皆並列以明其學所自來其例每人各為小傳傳之末各注所據之書併以語録文集有關論學之語摘録於後考據頗為詳核其例于敗名墮節貽玷門墻者則削除不載間有純駁互見者則棄短録長如廖剛傳中刪其初附和議一事胡宏傳中但敘不持生母服為右正言章厦所劾而不詳載其由蓋為賢者諱古義則然不盡出鄉曲之私也清馥父鍾倫早夭清馥幼侍其祖光地多聞緒論故作是編一稟家訓尚有典型雖意崇桑梓而無講學家門户異同之見云乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀閩中理學淵源考原序清馥自雍正戊申歲輯訂有志學録內外篇因詳考朱子之學薈萃集成負荷統緒其平生師友多在閩中屢欲參稽編録而未暇也乾隆辛酉年冬效職天雄適因公赴省道經博野謁副憲元孚尹公公即自述所學慨然念國朝魏環溪湯睢陽陸當湖及先文貞公四先生欲有待論列於朝寧因言濓洛關閩五子之書遞衍八百年來家習户誦生於其鄉者或親炙或私淑其𣲖别相續源流更易為尋遡傾聆之下與余夙心所擬者頗合歸署後數月得病告休養疴少暇重尋舊簏得伊洛淵源録萬氏儒林宗派宋氏考亭淵源録諸編録出次第訂之目曰閩中師友淵源考曰淵源者是書以龜山載道南來羅李遞傳集成於朱而上溯周程以傳千載不傳之祕者也故以龜山冠冕編首各從𣲖繫遞列相承不以世次論其先後而以師承訂其旨歸也唐初歐陽四門與翁林諸賢勃興為開閩人文之始彼時師友未廣也故列未及焉宋初海濱四先生與安定胡氏諸公同時倡學有魯一變之風然派别未著也故另附本篇之後是道南者賡續雖名為衍緒而倡作則實為開先非獨閩省一方所賴而實千古正學之宗也由元閲明成化間蔡虛齋陳剩夫周翠渠諸賢後先講學起而倡述之經學稱一時之盛中明以後學術漓雜迄於季造決裂判散使後生晚出不復見先正本來之懿先公感焉嘗論吾閩之學篤師承謹訓詁終身不敢背其師説以為近於漢儒傳經遺意公餘講切每持此論以救末學之偏其意逺矣清馥竊謂近代異同之習勝者窮經實踐之功微也今欲卑訓詁而讀經蔑師資而求道猶航斷港絶潢以望至於海也不亦難哉自洙泗以來羣哲相承雖衆論紛紜莫不以至聖為折中之準濓洛以後英賢日懋雖支流各異莫不以紫陽為論學之宗嘗考紫陽之書明訓詁溯師傳力行一生使後人知聖功由下學以上達者其效於今益光矣今曰不問師承不稽傳注目空前輩簧惑後人是宜賢者之所為戒譬猶守家之子忘厥髙曽矩矱其可乎吾鄉先正素尚朴學自唐宋迄元明傳經説理之盛溯厥淵源粹然者不少而所以奮起作興者皆耆賢宿學啓迪之功為多考其旨歸大都崇奬典型共趨敦厚師傳友授飭躬厲行是閩中習尚前輩述之屢矣今嵗律屢更不揣固陋滙集諸家之傳綜其要者而纂録焉雖厯代學術不無升降盛衰醇疵互異然參互考訂庶有以為知人論世之資徵文考獻之助獨念大雅日逺載籍寖湮耳目所及挂一漏百旁搜逺紹是在來賢今聖天子崇重正學丕承列聖夀考作人之效海內真儒輩出尚論閩中國朝師友者更當詳徴博採以上溯道南之緒而闡發濓洛之傳猶有望於後之君子乾隆十四年己巳六月二十七日癸卯閬里後學李清馥謹序凡例一道南原委諸賢本傳皆稱先生稱公閩書則從史例皆稱名今斯録於諸儒宗師席并近代諸耆德前輩稱先生稱公至各門徒則槩稱名以别之一是編目曰師友淵源則凡平昔所與諸儒往返論辨志氣相合有交友一門私淑一門皆附之學派中非必盡及門親炙也一後世史家列傳中間有載本人纂述一兩篇者是欲存其立言之旨近世理學宗傳明儒學案諸編其著述大略皆附之傳後倣舊也兹編規製倣之前人而立教宗旨則恪遵庭訓所聞以奉一先生之言云覽者若以此斷斷於同異之辨則非編録此書之意也一是編原欲録其師友派别淵源故諸賢有傳習源流者皆録於學派其無可考者闕略尚多不得不有所遺也一閩中諸公箋注經學者蔣氏垣黃氏海於篇末載之今各於本傳附見不另别一門目但諸公箋注儘多亦不無闕略焉一評論諸賢在宋則以紫陽西山諸大儒為據元明以降兼採近世儒宗諸賢而謹遵庭訓所聞者折衷焉一睢州湯文正公纂洛學編其事實俱本原傳使後人知所由來得以定其是非此祖述伊洛淵源録舊例也今所録諸傳悉本原傳存其舊名或有從别本增添者亦注增添原名以便考證不敢妄加增入一閩中儒學開先始于唐歐陽四門至宋海濱四先生亦為倡學之始至龜山楊文靖公及中州二程先生之門仔肩道脈千聖心傳繫焉故今諸儒學派之編斷自有宋列龜山為首蓋以師承定其旨歸不以世次論其先後也至唐歐陽先生為一代開創之始余另約選登之閩學志略焉一學派中前已載入諸賢門徒者後别為門徒則單載其名字姓氏注云已見某氏門徒不重録一學派一門其派衍遺漏尚多各郡遺書未能遍得尚有待增入一朱子門人有無事實可考者照儀封道南原委例亦附姓名閭里於後一增家世學𣲖及交友一門亦本舊例也一近世論學大都分别門戶異同之論究非衆言淆亂折衷于聖之歸語載四科之目逸民數章亦備人品學術差等孟氏論伯夷伊尹栁下惠而願學孔子此方是志學論道準的是編倣莆陽宋氏考亭淵源録遺意凡有師承派别者俱各敘出以見求師問道醇疵互著考同較異論世知人至夫各家派别亦略以類相附覽者當自得之一宋代儒宗世衍家學者不少故於諸儒學派中特列其例以徵其盛元明以來一家之學遞衍其緒如武彛之胡崇安之劉麻沙之蔡者亦僅見矣今於明代諸儒世學擇其嫓美前修者亦多録焉一元代志乘甚略故於遞述者無從稽訪今於元史之外搜之續宏簡録元文類八閩通志閩省各郡志各邑志閩書熊勿軒集吳聞過集吳草廬集陳石堂集清源文獻道南源委道南統緒蔣氏八閩理學源流朱氏經義考尚愧疏漏限于聞見無如何也一是録凡有玷於師友門牆者槩未敢登入是書欲録淵源之的不得不有所遺也一諸學派就萬氏季野儒林宗派録出參之蔣氏垣八閩理學源流黃氏海道南統緒何氏清源文獻其本傳本之閩書參之道南源委莆陽文獻越章録閩省通志各郡縣志伊洛淵源録宏簡録名山藏黃氏日抄考亭淵源録理學宗傳理學備考明儒學案吳氏諸儒述槩及厯代史書并行狀志銘諸家文集更相考證一國朝正學昌明儒宗相望閩中學派俟另録編輯至博徵文獻尚有望於名賢焉
