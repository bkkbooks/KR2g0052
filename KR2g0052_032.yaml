body:
  text: 閩中理學淵源考卷三十二廣平府知府李清馥撰清漳陳氏家世學派按廉獻陳氏出東溪高公之門亦以直節著聲者曾知制誥以秦檜故不拜旋外補乞歸講學於漸山厥後孫植學於世父安卿先生格以節見一門忠孝儒宗其淵源卓矣廉獻陳和仲先生景肅陳景肅字和仲漳浦人唐將軍元光裔孫也師事高登有學行嘗同秦檜出使燕趙歸表為祈請使不拜歸講學於仙人峯下登紹興進士令仙遊旌孝義𠞰宿盜多美政尋提舉湖南除知南恩州詔入知制詔誥以秦檜故不拜出知台湖等州以題詠多譏刺檜黨惡之乞歸與門人楊仕訓吳大成等講學漸山檜死議均役復知制詔誥致仕時已八十餘矣適南恩州叛服不常擇使宣慰朝議非景肅不可持節往嶺南嶺南遂平卒贈光祿大夫資政殿大學士諡廉獻所著有拮翠集若干卷有孫曰植登淳祐進士格為海濱監簿俱見家學進士陳夢立先生植以下家學陳夢立名植以字行漳浦人公幼學於世父安卿十入以祖澤補太學生調龍溪令轉漳州司理淳祐四年登進士提督嶺南海路兵馬帝昺浮海公提嶺海舟見事危斷維出港自以六舟泊海嶺收亡命馳檄諸閩圖立宋後聞張公世傑覆舟元人索捕急遂變姓名匿于大芹白華九侯間臨終命葬海濱南望崖山弟格為舟監簿從容殉節忠義形於六詠今漳浦人並祀之閩書源道南委楊國光先生耿以下學派楊耿字國光紹興中在太學與吳大成鄭柔薛京齊名秦檜柄國耿等相率乞歸從陳景肅講學漸山石屏書院闢精一堂於修竹里講明經術從子士訓士謙皆從之所著詩多寓言而忠愛之意宛然如見吳子集先生大成吳大成字子集漳浦人聞陳景肅師事高登學有淵源往受業焉嘗遊太學論舊相張浚清忠與秦檜忤及廷對語多侵時宰檜益惡之落第自以終不能為檜屈歸隱漸山石榴洞講明正學乾道中奉檄湖湘往還京浙著有梅月詩集又有筆義經疑傳稿藏于家薛宗汴先生京薛京字宗汴與鄭柔俱師事陳景肅肅與秦檜忤辭知台州京亦乞歸省檜以其為景肅黨銜之歸與吳鄭諸楊講學漸山九侯間賦詩自樂終檜之世屏迹不仕建陽熊氏家世學派按熊氏世家建陽鰲峯之陽自雨錢公衮入閩卜宅於此子孫世業於儒詩書禮樂之澤相踵其家學得於朱蔡之傳為多今考勿軒集中族系所及者録之餘宗派莫詳尚俟考訂再勿軒先生生于宋季猶及朱子之派系私淑咸淳十年登第宋社既屋遂退隱雲谷創鰲峯書院扶樹教道講學著書其傳習門人學派多在元初今將本傳録於本學派以存碩果之義云爾處士熊意誠先生知至熊知至字意誠建陽人衮四世孫博學工詩天聖中五舉不第歸隱鰲峯有鰲峯隱人集劉文簡贊之曰鄉言善士世號儒宗止而不第歸隱鰲峰研精蠧簡彈拊絲桐愧無冰鑑誰識臥龍閩書縣令熊端操先生節熊節字端操建陽人朱子門人甫十歲讀易日誦二卦即知問難至通曉而後止慶元己未廷對值偽學之禁以納諫行仁求賢對知舉黃由以其不迎合時好特置前列且為奏御仕終通直郎知福州閩清縣著性理羣書二十三卷中庸解三卷知仁堂稿十卷處士熊竹谷先生慶胄熊慶胄字竹谷建陽人少受業於蔡節齋與徐進齋蔡覺軒詹敬齋翁思齋為同門友後遊真西山及劉靜齋之門所著有三禮通義春秋約説中興三朝通略平生用力最久又有學庸緒言易傳集傳小紀史學提綱悉燬丙子兵難其雜著有敬思齋直方齋稿兵後壁藏僅存耳慶胄少以禮記決科於禮學尤精博嘗謂國家設科當以儀禮不當以禮記其著通義一書蓋本朱文公義例而春秋約説亦本文公所論大旨丞相遊克齋左史牟存齋皆欲以慶胄經學薦聞貽書辭不就慶胄壯歲即棄科舉潛心問學不求知聞所造既深自任之意彌篤性極孝友於族姻鄉黨情義尤厚歲收不上三百石捐其半創敬思齋以訓後進立孝永莊以賑飢貧人士有嚮學者諄諄誨誘冠昏喪祭必謹於古禮云熊勿齋撰竹谷文集序備考熊勿齋書竹谷文集跋曰右從伯父竹谷先生熊公所作公平生所為文極多其雜著有敬思齋小稿則居竹谷時作也直方齋小稿則居平山時作也此二卷題曰直方齋小稿蓋兵後壁藏僅有此耳真所謂存什一於千百者歟公平生精力於三禮通義春秋約説中興三朝通略用功最久又有大學中庸緒言易經集傳采詩小紀史學提綱等編悉燬於丙子兵難三朝通略蓋欲續從祖左史公九朝通略以成一家言庸齋趙公在史館時嘗以上聞有旨下本部抄寫且薦公由布衣入館同預史事公力辭不就公少以禮記決科於禮學尤精博嘗謂國家設科當以儀禮不當以禮記其著通義一書蓋本文公先生義例而春秋約説亦本文公所論大旨此二書於學者蓋不無小補也丞相克齋遊公左史存齋牟公皆欲以公經學薦聞公又貽書辭不就蓋公平生潛心問學不求知聞蚤受學於節齋蔡先生與進齋徐公覺軒蔡公敬齋詹公思齋翁公為同門友所造既深自任之意彌篤後登西山真先生靜齋劉先生之門尤見器重壯歲即棄科舉一意通經博史之學惜乎書藁甫脫而公竟抱志以沒可勝惜哉嗚呼公之學進雖不得用於其時退猶足以善於其鄉公奉先極其孝敬待兄弟極其友愛至於族姻鄉黨情義尤篤歲收不上三百石捐其半創敬思齋以訓後進立孝永莊以賑飢貧後居平山甥館歲必一歸故居歸必會集族中長稚宴飲餽遺渠渠欵欵各盡其歡見後進有嚮學者必諄諄誨誘不倦蓋忠厚愷弟人也最謹於禮節冠昏喪祭必用古禮舊居竹谷與雲谷相望才能學行聲稱甚著遠方士友登其門必竭力館榖之雖屢空不顧也禾年六歲就傅于敬思齋已蒙公器許今年久無聞壯志銷落重惟我族自始祖尚書郭門公於唐中和間由豫章入建詩書之澤四百年矣前輩凋落後進渺然未有甚於斯時者也公之學其誰能傳之公之志其孰能知之癸巳秋從弟敬歸自江東來相存問聚首旬日重整舊編相與感慨者良久重念甲戌侍族叔父復齋先生歸自行都因論公遺事憮然興念求所以嗣成公志者規模未就而復齋又沒矣時事日殊年運已往力不逮念又未知能成就二父之志乎否也并書此以識崇安翁氏家世學派按翁氏家崇安之白水鄉自濟可先生嘉祐間仕籍父子相繼皆以名臣顯厥後文章之彥斌斌輩出儒學忠節世為羽儀楊文靖公撰行簡先生墓志朱子撰蒙之先生墓志極表章其概今列其略著于篇朝奉翁濟可先生仲通翁仲通字濟可崇安人嘉祐二年進士為山陰尉疏水利遷鄞縣移武平令召赴闕求便養親改簽書興化軍通相地徙築人號太平陂後知黃巖縣濬河流民獲利丁內艱喪除以親不在遂不出卒贈銀青光祿大夫有子三人彥約彥深彥國按龜山楊文靖公撰彥約墓志云仲通先生以文行為東南儒宗學者咸尊師之仕至朝奉郎纍贈銀青光祿大夫通志龜山文集奉常翁行簡先生彥約翁彥約字行簡仲通長子天資頴悟絶人自幼學已能屬文既冠博總經傳尤深於禮學元豐末遊上庠銀青贈公外除造朝欲候彥約䇿名而後告老彥約以謂用是緩吾親歸休計非便也請以世祿之恩授中第銀青不許力請而後從已而兄弟更相推遜聞於朝事雖不行縉紳義之彥約既不第愈自奮勵術業愈加進建之舉進士者無慮五六十輩彥約再舉皆中首選從而受業者常數十百人元符二年應詔上格言二十篇政和二年擢進士第調汝州龍興尉改常州刑曹會江淮發運使入奏事上問所部人材首以彥約對驛召為詳定九域圖志編官纍遷太常博士與因修革禮遷奉議郎歲餘乞補外除提舉河北西路學事及階對建言朝廷更八行復試以文與立法初意異請俱與廷對以示詳行略文之意至河北薦拔人才訪問疾苦講求實邊制勝之䇿除知高郵軍郡當江淮孔道茶鹽私貿之禁最嚴顧有告者亟決之吏習故欲以枝辭蔓其獄彥約曰兩獄充斥若等尚恨少耶吏􅌓眙失對於是一郡知彥約以民為念吏不得倚法為姦歲大旱以禱祠積勞得疾或以尤之曰民蘇而吾病無憾矣疾亟乞休辛未報卒彥約性孝友遇人無賢否一以誠意延平陳公瓘晚居淮南見彥約喜語人曰翁奉常靜恪有謀使得志殆能濟物其為名流推重如此彥約為文精緻潤縟得作者之體尤長于詩有集十卷子挺抗挺另有傳少卿翁養源先生彥深翁彥深字養源登紹聖二年乙科調福州侯官簿宣和初遷右司員外郎入對極論讞獄之弊已而以弟彥國入臺引嫌改祕書少監請訪國朝以來諸儒論纂可傳者上之盜起睦州東南大震彥深言民有疾苦不得上聞宜下詔求直言則下情通而盜可弭又言羽書還至諸路騷然宜亟求忠臣義士列于諫垣其後賊平南軍凱旋即議北征復力言出師沮盟之害以書白宰相言與金人夾攻契丹非䇿召見除國子祭酒時蔡翛為禮部尚書譖彥深為元祐學彥深笑曰彼亦知有元祐學耶徙祕書監宦者梁師成提舉祕書省彥深以為不可納交熏腐以辱天子館閣不肯造謁未幾降兩官知濟南府改婺州召為太常少卿從幸揚州力陳維揚無險要宜蚤渡江以定基業歸老以卒所著有皇朝昭信録及文集各十五卷忠義列傳二卷唐史評一卷鍾離子自録一卷弟彥國見志乘待考子揆密州司士曹事亦以文行知名早卒孫蒙之監丞翁五峯先生挺翁挺字士特彥約子政和中用季父彥國恩補官調宜章尉改侯官簿朝臣交薦詔赴闕下所陳皆朝廷急務奏對移時徽宗喜曰何見卿晚改授少府監丞時相怒其不附已逐之遂不復出號五峰居士有集二十卷李忠定稱其文雄深雅健淵源浩博詩凌厲奮發絶去筆墨畦徑及卒劉子翬奠以文曰羅萬象於筆端煥丹青於胸臆閩書郡志寺丞翁子功先生蒙之翁蒙之字子功彥深孫以廕補官調常山尉紹興中趙忠簡鼎謫死喪過常山郡守章傑者惇諸孫怨鼎嘗治惇罪又希秦檜旨陽檄蒙之護其喪忽遺書蒙之以趙氏私為酒飲役夫宜亟捕置之法而陰喻使并搜鼎知舊往來書疏欲敗趙氏快私憾且以媚檜蒙之不可啖以利又不可復脅以威往反再三蒙之度傑意不可回或囑他吏則事有不可為者即密告趙氏使取文書悉焚之既搜無所得傑怒又廉知蒙之女弟適胡寅實當時草詔罪狀惇者益怒乃誣以他罪劾之會胡公弟寧為尚書郎具以其事白檜檜悟為傑所賣移蒙之蘭溪尉趙氏亦竟得無他而傑遂廢不復用孝宗即位近臣以其事聞嘉歎其節再三召監登聞鼓院尋復補外後以龔茂良論薦召為司農寺丞卒年五十郡志文集朱子浦城徐氏家世學派按宋史論宋自嘉定以來在相位者賢否不同故執政者各以其氣類而用之因其所就而後世得以考其人焉因列史彌遠史嵩之之腹心羽翼數人其論陳貴誼曾從龍鄭性之李性傳諸賢以為皆無所附麗而謂徐氏榮叟父子兄弟皆為名臣其不與權勢推移所立卓矣今列其家世學派著于篇文肅徐亢叔先生應龍徐應龍字亢叔浦城人纍調湖憲司簡法官與提刑盧彥德爭劫盜獄獄盜獲生改知高安縣呂祖儉以言事忤韓托胄謫死經紀其喪為文誄之有勸之避禍者應龍曰呂吾所敬緣此譴死無所恨遷知南恩州秩滿陳自強當國故與應龍同舍諭欲留之應龍不答丐雷州而去部使者交章上最召監行在都進奏院纍遷國子祭酒兼崇政殿説書天旱上言請烹桑𢎞羊乃雨除祕書監纍遷刑部尚書兼侍讀屢指陳時政一日讀吳起為卒吮疽事奏曰起卒如此故能得其死力今將軍得以賄遷專事掊剋安望濟乎理宗驚曰債帥之風猶未除耶宰相史彌遠聞而惡之改兼太子詹事力乞奉祠逮歸奏乞立皇子曰高宗謂太祖艱難得天下而子孫不得居天位遂以孝宗繼大統三傳至陛下皆太祖子孫今陛下當於太祖後擇人徙吏部尚書以煥章閣學士提舉嵩山崇福宮卒贈開府儀同三司諡文肅纍贈太師魏國公子榮叟清叟閩書文靖徐茂翁先生榮叟徐榮叟字茂翁與弟清叟同舉嘉定七年進士歷永康令以賑飢得民心召為太常博士兼崇政殿説書嘉熙中由左司諫拜左諫議大夫入對大略言內而京師楮幣不通物價倍長米運多阻粒食孔艱外而郡邑苛征橫斂無所不有嚴刑峻罪靡所不施甚者巨家武斷鄉閭豪宗侵凌民庶此皆民怨所由又言朝廷當以節義勵士大夫則緩急必無求生害仁之事遷權禮部尚書兼吏部拜端明殿學士簽書樞密院事淳祐二年參知政事李韶與宰相議不得求去榮叟發憤爭之不合因求俱去除資政殿大學士奉祠御書橘坡二大字賜之卒贈金紫光祿大夫諡文靖所著有緝熙講議諫垣存藁西掖代言南宮表箋橘坡雜著閩書建寧府志忠簡徐直翁先生清叟徐清叟字直翁調太平教授金人侵宣化制司令州禁采石渡清叟曰敵今未至奈何先自推赤子魚腹中守從之淮民得渡者三萬餘紹定初遷籍田令應詔抗章乞為濟王置後遷太常博士復請厚人倫以釋羣惑惜名器以示正義因人望以進人材蓋欲復濟王爵邑抑史彌遠恤典召用真德秀魏了翁也端平二年除殿中侍御史疏論三漸尤為痛激改太常少卿兼户部侍郎改工部除廣西經略福建安撫福州飢貸南劍常平米七千石招廣浙米詣諸州賑飢全活甚衆纍遷端明殿學士簽書樞密院事參知政事余玠專制全蜀理宗欲召還之未決清叟奏云陛下何不出不意徑召之且奏玠素失士心召之必不敢不來理宗遂召玠遣余晦代之制下清叟復奏晦素無行檢不堪重任乞收回成命不聽清叟乞罷政不許竟不押晦誥敕寶祐三年令民自實田畝清叟爭曰此秦法不可用如福建二廣湖北尤當少寬既而江浙民胥言不便理宗竟不果行尋以資政殿學士奉祠開慶初召提舉佑神觀兼侍讀出知泉州景定中致仕卒贈少師諡忠簡清叟與其父兄皆以品節相尚立朝風采著於班行之間獨其劾罷袁甫少貶於公論閩書進士張坎翁先生翰學派按福寧流派楊似之先生早從林艾軒講論自得洛學餘緒矣坎翁先生奮然特起與及門高余二公為一時師儒之表考坎翁登第在乾道初其時道南之派尚未遍訖厥後人文遞興宗朱子之學者巳著列邑逮宋末元初此邦學脈未艾賡續繼志遞有傳人其淵源遠矣哉進士張坎翁先生翰張翰字雲卿别號坎翁寧德人以學行為鄉先生高頤余復皆其門弟也登乾道二年進士居官涖民所至有聲致政歸田著觀過録三十四章閩書縣令高元齡先生頤高頤字元齡寧德人祖確嘗與陸遊為詩友稱善士頤經明行修從遊者幾千人以禮記魁鄉薦登慶元二年進士知永州東安縣居官臨民卓然有聲其學以大學中庸為宗治身行事一主誠實嘗曰吾身任大責重無天地生物之功而有其心無經國子民之位而有其志又曰學者學為聖賢非止讀書作文求仕進而已著雞窗叢覽百五十卷詩集傳解各三十卷詩文五百餘篇子伯塤嘗魁漕舉學行醇正有會萃古今事類二百卷集關洛諸公語為傳心直指十卷及一得録愚齋類藁等書檢討余子叔先生復余復字子叔寧德人少從張翰學精於周官紹興元年對䇿大廷光宗稱其直而不訐拔置第一賜之詩寧宗即位詔入史館兼實録檢討歸擇邑南佳勝辟園構軒觴咏其間著禮記類説左氏纂類福寧楊氏家世學派按楊似之先生早從艾軒林公夾漈鄭公講論厥後諸儒遞興確守紫陽遺緒希風伊雒而多淳厚篤實探討羣經其遷流異説者少風教所趨卓乎尚矣兹録楊氏之系著于篇朝請楊穆仲先生惇禮楊惇禮字穆仲舉進士調興國軍司法改陜彭泉宿四州教授轉太學録太學博士時與鄉人黃薦可林介卿並命有北鄉三博之語乞外出判秀州丐休建炎元年以司勳員外郎召以疾謝踰年再以監察御史召力辭得旨以朝請郎守本官致仕許在家言事時年未六十衆稱惇禮有三奇有田不買有官不做有子不蔭孫興宗楫提舉楊似之先生興宗楊興宗字似之少師鄭夾漈後從宦莆田執經林光朝舉進士調鉛山簿孝宗登極上封事末陳以守為攻之䇿有旨召赴都臺審察時湯思退主和議使御史尹穡要曰登對願無立異當以美職相處却之連書抵東府爭和議非便思退大怒孝宗嘉其志除武學博士既而陳俊卿舉充館職召試條對言兵冗切中時弊除祕書正字遷校書郎與林光朝同校文省殿擢鄭僑蔡幼學陳傅良時稱得人修四朝會要轉宣教郎擢尚書司勳郎論張説不當與趙汝愚同除拜不報又駁楊和王存中封爵太優堅不書勳忤虞相允文乞祠出守處州政甚有聲除知溫州以親嫌改嚴州除湖廣提舉有自觀文集朝散楊通老先生楫楊楫字通老剛介不茍合與楊方楊簡俱朱門高弟號三楊舉進士調莆田尉閩帥程叔達移縣括逃田楫歷疏不便忤帥意秩滿上府叔達怒曰尉格帥命乎楫徐條對無所屈罷去漕使林祈曰尉敢格帥大是奇事遂薦之纍官司農寺簿劄論進君子退小人奬廉靖之操絶奔競之風除國子博士轉少卿臺臣或干以私答曰臺省紀綱學者規矩當各守職無相侵越尋出知安慶移湖南提刑江西運判終朝散郎著奏議悅堂集進士黃由仲先生宙學派按泉南彼時陳休齋門徒為著公與休齋後先輩出公之徒亦有從文公學者至石氏起宗名迹尤卓然石與傅公竹隱深相交契一時師友皆為人物標凖訪録遺編不禁斂袵追述不置進士黃由仲先生宙黃宙字由仲晉江人乾道五年進士居鄉講授學者從之遊多名士右起宗其一也有論孟解詩文雜著藏于家舊郡志吏部石似之先生起宗石起宗字似之先同安人徙晉江乾道五年進士第二人由敕局刪定官召試館職條對時務辭義卓然上覽奏稱善除祕書省正字再遷權倉部郎官會當輪對上言君子小人之情狀與天下治亂安危之機又言妄啓外釁以開兵端不可不戒通判漳州知徽州除提舉浙西常平入為尚書吏部員外郎引對奏言德雖聖人所能躬修治非聖人所能獨致願詔大臣盡公任責破徇私偷惰之習又奏乞取仁宗洪範政鑒與敬天圖列置座右上嘉嘆久之命祕書省繕録以進後以考較類試卒于院按乾道五年南宮揭榜溫陵得人為盛新第先歸者五人王公龜齡時為泉守故事燕於黃堂王公酒半啜茶於忠獻堂持杯以勸即席贈詩曰四海英才入網羅清源龍虎姓名多經魁蘭省得人傑䇿射楓庭收甲科奎宿呈祥前未見緯星還舍首相過一杯忠獻堂中酒名節相期要不磨集中尚有贈第二人石察判詩末句試觀忠獻堂中像亦是當時第二人集中注云即起宗石公也讀此疑當時第二人似即今之榜眼否閩中理學淵源考卷三十二
