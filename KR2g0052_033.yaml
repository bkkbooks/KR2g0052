body:
  text: 閩中理學淵源考卷三十三廣平府知府李清馥撰文毅洪陽巖先生天錫學派按先生以開濟偉略為廟堂倚重同郡邱氏葵早志考亭之學遊先生之門者最久又同時有徐擇齋先生明叔者亦與公同學齊名考泉南九日山石刻舊題寶祐六年公嘗從徐公明叔梁公椿選呂公中方公澄孫王公廣翁同遊紀盛故梁呂方俱列之交友焉王廣翁未詳待考再按南軒門人蘇氏國台從孫三英亦登公與擇齋之門可知洪徐二公為一時典型物望宋季學派賴以維持淵源所漸盛矣文毅洪陽巖先生天錫洪天錫字君疇號陽巖晉江人寶慶二年進士授廣州司法歷知古田縣剖決無留按誅倚藩邸勢殺人者調通判建寧郡大水擅發常平倉賑之擢諸司糧料院拜監察御史兼崇政殿説書理宗寶祐間宦寺肆橫外閫朝紳多出門下廟堂不敢言天錫來自孤遠首疏以正心格君為説且曰臣職在憲府不惟不能奉承大臣風旨亦不敢奉承陛下風旨朝端耳目一時聳動次月囊封申劾宦官董宋臣外戚謝堂知慶元府厲文翁不法狀疏上理宗力護之令大臣吳燧宣諭再三天錫力爭謂貴幸作姦犯科根柢蟠固異日勢焰愈張雖欲活之不可得已理宗俾天錫易疏欲自戒飭之天錫言自古姦人外雖憑怙心未嘗不畏人主之知茍知之而止戒飭則憑怙愈張反不若未知之為愈章五上出關待罪有詔謝堂厲文翁已改命宋臣續處天錫言臣義不與宋臣共留會天雨土天錫奏其異為蒙為不辨君子小人所致又言今蜀中地震浙閩大水上下困窮遠近怨疾獨貴戚巨閹安享富貴不知陛下能獨與數十人者共天下乎值宋臣復奪民田天錫申劾之上猶力護天錫又言修內司祗供繕修比年動稱御前故凡姦贓老吏積捕凶渠皆竄名其間有司不得舉首小民展轉受害恐使後日史臣書曰內司之橫自今日始不報疏至六七上最後請還御史印謂朝廷輕給舍臺諫百司庶府而獨重北司倉卒之際臣實懼焉言雖不果行然終帝之世閹人不至大竊威福蓋天錫有力云御筆改大理少卿遷太常皆不拜明年起知潭州兼湖南安撫使至則戢盜賊尊先賢踰年大治遷直寶謨閣廣東運判決疑獄劾貪吏治財賦皆有法則召為祕書監侍講以聵辭升祕閣修撰福建轉運副使又辭度宗即位以侍御史兼侍讀纍召辭不許乃疏所欲對病民五事曰公田曰會子曰銀綱曰鹽鈔曰賦役又言在廷無嚴憚之士何以寢姦謀遇事無敢諍之臣何以臨大節人物稀疏精采銷愞隱情惜己者多忘身殉國者少擢工部侍郎兼直學士院加顯文閣待制湖南安撫使知潭州改漳州皆力辭又明年改福建安撫使力辭不許至官首罷亭户買鹽之纍止荔枝貢召為刑部尚書進顯文閣直學士五辭召命特改華文閣奉祠轉端明殿學士致仕咸淳八年卒疾革草遺表以規君相上震悼贈正議大夫諡文毅天錫動有凖繩居官清介臨事是非不憚面折所著奏議經筵講義通禮輯略味言發墨陽巖文集宋周密曰近世敢言之士雖間有之其終始一節明目張膽言人所難絶無僅有惟溫陵洪公一人閩書史參宋祕書呂時可先生中以下交友呂中字時可晉江人淳祐七年進士歷沂靖惠王府諸王官大小學教授輪對言當去小人之根革贓吏之弊遷國子監丞兼崇政殿説書奏乞晚輪二員説書夜輪講官直宿以備顧問又言進講經史乞依正文進讀不宜節貼避忌不惟可察古今治亂亦以革臣下諂諛之習又言人能正心則事不足為君能正心則天下不足治尋以兄卒無後請假歸葬明年以祕書郎召丁大全忌其直徙汀州在汀期年演易為十圖景定中復舊官卒著皇朝大事記治迹要略論語講義閩書正守梁壽卿先生椿選梁椿選字壽卿晉江人淳祐元年以省試經魁登第有文學之譽歷官通正守寓在安溪來蘇里作湖山書院學士多從之遊亦寓賢也再考安溪清水寺志景定四年梁公曾為承議郎行監察御史崇政殿説書有記文可考云按梁公椿選倡學湖山之來蘇里其遺蹤往迹莫得詳矣嘗讀清源文獻公於咸淳元年季春撰安溪大成殿記略曰夫子之道固不以廟興廢為存亡然示學者之依歸尊正傳之宗主賴有此爾今為吏者惟知簿書期會之間上以督責為功下以趨避為能至有漠然視學校如傳舍者聖賢之居頽弊摧壓慢不之恤風俗日卑人材日陋莫有知其故者鍾侯國秀於邑焦熬不憚撙節興此巨役是則可書也已觀此知公之崇奬名教挽回風俗所以規警為吏者至深切洵為清溪一時興學之倡欲俎豆湖山師席者能無溯厥淵源哉再按梁公事迹安溪舊邑志只載在奠方內未曾立傳謂公係寓賢也因志乘缺寓賢一類附見之此爾後之欲修葺邑乘者似當增補此門目奉文公朱子為寓賢之首蓋文公之簿同安時奉檄往來安溪愛其山川清淑是公開人文之先其始基之矣謹識之以待考訂乾隆丁丑六月初十日丁丑六月本閩書紀此傳之後因挾兒輩及黃甥等赴郡應試念一日舟行九日山是日於延福寺午餐扶杖登山麓摩挲石刻大槩宋元間碑迹最盛未得遍觀因讀宋寶祐六年三月徐仲晦諸公與公同遊九日山之勝乃知公與諸賢同時往復自是一時之選因與甥輩兒輩考同記憶石刻取筆録歸今并附載備考寶祐六年三月甲戌徐明叔仲晦洪天錫君疇方澄孫蒙仲王廣翁居安梁椿選壽卿同登懷古寺酌菩薩泉瀹茶觀石像訪薑秦舊迹小飲聚秀摩挲明翰墨探韻賦詩抵暮期而不至呂中時可乾隆三十一年丙戌六月十四日以旱暵踏勘田畝是晚上清水巖宿尋訪清水志僧因取出舊刻底本數帙為明季邑令許公自表所葺者內載蓬萊山清水寺興造記一篇為有宋徐公明叔記知安邑事黃裳篆蓋承議郎行監察御史崇政殿説書梁椿選立石其記之年為景定四年四月吉日讀此則梁公曾為監察御史崇政殿説書而本傳寥寥莫詳只敘歷官通正守今增入本傳録此附考閩書清源文獻安溪邑志奠方類巖清水志備考洪氏天錫序趙四書纂疏曰或問尹和靖讀易傳之法和靖曰體用一源顯微無間李延平聞之曰此語固好然學者須理會六十四卦三百八十四爻皆有歸著方可及此二先生豈異旨哉言各有當也蓋學不可以徒博亦不可以徑約徒博則雜徑約則孤此約禮必先之以博文而詳説乃所以反約也文公朱子之於論孟既成集義又作詳説既約其精者為集注又疏其所以去取之意為或問其後集注刪改日以精密而或問遂不復修文公自謂集注乃集義之精細一字稱輕等重不可增減讀論孟者取是書焉可也格庵趙公復取文公口授及門人高弟退而私淑與集注相發者纂而疏之間以所聞附於其後使讀之者如侍考亭師友之側所問非一人所答非一日一開卷盡得之博哉書乎然非約之外有所謂博也人莫不飲食也知味者鮮文公一生精力多在此書一章之旨一字之義或數年更易而後定或終夜思索而未安學者以易心讀之豈能得聖賢之意哉如援先儒與諸家之説有隨文直解不以先後為高下者有二説俱通終以前説為正者有二説相須其義始備不可分先後者設非親聞未易意逆此纂疏所以有功於後學也僕晚未聞道加以衰瞶廢學公不鄙辱教且命之曰序以屬子竊惟論孟二書文公凡幾序矣僕於要義而得熟讀深思優遊涵泳之説於訓蒙而得本末精粗無敢偏廢之説又於集義而得操存涵養體驗充廣之説終身受持猶懼不蔇何敢復措一辭抑文公曾有言曰大學一書有正經有注解有或問看來看去不用或問只注解足矣久之不用注解只正經足矣又久之自有一部大學在吾胸中正經亦不用矣此文公喫緊教人處也僕於集注纂疏亦云侍郎徐擇齋先生明叔學派按公為西山真文忠公所鑒識指授與陽巖洪公齊名余氏謙一述綦詳矣侍郎徐擇齋先生明叔徐明叔字仲晦晉江人父伯嵩理宗紹定五年進士辟江淮制幕秩滿幹辦廣漕清節益勵除太學録通判漳州以廉聞知英德府徭冦不敢犯召為國子監丞潮冦起命知潮州捕戮渠魁除直祕閣江右憲歲歉發義倉賑民遷户部侍郎改兵部會元兵南下憂憤卒明叔學有源委與洪天錫齊名人稱擇齋先生閩書獻莆陽文備考余氏謙一序徐擇齋文集曰往歲莆有後村劉公福有竹溪林公泉南有擇齋徐公陽巖洪公皆吾閩文章宗匠竹溪後村集既板行家藏而人誦之矣陽巖擇齋後卒不幸與壞劫會嗣子門生伏匿奔踣不暇遺集久之莫克會萃有志於斯文者歎息焉一日擇齋之子籌老奉先集以授門人余謙一俾為之序開編伏讀則公年耆老官顯榮之日所作蓋公平生藁就輒棄嗣子少長始從旁抄録得之兹特太山之毫芒耳謙一既喜於成編而又懼不敢當序筆辭不獲乃稽首而言曰昔之人論著多矣少壯之氣鋭而老則衰窮苦之辭工而貴則墮呂紫薇周平園猶未免此病而公年益老官益高作為文章略無一毫頽墮衰竭之態此其故何哉蓋不以老壯窮達為進退者氣實為之天地間有所謂至剛至大者是為浩然之氣故孟氏之學以養氣為先是氣也賁育失其勇儀秦失其辨良平失其智眉山蘇氏亦以是稱昌黎公然後知孟子韓子之文純粹明白汪洋而大肆者氣之所充也豈特韓孟為然蘇氏之文亦然故欲論公之文者不于其文而于其氣公為人剛方嚴峻一介不以取豫人意所不可雖當路有權勢者不肯以辭色假借之開口論時事若不知有諱忌以故憚黯疾固者多人輒斥召輒寢所謂諫書講卷綸言史筆皆公所宜擅曾不得一出其所長山林歲月之外麾節弓鈇竟展轉外服以老德祐初元嘗以第一人起之而公老且病矣今觀公之論著文與詩大抵尚妥律不尚奇怪尚典雅不尚纖巧陽巖每稱仲晦之文最宜臺閣人以為知言公於書無所不讀料飽而思敏每下筆娓娓千百語不能休西山真公之守泉也公以翰墨受知遂付以斯文之事淵源所漸有本固如是夫因竊歎西山為南渡歐蘇門人經指授者多以文名于世四十年來凋零殆盡巋然靈光獨東澗與公耳二公殁文章之統紀遂絶而奎運終焉嗚呼斯文興廢豈非天邪讀斯編者將必掩卷而流涕矣州守余子同先生謙一余謙一字子同莆田人祖奭之元孫師魯之子也與弟士明連中江西漕試而謙一第咸淳元年進士調泉州石井書院山長召為國子監書庫官除太學博士改宗正寺簿差知化州宋亡不仕好為古學辭語渾成警切名文章家著述數十藁兵後多散佚士明亦以進士得官知南安縣附録書文安公帖後曰右先文安公遺墨一紙於里巷學童剪截故紙中得之雖不甚完猶得五十八字蓋宦遊他鄉與母家延陵所作也方承平時公之真迹懸金莫能致况兵火後乎冷笏舊氊誠吾家至寶此紙為家書內幅不過候問彝恭耳然篤實忠厚藹然見於情文自其本求之孝之所推也端方嚴重凛然見於翰墨由其內觀之敬之所形也書法心法也心法家法也艾軒先生論公父子嘗嫓之萬石君家一言以蔽之亦曰孝謹而已烏乎後之人其勿替之哉寄軒記曰文章宗師曰歐蘇氏歐自瀧岡竣事一迹不至家林守潁樂其風土遂為終焉之計蘇亦出蜀不復歸既欲歸嵩洛又欲居廬山甚者以蒜山房客自詭末年竟歸陽羡以死委先廬樂僑寓捨故鄉留他國詎非通人一蔽歟丁丑冦作吾族之甍連棟接者化而為煙為埃族之人往往流徙奔竄近稍還集顯伯弟於故居一牛鳴地得三間墼屋攜妻子以居一軒明快遂以寄名蓋曰吾先人之廬吾力未能復而心未嘗忘寄於此非敢安於此昔重耳以晉難故奔於狄十二年一朝至齊即懷其安不復以反國為意向微子犯悔其可追乎兹名所以識也夫不更宅左氏所書能復宇周公所頌豫聞其言而有取焉莊列之論以身世為逆旅以宅居為傳舍此論行能使人厭檢束而事猖狂舍真實而崇幻妄余又慮夫末流之弊寄而至於偷也故君子於此不敢一日廢吾學伯鸞之於吳貧而寄者也舂廡之下禮敬行焉臺卿之於北海急而寄者也復壁之中訓義出焉乃若遭世亂離少陵翁于夔于襄于成都所寄無定在詩自夔州以後鏗鍧蹈厲端可上嫓風雅循其所寄之迹考其歲月而論其為人學問功夫誠有不可誣者今顯伯之寄於斯非他州異縣也非傍人籬落也其視二三子之困厄窮亦足以為安矣人之情當厭亂之餘則喜聞放逹之論處幸安之境則易忘兢畏之心顯伯勉諸此學之所以不可已也顯伯為余言將求扁額二大字於石巖方子豫恐未悉其所以名故為之記如此以著其心而又使覽觀自省焉教授徐進齋先生幾學派按先生與何文定公基同以布衣被召其學出自紫陽西山之傳宋之末造宗朱學者儘多其人往往託迹山長晦匿海濱未得與金華四子並傳者亦多矣尋源溯派望若晨星余不能不憮然慨慕教授徐進齋先生幾徐幾字子與號進齋崇安人嘗與詹琦築靜可書堂於武夷博通經史尤精於易自晦翁之後理學之傳能臻其奧景定間廷臣交薦與何基同以布衣召對授崇政説書上甚器重之詔補迪功郎遷建寧府教授兼典建安書院山長撰經義以訓多士宇內尊之稱曰進齋先生其撰靜可書堂記曰余愛武夷佳山水且有佳友晚歲徙居焉詹兄琦景韓久從余遊知其為人孝弟忠信天資近道聞詩書仁義之名言躍如也一日語余曰某愛程子云性靜可以為學因名讀書之室曰靜可惟吾子一言以發之是為幸余因進而語之曰學者於道能於其性之所近以求從入之門於道可至子性靜有志於學誰曰不可今夫利欲鬭進躁競馳逐者去道日遠茍能收斂此心鞭逼向裏勿為外物所動則其本立矣故濂溪明道二先生發明為學之要必言靜者以大本所當先也然伊川先生教人又用敬不用靜者以敬貫動靜該體用若只用靜恐都無事了又失大本當先之意故曰敬則自靜虛又曰靜中須有物始得必如是乃可言靜謂之可者亦僅可而有所未盡之辭程伯子言云且以開學者從入之門耳會其歸要其至則動靜無端陰陽無始聖人之於天道吻合無間然也大學之經曰知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得此古昔聖賢道學相傳之要旨請以主敬窮理為吾子勉他日隱屏有人曰靜可學者顧不羡美歟詹景韓先生琦詹琦字景韓慕韓魏公為人故名琦宋末隱武夷山南築靜可書堂與徐幾日以聖學相勵幾稱其孝弟忠信金石君子也有滄浪集朝請劉靜齋先生垕學派按晦翁沒後門徒高弟次第凋落其緒言遺論亦稍墜矣公接守家學獨與蔡九峯真西山相友善其子忠簡先生欽又從九峯學一時師友彚征為典型之望乾淳之後稱再盛云朝請劉靜齋先生垕劉垕字伯醇晦伯子寶慶三年知江寧為政愷悌不擾而辨制閫以賢能薦俾兼幕府以收李全功轉朝請大夫知常州衡州移南劍州辭疾不赴素與蔡九峯真西山相友善與學徒熊竹谷輩講道終身學者尊為靜齋先生著有毛詩解家禮集注子欽王潛軒先生昭學派按南安邑志呂氏大圭傳云大圭少學於鄉先生潛軒王昭昭師陳北溪安卿安卿師朱文公又泉郡萬厯間舊志呂大圭傳云大圭少學於陳北溪門人王昭已復盡屏詞章專務理學是邑志與郡志名字相符矣獨閩書呂大圭傳載圭叔少嗜學師事王昭復昭復之學得之陳淳陳淳之學得之朱文公同安志亦與閩書同伏考圭叔先生南安志載為邑之朴兜鄉人則少時師事王氏昭亦其鄉之人也今從南安志郡志為據而以閩書同安志附考焉再閩書有陳景溫傳載景溫與同郡王昭復成之等同時知名考景溫在淳熙間時內舍生王氏昭復與之同時或别有王昭復其人歟待再考王潛軒先生昭王昭號潛軒按南安邑志呂大圭傳大圭少學於鄉先生潛軒王昭昭師陳北溪安卿安卿師朱文公號為溫陵截派云邑志舊郡志新郡志俱作王昭閩書同安志作王昭復南安邑志侍郎呂朴鄉先生大圭學派按先生之學淵源於紫陽文公世號溫陵截派者也宋祚運移先生大節不奪門徒丘氏葵贊之詳矣胡氏一桂稱其易學管見發明多好所著春秋或問何氏夢申跋後曰廣文呂先生加惠潮士諸士有以春秋請問者先生出五論示之咸駭未聞因并求全藁先生又出集傳或問二書蓋本文公之説而發明之有五論以開其端有集説以詳其義又有或問以極其辨難之指歸而春秋之旨昭白矣夢申預聞指教不敢私祕與朋友謀而鋟諸梓以廣其傳焉今考春秋或問二十卷五論一卷易學管見論語孟子解以傳在學者得存然管見諸書皆不可見見者又僅此云詳見通志堂經解原序今節録載之篇端侍郎呂朴鄉先生大圭呂大圭字圭叔南安人少學於鄉先生潛軒王昭昭師陳北溪安卿安卿師朱文公世號溫陵截派居家授徒數百人登淳祐七年進士授潮州教授纍遷簡討崇政殿説書吏部侍郎以操南音出知興化軍以俸錢代輸中户以下賦著莆陽拙政録德祐初元轉知漳州軍節制左翼屯戌軍馬未行屬蒲壽庚率知州田子真降元捕大圭至令署降表大圭不署將殺之適門弟子有為管軍總管者扶出至家以平生所著書泥封一室變服逃入海島壽庚遣兵追之將授以官不從被害年四十九其泥封室盡毁于賊獨其門人所傳易經集解春秋或問二十卷春秋五論一卷論語孟子集解學易管見行于世所居朴兜鄉人稱朴鄉先生元孔公俊建大同書院祠朱文公以大圭配門人丘葵贊曰泉南名賢紫陽高弟造詣既深踐履復至致身事君舍生取義所學所守於公奚愧按黃氏道南統緒辨正謂呂氏大圭為淳祐間進士歷官侍郎出知興化軍南安邑志舊郡志同安志莆陽志皆同獨新郡志本之閩書稍異今從黃氏本改正南安邑志舊郡志道南統緒閩書朱氏經義考泉郡新志藁徵士丘釣磯先生學派按釣磯先生傳稱師於呂朴鄉洪陽巖之門最久當時師門講授無從可考所著諸經説及文篇亦無傳僅存者惟周禮補亡及其詩集耳周禮泉南尚有遺刻詩集其家有寫本同安林氏子濩鈔得之明季遺老盧牧洲若騰為之訂正國朝康熙癸巳歲潯江施平園世騋重刻之云按其本即盧牧洲及子濩所手校者詩多失次後與輪山阮氏重訂之云以五百年沉埋之詩一旦遂傳于世然非其家子孫謹于藏弆諸公前後之勤於搜索殆不及此云子濩名藿同安人馥按詩篇所存酬答諸賢僅存别號俱闕其名今詳詩中所許於斯文者録出附之師友中以備尚論者考訂其一二有可考者録傳附之并附張氏林氏訪釣磯故址記于後云徵士丘釣磯先生葵丘葵字吉甫同安人家海嶼中因自號釣磯蚤有志考亭之學初從辛介甫繼從信州吳平甫授春秋親炙呂大圭洪天錫之門最久風度端凝如鶴立振鷺宋末科舉廢杜門勵學不求人知元世祖聞其名遣御史馬伯庸與逹嚕噶齊奉幣徴聘不出賦詩見志所著有易解義書解詩口義春秋通義四書日講經世書聲音既濟圖周禮補亡等書年八十餘卒元時倭冦至其宅他無所犯惟取遺書以去故其著述多無傳僅存周禮補亡及詩集四卷行世周禮補亡今存論者謂其參訂詳確云其詩尚有八十四歲吟阮氏旻錫曰先生八十四歲猶在卒之年月不載其子孫歲時祭祀必知之當候考周禮序作於泰定甲子歲時年八十一泰定於元世祖歷五朝矣則卻聘時當七十餘歲也再考徵士與熊勿軒先生禾交善其贈熊勿軒詩曰穆穆朱夫子於道集大成嗟豫亦私淑奧義終難明退翁獨何幸而乃同鄉生雖後百餘載元機若親承斯文幸未墜載道來桐城平生疑惑處喜得相考訂秋風吹庭樹忽作離别聲吾儕各衰老何時重合并願言且少住勿棄斯文盟聖賢千萬語只在知與行前修何可企朂哉共修程門人呂椿閩書熊勿軒集新舊郡志宏簡録備考滄浯盧氏若騰序詩集曰吾邑丘釣磯先生品著於宋末元初論定於昭代既列祀鄉先賢且配享朱文公祠矣八閩通志列之儒林傳中以其曾著四書日講易解疑書直講詩口義春秋通義禮記解經世書聲音既濟圖周禮補亡等書為大有功於經傳然其書今已無傳僅存者惟周禮補亡及其詩集耳學士家每用惋惜而要之先生所以取重後世者不專在是夫為學莫急於明理明理莫大於維倫先生倫完理愜行誼堪為後學楷橅即不著書立言固足以當學宮之俎豆而無愧矧其窮究天人洞徹性命晚年吟咏篇什足以見其大槩又何必以諸書亡失為先生致惜也先生一抔土不立碑碣萬厯年間或利其地形之勝遂指其祖兆而爭之官為勘驗劚地得志銘乃加封而表識焉馬鬛漁磯俱巋然後天地老矣先生不求身後名而名卒不可掩無意於僥天之報而天卒昌厥後士生亂世其可不擇所以自處也哉周禮補亡余曾見梓本詩集則惟其家有寫本林子濩鈔得之喜而示豫讀之苦多亥豕稍為訂正擬俟時平梓行非徒表彰吾邑人物亦欲使後學知所興起也夫庚子春正月下弦日同邑後學滄浯盧若騰手題於與耕堂晉江施氏世騋序詩集曰余論經軒中藏有周禮補亡梓本讀其序即知吾鄉有丘釣磯先生而海濱耆老及童孺往往誦先生卻聘詩所謂皇帝書徵老秀才秀才懶下讀書臺者即知先生工於詩必有集而無從搜訪也阮輪山為豫言先生家小登其子孫藏有先生詩集不借人欲鈔者具紙筆就其家鈔之意同邑學士大夫家必傳有鈔本歲乙酉林君子濩館於豫攜有手訂刪本豫與輪山略一借閲適歲暮子濩即取回明年子濩復來泉未幾物故其殘書多散矣豫亟屬吳君石門馳札就其令嗣借取久之絶無回信倏經三載而竟茫然今春子濩令嗣以事至泉石門面徵之云鈔本為人所借今撿得所存舊本隨即致上余按其本乃盧牧洲先生及子濩所手較者本極醜惡詩多失次字復差訛兼以敗楮壞爛更苦蟲蛀瞪目視之莫可辨識然的係全集如玉在璞未經剖破殊可喜也豫即付輪山從新訂定白峯細閲重鈔余再加較正而授之梓噫以五百年沉埋之詩一旦遂傳於世豐城寶劍躍出龍津豈不稱快然非其家子孫之謹於藏弆諸公前後之勤於搜索殆不及此因思古來志士仁人遭時否塞其胸中鬱勃不平之氣發而為詩必有一假光芒不可磨滅之處經千百年後有人焉曠世相感為之表彰而不至湮沒如函之于蓋不期合而自合其所遇亦云奇矣然此非志士仁人所遇之奇而表彰者之人所遇之奇也何也獨行則不離跬步附驥則一日千里附前賢以不朽豈易遘哉余因歎斯人所遇之奇心竊嚮往而深愧豫固非其人也康熙癸巳歲二月朔日後學晉江施世騋謹序輪山阮氏旻錫書先生卻聘詩辨正曰考堯山堂外紀載楊鐵崖不赴召有述詩中有商山肯為秦嬰出之句明太祖曰老蠻子欲吾殺之以成名耳遂放回此乃世俗流傳之誤也詩係吾鄉丘釣磯作見本集題云御史馬伯庸逹嚕噶齊徵幣不出有述至今海邊童叟咸知誦之其相傳久矣按宋潛溪撰楊鐵崖墓志云洪武二年召諸儒纂修禮樂書上以前朝老文學思一遣翰林詹同文奉幣詣門謝不至明年又遣松江别駕追趣賦老客婦詞進御上賜安車詣闕留百有十日禮文畢史統定即以白衣乞骸骨上成其志仍給安車還山蓋丘釣磯為宋秀才不赴元世祖之徵楊鐵崖為元進士不受明太祖之職其志節大抵相類故遂以卻聘詩冒入鐵崖集中鐵崖詩名滿東南而釣磯僻居孤嶼詩集不傳人多口誦遂致字句略有不同耳今悉注之以備覽堯山堂本云天子來徵老秀才鐵崖集作皇帝書徵老秀才秀才懶下讀書臺懶下一作不下商山肯為秦嬰出黃石終從孺子來鐵崖集作子房本為韓仇出諸葛應知漢祚開一本作商山本為儲君出黃石終期孺子來又一作諸葛應從漢祚來太守免勞堂下拜使臣且向日邊回鐵崖集免勞作枉於一作殷勤承上命且向鐵崖集作空向一作繾綣日邊回袖中一管春秋筆不為傍人取次裁鐵崖集作老夫一管春秋筆留向胸中取次裁袖中一作袖藏其大略如此夫一首之詩甚微而所關人品則甚重余故不可以不辨此詩為鐵崖所久假已經五百年今釣磯之集出而趙璧復完則詩之隨時為顯晦其亦有數哉豫固不禁為之歡顏而破涕也癸巳仲春上弦後學八十七叟輪山阮旻錫書於類村之回清亭林氏霍訪丘釣磯先生故址記曰同邑遵海而南巨島錯列小登於諸島若漚浮海上最渺也而五百鍾靈宋丘釣磯先生獨産其上先生後朱考亭百餘年而道學獨祖考亭運當陽九斂德自全蓋自讀書論世知有先生久矣蔡虛臺公重修邑乘獨高先生之風而豫居去先生一水不能詳言其遺宅故墟豫病焉乃於季夏之八日戒小舟約王茂才諸君指小登訪焉舟行而東過石虎寨之前旋及懸崖崖下白沙數武有泉出沙之三石間瀅徹而甘即泉郡志所載仙人井者於是緣崖西南行多石或峭或圓有方石周幾尺許鐫為象馬嬉局而於中分一道則鐫萬機分子路一著笑顏回十字已遭琢沒萬機分子四字完明可摹草甚工蓋先生手筆云輸局步漸西則先生釣石在焉從此東行半里許為鐘山之南有寺曰章法肇於宋而北則先生之所宅址不半畝黍秀離離蓋自明高帝以倭故徙登民一嶼皆虛成化初乃復舊籍丘氏俱望鐘山之麓列屋而先生之舊址竟廢豫與諸君撫景低徊就先生之裔朝凖君别業休焉君因出所藏先生詩一編讀之先生之洞天人徹性命觸發皆真而為生人明大義為天地辨大分考亭統緒存以不墜則先生之功誠大矣然先生之高蹤逸韻亦今而後知其詳則豈非有數也哉既歸釋楫遂記之萬厯四十年壬子季夏望後三日後學張日益書於雲海館後六十一年壬子後學林霍再刪訂時仲夏草日書於欖園呂之壽先生椿呂椿字之壽晉江人幼從丘釣磯學書過目成誦作文立就貧隱授徒所著有春秋精義詩書直解禮記解所為詩自成一家閩書莊容齋先生圭復莊圭復字生道號容齋思齊之子晉江青陽人篤志勵行以文學名少從遊於丘葵值宋季流亂手未嘗釋卷誠信孝友建祠宇立祭田入元隱於青陽吟咏自如至順間福建閩海道知事清江范梈以圭學行聞於朝詔書屢下終不起年九十一卒於家何鏡山撰莊氏族譜序新志節張艿墓志教授楊敬在先生相孫楊相孫字敬在其先本董姓餘杭人至祖君選為元從事郎潮陽縣尹幼孤從母鞠於楊從楊姓家於泉遂為晉江人父伯淵為泉州蒙古字學正相孫以諸生為泉庠直學再補石井書院能公出納斥貪鄙以嚴正自持升仙遊教諭攝縣事轉長泰教諭諸政績多可紀朔望講義諄乎身心之學遷莆田學正上陳參政陳忠肅文龍死事請旌於朝鋟莆先正劉後村文集又舉攝德化縣時邑多盜躬造其巢諭降之授漳州教授郡再被兵學廟莽為儲胥禮樂之器散壞相孫請於大將移兵他所亟補弊苴缺稍復舊規年七十卒於家相孫自童年已有文譽及遊丘釣磯之門盡去凡近篤志理學户屨常滿為文平實古雅務以理勝天性孝謹質諒父母喪哀毁逾禮廬墓三年所著文集若干卷泉郡新志略處士陳樂所先生必敬陳必敬號樂所同安之陽翟人少穎悟通五經諸子百家在宋末一舉不遇遂不復出嘗與丘吉甫講明濂洛遺學所著有詩聨遺文同安邑志隱佚教授劉秋圃先生志學劉志學字師孔同安人少與兄璧齊名咸淳七年進士教授台州以親老歸省未幾元兵南下杜門娛親下帷講誦四方學者從之如雲暮年與同輩論談淋漓翰墨種菊數十本號秋圃以陶潛韓渥自方蒲壽庚欲羅致門下固避之按先生詩集贈劉秋圃先生十年江上理絲綸此日桐城喜見君造化由來最我輩俗儒安得與斯文餘詳集中再按先生咸淳七年辛未與兄璧同上舍釋褐云閩書通志詹野渡先生詹先生名未詳别字野渡南劍人丘先生寄之詩曰聖哲已往古吾儕空自今六經尋斷脈千里遇知音莫笑因緣淺相期造道深可憐山海隔無路盍朋簪按釣磯先生詩集云寄南劍詹野渡先生考之南劍志乘未得其人録此待考矩齋先生矩齋先生姓名籍貫未詳先生挽之詩曰蚤悟官為祟晚將家付兒公今返真矣僕尚是人猗柿葉收遺墨梅花憶贈詩自嫌聞道暮有淚哭先師按先生詩末語及先師疑是師友于此公者再按莆陽林氏應成號矩軒疑先後同時未知是否録出待考蘇仲質先生蘇仲質名籍貫未詳先生次韻寄之詩曰十年前事付流水清夢悠悠何處尋老去誰憐三刖足生來不受四知金窮途賴有雷陳友大雅應殊鄭衛音俗士紛紛敗人意何時握手再論心按仲質疑應舉未售而與公同志節為宋之遺民故云當此窮途尚賴有雷陳之友共扶大雅之音俗士紛紛皆非知心之侶矣張尚友先生張尚友名籍貫未詳先生呈之詩曰秋風匹馬柳江邊芹泮相逢意浩然吏部文章懸日月龍門史記在山川輸君何啻百籌上期我曾言千載前造物無情吾輩老後生誰可囑遺編按詩中所相期許者皆欲希風千載之上與公同輩行也嘆老囑遺編皆暮年志事名籍貫待考陳萬石呂潛心二先生陳萬石呂潛心名籍貫俱未詳録集中分韻詩一首題云臘月二十九日陳萬石石室呂潛心三兄相訪夜坐分韻得年字賦二首今録一首詩曰二十年前舊師友一燈相對坐談玄爐香茗碗不須睡惟有今宵是舊年按詩中有舊師友之云故録出待考玉巖先生玉巖名姓籍貫俱未詳按集中贈詩題云懷玉巖先生謫廣州忽自古杭有書至贈詩曰十二年前舊師友書來欲折淚成行幾回相憶人千里往事追思夢一場琴劍知辭南國久干戈尚任北方強傷心吾道秋容冷遙憶師門數仞牆按詩末云遙憶師門數仞牆疑師門即玉巖也考丘公本傳釣磯早志考亭之學初從辛介甫繼從信州吳平甫授春秋親炙呂太圭洪天錫之門最久其號玉巖者未知屬誰俟考訂增入以上諸先生與丘公或師或友皆彼時共扶教道而非區區以文術相高者惜志乘殘闕而詩集中又隱其名未得猝考今並録出以待博考者訂正泉南諸葛氏家世學派按何鏡山先生撰諸葛氏世譜序云諸葛之姓蓋漢司𨽻校尉諱豐丞相武鄉侯亮之後其家於泉為鼻祖者則宋轉運判諱安節由浙仕閩貧不能歸葬即家於南安五傳而為尚書兵部侍郎少保公以柱史使弔於金人求丹鞓墨帶之服往正色嚴辭顧盼折爭於刀戟之間凝然不動其為諄諄家訓者不出忠孝之一言諸葛氏之祖所以遺其子孫者如此清馥三復其譜牒所載者自少保之後人物輩生宋社既屋一門忠孝尤著其志皆欲扶國祚而終臣節其事皆可揭日月而昭天漢要皆忠武之遺風餘烈也今録自宋以前家學載於編端至元明以後則有本編可考焉諸葛先生季文諸葛季文南安人以行誼文學聞於時家貧授徒以養嘗著六經諸子解有益後學樂道人善如已有之子廷瑞清源文獻傅氏伯成撰諸葛廷瑞神道碑少保諸葛麟之先生廷瑞諸葛廷瑞字麟之南安人父季文以行誼文學聞於時家貧授徒以養嘗著六經諸子解有益後學樂道人善如已有之廷瑞穎悟博學擢紹興二十七年進士授龍溪尉改知崇安時朱文公家食廷瑞每造詣以趙清獻嘗為崇安宰而胡文定邑人也訪求遺像因新學立祠請文公為記歲歉屬書文公請於郡倅得粟賑飢守王淮與轉運使者具以政績聞擢主管官告院奏對稱旨即日擢起居舍人光宗嗣位會金人有大喪命充弔祭使至敵境伴使以三節人衣帶服飾為非請易之爭辨甚厲廷瑞徐折之不為動金不能奪為之加禮使還兼權吏部侍郎即進起居郎疏言兩淮藩籬不固乞詔侍從臺諫於文武臣中各舉所知可為沿邊監司郡守者以待選用詔付三省施行拜中書舍人與留正有連避改兵部侍郎歲餘以疾授朝散大夫守權兵部侍郎致仕卒贈大中大夫蔭子二人按朱子文集并傅氏撰行狀皆未敘及朱子之門惟道南統緒録之俟再考獻舊郡志新郡志清源文閩書郡守諸葛子嚴先生直清諸葛直清字子嚴以父任歷海口鎮主管南外睦宗院知海陽縣通判廣州海陽多水患直清隄之以捍田民名其田曰諸葛田祠官凡十二任仕終奉直大夫知臨安府事封開國男食南安縣三百户子珏琰珏知南安軍郡守諸葛先生珏諸葛珏南安人祖廷瑞父直清直清子二珏琰珏知南安軍按李昻英跋北溪陳氏中庸大學講義曰大學中庸之微旨朱夫子發揮備矣北溪翁從之遊久以所得鳴漳泉間泉之士有志者相率延之往教翁指畫口授不求工於文采務切當於義理諸生隨所聞筆之成帙韶州别駕諸葛君當時席下士之一也廣其傳梓嘉與後學共使之由北溪之流溯紫陽之源而窺聖涯不徒口耳且必用力於實踐則曰希聖希賢工夫可循循而詣矣豫過曲江得見所未見茅塞豁然尹番禺而始創黌舍者此諸葛君也珏其名朱氏經義考僉判諸葛桂隱先生琰諸葛琰字如晦號桂隱直清季子為李臞庵之壻宋紹定三年以任子纍官邵武軍光澤縣尉閩冦弄兵山谷州縣騷動琰提兵轉鬭以身士卒不旬日授首黎庶得安田畝真西山喜琰忠勤上其事於朝進階儒林郎官至信州令書判官致政歸琰賦性豪邁有學術在官清貧與白玉蟾相善蟾詩中所謂桂隱者即琰也再按譜牒載宋少主南下琰之羣季韶州公參政公進士公倡義開北城迎駕闔家同死蒲壽庚之難獨琰知宋臘不再遠識幾先率其子隱武夷山中得免後乃屏居於城西之古榕今所傳者獨琰一派耳按宋詩鈔石屏戴氏復古詩中有久寓泉南待一故人消息桂隱諸葛如晦謂客舍不可住借一園亭安下即事凡有十首讀此諸葛桂隱似字如晦進士諸葛先生寅諸葛寅直清第五子璋之子嘉定十六年進士景炎丁丑蒲壽庚拒命閉城寅首倡義開北門應張世傑之師不濟為壽庚所害年六十九三子俱被害而史綱逸其事可嘆也又按諸葛譜牒同時被難者甚夥詳見後備考內諸葛譜牒事略備考諸葛宋世入泉州譜牒事略入泉一世諱安節公四世諱季文篤學好古洞見大原嘗著六經諸子解接授後學循循不倦當時人士多宗之家貧晏如也子三長曰廷瑞尚書少保餘無録五世諱廷瑞字麟之季文長子登紹興二十七年進士纍官兵部侍郎守尚書卒于官贈太子少保子三長直清主管華州雲臺觀次曰禮未仕而沒三曰應祥提舉常平幹辦公事六世諱直清字子嚴少保長子以父任歷官知臨安府事封開國男子五長玠補承事郎二曰珏韶州府知府三曰琰信州僉書判官四曰琳五曰璋七世諱珏直清次子歷官至廣東韶州府知府男一曰洪諱琰直清第三子徙家古榕之始祖也以任子恩歷官至信州僉書判官致政歸卜遷於古榕與白玉蟾交善白有贈詩見本傳琰知宋臘不再率其子隱於武夷山中未幾公之羣季果以倡義一門數百口同死蒲氏之難今之傳者獨公一派耳子一曰巽兩淮制置司提幹諱琳直清第四子子一曰坤諱璋直清第五子子二曰震曰寅諱璉應祥長子子二曰甲孫曰葵孫諱璹應祥次子授職稅院男一曰仲孫八世諱觀承事郎諱玠之子諱洪諱珏之子授廣東常平司幹子某倡義為蒲壽庚所害諱巽信州僉判諱琰之子歷官兩淮制置司提幹子二長曰復次曰元中松江府同知諱坤琳公之子年三十四子一曰應老景炎丁丑年倡義為蒲壽庚所害子應老年二十亦被害諱震璋公之長子景炎二年倡義為蒲壽庚所害其子亦被害諱寅璋公次子寧宗嘉定十六年癸未進士景炎丁丑年蒲壽庚拒命閉城寅首倡義舉開北門應張世傑之師不濟為壽庚所害時年六十九三子俱被害而史綱逸其事可嘆也詳見諸葛譜牒忠節孝義篇諱甲孫璉公次子補登仕郎子二曰湜曰廉俱殤不略又云景炎二年丁丑秋八月蒲壽庚閉城拒命公倡義開北門迎張世傑不克為蒲壽庚所害詳見忠節譜牒孝義篇諱葵孫璉公第三子官至廣西參知政事男一曰潛殤不略又云景炎丁丑同死蒲壽庚之難諱仲孫璹公之子景炎丁丑年倡義迎張世傑為蒲壽庚所害配黃氏俱盡節九世諱復巽公長子注出繼王氏諱元中巽公次子歷官松江府同知有傳子四長曰泰明溪巡檢次曰晉中書省檢校三曰謙諱泰諱晉二公見元代師友淵源考閩中理學淵源考卷三十三
