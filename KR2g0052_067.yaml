body:
  text: 閩中理學淵源考卷六十七廣平府知府李清馥撰𠫭政王遵巖先生慎中學派按先生受學于易愧虛而淵源於蔡文莊者維時良知之說方行先生宦遊南服與龍溪雙江相講切亦契㑹其宗㫖迨退歸年甫逾壯耳後祭愧虛先生文曰知向道而不力顛垂白而悾侗慨滅質以溺心誤師傳之正宗葢愧虛於嘉靖戊午年卒先生時年亦及艾矣故曰顛垂白也其曰滅質溺心誤師𫝊者或於王學悔遁而遡厥師承所自乎前輩造詣與年俱進未知所至何如今觀其出處去就大節確乎不移李氏愷祭文云先生為學力削浮夸鞭辟近裏隱然成徳而所以自期待者甚不凡當桂洲柄用恥為朱穆孤真之節寜為所嗔而不入其黨其操履可想矣嘗自言其講學教士以文法悟諸生最多又自言其文非但以文字觀又自憾平生學問不足而文字有餘正枝葉勝本根之弊又與弟道原書云當使治經之功多于辭華之事予舊亦誤至二十七八而始知反凡此皆晚嵗有造於道之言也文節李公嘗曰吾鄉虛齋古愚净峯遵巖紫溪諸先正師道甚立於嘑先生之學固亦因文而有補於道者哉㕘政王遵巖先生慎中王慎中字道思晉江人㓜稟異質日誦數千言年十八舉嘉靖五年進士授户部主事尋改禮部祠祭司時四方名士唐順之陳束李開先趙時春任瀚熊過屠應峻華察陸銓江以逹曽汴輩咸在部曹慎中與之講習學大進十二年詔簡部郎為翰林衆首擬慎中大學士張孚敬欲一見辭不赴乃稍移吏部為考功員外郎進騐封郎中忌者䜛之孚敬因覆議真人張衍慶請封疏謫常州通判稍遷户部主事禮部員外郎並在南京久之擢山東提學僉事以古風教為己任校文秉公不狥舊案得之片牘劵之終身殷士儋李攀龍皆所首拔也年餘改江西參議進河南㕘政侍郎王杲奉命振荒以其事委慎中還朝薦慎中可重用會二十年大計吏部註慎中不及而大學士夏言先嘗為禮部尚書慎中其屬吏也與相忤遂内批不謹落其職士論駭之慎中學博才俊自視亦髙為文初主秦漢謂東京下無可取己悟歐曽作文之法乃盡焚舊作一意師倣尤得力於南豐唐順之初不服久亦變而從之壯年廢棄益肆力古文演迤詳贍卓然成家與順之齊名順之稱其文二百年來當為中興李攀龍王世貞後起力排之卒莫能及居家孝友好誘進士𩔖後輩一經品隲旋即知名問業者相踵言文辭者多宗之年五十一而終慎中初號遵巖居士所著遵巖集行於世明史舊郡志新郡志縣丞詹仕潤先生洧詹洧字仕潤安溪人嘉靖間任髙要縣丞與王遵巖慎中講學晚嵗造詣有得於天機流動無入不自得之趣嘗為何怍菴炯作洗心精舍詩髙人已把塵心洗精舍乾坤儘廓開唯有一真含泰宇更無二念擾靈臺碧空雲散青天净銀漢夜深寳月來浩浩淵淵神莫測氷清玉潔絶纎埃讀其詩知其有得於道也閩書縣丞黄端叔先生大本黄大本字端叔安溪人少補弟子員受學于詹洧因詹洧以師王慎中既又與晉江參議尤烈知縣朱梧山人江一鯉講學譚詩皆其父行而名為長者者也既入莆中師事林兆恩稱髙弟深會脩身繕性之㫖兆恩欲詣闕陳疏意在婚娶二氏使各行其教時朝廷方好方術之士方術之士上書言事輒得㫖大本即移書止兆恩謂言即得行甚善顧此時詣闕上書者皆黄緇符篆者流吾師欲以㛰娶二氏易天下不惟不足以明三教之道適使人疑夫子兆恩因此中輟而其道益尊凡郡中學兆恩者多師大本稱為極齋先生平生與人言必推本孝弟或時有所叩不終言之第曰力行何如耳仕鴻臚寺序班終靖江丞趙府典寳正所著有紫雲詩集將軍鄧寒松先生城鄧城字藩國别號寒松嘉靖甲子武闈解元襲父爵以功授中軍指揮累官提督狼山總兵召拜閩遊擊將軍未幾卒城狀貌魁傑有古將帥略事母孝謹家貧力學喜賓客所著有詩集數卷少事王參政遵巖講學與薛南塘田燕山史方齋兄弟相從筆研既長就明經試嘆曰吾固將種也此舉何足發吾志哉因習弓馬韜畧與俞虛江訂交其氣畧亦相𩔖云子鑣己丑進士官南陽太守餘詳志乗史方齋撰墓志畧舊郡志李思質先生杜李杜字思質晉江人棄諸生業自號雲臺山人從王遵巖遊為文一稟其矩矱又跌宕喜談兵俞虛江器之揚譽於司馬譚綸禮為記室嘗為大猷作集序稱其言學莫非兵言兵莫非易可謂知言後因避地粤西家陽朔以終焉嘗為周氏㣲撰明經㑹記畧曰周衰學廢士始以學文為先及孔子教於洙泗則皆篤於自脩雖詩禮亦有棄而不習者故孔子教伯魚惓惓于不學之弊推本詩之為用其歸在於事父事君而孟子言禮樂之實亦以節文夫孝弟而己自是學者始知夫六經之㫖揮發夫事物事物之繁通貫乎性命苟有志于復古者皆可因其言以求其義由其義以明其教則豈有義髙而猶淺于聞知深而或失其守之過乎今周君麗峰建堂於家以祀先聖題其扁曰明經聚鄉之碩髦以講於其間而惓惓忠孝儉慎之數言是亦不越乎致慎於興居視聴俯仰語黙服食之間以求當乎父子君臣兄弟朋友夫婦之倫者也葢有得於家塾黨庠之意誠使長治此邦者率喬家望族而大昌明其教家建而人習之如三代建學之隆則孔孟之經于以復明顧不易耶余蹇且拙不足以當幹局之任而率先教化以求明聖人之道者不敢不汲汲也故於是㑹也樂為之記然余又有懼焉葢道之不明非不講者之過也講之而不行行之而不力徒攘竊於外以為髙而好名之士又侈然為欺以和之敦實之意㣲矯飾之俗盛則反為是經之障不若不講之愈也劉屏山有云學有三上焉汲汲然其次懵懵然其次悠悠然周君葢汲汲然非徒講者也是經之明也可冀矣又撰沈氏崇正書院記論周子無欲之㫖通乎一貫以為崇正之論而併舉二氏之無欲所以異於聖人者反覆其說其論亦皆不詭於正焉新郡志清源文獻教授徐希孔先生孟學派按文簡黄公撰先生本傳云先生業程朱易傳義得蔡文莊之傳為郡人士所宗葢一時鉅宿也小洛何公為及門髙弟平生至行亦相𩔖當時並以孝徳著稱先生去虛齋先生未逺彼時風教篤茂鄉後進講習淬勵未嘗沾沾以沽世眩俗故一經之士皆能守師儒繩尺綽有漢宋風流迄今猶可溯先民榘矱云教授徐希孔先生孟徐孟字希孔晉江人嘉靖中為郡邑博士業程朱易傳義得蔡文莊正傳邑人士翕然宗之稱之曰徐先生初授袁州府學訓導尋遷曲陽教諭最後教授黄州不沿例問諸生贄餽與諸生談經講藝訓廸不倦黄故材藪薰陶造就者甚衆士亦多顯者當時上官有古學古辭古貌古心之譽事繼母孝篤愛異母弟自諸生餼以逮俸入悉分給之宦歸食貧僅免凍餒猶損饔飱以濟焉平生長厚豐推予而自治極嚴何小洛元述孟髙弟子也同省試掇科推宴金為贐孟堅弗納曰初發軔何得急此為葢自為諸生時其廉潔已如此里居鍵户寡接惟諄諄課諸孫學獨坐竟日親友宴閒未嘗有夷踞傾欹態至耄猶然年八十八卒邑人黄公鳳翔景慕先生采摭厥行實為之傳而致慨輓近世賢人君子蠖屈下位泥蟠巖穴不能標不朽之聞施于後世云黄文簡撰本傳副使何小洛先生元述何元述字元孝别號小洛晉江人自㓜從父學年稍長受業於孫東溪某從兄孝廉何洛江某二公并名士俱器之一日張净峯先生見元述於洛江精舍試其文大奇之語洛江曰君家有千里駒矣時年十三嵗嘉靖四年學使者邵公試立志論元述分晰道徳富貴功名之義而原本於寜静澹泊學使者異之十一年舉進士疏乞教授惠州以便迎養甲午分校浙闈得陳善茅坤潘季馴諸公皆為浙中聞人擢國子博士厯監丞擢南戸部主事出為廣東僉事遷湖廣參議時世宗脩顯陵以分任勞賜金幣中貴人使楚諸大吏折節為恭元述獨行敵禮鎮守廖斌者傾御史包節被逮謫戍其部曲席勢驕恣元述即捕治之如法斌無以中陞廣東按察副使治海道事積案累千株連數千百人請撫按檢閱可問問之久逺不可問者請决除之於是宿牘一清御史行部不至瓊皆推臬僚代人憚浮海莫應者元述獨請往還抵化州次白沙驛遇黎冦猝至持刃擬己知為河海道相率羅拜而去獨以戅直執法繩兩勢家責其豪子弟後為所擠罷歸元述孝友甚至官俸之餘敬上二親悉均諸弟自無厚殖性寛洪坦直無城府不知人間有機械知亦不較拯人於難如疴在身聞有善事喜動眉宇見有招失咨嗟竟日其自奉淡約脫粟而食入里門必下車縉紳士𩔖倒屣出迎雖下𨽻必衣冠乃見林居四十餘年正家規廣祠宇脩祖墳至耄年遇嵗時禮節拜揖酬酢不衰卒年九十子居魯舉人官至承天知府李文節撰墓志書李衷一撰行狀新舊郡志閩林允徳先生鴻儒學派清溪之學在宋時紫陽私淑弟子如鄭氏思忱思永已具學派矣至余氏克濟陳氏子木陳氏椿夀黄氏商楫諸公亦以經學著顯元明以後潛徳自脩者志乗頗畧至中明時師席有起文獻可稽如林公允徳其較著者也然及門之士亦多載郡國而深山樸茂者無聞焉意彼時長材秀民長往山林而不返也耶馥嘗考余家譜牒九世祖羅峯府君在𢎞治間以明經終老孝著里閭其詳已附周公孟中學派矣其以經學授徒者則自仍樸先生仕亨以易學教授宗黨族弟栻實師事之皆有易說存藳迨後在明先生光龍老於諸生者數十年至崇禎癸未登第秉節山中從遊不乏而先伯曽祖葆甫公先曾祖惟念公實受其學焉顧鄉邦門徒姓氏亦多佚而無傳矣夫荒陬遐邑譜籍殘缺即志乗亦無可尋一邑如此然則巖栖潛隱之彦湮没而不稱者豈少哉因述林氏學派而并書之林允徳先生鴻儒林鴻儒字允徳安溪人温恭孝友博學能文精治尚書有書經日錄行世何氏鏡山撰先生傳畧曰吾鄉先輩林先生居駟馬山中沈精極思博暢旁㑹為尚書日錄一書大抵如宋季夏僎解書之意每篇撮其大義冠於講首中則採用諸家參以己意没既有年尚未出於人間有竊其說者已先大行於世今而後士之習舉子業者知為先生說也吾鄉涉尚書顯者多本先生則有林公雲程李公載贄紀公廷譽皆其門下知名士云何司徒撰本傳安溪邑志郡守林登卿先生雲程林雲程字登卿晉江人嘉靖乙丑進士時王弇州方與李厯下諸公握三尺管馳驅中原海内翕然景附閩中寂無人雲程自其少年則留意詞賦之業既紆組綬交游諸公間所從游詞客則吳中張伯起勾章沈明臣里中黄克晦及諸名流勝選率以風雅推讓之好蓄法書名畫窮其源委而筆翰大有名於世人但見其登髙作賦臨池洗墨雲程一片真誠自將尤善蒞政以便民自以為無瑕釁于人坐是浮沉州郡郎署間家居厚徳載物古意宅心為鄉邦模楷者五十餘年夀九十六而終雲程所厯官兩為通宿知州兩為南北曹郎兩為九江汝寜郡太守從姪欲厦肇開闕同知蔡松莊先生元偉學派余嘗過泉南之郊接紫㡌山麓有所謂松莊故里者其長松蟠鬱根幹數十圍至今仰喬木并想先生之髙風偉度也及觀考徳錄諸篇愈詳求志之篤余又爽然自失矣觀其馳書于黄恭肅司冦論大臣去就之正道徳功名之辨并往治周蹟山身後事何其大節不可奪也先生服膺程朱之學其持躬踐履可謂克承前烈者矣平昔論學于本原心性工夫卓有特識殊非淺學小生所能窺測嗚呼賢哉同知蔡松莊先生元偉蔡元偉字伯瞻晉江人宋忠惠襄後襄兩守泉州其三世孫橚再莅是邦四世怛因移家焉元偉總角受學則己有孝弟稱嘗受易於童含山徐泗涯洪新齋之門既為諸生浙人憲副方豪求易師於泉新山顧珀朋山留志淑二公以元偉應聘方延致家塾為其子師夙興夜寐己自嚴矣久之見程端禮家塾日程皆宗晦翁教人之法嘆曰學當如是即手抄服行慨然有求道之志領嘉靖辛卯鄉薦不干有司舌耕為養於漳泉間者凡十年始就授羅田教諭所以教士即舉業之中黙誘之聖賢之域擢徳安令一以節愛為本毎退食取小學近思錄伊洛淵源錄本朝薛胡二子粹言揭觀成誦一時政事真有得於學道愛人之遺士大夫交口稱之遷杭州府通判入覲事竣乞終養冡宰李黙知元偉命考功懇留歸署錢塘印一月民甚稱平擢撫州同知下車數日巡按御史委督樂安逋糧樂安素稱刁邑元偉寛命令去鞭笞皆相繼輸納復還府治耆民送者盈路謂自髫穉至今目見徵糧官莫如蔡公無何樂安復有刼庫之變再被委往忽流賊數千焚掠南豐等鄰邑縣故無城元偉召鄉民精銳者設險扼隘自著戎衣演武教塲賊聞不敢近縣獄久壊風寒莫蔽蒸為癘疫元偉欲作新獄居之縱囚歸命獄成乃至獄成囚並如期至復委署崇仁崇亦無城不數日報賊突至元偉督兵渡河殺賊數十人餘皆遁散丁外艱喪𦵏畢以泉中倭棘慕建寜有考亭遺風遂移居之元偉學尚程朱而重躬行與紫峯同時講學其所寘力惟在飲食起居動靜語黙辭受取與之際其待次詮部時適同鄉主政周天佐陳言申救楊侍御爵疏入上震怒下詔獄竟斃杖下時權奸遣人偵其所以縉紳嗟噤莫敢收視元偉獨慨然往治其殮且奮筆為文祭之復著七難論以悲傷其意人服其勇黄恭肅為司冦日偉貽書勸歸與言大臣去就之正道徳功名之辨恭肅深納之語人曰非秉道徳崇風節者不能出此言讀其書可想見其人矣其自治之勤或至提撕少懈過失復生輒撫膺泣下長跪自罰作日厯自識生平名考徳錄而自序曰松莊子少不自揣量非聖賢書不觀非孝弟之志不存非天地古今之運化英雄豪傑之作用無以入吾思也氣拘物蔽鞭策不前悠悠作輟出入是懼於是有是書之作所云考徳有二一則時常省克而時識之以自稽其理欲分數之多少一則隨其學之有得心之有開即便劄記以驗器識之髙下淺深以為進徳之助居常服膺晦翁之言以為世間事須臾變滅皆不足寘胸懐惟有窮理修身為究竟法賴天之靈幸有所知好學性生至老彌篤厯官雖久此心淡然中屢遭家難備嘗變故毎自嘆所遭之窮而此志終顛撲不破晚年閒靜之中咀嚼益㫖行以不息之功加于未死之年不有得于今必有得于古不有合于人必有合于天則所謂不知不愠之地或可幾萬一焉又著有四書折衷易經聚正各若干卷其云松莊者其先祖怛家郡城外十里許遶宅皆松王梅溪守泉時題為萬松莊元偉取自號也閩書本傳舊郡志張天叙撰備考黄恭肅公光昇書蔡公傳後云蔡君元偉居家時余尚黍秋官卿方有歸志君以書招余隱其畧云昔向敏中遷僕射門前寂然絶無賀客真宗嘆羨以為大臣所難公毎歸家寂靜無車馬之喧不讓于敏中亦今世所希見者張忠定公初及第時以詩遺逸人傅霖云當年失足下漁磯苦戀明時未得歸寄語巢由莫相笑此心不是愛輕肥後果未老告歸錢若水之急流勇退至今為美談今髙夀耳順與偉同庚偉精力寖衰計前途遥逺而公為造物所獨厚必夀登期頥可卜也但老杜亦有古稀之懼人生亦當優游林下二十年方享真樂不然再侵幾年似與鐘鳴漏盡而夜行不休者無異矣四時之序成功者去若宦成名立不蚤休退匪惟有違於大臣之義不知者僅以為功名之士平生之所辛勤以自立者亦只成就一箇功名而未能深於道徳之域亦輸人一頭地矣此非相愛之深欲期公作天下一完人不敢出此言亦非公不敢以此言進惟恕其狂矜其愚而不加罪幸甚偉碌碌無足為道惟日求新得以益舊聞日攻新惡以贖舊愆脩身俟死别無外念特孤立無助以兹怏怏伏望進而教之使不終為棄物恩當如何報也余讀其書而歸志愈决三疏得㫖則蔡君没矣於乎滔滔時世疇不以功名相勸勉非秉道義崇風節者誰肯出此余故錄其書於傳後觀者亦可以想見其為人僉事王賔之先生宗㑹王宗㑹字賔之起家大理評事轉寺副寺正明恕詳讞每多平反自其未遇受知于郡守程秀民及入仕秀民身後為里豪所齮齕宗㑹為直枉衢有柑橘之饒宗㑹捐百金買柑園一區供程祀程人名曰王氏柑有權相欲羅致門下宗㑹不就邅回冷署者十餘載始轉廣東僉憲尋卒官閩書王未齋先生國輔王國輔字忠甫號未齋晉江人當嘉靖間蔡松莊與何怍菴同時講易國輔尊之為師松莊知之尤深妻以女國輔事繼母至孝畜異母弟至友蔡松莊久居建州臨殁無子作訣書割田遺國輔而國輔不受每朔朢具衣冠作禮祖先於寢門之内誘子弟讀書作譜垂訓常欲倣古禮如河東義門湏有力行之而皆不果讀書寒熱不廢為詞章刻苦沈涵十入棘闈主司擬中選而卒不與嘗一遊鄧州其守滕公請國輔為鄧中弟子開講從者百餘人開封守聞之即延為其子師不久倦遊遂歸孫有棟又從鏡山先生受業焉何司徒撰本傳教諭沈潛吾先生亨學派按聖學傳人惟澹泊明志寜靜致逺者可克負荷中庸闇然日章之君子似之觀先生恬澹著書不樹聲譽雖寂寞一時而異世考論徳業者推焉可見此學在篤實功夫教諭沈潛吾先生亨沈亨字體敬一字潛吾晉江人少惇篤言動不茍潛心易學深契蔡文莊之㫖毎讀孝經小學輒掩卷静思求所以不愧古人者教人以孝弟忠信為先時方尚講學亨曰學在躬行而已嘉靖乙卯以貢授新㑹訓導諄諄以人倫日用為諸生訓勉其貧者捐俸周之新㑹士子頌其有師之尊有父之親陞宜山教諭其教一如新㑹未幾致仕諸生懇留不忍釋歸家數年卒亨自做秀才時即以古有道自待孝事二親與弟友愛備至嗜學安貧屢空晏如其門人張冕嘗讀書一峯書院朝夕侍側見其潛心性道闇然自脩其所學孜孜汲汲求情質之偏是務嘗曰學莫貴于為己志于為己者則必求身心性命之益情質上有一偏曲即為心累本原之地不能主持欲其入道也難矣故學必先定其志志必務去其偏以合於道其所聞切要語則云心術上要致其光明氣質上要矯其偏邪雖一事之㣲必指而示曰此吾心之有係累處不遏其端則邪心從此滋矣凡傲惰忌嫉飾觀逢迎一切墜于情質之偏者必諄諄規而正焉其用心本原之地不惟自攻其慝而相與以責其善者一毫必示底止務得其本心而後己其庶幾於切問近思之學者歟所著有周易說論孟辨太極解啓䝉疏皆心得所發有功先哲者舊郡志清源文獻遺文序閩中理學淵源考卷六十七
