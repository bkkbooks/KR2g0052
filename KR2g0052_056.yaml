body:
  text: 閩中理學淵源考卷五十六廣平府知府李清馥撰莆陽嘉隆以後諸先生學派縣令歐須靜先生志學歐志學字須靜莆田人淹貫經傳以貢入南雍海內交重之吳中諸文學爭延為師領嘉靖乙酉鄉薦知潮陽縣興學育才人文遂盛嵗餘乞歸當道留之不可既歸開五經講席四方負笈者相踵所著有四書淵源毛詩小見衍義補要等書道南源委閩書縣令阮先生琳阮琳字廷佩莆田人嘉靖庚子舉人除金溪教諭為諸生講明正學擢知恩平勤撫字興學校文學吏治一時推奬以老丐歸結境真會誘誨後進所著有書經講義性理儀禮律厯注解圖書記愚諸集道南源委縣令陳立夫先生繼芳陳繼芳字立夫少頴敏勤學通五經為文詞多有理解同輩咸推讓之嘉靖丙戍進士授金華知縣亷介自持姦徒屏迹甫七月以病疏歸養家貧甘旨乏供乃設帳嘉禾因而負篋從逰者甚衆所著有書經精講至今以尚書起家者咸宗焉郡守林廷彬先生華林華字廷彬蚤孤家貧奮志讀書嘉靖壬辰進士授南京戶部主事改北刑部轉員外郎皇親張鶴齡繫刑部獄華坐纍謫六安州同知巡按及督學檄為諸生師建嶽麓書院令主之著嶽麓口義十卷量移長沙同知尋擢鎮江知府公暇講學如嶽麓時與徐問唐順之往還議論為守五年多政績最大者平民羣訴豪家擅洲田久不決華斷為公庒收其租以省民需富民毆殺人獄以賄停華立斷論死時宰夏言以獄託華不從嗾巡按御史誣華激變逮繫詔獄發鎮江哭而送者幾萬人擁傳車不得行逮者愕眙且笑曰是可以為激變矣華至京上奏自辨世宗疑之而臺省亦多言其枉於是薄華罪罷為民家居十七載不入公府性簡靜寡合鮮交晚年蔬食不與飲宴年六十七卒莆田志參議黃以約先生文炳黃文炳字以約父敬甫明經修行里人敬之稱曰木齋先生文炳嘉靖乙未進士授南戶曹郎度支會計惟謹𣙜北新關務除細苛所入稅金下仁錢兩縣典出納關吏不得染指又以羡餘牒計司助餉商民感惠歷江西僉事參議文炳在江西久於分宜相無夤緣竟以罷免人稱其有守莆田志縣令宋斯齋先生效周宋效周字肇斯莆田人領嘉靖辛酉鄉薦由海陽教諭升和平知縣以德化民羣盜解散時制府徴令煩苛效周移書規諷遂被論劾致仕歸家絶迹公門教人以經書小學為常課謂嚮往須擇中守正造詣須積漸至精工夫須循常務實所著有悾悾子踽踽言日格子正俗編等書學者稱斯齋先生副使陳士仁先生祥麟陳祥麟字士仁嘉靖丙戍進士授東安知縣東安地狹鄰邉時詔徴土兵討田州所過騷掠祥麟搜剔弊蠧犒餉具而民不擾嘗修學宫作社學毁淫祠改諸佛剎為書院以亷能調麻城足疾疏改湖州教授主江西文衡所得多名士遷南京刑部主事常提獄命人灑濯囹圄不深錮諸囚囚甚德之歷員外郎中出守姚安郡雜夷難治祥麟約以威信靡不輯服母喪服闋補南安或有諷祥麟稍稍為子孫計者祥麟艴然曰昔人遺後世以安吾豈欲置之危哉嘗自言吾自筮仕以來未嘗置一人於重辟及謫戍者其亷慎仁愛類如此擢山東提學副使至則崇禮教作士氣每閲諸生文義必為之芟削改正以積勞卒於官士林傷之同寅檢行槖蕭然各捐俸為賻所著有四書詩經正蒙行世莆田志郎中陳宜昌先生言陳言字宜昌觀七世孫少敏博精尚書嘉靖丙午鄉薦第八人明年會試第四人肄政禮部時泰和歐陽德為宗伯深器重之屬吏部補其縣令言悃愊簡易奉職循理不喜矯飾逢迎以媚大吏大吏有索賄不得深嗛之者遂乞改學職得湖州教授二年遷國子博士轉禮部儀制司主事教習駙馬都尉故事都尉率驕貴易其師師取具員而已言抗顔臯席人咸重焉越明年太宰李默被讒死言亦坐鄉故謫郴州同知已移守泰州徴拜南京刑部員外晉郎中無何免歸言性真率無他腸不習巧宦居家以孝友稱嘗修葺先世祠塋恤宗戚貧乏而撫其孤寡行敦本原所著有尚書講義六卷怡老堂存稿四卷石溪儷語二卷以子經邦貴進階一級贈吏部左侍郎兼侍讀學士莆田志郡守林孟鳴先生兆珂林兆珂字孟鳴富孫嘉靖壬戍倭陷郡城與兄兆瓚俱被縶倭刃磨兄頸兆珂以身翼蔽倭義釋之萬厯甲戍進士授蒙城知縣改儀封教授升國子監助教轉博士監丞任成均七年董宗伯其昌范少卿允臨皆所取士升刑部主事歷員外郎中為大司冦注律例二十卷出為亷州太守丁內外艱補衡州又補安慶十年三典大郡歸之日囊無餘資先是祖富總制兩廣奏罷採珠之令亷人德之兆珂至先以太守行有司祭禮次日以諸孫行家人祭禮亷人榮之因作採珠行以歌祖德所至禮名宿拔寒畯然性諒直不能婉曲事人辛丑大計後假歸遂為終焉之計家居二十載鍵戶讀書丹鉛不輟所著書宙合多識二種其最著者又有批點左傳檀弓考工參同契楚詞李杜王摩詰選詩諸書刻林艾軒楊升菴陳山人諸集皆行於世平生篤友誼故人有鄭某者老而無嗣兆珂為營葬於松嶺之麓嵗時祭掃必率其子姓酌酒酹之所著書成恆令布衣人撰序曰古云名譽不聞朋友之過吾將以樹其名也故一時文士多歸之莆田志布政林仲清先生澄源林澄源字仲清嘉靖己未進士授戶部主事遷員外郎中出為貴州參議屬水西安酋亂當事者方議用兵而澄源以蠻夷叛服靡常勦孰與撫便已而出兵殺傷過當卒用其言撫之事遂定逾年晉按察副使備兵威清即用前所撫酋授以方略寇發輒誘禽之滇黔宴然晉參政鎮威清如故鄒進士元標以論劾江陵戍羅施道由境上澄源與盤桓彌日人或危之澄源曰昔徐晦越鄉而别臨賀后山出境而見子瞻彼何人哉吾分已定即緣此得罪吾固安之因名其菴曰定菴後以廣西按察使覲畢轉四川右布政乞終養歸歸後言者復摘其馳傳事中之則猶江陵之為也居家孝友恬靜部使者交章論薦竟不起著有悟往吟及經傳講義莆田志林懋勛先生兆恩林兆恩字懋勛富孫生有異質年十三好袖金散給貧人母詰之曰損有餘補不足天道也既補弟子員試皆髙等已遂棄去鋭心學道嘗憂正學榛蕪世趨二氏謂二氏之粗者吾儒所不屑精者不出吾道之範圍遂合三教而發明之著書積數百萬言大要以三綱四業為本歸儒宗孔為急隨在奬勸凡士農工賈緇衣道流人人厭其意而去時倭薄郡城會衆募兵却之又飢旱洊臻發粟拯濟賴全活者甚衆城陷後埋胔掩骼不遺餘力人尤德焉天下名流耆宿讀其書者無不降心北面願為弟子書幣之請殆無虛嵗其教人先從治病始以此小試非其極也學者稱為三教先生莆田志參政盧鉉卿先生廷選盧廷選字鉉卿萬厯壬辰進士知滄州鋤姦摘伏獄無滯訟時方興橫海舟師大軍出於滄供億驛騷少不給則立糜廷選馭應有方無敢譁者巨璫挾稅柄凌轢州郡廷選以民艱抗議詞色從容璫慙沮而戢歷工部郎中出知南昌府南昌故多才廷選集士課文諸生呈藝與爰書並列几案間剖決品藻無不各厭人意者修東西二湖堤弛漁利以豫民歷江西參政議減宗祿就各宗現在之折額以均惠於待封之子孫時用其䇿諸邸悅從著為令尋以蜚語解組去家居數載復起為湖廣參政修城垣繕干掫為固圉計盜徐賓踰城剽巨室輿議以盜伏城中當排門大索廷選獨不謂然密遣邏逺地迹之盜果獲卒於官方病中檄武昌嚴察郡獄多滯囚勢將有變殁數日而難作楚人以為神云所著有四書質義尚書雅言浴碧堂集莆田志劉徴仲先生文㿩劉文㿩字徴仲讀書秉禮授徒尚義與姪正隆交相愛敬即閫內亦無間言後正隆領鄉薦官國子博士歸冷署無長物可獻數以為言文暘曰青氊故物正獲我心郡守王弼髙其行數造廬請見旌其門曰一鄉善士卒年八十九莆田志劉陶九先生堯章劉堯章字陶九讀書百原山中因以為號少便超超異行輩為文沉思入微幾廢寢食未幾閩亂遂挈家入寒山僦居何巖之麓專意聖學靜坐三年已而入百原刻意堅苦理數象緯靡不推究而返之躬行常曰涵養工夫全在應事接物上簡律一身不敢自恕意念間稍有愆違輒正色危坐終日會山中寇亂欲屠兩寨堯章挺身出見皆賴以全衆德之歸田以謝堅却之居家孝友與兄共㸑無間言時兄有子五人堯章子二人及析箸以所遺産分為七五與兄而自取二焉曰吾不忍令吾兒獨豐也人咸義之性和易近人及義之所在毅然為之嘗讀春秋傳注頗疑其鑿後得湛甘泉正傳曰此可以知聖人之心矣乃下榖城與舊友商訂成書未就而疾作將革命取陳白沙示門人六絶吟咏者再點額而逝莆田志副使陳鳴周先生騰鳯陳騰鳯字鳴周萬厯丁未會試第二人授開州知州州多巨憝習弓馬乘突騎要截行劫商旅畏途騰鳯亷其實以計誘得巨魁立殺之自是賊徒屏息澶淵久困水患騰鳯設法隄防民得安堵丁內艱服闋補禹州復調太倉州婁有隱糧七千五百餘石或為田衝蕩或為漲混者民困於輸供騰鳯不避勞怨逐一洗刷遺纍灑然升兵部員外郎出為河南提學僉事秉公矢慎首拔者悉皆入彀有河洛九十元魁卷鐫行於世部覆稱最加銜再任轉浙江糧儲副使勤運挽部推卓異離任日却羡金三千盡充公儲乞歸養冡宰趙南星覆疏云人方仰其有守而有為本官則已知止而知足家居二十載杜門守靜所著有四書講意尚書要言及靜虛齋集卒年七十二莆田志孝亷林燕公先生尊賔林尊賔字燕公莆田人崇禎壬午舉人肆力於六經諸史百家著春秋傳於三傳外别有發明又以禮記附會成書乃翻去陳言著為評定復取朱子未成之志合三禮而通之綴文成類共得十篇名曰古禮當然一時倪元璐張溥陳子龍錢肅樂輩皆折節下之計偕入都值闖賊陷京與從叔説同矢殉國著有鴈園集四卷莆田志林雨可先生承霖林承霖字雨可幼時為諸生即以古人自期入麥斜巖潛心理學家貧妻子藜藿不飽絶不為意山中人皆呼曰林先生與同郡謝天駒同彚次莆陽四編行世天駒字山子擕家入山置書數千卷吟咏編摩於名利視之漠如也莆田志鄭牧仲先生郊鄭郊字牧仲博學能文幼嗜經史長以著述自任家雖困乏意豁如也補郡弟子員為督學郭之竒李長倩所賞識拔置第一嘗謁銅山黃道周稱之曰鄭牧仲一日千里未易材也雲間夏允彛徐孚逺皆與定交已居壺山之南泉遂號南泉居士未嘗一至城市著書甚多注易十七卷廬陵知縣于藻為之刋行尚有史統百四十五卷及南華十轉氷書折衡偶筆寓騷孝經心箋及雜詩文若干卷藏於家弟郟邑諸生好學博識與郊齊名督學李長倩首拔食餼安貧樂道所著有皆山集及易測詩史和陶廣騷春秋表微諸書門人郭鳯喈字友日衛庠生性髙潔工詩著有郭子詩草莆田志閩中理學淵源考卷五十六
