body:
  text: 閩中理學淵源考卷六十二廣平府知府李清馥撰孝亷王一臞先生宣趙本學先生建郁林雲衢先生福學派按一臞先生為古愚趙先生壻而虛齋蔡先生門人也考本傳并林氏次崕撰文集序皆載其髙明之資能發明師旨其所心許往復者林貞肅黃蓮峰顧新山聶雙江一時名德也曽為一峰書院山長所造士亦多今考門徒僅見月洲兄弟餘寥落矣李氏杜為俞虛江都督行紀載先生與趙氏建郁林氏福皆得虛齋易學之蘊而俞氏大猷為三先生門下士雖以武略顯著實儒林中之傑然者也今録附之孝廉王一臞先生宣王宣字子鍾晉江人生而廓落豪邁薄於勢利受業蔡文莊之門持論正大確守師説間有所發明嘗論學者合朱陸為一便非真知蘇子瞻之文精神氣骨剛而無餒其極詆新法為小人所忌惡瀕死不悔合於孟子養浩然之氣朱子以蘇張擬之未為確論領𢎞治十七年鄉舉會試不第遂養親為志終身不復應舉郡守顧可久建羅一峰書院特延主教事林次崕稱其自得之學不滯於章句絶俗之行不混於塵俗薦之於朝不赴卒道南源委舊郡志趙本學先生建郁趙建郁字本學别號虛舟本宋宗裔世居晉江為蔡文莊髙弟結廬鍵户悉心著述著有周易學庸説杜詩注參同契釋且謂升平日久人罕知兵因即易演為陳法彚集韜鈐內外篇凡七册解引孫子書凡三册藁就封識以俟其人都督俞大猷往受學焉閩書林雲衢先生福林福字雲衢晉江人事實未詳按王氏慎中祭雲衢文曰披褐而玉在懷尚絅而錦為衣含真蘊以內足胡外物之可希偉哲人之髙尚豈世網之能羈藏道德以厄窮厥心亨而志違抱遺經以俯仰每朝哦而夕披鑽有堅而必入探無賾之不窺時發揮於口頰飄玉屑而泉霏愚入由之智出虛往莫不實歸邁年齡猶不倦獨懷此其何之嗟及門之吾黨辱刮視而提攜遵所聞之不及力嵗冉冉以漸馳悵儀型之一失將日逺而日非李氏杜為虛江行紀曰泉中一臞王先生宣雲衢林先生福虛舟趙先生本學俱一時名師博雅方正受易蔡虛齋先生者也王先生常即易以論古今治亂興衰之迹林先生常即易以明心性忠孝仁義之奧趙先生常即易以衍兵家竒正虛實之權俞虛江皆師之云王遵巖集清源文獻武襄俞虛江先生大猷俞大猷字志輔别號虛江晉江人大猷貌朴辭蹇忠誠自許動擬古人少好讀書為諸生時從王宣林福趙本學授易得虛齋之傳而本學能即易衍兵嘗謂兵法之數起五猶人身有五體雖將百萬之兵可使合為一人也已又從李良欽學劍家貧屢空意常豁如父殁棄諸生嗣世職舉嘉靖十四年武會闈第五人時毛伯溫征安南上書陳方略請從軍擢正千戶守禦金門用儒飭治二十一年會敵入山西詔天下舉武勇士御史上其名兵部會伯溫為尚書送之宣大總督翟鵬所召見論兵事大猷屢折鵬謝曰吾不當以武人待子下堂禮之驚一軍然亦不能大用大猷辭歸伯溫復為請授汀漳守備涖武平作讀易軒與秀士講易論文而日教武士擊劍連破海冦康老等俘斬三百餘人升廣東都司僉書平新興陽春恩平陽江四縣洞冦二十八年閩海冦張甚巡按朱紈奏遷福建為備倭都指揮會安南叛將范子儀入冦欽廉兩廣巡撫歐陽必進奏留廣東臨行新興人扯衣遮擁奪肩輿不得發者纍日乃單騎夜半從間去用舟師邀擊俘斬千餘級子儀遁還檄莫浤翼捕之函首以獻事平嚴嵩抑其功不敘但賚銀五十兩而已是年瓊州五指山諸黎共反必進復檄大猷討而朝議設參將於崖州即以大猷任之擒斬賊五千三百有竒招降者三千七百大猷言於必進曰黎亦人也率數年一反一征豈上天生人意宜建城設市用漢法雜治之必進納其言大猷乃單騎入洞與黎定要約海南遂安三十一年倭冦浙中諸郡急遂改浙東參將提督王忬議招撫大猷曰明公督師滅賊當堂堂正正為天下先大猷請用閩中樓船為明公破之遂與參將湯克寬入海擊賊敗之乃議逐倭當用樓船出海與戰整搠河船防賊入港計數年之費為一大舉勢可盡絶忬用樓船屢破倭而整搠河船之議竟不行三十四年升南京副總兵時松江柘林賊盈二萬連年不能討總督張經欲急戰大猷謂急擊必不勝宜調楚粵兵剿之兵未至朝命侍郎趙文華監軍怒經不戰劾其玩冦頃之兵集大猷大破賊王江涇經亦用河船計多獲賊復敗賊陸金􅄵奏捷未上文華劾先至世宗大怒論經死大猷奪職會倭至日熾公卿臺諫皆薦大猷可用明年起為浙直總兵連破賊於吳淞江口營前沙茶山諸處移鎮定海乘雪焚舟山賊巢進署都督僉事復署都督同知海上無警者二年而世宗怒王直為倭嚮導必欲得而殺之總督胡宗憲使人誘直直有歸意求貢市副總兵盧鏜請許之兵部郎唐順之主其説大猷不可宗憲竟使鏜迎直既至下之獄俟命倭怒宗憲紿之其黨焚舟走柯梅人殊死戰夜乘船入閩閩巡按將劾宗憲宗憲委罪於大猷旨逮詔獄軍民大譁大猷笑曰吾自處在中庸之十四章矣至京都御史周用避正堂館之諸御史皆來會曰公之功髙我輩當為上言之徐相階亦為保持得發大同立功大猷謂倭東南小醜耳北敵乃不決之隄欲自見生平而勢位未可為乃陳於總督李文進製獨輪兵車止可營行可陳推挽上下強弩神銃能擊堅及逺而簟笰龍盾敵弓矢弗能加也文進試之用車數十輛步騎數百人挫敵數萬於安銀堡遂以其制聞於朝京師置兵車營自此始也會湖廣巡按黃光升言大猷用兵如神不宜置之散地乞補臣所部裨將詔授鎮筸參將四十年劇盜張璉聚衆數萬攻陷江閩諸州詔江閩廣三省會征之用師二十萬復以為南贑參將督兵進剿時三省尚屬胡宗憲節制悔前失一聽大猷之所為連戰皆捷璉就擒諭散其黨不戮一人乘勝攻林朝義殺賊二千級論功賜金升副總兵鎮守南贑汀漳惠潮尋進總兵都督同知大猷請置縣五嶺間以善後朝議增置平逺一縣四十一年閩山海冦無慮數十萬巡撫遊震得請以大猷控制全閩廣江湖數道命未下其冬倭陷興化城明年春大猷馳至與劉顯威繼光滅之移鎮惠潮時海冦吳平與倭通諸山冦亦起詔使閩廣會征久之廣兵不至平遁去御史論罷大猷總督吳桂芳疏言大猷可以將别將别將不能將大猷遂得留乃分兵五道征之俘斬萬餘會古田酋韋銀豹黃朝猛入廣西省城劫藩庫殺參政桂芳復請用大猷詔復都督同知佩廣西征蠻將軍印是為隆慶二年時總督兩廣談綸移鎮薊遼上書乞大猷與同練軍破敵而繼綸者張瀚復疏留經略海冦大猷謂當造舟募兵於閩瀚曰舟成賊遁奈何大猷曰其勢擁腫遁將何之明年舟成旬日三捷賊首曽大本就擒兩省論功皆居首乃移征古田以十萬人分七哨誅朝猛擒銀豹破堅巢百餘上功於朝改縣為州升南京都督僉書旋移鎮福建會副使鄧之屏撤禦倭兵以討彭湖倭突入烽火寨殺把總御史論大猷坐免官大猷終不言之屏時綸入為兵部尚書大猷貽書曰某生平志在塞北而見用江南乖違本素今年七十餘老矣公許我大受此其時也綸疏起為後軍都督僉書以大同制車法上之朝曰禦北之法非車不足以戰古人制字曰軍曰陳曰轅之類無不用車者馬隆依八陳作偏廂車偏扁也詩曰小戎俴收即車之扁小者俴而收之也蓋取其任載不多而得便旋之用火器衣糧之屬皆可具焉時王崇古協理戎政請専委大猷訓練三年有成方欲推之九邊適綸卒歎曰無同吾志者矣亦乞歸尋卒賜祭葬贈左都督大猷在軍風角占候遁甲皆所不信潛心學問起基卑邇以為實修當世士大夫深於道者莫及也至其雅量鎮俗東晉風流或亦讓焉輕財好施同郡待以舉火者數十家平生推奬歐陽深鄧城湯克寬陳第有國士之風薦挽不遺餘力李氏杜曰公為將未事之先則必周萬全之算既事之後則每垂悠久之慮其周萬全之算以底事成績則古之名將蓋多有之其垂悠久之慮以勘亂興治則其用心非儒者不能也公儒者也於安南瓊黎東倭北敵三苗五嶺皆有善後之策可百世因之蓋得易先庚後庚之意文王之所以治蠱者也固守宋儒傳注不為他説所易聞佛老之論疾之如仇不與原讞非若於他無大利害得失者心雖非之而口不諍也直截簡易灑落快濶不為町畦畔岸卑已而尊人有容而善忍視死生若寄興替若環橫逆不能干憂患不能入也重忠信篤親親功則稱人罪則稱已寧人負己無己負人力以忠孝自任老而彌篤談氏綸嘗與書曰節制精明公不如綸信賞必罰公不如戚精悍馳騁公不如劉然此皆小知而公則堪大受又嘗疏薦於朝曰大猷秉仁懷義篤信好學老成持重口不談功心惟在國衆言並起順受不辭事勢難為慷慨獨任吉甫方叔趙充國郭子儀之流亞也世以為知言所著有正氣堂集及劍經行世子咨臯官福建總兵明史閩書清源文獻新郡志藳閩中理學淵源考卷六十二
