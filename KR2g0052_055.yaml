body:
  text: 閩中理學淵源考卷五十五廣平府知府李清馥撰訓導劉子賢先生閔學派按劉先生閔在成化𢎞治間一時師友極盛而與鄭公紀切磋最篤者也攷鄭東園遺事謂鄭公與劉子賢先生隠雲洞山中玩易攷禮主静慎動以求至道一時名士翕然歸仰泉南陳剩夫每來留閲月自言得見鄭子方覺荒踈修撰羅一峰謫官泉州往返必約鄭氏於風亭僧舍講論數宿曰東園學問心得為多又攷虚齋蔡文莊亦寓書子賢皆企其實踐工夫儒效修著非空言者於時諸公皆一代之英並世而起其出也有鳯翔千仞之槩其處也有潛龍不㧞之貞詳攷所立皆涵養深淳原本經術追溯乎乾淳講學之盛無媿也迨後新説繁興講席互設而窮經實踐之意㣲嗚嘑師友傳述盛衰之運可以觀矣訓導劉子賢先生閔劉閔字子賢莆田人㓜有至性少長知學即絶意科舉凡禔躬訓家必以聖賢為法祭祀奠獻一遵禮經以父柩及祖母柩未𦵏遂斷酒肉逺房室雖授館鄰邑而朔望必歸哭殯所如是者三年鄰族憐之為之助𦵏婦失愛於母出之終身不復娶温凊定省疾不觧衣母或有怒則竟夕跪牀下副使羅璟立社學延閔為師提學周韋菴孟中捐銀助養太守王弼每遇祭祀必延致齋所曰此人能消鄙吝豈減黄叔度耶亦置田資之閔并受不却及母卒即送田還官廬墓三年嵗凶弟婦求分異闔戸自撾感悟復合𢎞治中林貞肅俊言其恭慎醇粹孝友髙古徳宇道風自覺難比願禮致入侍東宫必能涵煦薫育有所裨益不報正徳元年詔授儒學訓導所著有家禮考註昭穆圖宗子説五倫啓䝉孝經刋誤等書温陵蔡文莊曽寄書畧曰觀先生所自待斷斷然實地根本工夫一掃却許多煩冗枝葉愚意今日大勢如此匡治之計須是先生輩出身也然雖未即出易之損九二曰利貞弗損益之盖言雖未為時用然其弗損所守如此則所以益於上者亦既多矣而况又有所謂子弟從之則孝弟忠信者乎小兒存畏今年九嵗矣家父母留在膝下去先生纔百餘里而未能即時遣詣門下以供灑掃途中徒為念之耳道南源委蔡文莊集司徒鄭廷綱先生紀鄭紀字廷綱仙逰人南湖淑之後舉天順庚辰進士為翰林庶吉士授檢討與謝一䕫劉徤周經張元禎諸公講性理之學以經濟相許其為文章披竒剔怪瀾立星回深博藴藉益探以有憲宗登極上太平十䇿以親老引病歸養父沒哀毁骨立知府以金助𦵏謝不受喪畢廬墓讀書與孝子劉閔泉南陳剩夫相往來修撰羅倫謫官泉州亦時㑹聚講論倣義門家規藍田鄉約朱子義倉以濟族睦鄉家食二十餘年再起供職遷浙江提學副使令諸生兼讀五經白文行鄉射革浮屠毁淫祠孝宗登極上疏勸御經筵近儒臣論聖學以正心為要言甚切至有㫖嘉納召為國子祭酒監規嚴正師生凛然國學有膳餘銀千兩典簿以常例奉紀曰膳為監生何與祭酒悉歸官同官謂紀形其短銜之紀固以前輩自處遇科道官不能折節為禮因相與攟撫其事論劾之孝宗謂紀任未乆何遽有此令條析以聞改南京通政司左通政七年陞南京太常卿武宗在東宫行冠禮紀采古今帝王嘉言善行凡百條各繪圖作贊名曰聖功圖表啓以進且言皇太子當近正人聞正言不可與儇薄内侍逰上優答之陞南京戸部侍郎適南畿災紀以漕米權宜水兊積出餘米二十餘萬石賑濟又將月糧放支本色以平米價奏革京儲冗食鹽鈔攬納之弊皆有惠利及人然竟以前論踵襲言者不已紀亦屢疏乞休十七年進南戸部尚書致仕卒年七十六遺命請劉閔治喪勿乞𦵏祭訃聞賜𦵏如故事有奏議四卷聖功圖十卷歸田録八卷文集前後續别五十卷子主敬主忠主忠䕃補夀州同知守官飭簠簋而歸田好施祀鄉賢閩書莆陽文獻主事柯希齋先生維祺學𣲖主事柯希齋先生維祺柯維祺字竒純號希齋莆田人㓜靈頴希慕古哲林貞肅陳孝亷雅重之弱冠領鄉薦登嘉靖癸未進士出黄文裕佐之門文裕語人曰異時無忝鴻儒柯氏子也授南戸部主事時年二十六即移疾歸烏石山中聚舊業而紬繹之别淆亂訂是非㑹萬於一及門之士先後至四百餘人傳授靡倦要以躬行為先慨近世學者樂徑悟而憚積累竊禪家之説以掩孤陋作左右二銘明其意著講纂二卷以辨心術端趣向為實志以存敬畏宻操履為實功而其極以宰理人物成能天地為實用至於為學次第懇懇致意於誠之一字謂心與理一之謂誠言與行一之謂誠終與始一之謂誠盖允蹈之也録所答問釐為心解學解經解上下傳解史解六卷多儒先所未發著宋史新編共二百卷閲二十載而成書作史記考要十卷凡司馬之譏評爽實班氏之増損乖義少孫之補綴亂真諸儒之紀載異同胥辨正之而天文厯律發明尤詳又以莆陽文獻自嘉靖以來屢經兵火懼其遂湮乃撰次為二十卷以接山齋鄭岳之筆曰續莆陽文獻志與宋史新編俱以三品論人謂求道徳之士於三代之下必欲如古聖賢難矣但能忠信亷潔以禮義為進退以名節自砥礪此其根本也根本既立雖乏功業文章不足為病根本既喪即富貴功名鄙庸人耳何足取哉别著詩文集十卷續集四卷雜著二卷居常絶迹不入官府矢志清修力耕節用躬韋布之素有餘則推以佐親黨遇倭亂廬毁於冦鬻田以築小室日危坐其中接人無戲言無茍笑聞人之短蹙然必為之諱朞功不與飲燕口惟蔬食菜羮而已卒年七十八學者稱希齋先生雒閩源流録明名臣言行録閩書興化府志主事卓起巖先生居傅學派攷之志乘林貞肅公奬藉人才最盛其一時説經諸師席公皆勤懇而親炙之為鄉邦倡率為後進典型其風俗醇篤有由來已主事卓起巖先生居傅卓居傅字起巖莆田人精於經學開館鳯山執經問難者前後數百人以鄉薦授金華訓導教廸有方青衿競奮登正徳十二年進士賜歸省一時士類競趨其門林貞肅俊方簡肅良永時過講堂與之談𣙜文義所著有書經四書臆説學者宗之終刑部主事門人太守鄭弼為之起墳道南源委莆陽志郡守鄭諧甫先生弼鄭弼字諧甫莆田人嘉靖癸未進士歴工部郎中出賑江南全活甚衆𣙜税蕪湖亷平有體遷雲南知府釋江洋株連之辟平木邦宣撫之亂年四十以親老致仕至九十三卒莆陽選舉志簡肅方夀卿先生良永方良永字夀卿莆田人𢎞治三年進士督逋兩廣峻却饋遺為布政使劉大夏所器還授刑部主事進員外郎擢廣東僉事瓊州賊符南蛇為亂大夏時為總督檄攝海南兵備㑹師討平之御史坐良永失利大夏已入為本兵為白於朝賚銀幣正徳初父喪除待銓闕下外官朝見畢必謁劉瑾鴻臚導良永詣左順門叩頭畢令東向揖瑾良永竟出或勸詣瑾家良永不可及吏部除良永河南撫民僉事中㫖勒致仕既去瑾怒未已欲假海南殺人事中之刑部郎中周敏力持乃不坐瑾誅起湖廣副使㝷擢廣西按察使發廵按御史朱志榮罪至謫戍遷山東右布政使旋調浙江改左錢寧以鈔二萬粥於浙良永上疏曰四方甫平瘡痍未瘳浙東西雨雹寧厮養賤流假義子名躋公侯之列賜予無算納賄不貲乃敢攫民財戕邦本有司奉行急於詔㫖胥吏縁為奸椎膚剥髓民不堪命鎮守太監王堂劉璟畏寧威受役使臣何敢愛一死不以聞乞陛下下寧詔獄明正典刑並治其黨以謝百姓寧懼留疏不下謀遣校尉捕假勢粥鈔者以自飾於帝而請以鈔直還之民隂召還前所遣使寧初欲散鈔徧天下先行之浙江山東山東為廵撫趙璜所格而良永白發其奸寧自是不敢粥鈔矣寧方得志公卿臺諫無敢出一語而良永以外僚訟言誅之聞者震悚良永念母老恐中禍三疏乞休去世宗即位中外交薦拜右副都御史撫治鄖陽以母老再疏乞終養都御史姚鏌請破格褒寵尚書喬宇孫交言良永家無贏貲宜用侍郎潘禮御史陳茂烈故事賜廪米詔月給三石乆之母卒詔賜祭𦵏皆異數也服除以故官廵撫應天即家賜勅至衢州疾作連疏乞致仕未報遽歸卒卒後有南京刑部尚書之命暨訃聞賜䘏如制諡簡肅良永侍父疾衣不觧帶者三月母病良永年六十餘矣手進湯藥無少怠居倚廬哀毁稱純孝焉素善王守仁而論學與之異嘗語人曰近世專言心學自謂超悟獨到推其説以自附於象山而上逹於孔子目賢聖教人次第為小子無用之學程朱而下無不受擯而不知其入於妄弟良節官廣東左布政使亦有治行子重杰舉於鄉以孝聞學正林致之先生學道學派按明代莆陽諸前輩多治尚書致之林公精熟是經嘉靖乙酉督學邵公鋭延請於三山主教恭敏馬公實師承其説焉時三山鮮習是經故邵公特延致之余攷之經籍攷馬恭敏之子歘序尚書敷言云再攷公從學於蔡王二先生其平日為學大㫖未知如何至恭敏馬公之學閩書并蔣氏閩學源流皆以為宗程朱之學者學正林致之先生學道林學道字致之莆田人體不勝衣言不出口而向道甚勇義利之辨甚嚴終日正襟危坐非寢不脱巾履初從蔡文莊受學復之江西從王文成訂良知之説嘗㳺呉下有僉事某者延至其家既而聞其居喪宴㑹曰非吾徒也遂去之督學邵鋭選取閩中於㑹城書院分經擇師學道與焉司徒馬森其及門士也徐文貞階謫延平願請一見竟不造門至嘉靖間以貢授都昌訓導文貞亦督學江西喜曰吾今得見林致之矣為題像曰顔勤閔孝柴愚參魯若在聖門依稀參伍終無為州學正卒學者私諡曰貞修先生所著有原教録二卷道南源委莆田志王侃齋先生學派王侃齋先生闕陳碩飛先生鳶陳鳶海澄人字碩飛㓜讀書與兄英及中表林浩相友聞莆陽王侃齋以道徳淑人相與負笈從之既歸以禮自閑築室家廟之旁非弔喪問疾不出倦時或散歩郊原悠然自賞藝圃必正樹菓木必直而方對夫婦如嚴賔延納士流温和可掬時以正言格論誘人所交林克諧夫婦染疫暴卒無敢至者鳶奔往經紀其喪嘉靖丁巳㓂掠月港焚毁悉盡惟鳶居無恙郡丞許鑰聞其名餽餉不受海憲周賢宣至澄訪之鳶使家人辭曰某𨽻居編民有公事召無相見禮不敢見疾革命弟子以喪禮危坐而逝閩中理學淵源考卷五十五
