body:
  text: 閩中理學淵源考卷十三廣平府知府李清馥撰清漳黃氏家世學派按叔燦先生寬緩死獄論者謂有陰德知其後必大者也今考諸子世濟其美斌斌乎儒雅之林矣漳浦文勤蔡公纂漳郡志獨列公為世學餘莫並焉可知其淵源逺矣少師黃叔燦先生彥臣黃彥臣字叔燦龍溪人弱冠登治平四年進士初授南寧簿宿州録參歷知長汀南安二縣倅泉廣二州守莆汀劒建四郡官至朝散大夫纍贈少師彥臣倅郡時獄鞫强盜守欲亟置之法彥臣疑其寃故緩之果獲真盜時鹽禁甚嚴私販者至百斤論死在汀日有販鹽被捕至者計斤當死彥臣置鹽郡庭不問久之鹽化為滷斤隨減百得以不死論劒建舊俗苦丁錢有生子不舉者後丁錢奏免以口食艱仍不舉彥臣乃令保正月報數於官給錢贍之後為定式彥臣教子甚篤嘗慮宦飬壞性每之官不令侍行諸子皆奮為聞人長子願尉晉江時造一肩輿以奉彥臣彥臣惡其侈焚之貽書切責云候歸日當夏楚之願覽書皇汗若無所容其清嚴類此有文集二十卷雜文數卷行世子七人願以世賞入官碩預頖頴連登進士顗顯并纍薦免省姪孫渙曽孫樵仲杰櫄皆踵世科各有傳清漳郡志朝散黃若冲先生碩黃碩字若冲彥臣第二子大觀三年以上舍生與弟預同登進士初調建昌教授外臺交薦自江寧刑曹纍官至朝散大夫年五十恬於仕進奉祠里居教授生徒筆周禮講義時遷學不利碩請復舊捐祠俸以倡之及卒郡守李彌遜祭以文曰隱居好學逺近慕之其陽亢宗之流乎不慕官榮優游卒歲其馬少游之儔乎時以為知言提㸃黃秀實先生頴黃頴字秀實彥臣第五子年二十四以上舍免省赴廷試時彗星見頴指陳時政無少諱忌及廷唱言彗不為灾者皆置前列頴附第四甲抑殿丙科調秀川崇德簿改應天府户曹未幾改吉水教授官纍遷至著作佐郎繼兄頴為樞密院編修官兼符寶郎時兄願為卿預入臺三人同朝奉魯國太夫人崔氏侍養時論榮之俄遷中書舍人方拜命有忌其才者出為提㸃江州太平觀頴溫恭亷介尤工書𨽻嘗書題名碑人爭摹焉有周禮解義春秋左氏事類行於世録參黃道夫先生樵仲黃樵仲字道夫預之孫彥臣之曽孫也淳熙五年與弟杰同登進士弟櫄亦以是年補入太學樵仲初調永福尉再調漳州録參俱有善蹟俸外添支一無所受自書屏云俸薄儉亦足官卑清自尊謝事歸每晨興率子弟衣冠見家廟退而默坐或至終日飲食衣服不求鮮美曰無過吾分居喪三年無笑容鄉里有為非者惟恐樵仲知之也鄧司諌守漳闢郡學行鄉飲皆請樵仲主之朱文公守漳禮請入學牒文稱其氣質渾厚操履端方杜門讀書不交權利若屈居教導必能使諸生感化興起及講小學書文公每稱善奉檄校文漕闈撤棘疾作卒之日神采自若文公遣倅經紀後事有禮記小學口義行世宣教郎黃實夫先生櫄黃櫄字實夫預之孫彥臣之曾孫也未冠賦南浦歌膾炙人口淳熙中補入太學未升上舍丁內艱歸服除參告隨中舍選以平等釋褐願對大廷尋遷舉録獻十論於相王淮丁未升進士內科臚唱之日朝士皆求識其面櫄家居及在太學受業常數百人由浙至廣名士多出其門初調南劒教官篤意教導日以龜山了翁勉勵諸生又闢貢院請諸臺閫以助其役嘉泰壬戌預考南宫尚書木公謂人曰經義非黃架閣不收詩三魁皆櫄所取衆賀得人金壇王遂卷已被黜櫄得之批云此必博洽竒特之士王與收謝曰遂終身何敢負先生時將有召試之命而櫄逝矣官止宣教郎有詩解行世有中庸語孟解文集十餘卷未刋士紳多藏之邵武上官氏家世學派考樵川和平里志序曰邵武縣之南鄉里有危氏上官氏黃氏萃於一里而上官氏尤盛自景祐至嘉定此三姓擢進士第者二十餘人歷官顯宦而傳子孫為世家榜籍迭書衣冠襲起者不可以數計也然以科目官職世家定榮瘁盛衰蓋近世俗人之論吾聞古之君子所謂沒而不朽者不在是也上官氏對䇿熙寧不附新法晚入元祐黨籍其子留守汴都不屈而死二公所立如此近於天下之善士矣豈特足以重其里哉按斯序為後村劉氏克莊筆其闡發所以世其家之義者警俗厚矣余採録其所述載之篇端龍圖上官彥衡先生均上官均字彥衡邵武人凝之子為兒時莊重靜默不苟笑語少長好學務知體要不為章句造次必以禮士友敬憚之熙寧三年神宗初革聲律崇尚經術命以䇿試士均入對數千言援引古今無所顧忌知制誥吕大臨直史館蘇軾擬均第一以䇿中論新法忤王安石意遂置第二授承奉郎大理評事北京留守推官大臣薦均經學通明授國子監直講元豐間賜對垂拱殿以察理明是非審官辨邪正為對尋改監察御史裏行時蔡確引猜險吏窮治相州富人獄誣法官竇萃等受賕無敢明其寃均是時方以確薦為御史奏乞移司根治未報明日又奏言確持刑刻深所辟官皆險薄請以獄事詔廷臣等參治疏入坐謫知光澤縣還監都進奏院擢開封推官元祐初再除監察御史時言者請兼用詩賦試士宰臣遂欲盡黜經義均言經術以理為主詩賦以文為主先帝去數百年之弊不為不難陛下臨馭之初正宜奬經術以堅學者之志進行誼以勵士大夫之操今遽厭經術崇奬詩賦逐華而遺實徇末而忘本固非細纍請令學者各占三經雜以論語孟子不必専用新義試䇿以二一問歷代一問時務章三上經術得不廢故事左右僕射入省閲訴牒多至數百又常程細務無不關白均奏言位髙者宜逸不逸不足以謀天下之大務位卑者宜勞不勞不足以理天下之庶務宰相位尊任重天下之事無所不總然所該者衆則力有不逮致詳於小則大有不及請以省中事務類分輕重尚書可以覽决者不必關二丞二丞可以覽决者不必關僕射又言治天下二道寬與猛而已熙寧以來諸路監司不能深明朝廷之意務為慘核刻深之法此傷猛之弊也陛下臨馭務從寬大比聞諸道監司又不能明陛下之美意一切以茍簡縱弛為事願明詔四方以寬不縱惡恩不傷惠之意詔下其疏布告諸路時蔡確弟軍器少監碩盜貸官錢以萬計獄具均請并正確罪以勵百官就遷殿中侍御史久之力乞罷臺職除尚書禮部員外郎元祐五年再授殿中侍御史中書傅堯俞左丞許將同樞韓忠彥因論事同異俱求罷均言大臣誼同休戚廟堂之上當務協和使中外之人泯然不知有嫌疑之迹若悻悻講論不顧事體何以觀視百僚有詔令就職會中丞蘇轍黨吕大防排許將均言吕大防堅强自任每有差除同列不敢為異惟許將時有異同轍素善大防盡力排將期於必勝臣恐綱紀法令自此敗壞乞加蘇轍妄言之咎章四上不報遂居第待罪詔以均補外大臣指均為朋黨當黜宣仁太后曰上官均無罪遂出知廣德軍紹聖初召拜左正言是時大防轍已罷政均疏大防六罪章再上大防遂斥宰相章惇欲專政柄陰去異己者出吏部尚書彭汝礪知成都府而召朱服為中書舍人均上疏力爭忤惇意汝礪降職知江州均提㸃京東西路刑獄徙淮南東路刑獄遷梓州路轉運副使知越州徽宗即位拜起居郎入對陳治道四要建中靖國元年纍遷給事中上疏忤旨未幾紹述說興均復不從忤執政意遂以龍圖閣待制出知永興軍徙知襄州尋入元祐黨籍奪職主管江寧府崇禧觀政和間復龍圖閣待制抗章告老遷朝請大夫以待制致仕卒年七十八贈通議大夫詔揚州給葬事纍贈特進均天資剛方以忠義為己任四為御史一在言省三以言黜恬不為愠家庭循循孝友自奉清約闔門百口欣欣如也崇寧初以宫祠廢居淮南幾二十年處之夷然杜門無他嗜獨寓志於書寒暑未嘗釋手學博而知要非聖哲之書弗好也為文簡古精詣晚年詩益間放有陶謝風格既卒家無餘資待親朋之賻始克斂待朝廷之恩賜始克葬平生著述亦多所著有曲禮講義二卷奏議十卷廣陵文集五十卷子四悃憺愔悟閩書宏邵武府志簡録州守上官仲雍先生愔上官愔字仲雍均次子政和二年進士纍官大學正髙宗即位改宣教郎召至行都差充提舉巡行事務所幹辨公事二帝北狩愔上書相府請勸車駕入京欵謁廟社慰安士民遴選統帥搜簡士卒以圖興復又上相府書論朝廷之宜建炎中纍除吏部員外郎以親老丐祠紹興五年除知南劒州九年召赴行在以親老力丐祠轉朝請賜五品服尋卒愔剛介有聲其守延平去鄉不逺親故莫或敢詣代還抵家俸用己罄矣為文清簡援筆立就尤工於詩典雅遒逸有尚書小傳論語孟子略解及史統史㫖中大夫上官閎中先生恢上官恢字閎中均再從子也勵志學問纍知南劒州移徽州州當兵燹後瘡痍未起恢專以仁愛為治多所寬貸晚丐祠里居有過其里者指以相示曰此熙豐名儒也胡安國上書宰相言恢諳歷世務端重有守與楊龜山時同薦於朝積官中大夫封歷陽縣開國男食邑三百户子模柷曾孫渙酉渙然基從曽孫損閩書郡志修撰上官仲達先生悟上官悟字仲達均季子以父蔭纍官轉運使建炎三年留守東京劉豫叛降金金以豫節制京東兵馬遣人說悟使降悟斬其使豫賂左右說降悟復斬之金兵攻東京益急力不能支城陷死焉贈朝散大夫右文殿修撰官其後五人司農丞上官文之先生渙然上官渙然字文之早有文名尤留意性學首悟太極之㫖分解圖畫以授同志紹定六年以渙酉禋霈補將仕郎就授迪功郎調鄞縣尉不畏强禦務直民枉為權門所擠後為無為軍録參淳熙元年擢進士就辟准備差遣元兵圍安豐制閫委渙然巡視江南犒師上流圍解進階尋辟河東幕督運吳門僅閲月運米六十萬石右丞相趙葵制使吳淵皆一見偉之纍遷戎簿陛對首言正君心明君道培善類以壯君子之脉容直言以申公道之氣次言邊事深以玩敵為戒條陳守邊三䇿以獻改胄監簿尋轉朝奉大夫未幾與祠歲餘差知邵武軍以鄉井乞回避除司農丞遷右司郎旋主管建康府崇禧觀卒渙然孝友剛方入仕三十餘年家無餘財提㸃上官仲立先生基上官基字仲立恢曽孫乾道間以父蔭監建康倉調興國丞會歲歉當賑令欲候報基曰民難久待有譴身當之即計口賑給逺近皆得就糴調衡州推官丞相趙汝愚謫零陵道經衡陽卒時韓托胄用事沿途迓送者皆獲譴臺司略不敢為汝愚營辦基毅然獨經紀其喪悉如禮制郡守錢鍪上其治行除四川茶馬又欲辟基為屬不就遷提㸃鑄錢檢討官卒於官葬時汝愚子崇度適來守邵武遂臨穴哭奠子銓好學能文郎中趙崇憲以忠定登槐恩奏授登仕郎通志郡志推官上官安國先生謐上官謐字安國為學務求義理不事章句既而從朱子遊益加涵養以祖蔭授會昌尉調永州推官簡易不深刻永人懷之遷四會令通志志邵武府邵武黃氏家世學派按簡肅黃公德望忠規一時朝野企重朱子往長沙時造門晉謁至納拜願為弟子之列考其家世積學相承而母太君游氏為文肅定夫先生從妹文肅乃程門髙弟為學者所宗太夫人每語公等曰視乃舅而師法之足以為良士矣故公未冠時文肅特愛其厚重手書為夫人賀是公之淵源所漸固有本末可考者也再按文肅游先生卒於宣和五年朱子於文肅墓志簡肅是年已二十有八又考朱子語類李閎祖録云游定夫有論語要旨黃簡肅親見其手筆觀此則簡肅於文肅親承緒論非一日矣餘已詳游氏學𣲖矣兹著簡肅家世焉簡肅黃通老先生中黃中字通老邵武人幼頴悟端重少長受書不過一再讀退輒默然危坐竟日問之則皆已成誦矣未冠從舅御史先生游定夫愛其厚重手書為夫人賀踰冠入太學汴城失守張邦昌受僞命公即日出居於外既邦昌果遣學官致僞詔藥物勞問諸生公以前出故獨無所汙建炎再造補修職郎御營使司幹辦公事紹興五年舉進士對䇿極論孝弟之意冀以感動上心髙宗異其言擢第二授保寧軍節度推官改宣議郎主管南外郭宗院代還秦檜用事察其不附已遣通判建州罹外艱服除復差通判紹興時公登第二十餘年矣轉徙外服泊如也檜死髙宗記公姓名召為祕書省校書郎兼寶録院簡討官纍遷司封員外郎兼權國子司業歲滿為真紹興二十八年充賀金國生辰使與賀正使祕書少監沈介相先後明年還獨言金作治汴宫役夫萬計此必欲徙居見迫不可不早為計時約和既久中外解弛髙宗聞公言瞿然而宰相皆不悅顧詰公曰沈監之歸屬耳不聞此言中安得獨為此踰月公復往扣之且曰即不信鄙言請治罪又皆憮然莫應而右相湯思退怒甚至以語侵公公不為動已乃除沈吏部侍郎而徙公祕書少監以抑之公猶以邊備為言不聼則請補外髙宗不許除起居即踰月兼權中書舍人尋差同知三十年貢舉權工部侍郎金人來賀天申節充接伴使故事賜宴使者謝於庭中至是辭以方暑請拜宇下公持不可乃如故事遂為送伴使還金使復以天申來賀方引見遽以欽宗訃聞且多出不遜語諸公怪駭不知所為至謂上不可以凶服見使者欲俟其去乃發喪公聞馳白宰相此國家大事臣子至痛之節一有失禮謂天下後世何且使人或問故將何以對於是始議行禮公又率諸同列請對論决䇿用兵事莫有同者乃獨陳備禦方略蓋公自使還三年每進對未嘗不以金事為言至是髙宗始入其說然不數月而金已擁衆渡淮矣遷擢禮部侍郎敵騎至江壖朝臣震怖爭遣家逃匿公與左相陳康伯獨自如比敵退衆慚服俄兼給事中明年天申上壽議者以欽宗服除將復用樂事下禮曹公奏春秋君弒賊不討則雖葬不書以明臣子之罪況今欽宗實未葬也而遽作樂不亦失禮違經之甚乎事亦寢內侍某等遷官不應法諌官劉度坐論近習龍大淵忤㫖罷去皆不書讀繳奏以聞左右已深忌之尹穡希意詆為浚黨竟以去國乾道改元公年適七十即引年告老除集英殿修撰致仕進敷文閣待制久之孝宗因御講筵顧侍臣曰黃某老儒今居何許年幾何矣筋力强否於是召公赴闕公辭謝不獲明年乃起公以老成宿望直道正言去國七年至是復來觀者如堵入對內閣問勞甚寵復以為兵部尚書兼侍讀每當入直孝宗常遣人候視至則又召入坐語從容如是數月月必一再見公知無不言其大者則迎請欽廟梓宫罷天申錫宴中書舍人范成大被詔使金以山陵為請公奏陛下聖孝及此天下幸甚然置欽廟梓宫不問則有所未盡於人心孝宗善其言而不及用金果肆嫚言人乃服公論之正而識之卓也久之又以言不盡用乞歸除顯謨閣學士提舉州太平興國宫遂以龍圖閣學士致仕淳熙元年孝宗手書遣使詣公訪以天下利害朝政闕失進職端明殿學士且以銀絹將之公受詔感激拜疏以謝略曰朝廷之闕失多矣其尤大者君子在野小人在位政出多門言路壅塞亷恥道喪貨賂公行也天下之利害多矣其尤害民者官吏貪墨賦斂煩重財用竭匱盜賊多有獄訟不理政以賄成也臣願進君子退小人精選諸道部使者以察州縣則朝政有經民不告病矣公復歸又七年雖身安田里然其心未嘗一日忘朝廷逮屬疾手草遺表又以山陵境土欽廟梓宫為言七年卒年八十有五纍封江夏郡開國侯食邑千五百户贈少師諡簡肅公莊重恭信坐立語默有常節仕州縣奉法循理崇尚風教立朝據經守正上雅敬重屢有大用意而卒不少貶以求合孝宗即位首以正心誠意致知格物為說未嘗少及功利再召赴闕復以前說精言之在王府時龍大淵為內知已親幸他教授或與過從觴咏公獨未嘗與之坐朝夕見則揖而退其後它教授多䝉其力公獨不徙官尤喜薦士王詹事十朋張舍人震皆公所引張忠獻浚劉太尉錡之復用公力為多然未嘗以告人諸公或不之知也朱晦菴裁書請見曰今日之來將拜堂下惟公坐而受之俾進於門人弟子之列則某志也逮沒後為志其墓有奏議十卷子瀚司農卿孫棨員外郎黃肅甫先生棨黃棨字肅甫中之孫父瀚官至司農卿棨第嘉泰二年進士家世清約知萬安縣判靖州即州學傍建書院取書作新民之義扁曰作新暇則講學授徒其中明教化作學則訓誘開喻夷獠感悟除工部員外郎子熙守髙州亦有聲邵武郡志汀州羅氏家世學派按汀州宋代著姓者有羅氏伍氏雷氏邱氏賴氏世有賢才閩書所謂羅伍邱雷亦世其户者也今考選舉志羅氏彧太平興國三年進士羅氏祝元祐中明經羅氏烈建炎二年進士而羅氏祝閉戶窮經儒術尤著今本閩書録出參之志乘但未知是一家之學否姑附列之俟再詳訂推官羅叔和先生祝羅祝字叔和長汀人元祐間行十科祝以明經中第調漳州法曹嘗手釋六經及注唐書尤精律數終明州觀察推官縣令羅子剛先生烈羅烈字子剛長汀人建炎二年進士調同安尉時寇楊勍自南劍趨泉烈勒兵捍捕邑恃無恐再調興寧令會羣盜出沒烈率千餘人搗其巢皆潰走得所掠子女三百餘人遣歸家終宣教郎知廬陵縣著有約文新說十卷古文類證數萬言注杜詩事類千餘條行世汀州雷氏家世學派按寧化雷氏宋元豐以後族派科第踵出彥一先生尤以易學知名至靖康間雷諱觀者為太學生金兵渡河公上書憤激言張邦昌輔相無狀即罷去已晚時朝廷雖不聼尚嘉其議論忠讜以公與陳公東尹公焞鄧公肅皆特賜出身後金人僞立張邦昌其言悉驗今考其表著載焉教授雷彥一先生協雷協字彥一充貢上庠以易學知名雖僻書雜傳涉獵通遍登政和二年進士調上饒縣尉遷上由縣丞古田令終宣教郎興化軍教授太學生雷先生觀雷觀靖康太學生時金兵已渡河上皇出幸帝亦將幸襄賴李綱以死留之而止金人既抵城下朝廷乃罷白時中而以李邦彥為太宰既又罷邦彥以張邦昌為太宰觀憤然曰此何等時不拔擢豪傑而例遷貴臣耶乃上書略曰方今大敵內侵國祚瀕危支壞扶傾全在宰相前日以白時中尫庸悖謬從公屏斥朝野快心不謂今日宣麻乃用邦昌士民失望咸謂邦昌前朝輔相之最無狀者即令罷去已為晚矣今又相之將焉用哉陳龜有言三辰不軌擢士為相四裔不共拔卒為將今金戈指闕鐵騎飲汴豈但不共而已至於熒惑入斗兩日相摩赤光溢散昏翳四塞其不軌又甚曽不聞宣猶考相弭變迎祥而徒進尸位冒寵之倫以塞賢路譬庸醫療疾而疾已危篤猶耽視貨賄不忍辭去坐待病者之淪沒而後己豈不殆哉其激切如此上雖不聼然新政懲蔽塞凡行義有聞議論忠讜者悉加賜以示好惡於是觀與陳東尹焞鄧肅皆特賜出身而天下稍知所尚次年二帝䝉塵金人遂僞立張邦昌而觀言竟驗閩中理學淵源考卷十三
