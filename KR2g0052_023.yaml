  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0052_WYG_023-1a, image: WYG0460/WYG0460-0310a.png}
body:
  text: 閩中理學淵源考卷二十三廣平府知府李清馥撰朱子邵武汀州門人并交友按邵武人文舊號小鄒魯唐以前尚矣宋初游氏烈從胡安定講學以經術為郡人之倡厥後鄒堯叟李西山盧奎何兌朱震皆受學於劉執中楊文靖馬東平胡武夷諸賢至若嚴氏粲之經說李氏忠定之偉略皆為學者所宗仰逮朱子接道南統緒其執經問業者尤多於時修文授經砥名立行後先炳蔚與建安諸郡未易優劣也至長汀一郡如徐氏守忠宋初時受知於歐陽文忠胡安定李太伯諸賢而清修佚德亦皆有人然彼時聲氣未孚紹述者尚寥寥有幾至及朱子之門者只楊氏子直一人而已蓋亦風氣初開之始也今併附焉縣令何叔京先生鎬何鎬字叔京邵武人父兌始仕為左朝奉郎通判辰州生鎬孝謹有器識既出就傅暮歸則不復去親側誦書日數千言為文敏而有思趣尚髙逺識者竒之辰州嘗受程氏中庸之學於東平馬公伸服行不怠又以其忠節事狀移書太史忤秦檜下吏竄南方扼死不恨間復悉以其所聞者語鎬既受其說則益務貫穿經史取友四方博考旁資以相參伍久而自信於是一意操存杜門終日淡然無營至其論說古今指陳得失則又明白慷慨可舉而行平居崇德義厲廉節絶口未嘗及功利至於收族恤孤興事濟衆則懇惻憂勞如己嗜欲言行相循沒身不懈由此南州之為程學者始又知有馬氏之傳焉始用辰州致仕恩補官授泉州安溪主簿未赴再調汀州上杭丞數行縣事専用寬簡為治白罷稅外無名之賦人便安之部使者鄧伯熊行部顧郡事不理囚繫或纍嵗月不得釋檄鎬佐其守悉取文書閲視具得其情決遣之旬日皆盡又以田稅不均貧弱受病所以均之甚備守顧不悅鎬即謝去一時學士寮友推其學行多師尊之而當路鮮識之者調潭州善化令將行而卒年四十八朱子撰墓碣稱鎬為人清夷恬曠廉直惠和談經論事簡易條暢所著書有易論語史論諸文數十卷其言多可傳者築書堂所居南坂上名以髙逺用見己志素與朱子友善嘗與書曰執事家學淵源之正而才資敏鋭絶出等夷其深造默識固有超然非誦說見聞之所及也而其口講心潛躬行力踐已非一日之積詞㫖奧博反覆通貫三復竦然有以仰見其所存之妙云按朱子撰墓碣叔京在淳熙二年沒曽與何叔京第一書在李先生歿後自是隆興二年以後書中有杜門奉親則在乾道五年以前之札與蔡季通先生受業相先後者又與書曰李先生教人大抵令於靜中體認大本未發時氣象分明即處事應物自然中節此乃龜山門下相傳指訣然當時親炙之事貪聽講論又方竊好章句訓詁之習不得盡心於此至今若存若亡無一的實見處辜負教育之意每一念此未嘗不愧汗沾衣也脫然之語乃李先生稱道之過今日猶如掛鈎之魚當時寧有是耶然學者一時偶有所見其初皆自悅懌以為真有所自得矣及其久也漸次昏暗淡泊又久則遂泯滅而頑然如初無所睹此無他其所見者非卓然真見道體之全特因聞見揣度而知故耳竊意當時日聞至言觀懿行其心固必有不知所以然者洎失其所依歸而又加以嵗月之久汩沒浸漬今則猶然之及不覺悵然庸人矣此亦無足怪者因下問書考亭淵源録朱子大全州牧趙佐卿先生善佐趙善佐字佐卿邵武人受學張敬夫又從朱子游以宗室子試授將樂丞纍知秦州常德贑州奉法愛民以勤儉自約飭在贑逾年卒民哀思之著易疑問答道南源委梁文叔先生琢梁琢字文叔邵武人從遊朱子刻志勵學所論為學工夫及體氣魂魄鬼神之說朱子多許可之又輯朱子語録淡臺石刻按文公答文叔書云日用功夫如此甚善然須實下功夫只是說得不濟事也李先生意只是要得學者靜中有箇主宰存養處然一向如此又不得也觀文公答問此數句即想見延平心傳文叔必從事於斯者公故以此告之吳大年先生夀昌吳夀昌字大年邵武人初謁浮屠疏山喜談禪後游朱門著問答録嘗論張栻吕祖謙以南軒非夀昌所敢知東萊博學多識則有之守約恐未也朱子深然之通志道南源委教授吳茂實先生英吳英字茂實邵武人從朱子學有論語問答略登紹興三十年進士仕至泉州路教授按文公與茂實書云近來自覺向時工夫止是講論文義以為積集義理久當自有得力處却於日用工夫全少㸃檢諸朋友往往亦只如此做工夫所以多不得力今方深省而痛懲之亦願與諸同志勉焉幸老兄遍以告之也陸子夀兄弟近日議論與前大不同却方要理會講學其徒有曹立之萬正淳者來相見氣象皆儘好却是先於性情持守上用力此意自好但不合自主張太過又要得省發覺悟故流於怪異耳去其所短集其所長自不害為入德之門也然其徒亦多有主先入不肯捨棄者萬曹二君却無比病也觀書中及陸子夀兄弟子夀卒在淳熙七年時朱子年五十一則此書在五十一嵗前所寄馮作肅先生允中馮允中字作肅邵武人從朱子學朱子名其齊曰見齊所論懲創後生妄作之弊朱子善之又云情本於性故與性對心則有知覺而能為之統御者也未動而無以統之則空寂而已已動而無以統之則放肆而已朱子深以為然道南源委按文公與作肅書云欲立人欲達人之說令其更白叔京兄質其可否復以見諭自在淳熙二年以前及門者是時邵武叔京從遊而作肅嵩卿諸賢相踵勃起矣葉直翁先生寅葉寅字直翁邵武人少飄蕩豪爽方士繇語之曰以子才俊何善不可為乃甘心里巷以辱其身耶寅感泣問過可改否曰惟狂克念作聖於是奮勵修飭俯就朱子之門而問學焉謹言慎行以求精詣鄉人敬嘆之考亭淵源録州牧俞夢達先生聞中俞聞中字夢達邵武人從學朱子淳熙八年進士知黎州悉意撫字民夷感德通志閩書宣獻任伯起先生希夷任希夷字伯起其先眉州人四世祖伯雨為諫議大夫其後仕閩因家邵武希夷少刻意問學為文精苦登淳熙三年進士第調建寧府浦城簿從朱文公學篤信力行文公器之曰伯起開濟士也開禧初主太常寺簿奏紹熙以來禮書未經編次嵗月滋久恐或散亡乞下本寺修纂從之遷禮部尚書兼給事中謂周惇頤程皓程頤為百代絶學之倡乞定議賜諡其後惇頤諡元皓諡純頤諡正皆希夷發之進端明殿學士僉書樞密院事兼權參知政事史彌逺柄國久執政皆具員議者頗譏其拱默尋提舉臨安府洞霄宫卒贈少師諡宣獻著經解經筵故事奏議表箋內外制集考亭淵源録源委道南縣令李子賢先生東李東字子賢忠定公族孫也受學朱子紹熙中登第簿廬陵秩滿周必大餞以詩云地跨江南秀氣兼玉成界尺直方廉西曹久處習鑿齒髙士惟知孫子嚴遷知萬安黃幹薦於漕使稱其精敏楊楫乞委以事而觀其能道南源委閩書考亭淵源録修撰葉成之先生武子葉武子字成之邵武人初遊鄉學學周禮於永嘉徐元德既與李方子友同受學朱門後補太學生時議函韓托胄首和金武子曰奸臣首固不足惜如國體何率同舍力爭嘉定中擢甲科注嶽州教授有貧而母老者名在其下亟遜之久之授郴州纍升知處州拊循民瘼奏除苛取之弊麗水盜發郡發兵討捕而里正執讐民以歸武子問實得三人斬以徇餘釋之民大服盜亦息入為宗學博士以福建保長催科害民陛對論罷之請老歸屬召不起尋落致仕籍除直祕閣嘉熙間進直寶謨閣奉祠仍乞致仕淳祐三年以其雅志恬退掛冠日久賜詔褒美特升直龍圖閣五年進祕閣修撰六年卒武子之學所得於易為多其言曰易道莫大於時時有二義有在外之時有在我之時士君子出處須先論在我之時嘗戒子弟謂身後毋作行狀葬無銘志唯劉克莊志吳炎墓稱炎與武子為古君子閩書考亭淵源録縣令饒廷老先生幹饒幹字廷老邵武人自幼孝謹篤學登進士第調吉水尉轉知長沙適朱文公為守遂受業焉夙興治事暇入聽講後知懷安軍卒有為之銘曰能琢磨而器吾之玉乎則心皇皇如不足能烜赫而丹吾之轂乎則足縮縮如不欲故樂也不加若性而汚也不懼其辱是謂善學朱氏者蓋不惟其名而實之篤閩書縣丞劉德言先生剛中劉剛中字德言光澤人少讀書詞義有契輒為之贊從學於文公公問平日讀何書剛中說看語孟荀揚莊老諸書公云須看語孟若荀揚乃誤人之書莊老乃壞人之書剛中遂専聽公言公為易其字曰近仁與黃幹友善舉嘉定四年進士調漢陽縣主簿轉婺州蘭溪縣丞後歸築室以居名曰琴軒從學者甚衆述有師友問答一卷考亭淵源録丘玉甫先生珏丘珏字玉甫從朱子學有主敬問答學禁嚴遂謝場屋黃令裕先生孝恭黃孝恭字令裕從朱子學治家嚴整論著確實黃仲本先生瀚黃瀚字仲本從朱子學嘗作朋友說朱子為跋黃德柄先生謙黃謙字德柄按文公與方伯謨書云某近嘗一至雲谷留十餘日朋友來集隨分有少講論大率追正舊說之太髙者也克明德柄皆未及書煩為致意考書中云在雲谷疑在淳熙初年意是中嵗及門者劉潛夫先生炎劉炎字潛夫饒先生克明饒克明邵武人連嵩卿先生嵩連嵩字嵩卿按文公與何叔京書述及嵩卿考叔京在淳熙二年沒嵩卿自在淳熙二年以前及門者閩中理學淵源考卷二十三
