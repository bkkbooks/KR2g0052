body:
  text: 閩中理學淵源考卷七十四廣平府知府李清馥撰清溪詹氏家世學派按黃文簡先生嘗言吾郡茂族其纘緒最逺文獻足徵者宜莫如安溪詹氏溯厥肇基之祖在後周為清隱公云馥嘗讀公不受王氏袍笏詩不應留氏從效之辟從效不許乃求監小溪場始建議創邑後遂潔身以隱樹德保世逮後宗支繁衍至司寇咫亭先生以直聲清節著于明隆萬間後先名德踵起兹録其家世以著吾邑文獻之始焉同知詹邦寧先生靖詹靖字邦寧安溪人縣令敦仁之後正統六年鄉薦景泰中知廣昌縣縣人有揭姓者素豪黠前令不能制靖至置諸法縣境肅然廉慎之操六載彌勵後升開州同知卒于官孫源曽孫仰庇萬厯府志舊邑志兵備詹企齋先生源詹源字士潔號企齋母林氏娠九月而父沒林矢志育孤攜居郡城使就外傅源聰穎力學𢎞治十八年成進士授户部主事𣙜稅河西務廉正獨持朝議以其有風憲體改監察御史時逆瑾用事凡拜官者必私謁謝源獨不往瑾誅源名益著顧以梗直為柄臣所忌時母方就養乃乞恩奉母還已而忌者卒擠之就家轉貴州按察僉事貴州直指阿柄臣意劾源不職朝議源任未一年無不職狀竟不行尼直指奏不行乾清宫災興大工採木於貴陽川湖乃留源領其役會香爐山苗叛督將卒𠞰平之論功擢雲南按察副使有墨吏欲置之法御史庇之源執不可聞於朝罷其官源亦坐罷歸時年甫逾強仕源既早廢杜門養母備殫色養推祖腴産讓其兄於官司訊謁里閈是非絶無所聞問嘗疏清溪積水三十里溉田白葉坂山寇平白當道全活良民為俘者九十餘人其為德於鄉類如此年七十一卒自題作墓志謂平生勉企古人而卒以褊中負氣兀傲忤俗云萬厯府志黃文簡公撰詹氏家廟記司冦詹咫亭先生仰庇詹仰庇字汝欽號咫亭清隱公敦仁之後副憲公源之子自幼有識量膽力年十二而副憲捐館未幾逰庠尋遊南辟雍受業邑先輩鴻臚卿史公朝賔學日益進嘉靖四十四年進士授南海令才贍守亷於上官無所阿承以卓異徵入為御史是為隆慶二年在臺兩月餘數上疏穆宗命戶部購寶石珍珠諸物責三日取辦大司農與諫官諍不能得仰庇疏言珍珠寶石多藏中貴家上供日亟則索價逾倍今南北多事財用不給軍興告匱將焉用此乞罷購便明年春內官監辦製煙火進奉元夕火藥突起所延燒內房十餘間復疏言逸欲害德近習僨事宜嚴懲其不恪者凛宴逸之戒杜逾奉之階疏入俱寢不報而是時陳皇后遷居别宫寢疾危困仰庇聞之復疏言皇后殿下乃先帝所擇以配陛下為宗廟神人之主者也竊聞道路流言坤寧宫曠而弗居積有嵗月又云睿體抑鬱成疾陛下略不省問萬一不諱其為聖德纍不少願陛下一聽臣言還皇后于坤寧宫時賜問慰即臣蒙譴死賢於生上覽疏心動手批曰皇后侍朕多年無子近且病移居别宫冀安適却疾耳爾不曉宫中事妄言姑不究初仰庇疏上聞者謂禍且不測及得旨中外歡傳稱主聖臣直乃今睹之然為仰庇慮者謂公今且休矣批逆鱗而嬰嵎虎不可為常仰庇奮不顧也會奉命巡視監局庫藏復疏言內官監錢糧動以供御為名肆行侵冒乞命户工二部及巡視科道等官查核以杜姦欺其該監所開工作諸費如鼇山花欄金匱玉盆之類皆作無益以害有益伏願慎儉德屏玩好近侍諸臣或以織造采辦逢迎者悉屏斥之以彰聖斷疏入上震怒責其悖逆狂妄杖之百黜為民仰庇官臺中八閲月耳而四上疏疏多指斥中貴人其被杖為中貴人所齮齕也神宗登極起廣東參議蓋是時江陵張居正與大璫表裹故特從外轉云抵任閲月乞疾歸徜徉林壑十有三年逮江陵卒大璫保逐同邑郭中丞惟賢徵用遂疏薦仰庇於是復起家江西參議旋轉山東按察副使南京太僕少卿晉左僉都御史諸所振刷論建如申飭御史出巡事宜擬定章奏體式為蔡文莊請諡侃侃縷縷心地磊落其持論以正綱紀崇體統為重時論翕然歸之遷刑部右侍郎甫數月引疾乞休連六疏乃得請家居寡接惟與二三同志談古道今布衣筍輿留連溪山間如曩興至必有賦咏皆超脫工鍊瀟然物外之思行部使者郡國守相旌旄相屬不獲一望見顔色顧時時伺其言論為時政因革閭閻脈脈蒙覆露居鄉恂恂而訓子弟戢童僕尤為嚴飭廳事設二屏大書君子之道四及博學審問二節常在左右以自省歸里二十餘年而卒年七十一賜祭葬贈刑部尚書黃文簡言公立朝謇諤百折不回居鄉使人有所慕而為善有所畏而不敢為不義友人潘洙言使公立朝有虎豹在山之勢何鏡山言公俊偉光明豪傑之作用繩檢律操聖賢之家法焉舊郡志簡閩書黃文公撰墓志東街郭氏家世學派余讀朱簡齋先生撰郭氏譜序述其初祖於宋建炎間為安撫節度使數傳至伯臺公授閩省鹽運使意家於閩在此時歟居賢先生為伯臺之孫蒞官以忠孝聞厥後玄孫楠以直節顯族孫文煥又以學行聞逮𢎞正間有所謂岱峰冠峰伯仲者與陳南樓為友岱峰疑即郭氏立彥至恭定先生特起巋然未知與白峰族系如何然據咏賢水詩有宗寶者中稱賢水先生為伯稱符甲先生為祖再考符甲先生讀書恭定祠則諸公皆同族無疑矣末造二公以忠烈並時而著尤志乘所希覯云教諭郭先生居賢郭居賢晉江人弱冠知名博學有竒節洪武二十年鄉薦授臨武教諭念不得迎養父母不攜孥之官日夜思慕泣下形諸聲詩無非忠孝懇惻之詞有淦川遺稿弟宙精於楷書選翰林院庶吉士有時名玄孫楠閩書御史郭世重先生楠郭楠字世重晉江人講易蔡文莊之門正德九年進士授浦江令有亷幹聲徵入為監察御史世宗即位請召還直臣舒芬王思黃鞏張衍瑞等從之嘉靖元年奉命稽核兩廣倉帑參劾藩司方面無所回撓尋上章請退朝之暇延見大臣如祖宗故事且言主事陳嘉言忤中官不宜逮繫上怒奪其俸復巡按雲南時議大禮起大小臣多被杖謫戍杖有死者楠感痛不勝自恨不得與跪門之列上疏曰陛下入繼大統以孝宗為所後之親自張璁倡為異議桂萼席書方獻夫輩和之羣臣伏闕呼號忠情迫切而置死問罪璁等排正議竊美官上激九重雷霆之威下貽舉朝縉紳之禍所議之禮未足慰二帝在天之靈而號痛之聲已徹九廟之內臣愚不意聖明之世屢見以忠諫而獲罪也乞復學士豐熙等官優恤死諫之臣庶以收納人心全君臣之義疏入上大怒遣逮繫赴京廷杖下詔獄削籍為民六年春以天變修省從吏部議量與一官起吉水教諭尋升崑山知縣再遷至南寧守遂乞歸家居十有八年搆祠堂作家規年譜遺示子孫以夀終族子文煥明史志舊郡志新郡通志閩書訓導郭實峯先生文煥郭文煥字仲實號實峰以貢授髙安訓導卒於官文煥自少究心理學四書易經太極圗通書正蒙俱有注釋間或發蔡文莊所未發讀史别出論斷四書學庸口義成於林次崖存疑未出之前議論多有吻合者所著有課程切問漳人蔡鶴峰列聘居西孰刻而傳之僉事項甌東喬稱閩中士子才敏學充不為不多獨泉士郭某是非不謬於聖人而王遵岩讀其文喜曰義理純明經學精到不惟進於理而兼於文讀之忘食至於家人報食數四不覺也按先生族父楠與蔡鶴峰皆文莊髙弟先生為蔡鶴峰家孰弟子師今擬附私淑之列云文學郭以相先生元愷郭元愷字以相實峰公文煥之孫父士登以詩經名於時元愷繼其業弱冠讀書郡城東之靈丘山舍時鄉先輩參議尤烈棄官歸隱書齋相近元愷不一往見尤公詣問之賞識其文延致與其季子相切磨又與何廷評喬遷交友元愷治詩益有聲弟子執業屨滿從延建及楚粵來者彌衆館舍至不能容元愷孝友篤至勵志問學為人不茍然諾七上棘闈竟不得舉僻嗜書史積箱數十家徒四壁不以為憂其為人如此何鏡山先生撰本傳恭定郭愚菴先生惟賢郭惟賢字哲卿號愚菴晉江人萬厯二年進士令清江以治行擢為南御史例應掣鹽所得贖鍰不資惟賢疏言戶部職錢穀御史職糾察各有司存請令主事掣鹽御史按季監督許之由是廉名益著時江陵相已死言事得罪諸臣多未復皇子生下恩詔惟賢言恩詔雖下而建言諸臣如吳中行趙用賢艾穆沈思孝鄒元標傅應楨朱鴻謨余懋學等尚在戍籍乞行赦宥是時巨璫馮保猶用事疏入謫江山丞逾月保敗召復原官劾左都御史陳炌希權臣指論罷御史趙耀趙應元不可總憲紀炌罷去又薦海內耆碩之士如王錫爵孫鑨孫丕揚耿定向曽同亨蔡國珍詹仰庇等皆後先起用輿論快之主事董基以諫止內操被謫惟賢疏救甚力上怒調南大理評事遷户部主事升吏部稽勳郎中改考功值大計上書宰相李世達都御史海瑞二公請絶請托斥巨姦屏私昵計成中外咸服改尚寶丞晉通政司參議轉應天府丞旋改順天攝府尹篆數月中貴干請一切拒絶南北臺省交薦可大用以右僉都御史巡撫湖廣至則請定三楚賦役全書以革加派之弊發泰和山香稅以補宗祿兵餉之缺分三衛輪戍武岡并請罷諸衛逺戍栁州以恤疲軍禁苗寨贖虜人口以遏異類楚故有景藩者肅宗愛子也豫賦異等諸王景絶國除賦額仍在時潞王之國上悉以景賦豫潞潞必欲得舊額以聞上鐫司道府縣官俸責巡撫報聞甚急惟賢酌定賦額請令有司徵送潞府王無得遣人來徵以致騷擾會楚災復疏減潞賦額築黃梅通城二城以固桑土又請祀周元公父於啓聖祠刻元公二程文為三儒集屈大夫諸葛武侯嶽武穆文為三忠集以風示楚人召入為左僉都御史言行取不宜久停言官不宜久繫臺官不宜久缺已復言天下多故乃自大􅒼至監司率有缺不補政日廢弛且建言獲譴者不下百餘人效忠者皆永棄上不納尋遷左副都御史請早建皇儲慎簡輔弼亟行考選盡下推舉諸疏俱不報自戊戌己亥兩預計典佐臺長佑善黜姦無所嫌避如南考功時以丁內艱歸服除起為户部左侍郎未上卒贈左都御史天啓初諡恭定惟賢朴誠直諒朗豁精密其念繫乎天下國家之大而最注意者人才用舍之間其神周於器物服用之微而最慎守者辭受取與之際服官三十餘載宦轍所至綱挈目張風清弊絶世局常遷自守獨定海內士大夫無所間然惟賢本師事大學士李公廷機其淵源如此子夢詹以蔭仕戶部郎中明史閩舊郡志文新郡志書葉忠撰墓志郭介菴先生符甲郭符甲字輔伯號介菴晉江人誕母家謝氏山莊靈鷲山下山挺衆峯特立公生而嚴正不阿有嶽峙偉概自幼至壯雖接談宴集竟日夜端坐兀然未嘗箕倚少聰穎過目成誦凡天文地理星數醫卜律劍琴棋畫篆書刻騎射之藝皆諳習精通五經子史垂髫即淹貫八嵗成舉子業研精于易著有墨訣易訣大小題筆要八法行于世天啓癸亥年十九為學使周日臺公拔儒士第一甲子年二十登賢書莆郡司李祁世培公分校所得士乙丑下第歸讀書恭定公祠以自勵戊辰下第後教讀給日用且供菽水歷漳潮平和饒平及齊魯豐沛諸郡邑足迹不肯一踵公門惟與生徒講論或娛詩酒窮山水搜勝探竒其在平和也有僧求公序文作衣鉢計遇盜欲殺之搜見其文大竒之曰此郭大人筆也清操君子汝獲與逰耶釋之僧袖文來謝曰活我者此也因乞題簡末云齋地在大蓬山頂公深夜讀書虎常來窗外伏聽每有咆哮超躍聲徹於內公著虎聽草紀之其在饒平也邑人黃姓者求公書扁及門對懸挂後其家失火盡燼惟扁對巋然僅存人皆異之饒令邱金聲公同里同年友也居是邑三年不通一刺謀一面邱甚怪之一日徒步造訪公閉齋門不納只隔扉問答邱曰郭年兄何見拒之深也公曰爾治爾政吾讀吾書公私互無干涉決於爾治內終不親覯也其狷介類如此其在豐沛也以地近聖賢風多淳古公意欲挈家卜居於此乃積館俸買闞家園地百六十畝并構茅屋一所嗣而值滄桑之變所志乃不果公二十年青袍六上春官崇禎癸未年三十九宫􅒼春坊周巢軒公同校禮闈得公卷大加器賞曰此正氣文字必真人品也亟薦之以謄硃魚魯待校改乃定不置前矛殿試二甲假歸里甲申賊闖犯都門聞三月十九之變恨不與難公為孝亷時贈資德大夫辱菴公與贈太夫人謝母布衣疏食怡然曰不可以吾兩人易兒純操公之卓行亦二尊人之遺也沈公佺期撰傳略郭賢水先生承汾郭承汾溫陵陳氏寶鑰紀略曰公字懋袞别號賢水晉江人登崇禎癸未進士初授淮安府推官涖任八閲月以才能徵為浙江道監察御史公家城東十里之杏宅鄉族丁以千計性好任俠郡有不平事不憚攘臂為之凡有紛難者必排解之故人多以郭解稱焉豪族多目懾之公不顧也然此少年事耳其臨大事百折不回始信昔日之好俠者皆所云配義與道溢于胸臆而不自禁焉爾陳緑崖先生寶鑰撰紀略潯江何氏家世學派馥按何氏譜牒自元末分派一郡城一潯渼一漳江其家潯渼者自小洛先生曽大父始初住邑之鳳嶼後移潯渼故為潯江何氏先生少從父毖所公雄稟學未嘗就外傅稍長受業於孫東溪從兄孝亷洛江二公並名士俱器重先生而張淨峰先生嘗造精廬試其文藝特異之故先生之學自少小已見知於大賢之門淵源固已逺矣考嘉靖間先生退休閭里為時典型而整率家規惇正典禮文節李公曾為先生延請課子心特欽慕之見諸墓銘可考厥後蘇紫溪李衷一諸公為行狀為墓表推重無異詞溯其根源孝友篤厚傳之數世英碩輩出至季祚中理先生燮殉流賊之難其死事與江門並烈蓋一門忠孝尤足風世也今謹緝其事略著于篇副使何小洛先生元述何元述字元孝别號小洛晉江人自幼從父學年稍長受業於孫東溪某從兄孝廉何洛江某二公并名士俱器之一日張淨峰先生見元述於洛江精舍試其文大竒之語洛江曰君家有千里駒矣時年十三嵗嘉靖四年學使者邵公試立志論元述分晰道德富貴功名之義而原本於寧靜淡泊學使者異之十一年舉進士疏乞教授惠州以便迎養甲午分校浙闈得陳善茅坤潘季馴諸公皆為浙中聞人擢國子博士歷監丞擢南戶部主事出為廣東僉事遷湖廣參議時世宗修顯陵以分任勞賜金幣中貴人使楚諸大吏折節為恭元述獨行敵禮鎮守廖斌者傾御史包節被逮謫戍其部曲席勢驕恣元述即捕治之如法斌無以中升廣東按察副使治海道事積案纍千株連數千百人請撫按檢閲可問問之久逺不可問者請決除之於是宿牘一清御史行部不至瓊皆推臬􅒼代人憚浮海莫應者元述獨請往還抵化州次白沙驛遇黎寇猝至持刃擬已知為河海道相率羅拜而去獨以戅直執法繩兩勢家責其豪子弟後為所擠罷歸元述孝友甚至官俸之餘敬上二親悉均諸弟自無厚殖性寬洪坦直無城府不知人間有機械知亦不較拯人於難如疴在身聞有善事喜動睂宇見有過失咨嗟竟日其自奉淡約脫粟而食入里門必下車縉紳士類倒屣出迎雖下𨽻必衣冠乃見林居四十餘年正家規廣祠宇修祖墳至耋年遇嵗時禮節拜揖酬酢不衰卒年九十子居魯舉人官至承天知府李文節撰墓志書李衷一撰行狀新舊郡志閩孝亷何次洛先生元選何元選字元學别號次洛晉江人少穎敏十嵗家庭授章句經書傳注寓目成誦十三逸齋公捐館哀毁執喪如成人十九補弟子員弱冠遊何怍菴公之門怍菴目為竒士每日講口授畢退即筆記閲再嵗手録疏解纍十二卷築精舍於東湖臨江引曹偶互相切磨旋卒業成均嘉靖甲子舉順天鄉薦元選為人倜儻英邁習於昭代典故沉毅有大略善赴人厄窘友沒子少孤家貧延歸解衣授粲給食館之其人竟以儒顯平生慕義多如此他如議設祭田營祀屋建鄉孰召子姓弟姪耕者受器讀者受書家歸三年漸施有政而嗜學日篤隆慶丁卯束裝且北上旋卒李衷一先生撰述事狀謂公世所稱豪舉士哉及迹其行事則恂恂儒者仁心為質引義慷慨百里頌功千里頌名內外無間是為難耳李衷一先生撰行狀忠壯何中理先生燮何燮字中理晉江人萬厯乙卯舉人任靈川桂東令升亳州知州崇禎中流寇土賊交訌飢癘洊至百姓十僅存一燮儲備賑飢全活甚衆甫三日而齊寇豫寇復東西至燮統兵力戰於盧家廟民爭致死擒賊首李忠常顯吾殺之刳其腸以示衆賊潰隨招撫李龍房應魁等萬餘衆河西平未幾闖賊轉熾陷名城數十燮堅守孤城擐甲胄晝夜不懈賊逼城下雲梯蟻集城陷被執甘言餌降燮強立不屈大罵曰吾頭可斷不可辱也賊斷其足罵益疾復割其胸旋罵旋割賊衆有泣下者嘆曰好烈漢磔死懸其首於市三日耳鼻皆動賊相顧驚愕武榮洪氏家世學派按黃文簡公撰洪易齋公墓志云武榮洪氏其子弟多才其父兄峻督而勤朂之若穮蔉之俟豐年以故人材踵起閥閲稱崇今録其先世所以肇端後嗣者載於篇首云侍御洪德馨先生庭桂洪庭桂字德馨登嘉靖十七年進士授行人奉節旴江以清介不緇著聞擢御史權貴勳戚為之避驄會當事者銜臺中抗疏激切因御史失儀槩罰遂出為江西按察司知事旋擢德興令復以越次驟遷論罷歸里恬淡清修杜門謝客監司守令絶不通謁有以寺租山蕩言者桂笑而謝之曰吾自有良田可遺子孫也洪族科第著武榮桂為開端云南安邑志布政洪心齋先生有復洪有復字懋純初銓武陵知縣時江陵秉國楚人席氣焰多以意作使縣官暴橫邑里有復三尺裁之席氣焰者議徙有復他去會相敗反以得聲擢工科給事中中貴人殺人不法有復疏論抵罪中貴人走匿至偕其黨環上泣也有旨屬刑部有復再疏論竟抵罪歷禮科左給事中進士武進人薛敷教疏論大中丞不法詞連冢宰部院頷之授有復意彈薛有復曰吾有去耳因自求外轉亡何補廣東按察副使備兵肇慶擢羅定參政時州邑初建所撫猺獞與諸民分籍而處恃衆喜亂有復布以威德久之皆請𨽻民籍粵西岑溪猺叛攻城屠士卒有復從總督陳蕖授便宜部署東三道進𠞰入山大破之上功賜鏹升俸遷浙江按察使湖廣右布政使尋轉左礦稅不逞湘澤震動同官馮應京觸稅璫被逮繫有復悉力調停為民請命上為易中使以礦稅屬郡邑吏而更置巡撫有復有勞焉卒于官族弟有助字懋遜授南安府推官髙潔明敏嘗攝大庾南康二邑清洗宿弊入為工部郎尋守廣州以艱歸服除補徽州治徽三年口碑載道遷廣東副使方有徽州卓異之旌而有助卒矣有助篤倫常厚故人當官克持節而遇親舊不失恩意物論歸焉布政洪爾介先生啓睿洪啓睿字爾介别號訒原萬厯二十年進士授禮部主事職典屬國首發沈惟敬之姦疏大司馬石星主和誤國宋應昌等扶同欺蔽復上册立東宫救于孔謙陳泰來顧允成等二封事署儀制郎大璫以封爵為請睿不許璫銜之及璫負罪始擢祠祭郎視兩浙學政轉金衢參政升按察使治兵海上功績最著四明人建祠祀之轉右布政攝符入覲凡浙吏中蜚語者抗力昭雪所全善類甚多尋轉左屬浙東飢浙西潦睿殫力請蠲賑咸報可庚戌計典竣事遂決意乞休歸作還山十誓誡子弟禁僕隸約里戚奉法惟謹郡邑嵗時罕所謁見惟窮交數人時相過從而已又常以義急人之困家食淡約特以榱桷祭器盡孝思追養為第一義事兄如事父友愛性植晚而彌篤夀六十一終子承紱孫士宏俱鄉薦南安邑志部郎洪爾還先生啓初洪啓初字爾還庭秀之孫先世由南安徙居晉江萬厯四十一年進士授户部主事出𣙜滸墅關故有北關兩稅商困莫支即疏請罷諸商歡躍舟蔽江下羡金至萬餘悉籍上之典試雲南適貢金騷擾啓初疏陳其害遂得免著為令遷兵部郎丁內艱歸不出與友人蘇庚新相切劘著書以終焉雍正間志閩中理學淵源考卷七十四
