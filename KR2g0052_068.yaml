body:
  text: 閩中理學淵源考卷六十八廣平府知府李清馥撰長史李木齋先生家世學派李氏源曰成化之盛有節概文章曰木齋李先生精華煒煒摩蕩雲霄比郡諸生多歸之如山之岱焉蓋先生熟復六經性理諸書又為虛齋先生所奬許其淵源之正可想矣再按先生家學遞傳皆能善承不墜叔元先生嘗言曰閩理學濬發自蔡文莊而紫峰陳先生翼之叔元竊聞於家嚴曰吾祖木齋於文莊友也紫峰師也木齋以史官在告紫峰稟學焉時年二十矣文莊以銓曹在告紫峰稟學焉時年二十五矣前輩不立講學門户而淵源師友非偶然也紫峰贈文莊詩則諷以孤舟野渡贈木齋詩則期以黃花秋色而兩先生出處大節若合符然前輩師弟子相與氣味何如也小子謹識之再按叔元先生謂青陽祭於社者五先生木齋維徵二公及夏西仲蔡于省莊方塘餘不乏通顯瞪乎後矣又按李氏先世自元季由府城東改築青陽至公數世矣公以易為泉南推重而陳氏琛為其髙弟逮後姪孫逢期又以易授之蘇氏紫溪至元孫叔元昆仲踵起而叔元鹿巢氏論著諸先正尤多所發明至孫儕並彬彬文學以科名顯其所從來者逺矣吾郡共稱典型舊獻不亦宜乎長史李木齋先生聰李聰字敏德别號木齋晉江人器宇巖巖意逺語核雖燕處不聞俚語惰容焉平生恥言人過有蹈諸道者輒首肯之又從而揚之讀易之外詩書大小戴胡傳綱目性理諸書甚習微醺景靜琅然楚騷數章時步其體跌宕凄切聞言官抗疏不屈輒中宵起舞凌寒賦詩所著有易經外義發凡剔要鑑斷若干篇友人蔡虛齋手標之曰大眼目也虛齋嘗以精敏之識信謹之行堅苦正大之志推之領鄉薦尋肄國子業丘文莊濬為大司成曰可秀才世史正綱初落藳遂手授之登𢎞治三年進士賜禮部宴主司楊守址特名而賀曰場屋中如公是有數文章賜歸省授翰林檢討備雍王府書堂尋出府拜長史丁外艱畢改吉府前後啓王以講學法祖進賢逺佞既以母老乞歸章凡七上正德初劉瑾搜尋家居違限率罷之聰亦在罷中尋有詔起用竟不起鄉人稱曰古李先生孫逢祥曾孫芳元孫伯元叔元從孫逢期文學李翠臺先生芳李芳字孟收號翠臺晉江青陽人木齋先生曾孫少從世父晉峰逢期為潛心躬行之學其治經史有摘要手抄字結撰必端音叶律比旁及詩騷補弟子員所師事則蔡東洛所長事則留朋山王堣齋莊方塘林象川張月洲諸公皆一時巨人長者無不器重之偃蹇青襟二十餘載志逾壯自標署逾髙為詩若文結語務益峻諸子次弟受經舉所手録付之誨敕如所受世父時曰伯而其紹明先人易學仲可繼豫尚書謂春秋聖人經世大業叔而頴可學也於是三子各占一經芳為人篤於根本大節而周旋造次必以度視直履莊自舞勺時習於王父所則然長乃堅定之老而彌篤事王父母如父母送終追逺尤毖其心力切友于之誼於危難彌篤營搆必先家廟産業先祭田首髙祖父以及父各若干畝諸墳完葺一新凡三十年而一息弗忘雅負人倫鑒左司徒郭惟賢未遇時窶特甚芳器賞其文命伯子與友虀糜共之卒為世名卿與人交傾洞肺腑人有過輒面折不為隱然事已輒忘他如倡新文公祠疏決渠淤里人頌之嘗自題畫像云律身如口出口如肝三經教子遺後以安子伯元叔元晚以叔元主政刑部封如其官史文簡撰墓志知州李端統先生伯元李伯元字端統晉江人聰元孫萬厯戊子舉人歷官房真景三州皆以循良著績而在房抑採𣙜中官不得擾民在景飛蝗為災督捕必盡尤其卓卓可紀者居鄉允洽衆望殁祀鄉社著有青陽志雍正間志侍郎李鹿巢先生叔元李叔元字端和號鹿巢晉江人木齋古先生元孫萬厯壬辰登進士第授刑部主事洗寃辨誣不輕動拷訊轉禮部儀曹建儲國本持議先册立後冠婚疏凡二十上得俞旨又存心校正潢牒婚封典禮撰有南宫備考簡飭明要又撰鼎湖識周詳大喪服制時值分遣中使採𣙜關防持不鑄觸上意後鑄給封識牢密力奏不許沿途私折傳諭諸璫俱遵守地方賴以肅然又兩疏乞罷礦稅忤旨罰俸甲辰春在籍起山東按察司督學副使培植學校每以身心性命忠孝亷讓之學為勸誡雅意作養人才一時人士爭自濯磨文體還淳所取士稱得人焉丙午冬聞父病即乞致仕在途聞訃丙辰春起補浙江分守溫處道參議歷參政升江西臬使端風俗黜奧援彰疸明允遷湖廣左布政時滇蜀黔三省羽檄旁午轉輸騷動楚中幾變叔元馳疏十三日至京得旨豁免𣲖夫事乃定會直指興大獄羅織無辜叔元曰納溝恥若已推從井智窮救人遂毅然力爭挂冠歸崇禎初起為光祿寺卿管太僕少卿事己巳赴補奉旨禮部議諡禮部咨訪叔元惟表章正學疏舉實才為公論砥柱旋以方正不合賜間住歸里叔元歷任四朝授職無瘝曠宦槖蕭然自登第後便以世道為己任在浙在楚積俸餘買學田優待儒生歸田後屏迹郡邑動履遵先正生平簡略一切浮文不問時俗羔雁惟念族黨親朋置義粟百石賙恤貧乏又為里閭捍患興利清溝塘疏灌注鄉民戴德幼時從兄伯元習尚書又改習春秋後遂為海內麟經指南亦嘗從叔祖維徵先生説易平昔論學扶樹正論以紫陽為宗為明季鄉邦楷式所撰述皆有淵源卒年七十四後贈刑部侍郎所著有四書春秋傳藳雞肋刪三餘存萍蹤萍根諸集子正培孫璜曾孫一鳴皆鄉薦其序紫峰年譜略曰叔元自稍知章句家君授以陳氏淺説諸書且命之曰紫峰先生之學得於吾祖木齋公及蔡虛齋先生而仰溯乎紫陽是閩學正派也小子臆而問曰夫學天下萬世之學也奈何系以閩哉家君笑而不答稍長從學士大夫遊見當世所稱理學者大率尸祝姚江土苴紫陽若對壘然夫六籍之訓要使人思而得之思之愈深則其得之也愈固故有由賜所不聞而閔冉聞之矣閔冉所不聞而顔曾聞之矣又有終日與回言而不筆於書者矣今不揣學力之淺深不分根器之鈍利而概哆之以知天知性之學就使妙契畫前神遊帝先總為玩弄光景而無益乎身心性情之實矧愈講而愈失其真哉淺説通典諸書具在繇其淺者而深思之繇其通者而潛思之乃知學士大夫果無以加於紫陽而周禮之果在魯也即系學以閩奚不可哉教授李維徵先生逢期學派按維徵為木齋先生之從孫其學以不欺為本以整齊嚴肅為行出其門者亦皆英傑名儒一門窮經學古綽有先正風流其派别如紫溪文節諸公以淡泊刻勵相切劘文莊而後蘇李二公所以主持風教者不少考論先輩典型之懿者於今尤誦法不衰云教授李維徵先生逢期李逢期字維徵晉江人聰姪孫其學以不欺為標領以孝弟為粟帛整齊嚴肅為終日步趨門人蘇濬嘗持乾坤二卦質之逢期曰乾之學約之誠坤之學約之敬誠無不敬敬即思誠乾道坤道一而已繇貢士授龍水訓導擢九江德化教諭寧波府教授以禮讓風士士胥化之轉鎮海衛學寧波人奔送百餘里數日不絶終吉藩紀善祀四明名宦所著有四書易經隨筆其從孫叔元撰易經隨筆初藳序云晉峰先生之於易學深矣門弟子得其傳者莫若君禹濬凡君禹所著書淺為兒説約為微言精為生生篇大抵推明師説也先生遊宦在外叔元始生逮歸田而總角矣每見先生焚香兀坐手一編雖寒暑不輟丙戍冬乃進叔元而談易自伏羲畫卦之源方圓圖之次序位置隂陽之消長進退人事之吉凶趨避一一口授之而虧盈益謙變盈流謙數語尤為猛省曰凡易所垂戒者不在衰而在盛小子識之爾最後呼問曰序卦雜卦孰有味乎叔元臆對曰雜卦乃天地自然之理序卦斷章取義其理似未圓全也先生喜形于色曰稚子可教矣先生之書名為隨筆其初卷帙頗瀚晚乃刪舊藳更定先生卒君禹擕以入粵將梓之屬君禹卒而此書失傳矣歲壬子督學馮公索遺書乃遍搜蠧簏及諸弟子所記者伯兄手輯之而叔元稍加詮定凡丙戍冬所口授者書中或載或不載即君禹行狀所稱濬持乾坤二卦質先生數語而今皆不載也則此書已不盡先生矣况足以盡易乎因僭題曰隨筆初藳云萬厯志閩書鹿巢集處士李集山先生逢祥學𣲖按集山為古先生文孫亦一時師席模楷𠂻一昆仲受其業焉今録其髙弟著于篇處士李集山先生逢祥李逢祥字仕熙别號集山古先生聰之孫終身力學不倦青襟教授里中户外屨滿衷一兄弟其髙弟也終日整衣冠危坐無媟褻容諄諄誨人不倦明講解正句讀往往從灑掃應對間教人以精義妙道及隨行隅坐之節出告反面之儀終不令童子速成晚年就北城隈棲安一室安貧樂道不涅不緇等世態於浮雲優遊以老及門之士相與尊曰集山先生李衷一撰墓志副郎李心符先生光綬李光綬字宗英别號心符少受易於父奉直公貞從兄光縉幼孤貞撫而教之如己出自勝衣舞象以至成人二子無日不相朝夕光縉資性敏而光綬則倍苦篤貞循循施誨各竭其方業成諸執經問業如吕天池納言李莪明郡伯咸出其門壬午補弟子員乙酉鄉薦越辛丑前後凡六上公車皆不遇二親年益髙乃就銓補長垣邑諭三載以御史疏薦擢國子學正遂晉禮部司務歷户部員外郎卒於官光綬性廓落與人交傾洞肺腑然不能奔走周容自筮仕以至曹郎清節介操囊無一絲之積焉史文簡撰墓志林蒲石先生忠兄弟學𣲖按蒲石先生為紫溪蘇公受業師也清隱髙懷一時及門殊多英彥故特録焉林從政先生忠弟太林忠字從政號蒲石弟太字從禮號見潮晉江人蘇氏濬撰本傳曰二公俱被服四子沉浸六籍不能俯仰世資逐射䇿之技則推其餘訓里中子里中子爭以為名師余兄弟卒業焉二公規規摹古最能抗小學之法苐長公以訓詁勝每指類罕譬令蒙者心開次公以音律勝屬詞比偶往往有詩人意嘗自署云甕牖窺光大塊日髙浮野馬衡門守拙清宵人靜樂梅花其幽雅疏越如此二公與人交披肝露愫不作脂澤語而風神峻潔不可溷以私家君子尤嚴重之每公暇輒造語移夕出斗酒相勞嘲風弄月時誦經籍詩詞以佐諧笑至談及時事刺刺然諤諤然微言隱諷家君子未嘗不開顔受也西山林氏家世學𣲖按何鏡山先生撰林氏三世存殁篤行傳諄諄奬善誠足以勸世勵俗其家學自秋江公肇端啓迪户部方伯世為亷吏三公皆祀於學宫之賢祠淵源信有本矣兹著其家世載于篇以何公所撰諸傳節略附之備考焉明經林秋江先生嶤林嶤號秋江晉江貢士與李木齋聰論易有得去之三山從鄧焲講禮記盡得藴奧以授泉士發為針砭言皆藥石布衣襜整浣浣垂敝辟積如新同堂子姓人人垂白皆愛德不惰所與遊盡正直可欽之士遇田夫野叟亦端拱酬對嚴毅方正以不仕終子性之見林龍峰學𣲖孫一新見陳南樓學𣲖皆慈祥敦謹世為亷吏孫尚新曾孫可宗豫宗元孫茂先學行俱可紀閩書徒何司集郎中林六川先生性之林性之字帥吾晉江人嘉靖八年進士授麗水知縣麗水民俗朴淳而性之古心質行施于有政以哀矜聽獄訟以撫字理催科民信愛而謳頌之歷官户部主事員外郎中過家卒性之少而精思篤學要於自得不以世儒自期待仕宦十餘年清素淡約不異寒士家居惇睦割田十畝以給族人不能婚葬者其存心慈而待物恕以讓一毫非義之事不屑為亦不忍為為弟子員時以易著名所著有易經説中庸口義家傳而人誦之有所疑輒舉性之之説以證云按清源文獻黃偉序陳氏四書淺説謂論語下部為人所湊補偉取而校正之别取今户部郎林六川論語下部説以足之命工梓以傳焉則公尚有論語説志乘皆未之及六川性之别號也子一新泉州郡志清源文獻方伯林象川先生一新林一新字震起號象川晉江人性之子也性之未第時所交慎許可知南樓陳氏學有淵源使一新就學焉嘉靖丁未進士授户部主事管通州天津倉咸寧侯仇鸞提大兵拒北恃寵自尊重督餉郎官稍不如期多危中之一新戒諸分屬為期會走間道身趣之餉悉如期至竟不見咸寧返咸寧反亟稱之轉員外郎旋升江西僉事分宜相當事家僮犯法一新直杖繫之轉雲南參議東川土官為梗開府兵征之與直指相左一新獨右開府直指怒糾開府誣及一新事竟白坐降級家居七年起湖廣僉事纍轉江西副使復以忤虔撫論調後調雲南轉參政歷亷使進右布政皆滇蜀邊徼地丁內艱服除適江陵秉國其同年也素無通問至則逐隊晉謁不私詣江陵惡其逺已由是以年老被論罷歸家居蕭然守先世田廬饘粥幾不具蓋林氏世為清白吏子孫云子可宗為諸生淹洽史書事一新最孝舊郡志新郡志閩書文學林特起先生尚新林尚新字特起篤志學問自號猛省子懷畏子兄一新仕在外常推父兄睦族之愛拊畜族人父舊有恤族義田田所不贍尚新别為區處凡衣食塋葬及流徙失所者皆為籌畫至修葺祠廟身當其勞嘉靖之季寇警挈家避城而身守先人廬倡其鄉人築堡禦冦平生與人處有終始自奉蔬食布衣而已嘗曰人生有姻戚之愛鄉鄰之好朋友之交皆與吾身接也忽漫不親切是自輕其身弱冠𨽻文學諸生年未五十棄之郡太守聞之稱為茂才異等鄉大夫丁公自申文學長者也作誄誄之敘其孝友恭讓之行謂之曰君子子豫宗字和仲孝友敦摯念祖户部之宦也先置族義田其後欲為秋江貢士公祭田力不逮貢士公竟無祭田於是别圖埭田海蕩充之終以田薄為歉後使其子茂先走真州請於從兄八栁割俸以資之以竟其志子茂先亦有至性以父命請置貢士公祭田客死儀真父豫宗作文誄之何司徒撰三世篤行傳略閩中理學淵源考卷六十八
