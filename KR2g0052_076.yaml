body:
  text: 閩中理學淵源考卷七十六廣平府知府李清馥撰郡西林氏家世學派郡西林氏家學舊矣何司徒為林坦齋先生傳曰有泉先輩之盛士專一經者弟子聚而師之楷其模範而守其訓詁終身無所改徙以故師名其家士名其學文獻之盛所由來也蓋自成化以後蔡虛齋修明易學士得聆其緒論轉相授受其傳浸廣林先生受易於郭公文博其一也又曰先生所説書已焚草今不傳矣乃質行不愧怍於俯仰廣文與志唯君繼述有道之盛皆先生開之夫立德君子烏在尚言耶兹録其家學著于篇再素菴先生稱省菴為伯祖未知族派之詳姑附待考文學林坦齋先生文明林文明别字坦齋少受易於郭文博而文博受易於蔡文莊公虛齋文明褒衣博帶與諸弟子雍容講説陳紫峯先生與之相重統會聖真窮討理窟旁及詩文靡不闡究弱冠為諸生教人反復諄切句析條分悉盡其誠而規矩嚴密無所假借閲史籍見忠臣孝子貞夫義婦遺事輒掩卷垂涕得一善言隨筆劄記為人講論不暢不休以此得宗仰諸生間幹質魁梧與之處油油若無皂白至是非義利嶄然辨毫髮事父母切至孝敬不違伏臘祭祀灑掃焚香終老忘倦邑中飢疫流行家無宿食量力推賑於親友往來恤問亡少却避鄉有不平得一言而退其篤行如此所講四書易經故有草説皆手自訂定及見紫峰淺説通典曰足以傳矣吾不能有加也臨沒取而焚之草説遂廢子敦忠孫學曽教授林錦山先生敦忠林敦忠字恕甫晉江人生稟至性母陳氏蚤歿權厝叢間每朔旦輒省視哀哭如成人長為諸生步趨舉止折矩準繩同業生望見輒目為有道先生敦忠生平論學一以躬行為主督學奉新蔡公國珍嘗集諸生講學于清源山中諸生羣有問難敦忠拱手徐前曰今之學者基無尋尺而臨深為髙自謂聖賢作用不知中行難得若狂若狷須求一箇入頭狂者天資灑落地位儘髙若狷者痛自刮磨掃却枝葉從本源著力亦自覺有灑落處此狷之可幾於狂也所謂踏實地人也蔡稱善者久之其論學如此應嵗貢授南陵司訓已遷諭海澄教授興化所至皆立模楷諸生翕然敬信接人恂恂一團和氣而於義利之關斬如海澄為生祠南陵莆陽伐石紀德歿後三庠並祀名宦泉祀鄉賢子學曽别見學閔并孫維暹俱見科目志黃文簡銘其墓曰德行恂恂召伯春居今行古任定祖史氏傳之標儒林寥寥千古公為伍舊郡志墓志司徒林省菴先生學曽學派林素菴曰吾郡自蔡文莊而後行修學富必推黃恭肅光升風清塵絶必推李文節九我至若居官居鄉如寒潭秋月心嚴為師老而不倦則吾伯祖省菴先生一人而已馥按明自隆萬以後異説蜂起公之學雖兼尚餘姚然其教授生徒獨稟朱子小學教人成法步趨不失年耄不衰其維持風氣造就髦士之功偉矣於時會龎雜之日能獨守典型於不墜亦一時砥柱中流也司徒林省菴先生學曾林學曽字志唯號省菴晉江人萬厯二十年進士授南康司李擢為吏部郎周歷四司疏陳東南水患乞遇災思警亟簡賢才共濟時艱尋引疾歸甲寅起為太常少卿天啓中纍官户部尚書致仕歸問業者屨滿閩省直指使者張巡撫熊特疏于朝略云林某孔孟真詮周朱正派不愧理學名儒年踰八十猶朝夕講誦不輟學者羣然宗之比之蔡文莊而其厚德雅量殆類先代文潞公韓魏公之為人宜特加優禮恩錫部覆奉旨命有司遵照存問閩自司馬林文安瀚至學曽百二十年僅再見焉崇禎甲戌年卒年八十八學曽孝友天植學業庭授蓋方髫齡已卜為有道氣象生平自誓一字不輕出一錢不輕入歷官所任皆以趙清獻一像自隨苞苴請託望風逺却聞神宗時每呼曰林秀才其以清白受知如此居恆與李文節相嚮慕文節被攻時人勸避之學曽恬然如故嘗語人曰吾鄉不可一日無文節使少年後進有所敬憚宦三十餘載未嘗一刺投有司雖至親不少假借室僅蔽風雨門可羅雀兒童走卒咸知有林夫子年逾七十猶燃夜讀書或達旦不寐終日危坐未嘗跛倚逢人循循善誘開陳懇至曠若發蒙焉所著有史評警語潔身亭説皆論學正派又有孝經詮解批點小學編諸書新郡志通志林氏筍堤集跋語銓部林素菴先生孕昌學派按素菴先生為吾郡明季舊獻視鏡山何公為前輩與石齋黃公八公蔣公為同年友榕檀問答公為之序皆同時互相觀摩講切其學本之伯氏省菴司徒考省菴與公皆談姚江之學然省菴自授徒至耄年奉朱子小學書為髙曽矩矱絶無肖似王學者素菴則平生景慕文清文成文莊三先生纂輯三公遺書不但誦説其文而已是時閩中典型師友猶有可稽如莆有金石社漳有榕檀吾泉鏡山何公倡學於恥躬社省菴林公講説於不二精舍布衣季􅌢黃公栖隱於升文社而素菴則讀書於筍江在兹社嘗自撰在兹社序曰筍江在兹山房余小子所草搆耕隱鳩子弟讀書其中者也每慨末俗虛名焦心正學不講有言及身心性命之故者輒指之為迂詆之為偽而後生新進粗知章句便膾炙李秃翁之書言以翻案為竒行以跅􅕟為髙釀成輕薄漸為世道之憂思一起而維之顧余非其人也觀素菴自敘結社之志可見彼時俗波靡公蓋維持于不墜者爾又公嘗集子弟月三會講説經義旁及史學其門人張拱宸何承都等緝成名曰經史耨義又著周易解義筍堤集諸書著作甚夥今考其門徒姓氏著于編銓部林素菴先生孕昌林孕昌字為磐號素菴晉江人祖雲龍隆慶丁卯舉人官至運同晚好讀易手評二程及易傳時與布衣黃季􅌢論學必依程朱虛齋正派年九十終為諸生時即志濂洛關閩之學天啓二年進士歷官吏部文選司郎中其秉銓衡澄敘官方疏恤直節薦揚理學諸名臣後以避璫黨忤權貴借他事下詔獄百日歸家立朝僅兩嵗已而三徵不出里居講學從遊者屨滿所著有易史象解廣占續小學春秋易義泉山小志經史耨義旦氣針語録在兹會語筍堤集未梓者有論語耨義尚書三禮三百篇藁前後戊巳自鏡録雁山集等書童氏子煒撰春秋易義序新郡志林素菴先生問問録節鈔問問録小引學之需問久矣言博學者繼以審問舜大智也而曰好問今人乃有學而無問矣夫子以好學下問稱孔文子風世也非為文子也學不講是吾憂問弗知又烏能措乎中州張得一先生來按吾閩慨然以倡學明道為己任巡方事竣則偕參知曽二雲先生進筍江社諸友於羅一峰先生書院而提誨之已復出上問録三十則見示若謂滿目皆上也何處是下愚拜受讀之不覺起舞曰有是哉學問兩字復明於今日也夫皇華之詩諏謀度詢皆問也乃察吏安民而外更為崇儒橫經之舉則斯問也不獨振風紀且勵風化矣愚不敏承問宜有所答而慚未能因抒管見而再申問焉遂名之曰問問録尚冀有道君子之再有以教豫也問未發之中解説猶易尋認甚難不認得如何執得此探本窮源之論也愚謂未發非屬玄虛人身實實有箇中體如花之有根如水之有源雖發矣而有未發者存焉雖不發矣而有能發者存焉所謂天命之性無極而太極天地之大本是也人身實實有箇太極却被私欲蔽錮憧憧勞擾未發之中從何識認惟日夜所息至平旦之候一夢甫終衆緣未乘天地清寧之氣來與我接此時良知好惡炯炯不昧已隱具發而中節體段矣在天為平旦在人為未發此孟夫子旦氣二字程子謂其大有功於後學也李延平教人靜中觀未發氣象夫靜則孰有靜於平旦者從此尋認從此下手用戒慎恐懼工夫使一日之間無非旦氣之流行推之應事接物隨處提醒隨處迫現則不獨靜可觀未發動亦可觀未發矣不知可備葑採否問致知格物格字即有恥且格之格當化字看此論極是夫格致之説紛紛莫定久矣愚謂當先繹大學本文明明德於天下至先致其知工夫已盡乃不曰先格其物而曰在格物實無所用工夫矣蓋知即明體如日月當空明鏡在懸著不得一物無論惡物著不得即善物亦著不得也格字即格君心之格人終日為物所障故知體不現物格而知自致猶塵去而鏡自空也看來格去與格化與陽明格不正以歸於正意似相合不審有當否問子何以孝臣何以忠俱莫為莫致之光景便是天命之性此解最為妙悟人但知子臣弟友為庸言庸行故日用習而不察不知其所以然處皆天也靜思默想何等竒妙即如人終日目視耳聽手持足行習為固然亦安知為天所命逮觀盲聾者之無以與於視聽痿痺者之無以與於持行然後知天之錫我者竒而厚我者至也子思子將天命説入庸德使人不苦玄虛復將庸德歸到天載使人不厭平易問吾輩下工夫一味枯靜終無著落愚見亦是如此程子曰不哭底孩兒誰抱不得虛齋先生云若是真學問文章須見於威儀之際與夫日用之常若是真道德性命須見於治家之法與夫當官之政不則閉門靜坐亦虛耳然先輩每教人靜坐想為腳跟未定者先下一砭此法亦可細參否問忠恕是仁字脈絡歸仁見一貫光景何以知之曰即以克己兩字知之也夫忠為中心恕以如心此己不克則一團窒礙到處荆棘己心不能如人心人心不能如己心仁從何歸一從何貫乎愚嘗謂一字堯舜以來相傳之意而貫字為聖門獨標之宗一以貫三字內實實有克己工夫故告淵以克己而授參賜以一貫其道一也然否問愛之一途未足盡仁仁性體也發而為愛則情也仁體不可見惟惻隱為仁之端故以愛字歸之要亦有不拘拘於愛者舜舉十六族而誅四凶何其愛十六族而不愛四凶耶總以行吾仁而已此説可相證否問夫子處處言仁却不曽露出仁字抑夫子與諸賢言仁者屢矣乃以為罕言仁何也夫子所言非求仁之工夫則為仁之作用若仁體渾淪實口角形容不出只可靜參默會耳然否問讀書須句句收合自家身上此是讀書要法人身自具有太極具有儀象具有姤復兩卦但非讀書窮理亦體驗不出如周子著太極之書遡之無極而其用工夫處只定之以中正仁義而主靜張子西銘本於乾父坤母而其用工夫處則以不愧屋漏為無忝存心養性為匪懈邵伯溫謂乾坤為大父母故能生八卦姤復為小父母故能生六十四卦然復之中行姤之􅍭章皆隱隱示人以處身處世之法此數者收合自家身上即他書不讀亦可矣如何如何問惟怒難忍惟過難覺此兩語聖賢學脈也顔子亞聖得力處惟不遷怒不二過忍則能不遷覺則能不二矣薛文清嘗言二十年治一怒字尚不能消磨王汝止曰心有所向便是欲有所見便是妄如此用功檢點庶幾無過然否童先生子煒童子煒林氏素菴門人其序素菴春秋易義略曰煒方髫齡即炙先生之教受知特深日與彚翁世兄同硯席親承提命立雪春風者數十載兹復與彚翁同宦一方適易義一書正在剞劂煒因得效校讐之役聊述生平有得於易義之旨以志授受淵源之有自如此童氏撰林素菴春秋易義序王氏家世學派按郡先輩楊氏輿撰彥衡王公銓神道碑稱王氏之門世篤忠貞家全孝友今考公在靖難時奮身殉節其孫桓庠生早逝妻李氏為吾六世祖朴菴公之女誓守節教督其子是為東軒公熺其媵洪氏不字從李氏老世號雙節顧新山先生諸公撰志傳詳矣東軒首以儒學顯著其子居南公文升孫三揆公鏞漢冶公鍔皆以理學稱東軒居南又以雙孝著同郡先正王公用汲何公鏡山許公宗鎰並娓娓作傳述之厥後孫曽某為寧粵軍門贈東軒居南為安東伯考其家世纍葉濟美自遜國迄季明與國咸休無極此可以觀德矣兹著其家學纂録前輩所紀述者著于編司訓王東軒先生熺王熺字仕顯號東軒曽祖銓靖難時以忠節著父桓郡庠生早逝母李氏安溪旌義李公森之女矢志守節督教其子讀書其媵洪氏不字以從李氏老世號雙節熺資稟聰穎博學多識事其母以孝聞父墓患水熺哀哭幾絶改葬焉追服斬衰蔬粥廬墓母死毁瘠治葬復廬墓三年正德十三年以貢授廣東瀧水訓導瀧水僻陋士鮮知學首以明倫敬身為教以經義啓迪之俗尚鬼信禨熺刪定家禮教之任官五載乞休歸恆言稱母訓母好施熺雖貧每新穀升必播精遺四鄰忌日必哀其生辰雖年七十不敢受子弟上夀禮如忌日肇慶郡志載名宦顧新山先生志其墓子文升亦以孝稱顧新山先生撰墓志何鏡山先生撰王先生父子傳王居南先生文升王文升字子騰號居南熺之季子也凝定有至性自少即不為凡兒嬉戲十三嵗隨父司鐸於廣父患疾祈以身代躬湯藥少愈乞休歸途疾轉劇值寇警旅寓郭外又有水患文升竭力護持設床褥卧父床離水僅尺許文升立侍水中三日父疾愈亦無恙洎父歾毁瘠致哀如禮嫡母陶繼母李事之盡歡生母鄭疾思荔非其時逮荔熟而母逝則終身弗食焉公於祀事虔甚潔修思慕澘然涕出感母鄭獨子之言中年議納妾初捐金納一女同安人既至詢已許人蓋儒生也升不敢近亟物色儒生歸之不責原金其重義如此生平勤學強識動遵矩矱不愧衾影談吐必稱古人性和粹莊重口不出暴戾媟狎之言每詫兒輩仕無崇卑毋以墨敗法課子雖以舉子業而視世之繁華靡競口習行違者弗善也嘗戒子遺言曰吾泉前輩林龍峰近輩王嵎齋此二先生者人皆謂之朴實頭學者正當朴實上用工夫做到精微細密地位便是真正聖賢大抵人品好者都朴實不好者都不朴實好人又有幾樣者全看他學問如何耳升之著述可托入性理者甚多許公宗鎰王公用汲並為撰志傳子鏞鍔皆以實行理學著聲後以曽孫某貴贈安東伯許公宗鎰撰本傳王公用汲撰墓志孝亷王三揆先生鏞王鏞字庚鑄號三揆旌孝文升子幼醇謹長有志聖賢之學覃精會思手筆識之萬厯十六年舉于鄉七上春官不第無意世途抱遺經以終老嵗丁未下第歸逰山東卒濟南逆旅舍家僮圗輕裝取所著書焚之喪至其弟鍔驚問其故大慟而摉家篋中者次之今見鏡山所撰傳中附載數十條鏞自少知孝五嵗請父取筆作書即書老萊子孝奉二親七大字執父喪每餐二合米數葉菜合煮之陳布衣欲潤題其齋曰今世誰有如王庚鑄行古人道執父喪蔬粥三年未嘗一啓齒笑庚鑄真孝子矣鏞沉靜堅忍渾厚洪深得失不分喜怒不形其言訥訥其貌迂迂而大義所在必為必止賁育不能奪也趙撫軍欲求賢師以囑觀察觀察求得鏞而鏞己先受聘甘廣文所固辭卻之廣文曰此吾上官足下奈何重名義慢吾上官而使見怪我乎不得已往館三年未嘗以一事干其梗節大槩類此所著有天彞淑世編及語録諸書先輩何鏡山先生撰本傳其言曰吾泉理學之盛自蔡文莊陳布衣而後興起者僅僅其當吾身所見者三人焉布衣陳欲潤諸生林甫任孝亷王鏞云後以孫某貴贈安東伯何鏡山先生撰本傳明經王漢冶先生鍔王鍔字淑甫號元液天性孝友少慧穎居南公一言即服之終身竭力養志幾微周悉父歾毁瘠骨立喪祭如禮與兄鏞事嫡母曲盡孝敬事生母雖孝然終嫡母世不敢與齒事兄稟命步趨惟謹嵗藉教授弟子咿唔自給操持極嚴介平生志學以居敬窮理為務讀古人書卷不去手雖終老明經而實以斯文正脈為己任言動不茍後學負笈相踵自癸巳受學李見羅徐匡嶽潛心著述有四書五焚存稿易經七削存稿詩經三百大意及時習諸説等書與林省菴諸公同修府志一時名士如鄭孩如李衷一何匪莪諸公並稱許以為後學楷式設教江右勉諸生實行與廣文孝亷凃世葉門人吳文盛講論不輟獨坐一室不夜分不寐卒之前一日猶以吾未見剛章未脫藁命姪燦記之學者稱為漢冶先生林省菴先生撰本傳安海黃氏家世學派馥按黃氏之先自正德間通判公為陽春令其仁澤流徽數世矣毅菴尊人菊山公又以詩古文辭名與莊公一俊王公遵巖相善王公獨稱其詩與駢語為長平昔庭訓皆根本禮教故毅菴立朝清節屏斥中涓書牘出處本末毅然有執猶足窺其家學大端也兹録其家世大略著於篇首同知黃菊山先生伯善黃伯善字未詳號菊山晉江人以詩賦古文詞名與莊一俊王道思二公相善王公獨稱其詩與駢語為長庭訓根本禮教不及居積嘗言曰吾行不能矯俗但自信無一橫錢又曰吾未敢即謂君子然不敢為小人此足窺行已大端矣所著有菊山文集十卷菊山詩集二十卷讀書彚記八卷連枝集十卷詞賦雜體四卷藏于家子憲清孫汝良同知黃以憲先生憲清黃憲清字以憲晉江人嘉靖甲子舉人隆慶初知陽春縣縣屬萬山中亡命窟穴桴鼓數起官皆挾兵自衛憲清一意撫循嘗奉詔清核民田盤跚橇楯跋履皆遍所至茹糗席蓐不以供應煩民五閲月而田之溢於舊額者幾倍然惟按舊籍才足而止嵗賦十二三民大便之立石著為令復革奏籍例金遷亷州同知珠海故多盜設有戈船守兵墨者縱兵入海詭云遊徼而陰與為市憲清無寇輒出者罪之再攝雷廉守篆並以節愛稱丁外艱歸卒子汝良宗伯黃毅菴先生汝良黃汝良字名起號毅菴晉江人萬厯十四年進士選庶常授編修纂修國史使趙藩王簡踞欲殿外安節汝良堅執入殿中禮畢即行餽贈一無所受轉南司業復移北有監生為巨璫私人偃蹇無狀欲按之挾巨璫書至汝良曰國學四方觀瞻且司成無與中涓通書例如法責懲擢東宫日講官每敷引古今隨事披陳東宫喜動顔色進大司成天啓初轉南禮部侍郎乞歸乙丑起禮部尚書掌詹事崇禎初逆姦既殄首疏抗言楊左諸臣宜加封恤要典一編亟宜焚毁奏入陛見陳時務八要遂致政歸著有樂律志氷署筆談野紀朦搜河干集子慶華崇禎舉人孫光祉康熙補科舉人署甌寧教諭雍正九年郡志藁閩中理學淵源考卷七十六
