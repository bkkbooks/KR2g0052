body:
  text: 閩中理學淵源考卷八十廣平府知府李清馥撰州守唐東里先生泰學派唐公在明代國初沈潜經訓諸名德多出其門實倡起之師也州守唐東里先生泰唐泰字師廓長泰人資稟迥異通曉五經尤邃于易登永樂十三年進士知祁州有惠政後以文學薦辟召赴文淵閣試麒麟頌明倫論稱㫖欲大用之因大駕北征遂乞歸侍養四方之士受業日衆乃築草舍百餘間以居之隨才誘誨皆有成就如陳布衣真晟謝侍郎璉林修撰震陳考功亹皆出其門著思誠齊銘學者稱東里先生道南源委郡志侍郎謝重器先生璉謝璉字重器龍溪人宣德丁未廷試第三人除翰林院編修試詩稱㫖嘗從謁長陵獻陵對述稼穡閭閻利弊甚悉丁艱服除與修宣宗實録及令典聖鑒日厯諸書因災異陳言請出宫人又請赦諸無辜及除連坐法尋遷侍講正統十四年上言時政十五事中言石亨不可専任尚書于謙知軍旅大臣胡濙堪付托事後若懸鑑而築城龍巖建守禦亦璉所議也秩滿升南京户部右侍郎創便宜六事為經久可行之規明年兼掌兵部務時户部郎陳秀坐誣下獄璉力爭之秀乃得脫景泰癸酉以疾卒于官詔遣中使涖喪諭祭葬故事翰林居養優地徒以筆翰相髙慷慨論朝政自璉始著有奏箋百餘卷及玉堂藏集修撰林敦聲先生震林震字敦聲長泰人事繼母至孝家貧力學每樵耕挾書自隨卧樹下仰讀不輟宣德五年殿試第一人授翰林修撰正統二年以疾告歸娛心書史非公事不至郡邑廣藩兩聘主試號稱得人卒于家閩書郡志布政陳尚勉先生亹陳亹字尚勉漳浦人師事唐師廓與陳剩夫為同門友登正統元年進士歷官吏部郎中文章政事為時所重威喇犯邉守臣失策作備邉禦戎䇿以獻天順四年廣東盜起廷議必得陳某乃可除廣東布政使時英宗初辟勵精圗治召入內殿賜宴遣之既至密相機宜討平新興撫定德慶蓬州等峒賊患遂息以疾乞休著有經籍要覽梅菴存藁羣從多以科第顯道南源委閩中理學淵源考卷八十
