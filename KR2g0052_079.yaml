body:
  text: 閩中理學淵源考卷七十九廣平府知府李清馥撰清漳明初諸先生學派按文勤蔡梁村先生漳郡志序曰維漳郡始於唐初僻陋濱海自有宋朱文公涖郡以後陳北溪王東湖親承其統緒道術既一禮法大明明代陳剩夫蔡鶴峯諸賢又起而賡續之流風餘韻至今猶存云竊嘗敬讀先訓論近代人物蓋于清漳留連不置聞彼間風土山川靈異潮波安恬水汐時石岡嶙峋挺峙其清淑磅礴之氣鍾為人傑不亦宜乎兹將洪永宣正間先正學派録其著者載于篇總憲劉愛禮先生宗道劉宗道名駟以字行龍溪人洪武壬辰徵秀才八千餘人入試朝政宗道第一仍命學士詹徽密察諸儒中特異者居德行第一以布衣侍坐共論治道拜都察院左都御史上格君澤民二十事言甚切直上命所司採行之自是議大政多所譏切遂為邵質董希賢所搆詔徙南詔不久貰還宗道明程氏學好修家禮鄉人稱愛禮先生有愛禮集十卷陳真晟讀之稱其繼北溪而起大有功於名教云編修李先生貞李貞南靖人永樂十三年及第第二人授翰林院編修與儒臣編緝四書五經性理大全後以不肯預修佛書貶髙州府教授卒孝亷林先生皥林皥長泰人志行髙亢刻意學問與林震同學為震所推永樂庚子與震同領鄉薦後隱居不出自號後岡處士後進皆師表之閩書評事胡先生宜衡胡宜衡名楀以字行宗華子性敏嗜學謹厚莊重孝事繼母漳人及門甚衆永樂十七年以賢良薦授翰林院中書舍人與修成仁二廟實録上為善隂隲詩賜金帛文綺升大理左評事居官清苦尋引疾致仕閩書栁先生文通栁文通平和人父沒既除喪當就試其母止之遂不復出居家教授生徒户屨常滿所居西林凡西林之占一經者皆其徒也閩書吳汝華先生霞吳霞字汝華海澄人邑庠生天性孝友篤志好古即所居傍築小室扁曰顔巷聚書其中其潛玩程朱至忘寢食諸儒語録行録悉手抄讀每語門弟子曰世無真儒學之一字弗明也學字既明士風自變矣又曰其本在立志其要在主敬所著有射禮輯説道原録抄羲集抄學則拾棄稿示兒編皆有關世教年八十餘卒長子邦懋生員有父風閩書閩中理學淵源考卷七十九
