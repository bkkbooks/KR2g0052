body:
  text: 閩中理學淵源考卷三十八廣平府知府李清馥撰丘行可先生富國學派按先生登宋淳祐七年進士後文公數十年黃氏海辨正之謂道南源委作朱子門人為非蓋亦從公之門人輔氏學耳今從黃氏本丘行可先生富國丘富國字行可建安人受學朱子之門人輔氏漢卿淳祐七年進士為端陽僉判宋亡不仕著周易輯解十卷經世補遺三卷易學說約五篇發明朱氏宗㫖閩書鄭翠屏先生儀孫鄭儀孫號翠屏建安人從邱氏富國學易咸淳癸酉應賢良舉又明年少帝北行儀孫退而著書易圖說解大學中庸章句史學䝉求箋注性理字訓郡守吳某率幕屬迎于學師事之閩書知事張伯陽先生復張復字伯陽建安人泰定元年進士仕建寧路知事師事鄭儀孫學易得邱氏之傳嘗輯諸儒論議編性理遺書閩書應奉張子京先生諒弟貢張諒字子京建安人與弟貢學易於丘富國著經史事類并書澤三十卷後賜秩翰林應奉文字閩書建安雷氏家世學派按雷氏龍濟先生以殉國難其子志澤先生以邃於易傳之後嗣皆以易名家彥舟先生後亦以殉節著平昔尤以朱程為學的立論先德行而後文藝其倡建義士莊以濟士類信乎一命之士存心愛物必有所濟其貽謀保艾者逺矣教授雷志澤先生德潤雷德潤字志澤一名逢辰建安人父龍濟宋鄉貢進士以殉國難德潤學邃于易旁通諸子及律厯術數舉明經除福州路教授積學庾之餘買田三百餘畝以給貧士婚喪老疾者號義士莊人為建祠學宫調長樂簿卒德潤為學先德行而後文藝講論必以朱程為主教人必以聖賢為法子機栱杭閩書待制雷子樞先生機雷機字子樞延祐進士授古田丞遷延平總管府知事改邵武經歷邵長官有怙勢撓政者機每命吏抱案牘與庭辨不為屈郡政以平調興化尹察知邑中賦役不均機令民首實而品第之日更一吏主牘賦以大均民呼為雷神丁內艱服闋轉湖廣儒學副提舉月書季考具有成法擢延平總管府推官順昌尤溪沙溪南平數縣疑獄株連纍嵗悉得解釋建義學延鄉貢進士陳竑願教之俄羅天鱗反汀界上立堡栅集丁壯盜不敢犯升惠安尹究心學政以興禮讓之俗三嵗最諸邑代還民立祠樹碑鄉井幾遍除汀州總管府推官築城開濠以實堡障申屠駉僉事閩部行郡至汀稔知機賢悉委訟牒已不俟引年遽上休致朝廷嘉其亷退升翰林院待制階朝散大夫機軀幹魁梧方靣美髯居官尤盡心獄事夜參半孤燈熒熒翻閲成案不休曰人命至重為人嚴而不苛和而不流所著文辭森嚴演迤有龍津龍山鄞川環中黃鶴磯梅易齊碧玉環七稿子燧燦閩書縣尉雷君實先生栱雷栱字君實興化縣尉以公亷正直稱壬辰嵗因羅天鱗亂委守海口卒于官亦通於易州守雷彥舟先生杭雷杭字彥舟建安人與兄機栱俱以易鳴於時嘗著周易注解行世時稱雷氏易舉浙江鄉試第一登癸酉進士授浙江儒學提舉遷武平縣尹調潮陽以死事贈奉化州知州官其子煜為同知閩書通志魏菊莊諸先生學派元代建安之派去游胡劉朱之遺未逺也其流風餘矩猶有傳人然考其時多潜身草澤或託儒官一途以自奮而志業弗究其用者多矣今搜録數十家次其懿行或承之家學或得之私淑或以文學知名或以附聲大雅原委所漸尚有可稽云魏菊莊先生慶之魏慶之字醇甫建陽人師於王晟得考亭學中嵗留情詩賦種菊盈籬詠觴自適號菊莊翁手編詩人玉屑若干卷而尤以施捨稱閩書學正游子善先生應翔游應翔字子善崇安人酢七世孫也值宋元兵革未靖結屋武夷澄川之上耕隱自晦人稱其操履端方無愧先世後繇武夷直學遷學正山長陳良材先生楠老陳楠老字良材政和人至元元年以鄉貢進士授興化路涵江書院山長轉建陽雲莊書院山長至正間棄官歸嘗過萬竹菴題詩曰青山逈望合萬竹淨娟娟寶殿晴光冷瑶階翠色妍龍吟明月夜鶴舞早秋天坐聼凉風發軒櫺響澗泉建寧府志文苑江菊隱先生應隆江應隆自號菊隱建安人求學於謝疊山疊山字之曰仲龍蓋取孔明長嘯隆中而時人以伏龍待之周先生震一周震一建安人家在城府不妄交一人謝疊山枋得客建寧震一獨與相厚疊山稱其忠厚篤敬言不妄發行不妄動翛然出塵埃之外而可與神遊八極之表子持敬亦修真慕道為謝疊山所稱山長朱泳道先生沂朱沂字泳道建陽人文公三世孫纍薦遺逸不赴與謝枋得游枋得稱其論古今人物髙下國家興廢善類仕止久速之故掃盡華葉獨存根株文公之後濟其美者泳道一人耳晚嵗授考亭書院山長趙順之先生若趙若字順之崇安人號澗邊蒙古岱丞相入閩一見重之薦授同安縣尹不就隱於家有園池亭榭之勝以供嘯咏髙丞相開閩省三使人來聘之強為一見勸之仕不從長于詩年六十四終有澗邊集二十卷蘇明逺先生照蘇照字明逺建安人工詩文尚儒術後進多師之至正間以明經薦至京預纂修事欲授以官以親老辭卒年八十子伯厚見選舉推官楊仲宏先生載楊載字仲宏浦城人徙家洪州少孤博極羣書年四十不仕以賈國英薦召為國史院編修官與修武宗實録延祐初舉進士歷寧國路推官卒載為文有跌宕氣博而敏直而不肆自成一家言而於詩尤有體嘗語學者曰詩當取裁於漢魏而音節則以唐為宗自其詩出一洗宋季之陋與虞集范梈揭傒斯齊名時號虞楊范揭有詩集行于世建寧府志彭元亮先生炳彭炳字元亮詩倣陶柳游齊秦都下聞昌平隱者何得之遂往謁之駙馬烏克遜事以師禮朝野自是知名至正中徴為端本堂說書不就有集一卷閩書教授鄒文祥先生天瑞鄒天瑞字文祥建安人任建寧路教授元季風化凌夷天瑞首唱文學諄諄以忠孝亷節開士士為振起閩書司訓鄒季和先生文慧鄒文慧字季和建寧人任司訓元末謝職服柴桑巾服講明朱學本郡理學推文慧為首郡志張先生以仁張以仁政和人元季隱築蓮花峯下與魏伯堅謝坤孫藴余應相友善旦夜講論經史至忘饑渴後俱以文行知名而以仁伯堅終隱不仕卒郡志閩中理學淵源考卷三十八
