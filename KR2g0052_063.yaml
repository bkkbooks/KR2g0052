body:
  text: 閩中理學淵源考卷六十三廣平府知府李清馥撰僉事林次崕先生學派按先生未及蔡文莊之門所學皆文莊之學也正嘉間王學紛披専講良知之旨先生與淨峰諸公獨守師説所著朱陸異同之論可為後學折衷至批摘王學誠不遺餘力矣其時溫陵尚有王氏用汲三山鄭氏世盛江右羅氏欽順皆與餘姚枘鑿而羅公尤與先生往復稱同志先生之徒其著者洪氏朝選張氏應星而洪為先生之壻鄭汝德謂其得先生之教為多云僉事林次崕先生希元林希元字茂貞號次崕同安人正德十二年進士授南京大理寺評事世廟登極條上新政八要大略言君道急務在勤正學親正人而朝廷大政在息中官機務罷中官鎮守所以清政本塞亂源通政司辦事接本進士周祚言頃來章奏紛紜莫有如希元所陳者乞省覽施行下所司議上優詔嘉納之其後天下鎮守內臣悉罷先生啓之也遷寺正與堂官陳琳執議刑獄降泗州判泗大飢朝廷發內帑賑濟先生悉心推行有嘯聚五百人單車往諭皆解散適巡按劉御史醉而待先生稍倨即棄官歸後方獻夫霍韜薦之起為寺正升廣東按察僉事奏屯鹽欵要及荒政叢言上可之通行天下改提督學校申明學政訓士務在闡繹經傳劇冦王基作亂時先生署按察篆督率府衛兵指授方略討平之升南大理寺丞世廟特簡用之上王政疏為目二十有一三載改北京十三年大同軍叛殺主帥閉城先生上疏請誅之朝議竟從撫明年遼東兵變窘辱巡撫先生復抗疏極言往者大同姑息以生輕侮之弊上責其妄謫知欽州欽接壤安南土荒民寡先生悉心經畫拊循之會安南不貢朝廷方議征討擢先生海北兵備道而先生上六疏主必征之策與當事所議不合罷歸然其後安南惴惴歸命盡復四洞舊地論者謂先生之議足以奪其魄焉先生慷慨鯁直讀書遲鈍而刻苦不懈研理釋文極其精専束髮以來慨然有志當世一入仕路執其所學用之經濟直以唐虞三代可追晚年退歸無日不以讀書解經為事其學専主程朱嘗恨不得及虛齋先生之門於良知新説尤所不喜晚復參訂諸儒所定大學格物致知之説附以己見曰更正大學經傳定本并所著四書易經二存疑疏上之且乞勑改正頒行竟以此削籍然至今存疑二書學者宗尚不廢焉行狀郡志舊新郡志蔡氏獻臣撰本傳閩書道南源委巡撫洪芳洲先生朝選洪朝選字舜臣一作汝尹同安人嘉靖二十年進士除南京户部主事出𣙜稅北新關課額既足便開通津梁恣往來不復問事竣督放倉儲諸所規畫皆為後式一日思所學未足上疏引疾客毗陵就唐荆川順之講學一年始歸又就王遵巖慎中上下議論久之充然有得起為南吏部郎出督學四川以公嚴校士素不為嚴嵩所喜而徐文貞階深與之嵩敗遂以山西參政召入為太僕少卿尋進僉都御史提督操江旋加副都御史巡撫山東隆慶戊辰入為刑部侍郎遼王憲㸅者居國中荒淫亡度其摧折士類無纓緌貴顯張居正祖父故為遼府􅈨户嘗被王杖居正心恨之及秉政因私憾指遼藩有叛謀議奪其國屬朝選往勘朝選還報王貪暴淫虐事事有之實未嘗叛大拂居正意嗾言者劾朝選歸朝選性剛介不能容人過失好言有司短長人多憚之者會中丞耿定向撫閩素善朝選每咨以時政朝選傾心答之亦無所諱答中偶及藩司支放邊戍月餉事左布政勞堪知而深銜之勞刻深人也耿以憂去勞代之思泄已憤以逢權相意而邑中子某更托其無情事以報遂具疏聞居正從中擬旨削籍逮訊之命旋下勞堪得密報遂馳戎卒逮朝選下臬獄不二日斃之獄中親屬莫得一迹晉江士趙日榮排獄門而入撫尸大慟收殮之萬厯壬午春也堪下興化守某偕諸司理煆煉獄誣以通夷接濟諸事報上居正大喜擢堪左副都御史協理院事朝選子兢訟寃于朝居正矯旨杖之八十仍奪蔭其夏居正暴卒朝紳稍稍誦朝選寃都諫李廷儀更條上寃狀部議堪回籍奪職繼之甲申嵗兢再訟父寃及堪諸酷虐狀南安人黃御史師顔從中從曵方有旨下堪部獄僅謫戍定海而里中子亦戍邊矣未幾詔復朝選官致仕兢補蔭如故一時阿堪意煆獄相繼竄逐士論稍伸猶以堪戌未盡辜宜正之典刑以謝朝選奈時宰置不問也朝選居官亷潔以名節自砥礪平生學行政事卓然可稱其不能含章免禍亦所短歟閩書郡志舊新郡志郡守鄭汝德先生普鄭普字汝德南安人舉嘉靖十一年進士授無錫知縣無錫大邑也普初銓時倉皇周章若無措置日惟自檢不敢有毫髮詭偽其後民與官相信縣門恆虛遂不覺作縣之苦秩滿遷南户部主事𣙜舟維揚用度以節待商以寬擢雲南府知府未赴以父喪歸免喪侍母不忍去居嵗餘母病卒服除赴銓卒于都下無錫人聞之皆相弔普嘗與林希元論易蓋君子體易只取其意不必執定卦義何如如常德行習教事何與於坎只取一重字意獨立不懼遁世無悶何與於大過只取一過字意裒多益寡稱物平施分明是均平天下之道只取過而當損有謙之意耳理氣道器之論如尊劄所言更何改評整菴公尚未肯釋然相從甚矣舍己從人之難也然其説破陽明數語真痛快可喜但陽明之學固有偏處今人動輒排之亦未為是蓋人之為學隨其所見皆足適道如象山晦翁二子學本不同自今觀之孰是孰非而二先生亦未嘗明目相擊如今人也孔門諸子有侃侃者有誾誾者有行行者有狂者有狷者有文學者有政事者隨所長而各造其成今人無諸子毫末輒昻昻然以聖賢自任擇古之有名於世者極力攻排謂是足以驚人而峻已就使立論皆是於性分有何干涉此今世講學者所以重得罪於世教而自取禍往往不少説來説去只是成得箇惟口起羞四字耳其持論如此閩書楊敬孚先生朝幹楊朝幹别號時齋弱冠知力學慎擇師友其折𠂻諸説率自心得引進後學講議文字往往必求古人精意作為文章務在理到切實不騁浮靡其事直叟公愛慕不衰孝心純篤且刻苦奮勵不以貧撓志寬仁恭恕不修邊幅不言而接人以敬凡四方賢哲與同邑鄉賢次峰謝崑逸所黃偉咸相與為友又與次崕林公麗澤有年其餘榮耀儒名者多所禮於其廬卒後友人教諭檢吾楊復諡之曰敬孚先生所著有四書詩經集覽林次崕撰本傳閩中理學淵源考卷六十三
