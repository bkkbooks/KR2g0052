body:
  text: 閩中理學淵源考卷九十二廣平府知府李清馥撰正嘉以後諸先生學派按黃氏乾行陳氏裒皆以儒學顯著而立朝又卓然餘或求師取友或建白當時固皆特立有守君子矣郡守周懷玉先生璞周璞字懷玉福寧人嘉靖四年舉于鄉從呂涇野講學以潛心力行見稱判廣州核市舶斥絶常賂升上思知州諄諄講論蠻俗一變經營物力以築城門嵗成一門四門成擢思恩同知尋擢知府首戒九司曰地方多事皆因爾輩爭立今若覬紊繼法毋貸吕馬者岑猛黨也聚衆為梗兵備曰有周守在毋憂旬月馬服罪且納金為謝纍却之入覲乞休不允徑歸粵民兩齎撫按檄至州促復任竟不起璞與人交若飲醇有過婉諷俾自悟而中介有不可徇者著一石摘藁與弟珉同以孝友稱閩書通志縣令吳汝礪先生鈺吳鈺字汝礪福寧人教諭宣城卻贄恤貧師鄒東廓守益汪東麓佃講學淑士令公安以不阿歸宦槖蕭然書十數篋而已叔㻑孤寒鈺為立嗣勻以己産兄鐸死無子敬禮寡嫂弟鏻早逝撫其二孤庠友程珩疾革偕周璞旦夕省侍及沒珩妻李亦亡偕璞舉其二喪焉閩書郡守黃大同先生乾行黃乾行字大同福寧人父子厚青田訓導嚴直不阿子四長乾清恂恂孝友會試下第製絹衣父知詰之跪伏自責乾德知宣平鋤強戢吏乾行舉嘉靖三十二年進士授行人歷戶部郎中出守重慶誨士阜俗卒于官所著有禮記春秋日録四方傳之乾行倜儻負義兄乾清病夜覓醫于鄉遇虎不顧乾清子復早卒為昏嫁其孫及孫女弟乾道夭無子養其婺終身閩書兵備陳邦進先生褎陳褎字邦進寧德人嘉靖二年進士選侍御史劾胡侍郎提督大同逗遛疏立獻廟疏廖冢宰私閣臣所親因乞終養十餘年起復巡按江西夏言為相欲毁民居以益苑囿書以諷之云費鵝湖之變幾至滅族相公方締歡魚水當造福子孫霍韜嘆曰真御史也左遷韶州推官復謫判泗州久之為慈溪令毁淫祠以祠吳相闞澤唐相房琯之有功德於慈者升廣西兵備有平獞賊功尋致仕著禮記正蒙騮山集行世通志閩書訓導薛宗舉先生公應薛公應字宗舉嘉靖十七年貢士訓導盱眙教諸生以躬行實踐之學三年乞休子孔洵事公應孝有士行學者稱為企泉先生李先生中美李中美福寧人博學好禮雖盛暑衣冠儼然嘉靖晏駕中美蔬素三日與袁槱林子燧陳喜談詩著詩書玉篇直音閩書張美中先生絅張絅字美中參議蘭曾孫也惇尚孝友篤志讀書長於詞賦阮雲塘陳鰲溪以文章氣節相髙時號三傑閩書袁先生槱袁槱福寧人天祿公裔樂易俶儻輕財仗義入深山中苦耽經史與李中美談詩教子學古諸兄弟服其友愛閩書陳希和先生喜陳喜字希和福寧人績學渾朴蚤喪父獨事母孝養至老不衰母年髙多病躬伴母寢晨昏溫凊衣食櫛盥至牏厠瑣猥未嘗假他人年九十四閩書閩中理學淵源考卷九十二
