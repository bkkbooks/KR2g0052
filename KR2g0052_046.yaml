body:
  text: 閩中理學淵源考卷四十六廣平府知府李清馥撰成化以後諸先生學派明代成化以後師席踵起是時一術專師家無異説一代人才於斯為盛甞讀顧氏日知録論科舉業云林文恪福州府志曰余好問長老前輩時事或為余言林尚黙誌方游鄉序為弟子員即自負其才當冠海内士云林誌永樂壬辰進士鄉試㑹試皆第一殿試一甲第二然考其時試諸生者則楊文貞金文靖二公也夫尚黙當時所習特舉子業耳而楊金二學士皆文章宿老蔚為儒宗尚黙乃能必之二公若合符節何哉當是時也學出於一上以是取之下以是習之譬作車者不出門而知適四方之合轍也正徳末異説者起以利誘後生使從其學毁儒先詆傳注殆不啻弁髦矣由是學者倀倀然莫知所從欲從其舊説則恐或主新説從其新説則又不忍遽棄傳注也已不能自必況於人乎嗚呼士之懐瑾握瑜範馳驅而不遇者可勝道哉是故射無定鵠則羿不能巧學無定論則游夏不能工欲道徳一風俗同其必自大人不倡游言始按此叚論科舉之學實闗風氣盛衰今録附此見彼時趨嚮端的人文向盛由此道耳綴其大畧附之篇端郡守許履夫先生坦許坦字履夫閩縣人宋許將之裔成化十四年進士仕大理知府居官才敏著稱精易學門下多所造就有平齋雜稿子繹温州教授繼南安知府孫嗣宗歴官郎中其先知新建崇仁二縣實心實政百姓徳之閩書郡志新縣令鄭徳輝先生藴中鄭藴中字徳輝閩縣人成化十六年鄉薦授石首教諭學邃春秋多所造就文章徳行復進仰止擢貴池令與上司議獄不合拂衣歸家居夫婦織席為食有門下以御史按閩屢候弗見也一指揮防海欲得善地持厚賄乞闗説嘆曰胡為及我再三􅈤之藴中呼里人欲執詣官指揮跪請曰御史念公貧藉此為餽耳終不納年九十餘終閩書通志長史陳先生克震陳克震懐安人少貧耕於野以舟載糞艤石橋側時月夜諸生方聚講中庸克震㦸手傍聼竊竊笑之諸生怒曰傭也何知克震曰嘗學而聞之異乎諸君之説也遂為講解其義諸生歎服改容舉成化七年鄉薦授慈谿訓導振作師道門下以明經舉者甚衆官終長史弟坡子京閩書同知葉叔理先生性葉性字叔理閩縣人𢎞治二年鄉薦官終慶逺同知慈祥愛人以理學誨士一時翕然宗之閩書教諭陳時勉先生徳懋陳徳懋字時勉侯官人𢎞治十四年鄉薦任平陽教諭善講解於經書要㫖多獨詣常集諸生於齋舎督課學業察勤惰每至丙夜不輟賑貧却餽多士相慶得師通志長史鄭節之先生伯和鄭伯和字節之閩縣人𢎞治十四年鄉薦授無為州學正轉國子博士秩滿當遷吏部郎薛蕙其門人也欲援之伯和固求散地乃以為夀府長史久之致仕歸伯和坦夷長厚未第時以禮經授門下士甚衆及拜官為教職不樂他徙歸後猶誨誘後進不倦聞人之善若已有之見人子弟力學有得辟舉者若已子弟得之也天性至孝嫡母林㓜撫有恩遇忌日必哀慕年逾耳順祭猶泣下親黨貧者随多寡周給力雖不足而意每有餘鄉人咸敬服其徳焉萬厯府志縣令洪繼明先生晅洪晅字繼明懐安人𢎞治十四年鄉薦知郯城縣謹厚有文精禮經多所教授子世文世遷主事黄叔和先生鏗黄鏗字叔和閩縣人正徳二年鄉薦歴工部主事精於易學受業甚衆孫功懋郎中王維周先生希旦王希旦字維周侯官人正徳八年鄉薦早有文名以文見知於汪太宰鋐以為其部司務歴禮部郎中以憂歸尋卒希旦在禮曹時御史請以薛文清瑄從祀下部㑹議時薛學未尊諸公尚有可有否獨希旦以為求士於六經章句之後則躬行為急瑄之學實自敬始從祀為宜希旦甘於貧其歸也環堵畆宫至不能舉火處之漠然閩書通志奉常林質夫先生公黼林公黼字質夫號石峰長樂人正徳十二年進士授大理評事時江彬錢寜導武宗南廵羣臣有諫者彬輩每勸武宗杖之公黼約同官以䟽諫武宗震怒命鎻項械手足暴庭中五日復繫詔獄一杖獄中再杖闕下舁至旅舎卒公黼居常恂恂雅飭薦紳知者謂其清修善人而已及其勇於赴義臨死生而志不懾氣不餒浩然有烈丈夫之風少沉敏力學閉處一室端黙誦習飲食不闗其家人者三年故其學精通經傳子史旁及訓詁韻切篆籀諸書性孝友居父母喪哀毁蔬粥三年跬歩未甞逺几筵事其二兄甚謹平生所為可質鬼神敬獄明讞不以一字喜怒於人當公黼下獄而郎黄鞏及行人張岳並在繫中鞏與公黼交素淺比熟其行乃私謂岳曰吾取友幾遍天下而乃近遺林質夫嘉靖初贈太常丞予祭録其子逢春為太學生逢春歴推官通判榮府長史所至有亷能聲以養母䟽歸通志物越章録省人考分少卿謝維盛先生蕡謝蕡字維盛閩縣人正徳十六年進士選禮科給事中敢言事肅皇初御極虚懐求諫而楊廷和為首輔擁掖言者每言官上封事率優詔荅之時有乳媪濫封爵賞具䟽諫因勸上節恩澤戢内侍已又論救翰林吕柟等上懽然聼納嘉靖三年大禮議起張璁時方為主事與相廷和論不合蕡同諸給舎力爭上怒詔杖闕下無何復論璁桂萼輩憸邪不可用復奪俸三月其明年使粤東西蕡疾在外諸司刑憯酷非上好生意具䟽乞戒止天子感焉為下詔榜諭天下尋擢太平守未上卒於途蕡在言路號知大體隆慶改元録世廟言事諸臣贈太常寺少卿越章録按察李在中先生士文李士文字在中連江人正徳十一年鄉薦授髙明教諭寡黙宏博本經義以訓諸生當道薦嶺南師範第一以父喪歸聚徒講學於九龍山之麓服滿補嘉魚教諭登嘉靖己丑進士除南京工科給事中㑹星變䟽陳六事世宗嘉納之累官都給事中終浙江按察使家居布衣蔬食徒步里中按閩使者白賁憐其貧欲為營室力辭不受所著有易明心學庸正義新福州府志通判徐汝澤先生灌徐灌字汝澤懐安人嘉靖元年鄉薦文學雅邃深明易理終金華通判閩書司訓張伯時先生世宜張世宜字伯時懐安人祖潜教諭父孟敬安吉州學正以多聞稱一時世宜嘉靖四年鄉薦司訓祁門清穆和易博綜三禮士多質正䞇餽未甞及其門一時譽髦之盛皆其造就新福州府志閩書通判鄭用行先生守道鄭守道字用行懐安人嘉靖七年鄉薦於書無所不窺而學務窮理甞主白鹿洞教事著太極圖説意并易乾坤上下繫辭解大學講章深思精詣能闡周程之秘令夏津扶弱抑强風節凛介復建書院與諸生講晰一時文學之士詵詵興起擢徽州通判徽人亦服其多聞閩書學正王汝旦先生應槐王應槐字汝旦閩縣人嘉靖七年鄉薦初授髙唐州學正服闋補太倉敦尚氣節一以方正率士太倉州守廷辱士應槐叱守白其寃即拂衣歸年三十餘耳歸以尚書教授子弟家徒四壁窮約終身閩書郡守廖師文先生世魁廖世魁字師文懐安人嘉靖十四年進士官終瓊州知府精易學門下教授多所造就閩書教諭許先生興繇許興繇閩縣人選貢嘉靖中任奉化教諭閒居衣冠不懈令士子讀書必反之身心深以迎合時好為恥奉化人稱其範模閩書州守陳道從先生址陳址字道從連江人嘉靖十九年舉人知臨髙縣臨俗婚姻多寒盟址著正始編以矯之邑於是無婚姻之訟遷知嘉定州旋殁於瓊州海上士民思之與胡銓並祀二賢祠所著有易經摘説春早集通志同知林學静先生資深林資深字學静福清人嘉靖二十五年舉人授羅雄知州改補崖州黎蠻雜處民多失業乃相地濬溝引南北水合注平壤溉田數萬畆黎冦與多港搆難撫諭有方境内敉寜民碑而祀之遷髙州府同知化州州多火患教民易茅以瓦㑹讞大獄與監司牴牾掛冠歸所著有五經精言弟資瀾嘉靖甲子舉人知孝豐未任卒通志中允陳徳言先生謹陳謹字徳言閩縣人為文温厚平實指言時事不激不阿徐文貞階為考官深器之嘉靖三十二年廷對世宗親擢第一授翰林修撰文貞留與語見其於天理人欲君子小人之際辯之晰而持甚堅已察其所為自朝謁外閉門讀書不輕交接妄取與益重之後三年遣使冊封藩府以拜命後期出為惠州推官居一年改南京太僕寺丞尋改尚寳寺丞又三年轉南京國子司業考績入都留為中允踰年丁父憂守制家居謹夙有才名又温潤醇雅晉接不倦士人快覩樂從造門請業殆無虚晷居一載㑹其家人與兵卒相毆謹出解之要絰在身無威儀遂為亂梃所傷卧病月餘卒事聞京師給事中岑用賔劾閩撫汪道昆威令不行於士卒養成桀悍之氣白晝大都賊虐近臣恬不為怪宜亟罷道昆然後按治諸驕卒以正法紀䟽入上罷道昆回籍聽調令巡按御史陳萬言捕首惡把總曹一麒等萬言以屬監軍副使金淛淛恐生變白萬言待一麒䕶客兵歸日捕之一麒等乗間亡去萬言以聞淛坐奪俸一月葢嘉靖之季閩冦甫定客兵驕悍法紀玩愒矣所著有内制集詩文稿藏於家子一愚閩書通志遊擊陳季立先生第陳第字季立連江人少博極羣書文名甚著倜儻自負喜談兵嘉靖四十一年戚繼光征倭至連第與定平倭䇿俞大猷應召聘與俱随以邉事上書大司馬譚綸竒而薦之起家京營守古北口歴遊擊將軍屢有戰功以忤巡撫吳兊拂衣歸時年近五十絶意仕進惟以著述自任作伏羲圖賛一筆圓成不待竒耦離析而萬千五百二十之䇿悉出自然又作毛詩古音考尚書䟽衍麟經直指屈宋音義皆考古證今理解精醇金陵焦竑老年好學第聞之裹糧至白門與相辨析竑嘆服自謂弗如晚出遊五岳足跡幾遍天下閩巡撫屢行薦辟皆不就卒年七十七門人彚集其所著詞賦漫題松軒講義意言謬言寄心集書札燼存薊門兵事防海事宜東番記塞曲粤草等書並刻行世閩中理學淵源考卷四十六
