body:
  text: 閩中理學淵源考卷四十五廣平府知府李清馥撰恭敏馬孔養先生森學派三山學派傳習源流尚矣王信伯開洛學之先林少穎續紫陽之緒厥後黃勉齋肩紫陽學統遞有傳人至今稱朱門派的者曰何王金許萃於金華然而閩之派别薪傳未艾也元明以來遞相祖述至成化以後人材輩出矣自吳聞過林尚默羅宗讓林德敷而後如恭敏馬公恭介鄭公尤篤守師説典型屹峙今著其師友派系載於篇再按朱氏經義考謂恭敏亦守心學之説與朱蔡有違言者而本傳稱其究心程朱之學今以本傳為據恭敏馬孔養先生森馬森字孔養懷安人嘉靖十四年進士授戶部主事𣙜九江關以亷能著歷知太平府雪寃獄裁中璫減供億治行甲江南轉江西副使進按察使尋轉左布政使副都御史巡撫其地森久歷江右多惠政時創三殿疏請南糧改折省民間數萬金召為刑部侍郎尋改户部坐纍徙大理卿與刑部尚書鄭曉左都御史周延得時稱貫城三平遷右都御史户部尚書以疾乞休穆宗登極起為户部上令太監崔敏取户部銀六萬兩買金進用森言先帝時買金二千日積月纍僅能足數尋詔停止以此金暫貯太倉今於數日內得滿一萬臣知不能也且祖宗時御札皆下閣臣轉示各部院無司禮徑傳者更望率由舊章上乃止旋以母老乞終養賜馳驛歸服除屢薦不起初森為考官時夏言壻出其門欲介之見言謝不往嚴嵩聞而悅之森亦不附為徐階所重遂引用之居恆講明理學與歐陽德鄒守益羅洪先相質正要以程朱為宗其為侍郎歸值閩卒兩倡亂森角巾野服出諭之隨解散臨武劉堯誨撫閩議復夫甲庫役法森備陳其害議遂寢繼撫閩者南海龎尚鵬欲行條鞭法森力贊決其卒也賜祭葬贈太子少保諡恭敏郡人立報功祠於九仙山祀之所著有四書口義書經敷言周易説義春秋伸義辨疑地理正宗文集奏議若干卷子熒歘熒字用昭以父蔭為南京都督府都事雅善文辭歘貢士能詩閩書明史通志郭建初先生造卿郭造卿字建初父萬程見縉紳母氏見閨閣造卿為諸生器於父友馬恭敏森今受業羅文恭洪先之門閩中倭起客遊吳越胡少保宗憲李襄敏遂禮致之新安汪司馬道昆撫閩一見竒其文而髙其行禮為上客而戚都護繼光在閩有平冦功枉車騎於造卿甚委心焉大司馬葉夢熊起家為其邑令欲延造卿署中度不能屈乃館之蕭寺訂盟莫逆夢熊去而夢熊之侄名春及者為惠安令邀定其政書葉氏二公交造卿惟恐不及也造卿廩諸生例尚不及計偕會徐中行子與攝閩學強遣計偕為儀郎所格造卿謂郎執例固當郎亦素聞造卿名更過從相稱慕久之卒業北雍王文肅錫爵時為祭酒臨其舍遇以博士或邀造卿試中書不從文肅大稱善居頃之中行以閩觀察使入覲而戚繼光鎮薊門交辟造卿為客造卿曰徐公於我厚厚在吾親蓋俎豆我父旌表我母我不可不往則之徐既至徐不久卒造卿為治喪立後傳其遺文去之其故所守汀郡哭徐公祠下繪像樹碑復為請祠於其鄉乃曰吾於徐公盡矣束裝見戚於薊門戚為造卿督築館漢莊請草燕史未竟戚去造卿曰吾不可廢成勞令後世無復知有戚將軍遂留竣事官廩之造卿不受也其時夢熊正分部盧龍塞從班荆道中而維揚顧養謙者以中丞鎮薊為造卿治其館所樂飲造卿為養謙畫海漕活遼人以十餘萬計造卿名僅籍太學所知交盡當世名卿賢士大夫擘畫成敗論古今得失源委九邊三輔列藩厄塞夷險攻守所宜如列眉觀火行不齎書問以典故疑義及竒事僻語莫有能難者久於塞上人親附之欲留之不得晚歸故山婆娑麟巖石竺靈源間輒命酒呌呼人莫窺其意恭介鄭環浦先生世威鄭世威字中孚號環浦福建長安人幼凝重寡言笑年十三即惡流俗紛華題其齋曰志樂顔瓢貧甘范甑弱冠舉於鄉嘉靖八年成進士會臺臣闕詔從諸進士推擇衆競趨之世威曰才脫章句躐司耳目耶獨不赴銓除户部主事一日忽心動疏請改南以便父養未得命而訃至免喪補刑部晉員外郎恤刑秦中釋寃獄九十六人擢為廣西按察僉事尋改廣東丁內艱復除江西貴溪夏言再召入相諸司往賀開角門延入世威便却退呼閽者曰相國尊然奈何令邦大夫縮縮旁趨還吾刺去爾閽者開中門乃入言未子也巡撫汪元錫偕言有事上清宫以祝釐為名實為相祈子世威從諸司往拜前視祝詞乃知之遂不拜出轉浙江布政恭議言再相世威復不與諸司郊迓轉江西按察副使時分宜嚴嵩代夏相勢強甚族黨暴橫莫敢問世威輒用三尺繩治有抵重法者獄具矣傅巡撫撼於嚴將改論世威持不能奪熊憲副者嚴姻也以輕直占廢寺田千餘畝世威鬻以賑飢熊持相手書求救不得遷四川恭政念嵩終螫已投檄歸歸而薪粲不贍耕鋤自力怡然安之懸車十六年而嵩敗中外交薦起湖廣參政南京右通政隆慶初擢都察院右僉都御史左副都御史華亭相徐階為王守仁學廷議有舉守仁從祀者世威乃疏言王守仁當世豪傑恭之名臣無愧謂其紹周程宗孔孟則平生庸德有不足矣且其率天下徑趨直行使聖門講學明理之功屏棄不用將有毫釐差而千里失者與守仁同時講學者泰和羅欽順惠安張嶽世稱賢大夫兩嘗指擊其謬守仁辨不能絀蓋守仁以名勝欽順嶽以實勝實之與名相去逺矣文貞不是也顧其事亦寢時新建學方盛行諸貴人見其疏弗善也乃以為南吏部侍郎名雖擢而實逺之嵗餘乃召入刑部未幾有詔採合浦珠及滇南珍石世威疏請上納忠諌崇節儉不報江陵為政厲威權以屬禮頥使九卿世威行意自若一無所阿承時時嘆曰吾方壯時忤貴溪分宜幾陷虎口今老矣安能以僅免之身而便辟唯諾新貴人前哉遂堅意乞休得旨致仕歸而耕鋤如故里中不知侍郎云生平以慎獨為要力行為宗與人交久要不忘一切脂韋緣飾語籠罩欵曲狀不獨有所恥而不肯為亦其性有所執而不能為者其學一以濓洛為宗取六籍及儒先語日誦繹之録其精者獨證於心曰直諒為友嚴師為師展也宋儒實獲我私年八十二卒賜祭墓贈尚書諡曰恭介禮官言其歷官權貴之鄉媚竈是恥辭榮寂寞之野杜門自髙晉江黃恭肅銘其墓謂中孚有一介不取之亷然飲人以和弗為溪刻其學不立門户而淵源可紹真儒之統所著有四書問答長樂乘岱陽彚稿藏於家閩書越章録通判林世獻先生廷琛林廷琛字世獻懷安人嘉靖十四年進士授户部主事四奉命督稅大著亷名朝中為之語曰林主事何稜稜官理所至一片氷歷郎中監崇文稅缺人部尚書梁材復使綰之曰必君乃可有倚勢觸禁者廷琛置不顧會朝正後諸後至者率向閽人為好語廷琛不能也坐謫判鎮江兩院交薦有南寧之命會權姦别有所擠持旨未下有欲為廷琛私營賂者廷琛知而峻止之曰此豈林世獻平生遂棄官歸原憲懸鶉子桑濕突晏如也司徒馬森曰余海內知交稱亷介者汶上吳嶽南雄談太初吾閩則鄭世威林廷琛其最矣閩中理學淵源考卷四十五
