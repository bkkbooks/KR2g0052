body:
  text: 閩中理學淵源考卷十九廣平府知府李清馥撰朱子興化門人并交友按莆儒風之盛得中州派的先於七閩者始於方景通先生峻與其子元寀交識程大中公薰炙於二程之學深矣艾軒林氏亦聞其風而興起者至朱子之學興宗仰徧於海隅若陳若方受學彌勵厥後習尚醇篤忠節林立其士風家法盛衰興廢之變昭然可覩矣嗚呼君子之澤豈獨五世而斬哉通判余景思先生元一余元一字景思興化軍仙遊人娶三山黄御史瑀之女遂與瑀子幹師事文公始見之日以仁義禮智信分作五論及自著文為贄間與幹講論有異同輒以質諸文公嘗有答余景思書見文公别集淳熙五年登第歴奉議郎知泉州同安縣嘗立蘇緘祠於其故居文公甚喜之為縣以清嚴稱終池州通判弟宗龜同登進士考亭淵源録莆陽文獻按文公少年時過莆即獲交林謙之方次雲後與陳正獻魏公龔大參公又極厚莆中傳朱子之學者方陳二家子弟最盛其餘諸賢亦多彬彬林立見於集中往復書札可考文公與景思書云魯叔兄弟幾人今皆年幾何莫亦能自卓立否欲作書慰之以病未能當俟後便也按魯叔為朱魯叔也其兄弟事實未詳朱子别集曽載有答書録姓氏見後林若時先生得遇林得遇字若時興化仙遊人一日發憤鬻産裹糧至武夷叅拜文公文公令日講論語集註頓悟明理能文及文公歿復往會𦵏暮年與同縣陳沂相友善黄子洪先生士毅黄士毅字子洪自興化徙吳中士毅自幼嗜學知向上為聖賢事業慶元中學禁方嚴徒步入閩遵朱子命日觀一書夜叩所見告以静坐勿雜喚醒勿昏居數月授以大學章句而歸終其身從事於斯號稱有得著述甚多譔次朱子書説七卷文集一百五十卷語類一百三十八卷又嘗類注儀禮未克成書知府王遂為買宅以居稱為考亭名士同郡名儒黄邃又謂之有道君子云興化有壺公山以壺山自號文學鄭子上先生可學鄭可學字子上莆田人幼而文冠而孤力學好修累舉進士不第裹糧千里從學於朱先生先生一見恨相遇之晚握手評議如夙友焉道同氣合率終嵗一歸歸則以書質所疑有問斯答皆聖賢所未發之㫖朱先生守臨漳虚子弟之師席俾之西向而坐既歸則又以書招之且致諸子弟慕向不忘之意四方學者至即有問必使子上正之而仕之來南者命必見子上而後行諸公名人皆欲招致子上不可得吕祖謙李命傳詹徽之廖徳明皆加敬愛與人交氣和而清竟日端坐不見怠容誠信温恭其所誨誘皆為名士前後三奉大對嘉定辛未勅授忠州文學是嵗冬廖徳明為廣帥招致郡齋明年壬申秋親友勉子上調選方信儒時守舂陵與之偕行至豫章卒於豐城年六十二所著有春秋博議十卷三朝北盟舉要一卷師説十卷詩數百篇子上不喜為詩遇時感發時出一二不多作學禁興登朱門者畏避退縮子上獨相從於寂寞之濵考亭淵源録按朱子語録姓氏鄭子上録文公語在紹興二年辛亥所聞時文公年六十二其從學另考博士傅至叔先生誠傅誠字至叔仙遊人汶淇從子幼知讀書有雋聲年十九以書見泉之鄉先生黄維之大奇之後淳熙八年登進士第誠生平自讀書外無他嗜好所與語者悉皆好學清介之士非此弗與之文初調永春尉辨陳介珪之寃與上官忤因納告勅於憲臺求去介珪卒得直侍郎黄艾被㫖使北壯誠有守奏辟以行歸除廣東賢幹改知青陽縣尋除提轄文思院時參政張巖開府於京口奏辟戴溪與誠同幕凡著述皆出其手後歸朝不一跡權門累循常調遷太常博士真徳秀時為正字每數日輒相過談論古今事移晷方去寧宗朝輪對其略曰臣觀自古常有披草莽而立朝廷者况今陛下承中興以來三聖相承之業乎假如渡江初年幸未有定止荆吳陜蜀三方不相聞知陛下将不能有所運動乎古昔王者微弱如東晉重鎮擁兵上流朝廷奔命故不得已而姑息今陛下之所駕馭又非有奸雄桀黠之才微寸効可紀何所牽制而寛假至是乎假有如中興二三大将軍校號為某家人恃功驕蹇陛下將有所號令之乎又曰今日之事奄奄如氣息僅續之人略無一朝奮起之勢浸有百年消削之憂或有聞而嘆息或有聞而竊笑者嘆息者有憂朝廷之心竊笑者有輕朝廷之意良由縉紳風俗之不振脂韋留連富貴之心有餘而感慨自立以身許國之意不足顧光景而計升沈風迹淪胥人心輕玩其弊固至此也縣令林同叔先生灃林灃字同叔仙遊人為建州幕㢘勤自持朱文公嘉其操行書問往復相期甚厚知崇安縣清静不擾縣圃産芝池蓮雙花並蒂嵗以大稔縣丞楊霓為記其事民立祠曰林長官閩書朱先生渷朱渷仙遊人與弟涓溉俱遊文公門朱先生魯叔朱魯叔傅夢良先生公弼傅公弼字夢良傅先生敬子傅敬子傅先生毅誠傅毅誠侍郎黄伯耆先生艾黄艾字伯耆莆田人乾道八年廷對第二人朱子知漳州奏行經界朝議未定公言天下之大公卿百官之衆議一經界三年不成若更有大事将若之何乃詔行之寧宗即位為右正言兼侍講及朱子罷講筵公因進講問故寧宗曰始除熹經筵耳今乃事事欲聞公懇請再三不聴除中書舍人改刑部侍郎以待詔終著尚書講義閩中理學淵源考卷十九
