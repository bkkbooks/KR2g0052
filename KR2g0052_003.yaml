body:
  text: 閩中理學淵源考卷三廣平府知府李清馥撰武彛胡氏家世學派國家當郅隆盛治之時其英俊多萃于一家一門相與左右後先而出以翼衛道脈其盛衰升降與國運相為終始閩中武彛胡氏自其先公淵已有孝德聞其家本深末茂得中州教澤又師友於龜山先生世傳家學發春秋大易之旨論者謂渡江以來儒者進退合義以文定及尹公為稱首云馥嘗聞之先訓云魯論八士者一家之瑞耳而繫之周者以見盛時風流篤茂其英才皆萃而生者也胡氏父子叔姪闡發經旨紹述儒學世以五賢並稱厥後蔡氏九儒劉氏五忠繼之亦以見間世之英並時而出謂非世運之所肇基而覆育者哉再按南軒張氏撰廣仲墓志言胡氏至文定公始大其上世皆在建州崇安里中文定宦遊荆楚嵗久父澤之先生淵殁葬於荆門紹興初因徙家衡嶽之下於是二弟實從焉間嘗考胡氏論性之旨朱子語類言胡季隨主其家學即文定孫五峰之子説性不可以善言本然之善本自無對才説善時便與那惡對矣才説善惡便非本然之性矣本然之性是上面一箇其尊無比善是下面底才説善時便與惡對非本然之性矣孟子道性善只是贊嘆之辭説好箇性如佛言善哉某嘗辨之云本然之性固渾然至善不與惡對此天之賦豫我者然也然行之在人則有善有惡做得是者為善做得不是者為惡豈可謂善者非本然之性只行得善便是那本然之性也若言有本然之善又有善惡相對之善則是有二性矣此文定之説故其子孫皆主其説而致堂五峯以來其説益差遂成有兩性然文定實得於龜山龜山得之東林常總總龜山鄉人後往廬山東林總極聰明深通佛書有道行龜山問孟子道性善説得是否總曰是又問性豈可以善惡言總曰本然之性不與惡對此語流傳自他然總之言本亦未有病蓋本然之性是本無惡及至文定遂以性善為贊歎之辭到得致堂五峯遂分成兩截説善底不是性若善底非本然之性却那處得這善來既曰贊歎性好之辭便是性本善矣若非性善何贊歎之有二蘇論性亦是如此蘇氏論性説自上古聖人以來至孔子不得已而命之曰一寄之曰中未嘗以善惡言也自孟子道性善而中與一始支矣諸胡之説亦然按此段先公朱子語類四纂録在師友淵源類中見武彛胡氏論性與程朱有差别處惟時湖湘學者崇尚知言大抵多祖是説故朱子極力而明辨之今語類中講論數條皆是也朱子又言某嘗為敬夫辨析甚諱之渠當初倡道湖南偶無人能與辨論者又説湖南學先體察云不知古人是先學灑掃應對為復先體察按南軒傳五峯之學者觀朱子所詳論辨析針規救正皆是論道微言尤學者所當盡心熟玩云乾隆辛未四月十八日乙酉書中大夫胡澤之先生淵胡淵字澤之崇安人少聰穎能文長益務強識熙寧初以親老家貧授學浙江每嵗終度父母所須力能致者盡市歸以獻後以母末疾不復逺遊即里閈教生徒晨夕歸省每諸生饋食有甘脆必持歸佐匕箸而自甘蔬水初同里有吳羡門者號仙州居士以六經教授淵往從之羡門閲淵所寫論語尚書終帙一無差舛遂妻以女是生安國及安國入官淵盡斥其俸以贍兄弟之子又取而教之以宣教郎致仕卒遊氏酢銘其墓後以安國追贈中大夫閩書志建寧府通判胡先生安止胡安止父淵臨訣以安止與其弟安老授安國命嚴敕之安國誓不忍撻乃撫而教焉皆感奮力學俱以經術行義著稱以兄安國蔭纍官朝奉郎嶽州通判政先撫字不為鈎距民安樂之子實閩書蔭建寧府志胄目録州守胡康年先生安老胡安老字康年恬簡淡默喜周人急用安國蔭補官嘗知宜春羅江二縣終知袁州子憲閩書溪朱子撰籍行狀按朱子撰籍溪先生行狀云先生諱憲字原仲文定公從父兄之子也祖聳父淳皆不仕考閩書及道南原委皆以籍溪為安老之子考行狀為淳之子似當從行狀今此傳仍舊本籍溪傳則改從行狀文忠胡致堂先生寅胡寅字明仲本文定弟淳之子初生弟婦以多男不舉文定取而子之少桀黠難制閉之空閣閣上有雜木盡刻為人形文定曰當有以移其心置書數千卷其上嵗餘成誦長從河東侯師聖遊十九入辟雍宣和三年登進士第除校書郎楊龜山為祭酒復稟學焉遷司門員外郎金人陷京師議立異姓先生與張魏公浚趙忠簡鼎逃太學中不書議狀張邦昌僭立先生棄官歸建炎三年髙宗幸建康以張魏公薦為駕部郎尋擢起居郎金人南侵詔議移蹕先生上書乞按行淮襄絶和議以圖中原不宜退保吳越又言必務實效去虛文任君子斥小人反覆萬言宰執吕頥浩惡其切直除管江州太平觀會應詔上十事曰修政事備邉陲治軍旅用人才除盜賊信賞罰理財用核名實屏諛佞去姦慝不報命知永州復召起居郎紹興五年纍遷給事中時議遣使講和先生援春秋大義以復讎為請髙宗嘉納降詔奬諭既而張魏公自江上還言遣使為兵家機權竟反前旨先生力言無益者十事不納乞便郡就養除徽猷閣待制改知嚴州又知永州徽宗寧德皇后訃至朝議欲用故事以日易月先生上疏言禮讎不復則不除願詔服喪三年衣墨臨戎以化天下尋除禮部侍郎兼侍講直學士院丁父憂免喪時秦檜當國除徽猷閣直學士奉祠俄許致仕檜憾不已坐與李光書譏訕朝政右正言章厦劾先生不持本生母服不孝諫通鄰好不忠遂落職新州安置檜死詔自便復其官卒年五十九諡文忠先生志節豪邁初擢第張邦昌欲妻以女不許文定頗重秦檜靖康之節及檜擅國先生遂與絶新州之謫即日就道在謫所著讀史管見數十萬言及論語詳説崇正辨皆行于世又有斐然集三十卷學者稱為致堂先生道南原委宏簡録寺丞胡茒堂先生寧胡寧字和仲文定季子也用蔭補官秦檜當國留意名家子弟貽書明仲問寧何不通書寧勉陳數事及奏乞二程邵張從祀既召試館職除敕令所刪定官會秦禧拜元樞檜問曰禧近除外議何如答曰外議以相公必不為蔡京之所為也遷太常寺丞祠部郎寧以父兄故召用及兄與檜忤言者希意論寧兄弟阿附趙忠簡出為夔路安撫司參議官除知澧州不赴奉祀歸文定之傳春秋也修纂檢討多出寧手又著春秋通旨以羽翼之稱苑堂先生道南源委閩書主簿胡廣仲先生實胡實字廣仲朝奉郎安止子生晚不及親受文定之教自幼氣識異於常兒年甫十五從家孰習辭藝從兄五峯先生察其質之美從容告之曰文章一小技於道未為尊所謂道者人之所以生而聖賢得之所以為聖賢也吾家文定之業子知之乎實由是所見日以開明五峯沒實獨念前賢淪落且懼緒業荒墜慨然發憤見於辭色孜孜訪友惟恐不逮其居家雍睦而有制閨門內外無不敬愛之朝奉公沒時幼子寓僅垂髫實撫育教訓之至族姻間不能自振者實區處調護非一而其好善疾惡亦本於天資平時誦習文定公春秋之説尤患末俗統系殽亂每舉莒人滅鄫之義言意深切其操心主於忠厚為學謹於人倫貴日用而恥空言行事之可見者大抵如此早以門蔭補將仕郎殆將二紀約居恬然不急仕進後始就廣西銓選得欽州靈山縣主簿未上卒其殁也張南軒先生為之墓志言與實交幾十五年志氣相合嵗時會遇與夫尺書往來無非以講學切磋為事稱其務實趨本自反於卑近而虛中求益不私其故常所造未可量云子大同大有道南源委墓閩書南軒撰志僉判胡伯誠先生大正胡大正初名慥字伯誠用季父寅郊恩補官調興化尉鄭僑以疑訟繫於官大正竒其人力為辨白且勉以逺業僑感奮卒以大魁為時名輔再調南康軍司法史浩劉珙薦其賢明清介改秩僉判泉州劇賊羅動天者逼漳州甚急泉為鄰郡忽近郊有荷斧者四五十人兵捕以聞時郡守政尚勇決同幕希意請肆諸城下大正不書牘曰賊欲攻城乃無戎裝攻具長兵耶詢之果採山菌者皆釋之同幕慚服郡為蕃商之會每舶至驗視者得利不資大正秋毫無取焉胡伯逢先生大原胡大原字伯逢五峯從子按朱子文集答書第四首略曰知言之書用意深逺析理精微豈末學所敢輕議向輒疑之自知己犯不韙之罪矣兹承誨喻尤切愧悚但鄙意終有未釋然者知行先後已具所答晦叔書中其説詳矣乞試取觀可見得失矣至於性無善惡之説則前後論辨不為不詳近又有一書與廣仲論此尤詳於前此外蓋已無復可言者矣然恐蒙垂諭反復思之似亦尚有一説蓋孟子所謂性善者以其本體言之仁義禮智之未發者是也原注程子曰人之生也其本真而靜其未發也五性具焉曰仁義禮智所謂可以為善者以其用處言之四端之情發而中節是也蓋性之與情雖有未發已發之不同然其所謂善者則血脈貫通初未嘗有不同也此孟子道性善之本意伊洛之所傳而未之有改者也知言固非以性為為不善者竊原其意蓋欲極其髙逺以言性而不知夫名言之失反陷性於淫蕩恣睢駁雜不純之地云再按張南軒先生答書略曰垂諭性善之説詳程子之言謂人生而靜以上更不容説讒説性時便已不是性繼之曰凡人説性只是説繼之者善也孟子言性善是也但請詳味此語意自可見大抵性固難言而惟善可得而名之此孟子之言所以為有根抵也但所謂善者要人能名之耳若曰難言而遂不可言曰不容説而遂不可説却恐渺茫而無所止也知言之説究極精微固是要發明向上事第恐未免有弊不若程子之言為完全的確也某所恨在先生門闌之日甚少兹焉不得以所疑從容質扣於前追悵何極然吾曹往返論辨不為茍同尚先生平日之志哉按胡氏論性蓋其家學立論如此朱子與南軒辨析詳矣今未得伯逢事實惟附二先生答書亦可想見當日論學之砥柱也馥嘗欲輯乾淳論學往復考以備伊洛之夾輔姑存所志而未逮也胡季隨先生大時附季立季履胡大時字季隨五峯季子師事張敬夫後從學於晦菴問答甚多載大全集再按南軒集有與季立書朱子集有與季履書皆講切問學事實莫考矣季履名大壯季立未詳按文公答季隨論延平先生灑落一條云灑落二字本是黃太史語後來延平先生拈出亦是且要學者識箇深造自得底氣象以自考其自得之淺深不謂不一再傳而其弊乃至於此此古之聖賢所以只教人於下學處用力至於此等則未之嘗言也又云顔曽以上都無此等語子思孟子以下乃頗有之亦有所不得已云朱子文集閩南軒文集書進士胡武宗先生師徐胡師徐字武宗於文定為疏屬博學通經尤長於詩紹興第進士幼失怙事母盡孝朱子稱之母喪廬墓三年以祿不逮養竟不仕卒文定胡康侯先生安國學派按武彛胡文定公雖未及二程之門而師友於遊楊謝諸公諸公亦皆以斯文之任期許之其著書立言前哲論之詳矣其學大抵得之上蔡為多平日所以治身訓家尤在踐履上著力文公稱其傳家録議論極有力可以律貪起懦是也公嘗言曰世間事如浮雲流水不足留意隨所寓而安也寅近年却於正路上有箇見處所以立朝便不碌碌與往日全不同觀此則公平昔所以訓勉家庭者尤嚴且正卒之明仲兄弟皆能不屈於秦却其招不往所以持家聲而勵臣節者大矣公之諸子皆能衍述父學五峯之學傳之南軒與紫陽相夾輔所謂湖南一派者皆其緒餘也至乾淳間文孫季隨切磋於紫陽南軒象山之門其與文公講論家學再三明辨尤學者所當詳考云乾隆丁卯六月望後一日書文定胡康侯先生安國胡先生安國字康侯少長入太學晝夜刻勵同舍有穎昌靳裁之得程氏學先生從之講論自是益進紹聖四年登第䇿問大要欲復熙豐之政先生推言大學格致誠正之道以漸復三代為對考官定為第一宰執以䇿中無詆元祐語降其等哲宗命再讀之稱善者數親擢第三除荆南教授遷太學博士足不躡權門蔡京惡之俄提舉湖南學事詔舉遺逸先生以永州布衣王繪鄧璋薦二人乃范純仁客也零陵簿李良輔希京意誣為鄒浩請托京命湖南提刑置獄推治獄未成移北路再鞫訖不得請託之狀直除先生名勒停湖南帥臣曽孝廣謂人曰胡康侯當患難而聲色不動賢於人逺矣先生退居荆門漳水之上定省外經籍自娛家人皆忘其貧而親心適焉既而良輔以他罪發覺臺臣乃辨明前事有旨復官改正元斷然先生仕意益薄矣政和元年除成都路學事二年丁內艱移江東父殁終喪謂子弟曰吾昔為親而仕今雖有祿萬鍾將何所施遂稱疾挂冠買田塋傍築室勤耕將終身焉宣和末侍臣合薦先生經學可用齒髮未衰除尚書屯田員外郎先生入謝且辭靖康元年除太常少卿再除起居郎三辭不允乃至京師方以疾在告一日方午欽宗急召坐後殿以俟先生入見奏曰臣聞明君以務學為急聖學以正心為要願擇名儒明於治平之本者虛懷訪問又云陛下御極越半年紀綱尚紊風俗益衰大臣爭競而朋黨之患開百執窺覦而浸潤之姦作用人失當而名器愈輕出令數更而士民不信若不掃除更張竊恐大勢一傾不可復正除中書舍人屢辭不受時門下侍郎耿南仲倚攀附之舊凡與己不合者皆指為朋黨見奏怒形詞色言於欽宗曰安國往者不事上皇今又不事陛下可謂不臣矣欽宗不納一日問中丞許翰識安國否對曰自蔡京得政天下士大夫無不受其籠絡超然逺迹者惟安國一人欽宗稱異勉令受職除中書舍人賜三品服南仲知上意不可回乃諷臺諫犄角言其稽慢不恭宜從黜削欽宗終不許中書侍郎何栗建議分置四道都總管先生奏曰內外之勢適平則安偏重則危今州郡太輕理宜通變然一旦遽以數百州之地分為四道則權復太重萬一抗衡跋扈號召不至何以待之若但委諸路帥臣專治軍旅每嵗一案察其部內或有警急京城戒嚴則各率所屬應援如此則既有擁衛京師之勢又無尾大不掉之虞栗方得欽宗心密説京師若不可守則出幸山南可以入蜀其意欲當南道之任又於先生嘗有推挽之力必無駁異至是駭曰康侯乃以異議為髙古人言山林之士不可用信然不得已於四總管之地各削其逺近州縣而已及後京師被圍西道王襄領所部兵翺翔漢上不復北顧果如先生所言矣吏部侍郎馮澥言劉珏行李綱責辭實為綱遊説珏坐貶先生論澥越職封還詞頭且言陛下欲復祖宗善政而澥言祖宗未必全是熙寧未必全非隂崇王氏之學再挾紹述之議於是耿南仲大怒宰相唐恪何栗從而擠之遂除右文殿修撰知通州行至襄陽而北騎已薄都城矣欽宗命召還旨竟不達髙宗即位召為給事中黃潛善方專政意欲斥逐忠賢訪給事中康執權論其託疾罷之建炎二年以樞密使張浚薦再起給事中先生子寅時修起居注髙宗賜手札曰卿父未到可諭朕旨催促前來先生行至池州聞駕幸吳越遂引疾提舉洞霄宫紹興元年除中書舍人兼侍講再辭不允遂行獻時政論二十一篇復除給事中髙宗知先生深於春秋出左氏傳令點句正音先生奏春秋乃仲尼親筆實經世大典見諸行事非空言比方今思濟艱難左氏繁碎不宜虛費光隂髙宗稱善除兼侍講專以春秋進講先生以學未卒業乞在外編集未允會故相朱勝非同都督江淮荆浙諸軍事先生奏勝非與黃潛善汪伯彥同在政府緘默附會馴致渡江尊用張邦昌結好金國淪滅三綱不顧君父恐不足倚仗詔勝非改除侍讀先生羞與同列卧家不出是時秦檜雖姦故深相知而故相吕頥浩自都督江上還朝欲傾秦檜未知所出或曰目為朋黨可矣但黨魁在鎖闥當先去頥浩大喜力引勝非為助言先生偃蹇朝命遂落職提舉仙都觀是夕彗出東南檜三上章乞留不報解印去諫官江躋吳表臣懇留頥浩即黜躋等二十餘人以應星變臺省一空勝非遂相先生歸休于衡嶽之下作書堂數間頺然當世之念矣初王安石獨用己意著三經新説稱為道德性命之學於春秋聖人行事之實漫不能曉則詆為斷爛朝報直廢棄之崇寧間防禁益密先生自少年即有服􅈾之志嘗曰六籍惟此書出先聖之手乃使人主不得聞講説學士不得相傳習亂倫滅理殆由是乎於是潛心刻意採拾辨正準則之以語孟權衡之以五經據證之以厯代之史研玩沈酣者三十年及得程伊川所作傳其間精義十餘條若合符節益以自信探索愈勤至是年六十一而書始就歎曰此傳心要典也蓋於克己修德之方尊君父討亂賊存天理正人心之術未嘗不屢書而致詳焉紹興五年除徽猷閣待制知永州不拜差提舉江州太平觀令纂修所著春秋傳進入書成奏御髙宗屢對羣臣稱善除提舉萬夀觀兼侍讀委所在守臣以禮津遣先生以疾未行會諫官陳公輔乞禁程頥學先生奏曰孔孟之道不傳久矣自頥兄弟始發明之然後知其可學而至今使學者師孔孟而禁不從頥學是入室而不由户也本朝自嘉祐以來西都有邵雍程皓及其弟頥關中有張載皆以道德名世望乞加封爵載在祀典仍詔館閣裒其遺書較正頒行奏入公輔與御史中丞周祕侍御史石公揆論先生學術頗僻行義不修復除永州提舉太平觀久之髙宗念先生訓經納諫之忠特除寶文閣直學士紹興八年卒年六十有五諡文定賜田十頃恤其孤纍贈至中大夫先生負傑出絶異之資見善必為知惡必去自幼少時已有出塵之趣登科後同年宴集飲酒過量是後終身不復醉嘗好奕棋先令人責之曰得一第德業竟耶是後不復奕在長沙日按行屬部過衡嶽愛其雄秀欲一登覽已戒行矣俄而思曰非職事所在也即止晚居山下五年竟亦不出也罷官荆南僚舊餞行于渚宫呼樂戲以俟其交代龜山楊公時具朝膳留先生鮭菜蕭然引觴徐酌置語孟案間清坐講論不覺日晷云暮也壬子赴闕過上饒有從臣家居者治饌延先生飾姬妾請令出奉巵酒為夀先生蹙然曰二帝蒙塵國步阢隉豈吾徒為宴樂之日敢辭其人赧赧而止先生風度凝逺蕭然塵表視天下無一物足以攖其心者辭受取捨一介之微必度於義飢不可得而食寒不可得而衣也恬靜簡默寡于言動雖在燕間獨處未嘗有怠容慢色語孟五經諸史周而復始至老未嘗釋手每晨昏子弟定省必問何所業有矜意則曰士當志於聖人勿臨深以為髙見怠慢不虔必頻蹙曰流光可惜將為小人之歸矣子弟或近出燕集雖夜已深猶未寢必俟其歸驗其醉否且問其所集何客所論何事有益無益以是為常士子有自逺來學者先生隨其資性接之大抵以立志為先忠信為本以致知為窮理之漸以敬為持養之要每誦曽子之言曰君子之愛人也以德小人之愛人也以姑息故不以辭色假借子弟及學者亦未嘗降志遜言茍為唯諾以祈人之悅也于出處言行由道據義以心之所安為主志在康濟時艱見中原淪沒常若痛切於身自登第逮休致凡四十年其在實厯之日不登六載雖數以罪去而愛君憂國之志逺而彌篤每被召即置家事不問或通夕不寢思所以告君者然宦情如寄所好不在焉嘗語學者曰知至故能知言意誠故能養氣又曰豈有見理已明而不能處事者朱震被召問出處之宜先生曰世間惟講學論政不可不切切詢究至於行已大致去就語默之幾如人飲食其飢飽寒溫必自斟酌不可決之於人亦非人所能決也吾平生出處皆內斷于心浮世名利如蠛蠓過前何足道哉故渡江以來儒者進退合義以先生與尹公焞為稱首所與交惟遊公酢謝公良佐楊公時皆程門髙弟先生不及二程之門而三君子皆以斯文之任期先生謝公嘗語人曰胡康侯正如大冬嚴雪百草萎死而松柏挺然獨秀也先生尚論古人則以諸葛武侯為首于本朝卿相則以韓忠獻公為冠慕用鄉往言必稱之性本剛急及其老也氣宇粹溫儀貌雍穆于和樂中有毅然不可犯之象于嚴正中有薰然可親近之意年寢髙矣加以疾病而謹飭於禮無異平時其於祭也必沐洛盛服率子孫諸婦各執其事方饗則敬已祭必哀濟濟促促如祖考之臨之也雖在離亂遷次居處衣食或有不給而奉先之禮未嘗或闕由少至老食不兼味家世至貧轉徙流寓遂至空乏然貧之一字于親故間非惟口所不道故亦手所不書嘗戒子弟曰對人言貧者其意將何求汝曹志之二程門人侯仲良言必稱二程先生他鮮所許可後至漳濱先生館留之逾年仲良潛察先生心意于言笑動止之間不覺歎服語人曰視不義富貴如浮雲者當今天下惟公一人耳朱晦菴曰公傳道伊洛志在春秋著書立言格君垂後所以明天理正人心扶三綱敘九法者深切著明而其正色危言據經論事剛大正直之氣亦無愧于古人又曰文定之學後來得之上蔡者為多云所著春秋傳若干卷資治通鑑舉要補遺一百卷初娶李氏繼室王氏皆贈令人子三人寅寧宏姪憲葬于潭州湘潭縣龍穴山明正統間從祀孔廟國朝康熙四十五年從學臣沈涵之請賜御書霜松雪柏四大字匾於祠道南源委伊閩書源宏簡録洛淵録槩宋史知諸儒述聖學統録翼胡文定公文集窮理盡性乃聖門事業物物而察知之始也一以貫之知之至也來書以五典四端每事充擴亦未免物物致察非一以貫之之要是欲不舉足而登泰山也四端固有非外鑠五典天敘不可違充四端惇五典則性成而倫盡矣釋氏雖有了心之説然知其未了者為其不先窮理反以理為障而於用處不復究竟也故其説流遁莫可致詰接物應事顛倒差謬不堪點檢聖門之學則以致知為始窮理為要知至理得不迷本心如日方中萬象畢見則不疑所行而內外合也故自修身至於天下國家無所處而不當矣來書又謂充良知良能而至於盡與宗門要妙兩不相妨何必舍彼而取此夫良知良能愛親敬長之本心也儒者則擴而充之達於天下釋氏則以為前塵為妄想批根拔本而殄滅之正相反也而以為不相妨何哉提刑范伯達先生如圭范如圭字伯達建陽人少從舅氏胡文定公受春秋學建炎二年進士廷對策極論人主正心立志之方力詆和議宴安之失言甚壯切為考官抑置乙科授武安節度推官始至帥將斬人公白其誤帥曰已署矣公正色曰節下奈何重易一字輕數命耶帥矍然從之尋以憂去近臣交薦召試除祕書省校書郎會秦檜力建和議金使鼎來其詞悖傲不可聽從公與同省十餘人合議并疏爭之既具草而駭遽引却者衆公獨手書詆檜責其曲學倍師忘讎辱國且曰公不病狂喪心奈何一旦為此以遺臭萬世檜怒公卒與史官六人上所議草未幾金歸河南地以嘗我檜方自以為功公曰是亦安能久有因輪對言兩京版圖既入則九廟八陵瞻望咫尺今朝修之使未遣何以仰慰神靈下萃民志髙宗泫然曰非卿不聞此言立命遣使檜以公不先白己益怒之公亦以先墓久寄荆門乃謁告歸葬故鄉既即以病告差主管台州崇道觀前後三請杜門讀書不與人事者十餘年尋起通判邵州又通判荆南府事檜死首被命入對髙宗猶記前議勞問久之公因進言為治以知人為先知人以清心寡欲為本語甚切至時陳文恭公知政事亦欲留公朝著為檜黨所擠以直祕閣提舉江西常平茶鹽公事出之尋改利州提點刑獄公事復請祠時宗藩並建儲位未立道路竊竊有異言公雖在逺外獨深憂之故嘗剟至和嘉祐間名臣章奏合為一書至是囊封以獻髙宗感其言語輔臣歎曰如圭可謂愛君矣遂留陳公決定大計即日下詔進孝宗為建王因復起公知泉州既至舉大體盡下情擇任丞史蠲屬縣負課以裁正宗官被譖領祠如故僦舍邵武門巷蕭然士大夫益髙仰之逺近學者多從質問經史疑義屬疾移書政府舊交惟以國事為寄卒年五十有九後兩年孝宗受內禪而公已不及見世亦莫知公之嘗有言也公為人篤厚易直不飾邉幅忠孝誠實得之於天其學根於經術不為無用之文有集十卷皆書疏議論之語後文公朱子撰公墓碑末云先人為史官時實常與公連名奏事及罷而歸又與公同日艤舟國門外其相與期於固窮守死之意晚而愈篤先人既沒公所以憐某者亦益厚至於親為講畫反復辨告蓋惟恐其迷昧沒溺喪失所守以辱其先人也此意豈可忘哉子念德見朱子學派閩書神名臣言行録府朱子撰道碑建寧志召使胡五峯先生宏學派先公嘗曰胡氏之學五峯其優乎故曰性立天下之有情效天下之動心妙性情之德又曰誠者命之道乎中者性之道乎仁者心之道乎又曰立志以端其本居敬以持其志志立乎萬物之表敬行乎事物之內而後義可精此數句公所屢述以為昔賢論學質的也按知言一書詳於性命道德之旨其髙弟南軒張成公謂是書言約義精而先生之意每自以為未足逮疾革猶時有所更定蓋未及脫藁而先生下世矣是此書恐亦公尚未定之本耳朱子曽與胡廣仲書言知言中言善不足以言性則不知善之所自來此等議論與其他好處自相矛盾者極多惜乎不及供灑掃于五峯之門而面質之先公榕村講授中纂此書次於王氏中説邵氏觀物外篇之列其殆論學者所折衷歟乾隆辛未四月十四立夏後四日書召使胡五峯先生宏胡宏字仁仲文定子也授學家庭聞伊洛之説欣然心會年十五遂自為論語説編程氏雅言序而藏之旦夕玩誦文定懼其果於自用乃授以所修通鑑舉要於是肆力研究弱冠遊大學與樊光逺張九成師事楊龜山侯仲良而卒傳其父文定之學優遊衡山下餘二十年玩心神明不舍晝夜張敬夫師事之紹興間上書論復讎大義纍數千言有曰二帝逺適窮荒辛苦墊隘其願望陛下加兵敵國猶飢渴之於飲食庶幾父子兄弟生得相見引領東望九年於此在廷之人不能對揚天心充陛下仁孝之志反以天子之尊北面讎敵陛下自念以此事親何如也陛下御位以來中正邪佞更進更退無堅定不易之誠陳東以直諫死於前馬伸以正論死於後而未聞誅一姦邪黜一諛佞雖當時輔相之罪然中正之士陛下腹心耳目也奈何以天子之威握億兆之命乃不能保全以自輔助顧令姦邪得而殺之竊傷陛下威權之不在己也司業髙閌請幸太學先生見其表作書責其欺天罔人言當此忘讎滅理北面敵國之時既不能建大論明天人之理以正君心乃阿諛柄臣希合風旨求舉縟節粉飾太平聞者歎服初以蔭補官不調秦檜當國意欲用之貽書其兄明仲言二弟何不通問先生作書辭氣甚厲示以不可召之意時四方從學者甚衆一隨其髙下誘進之而汲汲乎理欲之辨仁敬之説檜死侍臣交薦被召竟以病辭卒於家所著書曰知言門人張敬夫稱其言約義精實道學之樞要制治之蓍龜尚有詩文五卷皇王大紀八十卷學者稱五峯先生道南源委簡建寧府志宏録縣尉詹應之先生慥詹慥字應之崇安人素與胡五峯劉屏山諸公遊少時甘貧力學砥節礪行弱冠首薦鄉書試南宫弗售遂為鄉學師多所造就為文涉筆立成人謂腹藁晚調信豐尉會金人渝盟往見張浚論滅金祕計浚辟為屬禆贊居多嘗渡桐江弔子陵詩云光武親征血戰回舉朝誰識渭川才熊羆果有周王卜未必先生戀釣臺其慨然有用世之志如此有文集二十卷行世子體仁見朱子學派閩書吳晦叔先生翊吳翊字晦叔建陽人師胡五峯五峯沒又與其弟廣仲子伯逢就張敬夫論學翊生平忠信撫幼孤曲有恩義與人交表裏殫竭心所不安者告語切至而不失其和故朋儕多受益而樂親之葉衡山稱其賢妻之以女翊因導其子定謁張敬夫受學定卒為修士翊之力也敬夫門人在衡湘者日從翊參決所疑舊有嶽麓書院設山長教授生徒尋廢五峯嘗請復之乾道初帥守劉珙始復書院猶虛山長後轉運副使蕭之敏以禮聘翊翊曰侯之意美矣然此吾先師之所不得為者豈可以涼德當之哉力辭不赴築室衡山下有竹林水沼之勝取程子澄濁求清意榜曰澄齋日與士友講道讀書修然自樂及殁朱子為志狀建寧府志靖肅胡籍溪先生憲學派按文公撰先生行狀言先生從文定公學始得聞河南程氏之説尋與鄉人白水劉致中受學於涪陵處士譙天授所與同志惟白水先生既與俱隱又得屏山先生更相切劘而韋齋先生亦晚而定交焉此文公託孤所由來也文公稟學於三君子後二劉下世獨事先生為最久云靖肅胡籍溪先生憲胡憲字原仲文定公從父兄之子也祖聳父淳皆不仕行狀先生生而沈靜端慤稍長從文定公學始聞河南程氏之説紹興中以鄉貢入太學會元祐學有禁獨與鄉人白水劉公致中隂誦竊講既又學易于涪陵處士譙公天授久未有得天授曰是固當然蓋心為物潰故不能有見惟學乃可明耳先生喟然曰所謂學者非克己工夫耶自是一意下學不求人知一旦揖諸生歸隱故山非其道義一毫不取于人力田賣藥以養其親文定稱其有隱君子之操鄉人士從者益衆於是近臣折彥質范沖朱震劉子羽吕祉吕本中共以其行義聞於朝被召以母老辭及彥質入西府又言之趣召愈急先生固辭乃授左迪功郎添差建州教授先生猶不出太守魏矼遣行義諸生入里敦致詔旨且為手書力勸乃勉就職日進諸生訓以為己之學聞者始而笑終而疑久而觀其所以修身事親接人無一不如所言遂翕然悅服郡人程元以篤行稱龔何以亷節著皆迎致之俾參學政學者大化秩滿復留者再蓋七年不徙官嗣以母老不樂居官舍求監南嶽廟以歸久之起為福建路安撫司屬官時帥張宗元𣙜鹽急私販銖兩亦重坐先生告以為政大體帥不悅遂請祠去會秦檜用事天地閉塞幾二十年先生已泊然無復當世之念及檜死召大理司直未行改祕書省正字人謂先生必不復起而先生一拜即受雖門人弟子莫不疑之會次當奏事病不能朝即草疏言金人大治汴京宫室勢必敗盟今元臣宿將惟張浚劉錡在願亟起之時兩人皆為積毁所傷未有敢顯言當用者先生獨首言之疏入即求去諸公留之不得上亦感其言以為左宣教郎主管崇道觀使歸而食其祿先生每極論天下事至於慷慨灑涕其以館職召適秦檜諱言之後獨與王十朋馮方查籥李浩相繼論事太學生為五賢詩以歌之在位僅半年人惜其不究云紹興中卒年七十七諡靖肅先生質本恬淡而培飬深固平居危坐植立時然後言望之枵然如稿木之枝而即之溫然雖當倉卒不見其有疾言遽色人或犯之未嘗校也其讀書不務多為訓説獨嘗纂論語説數十家復抄取其要附以己説與他文草藁藏於家平生與劉公致中同志既與俱隱又得劉公子翬與之遊更相切磨以就其學而朱公松亦晚而定交焉朱公既病且沒遂因以屬其子晦菴於先生及致中子翬之門而晦菴事先生為最久吕祖謙林之奇魏掞之熊克曽逢皆其門人學者稱籍溪先生閩書源録考亭淵行狀直閣魏艮齋先生掞之魏掞之字子實故名挺之字元履建陽人少師事胡籍溪先生憲已遍從鄉儒先長者遊又適四方盡交其先達名士聞見日廣聲稱日以大嘗客衢守章傑家故相趙鼎以謫死歸葬常山傑雅怨鼎又希秦檜意逮繫其家人劾治甚急掞之作書譙讓傑長揖歸兩以鄉舉試禮部不第閩帥汪應辰建守陳正同相與論薦於朝時相尼之又不得召後數嵗詔舉遺逸部刺史芮煜師其寮與帥守六人共言掞之行誼有詔特徴之辭謝不獲以布衣入見極論當世之務孝宗奬歎開納勞問移時遂詔賜同進士出身授左迪功郎守太學録既就職日進諸生教誨之釋奠孔子祠先事白宰相陳俊卿請言於上廢安石父子勿祀而追爵程氏兄弟使從食又言太學之教宜先德行經術其次尤當使之通習世務以備官使今一以空言浮説取人非是至他政事有係安危治亂之機宰相不能正臺諫侍從不敢言者無不抗疏盡言至三四上並不見納則移病杜門曽覿召還掞之移書與時宰責其不能救止時宰雅招徠掞之至是見其書詞峻切亦不能平而掞之前已數求去矣遂以迎親豫告使歸行數日罷為台州學教授掞之自少有志于當世晚而遇主然其仕不能半歲而不合以歸先是榜其書室曰艮齋至是日處其間條理舊學以益求其所未至平生於學無不講而尤詳於前代治亂興廢存亡之説以至本朝故事之實為文章長於議論善談説聽者悚然居家謹喪祭重禮法恤親舊雖貧不懈遇嵗飢為粥以食飢者且請于官為之移粟閭里賴之鄉人有不葬其親者為白於官請冨與之期貧與之費賴以掩者亦以千計其與人交嘉善救失如不及後進以禮來者茍有一長汲汲推挽之嘗有病其太過者笑曰不猶愈于橫目自營者耶既卒孝宗嗟悼久之即下詔曰朝廷不可無直諫之士掞之雖死其以宣教郎直祕閣告其第掞之素與文公朱先生遊乾道中文公被召將行聞掞之去國遂止子應仲見朱子學派張南軒撰墓表閩書宏簡録縣令邵秀山先生景之邵景之字秀山古田人從父整著春秋元經以家學相友景之早負文才事繼母至孝登乾道壬辰進士攝教建寧受業籍溪胡憲之門官至莆田令教授常百餘人著有玉坡集按閩書邵整字宋舉自號蒙谷遺老與族人景之以家學自相友此傳本道南源委稱整為景之從父待再考閩中理學淵源考卷三
