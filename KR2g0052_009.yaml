body:
  text: 閩中理學淵源考卷九廣平府知府李清馥撰莆田劉氏家世學𣲖彭從吾先生曰莆壤土褊小至宋始成郡而文獻特盛忠惠蔡襄文節林光朝正獻陳俊卿三五公為之冠冕最後後村劉先生起而繼之文章流布事業兼備論者謂三五公而下一人而已蓋劉自著作夙正字朔二先生師事文節公道同行偕齊名乾淳間蔚然為文章家著作之子吏部侍郎彌正與羣從又皆以行義名世吏部之子則後村先生資稟既異濡染亦深壯而益學以至於成加以夀數之髙位遇之顯遂以文事紹先聞於天下當世大儒真文忠公辟帥參且以學貫古今文追騷雅薦於朝晚乃薦歷工部尚書以龍圖閣學士致仕年八十三而沒著作劉賔之先生夙劉夙字賔之莆田人與弟朔師事林艾軒得其傳紹興二十一年登第歷臨安教授以弟朔為溫州司户迎母就養因乞與溫州教授莫沖兩易以便親從之作養人材多所成就陳傅良以諸生見夙賞重之果以文名孝宗即位召除樞密院編修以親老求去無何兼國史院編修力辭不就除著作佐郎所對館職策言薦舉之弊曰此執政大臣為惠而不為政致之也陳執中章子厚人知其小人也然能不以官私其親今將告執政大臣曰子為子厚乎子為執中乎則艴然怒矣至其行事則有為子厚執中所不為者矣又上封事曰陛下與曽覿龍大淵輩觴詠倡酬字而不名罷宰相易大將待其言乃決嚴法守裁僥幸當自宫掖近侍始所請凡六事丐外除荆湖北路安撫司參議乾道元年以親老丐祠主台州崇道觀三年差知衢州期年政平訟簡郡人祠之會曽覿副賀金正旦道衢入謁弗納復求去徙溫州禱雨全家淡食八十餘日明年引疾歸率鄉人救荒訴莆之剩米斛於朝盡蠲之又明年卒是歲王龜齡芮司業皆先夙卒吕東萊悼以詩云諸老收身盡佳城又到公蒼天那可問吾道竟成窮林謙之亦云賔之愛君均於愛親憂國過於憂身古有遺直今難其人真西山書二公志銘後云紹興末迄淳熙中名儒十餘人言論同出處偕如立直木於通達之衢後生有所望而趨讀之令人慨嘆不已二公在當時名論最髙惜皆弗究於用云所著有春秋解義弟朔子彌正彌邵莆陽文獻氏道南源委黃日抄山真西題跋正字劉復之先生朔劉朔字復之紹興三十年試禮部第一廷試甲科調溫州司户參軍計口受祿以其餘救飢疫飼棄兒孝宗初立與林光朝同召對曰陛下何不延納憤激敢言之士而聽訐直難堪之言因以自考察成敗得失且及曽覿龍大淵罪狀改宣議郎知福清縣以至誠待民聽訟使兩詞自詣市食挂錢於門會病作請祠歸再召入對時虞允文贊孝宗恢復士多嚮之朔極諫以為宜選兵將廣儲峙責成於端重堪事者從容以待其變不可憑虛蹈空過為指料決天下於一擲孝宗竦然除祕書省正字以疾丐外除福建安撫司參議朔與兄賔之皆為時望所推學者輻輳其門兄性挺特不以色假人朔則濟以和易至輕祿位而重出處厚名義而薄勢利盡言於朝盡心於官飭亷隅公是非殆不相讓云著春秋紀年二子起晦起世莆陽志閩道南源委書侍郎劉先生彌正劉彌正夙之子淳熙八年進士嘉泰初以承議郎知臨川縣入為諸司糧料院時韓托胄為相兵禍萌芽召使如兩淮議鐵錢實欲付以邊事彌正還言無故而先發天理不順無豫而輕舉人謀弗從托胄怒嘉定初為考功郎覆朱子諡議曰諡古也復諡非古也諡法曰諡生於行者也茍當於其行一字足矣奚復哉故侍講朱公沒於爵未得諡上以公道德可諡下有司議所以諡謹獻議曰六經聖人載道之文也孔氏沒子思孟軻更述其遺言以持斯世文幸未墜漢末諸儒採掇以資文墨鄭司農王輔嗣輩又老死訓詁謂聖人之心真在句讀而已隋唐間河汾講學已不涉聖賢閫奧韓愈氏復出特其文近道爾蓋孔氏之道賴子思孟軻而明子思孟軻之死明者復晦由漢而下暗如也及本朝而又明濓溪橫渠剖其幽二程子宿其光程氏之徒噓其焰至公聖道粲然矣公之學以誠持中敬持外其於書尊六籍則諸子曲説不得干其思其於道不敢深索也恐入乎幽不敢過求也恐汩其説讀書初貫穿百氏終也縮以聖人之格言自近而入微由博而歸約原心於眇忽析理於錙銖采衆説之精而遺其粗集諸儒之粹而去其駁嗚呼醇矣哉孟氏以來不多有也公中科第猶少也薄遊徑隱閉門潛思朝廷每以好官召公莫能屈不得已而出惟恐去之不早自官簿書考者九而間居者四十餘年山林之日長問學之功深也平居與其徒磨切講貫皆道德性命之言忠敬孝愛之事由公學者必行已莊與人信居則安貧而樂道仕則尊君而憂民重名節而愛出處合於古而背於時若此者真公之學也嗚呼師友道喪人各自是公力扶聖緒本末宏闊而弄筆墨小技者以為迂癯於山澤與世無競而汨沒朝市者以為矯自童至耄動以禮法而跅弛於繩墨者姍以為誕世嘗以是病孔孟矣公何恨焉初太常議以文忠諡公按公在朝之日淺正主庇民之學鬱而不施而著書立言之功大暢於後合文與忠諡公似矣而非也有功於斯文而謂之文簡矣而實也本朝歐蘇不得諡文而得者乃楊大年王介甫介甫經學非醇也其事業亦有可恨楊公正復文士爾文乎文乎豈是之謂乎世多評韓愈為文而非也原道謂軻之死不得其傳斯言也程子與之公晚為韓文立考異一書豈其心亦有合歟請以韓子之諡諡公謹議終吏部侍郎林侣之建臨川三賢祠于學宫祀黃勉齋文丞相而彌正與焉弟彌邵子克莊處士劉習靜先生彌邵劉彌邵字夀翁素性狷介早孤遺書數厨晨夕抄纂考論古今斷制義理一以洙泗濓洛為宗嘗質經於陳宓評史於鄭寅問易於蔡淵郡守楊棟創尊德堂於學宫以處之及棟提點福建刑獄復論薦於朝未報卒年八十二彌邵平生為學專務實踐自幼至老確然不移者有易藁漢考讀書日記諸書學者稱習靜先生子􅍲寶慶二年進士歷羅源青田令為政以風俗教化為本道南源委志莆田邑文定劉後村先生克莊克遜克剛劉克莊字潛夫夙之孫莆田人嘉定二年以郊恩補將仕郎調靖安簿以宣教郎知建陽縣新考亭祠祀朱范劉魏四賢於學糴賑糶倉二千斛方以邑最聞而言官李知孝梁成大箋其所詠落梅有朱三鄭五之句以謗訕托其罪鄭清力為之辨釋得通判潮州改吉州真德秀辟為帥參且以學貫古今文追騷雅薦於朝與祠未幾漸致從班遂除樞密院編修官兼權右侍郎輪對言服天下莫若公今失之私鎮天下莫若重今失之輕又言權臣壞朝綱開邊釁兵驕楮賤貪叨僥幸之俗不可回諸賢起而當之天人未應願堅凝初意無使邪説淫奪正論又拳拳於濟王苕川之獄雖復其爵未雪其寃皆人所難言尋除知漳州嘉熙元年改知袁州坐先言濟王事為御史蔣峴所劾與方大琛王邁同罷既與祠擢廣東提舉就升漕攝舶俸給例劵皆却不受買田二十畝為南仕歸喪之費淳祐四年除將作監改直華文閣因舊任六年令赴行在奏事道除大府少卿既至面對三劄御劄劉克莊文名久著史學尤精可特賜同進士出身除祕書少監兼中書舍人史嵩之服闋御筆除職豫祠令克莊行詞克莊奏嵩之有無父之罪四無君之罪七舊相致仕合有誥詞今臣行嵩之之詞未知為褒為貶論奏不已為殿中侍御史章琰劾罷尋依舊職知漳州就除祕閣修撰福建提刑以便養甫及月丁內艱方􅎭除崇政殿説書史館同修撰時事多內出克莊言祖宗盛時內降絶少今中外除授不由大臣啓擬求者與者奉行者習以為常臣竊惜之忤當國意尋除起居舍人進言愈切力奏不草史宇之答詔除右文殿修撰知建寧府改福建轉運使以鄭發疏褫職寢新命提舉明道宫景定元年賈似道還朝歷遷權工部尚書兼侍講以年迫堅乞納祿除煥章閣學士守本官致仕咸淳四年特除龍圖閣學士致仕仍舊年八十三卒諡文定所居後村人因稱為後村先生彭韶祠堂記曰維莆至宋文獻特盛蔡忠惠林文節陳正獻三五公為冠冕最後先生起而繼之文章流布事業兼備論者謂三五公而下一人而已賈似道當國貪收德望以慰人心公為之出蓋賈蹈蔡氏用龜山之故智云所著有後村前後續新四集弟克遜以父任補官調古田令纍遷知邵武軍除劇盜興教化改潮州移泉州以疾奉祠一生清貧工於詩葉適趙汝談皆稱之克剛為泉州録參真文忠薦知沙縣寶祐二年知惠州清約多才修弊起廢建豐湖書院祀羅豫章闢四齋以居生徒擇州學博士兼山長領之并增學舍惠人始知伊洛之學莆陽文獻閩書教授劉建翁先生起晦起世希仁劉起晦字建翁擢淳熙五年第知貴溪縣召試祕書省正字歷益王府教授蔚有時望材行不忝其父而言官指為偽學劾罷之弟起世擢慶元二年第南海尉子希仁希仁擢嘉定四年第因郊有雷雹之異托七事應詔尤於人材致意焉又曰論事之臣惟知攻上躬任事之臣惟知舉權要所言皆劘切貴近時論壯之在仕途六十年間散時多所薦士如徐鹿卿皮龍榮等多貴達而希仁屢以謗退官止中大夫顧每遇遷擢必有論建身雖屏處猶上針闕失惓惓忠愛畎畝不忘云莆陽文獻書閩備考黃氏日抄曰愚觀水心志陳君墓寂寥歉然今二劉官不為顯文無行於世者而所載言行煒然耀人蓋所志諸公貴人皆無及此者故節録特備節録中遺事已録入本傳此不具録又曰劉彌正劉夙子也幼率諸弟勤苦緝故業貧不能得膏火旁嫗夜績者光射公牖輒携書就之後皆中第其在朝丞相陳自強惡其不附已開禧敵入冦遂用公提淮鹽蓋以陷之危地自兵起鹽商不行公盡通鹽利就為運判後為浙漕北使自淮至浙凡送迎之事皆公裁定為成式其為浙漕也不與內臣相見官至吏部侍郎真氏西山書二劉公志銘後曰永嘉葉公之文於近世為最銘墓之作於它文又為最著作正字二劉同為一銘筆勢雄拔如太史公歎咏悠長如歐陽子於他文又為最嗚呼二劉公不可復見矣若永嘉之文亦豈易得哉其言紹興末迄淳熙中名儒十餘人言論同出處偕如立直木於通達之衢後生有所望而趨讀之令人慨歎不已夫言論同出處偕世之所指為朋者也名儒十餘人既為一朋望而趨者不知幾千百又為一大朋則士之相朋莫斯時若也然適是以增淳熙之盛其功及於紹熙慶元間至韓氏用事惡其朋而盡錮之其患有不可勝言者乃知阜陵規摹誠可為萬世法而歐陽子信為知言也二劉在當時名論最髙惜皆弗究於用今建陽大夫克莊昆弟方以文學材猷自奮其尚有以成前人之志云又書著作春秋講義後曰昌黎公寄玉川子詩有春秋三傳束髙閣之語學者疑之謂未有舍傳而可求經者今觀著作劉公講義一以聖筆為據依其論秦穆公以人從死者晉文公之召王宋襄公之用人於社皆以經證傳之失所謂偉然者也昔歐陽子患偽説之亂經著為論辨自謂時雖不同千歲之後必有豫同者曽未二百年而劉公之論春秋蓋與之合公而有知當不恨後世之無子雲矣所講才十有二條麟經大指略盡於此其言曰吾聞法吏以一字輕重矣未聞聖人以一字輕重春秋也旨哉言乎足以破世儒之陋學者其深味之又跋劉彌邵讀書小記曰莆陽劉隱君以讀書小記示豫豫讀之嘆曰懿哉劉君可謂知學問之本矣孔門獨一顔子為好學顔子所問前曰為仁後曰為邦舍是無他學也蓋為仁者成已之極而為邦者成物之極體用本末究乎此矣顔子所以亞於聖人而孟子期之以禹稷之事業豈非內聖外王之學已備故邪漢以後學者始多端記問綜古今文章妙機軸號為儒者極摯然以成已則不足以成人則甚難其亦何貴乎學豫屏居八年呻吟蠧簡未有云獲獨嘗竊謂士之於學窮理致用而已理必達於用用必原於理又非二事也朝思夜索惟此是求間以語諸人鮮不憮然者蓋後世之學言理或遺用其病為空虛言用或遺理其弊為粗淺不知理即用用即理非渾融貫通不足以語學之成今觀劉君之書內不遺理外不遺物乃深有契於豫心雖然道無窮學無止以劉君之靜且篤懋懋而弗舍庸知不詣其極乎故識於末編以待劉克莊書季父易藁序曰易學有二數也理也漢儒如京房費直諸人皆舍章句而談隂陽災異往往揆之前聖而不合推之當世而少驗至王輔嗣出始研尋經旨一掃漢學然其弊流而為玄虛矣本朝數學有華山陳氏河南邵氏今邵氏之書雖存通者極少理學有伊川程氏新安朱氏舉世誦習衆説幾廢余嘗恨程邵同時不相折衷曰傳曰皇極經世圖譜遂判為二書而不可合天下豈有難通之書亦豈有理外之數哉噫易更三聖説易者非一家程氏排臨川之學者及教人讀易必先輔嗣介甫朱氏尊伊川之言者至本義則多程子所未發議論以疑難問答而詳義理以講貫切磋而精此季父易藁之所為作也初余為建陽令季父訪余縣齋因質易疑於蔡隱君伯靜後二十餘年而書成大旨由朱程以求周孔由周孔以求羲文其篤守師説雖譙天授袁道潔無以加視世之髙談先天徑造微妙彼虛而此實矣季父名彌邵字夀翁中歲棄科舉閉門著書動必由禮為鄉先生家貧食於學晚舍去併學俸卻之太守眉山楊侯棟郡博士括蒼俞君來即學為堂示舍蓋之意季父僅一至焉後楊侯使本道又論薦於朝不報卒年八十二俞君乃取昔所卻俸為刋易藁而授簡其猶子克莊序之莆陽方氏家世學𣲖按莆陽方氏本徽之歙人自廷範先生分支六𣲖以仁字行相宅於莆之刺桐巷奕葉繁衍曰龍圖公儀一𣲖即仁嶽之後也曰開府公慎言及郎中公慎從者即仁載之後也二支科名顯仕儒流濟美又有司理公峻大常公嶠者亦仁字分𣲖遷住於白社淵源所漸又盛考峻官潤州識程公珦其子道輔先生元宷少與二程同逰得聞伊洛之學至次雲先生翥即景通先生之曽孫也杜門誦讀不求干進與林公艾軒同學又與鹽官施氏廷先逰最久而廷先之學得之信伯王氏為程門的傳子朱子嘗少年過莆見林謙之方次雲稱其講説道理極精細為之踴躍鼓動忘寢食焉至嶠之子仲宇學於安定先生尤其最初者也噫方氏一門祖孫父子得聞程胡諸賢之旨厥後次雲先生又與紫陽上下議論至次雲之孫輩禾耒壬與履齋伯謨諸公雲集執經於紫陽之門至忠惠又薰炙于西山鶴山二老是方氏家學自宋初至季世儒業勳名指不勝屈得於師友傳習考證深矣述其家世大略著之篇首著作方先生儀方儀其先本歙人至廷範歷知長溪古田長樂三縣居莆刺桐巷六子皆仕閩王氏仁逸檢校水部員外郎仁嶽祕書少監仁瑞著作郎仁遜大理司直仁載禮部郎中仁逺祕書正字儀仁嶽季子也咸平三年與從子慎言同登第初興化軍未有學儀伏闕上書乞建軍學立夫子廟得旨賜地儀入資助成之復與弟能及慎言奏請修三禮堂步廊崇閣及學制之未備者由是莆之學校日盛歷官大理寺丞遷著作佐郎卒郡學繪其象祀焉閩書獻莆陽文提刑方孚若先生信孺方信孺字孚若興化人儀七世孫父嵩卿擢隆興元年進士歷官政績茂著家藏書四萬卷皆手自校讎信孺少有雋材未冠能文周必大楊萬里咸器之以父廕補畨禺尉轉蕭山丞時朝廷悔托胄啓邊釁金亦厭兵時方議和開禧三年近臣薦信孺為樞密院參謀官使金至濠州金帥紇石烈子仁止信孺獄中露刃環守之要以五事信孺曰反俘歸幣可也縳送首謀古無是事稱藩割地則非臣子所忍言子仁怒曰若不望生還耶答曰將命出國門已置生死度外矣至汴見左丞相完顔宗浩反覆辨折不少詘自春至秋三往還言敵所欲者五事割兩淮一增歲幣二犒軍三索歸正等人四諱其五不敢言托胄再三問至厲聲詰之徐曰欲得太師頭耳托胄大怒奪三秩羈管臨江軍年才三十歸營居室巖竇自放於詩酒已而王柟定議增幣函首皆信孺所持不可者柟歸具言金人每問信孺安在乃起通判肇慶府洞寇竊發被旨同廖德明措置收捕就命知韶州至郡即封崇張九齡余靖墓擒赤水洞賊首戮之尋提點廣東刑獄奏縱不決之獄數千人遷淮東轉運判知真州即北山匱水築石堤袤二十里人莫知其所為後金兵薄儀真守將決水匱以退敵城賴以全山東初內附信孺請選威望重臣將精兵數萬往開幕以主制客以重馭輕可以固江北瞰兩河坐責降三秩再奉祠卒閩省通志莆陽文獻郎中方先生龜年方龜年景祐元年進士與蘇緘齊名仕至屯田郎中所著有經史解題群書新語卒葬姑蘇子惟深舉進士不第晚為興化軍王安石最愛其詩精詣警絶謂元白皮陸有不到處莆陽志提刑方公美先生廷實方廷實字公美父監紹聖四年與曾從祖旬從子天若三人同榜官至廣東提舉廷實政和五年賜進士出身纍遷御史臺簡法官秦檜方主和議金使適至廷實疏言金使以江南詔諭為名或傳陛下欲屈膝受詔夫陛下縱未能克復神州尚可保守江左何至遽爾貶尊除監察御史尋以宗正少卿被旨宣諭三京淮北廷實至京西伏謁陵寢見永昌諸陵皆驚犯而泰陵暴露解衣覆之北還檜預使戒曰幸見上無言及且約以美除廷實曰欺君之事吾不忍為既見為髙宗涕泣歷道遂力求補外不許請益力除直徽猷閣提點福建獄至則首請解官贖胡銓罪檜益銜之時海冦竊發廷實謂當以盜禦盜有習歷風濤心懷歸正者即可用之有鄭廣輩故繇此塗得武官廷實不以往事遇之延問方略廣感激自效盜相繼遁去復奏除鋪例免行錢發常平米賑泉州飢尋改知泉州未上丁內艱歸服闋除廣南東路提刑有挾檜勢為威福者廷實廉得其實案之章再上不下遂上章納祿未報卒官廷實負才識善鑒裁平生薦士如林安宅龔茂良何大圭傅自得林孝澤吳逵宋藻黃濬皆一時之選也工詩律有集行世莆陽文獻閩書朝請方應之先生慎言方慎言字應之仁載孫儀再從姪咸平三年進士知信豐蘭溪二縣祥符初以殿中丞擢屯田員外郎仁宗即位改侍御史屬丁謂得罪遣慎言籍其家得士大夫干請書悉焚之人稱長者後請便郡知泉州歲飢大發官廪貸民奏免其丁稅父老感泣生子多以方名歷兩浙轉運使錢塘江決數十里慎言庀工授財疊石立柱以殺潮勢賜璽書褒美改知潭州潭人像祀之入為諌議大夫會擇重臣鎮南越遂以朝請大夫知廣州卒贈開府儀同三司孫通熙寧六年進士歷官知睦州坐子軫上書論列蔡京謫官以朝請大夫老於家通子軫以父任太廟齋郎極論蔡京過惡所疏凡千餘言詔罷父通職敕軫貸命追毁出身以來文字編管嶺南尋放歸靖康元年與父通復收敘原官後遷鄞縣令貧不能歸寓於慈溪至今子孫繁盛莆陽文獻書通志閩郎中方惟之先生慎從方慎從字惟之景德二年進士知弋陽導江等縣歷潮漳嘉三州再知漳州改都官郎中以老歸卒慎從所至有德於民在導江時有楠木連理嘉禾九穗之祥璽書褒異守漳之日適慎言守泉旌麾相望二州榮之及再至漳漳人夾道歡呼曰吾父復來矣通志忠惠方德潤先生大琮方大琮字德潤慎從七世孫也祖萬擢紹興三十年進士大琮以詞賦為開禧元年省試第三人授南劍州學教授為江西轉運司參議官決獄平允改知將樂縣式楊時廬祀八賢於學丁外艱服除知永福縣值兵飢守隘立柵禁港發廪無虛日時延名士講論文義丁內艱起復纍遷太府寺丞歷祕書郎著作郎除右正言疏論天下大勢適理宗不御殿封上之踰月入對復言理亂安危自君心始格其非者在大臣救其源者在諫臣又以女寵侈費為戒遷起居舍人兼實録院檢討官奏乞還魏了翁以重朝廷先是有諫言綱常者竄謫相望及理宗親政大琮敢言復故王爵召用諸老於是言路稍開殿中侍御史蔣峴惡之疏劾王邁劉克莊等以大琮為魁傑請置重辟大琮遂罷去豫祠尋改集英殿修撰知廣州廣東經略淳祐四年加寶章閣待制進直學士因舊任大琮在廣五年百度具舉以禮義化人期盡變其故俗改知隆興府命下卒諡忠惠贈寶謨閣學士依尚書例致仕大琮內溫和而外方嚴平居抑畏言不出口至立殿陛爭是非可否雖賁育不能奪祖尚晦翁沾溉醇馥于真西山魏鶴山而追慕劉元城之為烈與劉後村同時著述甚謹尺楮片翰刋落陳言辨博雖間不及後村而粹縝過之有奏議外制雜著若干卷子演孫侍父未嘗跬步離側為政以表勵風俗為急通志獻莆陽文林貞肅俊撰方忠惠公文集序曰宋自晦翁朱夫子起建安以上集四儒之成四方學士師宗之閩為盛莆又宗之方為盛履齋若水伯謨尤著者也逮尚書忠惠公祖尚真源沾溉醇馥于西山鶴山二大老而追慕元城公為烈鐵庵之號見志也公弱冠擢南宫詞賦第三人不祈速化沉鬱下僚者餘三十年亦遺材矣端平初鄭性之當國搜名進士拔致諫垣危言正論選親賢逺聲色杜佞幸以襄之失蜀之敗為恥荆淮之擾為懼及繳駁數事尤忠戅所難言公無諱焉申大義以雪濟邸之寃追罪姦相之彌逺屢言之臨安火又言之為其黨蔣峴所中豫祠鴻禧噫是無遺直者與公終寶章學士廣東安撫使為治尚風化崇正學表先賢薄官征恤民隱參行晦翁家禮社倉諸法利關人國為之力無阻以故生有祠殁致薦享舉扶插竹以奠請贈諡而梓行其遺文皆廣人德公之報也噫是無遺愛者與公殁淳祐丁未至是二百六十有七年公族孫雪筠良節嗣響家學大參廣藩因舊本輯之為若干卷復梓以傳盛舉也公後村同時人平時著述甚謹尺楮片翰刋落陳言辨博雖不及後村而粹縝過之命詞運意以心術為根柢氣節為枝幹義理為華實名賢為標格澄潤豐潔而丰神自適爭先覩之為快亦名作矣太常諡議謂源流晦翁徐驗之晦翁及公仕籍俱四十年晦翁在朝不滿四十日公亦僅一年幾半其出處概自相類莆先正自端明蔡公諡忠惠繼之亦僅公一人而已端明慶厯四諌溫陵海橋之聲迹天壤俱敝可也而胤嗣涼落遺文晦蝕逮之今無幾公舊本無恙兹復煥然一新梓行又適在廣是固德門子姓錫類之賢文獻足賴抑公之精神在廣與故民相糾結不渙散以默運之今耶不能不為德名幸也俊鄉閈晚出前哲景行序文大參之請抑亦俊之責也公諱大琮字德潤纍贈銀青光祿大夫方履之先生大壯方大壯字履之莆田人少頴悟操筆成章艾軒二劉咸推重之年長不事場屋專心求道朱子至莆大壯舉所學就正日與同志講明自號履齋性至孝執父喪三年不出户臨沒戒衣冠束帶而逝學者稱履齋先生子東叔孫澄孫曾孫公權閩書獻莆陽文通判方子約先生苻方苻字子約大壯兄子少授學於叔父以鄉試上春官道考亭拜朱文公於精舍留語纍夕為作字説第慶元己未進士文公以書賀大壯云苻清苦自勵窮達得喪惟命之安歷潤衢二州教授知瀏陽縣通判徽州未上卒通志陽閩書莆文獻祕書方蒙仲先生澄孫方澄孫名蒙仲以字行淳祐七年廷對萬言大約欲聚君子明公論以續國脈強精神又請立涪陵後錮秦檜子孫竄史嵩之以謝天下擢甲科為邵武軍教授賔禮耆宿作成俊乂置貢士莊秩滿監激賞所酒庫以憂去入為國子監庫官校藝南宫坐商論去取不能下氣出通判泉州辟淮西制置司參議官適元兵渡江治法征謀悉見咨訪元兵退知邵武軍表倡儒術著女教一書以崇風化請立樵川書院祠李忠定以廣教學郡最聞增一秩尋以祕書丞召卒澄孫髙才能文有氣節一時諸賢如方大琮王邁劉克莊皆與為友初以文字為賈似道所知及似道相澄孫獨求補外終其身所著有通鑑表微洞齋集子公權主簿方立道先生公權方公權字立道學有淵源尤粹於理以父澄孫廕補將仕郎擢咸淳元年第歷廣州教授太常主簿以歸有氣節宋亡不仕人稱石巖先生著古易義尚書審是司理方景通先生峻方峻字景通廷範之後有名衡者與其弟彬始居白社峻衡之子也天聖八年進士為建安簿景祐初試祕書郎福州司理嘉祐中請老分司南京居家聚徒講學榜所居曰植德堂嘗於舍傍鑿井及泉禱曰願子孫居官清白如此水初峻官潤州識程大中珦及卒伊川先生頤為狀其行又托范祖禹為撰神道碑其見重如此弟嶠子士寧子容元宷士寧字彥昌少聰敏強學時方習尚詩賦士寧推究經史尤工古文詞凡四上鄉書第慶厯六年進士嘗為劍浦有治績三司使蔡襄薦其才從而薦者十餘人官至都官郎中子容字南圭皇祐五年甲科歷守惠州蘇東坡謫惠日相與倡和東坡嘗為點勘六經及書峻神道碑額官終朝請大夫子絢篤學力行好古文辭晚以八行舉辭不就隱於西山草堂門人稱濯錦先生孫蘭輿官教授以致知慎獨教學者莆陽文獻閩書推官方道輔先生元宷方元宷字道輔元祐六年特科出身官終威武軍節度推官少與程伊川先生同逰潤學至老書問不絶家藏伊川手迹十餘紙有比得二書皆有與世背馳求合古聖賢之語足下非混俗之流其志道之士乎願足下精心致志期於至而後已聖人之道坦如大路學者病不得其門耳求入其門不繇經乎今之治經者衆矣誦其言辭解其訓詁無用之糟粕耳覬足下繇經以求道勉之又勉異日見卓爾於前然後不知手之舞之足之蹈之將不加勉而自不能止矣朱文公書帖後云伊川先生德盛言重不輕與人接今觀其眷眷如此則方公之賢可知也孫翥莆陽文獻閩書正字方次雲先生翥方翥字次雲元宷之孫峹之子從莆陽文獻底本幼孤多所通解書過目即貫穿下筆有軼語其從兄略作萬卷樓儲書千二百笥語先生曰次雲才性不出户十年可移吾書入肝膈矣登紹興八年進士調閩清尉到官未一載歸閉户十八年盡讀其書無干進意有旨召對除祕書省正字凡九月以風聞論事聽外補卒於家先生道古非緣章句而終不肯著書有吟寫多出偶然羣處無羈束有寒蟬野鶴蕭然出俗之度初艾軒幼時喜李白石曼卿之為人又喜晉人風度不入俗調先生曰此數人來孔門恐一日著腳不得艾軒遂悟以先生為先聞道兄事焉蓋龜山之學傳之王信伯信伯傳之鹽官施廷先先生與廷先居最久而與林艾軒陸子正友善及歸益與艾軒講明道理以淑後進曽孫耒壬莆陽志南源委道閩書文莆陽獻縣令方耕道先生耒弟禾方耒字耕道莆田人元宷曽孫閩書莆陽志作仲宇曽孫今從莆陽文獻作元宷曽孫少孤苦學其弟于來禾皆自教之家貧奉母典衣不足繼以鬻田兄弟杜門力學已而見文公于建陽乾道二年登第調善化尉歷知潭州攸縣邑有茅將軍祠愚民歲取人子女殺以祭名曰樂神耒始至牒諸保聚藁於祠中遣吏酹以文而焚之其害遂絶復因文公謁張南軒南軒深器之謂其可與共死生同禍福後南軒帥荆南辟耒及遊九言為屬曰是二人者能攻吾過耒感激知己遇事無隱終宣教郎知連江縣禾字耕叟亦登文公之門文公告以改過修己之方莫切於論語弟子入則孝一章禾佩服之考亭淵源録獻閩書莆陽文主簿方若水先生壬方壬字若水淳熙中逰太學往謁朱文公以進退之説為請十四年擢第除長泰主簿會文公守漳請壬主學事壬條上講説課試差補等十事文公命屬邑皆倣之會朱子召還出大學章句付壬俾刻示學者明年龍巖有蠻卒殺人獄吏逼同行者誣伏漳浦有僧死於佃而鞫驗者皆曰飲鴆壬皆閲實抵罪文公聞之與壬書曰龍巖之行使無罪者不寃有罪者莫逃此非細事秩滿知寧鄉縣未上卒壬性孝友與弟申始終無間家人議析先世田廬既具草壬流涕不忍視而止孫之泰紹定五年第進士見洪文毅天錫交友縣令方子實先生泳之方泳之初名芹之字子實莆田人元宷曽孫莆陽志亦與文公逰亷介好學不肯俯仰于世登淳熙第教授衡州改知南豐縣撙節浮費抑罷科斂知巴陵縣撫摩甚至縣中稱治閩書志莆陽通判方嚴仲先生之泰方之泰字嚴仲壬之孫莆陽志紹定初進士歷英德府教授用中州法課試陋士變習方大琮為閩漕辟幕府與洪天錫徐明叔號幕中三賢遷知長溪縣以邑前輩楊楫楊復及師儒黃幹並祠汰庠序冗職增弟子員蠲民間取例錢終袁州通判閩書通莆陽志志光祿方次山先生嶠方嶠字次山景祐元年進士初調平陽尉改福州司理𠫭軍遷祕書省著作郎知山陽縣移知循州改祕書丞就遷太常博士知潮州潮與循鄰民熟知其治行不待教而服兩州皆為立祠而潮以配韓愈纍遷屯田員外郎通判淄濰二州權密州撫循有方密人德之故相龎籍學士孫沔交薦可用余靖韓宗彥又舉才行遺逸會遣使寬恤諸路民力乃以嶠使福建嶠詢訪利病條上多見施行英宗即位改職方員外郎通判吉州遷屯田都官郎中守汀州汀虔鹽冦剽劫至悉討平之汀有巡檢與賊戰死部卒懼失主帥并誅遂謀為亂嶠諜知取其首謀三人斬之餘悉奏免所活數百人遷司封郎中改太常寺卿卒與兄峻並贈金紫光祿大夫莆人稱白社二金紫子伯騫仲宇叔完宙縣令方先生仲宇方仲宇嶠之子治平四年進士少頴悟日誦數千言年十二從胡安定學諸生嘗千餘人較藝屢居上列官終知南安縣方立之先生審權方審權字立之嶠之玄孫曽祖宙舉進士除司農丞章惇蔡確蔡京交薦將處以臺閣宙恥之力請外補父銓以詩名有真窖翁集審權少從伯父鎬宦逰江湖所至交其豪傑及歸慨然罷舉業先世積書甚富環所居田若干畝曰吾耕讀于此了一生矣與王邁方蒙仲劉克莊友善平生志業率於詩發之有聽蛙集方伯謨先生士繇方士繇字伯謨莆田人會之曽孫也父豐之工詩士繇少孤依母家邵武吕氏已而徙崇安從文公逰遂棄去舉業直以學古為事薰陶涵養日進髙明不數年遂稱髙弟六經皆通尤長於易聰明絶人而持之以謙厚利祿資産絶不介意其氣貌簡逺涉世若甚疏者至講明治道援古斷今瞭然明白紹熙間文公之門人有至行在者公卿延致惟恐後士繇在逺聞之曰異時必學者禍未幾學禁果作矣又嘗勸文公少著書以文公教人讀集注為未然其憂深思逺多類此云所著有逺菴詩集子豳父一作丕父見黃勉齋學𣲖莆陽文獻閩考亭淵源録書按文公與伯謨書問最多其跋伯謨家藏胡文定公帖在乾道八年壬辰時朱子四十三應是早歲及門者閩中理學淵源考卷九
