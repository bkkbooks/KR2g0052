body:
  text: 閩中理學淵源考卷二十四廣平府知府李清馥撰朱子福寧門人并交友按宋寧宗時黨禁方嚴朱子曽避跡是邦相其山川靈異謂五十年後必有人出能盡讀天下書考其時從學者黃尚質幹楊志仁復林正甫湜此外尚多其選及至末造義豐師氏主盟教席英髦不衰至元代石堂陳氏伯循韓氏輔翼友教者數十年朱門之學賴以不墜公之言於是信而有徵矣朝散郎楊通老先生楫楊楫字通老長溪人剛介不茍合與楊方楊簡俱朱門髙弟號三楊舉淳熙五年進士調莆田尉閩帥程叔達移縣括逃田楫歷疏不便帥大怒楫徐對無所屈罷去漕使林沂曰尉敢格帥大是竒事遂薦之纍官司農寺簿奏劄論進君子退小人勿徇左右之請以重中書之權飭執政之臣可否相濟以任憂時之責奬廉隅之操絶奔競之風除國子博士轉少卿臺臣或干以私答曰臺省紀綱學者規矩當各守職無相侵越尋出知安慶移湖南提刑江西運判終朝散郎嘉定六年卒著有奏議及悅堂文集人稱為悅堂先生閩書考亭淵源録龍圖林正甫先生湜林湜字正甫福寧長溪人紹興三十年進士調富陽尉改知晉江判南劍州太守議官自賣酒湜力爭不可守自為奏朝廷視無通判署疑之守奏遂格除監察御史疏言陛下托股肱於宰執而所授皆小人寄耳目於臺諌而彈擊皆君子治亂之大無過於是為殿試詳定官某士對䇿剴切湜擬第一朝廷不用及侍御史劉光祖下遷湜曰可以行矣再論靜江知府錢之望出為江西轉運判官歷太府司農卿充孝宗遺留使金國通名金以服賜湜湜揮擲之曰宋正統相承服視其品今易左袵有死而已金不能屈復命光宗迎謂曰卿守禮甚堅國體不失韓托胄讐逐正士吕祖儉上書爭之貶嶺外湜見余丞相曰吕子約南行執奏收回大臣責也力請外除湖北轉運副使進直龍圖閣致仕湜性泊淡散朗雖為政精敏遇事立斷而平居但教諸生誦說若不涉世故者於善惡賢不肖明白而又護惜善類世所謂善人君子常欲以一身同其榮悴去留故議論多激發見忌於人是以齟齬廢斥而終不悔朱文公被斥士皆逺嫌湜獨執弟子禮不變未沒前數月猶馳書問疑義著槃隱集按先生與文公平昔相嚮慕在師友之間疑是文公晚嵗因楊通老致書而稟學者觀朱子答書云仰慕髙風固非一日又稱其所學之深所守之正其所蘊蓄蓋已施之朝廷而見於議論之實其推許可想已閩考亭淵源録書直學士黃尚質先生幹黃幹字尚質福寧人師朱子著述甚富餘干饒魯寧德李鑑皆師之所著有梅鑑語五經講義四書紀聞官至直學士教授髙國楹先生松髙松字國楹福寧人少游陳止齊之門又從朱子受學登紹熙元年進士授台州教授啓迪有方一時州縉紳皆出其門故例撰講章據案抗聲讀名曰講書松曰是何所發明耶令更進迭問疑難交發滿意而退士人歡服葉水心銘其墓縣丞進士陳敏仲先生駿子成父陳駿字敏仲寧德人乾道進士為大冶丞遊朱子之門為鄭師孟諸賢所宗號仁齊先生所著有論語孟子筆義義著毛詩筆義未就而卒子成父字美玉能守家學以立誠為本行已皆有法度辛棄疾知福州聞其名羅致賔席著近思録律厯志解默齊集等書龔曇伯先生剡龔剡字曇伯寧德人曽祖允昌有學行嘗著家訓以反身修德為主祖必俞以行稱剡早從朱子學不務口耳晚與同門楊信齊復論辨理氣先後之說甚有造詣有詩文集數卷自號南峰居士閩書通志鄭齊卿先生師孟鄭師孟字齊卿福安人安貧力學六經注疏手自抄録受業文公之門黃直卿妻以女嘗著洪範講義以發明文公皇極辨之藴號存齊先生通志源録閩書考亭淵張潛夫先生泳張泳字潛夫福安人蚤志濂洛之學家居教授多有顯達慶元中僞學禁興大比試天下之言性論有司讀其文驚異為壓場䇿問僞學泳抵排異端力主朱子之傳學者稱墨莊先生著有一得録禮記遺說左氏纂類會粹古今事類二百卷集關洛諸儒語為傳心直指十卷四愚齊類藳道南源委閩書孫和卿先生調孫調字和卿福寧人其學得朱子之傳以排擯佛老推明聖經為本著有䇿府五十卷易詩書解中庸發題共五十卷浩齊稿三卷學者稱龍坡先生林守一先生守道林守道字守一又字艾隱福建福寧人自孩提已嶷然不羣恥與羣兒弄十嵗失怙恃卓有大志刻苦讀書蚤工詩賦年十五即嘆曰破碎非吾學也改學經又嘆曰破碎猶吾前日詩賦也改從晦菴先生遊願聞大道之要裹糧束書至中途聞晦庵訃而返慨然閉户力學精思實踐如及考亭之門焉性剛直每面折人過鄉閭多畏憚不敢為非吟筆天成輒出人意表家貧僅終伏臘而賦佃租特寬不擇美惡燥濕輒槩入鄉父兄以此德之桂發捧鄉書至歡以為積德之報而不知此於先生未足窺毫末也先生遺藳甚多散落不存晚猶嗜易積十年精通卦義至晚尚吟誦不輟子男三人宗旦如坦皆有文名桂發受業晦菴之門人信齊楊公復以繼先志登淳祐丁未進士第黃氏東發撰墓志略閩中理學淵源考卷二十四
