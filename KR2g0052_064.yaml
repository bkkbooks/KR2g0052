body:
  text: 閩中理學淵源考卷六十四廣平府知府李清馥撰惠安張氏家世學派按淨峯張襄惠公家世馥曽考其本末淵源逺矣稽之志乘弗詳而詳公之自述為足徵也公嘗撰鎮海衛記自言先世有學於周翠渠之門而得布衣之言論風旨今集中亦多不詳其事惟撰清介叟集序謂叟别號清介即公曽大父桐廬府君自明初以儒術顯初治禮記復治毛詩其後萍鄉公英德公並以詩學世其家厥後惠安一邑黨孰庠序亦多習於詩學蓋自元末盧希韓先生以詩學起家而公之家學繼之其振興作養殆有所本而然耳公後嗣纍葉登第仕宦並以清謹守其家法兹不具録特述其家世淵源所自云縣丞張敏實先生茂張茂字敏實惠安人茂自少莊重舉動如老成人遊邑庠初治小戴禮辨析考證具有成説復專治毛詩本經標傳參諸儒議論而精去取之能得其肯綮視禮記有過無不及焉常以二經教授學徒天順壬午應貢入內廷辭教職不就卒業太學成化二十一年謁選桐廬縣丞初抵任自為文誓告城隍述所以居官之意慷慨激烈聞者悚然在官嚴謹常以興學作人明教化敦禮讓為務民有訟至庭先以禮義諭之俟其不服然後斷之以刑民俗服從時有猛虎白額當晝噬人茂曰吾豈有苛政而致若是乎即移文告城隍痛自刻責虎自遁去中貴人入閩陵躒沿道州縣民懼以告茂曰吾在此無傷及其至陳義秉法以折之貴人瘖不敢出聲上下交稱其有守巡按荆茂按部至縣聞茂名召之講論經學曰君儒者也奈何屈于此是嵗檄與秋闈得閲外簾文字戊申以年滿六十懇乞致仕遂歸晚年盡斂平生而歸諸芳社緑野之間方且拳拳集古書立家範嘗以文公家禮教家是時丘氏儀節未出茂參據禮經酌以土俗擇其節文易行者著為書子孫至今守之茂為人清介嚴毅修容山立吐音如洪鐘自少至老坐立未嘗跛倚治家嚴整諸子有過一毫不假貸至今聞其風者尚肅然也卒年七十九長子綸縣志張淨峯先生集縣令張仁伯先生綸張綸字仁伯𢎞治五年鄉薦事父孝謹每得父書必拱手正讀珍重寶藏如新平生苦學逹旦不寐無他嗜好先世治詩實傳其家學焉天性孝友篤實與物無競而器宇沉靜人莫測其際容色粹然望之知為巨人長者有弟六人出自三母綸撫愛諸弟均一與人交重信義不茍然諾至朋友死生急難之際尤急周旋雅甘淡泊雖甚貧窘閉門端坐非其人不見世故多所經練自朝廷典章至律令算厯皆留心講究務為有用授萍鄉令未上卒張淨峯先生集縣令張公謹先生慎張慎字公謹亦傳毛詩學𢎞治十七年鄉薦知英德縣至誠惻怛視民之疾苦如疾痛在身思有以振恤之尤以興文教正禮俗為先建龍山書院以祠唐文肅公介前開講堂旁列齋舍擇諸生肄業其中政暇為講論經旨及古人行誼卒于官縣人即龍山書院祠之子嶽峰張淨峯先生集襄惠張淨峰先生嶽學派公之學私淑于蔡文莊友于紫峰次崖而與王文成枘鑿不相入者也時良知之學滿天下而獨公弗是也嘗渡江與陽明論學三日不合退而輯聖學正傳載道集諸編以見志嘗言心該動靜靜其本體也至靜而動之理具焉所謂體用一原也又曰虛靈知覺心也性即心之理也學先識性然後可言盡心若只守箇昭昭虛靈之識而諱言窮理安知無誤人心為道心氣質為天性也又曰程子整齊嚴肅一語最喫緊於此信得及做得是久久自覺心體明淨德性純固發揮事業亦自有餘又曰仁人心也吾夫子論為仁曰視聽言動曰出門使民曰居處執事與人則皆就日用親切處指示下手工夫故曰勿視勿聽勿言勿動曰見賔承祭曰恭曰敬曰忠曰認真如漢法畫一的有依據就此安頓身心行著習察自然非心惰氣日銷月化心存理得而不自知不在别尋一個渾淪之體為可玩弄乃名心學也又編草堂學則首以存養之要繼以動作威儀之節而求端未發以為之本曰心才靜即覺清明學須靜多於動至動而未始不靜庶矣其持論精實切近類此同時如鄭恭介世威林文恪燫皆奏之廟堂評之鄉國謂公與羅文莊皆以實勝者殆確論歟又按耿司馬定力祠記略曰公之學以戒慎立本而不恃知覺以窮理居要而不事籠罩以實踐為歸宿而不侈講論本末次第較然不疑焉襄惠張淨峰先生嶽張嶽字維喬號淨峰惠安人自結髮讀書即慨然以大儒自期少善黃氏鞏每誦鞏警語誠自不妄語始學從求放心來曰此吾終身符也正德八年鄉薦第一時省會皆有中官鎮守舉子例合參謁先生長揖而已十二年第進士與同郡陳琛林希元僦居佛寺閉戶講易一時並以經學名始授官行人武宗寢疾豹房獨宦者侍先生即上疏古天子有疾大臣嘗藥百官輪直起居不宜委之宦寺且上儲宫未備宜防意外之虞中外韙之車駕南巡同諸司疏諫下獄廷杖謫南京國子監學正世宗嗣位復行人吏部欲選為科道官不應丁父憂服闋吏部復欲取選如前又不應升右司副念母老乞便養改南京武選員外復轉祠祭郎中俄承重祖母及母憂居家結草堂於縣之淨峰名山心精舍益讀書其中服闋補主客郎中時世宗方定大禘禮求始祖所自出宰相張璁欲遷合當之先生語侍郎李時曰國姓德祖而上髙皇帝所不能詳也獨以皇初祖設位毋實以人為是璁竟以初議上上不聽令題皇初祖主如先生言璁大駭亟欲致先生以館職先生謝不應出為廣西提學僉事行部柳州軍缺餉大譁城閉五日先生令守城啓門召詰譁者豫餉去尋以計禽首惡置之理十一年入賀聖夀改提學江西又不謁璁謝是時江西人正崇尚王氏學先生約士守程朱書毋得談良知居一年卒用廣西選貢事謫廣東鹽課司提舉轉守廉州先生省禁令減繇役督民種棄地教以桔橰運水堂上無事坐讀書與諸生為師友而廉士皆知學時安南殺其主自立久不貢朝議將討而郡縣之遣使勘狀先生言於總督張經曰逺夷相攻殺無煩出師勞敝中國請留勘使毋前經不可知欽州林希元亦上書請決討莫氏先生貽書止之後條上不可討六事為書貽執政執政得書不能決已毛伯溫來視師先生以撫處之策語伯溫伯溫曰交事屬子矣交人莫登庸亦信向先生會擢浙江提學副使尋轉參政莫福海入欵關言往張廉州安在是欲以恩信撫我何可忘於是參贊毛伯溫馳奏留先生乃改廣東參政為畫所以受降之策甚備登庸乃使其孫福海叩關望闕稽首獻地奏上罷安南為都統司以登庸為都統使詔賜先生銀幣升俸一級尋以征瓊州叛黎功升賜如前塞上多事廷臣交章薦先生伯溫言於朝曰吾於粵得二臣張嶽可南翁萬逹可北也遂擢先生右僉都御史撫治鄖陽旋移巡撫江西特疏稱羅欽順得道學正傳請遣官以時存問貴溪相夏言治生塜分宜相嚴嵩奉賜建第皆飾有司裁抑之其年升右副都御史總督兩廣軍務兼巡撫是為嘉靖二十三年兩廣督撫故饒供億先生素儉不取用又不以通遺權貴檄州縣吏非召不得至轅門至不得手一物入門內明年討封川及馬平諸蠻平之進兵部右侍郎兼僉都御史召為刑部右侍郎以御史徐南金奏留不果行又明年合兵討連山賊賊渠授首蒞鎮四年積年巨冦悉平召入為兵部左侍郎七月受代過家尋升右都御史入掌院事未幾湖廣苗亂初設總督嚴氏以先生當之先生單車入楚熟計苗情至則斬捕略盡纍奏竒功皆為嚴氏所抑宣慰冉元隂為苗主苖平懼誅乃嗾龍許保吳黑苗掠恩州行金嚴世蕃使罷先生華亭執不可止降兵部侍郎已而生擒龍許保而吳黑苗尚匿元所先生劾元發其通賄事世蕃愈怒日傾先生先生不一貶復擒黑苗以獻三省底寧兵部力請召先生嚴氏不可或語先生何不稍屈先生笑指其髮曰種種矣吾昔少年張相屢招不得我一見今入錢買官乎其冬卒於沅州督府喪歸沅人迎哭不絶已敘功復右都御史贈太子少保諡襄惠李氏愷曰先生沉默不茍言笑禮法自將其行事磊落光明當官不計危阻一意為國家讀書不事章句博通墳典語古今人物事貫穿有條理而筆力雄渾新意疊現凡論心性義理一以程朱為宗而遵信傳注為行人時過浙渡江謁王文成講明德親民之旨文成曰明德之功只在親民後人分為兩事非也先生矍然曰戒懼謹獨皆是未與親民時工夫如公言又須立一親民之本以補之乎文成不能屈先生揖而去之歸立學則二十餘條自勵曰居敬窮理蓋聖賢所指以教人者王氏諱窮理任良知安知非指人心為道心認氣質為天性乎其答尚書聶雙江書辨王氏渾淪籠絡之非而欲其逐一體認於孔門求仁之訓知行體用持敬分殊合一之理證據真的使人聽之感悟是時初仕未有宦責志欲著書臯比北靣其徒倡正道於東南逮入廉州值安南之役乃慨然以身當其責故志為所掩嘗論先生四十嵗以前欲為程朱之事以蓋生平四十嵗以後纍膺閫寄馳驅征伐鞠躬盡瘁竟以范韓勳業終焉先生狀貌峭聳髙竒有威撼之如山凡所措注中有一定之見不言而酌於衆論振衣於千仞之岡動不趨時故不為柄臣所喜終先生仕相者張璁嚴嵩夏言皆秉權得勢先生頡頏不為下獨徐文貞階知而交好之當嘉靖朝一時邊臣為自全計饋遺相屬先生獨不通一書故用兵有功常薄其賞微失利輒被譴賴上之明以功名終故瀕險不危卒行其志徐文貞謂先生子曰嚴氏擅政二十年邊督臣不入一錢而身名俱全者惟尊公一人而已生平淡於利欲事親孝友於兄弟好積書囊無餘積不事生産作業既貴猶茹糲衣素如寒士然其至行足式里閭者衆也所著有小山類藁聖學正傳載道集名儒文類更定禮記恭敬大訓惠安志藏於家姪宇編梓以傳弟峯庚戌進士有志行官四川僉事子宓慶逺知府廉正有守寯領鄉薦孫迎萬厯乙未進士明儒學案福建通志淨峯全集明史閩書清源文獻備考前輩事業類有根本淨峰初第在京邸每夕必偕陳紫峰講易一卦凛烈抗疏三黜不移不佞邇過栁謁公像八拜北面事之見柳州有傲色豈非以節邪曽職方偉芳西行漫草淨峰兩任提學所至以道帥諸生不為空言之教其在廣右選貢之法方嚴不貶心以殉時好在江右易簡之説方熾能正辭以禁時誕林大理丞希元見皇明文粹朝議討安南亷州守張嶽獨言用兵之害督府蔡經問嶽曰空言罷兵亡以塞明詔子能保無用兵降莫登庸乎嶽曰欲降之必令納地令貶號令匐伏獻國中圖籍聽上處分夫國體不可褻也督府曰如此能令登庸聽乎嶽曰祗嶽一檄足矣於是督府兵事調度一屬之嶽而嶽具有成畫司馬毛伯溫至嶽以所論列者告之輒當伯溫意伯溫密謂嶽曰交事屬子矣登庸密輸情於嶽嶽初絶而後要之登庸惟命會嶽遷浙江督學尋轉參政登庸復首鼠兩端伯溫經奏乞還嶽廣東登庸密覘曰亷州守安在嶽至登庸乃尺帛束頸候于南關廣西通志嚴相當國賜第名其閣為延恩閣所司請估費公曰千金可乎所司相顧公曰江右民困矣諸君誠畏嚴吾不以纍諸君吾自當之批牘豫千金請益復五百金又請益却之會有行人使江右嚴相附五百金來言上所賜閣費大吾出上所賜金佐之子世蕃乃私囑行人毋發封行人兩傳嚴氏父子意所司疑莫敢決公曰豈有沒其父之善而從其子者以豫主者用之會其大奴將入京乞公批關公謂元相家奴無主命而私請關叱走之世蕃愈怒出惡言有密友告公公曰稜稜寒骨止少馬革裹尸耳它吾自分定毋容念也李文節廷機輯國朝名臣録湖貴苗猖獗初設總督衆顧望莫肯行嚴氏請嶽當之徐宗伯階報嶽曰士君子於禍福雖無所擇然危機在前冥不知避亦不可為智也蓋指嚴氏云嶽言備國大臣雖危無所避也單車入楚出焦太史竑獻徴録征苗一節撫臣有不智之譏宰臣有不必征之辨憶昔見公奏疏大意謂往年以賊討賊故征無功以賞賂賊故撫益亂今日機宜必征之而後撫可定守可固也於是動調軍兵分哨以搗穴開誠以受降元惡則懸重賞以擒之脅從則開生路以散之蓋自公即世繼之者不煩注措而湖貴乂如往之征撫師未退盟未乾而地方已叛今之經略擒其酋散其黨而地方底寧昔處之而愈亂今討之而畢安是非得失較然明甚此可為智者道王職方尚學紉略士大夫有名節易保終節難張襄惠公以兩廣總督召入總大中丞嚴相忌之出公總督湖蜀及討平叛苖猶不內召或勸公稍通書幣公曰吾三十年守吾志今老矣旦暮入地乃舉平生所守而盡棄之惡用內召為哉卒于官見明養定豈不誠大丈夫哉遊海夢談淨峰他事且不論自入楚以來不通京師一帕雖遭訕怒毅然如初其自守之節眼前士大夫真不能到徐文貞階與胡巡按宗憲書見徐本集襄惠公正氣徑節易名未稱士大夫迄今歎惋謂柄臣忌公者實為之黃宗伯鳳翔集公長身玉立隆凖髙顴深目廣顙眉骨稜稜望之嶽聳其德器𢎞毅淵默忠信厚重平居寡言笑天性孝友篤於人倫泉州府志正德以前逆閹肆虐嘉靖中權姦柄政詖行淫辭遊揚其間吾閩若林文安彭惠安林貞肅方簡肅朱都憲欽張襄惠林端簡數君子者不怵于暴行不惑于邪説卓然有立狂瀾砥柱蓋數公謂邪全閩大記輯略公為文章根據義理體尚歐陽卓然成一家言自負正嘉二朝文第一苐不以文士自命也閩書并惠安邑志泰和羅欽順惠安張嶽世稱賢士大夫皆與王守仁同時講學兩人嘗指擊其説蓋守仁以名勝欽順嶽以實勝困知記小山類藳可考也鄭恭介世威奏議贊曰其神凝焉而若有跂想其身飭焉而若有盤桓其文非不能躋歐曾之閫奧而慮其分吾德性學問之功夫其學非不能趨超悟之時流而慮其失吾窮理居敬之籬樊其愛國忠君雖顛沛流離而有所不顧其立身行道遺死生禍福而有以自全秩雖峻夫正卿而時浮沉于散吏身雖列于內臺而終不得一望夫國門信孚裔酋威神苗蠻德完行巨身詘道尊所謂公家之利知無不為鞠躬盡瘁死而後己上世之所謂大臣聖門之所謂君子歟何鏡山喬逺撰像贊藩伯朱于田先生一龍朱一龍字于田惠安人以鄭姓登嘉靖二十九年進士初令溧陽以經術為政纍薦治行第一入覲徒手謁嚴氏父子遷南刑部郎中升廣西僉事作撫夷通論𠞰冦有功遷廣東參議時柘林叛兵突薄會城下藩臬官分門守禦拒避賊者不納一龍守小南門曰賊近而啓扄以待示強民急而開門以納示仁閉之何為傳令大開門日入男婦以萬計以此存活數萬遷按察副使丁艱歸隆慶元年復除廣西分部右江右江諸蠻自張嶽征𠞰後久已帖服至是復叛出劫一龍登鎮粵樓酹酒襄惠祠下謂不能滅此朝食如師承何即白制府建大征雕𠞰二策分兵四出因巢為糧擒斬八百餘級又委征右田七哨皆平之捷聞賜金幣晉秩且將大用為憾者所阻遷陜西苑馬卿丁內艱歸先在右江東行過飛來寺遇風舟覆浮沉浪中三十餘里乃得蜒船援出傍人見其青蛇繞身云服除補遼東轉江西左布政以直忤巡撫被劾歸一龍少受學張襄惠嶽東官寡交接慎取與不肯濡足權門皆服膺襄惠之教退居林下著書考義無少休廢邑人稱先正者皆歸焉著有一統輿圖略敡厯餘藳遊海夢談舊郡志新郡志參議張莊甫先生冕張冕字莊甫晉江人元璽之姪為兒時即知嚮慕善嘗讀張淨峰所作羅一峰書院記推本於不欲不為為得其本心輒嘆曰此正學也嘉靖十九年登鄉薦念父老所給坊金悉治具供養不詣公車二十六年成進士知烏程縣躬履清素平賦均役吏不能欺聽斷情偽立得值倭冦傍邑冕修城垣募民兵分技習之訓練既久兵氣大振會倭賊犯北新關設伏桑柯林邀擊之擒斬無數又躡戰于鶯脰湖敗之丙辰夏以兵千五百人敗賊衆萬餘于烏鎮備兵使者慮城守單弱檄冕還冕曰戰即守也蓋分兵捕斬其出掠者賊留四日遁去湖州人盡頌其功為權貴所嫉遷桂林府二劇賊張璉焚劫廣東朝廷以冕有偉略擢廣東兵備僉事至不三月連縳潮陽惠安二酋搗其巢總督張臬檄冕兼二哨攻璉破其丁坑營璉遂敗癸亥倭圍潮冕引兵入守賊百計力攻冕隨機應之所當無不摧折閲五十餘日有姦人謀應賊為鄰居首發按實立誅之賊旋遁去潮人謂百萬生靈藉冕全活擢湖廣參議前忌者遂以擅殺劾冕落職知化州兩廣冦發復自化州薦為廣西撫夷僉事駐節桂林明賞罰肅部伍編甲授藝令關自為守終任不復有賊警遷廣西參議分巡右江尋報罷冕通籍二十餘年名節自砥視權門若凂視汙吏如仇所至養老存孤設木鐸行鄉飲酒禮凡古人教民之具皆實意推行之考功注冕一介不取百折不回司空劉麟每貽書必稱孝亷目為鐵漢蓋生平仰止淨峰故其行事亦略與相類居家不踐公門而遇災警祈籲有司如身癢痛泉屢被倭田荒米貴先在粵時勸諭商人運粟踵至泉賴以蘇共勒碑通衢紀德焉孫穰登河南鄉薦舊郡志新郡志閩書副使李抑齋先生愷李愷字克諧號抑齋惠安人宋太師邴之後嘉靖十一年進士授番禺令入為吏部主事以稽勳調武部郎出為湖廣按察副使愷治畨禺廉有材名上官委掣夷稅安靜不涅夷酋歡呼奉千金為夀愷却還之既晉銓曹杜私謁植善類時周户部天佐上疏被廷杖斃獄中尸出愷悲壯揮淚出資而殮之憲楚六月罷歸愷性倜儻扶義嘉靖三十七年倭陷福清乘勝直走惠安令方有違言閉閣不出署邑者移庫獄於郡城愷率士民跪泣擁令出登陴誓衆親立矢石禦賊七晝夜更為行金以攜其黨會郡中援兵至賊乃解去惠人德之愷沒邑送葬者千餘人愷少以豪傑自命每讀古忠義傳感慨欷歔如將從之既貴無所紛華獨葬親繕祠置田供祀則不辭費自諸生時即貧甚氣嶽嶽不下人嘗曰今卿大夫亢不下士士當以清風明月遲日紅花勝之所論著蒼然有西京氣骨有介山集行世其贈徐履素分教遂昌序略曰今上壬寅鄉先生徐履素計偕至京明年夏五月司教遂昌介山李氏愷贈以言曰履素君古之經師也經之不明於天下久矣國朝懲唐宋之敝特罷詩賦専用經義成祖繼統命集儒臣開局纂修五經四子不用古疏箋翼以濂洛關閩諸説學校選舉之實皆以明經不背傳注為主及行之既久入耳浹心經生學士老師宿儒爭辨橫議死守不二其所沈潛訂證者豈但宏旨微詞乎朱晦翁平生勤苦精髓在學庸語孟自謂無遺憾者在詩與易解詩先為箋注多用毛氏後言樂歌正意略增減一二字咏嘆之其味深長躍然以興假使卜商曽申根牟子而今生也亦不能為異同孝廟以前士人一意本領之學科目人才皆敦厚正直寧執滯而少浮華服習其藝因以約束其身書云歸其有極是矣後來倡為一切道學之名動欲體驗未發之中而不及於明審篤慎之教其流幾以六經為龎贅傳注為芻狗排新安為支離取鵝湖為超卓肆其竒變紛然雜出其下飾以雕繪搆以軋茁畔經失傳不識注中何解或問何辨主者且眩惑無以勸沮風俗下矣惠安小邑也介於莆泉衣冠禮樂之澤不絶如線惟毛詩一派近執其藝以歌鹿鳴刋文以獻者恆不乏人後生秀士得魚忘筌以為聰明體裁之效愚謂前輩曽林徐謝四君子講義訓詁功實倍之林謝之門愷幸竊其緒餘徐氏之門鄉人顯者多濡其化曽體元氏之學雖淨峰公詔自父師一變至道少年亦麗澤其間豫嘗見履素與吾二師友也發憤鑽研餐寢俱廢集注大全猶日用飲食然其所操行修辭一詭於經則惕然曰非孔朱法也今晦於時老將至矣自關雎以至殷武問之皆能舉其辭隨大小叩之咸得其益遂昌幸獲聆其謦咳辨難問疑其所成就不亦休與伏生九十嵗背尚書二十九篇口授之掌故鼂錯董仲舒以春秋為博士災異郊禘盡據經以答漢時顓門之學貫徹精熟言行以之故漢治最近古今日一道德之制胡為改其舊乎豫嘗有感於履素之不遇而因有感於世變也於是乎贈舊郡志源文獻清給諫史中裕先生于光學派余讀越章録載史公與古愚趙先生珤列傳同論蓋二公德學大抵相同也趙公成化初登第為虛齋前輩亦當時開風教之先者惜乎門徒莫考余於一峯交友中詳之矣公與淨峰為同年友其殁也淨峰祭之文曰先生氣寂而顓貌和而肅言不妄發行必擇義其思湛靜而不浮其守確實而不二至于談理必究指歸論事必引大體責人不録瑕疵固有道者也今觀其廷議大禮侃侃直言引證禮經確有依據一時明禮者韙之非有道而執德不回者能之乎王氏遵巖嘗言正德丁丑榜得士吾泉最有名紫峯陳公淨峰張公次崖林公及先生四人並以經學為海內巨工云所著有易説四書説正蒙解諸篇已散佚惜哉給諫史中裕先生于光史于光字中裕晉江人正德十二年進士選為庶吉士讀中祕書于光少甚貧而有志操恬於榮利當鄉舉時二親已殁嘆曰仕不逮親又奚亟為遂不赴公車三載郡大夫勸駕乃起即以是年登第在中祕未幾疏疾歸益閉户讀書謝絶外事有終焉之志凡五載親知勸之乃出受吏科給事中尋又乞歸屏居復四載蓋通籍者十年什九居家其真在給舍者可二年耳然任職侃侃自稱凡五上疏論事剴切動京師人爭傳之世宗以藩邸入承大統意欲考獻皇未決進士張璁進説上心嚮焉是時禮官議上獻皇稱號之禮上久持未下于光乃上疏曰邇者禮臣議上興獻王稱號候命至今未蒙俞允羣臣惑之陛下聖明豈復如此重思未決是張璁之説中也夫正統私親天秩之禮萬世不可易也璁之言曰羣臣盡拘執成説不可用也是謂禮之出於天者不必執矣然則欲人何執哉且立後之説死生無二寧有預養則當為後非預養則不當為後而妄謂今日典禮與漢哀帝宋英宗不同臣不知璁之言出何典記也即宋程頥有長子不得為人後之説又獨不曰禮無明言乎夫武宗以所承孝宗之大統特付之陛下此為天下得人之意天下之大公也陛下以興獻王長子不得已而入承大統此順天應人之心天下之大順也以兹典禮實出尋常擬議之外而猥稱臣民宗子之法謂長子不得為人後不亦拘乎其曰統與嗣不同非必父死子立者亦非通論夫嗣正所以嗣其統也漢孝宣承昭帝之後時於父行無所承之君理宜以兄孫繼孝文承惠帝之後以弟無後兄之誼故上而繼髙祖陛下今承武宗亦以弟不後兄而嗣孝廟則正與漢文嗣統相類也安得藉彼祖孫之禮而奪今日父子之禮乎又欲陛下别立興獻王廟于京師大小二宗並事此決不可昔魯宫災孔子聞之曰其桓僖乎以其非正也若獻廟果立在今日則坐朱熹兩廟爭較之嫌在他日則有春秋魯僖躋閔之失又况人情所注此重則彼輕大宗之與小宗必不兩存之重也夫孝宗皇帝深仁厚澤洽于天下天下臣民哀慕至今武宗不祿陛下入嗣雖販夫走卒無不鼓舞歡呼舉手加額謂吾皇有子矣何者誠仁結於心而天理之不可滅也璁乃昌言曰孝廟之嗣其不可延天也公然廢絶稱天以臨之賊仁棄誼非人理不可讀昔漢光武身復漢祀猶然上繼元帝所生之親止曰南頓君立廟巨鹿但其稱考猶有遺憾今陛下以親則孝宗猶子也與光武之疏逺不同以位則親承武宗全盛之業也與光武之收拾棼亂不同而璁欲陛下特考獻王立廟京師若與光武相提而論又有得失矣惟陛下嚴大宗之事察正統之承仰欽孝廟在天之心亟下前疏昭示天下毋為憸佞所惑奏入中外韙焉他論建多類此曽一分較禮闈稱得士以夕郎終性厭紛囂自適恬寂未嘗一造請有司屬修郡志必斷之典型不輕徇貴人指間居教授生徒以書義相劘切當有得夜榻寒燈欣欣然忘食寢也生計蕭然無異裋褐比沒妻子不免飢寒所著有易經解四書解正蒙解行于世史氏越章録梁宅之撰墓志教諭張子翼先生應星張應星字子翼號菊水同安人應星自幼開敏喜讀書晉江史氏于光以翰林吉士請告還里設教生徒於輪山從學者五十人應星年十五為最少史公課其文獨喜繼又事其邑先輩林氏希元學盡契所蘊蓄嘉靖戊午以貢授會昌訓導揭白鹿洞規教士督學使者徐以德行求士諸廣文入試分授片紙令書無德行之尤者應星獨不書學使怪問之曰諸生性質不齊然皆可自改苛求之恐纍終身學使大喜因試以世變江河詩又與講學諄切數日乃别去都御史周公某以敏而好學清不求知奬之轉清江教諭道卒應星為官懿行修潔俸入外毫髮無所染緇重道輕勢信理信心不談道學而事事依道曰日用天則豈在多言平生孝思切至事兄如父視兄弟子如子與人交無二口善解人過所作詩有二章其一章曰實勝未為恥名勝不恧而良賈戒深藏所貴知者稀務實不務名聖賢是階梯其一章曰公孫儒者為最下猶必強起始發駕古人自重今自輕我亦胡為乎營營所著有四書大略易經管窺易經燈影詩文若干篇藏於家子日益閩書何司徒撰墓志閩中理學淵源考卷六十四
