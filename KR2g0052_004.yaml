body:
  text: 閩中理學淵源考卷四廣平府知府李清馥撰文質羅豫章先生從彥學派嘗考史傳先生從楊文靖公問學既而築室山中絶意仕進終日端坐間謁楊公將樂溪上吟咏而歸恆充然自得又考延平先生屏退山田結茅水竹之間謝絶世故餘四十年簞瓢屢空怡然自適然後知二公安貧守道優遊樂天守孔顔家法私心向往不禁超然寓懷於塵坌之外矣豫章之從學史載年四十餘後相從尚二十年所講貫切磨服膺終身文公嘗言龜山門徒千餘然語其潛思力行任重詣極蓋羅公一人而已其為學大旨嘗令學者於靜坐中看喜怒哀樂未發之謂中未發時作何氣象蓋其所重在涵養操存以身體之以心驗之此非獨楊羅李朱遞傳之學的即程門二先生學的也後世於心性根源隔膜異視本體不明反己功踈故二先生闡發此義羅李遞傳守此尤謹當日程子所謂須靜坐始能收斂者蓋收斂方見本體易言利貞者性情也本義言利貞是收斂歸本體處於此可見性情之實在天道於穆不已者四時不息之運而收斂翕聚為造化生物之本在人身為歸根復命之時伊川程子又恐人鄰於攝心坐禪只管靜去與事物不相交涉故説只用敬不用靜蘇氏季明於師門問答備詳其義朱子於延平沒後與南軒講論中和之旨反復數年始定其説無非此也雖曰靜曰敬義有偏全然其體認大本涵養本源學者求端性善於人生而靜以上之初於靜字似有端的伊川解靜専云不専一則不能直遂正是此意則靜中工夫固是養動之根矣朱子逺宗伊川謂觀未發之説終是少偏亦是救彼時偏重之弊耳竊謂論探索之原而靜之義為切求體用兼備而敬之説為長蓋敬統其全而靜極其本羅李工夫朱子纍述之要之皆並行不悖矣溯厥淵源如顔氏之四勿曾氏之動容貌正顔色孟氏之存夜氣以及周程之主靜定性無非殊條而共貫也嗚呼求道者舍此亦無所用其力矣乾隆丁卯六月十日文質羅豫章先生從彥羅先生諱從彥字仲素先代自豫章徙劍浦世稱為豫章先生祖父皆隱身不仕先生自幼頴悟不為言語文字之學及長嚴毅清苦篤志求道初從審律吳國華逰已而聞楊龜山得伊洛之學遂往從焉初見三日驚汗浹背曰不至是幾枉過一生矣嘗論易至乾九四一爻龜山曰曩日聞伊川説甚善先生遂鬻田走洛見伊川問之所聞亦不外龜山之説於是歸而卒業龜山之門龜山與語云今之學者只為不知為學之方又不知學成要何用此事體大須曽著力來先生受命益力既而築室山中絶意仕進終日端坐間謁龜山將樂溪上吟咏而歸恆充然自得自是摳衣侍席二十餘載初龜山以孟子飢者甘食章令先生思索先生曰飲食必有正味飢渴害之則不得正味而甘之猶學者必有正道不説於小道而適正焉則堯舜人皆可為矣龜山曰此説甚善更於心害上一著猛省則可以入道矣先生服膺此語凡世所嗜好一切禁止故學問日新尤不可及然其晦迹求志人鮮知者沙縣陳默堂淵每詣先生竟日乃還謂人曰自得仲素日聞所未聞奧學清節南州冠冕也先生與默堂亦多往復問辨嘗與書曰承喻聖道甚微有能於後生中得一個半個可以與聞於此庶幾傳者愈廣吾道不孤又何難之不易也某聞尊兄此言尤著意詢訪近有後生李願中者向道甚鋭曾以書求教趨向大抵近正云由是願中執弟子禮從之學時政和六年也其後新安朱喬年官於延亦同門受業焉七年復從龜山於毗陵授學經年盡裒得其書以歸靖康元年遵堯録成厯言宋一祖三宗開基紹述若舜禹遵堯相守一道見王安石用事則痛心疾首紹興二年以特科授惠州博羅縣主簿適州學落成郡守周綰命先生行釋菜禮與諸生等往復論道有洙泗講切氣象吕舍人以詩敘諸廟壁其山居有顔樂齋寄傲軒濯纓亭諸勝每賦詩與默堂諸公相倡和所著有春秋指歸毛詩解中庸語孟説議論要語台衡録二程龜山語録五年卒於官年六十有四朱晦菴曰龜山先生倡道東南士之遊其門者甚衆語其潛思力行任重詣極如羅公者蓋一人而已又語類載道夫言羅先生教學者靜坐中看喜怒哀樂未發謂之中未發時作何氣象李先生以為此意不惟於進學有力兼亦養心之要而遺書云既思則是已發昔嘗疑其與前所舉有礙細思亦甚緊要不可以不考直卿云此問亦甚切但程先生剖析毫釐體用明白羅先生探索本原洞見道體二者皆有大功於世善觀之則亦並行而不相悖矣况羅先生於其靜坐觀之乃其思慮未萌虛靈不昧自有以見其氣象則初不害於未發蘇季明以求字為問則非思慮不可伊川所以力辨其差也先生曰公雖是如此分解羅先生説終恐做病如明道亦説靜坐可以為學上蔡亦言多著靜不妨此説終是小偏才偏便做病道理自有動時自有靜時學者只是敬以直內義以方外見得世間無處不是道理雖至微至小處亦有道理便以道理處之不可專要去靜處求所以伊川謂只用敬不用靜便説得平也是他經厯多故説得恁地正而不偏若以世人紛擾觀之會靜得固好如講學則不可有毫髮之偏也又曰靜坐理會道理自不妨只是討要靜坐則不可又曰存養之功不専在靜坐時須於日用動靜之間無處不下功夫乃無間斷爾按朱子此段與羅李講習之初略有出入真西山嘗言此朱子發明伊川程子主敬之説而不專主於靜云淳祐間賜諡文質明萬厯間從祀孔子廟廷國朝康熙四十五年從學臣沈涵之請賜御書奧學清節四大字匾於祠謹案豫章先生本傳宋史詳矣獨其載政和二年壬辰受學龜山於蕭山年四十一後之綦録斯傳者考證似有未合兹輯此傳從邵氏宏簡録毛氏豫章事實年譜黃氏宋儒學案并龜山集豫章集朱子經義考諸書輯録而重訂焉學案云考龜山丁亥知餘杭壬辰知蕭山相去六年而餘杭所聞已有豫章之問答則其從學非始於蕭山明矣其言豫章之見伊川在見龜山之後伊川卒於丁亥若見龜山始於壬辰則伊川之卒已六年矣又何從見之乎以上所考辨殊有足據獨學案豫章本傳載崇寧初見龜山於將樂余求其所證未得考羅氏革跋豫章師説云族兄仲素從龜山遊摳衣二十餘載就豫章授官博羅主簿之嵗溯上二十九載當在崇寧三年甲申按是年以後龜山皆赴官非在家也所云見龜山於將樂者此則未合再考龜山年譜辛巳春沙陽陳默堂淵投書問學以默堂跋師説考之自云與豫章定交幾四十年以豫章卒官之歲溯至默堂投書問學之年有三十五年亦幾四十年矣又考龜山年譜自元符二年己卯歸家三年庚辰講學於含雲寺作勉學詩以示諸生中有學成要何用奔走利名場之戒與語録訓豫章語云今之學者只為不知為學之方又不知學成要何用之説語意相坰越一年辛巳即屬陳氏淵問學之歲意彼時龜山學成道尊羣從蔚萃較其時考其地似有足徵蓋自紹聖四年伊川先生以黨論送涪州編管越兩年龜山歸自瀏陽抵家正值洛學黨禁之餘傳中所謂杜門纍年沉浸經書推廣師説者此其時也其指示學者大本所在以身體之以心驗之即其指缺也至其髙弟默堂陳氏淵投書問學亦適及講學是年之上下默堂所言訂交於先生者未始不於此相邂逅也於乎四賢一脈轉相嬗承其所維繫誠一縷千鈞之重斯文其不在茲乎載籍浸逺考證莫詳今將原稿不敢遽下從學何年與受學何處就前人所考證者重訂其略尚有待於博考者正云乾隆己丑三月望日清馥謹識羅豫章先生文集宣和三年歲在癸丑之中秋朱喬年得尤溪尉常治一室聚羣書宴坐寢休其間後知大學之淵源異端之學無所入於其心自知卞急害道名其室曰韋齋取古人佩韋之義泛觀古人有以物為戒者有以人為戒者所謂佩韋以物為戒者也人之大患在於不知過知過而思自改於是有戒焉非賢者孰能之乎豫始以困掩未能遂志因作航齋陸海中且思古人所以進此道者必有由而然久之乃喟然嘆曰自孟軻氏歿更厯漢唐寥寥千載迄無其人有能自樹立者不過注心於外崇尚世儒之語而已與之遊孔氏之門入於堯舜之道其必不能至矣夫中庸之書世之學者盡心以知性躬行以盡性者也而其始則曰喜怒哀樂之未發謂之中其終則曰夫焉有所倚肫肫其仁淵淵其淵浩浩其天此言何謂也差之毫釐謬以千里故大學之道在知所止而已茍知所止則知學之先後不知所止則於學無自而進矣漆雕開之學曰吾斯之未能信曾點之學曰異乎三子者之撰顔淵之學曰回雖不敏請事斯語矣而孔子悅開與點稱顔回以庶幾蓋許其進也此豫之所嘗自勉者也故以聖賢則莫學而非道以俗學則莫學而非物喬年才髙而智明其剛不屈於俗其學也方進而未艾齋成之明年使人來求記於余余辭以不能則非朋友之義欲蹈襲世儒之語則非吾心故以其嘗所自勉者併書之使人知其在此而不在彼也韋齋記延平先生答晦翁云承録示韋齋記追往念舊令人凄然某中間所舉中庸始終之説元晦以為肫肫其仁淵淵其淵浩浩其天即全體是未發底道理惟聖人盡性能然若如此看即於全體何處不是此氣象第恐無甚氣味耳某竊以謂肫肫其仁以下三句乃是體認到此達天德之效處就喜怒哀樂未發處存養至此氣象儘有地位也略曰五經論其理春秋見之行事春秋聖人之用也龜山常告人曰春秋其事之終與學者先明五經然後學春秋則其用利矣亦以此也政和歲在丁酉余從龜山先生于毗陵授學經年盡裒得其書以歸掇其至當者作春秋指歸春秋指歸序議論要語聖人無欲君子寡欲衆人多欲橫渠教人且令留意神化二字所存者神便能所過者化私吝盡無即渾是道理即所過自然化矣正者天下之所同好邪者天下之所同惡而聖賢未嘗致憂於其間蓋邪正已明故也至於邪正未明則聖賢憂之觀少正卯言偽而辨行僻而堅孔子則誅之楊墨一則為我一則兼愛孟子則闢之皆邪正未明而惑人者衆此孔孟之所以汲汲教化者朝廷之先務廉恥者士人之美節風俗者天下之大事朝廷有教化則士人有廉恥士人有廉恥則天下有風俗或朝廷不務教化而責士人之廉恥士人不尚廉恥而望風俗之美其可得乎君子在朝則天下必治蓋君子進則常有亂世之言使人主多憂而善心生故天下所以必治小人在朝天下必亂蓋小人進則常有治世之言使人主多樂而怠心生故天下所以必亂朝廷大姦不可容朋友小過不可不容若容大姦必亂天下不容小過必無全人立朝之士當愛君如愛父愛國如愛家愛民如愛子然三者未嘗不相賴也凡人愛君則必愛國愛國則必愛民未有以君為心而不以民為心者故范希文謂居廟堂之上則憂其民處江湖之逺則憂其君諒哉君明君之福臣忠臣之福君明臣忠則朝廷治安得不謂之福乎父慈父之福子孝子之福父慈子孝則家道隆盛得不謂之福乎俗人以富貴為福陋哉名器之貴賤以其人何則授於君子則貴授於小人則賤名器之所貴則君子勇於行道而小人甘於下僚名器之所賤則小人勇於浮競而君子恥於求進以此觀之人主之名器可輕授人哉祖宗法度不可廢德澤不可恃廢法度則變亂之事起恃德澤則驕佚之心生自古德澤最厚莫若唐虞向使子孫可恃則堯舜必傳其子至於法度莫若周家之最明向使子孫世守則厯年至今猶存可也王者富民霸者富國富民三代之世是也富國齊晉是也至漢文帝行王者之道欲富民而告戒不嚴民反至於奢武帝行霸者之道欲富國而費用無節國乃至於耗西漢人才可與適道東漢人才可與立三國人才可與權杜欽谷永可與適道而不可與立故附王氏陳蕃竇武可與立而不可與權故困於宦官至於諸葛孔明然後可與權夫人才至可與權則不可以有加張良近太公之材略諸葛亮近伊伊之出處然良佐髙祖論其時則宜論其德則合亮處三國則才大任小惜哉士之立朝要以正直忠厚為本正直則朝廷無過失忠厚則天下無嗟怨二者不可偏也一於正直而不忠厚則漸入於刻一於忠厚而不正直則流入於懦汲黯正直所以闢張湯之殘刻武帝享國五十五年其臣之賢獨此一人而已武帝反不用其君可知中人之性由於所習見其善則習於為善見其惡則習於為惡習於為善則舉世相率而為善而不知善之為是東漢黨錮之士與夫太學生是也習於為惡則舉世相率而為惡而不知惡之為非五代君臣是也老子曰禍兮福所倚福兮禍所伏指國家而言故晉武平吳何曾知其將亂隋平平陳房喬陳其不久禍福倚伏者其在茲乎人之立身可常行者在德不可常行者在威蓋德則感人也深而百世不忘威則格人也淺而一時所畏然德與威不可偏廢也常使德勝威則不失其為忠厚之士茍威勝德則未免為煆鍊之流觀羊祜與杜預俱守襄陽後人思祜之深而思預之淺者豈祜尚德而預尚威乎石守道採托唐史中女后姦臣宦官事各以其類作三卷目之曰唐鑑而言曰巍巍巨唐女后亂之於前姦臣壞之於中宦官覆之於後考其所論可為萬世鑑惜乎不推其本而言之故人主欲懲三者之患其本不過有二以內則清心以外則知人能清心則女后不能亂之能知人則姦臣不能壞之宦官不能覆之請借明皇一君而論開元能清心矣能知人矣武氏惠妃蕭蒿楊思勉豈能易其志及天寶之際不能清心矣不能知人矣而楊貴妃李林甫髙力士遂亂其心清心知人其人主致治之本歟姦邪之人亂國政李林甫是也庸鄙之士弱國勢張禹是也荀子曰權出於一者強謂權出於一則主勢不分而君道尊矣後世宰相侵君之權而不令終者多如李文饒尚不能免此况李林甫之徒哉為人臣者當視此以為戒人世讀經則師其意讀史則師其迹然讀經以尚書為先讀史以唐書為首蓋尚書論人主善惡為多唐史論朝廷變故最盛詩觀書有感靜處觀心塵不染間中稽古意尤深周誠程敬應粗會奧理休從此外尋自警性地栽培恐易蕪是非理欲謹於初孔顔樂地非難造好讀誠明靜定書示書生知行蹊徑固非艱每在操存養性間此道悟來隨寓見一毫物欲敢相關顔樂齋山染嵐光帶日黃蕭然茅屋枕池塘自知寡與真堪笑賴有顔瓢一味長邀月臺矮作垣墻小作臺時邀明月寫襟懷夜深獨有長庚伴不許庸人取次來延平先生云羅先生山居詩侗記不全今只據追思得録去邀月臺詩云云侗見先生出此語後兩句不甚愜人意嘗妄意云先生可改下兩句不甚渾然先生改云也知鄰鬭非吾事且把行藏付酒杯蓋作此數絶詩正靖康間也勉李願中五首願中以書求道甚力作詩五首以勉其意然借視聽於聾盲未知是否聖道由來自坦夷休迷佛學惑他岐死灰稿木渾無用緣置心官不肯思學道以思為上孟子曰心之官則思書曰思曰睿睿作聖惟狂克念作聖佛法一切反是不聞雞犬閙桑麻仁宅安居是我家耕種情田勤禮義眼前風物任繁華今古乾坤共此身安身須是且安民臨深履薄緣何事祗恐操心近矢人外吾聖人之學申韓佛老皆冇書在決擇也彩筆畫空空不染利刀割水水無痕人心但得如空水與物自然無怨恩吾道當無疑於物權門來往絶行蹤一片間雲過九峯不似在家貧亦好水邊林下養踈慵顔樂亭用陳默堂韻平時仰止在髙山要以亭名樂內顔顛倒一生渾是夢尋思百計不如間心齋肯與塵汚染陋巷寧容俗往還堅守簞瓢心不改恐流乞祭向墦間寄傲軒用陳默堂韻自嗟踽踽復涼涼糊口安能仰四方目送歸鴻心自逺門堪羅雀日偏長家徒四壁樽仍緑侯户千頭橘又黃我醉欲眠卿且去肯陪俗客語羲皇備考金華胡氏翰撰羅文質公集敘曰尚論人物者功業易見學術易知而道德為難顔子之不違仁必孔子而後知之有若之似聖人必曾子而後辨之一時之門弟子非不賢也日與之處也猶不能致察於斯而况庸常之人方之聖賢才智相百十也將探其所藴之精微孰從而得之乎而况世之相去又逺也將極所至之髙妙孰從而得之乎揚子雲曰存則人亡則書將必於其書而知之而得之羅文質公之在宋仕不登於朝化不行於國紹興之未言任斯道之重者必屬之先生焉先生受學於龜山楊文靖公因文靖而見伊川程正公則固及程氏之門矣當是時若李籲之才器謝良佐之力學張繹之髙識尹焞之篤行未嘗不與其進而道南之歎明道獨於龜山發之及論西銘猶不能無疑伊川以理一分殊喻之道之難明也如此先生聞易於龜山與其聞於伊川者無間則固會而為一矣嘗謂漢唐儒者能自樹立不過注心於外與之遊仲尼之門入堯舜之道必不能至此其志為何如哉由是性明行完擴之以廣大體之以仁恕有如李延平之書潛思力行任重詣極有如朱晦菴之言其所造又何如哉李籲輩未聞有以是與之者今欲以其近似而窺測之固學者之所惑也獨不考之先生之遺書乎蓋博古通今務以文章為學者非先生之學也忠信願慤不為非義而自守者非先生之學也二者不同而俱失之先生之學靜而求之喜怒哀樂未發之中擴而極夫肫肫其仁淵淵其淵則達天德之妙矣舉而措之行事施於有政則莫非達道之用矣故先生退而隱居而志常存乎天下遭世多故而義不忘乎朝廷其言類皆切於時弊達於治體其言既足以懲熙寧創殘之失其授受之際又足以啓淳熙理學之正觀是集者雖不能盡知先生因文以求義因迹以求用庶亦得其緒餘乎余喜遂不墜其家學以寡聞陋見論前人之道德其亦過矣仲尼之門顔子交一臂而失之而况其逺者其亦難言矣姑存其大要焉毛氏念恃撰豫章羅先生事實節略曰先生清介絶俗里人知之者尚少惟郡人李願中新安朱喬年聞先生得伊洛之學於龜山之門遂執弟子禮從之遊願中以書謁先生云先生性明而修行全而潔充之以廣大體之以仁恕精深微妙多極其至漢唐諸儒無近似者至於不言而飲人以和與人並立而使人化如春風發物蓋亦莫知其所以然也故讀聖賢之書稍有見識者皆願授經門下以質所疑其願中之所以心服於先生而善為形容與凡從先生學問者終日相對端坐解説文字未嘗一及雜語晚年以特奏中下科授惠州博羅縣主簿或曰博羅尉紹興二年壬子八月上丁延平郡守周綰命之領袖諸生行釋菜禮有洙泗齗齗氣象焉蓋先生之道上得之楊龜山再上則得之河南程夫子一傳而為李延平再傳而為朱紫陽則先生其繼往開來之人哉其山居有顔樂齋寄傲軒邀月臺獨寐軒白雲亭又池畔有亭曰濯纓每自賦詩默堂諸公皆有唱和嘗曰士之立朝要以正直忠厚為本正直則朝廷無過失忠厚則天下無怨嗟又曰朝廷大姦不可容朋友小過不可不容若容大姦必亂天下不容小過則無全人又云教化者朝廷之先務亷耻者士人之美節風俗者天下之大事朝廷有教化則士人有亷耻士人有亷耻則天下有風俗或朝廷不務教化而責士人之亷耻士人不尚亷耻而望風俗之美其可得乎又曰君子在朝則天下必治蓋君子進則常有亂世之言使人主多憂而善心生故天下所以治小人在朝天下必亂蓋小人進則常有治世之言使人主多樂而怠心生故天下所以亂先生之言其體用兼該如此所著詩春秋語孟解説釋例今多不傳其著遵堯録八卷厯言宋之祖宗紹述綱舉目張無漢唐雜霸之未醇君聖臣賢若舜禹遵堯而不變逮乎熙寧之間王安石用事管心鞅法甲倡乙和卒稔禍亂為痛心疾首義激由中言言剴切書成未奏公殁之後七十九年為寧宗嘉定癸酉延平郡守劉允濟上其書於朝乞宣付史館錫諡號至理宗淳祐六年提刑楊棟請諡羅李兩先生七年乃錫諡文質至正三年有沙縣知縣曹道振者輯先生之行實為年譜一卷事雖不詳亦可寓景行之一班焉爾善乎廬陵劉將孫之跋先生遺稿也其文曰學記曰三王之祭川也先河而後海此之謂務本至哉言乎此師友之定論也考亭朱子出延平李氏延平出豫章羅氏今朱氏之書滿天下豫章延平之遺言緒論未有聞者將孫一來延平適兵革之後慨然求之耆舊間久乃得延平問答其詞語渾朴皆當以三隅反者且自謂不能發揮以文又久之得豫章家集所傳者寥寥僅見又非延平比益信二先生之所以上接伊洛而下開考亭者或曰其簡也若是道烏乎傳余作而言曰兹道之所以傳也子曰余欲無言又曰文莫吾猶人也躬行君子則吾未之有得言語之道盛而自得之學隱矣二先生之自得者有不能得於言也其所以傳朱氏者亦不在於言也朱氏之得於二先生者亦有不能言者也而朱氏之所為言之長者其所授者無二朱氏也朱氏之言不得已而言者也而世之求道者往往必求之言也則吾為斯道慨然於此久矣此集鳩集勞矣寶守尤不易正不必他求而附益之先生之所以為先生者不在此蓋嘗拜先生之晬容矣光風霽月玉色金聲劍山青青劍水流清徘徊瞻極何往而不聞金石絲竹之音也是可為善言道南之學者矣是可為善讀豫章先生之集者矣閩中理學淵源考卷四
