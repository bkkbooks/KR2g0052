body:
  text: 閩中理學淵源考卷八十四廣平府知府李清馥撰延平明代諸先生學派延津為楊羅李朱四賢授受講學之區其山川清峭秀蔚仰止者不啻閩邦之岱嶽矣明代希風往哲者如王希白田希古游行簡盧叔忠田德萬諸先生其學術仕跡卓然可考固皆昔時之流風餘緒也今録其著者載於編編修王希白先生暹王暹字希白將樂人洪武丙子舉人永樂中以薦入京修五經大全由興安訓導歷官國子助教學士飭修祭酒而下咸推重之終翰林院編修著聲律發䝉解注道南源委閩書副使田希古先生頊田頊字希古大田人為文簡奧初領鄉薦計偕不赴讀書秬麓後登正德辛巳進士歷官禮部郎中與張治具廖道南王用賓鄭善夫輩以文章相砥及督學湖廣闢濓溪書院規飭諸生先行後文相與講明性命經濟之學所識拔多為名雋遷貴州副使以母年老力疏乞養時年方四十餘而已撫按交薦五上不起母年九十七終頊攀號劈踊有如孺慕家居三十年絶跡城府流賊犯境頊出私資募死士環守賊因以遁邑人德之閩書道南源委教諭吳敬昭先生恭吳恭字敬昭南平人選為翰林庶吉士與纂修宣宗實録以疾告歸久而踰年部文督責有司促行勉强赴部願就教職授餘干諭致仕卒恭篤志向學淡於世務天性孝友家業悉讓二兄有學古文集閩書教授樂廷冠先生文解樂文解字廷冠沙縣人少好學精詣窮理沈思忘日夜以貢授吉安訓導從羅文恭洪先講學洪先與語欣然曰吾老友也檄署廬陵嵗值饑著救荒解上當道行之邑賴不困擢鳳陽縣教諭雷州教授謝病歸日與其從兄應奎酬和以老閩書樂先生如璋樂如璋沙縣廩生禔躬正大以禮義自持篤嗜羣書垂訓後學弟子半出其門有四書翼經說行世延平郡志侍郎游行簡先生居敬子於廣游居敬字行簡南平人嘉靖十一年進士選翰林院庶吉士改授監察御史以澄清自任巡視蘆溝按商人匿稅語侵司農竦然憚之巡按應天劾僞學之聚徒游談騷擾驛傳者捕奸黨王冠置之法出徽州民久滯疑獄劾池州守之倚相勢為墨恣者出為浙江按察僉事核吏治畫民便利禁湖游戢戒壇杭俗為一變擢廣東按察副使湖廣布政參政仍按察浙江纍官左右布政使丁內艱復補浙時倭賊猖獗征調主客兵以數萬計旁午倉卒庫無羡贏百凡皆倚辦居敬居敬處畫無遺一日議者欲練土著汰客兵當關而噪督撫沮喪莫為計居敬挺身前諭數語皆解散丁外艱復補山東晉都察院副都御史巡撫雲南鎮守沐朝弼故恣橫居敬以分義裁之歸其所侵騰越州莊田東川蠻酋阿堂謀篡東川强奪府印擅立作亂奔烏撒致與宣慰安萬銓霑益州土官安九鼎治兵相攻十餘年不解矣至是復侵及羅雄州逼危會城居敬上疏請川貴兵聯誅之有㫖令川貴撫按勘明具奏聞相視莫敢先發居敬又屢招阿堂不服乃出不意督土漢兵進𠞰阿堂窘急自刎死三省遂定而沐朝弼故銜居敬裁抑之言於巡按御史王大任以討堂奉朝命會勘奈何不俟勘得㫖擅興兵者大任遂疏劾居敬坐逮杖繫論戍碣石而前功盡抑穆宗即位赦歸廷臣交章訟居敬召起南刑部右侍郎尋轉左髙新鄭再相欲甘心徐華亭無上事請考察科道官凡見彈劾者一網去之居敬語其所善同官曰君相必不忘華亭暨所嘗抵牾此斤斤耳僕謂君相姑舍是而一心謀宗社異日誦相業孰光大者新鄭聞之恚甚示意於其門生其門生以老論居敬居敬方為三疏上之其一言中貴擅權其一言時宰作威福其一請其鄉之羅豫章李延平從祀孔廟而先上從祀奏新鄭以中㫖摘其奏詞繁稱罰俸三月而居敬遂乞歸越四月卒朝廷遣官諭祭營葬如故事居敬學務實踐身甘茹苦衣粗食糲一席十年漆枕櫛匣尚青襟時物宦途垂四十年諸子僅給衣食鄉評重之其峻德宏猷古風直節一時鮮儷所著有五經旁注可齊文集及延平郡志奏議若干卷子於北於廣居敬滇南被逮時廣方登十六力辨父寃既長從三山王應鍾講學後以太學䕃授太僕纍官戶部郎卒於官鄭先生文端鄭文端永安人幼鬻魚鹽行年三十盡棄所事從師為學精於易生徒日衆永安易學自端啓之通志趙雪航先生弼趙弼字輔之南平人博學多識清潔自好邃於易教授鄉邑學者稱為雪航先生所著有雪航膚見等集今通鑒內雪航趙氏史評即其人也延平郡志縣令朱希純先生成文朱成文字希純南平人嘉靖壬子舉人知於潛嚴禦礦寇時與田一菴王龍溪錢緒山會講天真書院究心理學著讀書會要越閩議略天目劍津會語鐘臺問答續壤瑣吟藝林枝語等集閩書教授林茂實先生應芳林應芳字茂實南平人弱冠扶父柩楚南颶風忽作抱棺溺湖水中俄觸沙畔得留歸葬如禮繇選貢訓溫州遷吉安教諭南安教授解綬歸入仕家居惟以講明道學為己任閩書施先生明施明南平人家貧苦學六經子史悉能通解徐文貞司理于延期以大器領教南康士慶得師及歸後進景從鄉評髙尚閩書縣令徐時傑先生登第徐登第字時傑南平人以嵗薦授學博教士以身心性命之學部使者首薦之擢令容縣清守直行竟掛冠歸閩書教授官思敬先生寅官寅字思敬順昌人嘉靖間應府庠貢天性孝友以道學為己任歷嘉興教授所至教澤及人視平湖篆清介不染及歸杜門課子立祭田睦宗族閩書同知盧叔忠先生應瑜盧應瑜字叔忠順昌人隆慶丁卯舉人知遂溪縣遷潮州同知治河有功掛冠歸養著書闡明格致一貫中和夜氣之㫖道南源委教諭蕭賓竹先生來鳳蕭來鳳字舜儀號賓竹將樂人力學甘貧事李材與語多所契合退謂人曰將樂有舜儀身體力行似可入龜山門者由貢諭饒平學者稱為賓竹先生著有演宗問答雅歌集尚書田德萬先生一俊田一俊字德萬大田人隆慶戊辰舉南宫第一選庶吉士讀中祕書遜心經濟雅以大節自砥庚午授編修尋奉使淮藩不受藩王餽復命充經筵起居官修纍朝實録旋升修撰晉侍讀萬厯丁丑張江陵相奪情輒假㫖杖諫者箝制天下同舍郎趙用賢吳中行二公與焉一俊亟與趙公志臯謀抗疏論救時王公錫爵視院篆則相戒毋纍聖德姑過張所諷勸之於是王公偕志臯及一俊張公位習公孔教詣張所首為杖者解張默不應則奮氣昌言備責以綱常之義且曰天地鬼神其可欺乎天下萬世之口可盡箝乎語峻直甚張憤慙無地顧左右欲引佩刀自裁一俊與諸公大笑拂衣出張大恨於是志臯孔教被逐而一俊與王公錫爵先期告歸亡何張敗起故官同修大明會典然終非所樂數月復引疾歸久之起家以宫寀視留篆攝司成事居二年召修玉牒已擢國子監祭酒飭規條絶貴近關說其序次出入一無所假有一生持刺求進越一俊故召試抑奪之生驁甚寓言譏訕一俊曰吾抗顔為弟子師當為生徒湔滌儻􅛅狀疏上于朝斥為編氓諸士始逡巡間軌己丑擢禮部右侍郎兼侍讀學士旋轉左教習庶吉士諄切不倦時與講求經濟與立朝大節無不人人顧化者以病請未發卒邸舍詔贈尚書諭祭給郵豫葬費一俊恬淡寡慕居恆辨一介然不欲以潔自標歷宦草餘載莫知其貧逮病篤諸門人更直侍卧榻睹所食用率粗糲疏布夫然後知其蕭然寒士也貢士林良章先生鈿賴汝允何升林鈿字良章將樂人萬厯間貢士時宋儒羅豫章李延平二先生未與從祀鈿請於督學熊公尚文行之復刋楊龜山全集著有淡寧集行世時有賴汝允者亦請羅李從祀而龜山先生之祀則自何升請之何賴二公皆鈿同郡人也道南源委董先生台庸董台庸將樂庠生學有心得為先正典型常為其邑令傅宗臯致敬逰李見羅之門歸而與父紹幃先後著禮記說約延平郡志學正張先生居靜體中張體中字居靜南平人性簡淡洽經史繇嵗貢仕香山宣城福寧學正學博行端諸生執經問難者咸與闡明宗㫖及歸蕭然槃澗杜門著述有經講意詩集等刻藏於家郡志祝先生允文祝允文將樂人少業成均數載試輒冠軍積分候選性恬逸不仕好學力行行坐終食口不輟誦老尤篤記詩文居家正冠修儀不妄與人交紛囂不入于耳送客不出户外而禮意誠慤雖鄰人數嵗罕見其面者人以擬之宋陳布衣郡志貢士黃本正先生炳如黃炳如號本正南平人淳篤好學品行卓然守父庭訓孺慕不忘膺嵗薦究程朱之學人士奉為師表郡志鄧仲昭先生斯薦鄧斯薦字仲昭沙縣人年十五補弟子員篤志好學慨然以明道自任邑侯方公延以西席未嘗以私干家徒四壁常自怡然有懸鶉樂道風子可權登乙未進士郡志閩中理學淵源考卷八十四
