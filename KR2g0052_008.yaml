body:
  text: 閩中理學淵源考卷八廣平府知府李清馥撰文節林艾軒先生光朝學𣲖陳正獻公曰閩中洛學之興肇自建劍而莆儒風之盛自紹興以來四五十年崇尚洛學艾軒先生實作成之林公希逸曰自南渡後洛學中微朱張未起以經行倡東南使知聖賢心不在訓詁者自莆南夫子始莆南者艾軒先生也朱子曰這道理易晦而難明某少年過莆見林謙之與方次雲説一種道理説得精神為之踊躍鼓動退而思之至忘寢食後來過莆二公已往無有能繼其學者矣劉後村曰以言語文字行世非先生意也先生乾淳間大儒國人師之文公於當世之學間有異同惟於先生加敬于時朝野語先生不以姓名皆曰艾軒觀此則公之從遊陸公子正淵源程氏之學其時豈特為莆所宗仰哉先生曽與楊次山手札自言與方次雲論晉代人物如寒蟬孤潔不入俗調心甚樂之方云此數人來孔子之門恐一日著腳不定乃悟夫子之門為人物凖的千歲人物要入得此窠樣中乃為無愧耳此又先生與方氏默會孔門親切之訓者也維時莆之宗𣲖發自艾軒其平日師友講習多從事於經術行檢使人知聖賢心不在文字訓詁間也聖學湮廢寥寥千載於孔門德行之科莫能尋討契合而不知其體認於學問根柢淵源未易窺也朱子嘗釋善言德行之説謂所言皆其自已分上事故當時惟顔閔以上從事此工夫自洛閩之學興師弟講切無非此義而一發千古之矇方林二公得程氏緒餘殆窺見此旨歟乾隆辛未四月望後一日書文節林艾軒先生光朝林光朝字謙之莆田人學者稱艾軒先生少有聲場屋再舉禮部不第不復以得失為意聞吳中陸子正學出尹和靖遂往從之自是專心聖賢踐履之學通六經貫百氏出入起居必中規矩歸莆設講於東井紅泉四方來學者無慮數百稱為南夫子蓋先生之學一傳為林亦之再傳為陳藻三傳為林希逸其為教以身為律以道德為權輿不專習詞章為進取計平生未嘗著書其於聖賢微旨有得於師傳者惟口授學者使之心通理解嘗曰道之全體存乎太虛六經既發明之後世注解固已支離若復增加道愈逺矣又曰日用是根株言語文字是注腳學者須求之日用求之不已則察乎天地隆興元年年五十始以進士及第授袁州司户參軍乾道三年龍大淵曽覿以潛邸恩幸進先生與劉朔以名儒薦對頗及二人罪由是改知永福縣而大臣論薦不已召試館職為祕書省正字歷著作郎進國子司業兼太子侍讀九年張説再除簽書樞密院先生不往賀遂以顯謨閣出為廣西提點刑獄淳熙元年移廣東以擊殺茶冦功拜國子祭酒四年孝宗幸國子監命講中庸大稱善面賜金紫除中書舍人兼侍講時吏部郎謝廓然以曽覿薦賜同進士出身除殿中侍御史命從中出先生愕然曰是輕臺諌羞科目也立封還詞頭孝宗度先生必不奉詔改權工部侍郎請外遂以集英殿修撰出知婺州引疾提舉江州興國宫年六十五卒諡文節先生老儒通達世務負士望甚重出使入朝徇義忘私無田宅以遺妻子在後省久未有建明吕東萊私謂所知曰未知此老若為收煞及繳駁謝廓然除命乃喜曰此舉過江後未有也先生既沒朱文公嘗嘆曰某少年過莆見林謙之方次雲説得道理極精細為之踴躍鼓動退而思之至忘寢食後來再過則二公已沒更無一人能繼其學者矣陳正獻公曰莆儒風特盛自紹興以來四五十年士始知洛學而以行義修飭聞於鄉里者艾軒實作成之也有集二十卷陳氏宓謂其森嚴奧美上參經訓下視騷辭劉氏克莊亦謂髙處迫檀弓穀梁平處與韓並驅林氏俊曰艾軒不獨道學倡莆詩亦莆之祖用字命意無及者後付雖工其深厚未至也按先生嘗師事同郡林霆林公深於象數之學者所著有易論詩書語録中庸解等集莆陽文獻林閩書集朱子語類貞肅文略與朱編修元晦曰前此數得來書祝耕老有五夫便人去令來取書因循如許言之愧甚去年過黃亭只相隔得三二日所欲道者亦何數唯耿耿比承除書之下此在公論以為太遲不知賢者出處自有時直道之信善類增氣見教恭而安數語乃是從根株上説過來别後對此如一對面語但所謂與虞仲達及此一節更記憶不上是日説數件語當不止此耳林用中聞以館舍處之得質正所聞而求所未聞甚善復之到官已三月偶疾唾中有血雜出令人憂懸也與楊次山曰某授徒三十年不過為場屋舉子之習學問一事雖稍涉其涯而所以作語及所以傳授於人唯是一律豈敢輒出場屋繩尺之外也某年近二十未知龜山所遺後來者為何書及隨計走都下此説一歷耳又二三年中乃得之是時有周先生尹先生諄諄然八九十歲人乃文靖公一輩流也王信伯得之於龜山施廷先得之於信伯廷先吾友也廷先每説洞庭之野有一人吾所畏當買舟同一見之不及見此人廷先死矣傷哉廷先每對人道説必為之出涕廷先乃吾亡友方正字次雲之友某以次雲六兄之故遂定交某幼歲聞李太白石曼卿之為人即踴躍道其事又初讀晉書見一樣人物如寒蟬孤潔不入俗調此心甚樂之一日對次雲説古人如此終是不俗六兄云此數人來孔子之門恐一日著腳不定某乃悟夫子之門為人物凖的千歲人物要入得此窠樣中乃為無愧耳詩送别湖北漕李祕監仁甫詩曰文字眇煙雲過眼徒浩浩所有未見書惜哉吾已老子雲客長安陳迹如一掃同叔向來人我生苦不早亦聞青城山斯翁為有道瞿塘不可上秋夢長顛倒白日來西崑一見自應好縱談百代前至境非枯稿多為開口笑明日生懷抱黃鶴有髙樓恍如事幽討攬轡逢道州聽書下下考周南勿留滯掇拾供史藁分手重酸辛璠璵衆所寶十日不得面何為太草草備考陳正獻公俊卿撰艾軒祠堂記略曰淳熙壬寅夏四月永嘉林仲元來守此邦以厚風俗敦教化為本闔郡之士咸造於庭曰莆雖小壘儒風特盛自紹興以來四五十年士始知洛學而以行義修飭聞於鄉里者艾軒先生實作成之也先生學通六經旁貫百代蚤遊上庠已而思親還里開門教授四方之摳衣從學者歲率數百人其取巍科登顯仕者甚衆先生之為教以身為律以道德為權輿不專習詞章為進取計也其出入起居語默問對無非率禮蹈義士者化之間有經行井邑而衣冠肅然有不可犯之色人雖不識望之知其為艾軒弟子也莆之士風豈無所自先生殁已六年人思其矩範願得立為祠宫春秋薦以苾芬以慰邦人之思太守乃擇南城隙地為屋十六楹丹艧一新因謀刻歲月謁記於豫豫於艾軒遊四十年所謂三益之友其可辭乎明貞肅氏俊撰艾軒文選序略曰吾家艾軒先生崛起南服專志聖賢于時遺儒陸子正施廷先嘗學和靖龜山先生特從指授以上紹伊洛之傳窮博而會之要絶意著述東井倡道盡羣俊而朋來之四方年五十始奏名十一轉而至中舍平茶冦講中庸一再為孝宗褒奬坐封還詞頭改工部侍郎以集英修撰知婺州提舉興國宫以卒先生長晦翁一十六歲晦翁商略理道獨先生意合嘉其精細退若有得請質時見於書兑澤南軒於易有所異為晦翁獨與其繳駁新端也東萊曰平生保任此老不負諡文節也君子謂允去今三百五十年祠久圯墓之田易數姓稚弱二孫稀落可念龍坡之為仰止書院馮公行健雷公孟升意也俊偕汝華謀曰先生嘗同晦翁講道以齒則兄以道則友晦翁固道學淵源先生亦道學名𣲖一方而名天下稱南夫子無異詞宜並祀雷喜白之馮暨二暨大巡宣司監司督學議可並祀二先生侍以莆髙弟子而復梓其文以傳云侍講陳英仲先生士楚以下門人陳士楚字英仲莆田人從學林公光朝登乾道八年進士調臨江户曹攝新喻縣政化大洽改秩調侯官丞相周必大薦之以國子監簿召對孝宗奬其誠實紹熙初除宗正丞兼嘉王府直講一日百官已趣班雪大作宰相索表稱賀援筆立就朝士稱嘆青宫開經筵講周書無逸章其解稼穡艱難曰百穀麗於土荄萌既敷方有實三農力於田莠草既除方有秋以諷小人妨君子之意夀皇傳諭曰陳直講説書議論精詳理致深奧得師儒之道除右侍郎右史退葺御書閣扁陽春堂揖壺樓觀稼亭皆宸筆揮灑慶元改元除侍講林希逸守莆祠艾軒綱山樂軒于穀城山後人以士楚侑饗云莆陽文獻閩書主簿黃季野先生芻黃芻字季野莆田人少從林艾軒學志行髙古自劉夙劉朔林亦之而下皆推讓焉登紹興二十一年進士第調懷安簿未上卒二劉葬之表其墓莆陽文獻閩書推官卓進之先生先卓先字進之莆田人少從林艾軒學年十五拔鄉解紹興四年年四十以特科調龍溪主簿歲旱疫多所全活纍遷建寧軍節度推官歲亢旱松溪政和建陽浦城四邑仰食下流客米府禁米舟出城先爭曰四邑非建民耶平生居官亷靜言論據經與人寡合陳宓鄭爚許與特甚而傅伯成尤敬重之族孫得慶莆陽文獻閩書魏天隨先生几魏几字天隨福清人從林艾軒以克己復禮問艾軒曰五湖明月因以頴悟賦丹霞夾明月有半白在梨花之句人以半白梨花郎目之其昆仲有雪堂天遊亦名士也閩書志三山郡林載德先生阿盥林阿盥字載德福清人林髙諸孫也從林艾軒學苦六經無所入至欲投江死艾軒稱之謂魚鹽中膠鬲閩書三山郡志陳先生叔盥陳叔盥福清人少從林艾軒講學出揖客而容頳艾軒曰心不負人面無頳容叔盥悟而自克遂以行誼名閩書郡三山志傅景初先生蒙傅蒙字景初仙逰人少從林艾軒學工詞賦兼五經孝宗朝嘗上萬言書退而講學龍池以淑後進閩書志仙逰邑教授林恭之先生肅林肅字恭之仙逰人淳熙三年進士少有文名與傅蒙逰林艾軒之門試教官科授臨安教授卒仙逰邑志閩書提舉楊似之先生興宗楊興宗字似之長溪人祖惇禮字穆仲興宗少師事鄭夾漈後執經林謙之之門登紹興三十年進士調鉛山簿孝宗登極上封事末陳以守為攻之䇿時相湯思退主和議使人要曰若登對無立異當以美職相處郤之纍書抵東府力爭孝宗嘉其志除武學博士丞相陳俊卿舉充館職條對時弊歷遷校書郎與林謙之同校文省殿擢鄭僑蔡幼學陳傅良時稱得人修四朝會要歷遷司勳郎論張説不當與趙汝愚同拜不報又駁楊和王存中封爵太優忤時相虞允文乞祠出守處州大有政聲除知溫州改嚴州終湖廣提舉著有自觀文集閩書林先生恂如林恂如莆田人少從林艾軒學嘗傾資殫力修築木蘭坡之南岸堤祖國鈞建紅泉學延族子艾軒為師焉閩書判官林井伯先生成季以下家學林成季字井伯艾軒從子有學行從朱子遊朱子深器重之所與筆札甚多趙忠定禮為上客每事必咨仕興國軍判官莆陽文獻備考劉後村跋趙忠定公朱文公與林井伯帖某為童子時受教於先友井伯林丈初筮主靖安簿辱授印焉卷中諸帖昔皆嘗見後三十餘年復從君保陳君見之蓋先友冡上之木已拱而其家亦益落矣感今念昔不勝悲慨當乾淳間艾軒先生與忠定相君同館井伯丈以艾軒猶子為忠定上客所交皆當世名人而於朱張吕三君子尤厚忠定帖雖家事瑣碎亦謀焉文公帖如黨論之興大愚之貶衡陽之薨皆當時大變故士大夫掩耳不敢聞公獨諄諄然赴告於井伯丈一太學生未脫韋布而隱然任世道之隆替受諸老之付囑可不謂賢哉初餘干縣尹有憾於忠定謫命下祖昔人憾萊公元城故智張皇特甚井伯丈適在吳中先馳書以報忠定賴以自安嗚呼使遇良史筆之豈減於陳仲弓郭有道耶漕舉吳省齋先生澥以下交友吳澥字清臣龍溪人兩請鄉舉有聲又請漕舉及同文館舉澥著述甚富援筆立成皆極精妙與陳知柔林光朝諸公為莫逆交知柔嘗擊節稱賞謂其貌古心古學古文古三山林子晦亦嘆其為天下竒才學者師之稱省齋先生有省齋集行世道南源委閩書縣令陳元矩先生昭度陳昭度字元矩興化人紹興五年進士第為尤溪主簿部使者檄令捃托屬吏細過昭度憮然拂衣去間居讀書著文十餘年不出與鄉大夫林迪為忘年友艾軒林光朝次雲方翥正字劉夙兄弟皆嘗至其家登堂拜母誼均兄弟既而教授藤州藤地鄙逺俗尚庳陋昭度勵士以致知謹獨之學由是士競於學知所指歸改知長樂縣未上卒昭度淵源濓洛為文得古法簡嚴間淡理致深逺艾軒志其墓謂不緣師授視橫渠為同時獨曉者莆陽文獻閩書鄭夾漈先生樵鄭樵字漁仲興化人父國器太學生嘗鬻已田築蘇洋陂人食其德沒於姑蘇樵年十六徒步歸葬自是謝絶人事結廬越王山下閉户誦習卜築草堂夾漈居之久之出逰名山大川搜竒訪古遇藏書家必留借讀夜則仰觀星象寒暑寢食為之都忘一時名人如李綱趙鼎張浚皆器重之初為小學經旨禮樂文字天文地理蟲魚草木方書之學皆有論辨紹興十九年上書曰草萊臣鄭樵昧死百拜獻書皇帝陛下臣本山林之人入山結茅欲讀古今之書通百家之學討六藝之文而為羽翼忽忽三十年著述之功百不償一不圖晚景獲見太平松筠之節不改歲寒葵藿之心難忘日下恭惟陛下留心聖學篤志斯文擢用儒臣典司東觀內外之藏治有條理百代之典燦然可觀臣伏觀祕書省歲歲求書之勤臣雖身在草萊亦欲及時效兹尺寸謹繕寫十六部百四十卷恭詣簡院投進其餘卷帙稍多望賜睿旨許臣料理餘續當上進得展盡底藴詔以其書藏祕府歸而益厲所學從者二百餘人尋喪母哀毁廬墓部使者舉孝亷者三舉遺逸者二皆不就二十七年以侍講王綸賀允中薦應召明年上殿奏言臣處山林三十餘年修書五十種皆已就其未成者臣取歷代之籍始三皇卒五季彚緝為一名曰通志體參馬遷法則稍異謹托其要覽十二編名曰修史大例先上之帝曰聞卿名久矣敷陳古學自成一家何相見之晚耶授右迪功郎禮兵部架閣為御史葉義問所劾力乞還山改監南嶽還家論著閲四年通志就詣闕請上會髙宗幸建康命為樞密院編修官尋兼攝簡詳諸房文字因求入祕書省翻閲典籍詔許於三館假書觀之陸務觀以為一時快事又坐言者寢及駕歸繳進通志而樵卒時年五十九矣生平枯淡好施居鄉纍歲不一詣守令筆札雖詔從官給未嘗取也見人寸善推譽如有不及有來質問者為之顛倒數於當路薦林光朝林彖學者稱夾漈先生詩文有溪西集五十卷莆陽文獻閩書州守蔣元肅先生雍蔣雍字元肅仙逰人少博學強記下筆輒數千言曲盡其妙鄉先輩宋藻舉經傳扣雍隨問隨答每以南方夫子稱之設席郡庠户履常滿與林光朝同時十人俱知名號莆陽十先生登紹興二十一年進士教授泉州守王十朋見其文大加賞識雍因作夢仙賦以獻十朋曰長卿大人太白大鵬之比也又撰時政十議十朋嘆曰此經世之文矣後知江隂軍再知通州以郡人張次山坐與程明道邵康節同好惡得罪及陳瑩中任德翁嘗遷謫於此合為堂祀之扁曰三賢以厲風俗秩滿入覲首言江東鹽課較之淳熙七年出入之數虧二萬緡主策者方以衍課增秩上矍然曰某人欺朕因訪本末雍口誦指畫應對如響上曰卿材通練合以蒲郡處卿雍拜謝上目其背方面材也將除贑州為宰執所沮退居朴鄉十餘年凡四請祠以夀終著有朴齋文集子祈從子有秋仙逰邑志閩書徵士方直甫先生秉白方秉白字直甫莆人隱居教授林謙之方次雲劉賔之復之諸名士皆其友也孝宗朝以孝亷薦不起郡守趙彥勵嘗辟修莆陽志有草堂文集閩書州守方先生漸方漸莆田人重和元年進士紹興中判韶州知梅湖南恩歷官朝散郎平生清白無十金之産所至挾書自隨積至數千卷皆手自纂定就寢不解衣林謙之質之答曰夜或有尋討便不懷安為小屋三間以藏其書榜曰富文鄭節仲嘗就讀焉子林鄉貢進士孫其義曽孫應發莆陽縣志文介林綱山先生亦之學𣲖按先生師事艾軒三十餘年莆人推先生嗣講席後先生之學授之陳樂軒藻亦嗣綱山講席林氏希逸創三先生祠奉祀并録其遺文所謂三先生者莆南林公光朝福清林公亦之陳公藻也惜三先生之學至希逸林氏而無傳矣葉文忠公向髙曰王信伯再傳而亦之又再傳而希逸星辰沒矣源流正學溯於前修固皆同為洛學淵源也於乎懿哉文介林綱山先生亦之林亦之字學可閩縣人盛年挾䇿逰四方卒不契去之紅泉謁林艾軒光朝而師之左右三十餘年遂為髙弟艾軒卒莆人推亦之嗣講席艾軒之學一本躬行亦之户外履幾半於師矣或勸其著書答之詩曰講學紅泉不著書只將心學授生徒趙汝愚帥閩辟入東井書堂待以賔禮上其學業於朝命未下卒學者稱綱山先生一曰魚月先生著論語考工記毛詩綱山詩集景定間林希逸追舉其賢贈迪功郎賜諡曰文介子簡字綺伯莆中劉克莊少師之閩書文逺陳樂軒先生藻陳藻字元潔福清人師林亦之得艾軒經學之傳為時通儒遂嗣亦之講席藻家貧篤志於學不求人知入則課妻子耕織出則誘生徒絃誦登山臨水而已學者稱樂軒先生所著有語孟莊子杜詩解并詩集景定間門人林希逸薦其賢贈迪功郎賜諡曰文逺閩書志三山新中書林竹溪先生希逸林希逸字肅翁號鬳齋福清人師事陳藻藻之學出於林亦之亦之出於林光朝其授受逺有源委登端平二年進士為平海軍節度推官以清白稱淳祐中遷祕書省正字入對乞信任給諌又乞早決大計以慰人望理宗皆開納歷翰林權直學士兼崇政殿説書以直祕閣知興化軍下車首詔學者云自南渡後洛學中微朱張未起以經行倡東南使知聖賢心不在訓詁者自莆南夫子始初疑漢儒不達性命洛學不好文辭使知性與天道不在文章外者自福清兩夫子始學者不可不知信從也因立三先生祠祀之併鋟其遺文以傳莆南夫子者林光朝兩夫子者亦之藻也景定四年舉亦之及藻為有道之士又舉林光遇幼承父澤奉親不仕並乞褒崇詔有司為三人樹表書諡並祀之學宫希逸官司農少卿終中書舍人所著有易講春秋正附篇考工記解竹溪稿子泳歷興化倅國子監丞劉克莊序希逸詩宋自光朝三傳至希逸比之于師稿而華矣明代郭萬程曰自道學興辭命多鄙光朝之門獨為斐然閩自楊氏道南蓋光朝可接羅李之宗惜時儒未深知者至希逸而亡傳矣閩書三莆陽文獻山新志朝奉嚴坦叔先生粲嚴粲字坦叔一曰明卿邵武莒溪人精毛氏詩箋注嘗自注詩曰嚴氏詩緝朱文公詩傳多采其説焉邵武郡志按嚴氏粲自序詩緝在理宗淳祐戊申去朱子捐館之歲已四十八年林氏希逸撰嚴氏詩緝序言華谷嚴君坦叔早有詩名江湖間甲辰余抵京以同舍生見時出詩緝語我其説大抵與老艾合遂求全書而讀之今以序詩之年考之亦後於朱子四十餘年嚴氏本傳所言朱子採其説者自邵武郡志如此今讀詩緝中所引用諸説凡朱氏曰者皆文公朱子之説嚴氏採朱子之説而立傳者反謂朱子採其説相沿承誤似無可疑今録原序并林序二篇附後俟考訂者再詳之備考嚴氏粲自序詩緝曰二兒初為周南召南受東萊義誦之不能習余為緝諸家説句析其訓章括其旨使之瞭然易見既而友朋訓其子若弟者競傳寫之困於筆劄胥命鋟之木此書便童習耳詩之興幾千年於此矣古今性情一也人能會孟氏説詩之法涵泳三百篇之性情則悠然見詩人言外之趣毛鄭以下且束之髙閣此書覆瓿可也淳祐戊申夏五月華谷嚴粲序林氏希逸詩緝序曰六經皆厄於傳疏詩為甚我朝歐蘇王劉諸巨儒雖罷落毛鄭舊説爭出新意而得失互有之東萊吕氏始集百家所長極意條理頗見詩人趣味然踈缺渙散要未為全書蓋詩於人學自為一宗筆墨蹊徑或不可尋逐非若他經然其流既為騷為選為唐古律而吾聖人所謂可以興觀羣怨孟子所謂以意逆志者悉付之明經家艾軒林先生嘗曰鄭康成以三禮之學箋傳古詩難與論言外之旨矣艾軒終身不著書遺言間得於前一輩鄉長老客逰二十年未有印此語者華谷嚴君坦叔早有詩名江湖間甲辰余抵京以同舍生見時出詩緝語我其説大抵與老艾合且曰吾用於此有年非敢有以臆決托諸家而求其是要以發昔人優柔溫厚之意而已余既竦然起敬遂就求全書而讀之乃知其鈎貫根葉疏析條緒或會其旨於數章或發其微於一字出入窮其機綜排布截其幅尺辭錯而理意曲而通逆求情性於數千載之上而興寄所在若見其人而得之至於音訓疑似名物異同時代之後前制度之纎悉訂證精密開卷瞭然嗚呼詩於是乎盡之矣易盡於伊川春秋盡於文定中庸大學語孟盡於考亭繼自今吾知此書與並行也然則華谷何以度越諸子若是哉余嘗得其舊藁五七言幽深夭矯意具言外蓋嘗窮諸家閫奧而獨得風雅餘味故能以詩言詩此箋傳所以瞪若乎其後也余曰艾軒惜不見子君曰子又豈容遺艾軒之言故不自揆而為之敘云爾是年十有二月竹溪鬳齋林希逸書閩中理學淵源考卷八
