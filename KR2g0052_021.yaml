body:
  text: 閩中理學淵源考卷二十一廣平府知府李清馥撰朱子漳州門人并交友按閩中自道南以來泉漳學者未甚顯著至清漳又閩之益南矣靖康中髙氏登黃氏碩楊氏汝南皆以名儒直節稱至朱子守郡教化大明風俗一變而北溪東湖諸賢皆以夙學後先摳衣升堂然則斯郡兹時其人文初開之始乎大賢之澤百世其昌雖蒞政僅及一期而遺風餘矩於今猶未艾也尋學脉者能無慨係於兹邦曹郎王東湖先生遇王遇字子合龍溪人父羽儀紹興十二年進士遇間居不逺千里從遊於朱晦菴張南軒吕東萊之門而與廖德明黃幹陳淳友善舉乾道八年進士調臨江教授再調處蘄二州在蘄日與諸生講說漏二十刻猶徘徊學舍注懷安丞閩帥詹體仁鄭僑延諸幕府禆贊甚多丞相趙汝愚聞其賢將擢用之而僞學之禍起矣久之以薦知長樂縣撙節浮費大修水利轉贑州通判薦章交上時韓托胄當國遇不少貶以求合托胄敗召為太學博士未幾除諸王宫教授適毗陵大旱命為之守力講荒政民被實惠浙東大饑詔以提舉浙東常平入對請齊戒以飭躬剛大以進德急聞直言以救闕失樂從公議以扶正道當斷絶斜封墨敕之原常存視民如傷之念至官留心賑濟一如毗陵時除大宗正遷右曹郎中嘉定四年校䇿殿廬事畢而卒年七十遇居官所至介然招之不來撼之不動朱晦菴稱其純篤吕東萊與其篤信嗜學為人務實黃勉齊狀其行稱其學識之精義利之明拔出流俗之表學者稱東湖先生著論孟講義兩漢博義子仲訥以䕃官羅源令通志書漳郡志閩按東湖從文公游在北溪之前文公答書中有云前月末送伯恭至鵝湖陸子夀兄弟來會又云伯恭奉祠已久亦每談志行之美也鵝湖之會在淳熙二年乙未味此札似淳熙二年前後及門者又按東萊於癸巳甲午間與汪公端明書云新臨江教授王遇篤信嗜學為人殊務實願得親謦咳云云又似從游於吕先於朱門矣推察黃習之先生學臯黃學臯字習之龍溪人父珙紹熙中以禮記兩薦於鄉學臯博通經史尤長於詩書春秋文公守漳臯與宋聞禮俱以稚年論講慶元間預鄉薦入試南宫䇿問三舍法弊臯謂愚獨愛伊川請改試為課及制尊賢堂待賔齊與時論不合有司大書曰此必僞學之流黜之嘉定十六年始登第仕番禺簿趙帥師楷每事必資之尤為丞相崔菊坡料院虞衡所器重再轉為鄱陽丞待制李性傳延入郡齊校勘朱文公續語録因薦之調泉州察推需次於家郡守方來屈居學職裒論孟義利數章辨析界限以訓諸生溫陵西墅劉克遜以廉吏科薦之年七十餘丐祠歸手不釋卷所著有評古一冊縣令宋叔履先生聞禮宋聞禮字叔履龍溪人登嘉泰二年進士為敘州教授再調化州知海陽縣有易禮記詩解行世道南源委李堯卿先生唐咨石洪慶施允夀林易簡李唐咨字堯卿龍溪人與貢士州學士石洪慶字子餘林易簡字一之施允夀字伯和皆以旦評推重朱文公守郡日延之於學為諸生楷式載之公牒各有品題云李唐咨林易簡或究索淵微或持循雅飭察其言行久益可觀施允夀石洪慶皆以耆艾之年進學不倦强毅方正衆所嚴憚漳郡志按明周瑛曰四子學行即此牒可考矣若陳北溪文集有祭子餘文朱子語類有子餘語録及朱子文集有堯卿與朱子問答語而一之與伯和僅見於學牒他無考謹掇拾梗概而為此一傳朱先生飛卿朱飛卿龍溪人受學朱門自言窮理而事物紛紜未能灑樂處唯見得富貴果不可求貧賤果不可逃耳大全集載其問答甚多閩書郡志陳退之先生思謙陳思謙字退之龍溪人學問該博教授後學嘗魁鄉薦著春秋三傳會同及列國類編朱文公喜之以語其門人李唐咨以女妻之縣丞楊尹叔先生士訓楊士訓字尹叔漳浦人今詔安父成大鄉貢士早世事母至孝廬墓三年哀毁慘切鬚髮為白訓性醇靜警敏刻厲自持嘗從學於陳景肅及文公守漳置賔賢齊擇士之志學者處之訓年最少預焉稱其學已知方郎中王遇見而異之妻以女所居號盤菴學者不逺數百里從之慶元二年擢進士調古田尉再調海陽丞政尚寬和訟者以禮義曉譬多釋爭而去後遷永福令永福俗險健訓推誠以待之留意學校更定祭器修立壇壝人士多頌其德有曰德量汪乎如不撓之波接人溫乎如可愛之日潛心可質之上帝操行不欺乎暗室諸臺亦以慈祥豈弟聽訟平允薦之會湖廣總領請於朝願得廉靖吏以董軍餉遂差鄂州糧料院荆襄兩路軍儲皆屬焉未踰月卒於官平生好賙人急而自奉甚約囊槖蕭然卒之日無以為斂總帥率所屬周旋其喪以歸葬於官陂之南勉齊黃幹為銘小其根其實不蕃流之長不如其源天命靡常定理則存浚其源毋伐其根不在其身在其子孫弟士謹登嘉定第任博羅尉與士訓同稱七賢云閩中理學淵源考卷二十一
