body:
  text: 閩中理學淵源考卷八十二廣平府知府李清馥撰漳浦蔡氏家世學派縣令蔡丕禮先生大壯蔡大壯字丕禮漳浦人性友愛篤志勵學受業周翠渠之門告以主敬工夫充然有得由舉人任寧鄉知縣開渠灌田履畝均輸撤淫祠禁溺女又重刻翠渠祠山辨教民雜録等書授鄉老以教子弟嘗書居敬二字於衙齊銘曰逺敬君近敬身幽敬鬼神明敬人必至無所不敬庶幾不負吾學不負吾身凡折獄必引經文為斷民以事至邑者必問曰讀書乎則告以講習之法或以貧辭輒勉之以入覲告乞歸所有田宅悉以均諸兄弟著毛詩釋義主事蔡震湖先生宗禹蔡宗禹字寶元漳浦人秉性剛介明敏過人少年讀書但求大意不事鈎索乃父教以因經求道因物求知一日大省萬厯間貢入太學大司成葉臺山稱為天下士屢贈以詩于是聲名藉甚登萬厯辛丑進士司李鎮江甫下車首嚴左道之禁勸諭空門還俗僧僚院宇置役守之以絶士女之往來而緇衣黃冠徑入人家者有罰法令嚴明人莫敢犯惟罪跡未著或已著而情屬可矜者率多平反郡丞某墨而殘欲以其私害人公爭之强致失丞歡丞方攝郡上官檄公使代之丞益恨搆陷萬端遂被劾謫湖州照磨核其事皆烏有未幾丞亦敗彈丞者以螫公為名公得白補授白水令冰蘖自矢園有椿樹葅之以佐食蒼頭短衣不完所得俸錢悉以興校資貧士凡有淫祠悉改為書院而逐其住僧日與諸生談經講道其中講畢必謂曰吾所持以為治者此耳然天下事宜古不宜今者多矣凡諸政令有不便于民者諸生匡我焉嵗饑貧無可賑勸諭諸富室為糜以濟而自賦詩以歌其事富室益樂於為善全活不下萬數事聞升刑部主事以疾乞歸講學於湖西書院終日正容危坐諸生非加冠束帶不敢至前曉集必拜有問必趨退則一揖而别自臨文作字以至灑掃應對莫不循循然有規矩几席之下儼若朝儀四方負笈來者至房舍不能容别結草廬以居公當風清月白時提茗挈果放舟湖上顧謂門弟子曰活潑地何人解得向來到此塵慮盡消不啻如湖泉萬斛洗腸胃也先儒所謂吟風弄月有吾與㸃也之意此時光景殆庶幾乎生平為學以力行為主獨往獨來不儕流俗而婚娶喪葬一遵禮經足跡不至寺觀僧巫術士弗與交談曰磨不磷涅不緇者聖人事也吾輩自揣堅白如何果能磨涅無玷乎吾不能為柳下惠且先學為魯男子或以舉業為道學病者答曰君勿蹈時趨但從程朱講解則舉業即道學矣又曰陳布衣先生有言程朱何嘗不科舉亦以其學居敬窮理而得者以應試而已年七十餘卒先生為人明敏治郡治邑寬嚴並用生平屏絶異學宦跡所經僧道裹足其闢邪崇正之功更不在韓狄下今子孫猶能世守其訓凡吉凶事不仗僧巫尤近世所希覯者宜為有家之法也所著有明誠解程朱要言續毛詩釋史記一家言叢桂軒語録杜詩注釋等書學者稱震湖先生時江右羅公倫浙中豐公熙皆謫戍濱海而同邑薛公士彥亦自雲南布政使致仕歸相與講明正學有鄒魯之風子一橙孝亷蔡廷黃先生一橙蔡一橙字廷黃號伯梁充養和粹雅志經學黎明即起危坐曰此平旦清明之氣也孟子所謂好惡與人相近者正在此時其焉可錯過或告以姚江良知之說則曰世守程朱門戶未便操戈入室也領萬厯丙午鄉薦每公車北上載籍千卷以行其於濓洛關閩之書雖驢背板橋未嘗釋手曰吾敬此如神明庶幾不見不聞中不敢自肆也著四書提㫖詩經會解布衣心圖注與晉江蘇紫溪友善書問辨復甚多子孫各守家學學正楊商泉先生豫學派按商泉先生邑志惟載蔣蘭居葉泰窩為及門之士今附列之學正楊商泉先生豫楊豫别字商泉漳平和睦里人早嵗設教里中人士多從之遊蔣蘭居葉泰窩出其門學者稱為商泉先生以貢仕遂溪教諭升德慶學正邑志貢士葉泰窩先生時新學派按先生郡志列在儒林考本傳以仁讓聞鄉里化之何公九雲贊曰葉君鄉祭酒諸生半在門君乎討性學言行必有藩蓋有道之士也貢士葉泰窩先生時新葉時新字蒼竹漳平人年四十盡焚其少年雜著與陳文溪蔣蘭居講明窮理致知之學應貢不仕仁讓有聞里人化之晚乃隱居教授里中人士多出其門稱為泰窩先生其門人嚴和濟黃佩韋等録其論學要語數十則直可分宋人一席其次陳文溪偕曾五溪游龍亭寺詩曰周旋時事自知閒不落風塵主宰間每泛孤舟觀碧草也憑佳節歷名山吾鄉幸有真朋聚世道應看淑氣還記得當年山寺講乾坤此意破𤣥關漳平志黃先生佩韋黃佩韋傳闕嚴先生和濟嚴和濟漳平人邑庠為葉泰窩髙弟子卓如嚴希立先生卓如嚴卓如字希立漳平人立身端方雖獨處必正衣冠危坐無間寒暑接人處事一出於誠漳平志林先生梅濟林梅濟漳平人為嚴希立髙弟得師門之遺秉心質直制行溫醇膺選後方在强年不復為仕進計家居課讀漳平志運使曾惟馨先生汝檀學派運使曾惟馨先生汝檀曾汝檀字惟馨漳平人以貢入南雍受學于湛甘泉先生嘉靖壬辰舉進士授都察院都事時甘泉為禮部侍郎朝夕親炙及其轉南禮部尚書汝檀亦求改南從之遂遷南戶部員外郎歷禮部郎中擢知撫州府首建陸象山吳草廬吳康齊三賢祠立五經閣教鄉約月朔臨視奬善勸農政暇與諸生講明正學以拂當道意調南寧治如撫州時時甘泉已家居檀往訪焉時安南內亂久不貢廷議屢敕行勘藩臬難其事檀即請行未幾疏乞終養道經嶺南復謁甘泉而歸既釋服起補安慶知府時親藩景王之國道經郡當道議析民居為行宫汝檀移于城東空濶處及王至供億整辦尋升山東鹽運使逾年卒官汝檀資稟厚而信道篤所學淵源於陳白沙刋落支節務窺本源歸家以養親講學為事與諸生論經㫖但遇舊說分析太過處必為渾合使知歸一嘗以中庸戒懼慎獨教人曰中庸揭此獨知為後學開一門路多少緊切譬如種植必有真種子落地然後培植日加暢茂矣於是四方來學者衆乃搆心源精舍為講所所著有心源問辨録及漳平縣志督學姜公寶訪求八閩人物獨推重之祀之鄉賢學者稱廓齊先生同知陳先生九叙陳九叙漳平人萬厯甲戌進士纍官同知有惠政九叙少學曾汝檀之門嘗言學必成其大不在一節取名髙學必成其是不在與人競門户沈古林王東里耿楚侗諸先輩咸許可其學以為正脈著有心源録詩文諸編閩中理學淵源考卷八十二
