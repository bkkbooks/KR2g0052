body:
  text: 閩中理學淵源考卷四十三廣平府知府李清馥撰副使林廷珍先生玭學派按明初學者多屬朱門派緒其傳習説經猶存宋元間諸儒家法三山林氏以易學倡教東南虚齋時弱冠為諸生以僉憲臨江周公虚白命得登其門卒之經學大明為有明一代經師之首海内宗之厥後陳紫峰林次崕蘇紫溪逓衍其緒以易學成一家言於是泉南習易者家絃户誦虚齋嘗言閩中易學獨盛於東南視他經倍蓰葢推本先生倡明之功為多也又虚齋撰公墓志載公以進士侍親家庭昆季七人一門子姓負經術名士林者亦數十人歸休後杜門教子孫讀書告戒使循理安分不得席勢凌物故子弟勤約隠忍無一毫浮艶氣習又曰先生幼穎敏出羣而沉篤嗜學讀書率至夜分又能以身體之以心騐之最得聖賢遺趣其紬繹造言襯貼之義以闡發學者自閩中及江寜两浙之士及門受業者殆不可計數焉今録學派并著其家學載於篇副使林廷珍先生玭林玭字廷珍侯官人天順八年進士甫釋褐以親老乞終養家居十有七年以易學倡教東南從游者屨滿蔡文莊清亦徃師焉既終大事赴京授刑部主事陞浙江按察僉事𢎞治庚戌景寜賊嘯聚剽掠旁及閩中政和浦城諸邑衆議屬玭剿捕玭發屬縣兵分駐要害以精鋭千餘人直臨其穴破之遁入據松溪險隘衆難之玭曰賊勢已蹙攻之必下遂追逐得其渠魁斬戮數百人餘黨尚有散匿山谷者衆請盡殱玭恐濫及無辜出示准其投降又有遂昌黄岩等賊聚衆至萬人聞之膽寒玭又預為形勢疑之皆自解散陞雲南副使憫舊俗獉狉為别名分重禮教風俗一更以年老乞休許之玭行誼政治本自過人而文學復優所至上下翕然歸重其卒也自有位以至鄉民咸痛惜之道南源委閩書督學林廷玉先生瑭林瑭字廷玉侯官人貌古冲晦葆有於無舉於鄉十年不赴後登成化辛丑進士授行人遷御史言慎名器厚國本七事為上所嘉納後出廵雲南言孟宻不當立安撫階亂事出萬學士乖違程尚書依附馬序班受賕鎮守所漁利十汰八九狐䑕薫灌殆盡代者心不樂然敬憚之曰吾閲御史多矣無如林者𠫭將縱麾下私於崖奪印殺人瑭覈實論罪降調數官恭將坐落職閒住安乃者土官子土官坐事死獄中通把利其田言乃謀叛普顯者土官弟嫂氏虞爭官誣以通黒脚夷三千入㓂皆繋獄十餘年被累死者百計土人懼其出則飛語讙呶無敢白者瑭駁曰乃叛從者何人冦何鄉黒脚夷至三千時當有飛報征調事豈得自黙乃顯得安置四川轉督學南畿一時學者相慶得師卒於官人稱之曰林道學南畿以瑭同真西山徳秀列祀學宫閩書陳氏家世學派按陳氏叔剛父仲昌世家榮繡里林黙齋先生甞撰其筠軒記稱仲昌耕讀自樂不求聞知於人四子皆玉立夙成而長叔剛尤頴異再考讀本傳皆講治經學卓然有立故著其家學焉再按叔剛先生傳少從訓導劉氏九疇受春秋從諭徳林誌學古文九疇先生未詳林氏誌已别見不另録云陳仲昌先生週陳週字仲昌閩縣人嗜學問通春秋好為詩所居石潭之上種竹萬箇結亭栖隠甞倚竹而歌曰修竹兮青青中虚兮外直素節兮貞姿寒暑兮一色泠泠風兮朝夕余舎之兮焉適子叔剛叔紹孫煒侍讀陳先生叔剛陳叔剛名棖以字行閩縣人少從訓導劉九疇受春秋永樂十九年舉進士依親讀書從諭徳林誌學古文宣徳初召擢監察御史預修成仁二廟實録遷翰林院修撰篤學勤官守丁母憂廬墓終喪復故職纂修宣廟實録上初御經筵選儒臣充講叔剛與焉後陞侍讀聞父病乞歸省居一年得疾邅父喪疾益甚竟卒年四十七叔剛温雅潔慤出言行事皆有思裁為文亦復如是見人過宻規而疏覆之遇良時飲酒賦詩襟懐洒如也與安福劉忠愍球最善弟叔紹子煒閩書通志副使陳先生叔紹陳叔紹以字行精春秋學少無宦情有司欲以明經辟弗就也劉忠愍雅善叔剛故聞叔紹名以屬督學者令補弟子員時年三十餘矣於是始有仕進意舉正統十年進士選監察御史景泰初朝廷多故臺中建白彈擊皆叔紹率先陞湖廣按察副使卒叔紹有孝行母病甞糞騐差劇叔剛没孤煒甫十嵗叔紹撫成之閩書志通布政陳文耀先生煒陳煒字文耀閩縣人天順四年進士成化初選監察御史出按南畿尋命督北畿學為人操履清正學問該博所至以表名賢正風俗為務在䑓中號敢言錦衣衛門逹者自英廟時恃寵竊權屢興大獄莫誰何煒疏逹諸奸利狀詔投嶺表中外快之南京給事中王徽以疏語稍侵閣臣外遷煒復為申救由是陳御史直聲震朝廷遷江西副使歴按察使晉右布政使江右俗素多訟煒屢折疑獄善為鉤距以得其情然煒雖號明察而用意甚厚惟恐濫時盗越獄有欲罪守卒故縱當死三十七人煒不可逸一盗而死者三十七人非法之平也竟從减論弋陽樂平二邑人爭陂乆不决煒為權其利樂平民得决水溉田萬餘畆而代弋陽輸賦若干二邑便之其知大體周物情多此𩔖尚書彭韶甞稱煒有澄不清撓不濁之量云晉浙江左布政使卒於官越章録閩中理學淵源考卷四十三
