body:
  text: 閩中理學淵源考卷三十五廣平府知府李清馥撰三山郭梅西諸先生學𣲖按元代去宋季未逺其時師資講習此邦淵源回溯尤近今讀郭氏梅西歐陽氏以大陳氏希說陳氏奎甫諸先生傳記述簡册渺無師資源流可考只著其略而已惟時勉齊瓜山正卿子武諸賢相去百年未逺故家文獻之餘豈無一二可推而得其端緒何至傳中援證迄無一辭及之而私淑其一二耶然考傳中四先生師道甚立則彼時傳習之徒亦必多有可紀惜載籍浸湮無從考證耳今録四先生著之篇首存其師範以待他日考訂增入云純德郭梅西先生隚郭隚字德基長樂人父正子號存齊宋紹定中進士教授亷州著春秋傳論十卷隚幼孤弱冠己為人師至元中舉遺逸授泉山書院山長遷興化路教授改吳江州再調興化未行卒學者私諡曰純德先生為人疏通慷慨謹直簡易為子以孝為父以慈與人交彌久而孚談經明白統貫不刻鑿為異於四書易皆有述概詩若文和平而沉深著有梅西集二十卷閩書按福州府選舉志郭正子字飬正紹定五年壬辰進士登徐元杰榜本州解元亷州教授閩書英舊選舉目次載亦同及檢閲朱氏經義考春秋彚載郭氏隚小傳云長樂縣志郭隚字德基宋紹定進士至元中泉山書院山長云云竟遺却父郭正子名字以紹定進士屬之其子矣蓋郭正子宋人也郭隚元人也未知經義考引用時傳寫脫落抑長樂志本屬脫誤因恐讀經義考者不詳郭公隚出處大節謹標出以待考訂者審之乾隆戊子四月上浣清馥謹書歐陽以大先生侊歐陽侊字以大長樂人隱居著述動循禮法學者師焉著四書釋疑五經㫖要性理字辨格物啓蒙忠孝大訓女範幼學等書子潮舉莆田教諭通五經稱五經先生道南源委陳希說先生有霖陳有霖字希說長樂人至正中築鄉約堂於藍田書院之旁中祀先聖以朱吕二先生配朔望舉行藍田鄉約使鄰里子弟講學於中嘗與歐陽侊往來論道尚書貢師泰為作義士記三山新志陳奎甫先生仲文陳仲文字奎甫長樂人隱居山林性嗜學敦孝友與族子潔建書堂于藍橋林壑中以程朱正學倡鄉人課其文行名為義學閩書通志林文敏諸先生學𣲖余讀林氏清源大同書院記知彼時私淑於考亭者深矣傳中載與盧氏琦陳氏旅林氏以順稱閩中文學考諸君子秉道立德師資可藉皆互有發明陳氏旅後從虞公邵菴卒業晚嵗所造殆未可以文士而輕置之也元代紀載不備多失紀録其於潛德之英湮沒多矣故今亦就元史文學隱逸中並採可進於道德者録出如陳氏旅楊氏載鄭氏東起林氏泉生皆不得而闕遺之也兹緝其大略著于篇文敏林清源先生泉生林泉生字清源永福人與盧琦陳旅林以順稱閩中文學天厯庚午進士授福清州同知適山海冦充斥以計殱之轉泉州經歷民負酒稅繫者多瘐死悉破械出之令船商私釀者代償歷漳州推官畬洞相戒勿犯擢知福清州㑹紅巾冦連江帥府檄泉生禦之乃創保甲置屯柵立誅鹽丁謀亂者七人捕殺長樂謀內應者三十餘人先發制之賊遂驚潰福清俗好殺孤幼誣訟求賄泉生立連逮親鄰法民不敢犯除翰林待制以母老辭纍遷行省郎中汀冦負固久不下往招撫得渠帥歸召為翰林直學士知制誥卒諡文敏泉生邃於春秋工詩文多權略有將才屢建武功然以志略自負不能下人以此多得謗者後稍自晦抑署其齊曰謙牧晚益折節更號覺是軒為文宏健雅肆詩豪宕遒逸所著有春秋論斷及覺是集二十卷三山新志聞過齊撰墓志學諭鄭子經先生杓鄭杓字子經永福人宋鄭富曾孫泰定中辟南安學諭與陳旅為文字友嘗著春秋解義覽古編次夾漈餘聲樂府又有衍極五篇衍極記載三篇其書自蒼頡迄䝉古凡古文籀𨽻以極書法之變皆有論定陶鎔歷代之偏駁㑹歸一藝之純粹福建宣撫使齊伯亨採而上之即城東第宅作衍極堂以藏其書吳聘君與弼稱其考論最正宋端儀又謂其書中若九德若正邪若四時餘閏之屬又其所自得者閩書莆陽文獻鍾元長先生耆德鍾耆德字元長閩縣人博極羣書詩文渾雄嚴整家貧不娶授徒養親晚經至正之亂舊業蕩盡恨缺甘㫖親沒哀毁幾滅處二弟順德明德怡怡如也有自省録養正集等書明德清詞懿行與兄齊名閩書林以寧先生清林清字以寧長樂人經明行修泰定間年七十餘屢辟不就賜號梅隱處士又有林清閩縣人宋亡不仕匿跡山寺變姓名能詩孫志見明代學𣲖閩書鄭先生東起鄭東起福清人舊名震龍家居教授常百餘人為文章有氣魄元憲使程巨夫名其集曰自然機籟亦善字書學者多寶愛之閩書教授敖君善先生繼公敖繼公字君善長樂人後寓家吳興築一小樓坐卧其中冬不爐夏不扇出入進止皆有常度日從事經史吳下名士多從之游初仕定成尉以父任當補京官讓於弟尋擢進士對策忤時相遂不仕益精討經學而尤長於三禮嘗以魯髙堂生傳士禮十七篇即今儀禮也生之傳既不存而王肅袁凖陳銓蔡超宗田僧紹諸家注亦未流傳於世鄭康成舊注儀禮疵多醇少學者不察因復刪定取賈疏及先儒之說補其闕文附以己見名曰儀禮集說凡十七卷成宗大德中以浙江平章髙彥敬薦擢信州教授未任卒趙孟俯倪淵皆師事之宏簡録閩書三山志鄭叔起先生震子所南鄭震後更名起字叔起號菊山連江人道學君子早年場屋不遇客京師三十餘年晚為安定和靖二書院山長又開講於平江無錫伏闕論史嵩之淳祐丁未鄭清之再相震登其門罵曰端平敗相何堪再壞天下被執與子女俱下獄京尹趙與籌縱之鄭罷相乃免與林獻齊周伯弱為行輩詩有倦遊藁仇山村選四十首為清雋子所南作家傳云得詩十五篇此蓋流落交遊間者所南未之見也宋詩抄三山志忠義鄭所南字憶翁一名思肖以太學生應博學宏詞㑹元兵南下所南猶叩闕上書元之人爭物色之遂變名曰思肖僑寓吳下時時望臨安舊都野哭若狂終身誓不見朝士有鐵函經藏蘇州承天寺古井中以久旱浚井得一函錮之再重中有書一卷名曰心史其藏書之日為德祐元年明崇禎庚辰始出人異之福州通志州府志蘇藍仲晦先生光藍光字仲晦原江西臨川人受業吳澄與危素為同門友素薦引之適仲謙參政江西辟光從事以功授南安路知事轉閩照磨尋升檢校綜理閩清邑事改行省都事因家於閩後素復為明侍從官薦光光謝病不起深衣幅巾家居教授五十餘載以節終年九十九葬賢沙通志莆陽劉原範諸先生學𣲖余讀原範先生衍極書知考道問學者深矣惟時莆中淵源最正艾軒之遺矩紫陽之流徽正獻忠肅之家學萃集斯土故有元一代授學傳經之儒託跡於斯未易一二數也再方氏伯載出陳忠肅公文龍之門似應附忠肅宋季遺民故不及録云劉原範先生有定劉有定字能靜莆田人其先與夙朔同出元豐進士佖逺孫少貧性剛直不嗜榮進沉潜志學嘗著衍極書五篇又原範吟三十七章司業吳源謂其推闡圖書之祕發揮象畫之妙究極前後體用之所以然一部全易也學者稱原範先生陳浮丘先生紹叔陳紹叔字克甫莆田人幼好學終日危坐一室俯讀仰思嘗為學者講論璣衡遂揉木為儀象以示之既而鑄銅倣古制又别制器象天體虛其中而髹之列周天度數而以鈿螺填之揭南北二極凡天河星宿皆列其名使夜視之與天象合圍四尺五寸有竒名曰小天至於河圖洛書太極通書律厯制度靡不研究有外集百餘卷題曰浮丘集學者稱浮丘先生按黃氏海道南統緒入元儒今從之黃潜岡先生方子黃方子字潜岡莆田人著論語講義按道南源委列之著書目內其事實待考教授顧子元先生長卿顧長卿字子元莆田人以薦歷福州路教授嘗移書助教陳旅責其不作宋遼金三史旅以書示學士虞集曰江南有此秀才大不易得及謁選京師㑹開局修三史長卿即以所自著史藁上中書得辟史局以議不合移疾去通志總管朱原道先生文霆朱文霆字原道莆田人泰定中進士由甌寧縣尹至泉州路總管致仕博學洽聞宋文憲濓稱其文言醇而理彰著有葵山集宏簡録教諭林先生重器林重器莆田人為教諭開明聖賢藴奧循循善誘著四書典要詩經意說見三山流寓三山志林子泉先生以辨弟以順林以辨字子泉莆田人祖應成見宋潘炳學派以辨通易書春秋尤善說詩皇慶中詔以科目取士以辨不茍求進究心程朱之學弟以順字子睦元至治進士纍官同知福州總管府事縣丞方遂初先生德至方德至字遂初宋公權之孫幼能讀先世書長而求諸三古四聖人及宋程朱二氏之經之傳沉潜厭飫豁然以通至正間登第授永嘉丞家貧授徒養親與其婦廖相安羈窮淡苦中後廖雙盲德至永嘉代歸父母堅欲其别娶德至婉辭邑人義之閩書山長林先生善同林善同宋福州守枅四世孫好學工詞賦授泉山書院長元亡不仕明初以賢良官召起以祖母年老辭既復起之行至建州寄所作顧氏義妾詩有有妾猶知遵禮義此身那肯負綱常之句竟死于道閩書閩中理學淵源考卷三十五
