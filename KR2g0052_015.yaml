body:
  text: 閩中理學淵源考卷十五廣平府知府李清馥撰獻靖朱韋齋先生閩中家世學派夫仰蒼鬱者必出於蟠根之大覽溟渤者貴溯乎星宿之初蓋其本源遠也況大賢育英啓秀積厚流光而為往聖繼絶學開太平以衍洙泗之傳者乎考獻靖公自筮仕入閩初任建之政和再任延之尤溪而晦菴夫子生焉夫以蕞爾之土山川靈異鍾為人傑龜山豫章延平不數百里同時同地講道嗣音而又篤生紫陽以集其成豈非千數年間氣所鍾應貞元會合之期哉先公詠武夷精舍詩曰宋家南狩西山西光移婺女開賢聖信乎東遷南渡如同一轍也今謹録其在閩支派著于編乾隆壬申三月上巳日獻靖朱韋齋先生松朱先生諱松字喬年徽之婺源人曾祖振祖絢父森贈承事郎常曰吾家五世積德業儒當有達者先生政和八年同上舍出身登第授迪功郎建州政和縣尉丁外艱服除更調南劍州尤溪縣尉監泉州石井鎮靖康之變先生在尤溪方與同僚燕集忽有以北狩之問來諗者先生聞之震駭投袂而起大慟幾絶自是奔走卑冗假祿養親無仕進意建炎再造王室漂搖紹興初御史胡世將撫諭東南先生因謁見説之曰聞之不取關中中原不可復不取荆淮東南不可保唐惟不失關中故更三亡不失舊物而吳孫氏東攻新城西攻襄漢乃所以保建業其後桓溫劉裕雖能以江漢舟艫西入河渭然既得之而不能守則亦僅足以保東南而已然則天下之大勢可知已今進不能以六師之重通道荆襄赴興元結夏人控引五路東嚮爭中原退又不能移蹕建康北爭荆淮以為固守之計奈何局促一方徒費日月竟將何為世將奇其言歸即以聞于朝會前執政謝克家守泉亦露章薦先生學行不宜滯管庫遂召試館職䇿問中興難易先生乞順人心任賢才正紀綱纍數千言高宗嘉賞除祕書省正字趙忠簡鼎以元樞都督諸路軍馬約先生入幕先生以親疾辭尋丁母憂七年服闋上已進都金陵九月再召對先生因論自古中興之君惟漢之光武勤勞不怠身濟大業可以為法晉之元帝唐之肅宗志趣卑近功烈不終可以為戒反覆切至上對輔臣稱善除校書郎八年遷著作佐郎御史中丞常同薦先生復賜對除尚書度支員外郎兼史館校勘刋修蔡卞所改哲宗實録先生用力為多歷司勳及吏部員外郎秦檜當國決意講和先生與史官胡珵凌景夏常明范如圭會奏極言其不可檜怒諷御史論先生懷異自賢十年出知饒州未赴遂自請為祠官屏居建溪之上日以討尋舊學為事祠滿再任命下十三年三月卒於建州城南之寓舍時年四十七初先生自為兒時出語已驚人少長遊學校為舉子文即清新灑落無當時陳腐卑弱之氣及去場屋始放意為詩文其詩不事雕飾天然秀發一時前輩以詩名者交口譽之其文汪洋渾浩不見涯涘然自謂於道為逺益取經史子傳考其興衰治亂欲應時合變見之事業者既又得浦城蕭顗子莊劍浦羅從彥仲素與之遊則聞龜山楊文靖公所傳河洛之學獨得古先聖賢不傳之遺意於是益自刻勵痛刮浮華以趨本實日誦大學中庸之書以用力於致知誠意之地自謂卞急害道因取古人佩韋之意以名其齋以自警性至孝友重然諾不以死生窮達易其志誘進後學揚人之善凡邪佞嵬瑣簡賢附勢之流與已異趣則鄙而遠之屬疾革自為書以家事屬少傅劉子羽而訣於籍溪胡憲原仲白水劉勉之致中屏山劉子翬彥沖且顧謂元晦曰此三人者吾友也學有淵源汝往父事之及沒朱子年甫十四即稟學於三君子之門明年卜葬崇安縣西塔山後遷於武彞鄉上梅里之寂歷山所著有韋齋集十二卷外集十卷子熹行狀聖神道碑統門禮樂附遺文答莊德燦書曰某頓首昨屈車馬寵顧區區未能欵扣所聞辱惠書禮盛志謙雖不敢當然近世大學之道蕪廢士無貴賤徇世相師干百一範莫知孰使陶之者不自量其愚不肖竊有憐之之意頃來尤溪甫兩月雖獲拜邑士而未詳也索居深惟小人之歸是憂乃有識明志高傑然自拔於俗如吾友者其為欣幸未易具道夫仕而忘學如農夫快一朝之飽而釋終身之耕殍於溝中可立而俟然則仕而忘學猶飽而釋耕亦不足道抑聞之先生長者禮記多魯諸儒之雜説獨中庸出於孔氏家學大學一篇乃入道之門其道以為欲明明德於天下者在致知格物以正心誠意而已其説與今世士大夫之學大不相近蓋此學之廢久矣自周衰楊墨雖得罪聖人然乃學仁義而失之者至申韓儀秦之説勝而士始決裂聖人之籓籬以徇流俗之所好至漢文景之盛未衰也以至於今蓋嘗有以斯文為己任者起而倡之然世方嬰於俗學以自強屹乎其不可攻也松方急於祿養未能往究其所學是以獲聞吾友之言凜然敬歎若居夷而聞樂雖未詳其節奏之工然卓然於吳歈楚謠之中而不可亂也書曰知之非艱夫問塗而之瞽則知亦豈易哉以吾友之明茍以德為車而志氣御之則朝發軔乎仁義之塗夕將入大學之門以躪中庸之庭也如松之駑憂且追後乘而莫及其何以相吾子勉之而已君舍此而問塗則今之學士大夫皆知津矣即辰陽復惟為道自愛是望送程復亨序曰廣平程某復亨為余外兄從余遊於閩者二年余語以安逸憂患知之詳矣將歸省其母及其祖母其可以無言司徒文子問於子思曰親喪三年未葬則何服子思曰三年而未葬則服不除也故告之一曰葬吾舅而後加吉服夫子失魯司冦將之荆先之以子夏申之以冉有曰喪不欲其速貧古之君子以失位于諸侯曰喪喪不欲其速貧若是其急也故告之二曰葺爾居以寧爾親蓬生麻中不扶自直植之榛莽則與之靡然故告之三曰非爾父之類者勿親也江出岷山自荆之楚汪洋千里而至於海者大川三百小川三千以為之助也故告之四曰廣學問以資見聞傳曰宴安鴆毒不可懷也君子非獨惡懷安之敗名惡其敗性也故告之五曰勿懷安禮曰男子生則以桑弧蓬矢射天地四方示志也夫不資之軀豈其浮沈鄉里而名不稱故告之六曰無忘四方之志夫齊之善味者淄澠之合能辨之淄澠之合均是水也子歸矣他日執經而來問豫能入于常流而不變其味乎尚能為君辨之中散朱受之先生孰朱孰字受之文公長子用蔭補將仕郎紹熙辛亥年三十九卒贈中散大夫文公嘗題其詩卷曰大兒自幼開爽不類常兒豫恐其墜于靡浮之習不敢教以詩文又請陳同父作墓志其書曰此子自幼秀慧生一兩月見文書即喜笑咿鳴如誦讀狀小兒戲事見必學學必能然已能輒棄去後來得親師友意甚望之陳同父祭文略曰少有俊聲而能自克長讀父書而能默會義理以厭飫其心藝業以遊泳其外學者之高下淺深俯仰以接之而不暴其從違天下之賢不肖一見而識之而不輕於向背其才豈不直一官乃以韋布而早沒其志豈不慕古人乃以賢子弟而終晦耶朝奉朱文之先生野朱野字文之文公仲子淳祐間以蔭補迪功郎監湖州德清縣户部贍軍酒庫後文公十一年卒黃勉齋誄之曰在昔夫子性嚴氣剛規矩凖繩動止有常君承其顔惟恐或傷在昔夫子朝圖暮書遑恤其家孰有孰無君服其勞使若有餘內睦姻親外交朋友歲時享祀殽核清酒囊篋瑣碎俾無遺漏非君之賢孰左孰右幹之從遊餘三十年四海兄弟兩世姻㜕於君事親知君之賢人之百行非孝孰先讀此可想見其為人矣贈朝奉大夫侍郎朱叔敬先生在朱在字叔敬一字敬之文公季子受業家庭又從黃勉齋學公遇明堂大禮赦恩奏補承務郎嘉定初除籍田令亢旱應詔上封事歷將作司農簿遷丞十年以大理正知南康軍改知衡州湖州俱不赴奉祠既起知信州入對以進學問振紀綱求放心為言除提舉浙西常平茶鹽公事加右曹郎兼知嘉興府召為司農少卿充樞密副都承旨出為兩浙轉運副使寶慶丙戌除工部侍郎進對奏人主學問之要理宗曰卿先卿中庸序言之甚詳因奏閔損以下九人並封一字公爵獨曾參封郕侯乞與並封楊雄王雱乞去其像國家有程頥程皓張載得孔孟以來不傳之緒若使之從祀廟庭斯文幸甚又言先臣四書印本所在不同理宗回顧宣諭曰卿先卿四書注解有補治道朕讀之不釋手恨不與之同時除吏部右侍郎紹定三年乞外除朝議大夫寶謨閣待制知平江府明年改煥章閣待制知袁州奉祠卒贈銀青光祿大夫奉直朱子明先生鑑朱鑑字子明文公嫡長孫也蔭補迪功郎纍遷奉直大夫湖廣總領寶慶間隨季父在遷居建安之紫霞州建文公祠于所居左子孫入建安自鑑始侍郎朱深源先生浚朱浚字深源鑑之子少負奇節以進士纍官兩浙轉運使兼吏部侍郎尚理宗公主元兵入建寧王積翁棄城遁浚與公主入福州誓與知府王綱中死守逮元阿剌罕侵福安剛中以城降浚與公主仰天大哭曰君帝室王姬吾大儒世胄義不可辱遂飲藥死贈朝散大夫孫林字文茂深源長子彬字均之深源次子皆進士紫陽書院志書閩山長朱泳道先生沂朱沂字泳道文公曾孫纍薦遺逸不起與謝枋得遊枋得稱其論古今人物髙下國家興廢善類仕止久速之故脫盡華葉獨存根株文公之後世濟其美者泳道一人耳晚歲授考亭書院山長知事朱先生彬朱彬文公四世孫讀書有文克紹家學士子從遊者甚衆至正間為延平路知事判官朱文魯先生泗朱泗字文魯建安人文公八世孫除夀州判官改徐州值歲飢白督運留京運以賑民民有被誣殺人者亷得真殺人者釋之言當道以黃幹蔡沉劉爚真德秀配文公祠為請於朝得行劉先生文伯劉文伯建陽人從韋齋先生遊搆一室榜曰清軒讀書徜徉與客論文其間悠然不知日之夕也劉屏山寄詩有中郎言語妙天下得非遊世厭營營其稱許如此監廟謝綽中先生譽子東卿謝譽字綽中政和人朱韋齋尉政和時以公事行鄉落間聞田舍中有誦書聲屬耳頗異亟下車入其舍則一少年書生方對案危坐吟誦自若韋齋前揖問讀何書起對曰儀禮也是時士方專治王氏學非三經字説老莊之書不讀而其業乃如此韋齋奇之與語酬應敏給使出其文詞氣亦不凡問其姓名大喜與歸日授以經史百家之言而勉其所未至未幾記誦益廣文字益工韋齋益歎重之中紹興二年進士調泰寧主簿歸領祠官年四十六卒韋齋深惜後文公朱子為撰文集序稱君性耿介與世俗多不合居家極孝友既得官盡以先疇奉其兄娶妻得田自隨一旦亦舉而歸之還自泰寧自以不能隨俗俯仰慨然願領祠就間秩以便親養然君之所以自許與先君子所以期君者蓋未嘗不以經綸之業為言也則其志豈自以為止於此而已哉君沒之年先君子亦棄諸孤後四十三年考係淳熙乙巳而君之子東卿乃以君之遺文一篇過某於武夷精舍某讀其書得其志既歎君之不幸又念先君子之門人賔客如君者蓋無幾人今亦無復存者相與太息流涕既而東卿請序其文遂書其本末如此光祿鄭義齋先生乾道尤溪志作鄭安道鄭乾道號義齋尤溪人熙寧六年進士官至金紫光祿大夫歷著治績而文名尤見重於韋齋因相與友善時共講學假館以處韋齋為南溪書院其賀韋齋舉男詩載南溪志進士莊德燦先生光莊光字德燦尤溪人建炎二年進士筮仕州幕矢志節介直道不容遂致政歸與韋齋同講學韋齋稱其識明志高傑然自拔於流俗從父誼諶欣皆登進士尤溪志閩書進士盧定之先生安邦盧安邦字定之尤溪人宣和辛丑進士少穎異書一再讀即成誦博學攻古文辭與尉朱喬年友善官曹郎為時所重尤溪志閩中理學淵源考卷十五
