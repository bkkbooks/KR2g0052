body:
  text: 閩中理學淵源考卷四十四廣平府知府李清馥撰林浦林氏家世學派國家當元氣育和之候耆儒碩德羣出以茂贊鴻猷弼成治平之世若林公者英彥萃於一門尤所希有先公續語録中亦載其家之風流篤厚可為師法與有宋中州吕氏並述蓋推本於門祚昌明邦家盛事耳文安忠清碩德大節皎然一時朝端儒舊如章楓山王三原王文恪俱極推許而康懿文僖文恪諸公皆培藴家聲史稱其內行修潔淵源敻乎尚矣嘗讀蔣氏垣述其先訓曰林浦林氏文安公一門父子孫兄弟五登八座尚書相繼者百有餘年代稱儒臣居恆率以家禮小學訓誨子弟故子弟出鮮僕從衣惟布素未嘗以門第自視即槩觀當時先逹皆遵儒教於不墜其餘風吾猶及見邇來儒道寖廢習尚侈肆爾曹不復見昔時秉禮朴雅之遺為可歎耳此見於蔣氏閩學源流因并録之以為培德修學鄉國風規云文安林亨甫先生瀚林瀚字亨甫閩縣人父元美永樂末進士歷官撫州知府公亷持大體吳聘君與弼贈金井水玉壺氷六字以況其清瀚登成化二年進士選庶吉士授編修太宰王恕薦以學行醇正纍遷至國子祭酒九年升禮部右侍郎仍掌監事在國子十年有恩而嚴膳金之餘鬻置署舍屢與章𢡟講論為𢡟所重上疏請開科貢以進人才十二年升吏部右侍郎再升南京吏部尚書鎮定不搖人倚為重㑹灾異率僚屬陳言皆切時政時御史王獻臣被逮疏乞寬宥以全風憲之職儒士孫伯堅等夤緣為中書舍人疏乞收回成命以杜幸進之門忤㫖自劾不報十六年復疏請培植根本佑啓皇儲撫綏百姓增進賢才數事時與莆田林俊金華章𢡟浮梁張敷華號留京四君子云正德初太宰缺丘俊石玠等交章薦瀚剛方亷介改兵部尚書參贊機務又疏勸武宗割私任公不改先帝舊人不易先帝舊政逺近習裁貴戚為逆瑾所深嫉㑹大學士劉健謝遷致仕瀚閲報嘆息御史薄彥徽等上疏請留兼言上晏朝廢事日與新進佞幸遊飲射獵上大怒械繫彥徽下鎮撫司獄鞫之詞連瀚出為浙江右參政致仕瑾後矯㫖列瀚與健遷劉大夏等為奸黨瑾誅御史凌相汪正等言瀚德尊望重詔復舊銜時年逾七十命有司給人夫月廪時加存問瀚年八十子庭㭿為雲南參政請去官侍養卒年八十六贈太子太保諡文安瀚居家潔修而賔客過門必極欵洽里居時年雖髙邁而泛應周旋禮意勤懇簡答題封皆手自治為人內柔外溫至方若圓至勇若怯無卑賤愚不肖處之若一獨非意相干者即之始知其不可犯也章𢡟嘗言瀚有秦誓大臣之容又有桞下惠之介子九人五子登科第諸孫多貴顯兩世之內位至尚書者五世稱五尚書林氏子庭㭿庭機康懿林小泉先生庭㭿林庭㭿字利瞻號小泉瀚次子𢎞治己未進士授兵部主事歷郎中以持正不阿出守蘇州升雲南參政乞終養服闋起江西參政歷布政使以都御史巡撫保定嘉靖初與張孚敬不合歸未幾起南兵部侍郎轉工部尋拜大司空時世宗方稽古禮文創九廟建兩宫庭㭿規畫盡善嘗召見世宗顧左右竒其狀明日庭㭿疏節財用省營建二事世宗曰朕方顧若若乃言我若非林俊子耶左右對其父亦尚書非俊子也他日世宗又出御製憶邊士七言詩令和以進明年廟工成加太子太保又明年以疾乞歸庭㭿穎悟絶人儀表竦秀雅善清談風流為一時之冠歷官內外厚下愛人蘇州七邑大水都御史不肯以聞庭㭿上疏請蠲其稅雲南武辨財賦不給民無所出庭㭿令牛馬布帛雜物俱得充不旬而辦晚䝉知遇家食而眷不衰卒贈少保賜祭葬諡康懿通志分省人物考文僖林肖泉先生庭機林庭機字利仁號肖泉瀚季子庭㭿弟嘉靖乙未進士選庶吉士授檢討遷國子司業嚴嵩用事士爭附其門庭機寓與鄰未嘗私謁歷南祭酒太常卿工禮二部侍郎在南十年銓部每有推轂嵩輒擠之嵩罷始晉南工部尚書滿考改禮部穆宗即位上疏乞骸骨得請歸先是振武營兵變戕殺兵部侍郎黃懋官人心洶洶庭機時為工侍攝篆持大體不苛細餉以時給亂遂弭工部嵗供內府費巨萬計裁其濫溢中貴人斂手庭機亷靜不近名內行修飭自奉如寒士姚江孫文恪嘗曰不忮不求惟吾友為然莆田康司空同在史局額其齊曰學林其為賢者所崇仰如是卒年七十六贈太子少保賜祭葬諡文僖有世翰堂稿若干卷兄庭杓字利髙以䕃入太學歷官慶逺知府子􅖌烴俱官尚書光官户部郎中父子祖孫並以清忠品節見推於世云通志物考分省人文恪林對山先生􅖌林􅖌字貞恆庭機長子嘉靖丁未進士選庶吉士授檢討是時庭機尚未選官父子一時為檢討詞林榮之久之充景恭王講讀官時嚴嵩專軸􅖌不與通㑹景恭王之國嵩欲改􅖌長史遣人諭意􅖌弗顧嵩敗纍擢洗馬兼侍講校理永樂大典纂修承天大志升祭酒書成加太常卿仍管國子事轉禮部右侍郎兼學士經筵講官中官奏修九陵燫奉㫖往勘還奏惟長陵應修省費數萬屬邊警條上强本七事改吏部右侍郎仍日講前後經筵多所規諷首相徐階甚倚重之俄調贊南銓計部署禮篆魏國公徐鵬舉昵少子邦寧欲易嫡燫不許竟封其長邦瑞萬厯改元進南工部尚書明年改禮部以母喪歸燫立朝議論風采傾一時與張居正同為上所知及居正在政府謝不見為居正所擠衣布蔬食齊居一室問業之屨常滿户前卒贈太子少保賜祭葬諡文恪所著有學士集經筵講章子世言字天迪官户部員外詩詞清麗有叢桂堂集世勤見通志孝義部通志尚書林貞耀先生烴林烴字貞耀庭機子燫弟嘉靖壬戌進士授户部主事轉員外郎嚴嵩執政請告里居者數載隆慶初補駕部員外郎去烙馬之弊遷庫部郎出守旴江加意撫循屬邑輸賦以縣封識轉文解省不覔一錢聽斷敏决郡中謂之林一升以母艱歸補蘇州知府時張居正奪情迎母之京道出姑熟烴不為禮入覲未嘗至其門尋遷粵西臬副值兄燫訃至遂棄官歸養久之起兵備三衢轉恭粵藩所至有聲擢冏二因災異極陳礦稅之害及諸逮繫掩獄千餘言隨請假回籍起南冏卿轉大理遷刑部侍郎晉南工部尚書纍疏乞骸歸烴為人襟度髙曠而持正不阿有難進易退之節孝友之行通於神明家世詞臣文學冠冕海內而博綜不倦雖奕葉貴顯清約不異韋布年七十七卒所著有覆瓿諸集通志王氏家世學派按中美先生以文章氣誼一時推重而立朝汲引士類懿德可風其後嗣出處皆能有立懋復諸公尤講明正學能振續學派於頽瀾之餘為三山先正師表抑又尚已紀善王中美先生褒王褒字中美侯官人孝友重氣誼故與林鴻諸人稱詩閩中號十才子洪武中鄉薦歷瑞州長沙兩學教授遷永豐知縣均平徭役課士親講授蝗為灾禱城隍而殪永樂中與修髙廟實録升翰林修撰修永樂大典為總裁官改漢府紀善時海內無事每遇禎祥或令節輒命從臣賦詩褒應制多稱㫖褒性孝友剛直好汲引士類同郡陳仲完髙廷禮王恭皆因褒以進所著有養靜齊集行世子肇以文學屢徴不起五世孫應鐘閩書府新福州志王開若先生肇王肇字開若侯官人父褒少業於陳䢿學詩林鴻學書王稱學畫髙柄永樂宣德間以文學屢徴不起所著有蒙齊集閩書通志王懋宣先生應山王應山字懋宣侯官人讀書博覽以春秋教授生徒烏石武夷間從者如雲其詩宗大厯婉而多致監司守令常式其廬食貧篤行無所干謁林宗伯􅖌纂修郡志多所裁定晚年苦心編摩著作甚富有經術源流又有閩大記三十三卷以識閩中文獻之盛閩書委通志郡道南源新志恭政王懋復先生應鐘王應鐘字懋復侯官人嘉靖二十年進士授庶吉士改浙江道監察御史巡鹽長蘆東厰太監馬廣貪而虐應鐘疏論之詔切責廣一時中貴斂跡按順天紏郡縣不職者三十餘人嚴嵩柄國十監錦衣妄指奸細誣殺人應鐘立白其寃守備昌平太監王敏朘削軍士應鐘數其罪世宗為逐敏河套事起應鐘以前與議逮詔獄十監錦衣修前隙幾斃杖下按浙江所至墨吏解綬去入掌河南道㑹大計吏嵩欲蔽其私人應鐘弗許出督學河南宗室有凌辱諸生者必繩以法轉山東參政竟為嵩所中罷歸環堵蕭然講明正學學使者宋儀望為建書院於道山從游者雲集應鐘性端毅居官以嚴見憚於鄉黨則謙恭樂易引掖後進常若不及年九十卒通志閩書新郡志林氏家世學派按叔魯先生後以禮學世其家故特録焉餘俟再考教諭林叔魯先生鈍林鈍字叔魯閩縣人永樂中領鄉薦㑹試乙榜授常山學訓導端莊嚴重動遵矩矱訓迪講論或至夜分升江西興國教諭亦多所造就禮經有傳自鈍始既卒門人悲慕祠祀之所著有說鈴餘響等集三子曰清源曰泮曰濬淵俱登進士第閩書分省人物考主事林用清先生清源林清源字用清天順四年進士官終南京工部主事耿介有父風泮濬淵皆從受學閩書尚書林用養先生泮林泮字用養閩縣人父鈍永樂中舉人司訓常山遷興國教諭所至諸生懷之泮游太學時有誣奏祭酒陳鑑者泮伏闕抗疏直之成化八年第進士授南京大理評事歷寺正讞獄矜恤多所平反遷知廣州府忠義節烈多所表章嘗刻石崖門曰宋太傅樞密院使張世傑死節於此藍糞諸山峒蠻叛服不常泮親帥兵攻之擒其渠魁又豐湖堡賊劉庚作亂單車造壘諭降之擢廣西恭政江西左右布政自以家世禮經言陳澔所著禮記集說已列學宫而未得與從祀之列請舉行之不果用入尹順天進户部右侍郎總儲務權幸斂手正德三年拜南京戶部尚書逆瑾嫉之矯㫖令致仕復吹求其江西罪罰米二百石輸邉泮家貧素又先被火既歸寄寓山寺者數十年布衣疏食談經不輟齒宿望重謙抑自牧鄉人敬愛卒賜祭葬通志閩書僉事林用淵先生濬淵林濬淵字用淵成化八年進士初授刑部主事持法不阿官終浙江按察僉事閩書林氏家世學派按德敷先生深邃禮經學者多北靣受業今未得遍考其學派姑列著其家學以備參稽蓋公素游羅整菴吕涇野二先生之門其所學所守綽有本末可考且夀考康强百年之多而子孫又眉夀逢吉信乎得天者厚矣再按公與鄭公善夫諸賢相友善善夫晚嵗嗜學勵志儒宗豈得以詞華置之哉故特志之附交友中待考焉郡守林德敷先生春澤林春澤字德敷侯官人登正德九年進士授户部主事司𣙜臨清屬武宗南巡諌者皆廷杖罰跪午門春澤抗疏千餘言救之得免邉帥江彬扈從擅威福春澤持正不阿彬為氣奪坐謫寧州丞移倅吉州遷肇慶府同知島寇掠髙州檄攝府篆春澤習知猺兵害民悉罷遣之代以土著諸冦次第就擒擢南刑部郎出知程蕃府擇耆德文學之士分布諸寨為童子師時卧龍金石二司暨通州寨屢年失地春澤與指揮協謀平復功未上為忌者所中以候調歸春澤邃於禮經學者多北靣受業其詩詞宏偉與鄭善夫方豪何景明相倡和在吉州與羅太宰欽順講學其在南曹復游吕宗伯柟之門究極㫖奧年百有四嵗卒所著有禮記筌蹄二十卷瑞集十餘卷子應亮戶部侍郎孫如楚工部侍郎各享眉夀道南源委通志侍郎林熙載先生應亮林應亮字熙載春澤子嘉靖壬辰進士初令潁上調秀水皆有亷聲守常德榮王官校挾勢為害應亮剗梟獷植善良縛諸不法者署諸理值大䘲治糜賑藥全活者衆歷廣西江西藩臬晉南户部右侍郎請告歸奉父杖履幾二十年時父春澤以程畨太守家居子如楚弱冠登進士三世萊綵傳為盛事應亮少好稱詩為古文詞與西蜀任少海溫陵王道思吳興蔡子木長洲皇甫子安最相善徒以雅志經世不究其業云通志閩書侍郎林道茂先生如楚林如楚字道茂應亮子弱冠登嘉靖乙丑進士歷刑部郎中善决獄嵗减重辟十二人由督學任至少司空時陵寢宫殿工役併興如楚殫力供事以績著生平好學有恬退之節經書皆手録著有奏議六卷碧麓堂詩文集十二卷通志閩書郎中鄭繼之先生善夫附交友鄭善夫字繼之閩縣人𢎞治十八年進士連遭內外艱正德六年始為户部主事𣙜稅滸墅以清操聞時劉瑾雖誅嬖幸用事力告歸築少谷草堂金鏊峰作遲清亭曰俟天下之清也巖居六載交游寡絶日晏未炊欣然自適有司勸駕奪起改禮部主事員外郎武宗將南狩善夫約諸曹郎伏闕上疏上怒杖之罰跪闕門跪時别作諌草置懷中囑其僚方豪曰死為我出之幸不死居頃之嘆曰世道如此何可為計哉復乞告歸徘徊越山水探天台雁蕩者久之入武夷山中雖尫羸善病而游覽不廢嘉靖改元薦起吏部驗封司郎中道病卒年三十九閩中國初有十才子至善夫而始振風雅之道晚乃厲志聖賢曰任重者身也途畏者口也致逺者道也邪行亡乎體違言不存口要諸逺矣善夫交遊盡海內名人其詩規倣少陵兼目時變故寓幽憂雖才韻弗充古色精言髙映霞表與山人孫一元衢州方豪鳯陽殷雲霄最相善善夫沒後閩守汪文盛為營葬梓其集行世閩書明史通志閩中理學淵源考卷四十四
