body:
  text: 閩中理學淵源考卷五十九廣平府知府李清馥撰東林蔡氏家世學派按蔡文莊先生先世家惠安之東林里至元代有處士諱惠者始徙晉江是為先生始祖先生嘗自述其髙祖大略謂髙祖世安公諱潤與朱都憲公為友都憲嘗語先生云吾及識乃髙祖實一時善士曽祖諱輝中永樂甲午鄉試祖諱𢡟德不仕父諱觀慧為允元公先生為佚老會記言在會凡十七人而允元公為之長一時在列皆鄉之望文行表表出等夷而萃為一會則允元公為巨人長德以肇基啓後有以哉泉南自紫陽而後人文之盛實倡起於文莊是文莊先生之家世淵源尤後學不可不追尋所自焉蔡允元先生觀慧蔡觀慧字允元晉江人文莊公清父也既受文莊封與鄉里耆舊為逸樂會文莊撰記略曰志書載吾泉風俗淳厚人樂為善宋時人物最盛其出而樹勳業播聲實於當世者固已班班可考其在林泉意亦當有髙人逸士志節風流之可以表世而範俗者而未之有紀也我朝百餘年來治教休明人物復熾然以盛矣然前此之仕而歸休與夫不仕而既老者率亦多匆匆竟日擾擾卒嵗而已鮮有能自取樂於分內者間有之亦未能倡為是會以同於衆也又曰今日逸樂之所以有會以逸而樂耳蓋視九老耆英之遺意而不敢盡同也在會凡十七人以齒序則家君為之長爵尊而兼齒者通政致仕張公也次則封主事黃公暨循齋黃先生怡齋賀先生三陳先生史吳包翁留顧董林楊列位先生皆鄉之望也文行表表出等夷而悉萃為一會嗚呼亦盛矣會之言曰朋友者五倫之一道義者百行之根凡我在會之人有善相勸有過相規有疑事則相質其有憂患亦相與為力也豈徒逸樂云乎哉又曰會之位惟尚齒會之儀不尚豐月必再會不疏不數也或於所居或於所遊之地惟其所宜也蓋始於𢎞治辛亥四月望至於今十有一年矣而未嘗有一日之曠惟值水旱或凶歉則暫輟此又與衆庶同其憂而不膠於逸樂也又曰吾人之會所以序天倫之樂事而亦有三益之遺規存焉不可無以傳之後生輩也乃合衆議請張公記之時各録一通置之座隅以遺後之人而張公辭曰此正後生輩所宜用心者適某以侍養歸自京師張公乃屬家君命甚為之家君遂授以其事如此并列諸公名于左張公名苗黃公名齊黃先生名績賀先生名騰三陳先生名政名襲名淮史先生名隲吳先生名瑤包先生名哲翁先生名裕留先生名昆顧先生名美董先生名鳯儀林先生名澤楊先生名溥家君名某亦封主事閩書蔡文莊公集舉人蔡先生存畏蔡存畏字思危文莊公長子生而聰頴稍長能文𢎞治十一年鄉薦舉人蔡先生存微蔡存微字嘉靖四年鄉薦寺丞蔡先生存逺蔡存逺字思毅嘉靖五年進士纍任吉安松江二府推官官至太僕寺丞按朱氏經義考嘉靖八年存逺在松江府推官任奏獻進士蔡文莊清易經蒙引後發禮部看詳遂議行福建提學副使將易經蒙引訂證明白發刊書坊存逺所著有周易正説郡守蔡先生如川蔡如川字繼之文莊公曾孫萬厯元年鄉薦纍官尋甸知府以礦稅抗內監逮詔獄廷杖卒贈光祿寺少卿文莊蔡虛齋先生清學派按明代盛時理學大明前輩言北方之學起自澠池曹氏河津薛氏南方之學發自康齋吳氏而閩中則虛齋先生實倡之先文貞公撰虛齋先生祠記曰吾閩僻在天末自朱子以來道學之正為海內宗至明代成化後虛齋先生崛起溫陵首以窮經析理為事非孔孟之書不讀非程朱之説不講其於傳注也句談而字議務得朱子當日所以發明之精意蓋有勉齋北溪諸君子得之口授而訛誤者而先生是評是訂故前輩遵巖王氏謂自明興以來盡心于朱子之學者虛齋先生一人而已自時厥後紫峰陳先生次崖林先生按公初藁尚有淨峰張先生皆以里閈後進受業私淑泉州經學遂蔚然成一家言時則姚江之學大行于東南而閩士莫之遵其挂陽明弟子之録者閩無一焉此以知吾閩學者守師説踐規矩而非虛聲浮焰之所能奪然非虛齋先生其孰開之哉今經學久晦士大夫好尚趨向龎而不純浮華之徒轉相夸毗獨至蒙引存疑淺説通典諸書則行於海內家習而人尚之翕如也故嘗以為吾閩之學獨得漢儒遺意明章句謹訓詁專門授業終身不背其師言者漢儒之學也師心任智滅裂鹵莽者近代之學也是二者孰古孰今孰醇孰漓後之君子必有辨之者矣讀先公敘述閩學源流起衰救弊誠今日學者之律令格式也兹撮其略著於篇端文莊蔡虛齋先生清蔡先生諱清字介夫晉江人成化十三年福建鄉試第一晉江之山鳴如玉磬者三日二十年成進士即乞假歸講學水陸僧寺江南之士多來從逰事親讀書之外未嘗急求仕進他日為其母寫容母愀然曰吾聞母以子貴今汝舉進士有年矣吾猶故巾幗先生聞言大傷之即赴選得禮部主事是為𢎞治初元吏部尚書王恕重其學行奏改為吏部稽勳主事時與談論咨訪先生因上管見二劄於恕言今朝廷之患在紀綱廢弛以至士風日弊民力日絀當大有以振作之乃可銷境內之憂靜疆場之警又薦引名士劉大夏等三十餘人恕皆納用庶吉士鄒智論事下獄罪且不測先生急白於大司冦何喬新得疏救智得謫官嶺南居之丁內艱服除吏部有不悅者以補禮部祠祭司員外郎乞便飬升南吏部文選郎中一日心動乞終養至家兩月而其父沒人謂孝感自是家居授徒不出每遇親忌痛哭流涕終日不御酒肉宗族內外有貧乏者恆賙恤之正德改元即家起江西提學副使時宸濠方圖不軌凡朔望藩臬官皆先朝宸濠次日乃謁孔子廟先生至力請僚屬同日行禮先謁廟後朝王宸濠生日令藩臬官著朝服賀先生曰臣子見君則朝服無見王者去韍而入宸濠大怒一日宴藩臬官宸濠嘲先生曰公乃不能作詩先生對曰某平生於人無私蓋私與詩音相近宸濠益銜之其後奏求護衛已得請矣同官有傾先生者謂先生獨有後言宸濠聞之欲誣以非議詔旨之罪先生正色對遂疏乞致仕宸濠尚陽善挽留之且欲以女妻其子先生力辭歸時劉瑾方專權駕引名士以掩人心不數月復起為南京國子監祭酒朝命未至而先生已卒時正德三年也年五十六先生氣清色和外簡內辨始即之使人忘其鄙吝及與之久妄消躁息與論天下古今一以禮義折斷其言剴切精深嘗曰學宜養正性持正行故飭躬約禮動準古人以六經為入門四子為標準四儒為真派而反身用力本之靜虛之地故初時主於靜後主於虛謂天下之理以虛而入亦以虛而應以格物不外讀書讀書當以虛心涵泳切己體察八字為要訣因以虛名其齋其教人也以看書思索義理為先不獨語言文字蓋謂聖人作經以明道學者因傳注以求經實從體驗身心而洞見道體者又曰宋儒之道至朱子始集大成朱子之學不明則聖賢之道不著故與其徒著四書蒙引易蒙引諸書皆推原朱子之意以歸聖賢本旨為密針五十餘條皆反身自檢之功友善寧永貞林俊孫交楊廉丁璣江朝東而師事何喬新其言易則師三山林玼傳其易者則同邑陳氏琛至今言易者皆宗之𢎞治間士大夫理學中輟永貞廉璣朝東與先生皆起稀曠之後而先生與亷尤為獨得恭肅黃氏光升曰泉自朱子簿同安之後私淑雖多而惟先生為得其宗泉南一時人物之盛皆先生所造就也雖厯仕未盡儒者之用而有教人數世之澤焉萬厯中僉都御史詹公仰庇請易名諡文莊大學士李公廷機復請贈禮部侍郎國朝雍正二年從祀孔子廟廷明史公集閩書學蔡文莊明儒案備考羅整菴曰蔡介夫中庸蒙引論鬼神數段極精其一生做窮理工夫且能力行所學蓋儒林中之傑出者于氏孔兼曰宋儒語録荆川先生業有梓行不容復贅我朝先輩遺言尚缺如也豫於中得其人之純正不雜者以列名因録其言之精實可傳者以垂訓若關中薛敬軒玉峯魏莊渠兩先生其最也外此而吳康齋陳白沙蔡虛齋諸公非後先之頡頏者乎豫身在堂下而此十先生者曹月川薛敬軒吳康齋胡敬齋陳白沙蔡虛齋魏莊渠吕涇野尤西川徐養齋皆堂上人也愧學未窺斑而輒敢次第其言如左緣考其行則皆屋漏如斯大廷亦如斯者也蚤嵗如斯晚節亦如斯者也斯之謂躬行君子豫之竊有志未逮者也此外名賢非無見道之語而或其人尚存者不可徑述議論未定者不可漫述言足聽聞而中多疵纍者又不敢輕述雖有掀揭之勳名懸河之才辨豫終不敢雷同而附和之蓋析理有毫釐之差謬必千里論學有邊旁之見義多滲漏嚴學派者審之楊氏廉贊曰平生所志惟在儒術舉業理學會萃為一蒙引之作藩垣置筆辨如江河守則以訥朱之於吕嘗誄其歿酷類成公詞寡人吉閩學中興公多倡率司訓黃先生逵弟正黃逵晉江人為粵東新興司訓與弟正皆受易於蔡文莊先生之門舉一子曰誾誾之子曰衷以孝稱衷之子曰喬鏜弟正成化十年鄉薦官推官何鏡山集同知張國信先生元璽張元璽字國信其先在宋末屬浦賊亂避地於晉江登瀛里宋亡隱軒伯玉終身不仕祖福父旺成化中舉人孝養二母推財弟晜未受官卒璽痛先志弗遂少小即知力學遊蔡文莊門以妙悟見稱與陳紫峰琛李筠溪墀王一臞宣號稱四傑𢎞治中領鄉書除滄州學正端軌興文士習頓化流賊陷滄州城閉齋自守賊相戒勿犯居民傍學宫者藉以安堵遷國子監學正擢建昌同知未任卒元璽學有深造淡於世味居官貧薄沒後僅負郭田數畝士大夫以為難舊郡志閩書李衷一先生集郡守王子鋒先生鍭王鍭字子鋒號山晉江深滬人天資穎敏遊蔡文莊之門篤志勵學登𢎞治九年進士第自是滬海之士彬彬矣初試宜興令均徭役時賦斂摘姦蠧臺使者最其等升南京大理寺評事轉寺正讞獄明慎晉惠州知府政聲嘖嘖未幾歸修祠宇練鄉壯禦賊以保鄉里鄉人皆誦其賜云顧新山集副使黃潛虛先生天爵黃天爵字希仁南安人少從蔡文莊受業誼最篤因自號潛虛𢎞治十二年進士甫觀政即以親老乞歸省旋丁外艱服闋授戶部主事厯郎中升廣東副使有滯獄疑於法爵至訊服人稱其神尤喜奬拔善類粵人畏而愛之丁內艱歸起補湖廣副使留心學政水利士民勒石頌德乃堅請致仕營宅西埔即蔡文莊所授地其師弟子古誼蓋如此嵗奉祀事甚謹待異母兄弟如一族中老貧幼學咸推槖惠之愛母家陳尤摯撫遺孤嫁女喪葬購廬代奉其先焉性寡言笑外直內寬未遇時嘗同莊恭人歸寧時襟兄李已貴顯禮待頗異莊恭人促歸以激之及貴恭人尚留憾而爵已忘之矣功姪河清在銓部時常欲推以督學爵力辭焉人益服其品行云南安志文學黃允靜先生明黃明字允靜晉江諸生也潛心易學弱冠遊蔡文莊之門時聶貞襄豹倡學閩中明從遊為髙弟閩書提舉曾子遜先生大有曾大有字子遜仙逰人從蔡文莊學以鄉薦授德州學正厯廣東市舶提舉克著亷聲乞歸田里産業多歸之兄弟貧族嘗著勸學録以訓士又有資仕蛙見二録閩書同知傅石涯先生浚傅浚字汝源南安人凱之子性謹厚𢎞治十二年進士授户部主事為逆瑾矯旨削籍瑾敗起工部虞衡員外郎進郎中理薊州鐵冶釐革宿弊改都水司出納不徇私請卿長固位賂中官屢索餘羡浚不應為所排出為山東轉運同知暴卒官舍其詳見子楫傳按陳紫峰祭文略曰先生暗淡訥訥未嘗修飾表暴以示諸人蓋虛齋其師敬齋其父古意古心傳受有素加以天資朴實與道為鄰故能茹苦受辛必由向上路必作君子人不肯以其胸中之耿耿者而自混於流俗之塵又曰先生之所以取諸父師而成之者如此可不謂之能後乎今行人君楫又將盡述其得諸先生者而大發之可不謂之有後乎惟是賢哲凋謝斯道寥落而在吾黨則不能以不哀也閩書陳紫峰先生文集縣令尤見齋先生復尤復字純卿號見齋晉江人正德庚午舉人受業蔡文莊公官石埭知縣有惠政溫陵先正姓氏爵里教諭蕭叔岡先生崑蕭崑字叔岡將樂人從蔡文莊受易正德丁卯舉于鄉授淳安教諭尋補績溪己卯聘粵闈分試途次為濠逆所執欲降之崑慷慨言曰殿下違祖分干天命復欲辱義士乎竟不屈死道南源委方伯留朋山先生志淑留志淑字克全晉江人忠宣正之裔年十八受業蔡文莊之門一見稱其逺器未弱冠領鄉薦𢎞治十八年舉進士授溫州府推官折疑獄快輿論擢刑部主事厯郎中以才望推守杭州浙有鎮守太監畢真者故寧庶人宸濠羽翼也志淑悉其匪測狀白臺察監司隂制之真一夕搆市人火其居延燒二千餘家意欲因而起變戕殺官吏志淑閉門不出第遣地方撲滅傳報諸衙官毋往看火數日濠反報聞真將發益急志淑提民兵伏門外與諸監司入見真曰知府造我反耶志淑曰無是也第府中役從太多公心迹難白公宜散遣之諸監司競為言真倉卒不得已呼其衆出民兵盡執而置之獄奏聞逮真伏誅武宗率師親征宸濠且道徽州憲臣以志淑有幹濟才改守徽使備行在供億至郡止候駕丁夫罷民間諸所措備惟令人持直前途隨方隨時雇募供應公私晏然時有執檄從府中門入稱奉旨擒惡人某者志淑疑其詐令傳中醉之潛發其封白頭而已論坐如法徽郡大治遷湖廣按察副使尋轉布政司參政銅盤嶺洞賊起志淑先察擒土民為藏匿若干人凡報賊者輒弗令返繇是聲息不通乃令集兵以待指麾分道直逼賊壘月餘外給不繼賊困乃降嵗大飢志淑自請行所活甚衆屬有腴田數百頃為水所決志淑按其地使人疏導之築堤植栁為固民呼曰留公堤厯補江西按察使逾月轉浙江右布使數日卒志淑才學兼懋疑獄剖折如流公暇會諸生學宫習禮考樂建尊經閣􅍥書教士所至以學為政聲績迥異云子元復鄉薦善繼父志閩書通志舊郡志新郡志藳教諭吳秉衡先生銓吳銓字秉衡晉江人從蔡文莊學嘉靖初貢士授博羅訓導陽春教諭平居嗜學而持身以禮無惰容無偽言無私謁妄求取為學官集士有美質者親為講授夜則挈供其行視皆翕然勸興以疾歸咸思慕之蔡公元偉稱溫陵人物謂朱簡庵鑑李木齋聰蔡虛齋清陳紫峰琛張淨峰嶽黃逸所孟偉林龍峰同顧新山珀林六川性之與銓數公雖名位不同皆無愧鄉先生也按閩書洪富傳富為諸生時受學蔡文莊之門人若吳銓林同二公今從洪傳增入文莊學派僉事李筠溪先生墀李墀字獻忠晉江人正德三年進士官終僉事王氏慎中祭之文曰肆公之學鈎深探賾孔孟微言羲文奧畫宿師積疑渙然氷釋虛齋先正教人以易公早及門遂參所得師承原本文有法式師所著書公廣其刻傳于西人施及遐側肆公之政善斷能聼始評棘寺讞審衡鏡色詞有稽徵以法令陟為蜀臬風裁獨正繩姦摘隱不事鈎巨秉憲持體與御史諍坐此失官既去乃詠如公之藴不究其施人莫不憤公善自怡葆光頥和林泉娛熙老而益康介此純禧從以孫子實教書詩桑榆之景宴樂且宜壽豈令終靡有憾遺王遵巖先生集長史楊楓山先生孟洪楊孟洪字裕卿晉江人少補郡庠弟子員事虛齋蔡先生講易得其微旨以易經領正德丁卯鄉薦明年戊辰會試春官入乙榜授江西寧州學正推所聞於師者以授其人無不信服丙子召為國子助教甫一年以懶菴足疾乞歸侍四年而懶菴歿服闋復為國子又六年戊子春由國子奏補德府右長史王常聽用其言府事多所釐正癸巳轉左長史時年六十餘矣屢求歸王輒留之至于再三王度其終不可留乃聽始虛齋門下士無慮百十人顧常愛孟洪言辭容止及論事之長謂其他日必能為政其後所至皆以溫恭詳欵為人所愛重事有難處者為之剖畫咸中肯綮無拂於理而後行故終其身於事鮮有敗失尤仗義能濟人急丁卯赴秋試漳士有道死而無殯資者時且鬱熱人無敢視孟洪親為之殯以已資助而遣之其在分寧寧庶人方起獄擠鄭山齋以南昌教授王某亦莆人也并擠之禁絶所與往來孟洪常使人問視其家人以是稱孟洪為長者晚作别墅於楓山蓋有終焉之志嘉靖甲午年卒按王遵巖為雙泉處士墓志云蔡虛齋先生髙弟數人楊孟洪其一也張淨峯先生撰墓志謝先生𢎞附髙鳯崘謝𢎞髙鳯崘安溪人受學于蔡文莊文莊字𢎞曰汝器字鳯崙曰瑞周必其嚮學之士惜其不名於時安溪縣志遺佚蔡鶴峰先生烈蔡烈字文繼龍溪人少廪於庠往從晉江蔡文莊學文莊與語大悅比歸授以蔡氏太極圗解既又從莆田陳氏茂烈遊語以心體流行于日用間要常見得參前倚衡氣象遂大省悟即辭廪隱於鶴鳴山之白雲洞學者稱為鶴峰先生時年三十二郡守勸之仕對曰昔漆雕子自謂未信若某豈徒未信已哉實且未見也嘉靖癸巳以遺佚應薦力辭母老不赴御史李元陽檄府為建書院又辭不受忽所居之山如雷鳴者三日而烈卒烈初性剛方晚年充養和粹終日危坐非劇病無惰容其學一宗程朱以窮理力行為實主敬為要嘗遊武夷山寓考亭精舍數日而歸曰腳根自此定矣提學邵鋭聞而訪之談論終日蔬食相對副使柯喬嘗與劇談道體潛天潛地烈徐應曰道固察乎天地而端則始於夫婦若屋漏無愧則天地自位邑簿詹道請論心烈請論事曰孔門求仁未嘗出事外也堯舜之道孝弟而已矣夫子之道忠恕而已矣豐學士熙謫戍鎮海見烈嘆曰先生不言躬行某心醉矣朱提學衡稱曰力行好學老而不倦漳南又一布衣也所著有孝經定本大學格物致知傳道南録朱子晚年定論諸儒正論大儒粹言讀書録等書閩書道南源委漳郡志孝亷黃先生鉞黃鉞南安人孝亷也講學蔡文莊之門為東南弟子師閩書教授蔡體順先生祐蔡祐字體順晉江人三嵗而孤其母梁氏艱貞守之梁見閩書閨閣志祐數嵗哀不見父掩泣發憤稍長讀書敏記深研抽心繹腑如絲有緒循而緝之丈引尋續出與人説證喻參伍窮極條貫卒有要倫從田南山受蔡虛齋易學既盡得田氏易復以新得疑義往質虛齋曰我學如是最好朱文公家禮講肄行之其於作堂寢具器服物品貧不能如志而意常合其造次必于禮度舉鄉貢一赴禮部不第就銓養母得新寧教諭母艱服除改海寧遷湖州學教授致仕祐所至教士皆悅附動變其諭新寧時上官檄視邑篆省文書所宜施行上聞下施且行且請不取邑中一物會其母病思笋有持餽者遂受之邑人以為特事其自海寧徙湖士爭畫像乞留衣帶去湖亦如之子克亷閩書姚德輝先生姚闕字德輝漳浦人事實未詳蔡文莊曾與書曰古云三十年前好用工吾人年且三十矣將奈何昔項羽之救趙也既渡河沉船破釜持三日糧示士卒必死無還心一戰勝之由此遂霸天下夫羽無足言也然能決志用勇直於死中求生如此是亦學者所當師其一莭而未可以人廢也漳浦姚德輝從豫遊將歸求豫言以警其惰豫姑為借粗喻之會見陳進忠其亦以是語之也蔡文莊公集郭文博先生郭闕字文博籍貫事實未詳蔡文莊曾與書曰承文博書拳拳欲得京師中好文字議論以為進學之助吾自到京一向匆匆未有可以答來意惟冡宰王公某舉朝士大夫皆以為方今第一等人吾頗辱其教愛時召至書軒賜之談論間及書史多有可發吾人志意者因憶數段録寄録第九段曰公問今學者滿天下何故異才難得豫對言是固有由也上之人所以飬之者本未盡其道下之人又幸際時之升平而售之急耳以生所見言之如生稍知章句訓詁人便舉而進之於學宫矣未幾作經義甫成篇便得補廩以為當然矣又未幾作三場文字才可讀便迫迫期中舉中進士矣一中進士則官已到手或無暇於學或自謂無用學矣其仕而能學者無幾且又或有扞格之患蓋識見既淺踐履必薄規為必粗非所謂俟其熟而食之者也况自幼入小學而其所學者多非學做人之實事人才之不如古者以此故雖有異質者亦不能成異才生等躬坐此病今日雖知悔前之失實蹈扞格之患矣公曰然吾兒子承裕今年二十三丙午年已中舉然吾未欲其急於仕且令靜覽羣書間閲世務冀他日得實用耳此一段似有益於吾輩故詳録之按文博先生傳文莊易學授之門徒林坦齋文明林别見郡西林氏家學不另列學派焉蔡文莊公集何鏡山公集洪元達先生洪闕字元達籍貫事實未詳蔡文莊曾與書録其三曰春秋胡氏傳夏時冠周月之説雖非後學所敢輕議然每讀之覺其曲折費力終未能愜然於心或意經所書王正月者蓋謂時王之正月明其非夏時商時所謂正月耳謂自夏商以前便已有三正迭用之事矣夏啓聲有扈之罪云怠棄三正可見矣故夫子於春秋有王正之文歟想王正二字亦有自來不必是孔子所立也録其四曰夏時冠周月之説朱子當時又嘗疑之其説見春秋大全注云文定春秋説夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改作春正月某便不敢信據今周禮有正月有正嵗則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅耳愚謂據朱子説則周時之所謂春非夏時之所春亦明矣此説與今胡傳不同蔡文莊公集訓導黃伯馨先生芹黃芹字伯馨龍巖人喜怒不形端謹無惰從學蔡文莊正德元年以嵗貢授海陽訓導身教端謹學者宗之郡邑有疑事咸就質焉以親老乞歸所著有易圖識漏易經口訣史圖纂要家禮易行等書閩書漳郡志教授李碩逺先生世浩李世浩字碩逺平和人敦朴好古少遊蔡文莊門創家規正宗法修鄉約建聚賢堂設義倉惓惓于和鄉睦族以嵗貢厯官寧波府教授士心悅服子文察字廷謨精思力學究心樂律嘉靖中以嵗貢倅遼州亷莭自持奏樂律解章數萬言上大悅令如議酌行授太常典簿終思恩同知閩書丘省菴先生璦丘璦晉江人受易蔡文莊著易説皇極管鑰諸書學者稱省菴先生子養浩官終都御史以風節著閩書文學李君佐先生仕弼以下私淑李仕弼字君佐晉江人善治經為諸生祭酒逺從伊洛近守文莊體裁自家淵源往哲學者師之閩中理學淵源考卷五十九
