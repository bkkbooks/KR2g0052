body:
  text: 閩中理學淵源考卷五十一廣平府知府李清馥撰九牧林氏家世學派貞肅林公俊曰林自矩軒應成松湖棟于野慎齋岡孫玉井以辨子木以順三復圭世以道學名敬齋公宗莊重古質而尤名經學逺邇及門往往榮顯仕天官卿尹公旻尤顯者按貞肅所叙此一派為九牧邵州公藴之後源流最夥曰三復諱圭者正學道風為時推首所指授弟子數十名輩皆一時偉望其餘端州公葦之後有林氏環林氏富林氏文林氏堯俞林氏雲同江陵公藻之後有林氏廷綱林氏瀾林氏嵒林氏大輅皆卓然鴻碩之彦典型表著可為世法者也今録其要者載於篇端教授林敬齋先生宗林宗字存敬號敬齋徳齋公子林自矩軒松湖于野慎齋玉井子木三復世以道學名宗莊重古質而尤名經學逺邇及門往往榮顯仕天官卿尹公旻尤顯者嘗發解首為忌者所落後鄉薦授寧海學正改蘄州至揚州教授以養老母公在官正身率物督士成材風為之盛蘄祠之學主考山東王察使越尚浮藻宗務以理勝榜稱得人寧海之歸無力北上揚歸始葺先祠故宇量周其三族晚得末疾孝敬不衰日數數省母母間不樂拳跽請過悦然後起祠墓之祭扶拜匍匐淚油油下岳閣老䝉泉為郡守亷其貧助以河南闗之地辭焉孫俊贊曰于泮之濵于鳯之趾一脉東湖言世孫子經學埀聞猶取淵委師嚴道尊名無虛士㣲禄逮親厥有繩軌歸羅轍涸言活升水為周為辭義適彼已後償于天考祥視履林見素集撰敬齋公贊襄敏林澹軒先生文林文字恒簡號澹軒與環同出九牧葦之後宣徳五年廷對第三人授翰林院編修正統初預修宣廟實録成轉修撰景泰三年遷右春坊左諭徳兼翰林院侍讀四年修歴代君鑒成七年修寰宇通志成陞庶子仍兼侍讀英宗復位罷景泰中宫僚改尚寳司卿仍兼侍讀時翰林應博學士者七人上疑其多兵部尚書陳汝言進曰唐有十八學士是不為多遂拜學士四年請老上諭李文逹賢曰林文老成忠厚不可令去仍留供職八年憲廟登極褒進舊學遷太常寺少卿兼侍讀學士未幾復懇辭歸老學者稱為上林先生年八十七卒贈禮部左侍郎諡襄敏文神觀清爽酬應安詳暮年神色安康賔祭惟謹大小不慢人盡服其耆徳黎文僖語彭惠安曰翰苑中古意時流時時相半若林先生醇乎醇者也李文逹亦稱其徳性堅確而不移氣質沉静而不躁處心平易操行潔修臞然若不勝衣而志不懾氣不餒其為時推重如此曽孫渠希範元孫焜章閩書莆莆陽文獻田志簡討林子道先生大猷林大猷字子道莆田人天順己夘鄉薦授新建教諭遷國子學録轉監丞再轉翰林簡討陞徴仕郎監丞如故贍博善考禮儀榘矱嚴而内冲晦懇欵館中執經以五六百輩齋舍至不能容輪畨聽講又約日通集謂之普講所以處諸生貧者授衣病者給藥死者躬詣哭殮或屬其鄉人扶䘮歸或捐俸以塟力弗能給又以疏告於好義君子滿九載陞翰林簡討仍掌監丞事以疾卒官大猷志行端謹學問該博奬與後進卒之日六館諸生咸哀悼之林見素銘其墓謂其秩則卑而其品在彭惠安陳康懿之間子䕫戸部員外郎有雋才閩書志莆陽貞肅林見素先生俊林俊字待用福建莆田人成化十四年進士授刑部主事遷員外郎性侃直不隨俗浮沉事屬權貴尚書林聰輒屬俊治之陳獻章以薦至京日與講學大有所得時妖僧繼曉挾近倖梁芳以秘術進得被殊眷發内帑銀數十萬營建其寺俊疏極論之請斬繼曉而黜梁芳言甚激烈憲宗怒尋下詔獄加刑對益厲後府經歴張黻上疏論救併下獄謫逺方俊得姚州判官時言路乆塞二人直聲振海内王恕在留都疏乞還之以勵忠節㑹元日星變憲宗感悟叙復南部孝宗踐祚廷臣交薦之擢雲南按察副使俗崇釋信鬼鶴慶元化寺稱有活佛嵗時士女㑹集動數萬争以金泥其面俊按鶴慶命焚之得金數百鎰悉輸之官代民償逋毁邊方諸淫祠三百六十餘區所在學宫頽敝撤其材新之𢎞治四年用薦擢按察使調湖廣風儀整肅屬吏斂不敢犯㑹境内雨雪災異上疏觸時忌引疾乞休歸已而言官交薦十三年拜南京右僉都御史操江正月朔陜西地震水涌上疏謂變不虚生必有其應述漢晉以來宫闈内寺柄臣之禍陳時政八事又請豫教皇儲因薦侍郎謝鐸少卿儲瓘楊亷致仕副使曺時中堪居宫僚處士劉閔可布衣入侍東宫旋江西盗起勅俊巡視江西寧庶人貪譎忮害倍取禄米官校侵牟民利俊悉裁抑具奏乞斷大義特垂善處毋涉吳王几杖之賜叔段京鄙之求時濠雖横逆萌未著或以為過後卒如所言人服其先見云武宗即位起廵撫江西遭父憂不果正徳四年改撫四川時藍鄢之㓂方劇至即宣布聖恩勦撫並行屢以㨗聞㑹誅劉瑾俊疏賀且言瑾雖誅權又在近倖安知後無有如瑾者出請召用先朝舊臣劉健謝遷林瀚王鏊等以修復舊政并請擇取宗室育之宫中用事者滋不悦屬俊致仕許之命下朝論大駭科道交留不果未幾而兩川之冦復作矣世宗在藩邸乆知名及入繼大統召起為刑部尚書未入覲上疏乞親近儒臣與商可否以臻至治且言新詔之革所謂壊極而不得不革者也然貴近之臣或稱不便圖有變更未宜壊天下公議時近倖寖有用事者故疏及之既蒞任命侍經筵㑹暑罷講上疏言學貴緝熈禹惜分隂不宜輙罷屢上親大臣勤聖學闢異端疏太監崔文寵擅一時其私人李陽鳯犯法事下刑部文夤縁内降改付鎮撫司問理俊據法執奏不遣有㫖還送鎮撫司俊又奏言奉詔則違法守法則違詔臣能違詔不敢違法上怒雖不罪俊而陽鳯乞改錦衣獄俊以不得其職乃上疏乞致仕章八上乃允詔加太子太保給驛還鄉令有司給米輿夫嵗時存問時嘉靖二年也俊嘗偕楊廷和數争大禮大禮議定得罪者或杖死四年秋俊即家上書言古者鞭扑之刑辱之而已非欲糜爛其體膚而致之死也又非所以加於士大夫也成化時臣及見廷杖二三臣率容厚綿底衣重氊疊裹然且沉卧乆乃得痊正徳朝逆瑾竊權始令去衣致末年多杖死臣又見成化𢎞治時惟叛逆妖言刦盗下詔獄始命打問他犯但言送問而已今一槩打問亦非故事臣又見自去嵗舊臣斥逐殆盡朝署為空乞聖明留念既去者禮致未去者慰留碩徳重望如羅欽順王守仁吕柟魯鐸輩宜置左右臣衰病待盡無復他望不勝懸結不報又明年疾革復草遺表勸上懋學隆孝任賢納諫保躬導和且預辭身後䘏典遂卒年七十六時嘉靖六年也後一年明倫大典成追論俊附和廷和削其官其子逹以士禮𦵏之俊歴事四朝抗辭敢諫以禮進退始終一節性簡儉好讀書慎交逰接引後進惟恐不及士大夫論當世人物推俊於韓范富歐間隆慶初復官贈少保諡貞肅理學備考史通志明閩書閩中理學淵源考卷五十一
