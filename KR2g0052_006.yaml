body:
  text: 閩中理學淵源考卷六廣平府知府李清馥撰崇安劉氏家世學𣲖世住崇安之五夫號東族按崇安建陽劉氏合二族實伯仲分𣲖也二族以忠名世者得五人世稱為五忠云考是時劍建間密邇京室故家舊俗懷仁思而伸義憤者惟以三綱不振為深恥故其平昔家庭之際所告戒訓勵者孰有大於君臣之際乎忠顯公之使金營是二帝未北狩之時也乃能不辱朝廷卒之子孫族姓皆能以忠悃翊衛王家鞠躬臣節而屏山草堂二先生又以師資付授紫陽以聖賢之學相砥礪此其學問源流所以敻出於儕輩也今附滕氏祐五忠堂記於後以備參考焉劉聖仕先生民先劉民先字聖仕崇安人屏山先生叙其世譜略云劉居建之潭溪九世餘二百年矣其初京兆人唐僖宗時有為將軍者歲久名逸五季亂時有諱庸者南逰於此愛其形勝因家焉按熊勿軒撰劉氏族譜序謂庸即金吾上將軍翔所出今推為始祖以其近可考也蕩拓焚拂以啓山林二世而廬室完三世而田疇闢庸生光信光信生玉玉生文廣文廣生朝議公太素於是崇禮文篤經術謹逰從厚風化識者知其後必大云民先即朝議公子也敦謹有行從安定胡先生受春秋學晚以纍舉得官歸家教授學者至數百人作一枝堂潭溪之上與弟民覺奉母以終餘年既葬廬墓日夜哀悲鄉評尚之子韐韡韞閩書朱劉屏山集子文集劉莘材先生民覺劉民覺字莘材朝議次子也為人淳朴謙厚恪紹前修早自知名正奉逰學時普寧暨夫人老矣民覺嘗留侍以故不遑科舉之事夫人年九十六而卒民覺始終孝養敬不弛顔鄉評尚之耋老聚而請曰非公孰為吾黨指南民覺據師席二十餘年育英導秀多所成就忠顯之守㑹稽長樂嘗迎民覺就養欲請於朝官之民覺曰衰朽那復有此意其恬曠自適世網莫之能攖也年八十四卒後屛山為表其墓劉屏山撰墓表忠顯劉仲偃先生韐劉韐字仲偃紹聖元年進士調豐城尉歲饑多盜他邑率以捕殺希賞韐曰此饑民救死耳率豪右賑濟多所全活歷陜西轉運使攝帥鄜延夏人攻振武韐出竒兵搗之解其圍乞祠起知越州方臘陷衢婺越大震官吏悉遁韐曰吾當與城存亡冦至城下擊敗之河北盜起韐守真定單騎赴鎮招諭賊首柴宏時金人方謀南牧韐諜得實隂治城守以待變金人治梯衝設圍示欲攻擊韐發强弩射之金人知不可脅竟退欽宗善之拜資政殿學士充河北河東宣撫副使太原陷召入為京城四壁守禦使宰相沮罷之初敵之入真定也父老號呼曰使劉資政在鎮豈有此敵益知韐名及京城不守必欲得之宰相紿以割地遣韐使金營金人素知其名命僕射韓正館之僧舍正曰國相知君今用君矣韐曰偷生以事二姓死不為也金人退即手書片紙召指使持歸報諸子沐浴更衣酌巵酒而縊顔色如生金人嘆其忠瘞之夀聖寺西岡上遍題窗壁識其處年六十一建炎元年贈資政殿大學士諡忠顯韐莊重寬厚寡言笑與人交謙恭若有所畏至臨大事則毅然不可奪纍歷大藩事無巨細必親臨之為政愛人出於誠心求民瘼如去已病小民犯罪或越法縱舍至大奸則立斷不疑軍中家報有曰今日邊鄙多事只得盡忠死節餘不足言其素如此靖康死難之臣蓋韐為尤著云子子羽子翼子翬按翺之裔孫名頜者收峒寇有功諡忠簡名純者死邵武冦立廟封忠烈韐子子羽諡忠定孫珙諡忠肅故世號五忠劉氏云通志閩書郡守劉仲固先生韞劉韞字仲固以門䕃入仕歷倅三州典二郡皆有聲後以朝散大夫致仕築室縣南有臺榭花木之勝自號秀野與劉子翬朱元晦諸賢倡酬甚多時人謂之吟龍子子翔丞瀏陽秩滿不仕亦能詩有父風時人謂之詞虎忠定劉彥修先生子羽劉子羽字彥修韐長子以䕃補官韐帥浙江子羽年二十五佐以主管機宜文字用羸卒數百破方臘數十萬衆全其城歷知池州改秦州未行髙宗召赴行在除樞密院簡詳文字建炎三年大將范瓊擁强兵跋扈不臣與樞密院事張浚密謀誅之浚宣撫川陜遂辟為參議軍事至秦州立幕府節度五路諸將規以五年而後出師明年金人窺江淮甚急浚欲合五路兵進撓之子羽諌不聽比至富平與金人戰敗績力言當留興州以安關蜀收集散亡分布險隘堅壁固壘觀釁而動庶幾可以補前愆而贖後悔浚然之而諸將無敢行者子羽即單騎就道至秦州召諸亡將諸將聞命大喜悉來㑹命忠州防禦使吳玠柵和尚原守大散關而分兵守險金人知有備引去會秦鳳金房二鎮皆饑鎮帥吳玠王彥皆願得子羽守漢中浚乃承制拜子羽利州路經略使兼知興元府既至通商輸粟二鎮獲安除寶文閣直學士金人復攻金州彥失守退保石泉子羽急移兵守饒風關馳告玠列營以拒金金人從間道繞出玠後玠不能支遽還漢中全蜀大震玠邀子羽俱去子羽固持不可留玠先柵定軍山以守玠不從子羽不得已退守三泉從兵不滿三百乃築壘於潭毒山上儲粟十餘萬石積石數十百萬數日候騎報敵軍且至即下令蓐食遲明上馬先至戰地前當山角據胡床坐諸將泣請曰此非待制坐處子羽慷慨語曰將死於此諸將皆奮㑹敵乏食亦引去子羽與玠引兵合擊之墮溪谷死者不可勝計其餘衆不能自拔降者十數柵敵之喪失莫甚於此是時金人主兵用事者計必取蜀以窺東南其選募戰攻不遺餘力惟時為必守計者惟子羽與浚協心戮力毅然以身當兵衝將士感激爭奮全蜀卒賴以安四年坐富平之役與浚俱罷尋為言者所論責貶單州團練副使白州安置吳玠始為禆將未知名子羽獨竒之薦於浚至是玠上疏訟子羽功請納節贖罪得復原官提舉江州太平觀復為集英殿修撰知鄂州未幾召公赴闕使諭指西師且察邊備虛實子羽還奏敵未可圖宜益治兵廣營田以俟機會時又方議易置淮西大將且以其兵屬子羽子羽復以為不可遂以親老乞郡乃以徽猷閣待制知泉州已淮西軍亂議者反謂子羽實使然不責無以係叛將南歸之望遂以散官安置漳州十一年以張浚薦復原官知鎮江府兼沿江安撫使建議清野徙淮東人於鎮江撫以恩信兵民雜居無敢相侵者十二年復待制進爵子益封二百户竟以不附秦檜和議奉祠歸卒贈少傅諡忠定子羽平生慷慨厲節有忘身徇國之忠衆人惶惑失措子羽色愈厲氣愈徑遇事立斷凛不可犯料敵决勝雖古名將不能過之至其為政愛民禮士敦尚教化摘奸發伏不畏强禦而天性孝友接人樂易開心見誠豁然無纎芥滯吝意好賢樂善輕財喜施於姻親舊故貧病困厄之際尤孜孜焉朱文公嘗稱子羽在川陜雖盛寒必侵晨著單衣汗衫入教場射箭三百率以為常又言幼常侍側賔客滿座見其目覽書冊耳聽指授口供應對手答書疏頃刻之間五官並用百函俱發並無差錯真人傑也子珙通志建寧府志碑朱子撰劉公神道名臣傳郡守劉彥禮先生子翼劉子翼字彥禮少精敏力學用䕃補承務郎調秀州司録時朝廷割地議和遣人持詔取河北監司分畫地界韐鎮真定稱詔拒之靖康元年韐遣子翼入奏事賜對延和殿欽宗見子翼進止閒雅因而受知未幾除江西轉運使司歷轉宣議郎建州熊志寧范汝為相繼叛有㫖除子翼知建州道路梗塞或勸子翼從王師航海進子翼曰不可乃單車自崇安入賊方棲山守險所在屯布子翼﨑嶇行賊營以誠信諭之曰汝輩詿誤及此今王師且至若能自新釋兵歸農太守能活汝不然悔無及賊皆曰我輩生矣羅拜去王師尋下多所俘獲子翼分别善惡縱釋之賊首逸去子翼設方略購獲之尋知南劍州蠲減科斂一新郡治紹興二年應詔獻言忤當路奉祠俄以薦知撫州徙信州為人開明勤决而本之以恕所至簡易不擾甚得民心閩書郡志忠肅劉共父先生珙劉珙字共父少長從季父屏山受書知刻苦自勵以祖韐死節恩補承務郎舉紹興十二年進士中乙科纍遷禮部郎官中書舍人秦檜當國欲為其父作諡珙不亟奉行檜怒諷言者論去之檜死纍遷吏部郎權祕書少監中書舍人金人渝盟髙宗將興兵復讐一時詔檄多出珙手詞氣激烈聞者感奮泣下從幸建康兼直學士院車駕將遷臨安時江淮軍務未有所付衆望屬於張浚而詔乃以楊存中為宣撫使珙不書録黃奏論其不可髙宗怒顧宰相曰劉珙之父為張浚所知此奏專為浚地耳宰相召珙喻旨且曰再繳纍且及張公珙曰珙計國家故不暇為張公謀若為張公謀不為是矣再論愈力存中命乃寢孝宗隆興元年除集英殿修撰知泉州改衢州又改潭州兼湖南安撫使討平宜章冦李金孝宗賜璽書嘉勞於是湖南地方數千里姦盜屏跡三年召還除翰林學士知制誥兼侍讀因陳聖王之學以正心明理為萬事之綱上亟稱善擢拜中大夫同知樞密院事辭謝不獲乃就職因薦汪應辰陳良翰張栻請召用之孝宗可其奏既入西府日召諸軍將佐從容訪問盡得其材器所宜以待選用詔兼參知政事與陳俊卿同心輔政因奏自今聖㫖不經三省密院者所下之官皆請俟奏審乃得行孝宗不悅罷為端明殿學士在外宫觀改知隆興府江南西路安撫使明年除資政殿學士知荆南湖北路安撫使始至條上荆襄兵少財匱之狀詔即委珙措置珙因行視襄鄂兵屯並邊形勢盡得其實處畫各有條理明年遭內艱八年免喪乃復除知潭州安撫湖南淳熙二年除知建康府安撫江南東路留守行宫會歲水旱珙首奏蠲賦稅設法賑貸闔境數十萬人無一人捐瘠流徙者孝宗賜書褒諭進觀文殿學士五年屬疾請致仕臨卒草遺奏千餘言極言近習用事之禍且薦陳俊卿張栻可用卒年五十有五贈光祿大夫罷朝一日賜諡忠肅珙為人機鑑精明議論英發遇事立斷威不可犯而居家極其孝慈內外功緦之戚必素服以終月數在官為罷燕樂聞同寮有喪者亦如之在朝危言正色直前無避其忠義奮發不以死生動心在荆州時北敵亦每使諜者詗珙家世蓋知其忠義之有傳也所著有文集八卷奏議十卷內外制二十卷以學雅學裘為後劉平父先生坪劉坪字平父屏山先生嗣子用門䕃調邵武軍户曹遂力請復南嶽祠官坪少有竒質長事胡籍溪請問講學之要天姿孝友事生母卓氏盡孝鄉人化之先廬在屏山之下坪廣其觀逰種竹疏泉上下澗谷為退隱計復善修身悟古人日損日益之意自號曰七者翁名其齊曰七者寮每與朱文公諸賢倡和有詩集十卷子五人録學古學博學箕朱子撰墓志閩書縣令劉先生學古劉學古坪之子屏山之孫文公壻也嘗為臨桂縣令弟學博俱從文公遊考亭淵源録劉先生學箕劉學箕恬於仕進年未五十即南山之下家焉扁曰方是間堂若將終身為文髙爽閒雅得其家傳有方是閒小藁行世建寧府志劉正之先生學雅劉學雅字正之忠定公之孫馳騁東西為諸侯客已而以憤世嫉邪斥辱權要罷歸田里弟學裘郡守劉傳之先生學裘劉學裘字傳之忠定公之孫用父䕃補郎守撫州移守雍州有惠政後以疾纍得郡不赴終朝散大夫建陽劉氏家世學𣲖世住建陽之麻沙號西族按劉氏東西族二𣲖已叙述前編矣此不重述忠簡劉子誠先生頜劉頜字子誠建陽人與韐同祖翺之七世孫也頜紹興間為廣州參謀盜綦母謹和尚陷三水鎮帥兵剿捕後為淮東提刑金主亮趨淮東力戰死之諡忠簡弟崇之閩書文忠劉瑞樟先生崇之劉崇之字智父淳熙二年進士授福清簿梁克家帥三山檄攝幕甚器之與詹體仁等六人同薦於朝除定詳三司𠡠令所刪定官遷太府丞應詔上書論弭變五說除祕書省校書郎光宗內禪上書請朝重華宫除行太常寺丞歡兵部郎中朱文公罷經筵命從中出崇之率同列請留之辭極剴切僞學禁興力請外得荆湖南路常平使者嘉泰初起知贑州言者論周必大併及崇之因請祠久之除成都路提刑應詔條上蜀民利害九事已而除户部郎中領四川宣撫兩司節制未幾吳曦變作上表待罪請師平賊除荆湖北路提刑被論永州安置開禧中四川宣撫使安丙表陳崇之不汙之節詔復原官崇之天資頴敏居左孰讀書三十年未嘗移他所文章溫潤典雅有光制誥而用非其長論者惜之卒諡文忠號瑞樟先生子純閩書志建寧府忠烈劉君錫先生純劉純字君錫建陽人少年喜騎射以父䕃授沙縣簿歲大疫治粥藥存活之死而無收者作大塜瘞焉秩滿丞分宜復值歲旱極力賑救如簿沙時繼入京監和劑門紹定己丑閩冦晏頭陀等嘯聚汀郡殘破寧化清流將樂陷劍南犯建寧純適調湖北帳幹聞賊迫近其鄉里即歸散家財招唐石義勇千人討之樵守王遂請於朝命知邵武縣俾將所招軍往立官府收散亡軍勢大振事聞改宣教郎詔號其軍曰忠武與招捕使陳韡擊破連城潭飛漈諭降其七十餘寨頭陀計窮伏誅而邵武盜又有劉安國者先因民困貪暴鼓衆而起官軍不能敵而又無以招撫之坐是建寧復騷建守趙紡夫請於朝移純軍於縣命下即行得賊所募為首者二人斬以獻㑹旴守遣邑令將兵來援為賊所圍純斬數賊拔令歸又入富田剿其渠魁賊懼合諸寨攻純純令統制周喜領淮西軍繞賊後擊其巢俘獲甚衆安國就擒次日純率兵往招降下瞿賊為賊所得不屈死之事聞贈朝散郎加諡義壯郡人立二廟於邵武麻沙祀之後賜額忠烈閩書志建寧府郎中劉潤之先生滋劉滋字潤之景德中試開封禮部皆第一調知無錫縣通判福州仁宗時知南劍州州北黯淡灘善覆舟滋别開灘傍灌疏三巨洲鑿七盤石轉山曲二百餘丈以舒水勢自是舟行無患歷典九郡皆有惠政官至職方郎中纍贈開府儀同三司吏部尚書始滋未貴時嘗夢神人携印一簏令吞之印大小凡百餘顆滋吞至十四印文纍纍然見腹間後更中外十四任而典郡者九滋子同大理寺丞勳知臨江軍照河陽令孫元振曽孫瑋勉之瑋有詩名與劉子翬多所唱酬勉之别見本學𣲖閩書劉君式先生元振劉元振字君式少沉靜有器識季父照當任子將屬元振辭與其弟貺弱冠遊太學持身有禮衆敬憚之國子先生吕大臨遊酢皆與友善元豐中士子方尚文華元振獨沉涵載籍深造義理是以不合有司遂篤意養親放情泉石子勉之閩書子郡志朱文集按朱子撰聘君劉公墓表云公之曽大父諱滋大父諱照父諱元振此傳云季父照疑錯似當以朱子文集為據朝奉劉恆軒先生𢡟劉𢡟字子勉白水孫也博學通經文辭竒偉長受學屏山先生得其論著繼從胡籍溪遊始知為學大㫖自是易象天文地理律厯之奧無所不通受迪功郎任會昌西尉兼學事秩滿轉文林郎奉祠監衡州南嶽廟以朝奉大夫致仕杜門掃軌仰師聖賢鄉人子弟多所造就學者稱恆軒先生以子爚貴贈金紫光祿大夫所著禮記集說論孟訓解子爚炳炯郎中劉韜仲先生炳劉炳字韜仲與兄爚從文公遊文公編集程氏遺書炳兄弟研窮誦讀晨夜不息舉淳熙五年進士授迪功郎知應城縣好賢禮士修飾儒學訪求前令謝良佐遺跡創上蔡先生祠於講堂東隅朱文公為記再調劍浦丞專以仁義教化平易近民民有訟委曲訓戒之後有鬭者訴於官曰何面目復見公耶纍官兵部郎中朝散大夫乞祠間居誦讀不輟自號悠然翁所著有睦堂類藁若干卷四書問目綱目要略堂銘故事傳於世子填孫應李銓閩書縣令劉季明先生炯劉炯字季明慶元五年進士授進賢丞遷固始令早從文公學比掛冠倘佯武夷九曲間悠然自尋其樂焉閩書忠簡劉子時先生欽劉欽字子時伯醇子幼在襁褓中或啼哭示以書帙即嬉笑甫能言母梁氏教以古詩輒成誦不忘七歲日受數千言每夜達旦母憐而節之乃匿膏室中候寢熟復燃從蔡沈學精於易以祖䕃補官承事郎知嵊縣有政聲轉朝奉大夫出知饒處邵武南康時江汀邵冦竊發境內騷動欽募義勇𠞰捕誅其首惡餘悉縱還鄉事聞升殿中侍御史同知樞密諌院事歸隱武夷茶洞口築茶巖小隱堂為終焉計自號氷壺散人終朝請大夫諡忠簡所著有書經衍義文集十卷閩書郡志縣令劉子靜先生鑑劉鑑字子靜以祖澤䕃桂東令工詩文翰墨如題文天祥贊答尹虛齊僚諸詩深得風人之㫖鄧尤薦稱其一生琢對匠語洗削冶澤齒牙間纚纚有聲大率精切得意處前無古人至老皮毛落盡孤興兀然雷霹之琴大成之鐻潮湍激齧之山皆天然成趣不繩削而自合閩書郡志主簿劉希泌先生應李劉應李字希泌初名棨謹厚莊重博習修潔舉咸淳十年進士調建陽簿至元不仕與熊禾胡廷芳講道洪源山居十有二年後建化龍書院於莒潭聚徒講授厚給課試悉倣州縣法閩書縣尉劉子平先生銓劉銓字子平慶元五年進士博通詩禮學宗考亭尉臨川有聲尤工吟咏著傷時歌深悼世人不務本實穆然有返朴之思焉閩書備考滕氏祐撰劉氏五忠堂記曰郡之望曰劉氏其先仕唐宋為顯官者不知凡幾百人其功烈炳著以忠名世者合二族得五人焉其所自出則漢楚元王之裔由京兆遷入閩曰翔者居崇安之五夫曰翺者居建陽之麻沙翔八世孫曰韐靖康間以資政殿學士使金營金人欲相之韐作書與家訣自縊而死贈太師追封魏國公韐生子羽宣和間為徽猷閣待制與張浚協力拒金人以保全蜀卒贈少傅追贈魏國公子羽生珙在孝宗朝官至同知樞密院事立朝臨陳亡身憂國卒贈太師封魯國公此皆五夫之劉世曰東族也翺七世孫曰頜紹興間為淮東提刑金兵入淮頜死之又十二世而生純紹定間知邵武縣率兵破賊為餘寇所執不屈而死郡人立廟祀之贈太尉諡義壯此皆麻沙之劉世謂西族也是五公者或臨難或死節或立朝盡瘁事有不同其為忠一也故其諡也韐以忠顯子羽以忠定珙以忠肅頜以忠簡而純之廟號賜忠烈名之稱情其若是哉嗚呼偉矣人得天地剛大之氣以生養而為全人蓄而為德行措而為事業其在人國也平時則效誠宣力而為翊國之忠臨難則致命遂志而守殉國之節存乎方寸之微充乎天地之大行之一時之近昭乎萬世之逺使三綱不至於淪斁人極不至於破壞而天下後世永有賴焉蓋如是而後為全人如是而後無愧乎天地之生人矣五公者其養之厚蓄之深其措之而沛然者乎其足以扶三綱立人極位兩間而無愧得有生而獨全者乎况忠臣烈士世不常有扶輿間氣之所生非偶然也今以劉氏一門而為忠者有五竒勳大節髙爵鴻名纍數世而迭出此尤自昔之所罕見舉世難得者嗚呼盛哉祐嘗竊怪漢髙祖以仁厚得天下而後世未嘗有大惡如桀紂徒以强臣跋扈至於亡國今其末流子孫散在天下生於異代者猶烈烈間出為世偉人以扶植人極於不墜則其仁厚之餘澤詎可誣哉前此五公未嘗有祠且以世逺不得與四代之祭夫有祖宗如此而子孫乃使之泯然不得與血食於人心何如也祐姊壻太學生甌寧劉君澤韐十三世孫也以𢎞治己酉十月搆堂於屏山祠右設木主而奠焉榜其額曰五忠蓋崇先德啓後思而闡世澤於無窮其用意也逺矣堂成祐喜其事於名教有關非特可以勵劉氏後也作文記之文靖劉屏山先生子翬學𣲖按屏山先生為忠顯公季子家學相承一門忠節炳著外此不知師承何人惟朱子作墓表言公與胡原仲劉致中為道義交相見講學外無一雜言又為韋齊先生託孤則其源流亦可考矣文靖劉屏山先生子翬劉子翬字彥冲崇安人贈太師韐之季子以父任補承務郎辟真定府幕屬韐死靖康之難先生痛憤廬墓三年服除通判興化軍寇入閩境與郡將張當世畫計備衛如素服戎事者賊不敢犯年方三十自以哀毁致羸疾不堪吏責丐閒局主管冲祐觀以歸不出者凡十七年世家屏山下潭溪之上有園林水石之勝俯仰其間盡棄人事自號病翁獨居危坐嗒然竟日夜意有所得則筆之於書至聞人有片言之善則從容咨叩必竭兩端後生來問學則隨其器識告語成就無倦色間數日輒一走父墓涕咽或纍日乃返事繼母吕夫人及兄子羽子翼極盡孝友兄子珙幼敏嗜學先生教之不懈珙卒有立焉素與胡原仲劉致中為道義交每相見講學外無一雜言所與遊皆當世知名士朱韋齊且死囑晦菴師事之晦菴將冠先生命字祝詞晦菴嘗言某蚤以童子獲侍左右先生始亦但以舉子見期某竊窺見其自為與教人者若不相似暇時僣請焉先生嘉其志乃開示為學門户朝夕誨誘不倦先生深於易家有東西二齊東以復名西以䝉名一日晦菴侍疾請問先生平昔入道次第先生欣然告之曰吾少未聞道官莆田時以疾病始接佛老之徒聞其所謂清净寂滅者而心悅之以為道在是矣比歸讀吾書而有契焉然後知吾道之大其體用之全乃如此抑吾於易得入道之門焉所謂不逺復者則吾之三字符也佩服周旋罔敢失墜於是嘗作復齊銘聖傳論以見吾志然吾忘吾言久矣今乃相與言之汝尚勉哉晦菴頓首受教先生妻死不再娶以兄子翼幼子坪為後年四十七得微疾即入謁宗廟泣别母夫人前遍以書告訣素所往來者召其姪珙付以家事指示葬處既已則與學者論說修身求道之要作訓誡數百言彈琴賦詩淡如平日後兩日而殁學者稱屏山先生諡文靖有文集二十卷閩書行録名臣言宏簡録子宋史表朱撰墓聖傳論録四首易固多術或尚其辭或尚其變或尚其象或尚其占皆用也盡其本則用自應何謂本復是矣嘗竊為之說曰學易者必有門户復卦易之門户也入室者必自户始學易者必自復始得是者其惟顔子乎不逺而復稱為庶幾蓋本夫子嘗以復禮為仁之說告之矣顔子躬行允蹈遂臻其極一己既克天下歸仁復之之功至矣如何天下歸仁惟踐履實地自然洞徹為一顔子終日如愚論語所載惟發二問一為仁一為邦夫子答之皆極天理人事之大者原易之用內焉惟窮理盡性外焉惟開物成務顔子盡之雖無諸子之著撰謂之通易可也文中子言九師興而易道微九師之前未有為易之說者豈易道本於踐履非區區言說所能至耶是知復之一義為平白坦易之塗聖人善誘之上機學者用心之急務也余嘗作復齊銘曰大易之㫖微妙難詮善學易者以復為先惟人之生咸具是性喜怒哀樂或失其正視而知復不蝕其明聽而知復不流於聲言而知復匪易匪輕動而知復悔吝不生惟是四知本焉則一孰覺而存孰迷而失勿謂有本勞思內馳亦勿謂無悠悠弗思廓爾貫通心冥取舍既復其初無復之者蕩蕩坦坦周流六虛昔非不足今非有餘伊顔氏子口不言易庶幾之功默臻其極今我仰止以名斯齊念兹在兹其敢怠哉顔子曽子之孝立身揚名惟此一節而於聞道最為超警生死之際粲然明白蓋由始則因孝心而致敬終則因敬心而成已驗其平日服膺念兹在兹而已啓手足則見於戰戰兢兢之時發善言則存乎容貌辭氣之際皆敬之謂也戴經所記奧義甚多首文三語已盡其要學者非弗知也然皆有愧於曽子者行之弗至也恭於昭昭者孝之名也謹於昏昏者孝之實也求其名匹夫匹婦能焉核其實聖人以為難矣曽子曰養可能也敬為難敬可能也安為難安可能也卒為難斯須之敬人能勉强至於能安能卒非確然自信毅然必為未有能樂其常而至其至也此無他疑情未除也學者之害疑情為大彼窮搜博覽惟恐不聞者疑情未除也朝咨夕叩請益不休者疑情未除也博量揣摸求合乎似者疑情未除也情既有疑則中不安不安則輕聽而易移輕聽則不能尊其所聞易移則不能行其所知二者交亂其間方且以禮法為拘囚專精為滯著求其有始有卒難矣曽子逰聖門最為年少夫子與之言道唯諾而已夫豈有毫髮疑情哉宜其成就巍巍度越諸子矣曽子唐李翺自謂得子思中庸之學著復性三篇會理者稱其卓絶然差之毫釐異乎吾所聞矣其說曰人之所以惑其性者情也喜怒哀懼愛惡欲皆情之所為也情者妄也邪也妄情息滅本性清明又曰循理而動所以教人忘嗜欲歸性命之道也迹其推衍大約皆以滅情為言其言非不髙妙然非子思中庸之學也中庸之學未嘗滅情也夫情與生俱生果可滅耶情可滅性可滅矣今持一葉以示嬰兒與之則笑奪之則啼此喜怒哀樂之端也情之所發也與生俱生而欲滅之猶惡水之波而涸之其源益流惡木之花而􅎒之其根浸傷聖人不過節之防之止之不使其爛熳害性而已善養性者不汨於情亦不滅情不流於喜怒哀樂亦不去喜怒哀樂子思所謂中也即喜怒哀樂以為中不可離喜怒哀樂以為中亦不可如金石之有聲如飲食之有味非合非離中即契焉故喜怒哀樂之未發謂之中子思姑約此以明中非舍此而中可得也子思聖人標指固非一途前學以是流布後學以是進修孟子乃斷然言曰君子深造之以道欲其自得之夫以聖賢標指拳拳服膺自應有至何復名自得耶自得者得之於心也心無所得而蹈規守矩終出勉强不能從容優入聖域是學也父兄至愛不能發其端師友至密不能進其道必也靈襟中啓獨見內融洞洞然屬屬然如平昔之傳聞想像一旦親覩焉庶乎其可也夫學者之心發於憒憒其見必卓開於冥冥其詣必至故拙魯愚鈍為道之資智巧聰明為性之障真志立於懦真習養於徐真用發於常真樂生於淡軒軒之志久必墜皎皎之習久必疏揭揭之用久必變沾沾之樂久必渝是以學貴終始也千了萬通愈失真宗惟循惟默乃能自得回之愚參之魯在孔門所得最深皆用心於無所用若退而進者也去聖已逺自得之學湮沒無聞非唯學者之失也亦教者之過焉六經之言毫髮分辨聖人之意極口宣揚諄諄屑屑無舉隅善誘之方將以利之反以害之學者亦曰如是足矣理盡於此矣拾前人之咳唾遵舊轍以驅馳故思學廢於箋解省學廢於譏議悟學廢於揣度通學廢於偏黨默學廢於領略敏學廢於疑二六學廢而道衰矣孰以孟子自得之言啓之哉孟子有自得之言無自得之迹但言居之安資之深左右逢其源而已不可以意義形容也孟子漢書雜論班固作漢書惟紀最為嚴密事皆詳載於傳而撮其要書於紀固自名之曰春秋考紀其言有深意焉班固作史贊非獨詳於紀善也又重美之非獨略於紀過也又婉其辭其紀善也雖小善必録其紀過也非大過不書文帝之仁言儉德贊中總列十數條嘆曰嗚呼仁哉於景帝贊又曰至於孝文加以恭儉於武帝贊又曰文景務在養民非詳於紀善又重美之乎武帝之窮兵奢侈其贊曰雄才大略不改文景之恭儉詩書所稱何以加焉非略於記過又婉其辭乎元帝之號令溫雅成帝之穆穆之容皆見稱述者不以一失廢其他長也故曰雖小善必録吕后之寵産祿景帝之殺朝周皆略而不言者不以小疵玷其全美也故曰非大過不書史贊諸帝皆稱述獨髙祖贊推其世系運統而已無所稱也蓋以髙祖之盛德大業不假言而自著亦非一二言可贊也故贊衛霍不言征伐之功贊相如不論文章之美其他則片善寸長贊皆言之有餘易見不足難知故也朱元晦祝詞曰冠而欽名粵惟古制朱氏子熹幼而騰異交朋尚焉請祝以字字以元晦表名之義木晦於根舂容華敷人晦於身神明內腴昔者曽子稱其友曰有若無實若虛不斥厥名而傳於書雖百世之逺也揣其氣象知顔氏如愚迹參并游英馳俊驅豈無他人夫誰敢居自諸子言志回欲無伐一宣於聲終身弗越陋巷暗然其光烈烈從事於兹惟參也無慚貫道雖一省身則三夾輔孔門翺翔兩驂學的欲正吾知斯之為指南惟先吏部文儒之粹彪炳育珍又華其繼來兹講磨融融熹熹真聰開廓如源之方駛望洋渺瀰老我縮氣古人不云乎純一不已悵友道之衰變切切而唯唯子德不日新則時余之恥勿謂此耳充之益充借曰合矣宜養於䝉言而思毖動而思躓凛乎惴惴惟顔曽是畏遺訓曰木稚而曲其老不舒人稚不攻其成必愚故善學者必謹其初凡日用間業業乾乾散佚必恭執事必處中惟不自輕雖奴𨽻亦尊唾地如汙其畏如是寢則易安食則知味頮面奏圊脫襟屣履每每存之斯無過矣自朝至昏以一條貫焉勿謂末也本實由之毋悅於新毋駭於竒驟得必夸久而寖微習而察焉豈曰無徴出指於西底止必秦其次也頃刻之功初若不足外務奪之或斷或續及其至焉皆其所積故君子許其進而惰夫疑以自絶黃子厚先生銖黃銖字子厚甌寧人朱文公年十五六時與相遇於劉屏山齊中俱事屏山先生銖少文公一歲與文公切磋讀書為文略相上下一日忽踴躍猛進出語驚人文公嘆其超然不可追逐其後詩文益工文公每得其藁未嘗不賞嘆移日銖文學太史公詩學屈宋書𨽻學魏晉以前中年不得志於場屋遂發憤謝去杜門讀書清坐竟日間軌曳杖行吟田野間其於騷詞能以楚聲古韻為之節族晚節詩彌髙古其變化開闔恍惚微妙又不止於昔日也閩書集朱子文運幹歐陽慶嗣先生光祖歐陽光祖字慶嗣崇安人九歲能文人稱童瑞從劉子翬朱文公講學子翬甚重之文公亦遣子師事焉乾道八年再舉登第不赴趙汝愚張栻列薦於朝方欲召用而趙公去國後為江西運幹致仕卜築松坡之上湛然終老閩書劉白水先生勉之學𣲖先生偕籍溪初學易於涪陵譙氏後從龜山於毗陵其問業之廣久而有得則從元城劉公始故其成就卓犖為韋齊托孤晦菴師事之其聲氣感通豈偶然哉兹特著其𣲖系附焉聘君劉白水先生勉之劉勉之字致中崇安人父元振先生自幼强學日誦數千言肆筆為文滂沛閎闊凌厲頓挫踰冠以鄉舉詣太學時蔡京用事禁士挾元祐書制師生收書連坐罪至流徒名為一道同風實以鉗天下之口先生知其非是隂訪伊洛程氏之傳得其書藏去俟深夜同舍生熟寐乃探篋燃膏潛抄默誦涪陵譙天授嘗從二程遊兼邃易學適以事至京即往叩焉得其本末遂棄録牒揖諸生歸道南都見劉元城過毗陵見楊龜山皆從請業元城尤竒之留語數十日告以平生行已立朝大節以至方外之學無不傾盡先生聽受其言精思力行久之若有所得與劉彥冲及胡籍溪講論切磋為事其於當世之務若不屑焉亂後故山室廬荒頓乃即建陽近郊蕭屯别墅結草為堂讀書力穡無求於世賢士大夫咸髙仰之紹興間中書舍人吕本中與同列曾天遊李似之張子猷共薦於朝特詔赴闕劉屏山作招劍文送之既至秦檜方主和議恐觸忌諱但令對䇿不令入見先生知時不合即日謝病歸杜門不復出平居嚴敬自持而接物恂恂色笑可親臨事財處不動聲氣學子造門隨其材品為開說聖賢教學之門前言往行之懿故相趙鼎出鎮南州道出里門紆轡入謁坐語移日彌加嘆賞蚤與朱韋齊先生友善韋齊臨老命晦菴師事焉屬以後事先生經理其家愛晦菴如己子以女妻之所居有白水學者稱白水先生孫懋道南源委朱宏簡録表名儒傳子撰墓光澤李氏家世學𣲖子朱子撰特奏名李公墓志銘曰邵武軍光澤縣東里其處曰烏洲李氏世居為郡著姓其先有贈大理評事者諱鐸始以文行知名鄉里生太常博士誥始發進士第卒贈朝請大夫陳忠肅公賢之稱其率真樂易有古人風其仲子深紹聖間以論斥時相之姦與任公伯雨俱入元祐黨籍季曰處士藩隱處不仕其葬也修撰李公䕫實銘之蓋自其先世所與交逰姻好盡一時知名士故其子弟見聞開廓趣尚髙逺不與世俗同若特奏府君諱純德字得之則處士之長子也按李氏族系文公叙述詳矣上官氏祐稱光澤一邑由西山李先生得道南之緒大倡斯道月洲雲巖教音嗣布與考亭師友濟美當世而過化之澤浹乎人心流風餘韻猶有存云兹再備録於編博士李先生誥李誥贈大理評事鐸之後誥舉進士第官至太常博士卒贈朝請大夫陳忠肅公瓘賢之稱其率真樂易有古人風弟詳子深孫純德曽孫吕𤣥孫閎祖閩書寺丞李自明先生詳李詳字自明幼警悟善屬文議論純正登嘉祐八年第知潯州立學校革夷俗官終大理丞邵武府志朝散李叔平先生深李深字叔平登熙寧九年進士第調濟隂簿歷鄱陽遂平二縣以清慎稱召為編敕所詳簡役法文字與蔡京章惇廷爭奪一官已叙復遷朝散郎陛辭以言事論斥時相之姦與任公伯雨等罷入元祐黨籍安置復州四年移建昌軍改青州五年復官有杭州集二十卷弟勉子階郁閩書志邵武府縣令李安道先生勉李勉字安道舉進士知尤溪順昌二縣素負氣節多忤於時遂謝事休致亦入黨籍閩書郡守李進祖先生階李階字進祖崇寧二年禮部第一特奏名安忱對䇿言使黨人之子魁南宫多士無以示天下遂奪階出身遇赦復官調鹽城尉建炎初攝臨安府比較務州卒陳通脅叛階叱之遂遇害事聞贈右承事郎與一子官閩書特奏李得之先生純德李純德字得之處士藩之長子少治周禮兼左氏春秋為文簡古不逐時好事親至孝篤友諸弟遇族黨有恩意少有忿爭即為居間極力平處不令至官不幸死喪則為經理家事而任其婚嫁之責有以惡聲至者未嘗與較至周其急輟衣食不恤也諸弟嘗問善人之道答曰臨事而無隂據便利之心斯可矣又嘗語人事有當為力雖未及亦勉為之若必有餘而後為則終無時矣此其行身及物之本意也平居方嚴不妄戲笑性敦厚質實發言處事不以幽顯物我為間樂聞人善而務掩其惡所與交皆巨人長者從弟郁嘗面嘆曰兄於答問若不經意而受其言者反覆十思終無以易紹興五年以特奏恩將入奉廷對先卒朱晦菴為作墓銘子吕閩書邵武府志朱子文集李淡軒先生吕李吕字濵老號淡軒深之從孫蚤孤事母孝育弟妹有成聚族千指昕夕序揖致禮自少至老不以寒暑少變幼從學於從父郁郁學於楊龜山家傳逺有端緒淳熙六年年已晚見朱文公於廬阜遂為講學之友邑令張欣者病已無社倉以其事就吕圖焉吕為條畫精明綜理縝密文公為之記吕學甚富尤深於易每言易在識時和之以義茍非真知義之所在而喜言變通反害於易矣所著有周易議說淡軒集子閎祖相祖壯祖孫方子俱見朱子學𣲖閩書邵考亭淵源録武郡志縣令李守約先生閎祖弟相祖壯祖李閎祖字守約别號絅齊吕之長子蚤授庭訓與其二弟登晦菴先生之門篤志强力精思切論晦菴延之家孰以訓諸孫為編中庸章句或問輯略登嘉定四年進士廷對發明所學不逐時好調靖江之臨桂簿提刑方信孺待以國士漕使陳孔碩引以自輔兩臺之事咸倚以决暇日即詣學訓迪諸生士習丕變調福州古田令終廣西經略安撫司幹官黃幹李燔張洽陳淳皆敬重之有師友問答十卷李相祖字時可嘗以晦菴命編書說三十餘卷辨質詳明用心精切平居謹飭雅言矩步見者為之肅敬李壯祖字處謙初以書見朱子求教朱答書嘉其有志遂語以為學之要後與兄守約同第進士調閩清尉真西山薦之稱為典型人物州牧李公謹先生文子李文子字公謹方子之弟亦從朱子學紹熙四年進士歷知閬潼二州吏譽藹然持麾蜀中二十年以道學倡蜀人宗之著蜀鑑十卷道南源委録考亭淵源李西山先生郁學𣲖朱子答李濵老吕書云某少時讀程氏書年二十許始得西山先生所著論孟諸說讀之又知龜山之學橫出此枝而恨不及見也既而得從何兄叔京逰乃知足下蓋得其家傳者是時家居西距髙隱不逺不得一往質其所疑徒往來於心不忘云刪定李西山先生郁李郁字光祖光澤人元祐黨人朝散郎深之子幼不好玩坐立必莊從舅氏陳忠肅公學踰冠乃見龜山而請業焉龜山一見竒之妻以第三女是時龜山以程氏說教授東南一時學者翕然趨之而龜山每告之曰道之所以傳固不在於文字而古之聖賢所以為聖賢者其用心必有在矣及請見於餘杭則其告之亦曰學者當知古人之學何所用心學之將以何用若曰孔門之學仁而已則何為而謂之仁若曰仁人心也則何者而謂之人心公退求其說不合因取論孟讀之蚤夜不懈十有八年乃渙然有得龜山蓋深許之龜山沒以所學淑後進亦曰學者於經讀之又讀於無味處益致思焉至於群疑並興寢食不置然後始當驟進耳陳默堂稱其學口目俱到未見其比遊太學紹興中以遺逸召對陳當世大務髙宗改容傾聽補迪功郎除敕令所刪定官丁憂服闋會秦檜用事自度不能俯仰祿仕築室於邑西山家計屢空曠然不為意當世賢大夫益髙仰之辟福建帥府機宜文字日訪民間利病告其長而興除之一日帥欲毁民居數十為列肆酤酒要利爭之不聽以老病謝歸帥慚謝强留卒於官年六十五先生天資粹美涵養有方誨人無倦色自奉甚約而事親極其厚承朝散公遺命為其叔父庭之後庭卒毁瘠如禮治喪必誠必敬兄階罵賊死先生事嫂如母撫其子女如己出凡世務人情官政文法以至行陳農圃之事靡不習知所著有易傳論孟遺藁及遺文數十卷藏於家學者稱西山先生朱晦菴表其墓曰聖賢逺矣然其所以立言垂訓開示後學可謂至哉顧自秦漢以來道學不傳儒者不知反己潛心而一以記覽誦說為事是以有道君子深以為憂然亦未嘗遂以束書不讀坐談空妙為可以徼幸於有聞也若龜山之所以教與西山之所以學其亦足以觀矣豫是以著之而并記其行事後之君子尚有考焉道南源委朱子文集縣令張叔澄先生彥清張彥清字淑澄浦城人紹興元年進士初主光澤簿教授泉州丞安福用薦者改秩知慶元縣彥清生紹興之季長於乾道淳熙間初從朱文公遊得其大㫖及仕光澤與隱君子李濵老吕遊質疑辨惑造詣日深其為人以孝友忠信為根本潔亷徑挺為質幹親蚤殁恨養弗逮不茹甘服美者終其身女兄未嫁捐所有資之少從鄉先生徐君翷學徐喜其開敏欲妻以女未及而死既與薦有富室將女之彥清曰忍負徐公仕雖久家無旬月儲歲暮貧且迫不肯茍受嘗被檄試士三山時僞學之論方熾同列以是發䇿士子希主司意爭詆訾先儒彥清獨取持議不阿者與其選陳丞相自强嘗校文于建彥清其所取士也及自强為相屢欲鈎致彥清彥清弗屑就及陳敗衆始嘆服有守其施之政則自始仕以勤民為心慎於治獄曽被臬司命往鞫疑案將至微服徒行訪得其寃狀至獄破械將釋之吏爭不可弗聽未幾真殺人者獲於他邑彥清亦絶口勿言吉安峒蠻竊發燬永新蹂龍泉距縣不百里彥清佐其長聚兵防之蠻詗知有備引去俄傳冦且至彥清遍諭居人慎勿動己而傳者果妄郡檄彥清行視永新既至餓民纍纍請加賑恤未報而命彥清督其租彥清歎曰此豈催科時耶晚宰慶元甫至而目眚作以疾請主管台州崇道觀真文忠公銘其墓閩書府志建寧通志閩中理學淵源考卷六
