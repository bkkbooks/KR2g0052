body:
  text: 閩中理學淵源考卷五十七廣平府知府李清馥撰泉南明初諸先生學派泉自朱子過化之後人才蔚起明初諸賢大都抱道守義恬於仕進而崇尚經說範圍禮俗猶然清源别𣲖遺風也今志乘可考者張氏廷芳首著易說陳氏道曽精邃易學趙氏復以禮教倡鄉閭莊氏逢辰以朱學式後進其餘或隱身明志或秉節傳經各著顯晦之遭祗求立身之的要皆根柢乎先民矩度與遺世絶俗者異矣逮後蔡文莊先生獨倡宗風而紫峰淨峰次崖紫溪諸公相踵起紹源濬流漸摩數世遂成閩學一代人文之治回溯當時清源别𣲖不更昌大而益光乎語云山川之秀有開必先則國初諸君子皆有啓迪衛道之功不可無述也今併録出以備考訂焉張先生廷芳張廷芳晉江人世家城南方山下父謙齊以文學召為石井書院司紏廷芳世其業以講明理學為己任冠婚喪祭一遵朱子家禮自號退密翁以見志嘗著易經十翼章圖藴義十卷未上卒於家泉郡志雒閩源流録趙莊節先生復趙復字無疾晉江人隱邑之孤山博通經史不求仕進泉俗冠婚之禮率敝於侈靡喪葬之禮多壞於浮屠無疾惓惓以古禮為之倡人多化之卒年九十五門人私諡曰莊節先生雒閩源流録舊郡志閩書莊士明先生逢辰莊逢辰字士明晉江人元季躬耕飬母雖在亂離中不釋書卷母卒喪葬一據朱子家禮洪武初或勸之仕不答日惟教子讀書後進多師之稱靜齊先生子琛泉郡志閩書州判劉子中先生嵩劉嵩字子中晉江人博通經史所為詩文清新竒古不俟思索人謂其有謫仙才值元季不仕磊落不羈以詩酒自娛家無宿儲而處之泰然有知其貧而餽之者輒正色以謝或受所可受即送酒家及賙親友之乏者洪武初以賢良方正薦授廣西賔州判官卒於官旅櫬不能歸州人葬于州之門外泉之名士多出其門所著有中齊集泉郡志學正陳端誠先生道曽陳道曽字端誠晉江人祖章應洪武四年進士以學行聞歷官禮部主事道曽性資朴茂邃於易旁及諸經子史有文名操行卓然不茍徇流俗登永樂十六年進士改庶吉士自陳願授教職改吳縣教諭升瑞州府教授遷無為州學正所至以師道自重衡文湖廣浙江山西俱以公明稱卒于官所著有吳下集筠陽濡須等集泉郡志陳汝納先生亦言陳亦言字汝納晉江人元至正間自古田侍父瓊來官本州鹽場因家焉刻苦力學貫穿經傳子史於詩賦尤工洪武初世路清平猶不樂仕進日惟與蕭子玉趙應嘉趙仕寬輩相往還講論吟咏所著有潛齊集泉郡志閩書趙應嘉先生士亨趙士亨字應嘉晉江人元季隱九峰山杜門讀書以求聖賢之學父早喪明母復老病奉養周至湯藥必親纍嵗不少懈父母相繼沒居喪盡禮廬墓終喪乃歸教授于鄉時山冦呂光甫嘯聚剽掠所至焚燬獨戒勿犯趙先生閭舍洪武初由人材薦授繁昌縣仲窪河泊官强赴焉尋引疾告歸泉郡志徵君陳柏崖先生瓛陳瓛字微仲號柏崖由福州來家晉江性孝友不求聞達工詩詞宣德間纍召不起號為徵君按徵君為宣德間隱德其著述藝文志莫考矣馥一於前嵗得徵君送先六世祖朴菴府君之官序文篇於從祖茂夫先生家附在族譜鈔本後序末題云景泰元年庚午九月吉日閩郡陳瓛序序中自云與朴菴府君素相知云其序文節略載斯編清溪李氏家世學𣲖卷末乾隆丁丑五月下浣清馥謹識夏西仲先生秦夏秦字西仲晉江人或云元進士不知何許人避亂來泉先館涵江後居青陽授徒自給文以行重諸家志多出其筆洪武十五年以儒士召至京師稱老疾辭歸郡守胡器敬重之每來訪蔥湯麥飯共溫飽而登髙眺逺念及民間之未炊煙者胡守行贈以詩曰離筵對芳草去路繞青山日暮雙旌逺邦人拭淚看得此而守名益顯都下傳誦之以為二十顆珠也胡後歷官祭酒至永樂壬辰西仲猶稱郡庠正賓九十六翁云李氏叔元撰青陽五先生贊曰青陽祭於社者五夏李蔡以德莊以功餘不乏通顯瞪乎後矣從西仲者碩士張德亨里人始知有詩文之學云李氏叔元撰青陽五先生傳陳白齊先生陳白齊名未詳按李氏叔元撰陳處士約齊公墓志云陳白齊倡道於石井書院其弟文齊以行業佐之其名并籍貫待考李鹿巢先生文集吏部楊先生端儀楊端儀晉江人永樂三年鄉薦苐一四年進士歷官吏部主事泉郡學科目題名碑記云朱都憲鑑楊御史智蔡文莊清趙提學珤楊吏部端儀皆由省元入仕學識淵源行檢醇正有功來學數君子祠于鄉賢昭于碑刻率皆先實後名者咸可稽焉按楊公事實未詳今觀碑記側於蔡趙諸公之列共稱學識淵源碑立在明正德十六年郡守無錫葛氏恆里人留氏志淑田氏嵓同刻石者留田二公皆鄉之望可見鄉評亦同云朱簡齊集侍郎楊松軒先生輿楊輿字士載號松軒晉江人父曜宗經學純正仕至長史引年家居屢以忠君孝親為鄉後輩言之為文溫潤典則輿幼好讀書未弱冠能屬文通五經尤長於春秋子史百家莫不通究嘗言場屋制度過嚴遂與徵士陳瓛溫良朱鐸蔡翼何祐輩為友不求聞達建孰授徒門人數百多有學成亦不應舉輿召養於學校者戒之曰爾可比樊籠外者耶厥後如林同莊諌丘璧皆以科名顯宣德乙卯上命進士黃某纂修實録以輿有三長為郡總裁實録成郡守蔡錫以輿明春秋經薦授惠安訓導丁內艱服除以學行純篤擢邸府伴讀王入繼大統邸臣皆䝉顯秩獨輿出為處州知事值山寇發巡撫委輿捕治設方略連破沐溪方竹賊巢九處事聞召見文華殿問民情苦樂對曰無苦民事則民不苦歷升南京户部右侍郎天順改元謫永州廣西苖賊滋蔓輿發䇿備禦寇不入境一時政教畢舉癸未入覲引老乞歸燕賜甚腆詔有司加禮焉家居十四年與朱簡齊鑑相友訓迪子孫力學治家嚴肅非禮行則不入公門於蒸嘗則嚴潔承祀有問學者則條陳本末人樂近之所著有松軒集朱簡齊志其墓閩書朱簡齊集郡志博士張先生寬張寬晉江人正統丁卯舉人四擁臯比以醇誠博雅為名博士所至與諸生講易娓娓皆性體心宗臺使輒署上考而甘隱乞休嘗自題曰質不美皆困學而知貌不莊唯正道自持不敢虛天之賦豫而尚敢較位之崇卑有司為立坊表曰翀霄閩書州牧楊思明先生智楊智字思明晉江人幼有大志既領鄉薦聞臨漳林䝉庵有性理學往從之遊三年歸登天順八年進士擢南京監察御史成化四年客星變為彗星智上言妖彗示變災異迭至自非君臣恐懼旁求直言改革弊政進君子而退小人不足以弭天變宫闈之事臣不敢言望陛下深自省察裁處其在廷大臣南京守備成國公朱儀參贊機務兵部尚書李賔並猥瑣無當不足膺根本重地吏部尚書章綸則遣子應元冒貫京衛軍餘欲覬京闈之薦刑部侍郎王恕則娶指揮妻旻氏為繼而甘偶失節之婦工部侍郎范理外似朴而內姦貪大理寺少卿金紳喜徇私而多賣法應天府尹畢亨夤緣擢用衍聖公孔宏緒之淫欲驕恣凡此妨國病民皆足以召致天變疏入遂賈衆怨朱儀尤惡之㑹郊祀百官赴內府光祿寺㸃齊日尚未昃儀令人早鑰禁門智不得出為內臣邀宿儀發其事以奏有㫖械京問擬上以郊祀重事而智不謹有玷風憲特降三級為廣西布政司照磨久之轉化州知州卒于官智歷仕未久其志節已卓然可稱黃氏仲昭稱智醇厚恭謹平居春風襲人義激於中則如秋霜烈日凛不可犯歐陽子所謂氣剛色仁思明有之泉郡舊志閩書縣令鄭𢡟中先生馞學𣲖按明初泉南傳習𣲖系多無可考惟朱簡齊先生年譜載鄭𢡟中方從善髙顯宗周太初諸公皆受簡齊之學者數公惟鄭氏有傳餘亦未詳維時風尚朴厚人文方興觀簡齊平生立身本末以忠孝承家退身數十年如趙氏珤莊氏恭皆公奬藉在友教之列論者謂為一郡風教之倡不亦宜乎虛齊先生未發解時尚及見公其序簡齊之文謂公自幼至老講學弗倦以明其理力行匪懈以踐其實故能於父子君臣彛常大義各盡其道厥後王氏宣等為請祀于鄉最後何鏡山黃石齊蔡獻臣諸公同揭請諡雖時議未從然而一代之公論可審矣謹備列著之於篇縣令鄭𢡟中先生馞鄭𢡟中名馞以字行晉江人洪武丙子應天鄉薦授知程鄉治先禮義不尚法律民謡頌之程鄉民鮮知學懋中至首作新學校親為生徒講解自是始有登第者一日感疾戒其子具湯沐正衣冠端坐而逝民哀慕之立像於漢令曽芳之祠合祀焉朱簡齊祭之文曰先生懷忠敬以為徒蓄詩書以自娛踐履篤實確乎不可以為迂宅心孝友誠哉所謂君子之儒泉郡志朱簡齊集都憲朱簡齊先生鑑朱鑑字用明晉江人父則文以孝著稱鑑成童刲股愈父父竟不愈哀毁逾常力貧奉母常遊鄭𢡟中髙宗顯周太初諸先生之門永樂中以舉人授蒲圻教諭宣德初擢監察御史巡按湖廣時副使僉事不行分巡屬吏殃民無憚鑑請如故事周巡所屬以安民察吏具得施行梅花峒賊久剿無功鑑詣諭皆解散湖湘風俗務外貨殖男女過三十尚無室家鑑申明洪武禮法旬月之間結親者動萬計考滿代歸正統初復命巡按廣東奉命録囚多所平反招撫逋叛甚衆禁奸戢暴所至肅然代還朝命成國公朱勇簡都指揮等官三百餘員習孫吳兵略歷代臣鑑等書擇御史有文武材者董其事右都御史陳智推鑑鑑乞開設武學以典武科奏可遂為定制七年用薦擢山西布政司左參政權璫王振擁大駕北征鑑上疏懇留極言敵勢猖獗北情不測時大駕已出不可復止土木之變景帝以郕王監國升右布政使尋進右副都御史巡撫山西保障雁門鑑垂涕憤恨以君父之讎不共戴天上疏言額森奸詭百端殺掠無已復假和親往來偵伺蓋以送駕為由則必開關迎接稍示拒抗彼必有辭彼謀既深我慮宜逺宜急擇將練兵暫停中貴監軍假以生殺賞罰重整散漫之兵復募壯勇之士重懸賞格厚酬爵祿再徵勤王之兵夾攻並進戮力復讎庶大駕可還敵兵自退又切見太監王振毒亂天下震驚神器自江南草寇生發皆以誅振為名夫事歸朝廷則治歸宦官則亂為厲之階莫甚於此昔髙皇帝與羣臣議事必屏去左右恐泄事機伏望聖母陛下郕王殿下念祖宗開創之艱將相披臥之苦急立儲君選智勇託忠義早革內侍之權再造中興之業庶雪前恥以圖後功疏入太后讀之至於泣下及英宗北還景帝敕邊將出兵掩擊北人鑑上疏言額森慕義請和送還太上彼以誠來我以誠報彼盟未叛我兵先出失信啓釁深為未便詔嘉納焉後景帝廢太上皇子自立其子為東宫鑑貽內閣陳循書責之言前者至尊蒙塵宗社安危非得長君人心未定姬周輔成故不得已今鑾輿既歸厯數有在委裘而治亦無不可太子仁孝天下共知在廷文武羣臣共立不能夾輔烏可易置抑僕復有言陛下於太上皇論骨肉則當避位以全手足論尊卑則當固讓以盡君臣乃藉口防微反為幽閉珍羞節其日膳雉堞增於宫墻是可忍也孰不可忍循省書怒甚鑑亡何乞致仕歸英宗復辟鑑念君父大恩詣闕上表賀時石亨以奪門功荷特眷銜鑑前劾失機疑鑑欲復仕於上前極力排詆上以籌邊老臣無所闕仍賜致仕鑑厯官中外凡三十年諫疏至數十上歸里凡二十餘年年八十八卒賜祭葬所著有願學藁行於世明史年譜備考何鏡山先生撰簡齊朱公年譜序略曰某讀史至司馬溫公傳平生所為未嘗不可對人言輒廢書而嘆曰嗟乎詩稱旦明傳首慎獨古昔聖賢於衾影莫知之地蓋三致意焉洎自世降而下學者樂為致飾以相競於翕訿詭隨之途義利攸分不堪自問豈復播以示人茍非詣力精深卓然天定鮮有不為流風習俗所靡者觀公之自少而長而壯而老既致身以事父復力貧以供母精勤王事養退引年效疆場之孤忠賦遂初之雅志若自微而顯者言之則刲股和粥露頂籲天是可質之神而何不可以示之民倡議立儲移書執政是可以孤行於一時而何不可共白於後世故其追叙生平也大書特書分年别月周旋語默細大靡遺是非道貫心誠卓然天定自慎於衾影莫知之地曷克及此名山藏臣林傳贊曰朱鑑時當倥偬有守邊功且其意在上皇而事不詳士大夫之口豫讀其私傳家譜因為載之鑑上循書足振朝議之靡不見傳說而疏名賞金者獨著于世豫得不為之扼腕耶黃氏河清曰詳公之世有足隂維社稷動天地而感鬼神者惜彭惠安録本朝名臣於公偶遺之也余考吾學編名臣記弇山賞别集都御史表亦俱未録余故備書以俟補録者詳見清源文獻王氏宣序公行實略曰土木之變郕王監國廷臣皆謂宜承大統以安人心而公獨以邊逺孤臣上疏太后請立儲君辨大義於狐疑之秋越易儲詔頒公雖矢石疆場間憤激馳書切責宰臣極言廢立之非且言於上皇論骨肉則當避位以全手足論尊卑則當固遜以盡君臣蹇蹇諤諤言當時之所莫敢言亦言當時之所不可不言知正綱常罔恤忌諱知盡臣職罔顧身家當事果欲謀擠而公以懋勳至誠格於九重得免于禍云縣令李先生紹學派按泉自明初永樂間陳氏道㑹以易學名而立說則自張氏廷芳著易經十翼圖藴義為始志乘載先生在正統間以嵗貢為合浦令邃於易餘事實未詳今考其門徒𫝊氏凱亦深於易其侄汝嘉承其家學者至雁山先生雍尤以師道自立林氏龍峰其門人也彼時虛齊倡明易學尚未顯著而諸先生遞相講明如此可知泉之經術淵源有漸矣縣令李先生紹李紹晉江人按紹在正統間嵗貢後為合浦縣令邃於易主政傅時舉先生凱傅凱字時舉少年材器拔萃究心易學成化十四年進士授户部主事提督天津等八衛督催南畿浙福財賦以賑西北饑旱事集而民不擾謝政歸日與諸士講習有文譽四方求文者踵至子浚孫楫泉郡志清源文獻參政李雁山先生雍李雍字欽讓號雁山晉江人舉𢎞治六年進士未謁選請告歸養林龍峰同曽往受學焉親終出仕廷議以雍篤孝清苦特薦吏部授驗封主事時人謂之赤腳吏部轉文選郎門無私謁正德初逆璫煽禍時時欲樹置其私人雍介然抑之為附瑾者所忌出為南寧太守時在吏部已九年矣臨行蹇驢敝笥而已至南寧因俗為政不立赫赫名值嵗艱請于朝減民租十之四瑾誅清聲暢蔚擢廣東參政㑹枹鼓起巡撫都御史林廷選手書致之雍躬履戎行不遑啓居遘疾卒電白官舍南寧人祠雍名宦載之郡志閩書參政李菊泉先生汝嘉李汝嘉字士美號菊泉父松巖二嵗而孤祖母陳氏苦節鞠育縉紳大夫若修撰羅一峰先生為之立傳賦詩松巖後讀史知大義遂為鄉邦領袖汝嘉比長就學乃從叔父合浦令紹日記經傳數百言為文下筆立就舉天順甲申進士授户部主事有貴幸侵民田者朝命覆之得實奪以歸民𣙜湖湘商舟清兩廣財賦搜剔奸蠧無敢私干尋升金華知府道聞母喪歸服闋改衢州修建郡邑二學均徭役賑貧乏葺武備雪寃滯建橋梁衢人頌之後升浙江參政致仕孫繼芳以鄉薦授六安州學正擢乳源令以平賊功升刑部主事歷官貴州僉事備兵思石以參議致仕壽八十餘繼芳醇深有度簡靜自守弟繼華以鄉薦知始興縣有政績始興載之名宦所著有四書日講閩書閩中理學淵源考卷五十七
