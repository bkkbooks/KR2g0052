body:
  text: 閩中理學淵源考卷五十八廣平府知府李清馥撰學憲趙古愚先生珤學派按古愚趙先生成化間人物也為虛齋先生前輩其治躬敷政重名教尚氣節洗寃恤患鞫訊如神惜遺事湮沒者多而發明經書諸著作亦散佚無傳矣鄉先生每三復致愾有以哉今考志乘所載蒞官粵東時與陳白沙論學辨難見於白沙往復之書其在家鄉惟羅一峰謫泉之時相與上下議論羅公纍日過從一盂一豆日晏忘食講究不輟先生故以經術名而羅公以直節宿學共租淬礪一郡風教之開二公蓋亦有助焉後之人能無逺遡其典型哉再考先生門徒莫詳惟一臞王氏宣集中書薛文清讀書録後曰余年二十二壻吾泉廣東提學僉憲趙先生家見薛公讀書録若有契於心遂求於舅而得之以歸云考廣東僉憲趙先生即古愚先生也王公平日必經側聞講論者姑附學派之列待考焉學憲趙古愚先生珤趙珤字德用晉江人宋宗室懿王德昭後丞相趙公汝愚裔孫生九嵗而孤依女兄適粵人劉簿者益刻勵為學尤尚志節雖貧窶不妄納交人粵有富人介簿求通先生不應謂不義而厚行將及矣遂自粵歸亡何而富人果敗其先識如此成化元年領鄉薦第一明年成進士授刑部主事先生精於鑒文能知人富貴貧賤壽夭如劵合無或爽者嘗校士禮闈得餘姚謝遷試牘詫曰宰相才也大廷之對必褎然舉首遂力薦主者後俱如所鑒出為粵東提學僉事便道過家適羅一峰謫官泉州纍日相過從辨論不厭每旰設食一蔬一豆欣欣如也在廣時日以學術提醒士心校士諸州每卜其器業於文而引之所嚮士賴以成就者甚多又嘗校文瓊州士第悉下無與省闈試者諸生譁然有司亦為之請先生曰若不知也吾殆以全若占若等文氣有眚焉逺涉其不利乎衆不謂然固以請乃聽試當往道海上漂溺失舟人始驚歎趙先生神人也先生故以經術名顧又精吏治有粵豪漁食閭里持吏短長至姦人婚娶女吏不敢問如是者數十年先生聞按獄得實而置之法為學原於人倫言論風旨多足感動人者尤重禮教是時新會陳白沙獻章論道江門先生嘗訪之訂以經訓之言間不合必移書再四白沙每論教人禮非所急先生力正之曰昔胡餘千不教人習四禮論者至今以為疑流風易移何輒開斯路乎白沙謂德用之心即一峰不欺之心復書曰一峰死僕哭之慟以為今而後無復有如一峰者不謂於執事見之嘗登崖山見元張𢎞範勒石以詩斥之親固貧又復早背諱日不能知常祭以巳之生辰必涕泣不自禁在官嫁族女者三娶婦者五殫資以給而宦槖固蕭然也年方強卒於官所著書有四書管見禮經解疑綱目便覽宋史集要諸編悉燬孫子復零替蓽門蓬戶而已獨其遺言逸事至今人士喜談而樂道之丁氏自申曰某自束髮以來即知有先生輒寤寐向往者久之間訪其遺文得所謂椒軒記讀之蓋先生初第時作也其言耿然有礪名砥行矜古振俗之志而先生立身居官大節槩可想見至其文字沖雅淵懿允矣造道之言惜乎不可多得聞先生卒官嶺表飄零以歸重遭回祿之厄頃讀其外孫周君所為傳與某平日所記聞者尤核且確自周君之傳出而學校鳴之當道旌之學士大夫羣而和之先生之潛德久而彌芳矣顧采風未逮而曠典尚缺春秋俎豆邈焉未舉豈非後生者與有責哉考吾郡在成化間前有先生後有虛齋二先生里居相望先後發解登第又相繼為督學憲臣蔡先生試士江西一舉而登首拔者五十八人見於交遊書問中首舉士舒梓溪即許其魁天下後無不驗當先生為考官得餘姚謝文正試牘已物色為殿元宰輔其督學廣東也於校文中預卜人休咎其鑒識與蔡先生又同二先生德學造詣無容置論乃其品題藻鑒什不爽一此其故何哉趙以愚蔡以虛明生於愚靈生於虛卒是道也郡志三閩書丁氏陵集道南源委越章集備考陳白沙先生復公書曰來教摘諸聖賢垂世之言與僕之事參而辨之大抵愛我深而告我盡也僕用是知執事之心一峰明白不欺之心也一峰死僕哭之慟以為自今而後不復有如一峰者今乃有執事幸甚幸甚執事為説本之經訓與僕所以為學所以語人者同歸而殊途但僕前簡失之太略執事見之太明故疑僕之意異於執事而實不異也執事謂浙人以胡先生不教人習四禮為疑僕因謂禮文雖不可不講然非所急正指四禮言耳非統論禮也禮無所不統有不可須臾離者克巳復禮是也若橫渠以禮教人蓋亦由事推之教事事入途轍去使有所據守耳若四禮則行之有時故其説可講而知之學者進德修業以造於聖人緊要却不在此也程子曰且省外事但明乎善惟進誠心外事與誠心對言正指文為度數若以其至論之文為度數亦道之形見非可少者但求道者有先後緩急之序故以且省為辭省之言略也謂姑略去不為害耳此蓋為初學未知立心者言之若以外事為外物纍已而非此之謂則當絶去豈直省之云乎不規規於往迹以干譽目前僕之此言亦有為而發嘗與胡先生言之矣非諷執事也此不欲形於筆札俟面告執事於僕謂無間者也茍事有未當僕得盡言之豈假諷哉僕才不逮人年二十七始發憤從吳聘君學其于古聖賢垂訓之書蓋無所不講然未知入處比歸白沙杜門不出專求所以用力之方既無師友指引惟日靠書册尋之忘寢忘食如是者亦纍年而卒未得焉所謂未得謂吾此心與此理未有湊泊吻合處也於是舍彼之繁求吾之約惟在靜坐久之然後見吾此心之體隱然呈露常若有物日用間種種應酬隨吾所欲如馬之御銜勒也體認物理稽諸聖訓各有頭緒來歷如水之有源委也於是渙然自信曰作聖之功其在兹乎有學於僕者輒教之靜坐蓋以吾所經歷粗有實效者告之非務為髙虛以誤人也執事知我過胡先生而獨不察此僕是以盡之又伏讀來諭執事所以進僕者至矣所以教僕者亦至矣僕一顓愚人耳凡百無所通曉惟知自守而已曩日至京師與諸賢士大夫遊日聽其議論天下之事亦頗有益惟是愚懵終不能少變以同乎俗是以信己者少疑己者多也僕之所深與者皆執事同年而獨執事之名未聞也奉附到董給事書其中稱道盛德不少置僕私心喜甚以為此來當得一見非子仁僕無以知執事然以子仁之言又未嘗不追恨於京遊之日也承諭有為毁僕者有曰自立門戶者是流於禪學者甚者則曰妄人率人於偽者凡於數者之詆執事皆不信之以為毁人者無所不至自古聖賢未免見毁于人甚矣執事之心異於時人之心也僕又安敢與之強辨姑以迹之近似者為執事陳之孔子教人文行忠信後之學孔氏者則曰一為要一者無欲也無欲則靜虛而動直然後聖可學而至矣則所謂自立門戶者非此類歟佛氏教人曰靜坐吾亦曰靜坐曰惺惺吾亦曰惺惺調息近於數息定力有似禪定所謂流于禪學者非此類歟僕在京師適當應魁飬病之初前此克恭亦以病去二公皆能審於進退者也其行止初無與於僕亦非僕所能與也不幸其迹偶與之同出京之時又同是以天下之責不仕者輒涉於僕其責取證於二公而僕自己丑得病五六年間自汗時發母氏加老是以不能出門耳則凡責僕以不仕者遂不可解所謂妄人率人於偽者又非此類歟僕嘗讀程子之書有曰學者當審已何如不可恤浮議僕服膺斯言有年矣安敢爭天下之口而浪為憂喜耶其晦也不久則其光也不大其詘也不甚則其伸也不長物理固亦有然者矣僕或不為此戚戚也且僕聞投規於矩雖工師不能使之合雜宫於羽雖師曠不能使之一何則方圓之體不同緩急之聲異也尚何言哉尚何言哉惟執事矜其志而略其迹取之羣咻之中置之多士之列則天下之知僕者無如執事矣幸甚何鏡山先生撰公家藏手澤序曰泉前輩趙古愚先生珤成化中以解元登進士自比部郎出為嶺南學憲善以文章卜人貴賤壽夭無不得者其為郎時充會試內簾官得謝文正公文大竒之手批曰狀元拜相必此子也及視學嶺南考校海南士所拔科舉多不足先生意者曰是姑録之後來受用終不及諸下劣等亡何科舉士過海就大比盡溺水死而下劣等者以不就試無害泉人以此二事至今好談先生先生宋室苗裔也其往弔宋崖海之濵過竒石碑謁慈元殿址祭大忠祠具有文字其過竒石碑詩嚴切惋恨尤膾炙人口人徒以先生忠義慈孝人也而今讀先生曾孫大紹所輯手澤編則有自歎詩二首以寶鑑喻心大道喻學乃知先生平日惕於內省而端於趨向當時海內名流如陳白沙羅一峰二公皆與往來切磋以求斯道真實之境此則先生所造之精微自知自進而嵗月之久著作流落之多泉人亦未有以窺公之全者也是編凡十三首詩居其七文居其六而先生遺筆盡在是矣然皆大紹訪求之四方殘編斷記之中然後乃能得之大紹席門窮巷無旦夕之積自其少年時裹糧重繭絶險以求先生遺文遍請海內縉紳詠歌先生之德行以陳告之當道先生蓋沒百餘年而後綽楔表於里閭鄉賢崇于祠祀今大紹年七十餘矣朝暮必至先生祠下低回護視其委不佞以是編之序凡五年而未得應心不加怒而請愈切為人子孫如此不亦克稱先生之後人可以愧夫世之無亷恥嗜飲食而忘其先德者哉按泉南明初諸先正多確守宋儒矩範蔡文莊未起時如莊氏恭與趙公其最著者莊公能物色文莊於童年取師友於莆中如吳淳夫周翠渠黃未軒皆是也趙公則間道尤謹嘗規切白沙先生虛妙之旨白沙欲號海雲公力正之謂其近於禪號在粵往來辨難不茍為同近世先正評訂白沙諍友如羅一峰胡敬齋羅整菴人皆知之矣獨公姓氏稍略細繹白沙復公二書其心許相物色似於羅胡二公之外不作第二人觀也顧年未滿志著述又復湮沒灰燼無存未得與居業録困知記並垂考信惜哉吾鄉前輩如丁氏自申張氏冕莊氏履豐何氏鏡山皆汲汲論述蓋以公實任道之器流澤桑梓愾慕無窮也馥恐載籍日杳派别愈難尋緒不禁娓娓詳之附載白沙二書并何公跋語者欲以證公所學所守端的另於同安志録公大同書院記一首入遺文內亦吉光片羽矣吾鄉鄴架藏書者多如得公文者幸借鈔録續入諒有同志曷勝企望乾隆丁丑臘月八日書於繞耕舊學家孰縣令莊遁菴先生槩學派按先生為松崖公琛之子松崖趾美先德官終廣西按察司僉事以仁恕清靖著聞故先生仕迹亦以清白世其家其源流逺有端緒郡志稱其蒞官有風槩未曽立傳今考之文莊蔡虛齋贈送序言稱先生學博志髙到官貧約如故所養益不凡其表揚師門之節固信而可徴也兹特録其派系附文莊一人著於篇端縣令莊遁菴先生槩莊槩字世平晉江人宋少師藻齋公之後父松崖公琛廣西僉事槩成化間嵗貢尹廣西陸川以考績改任江西信豐縣虛齋蔡文莊公送先生尹信豐序稱受業師遁菴莊先生家素貧用素約不獨未仕時為然前此尹陸川六年而貧約如故吾先生之所以為人者可知又曰先生博學髙志少年聲光馳八閩閲世益深抱負益壯所養益不凡其所施為不以官之崇卑地之廣狹限者閩書載其知信豐縣有節概云蔡文莊文集郡志嵗貢成化以後諸先生學派泉自成化後風氣淳龎人物挺生一時經學之茂海內宗之如虛齋蔡先生紫峰陳先生次崕林先生淨峰張先生後先倡明正學風傳響應興起者多外此若莊公恭林公啓口山傅公凱李公雍郭公克一亦皆師傳友授綽有典型至黃公河清諸賢多講切問學追慕前修不茍以世儒自命者其餘豐功碩德未能遍録特舉其師友可溯者載于編副使莊拙齋先生恭莊恭字儀甫號拙齋晉江人為諸生時從莆吳淳夫仲珠學而與黃未軒仲昭友成化五年登進士第授刑部主事給事中韓文等以論兩宫事被拷訊恭首疏廷救之升員外郎出為江西按察僉事風采颷發雷擊斧斷行部南安上猶令望風解去入與試事得豐城楊亷於落卷拔擢之成化丁未贑冦大哄禍延閩楚粵三省朝議知恭負文武才升為本司兵備副使踰月巨魁授首建昌瑞州寇復作勢張甚恭出竒殱之前後俘馘無算餘悉平定安輯捷聞璽書嘉勞賜金幣寶鈔南城張升廣昌何喬新為鄉邦計咸請即本土超擢為藩使或觀察使會丁祖母憂歸卒恭孝友無間先資悉讓諸弟俸餘則推贍戚族善物色後進奬掖不倦識蔡文莊於童年期以大儒見李文祥指為年家錚錚所交逰來往惟周翠渠瑛張東海弼雍康僖泰數人當憲宗時閹王直幻術李孜省最用事而孜省江右人也屢欲得恭為重恭絶不與通年位不滿世人惜之孫如愚新興令啓愚肇慶府教授並有聲閩書清源文獻監丞林海峰先生啓口山林啓口山字仰之同安人魁梧軒奕成化二十二年鄉薦第一與蔡文莊相次發解並以易學倡於鄉泉人興易學以盛二門門生也文莊易猶在泉啓口山為安陸州學正安陸之易啓口山發之也倣胡安定法為教人士循軌諸生餽贈無所受而周其貧者遷國子監博士及門如趨林貞肅俊嘗録啓口山之名於方石祭酒謂然居二年遷南京國子監監丞楊吏部攝祭酒當詣京或請他攝楊曰仰之在須他攝何為六舍生羣請之吏部為宜遂攝祭酒卒于官囊無一金六館書生爭致襚林貞肅以所自預深衣方履殮之為撰墓志曰仰之介而容方而不腐為文章有竒氣又曰豫重得士既晚得仰之謂銘仰之耶嘉靖中有孫曰天德者以貢歷亷州推官路南知州亷人祀之名宦其元孫一柱萬厯庚戌進士歷官參政見李𠂻一學派閩書張氏雒閩源流林貞肅撰墓志教諭莊翠峰先生鵬莊鵬字萬里翠峰其號惠安人成化丙午鄉薦就選授新寧教諭議經術考古製器端文字程式以變易學者習尚學者始知所嚮方福州劉御史遜以言事出知武岡州復為藩府所擠人多斂迹鵬獨與往來會有中以飛謗者遂解職事歸獨肆力學問延接後進處鄉里是是非非不茍淨峰張公撰墓志云某生晚不及先生壯時也獨記頃年屢以通家子謁拜先生一室雅靚圖書筆硯之外無他物先生終日整襟端坐點勘書史雖分注小字亦精細不茍是時年幾六十矣與人言縱橫穿貫舉古今理亂事理物情之變能使聽者竦然至聞人有善與義當勇為者必咨嗟稱賞惟恐人不及知其好學樂善如此舉人鄭先生賢鄭賢晉江人成化丙午舉人以易經授徒其年同登鄉榜者五十二人皆其弟子曽答莆陽陳侍御書曰承教以益壯益堅相策弟不鄙敬佩繹之年有老壯學無作輟夫子有假我數年之思而漢霸抱朝聞以為願則一義未解一理未信有非可以中道廢者不鄙治易幸附驥尾竊計猶在強仕之年豈以春闈弗售而遽餒耶君子不患名之不成而患志之不樹吾儒許多問業許多工夫尋向上去探討古聖源頭窮年邁韶不進不休則益壯之針信可銘心其於益堅所詔則古人處一之説也遇不遇貞于時堅不堅由之已修已俟時有可挫不可使餒者兄視不鄙豈靡靡諱窮之夫哉若小挫而靡則所謂不愧科名者何人不愧聖賢者又何人而甘自汩沒之耶近日朋友來訪者時以羲經相問難自愧粗心浮氣不能闡揚四聖奧義謂宜當討論理會使心即易易傳心而後可若夫名利一場未嘗挂諸念頭非直不以窮為恤且狂戅不知有窮者故夫益壯益堅道理雖未之逮然鄙心竊意其當如是耳兹因教音之及請益砥礪之以不負兄教清源文獻司訓洪汝言先生昌洪昌字汝言南安人幼失怙鞠成于母攻禮經成化十二年嵗貢授常州司訓經學純正議論髙古嘉意作人月有課嵗有會士子翕然宗之尤長於詩文善草書時流咸推重焉通政黃蓮峰先生河清黃河清字應期南安人𢎞治十五年舉進士授吏部文選司主事歷郎中慨然以進退人才自任凡所舉錯甚稱冡宰楊文襄公一清意首薦劉大夏韓文林瀚熊繡王宗彛朱欽艾璞陳壽王質萬鏜程文程溫艾洪徐昂葛嵩張良弼呂翀潘鏜劉演蕭乾元黃昭道張瑋邢珣樊禹朱廷聲等二十五人又薦恬退之士四人曰潘甫盧格張詡祝萃以風天下又若董玘萬鏜楊果聞淵姚繼嵓夏良勝章拯唐龍周廣顧珀皆其所舉士論翕然歸之稱典選得人者前有黃天台後有黃清源天台者黃孔昭清源則河清也擢太常少卿提督四夷館一日羣立于朝有一巨璫來羣揖中惟不識河清或以姓名示之璫駭曰是彼是彼明日持雙幣詣謁河清瞰其亡往返焉丁父憂歸嘉靖初年遷南京通政卒于官所著有蓮峰稿河清好讀書遍交當世士與蔡虛齋王陽明湛甘泉董中峰何大復鄭少谷諸公相善而於三衢棠陵方豪尤契豪稱其嗜學如炙悅士如姝其氣充充其心休休動履必則古稱先陳氏道基序公文集曰蓮峰先生妙齡舉進士陟華要志槩不羣尤善著作閩小泉林公嘗賞其初稿而序之莆省吾林公擕刻于粵以傳焉愚嘗受而讀之仰思國家更造文章著作至於𢎞治滋益精醇猶之淑氣渾噩品彚涵濡乎其間莫之遺也先生於其時以少年遭際內承家學外友天下豪俊同時若蔡虛齋王陽明諸公咸以經術著作有聞於世先生與之往復議論道契志孚故其所得益深與諸老並稱為一時之盛三衢方公固以文名家者而推崇先生謂所為文動以先秦為則斯非漫語云弟淑清潨清閩書清源文獻黃先生淑清黃淑清河清弟也自號曉江漁者為諸生棄之去入山耕讀邦君賢大夫禮之不應也令顔容端與善以艱歸與之書曰俗以仕宦丁艱曰放假蓋謂歷官日多不能肆縱只一居喪當為暇日利田便舍肥肉大酒言出莫違意逐羣應入耳驗目大都如此昔吕東萊在艱講授陸象山已議其非何今古相逺不啻雲泥執事學有主腦定是踏定一步也黃應萃先生潨清黃潨清字應萃别號東水兩應鄉試不偶益勵志弗衰事嫡母溫凊奉養至老彌篤莊事諸伯兄日以經學相質無何嫡母沒率先諸姪治窀穸既襄事廬墓側者三年過者莫不曰此孝子讀書處也潨清念生母葛氏於父卒後早出不獲供甘旨輒陟屺而號既而嘆曰古人有捐二千石間關徒跣必覯所生而後即安我獨非人哉遂匐匍之道寢食俱廢後訪得之某里遂為母子如初人比之雍州云潨清嘗謂古之學者由源而派後之學者逐派忘源古之文如大冶肖形後之文如掌中花耳因證小序窮韓申之業而一稟之考亭為韻説十餘卷已復考班馬異同旁及唐宋諸乘為厯代史評百餘卷時而晝有得夜有書輒起而識之為觀書目録十餘卷其為文多凖東西二京諸所應舉陳言輒嚼蠟視之耳手持一卷撫二子而歌令二子和之復于于嘯曰若視吾所獲與千畝孰多二子有樂登賢書有及為諸貢籍首潨清猶布衣蓬戶日囊故時書讀之琅然性故方不妄色笑與人語齗齗侃侃然非公正不發憤至其雅度汪涵飲人以和遇不可意貌不加遽詞不加激門閈諸後進執經問難各片言立剖去令是邦者爭嚴重之蘇氏濬曰憶余初侍先生乍而望之機發於踵久而即之沖乎若不盈也殆所稱博學篤行君子耶蘇紫溪先生集黃先生希顔黃希顔晉江人潤之父其事實未詳按何氏清源文獻曽登其姓名茲録之其著理氣説曰孔子曰太極生隂陽邵子曰道生天地是理生乎氣之説也朱晦翁曰有此理而後有此氣蔡季通曰理先而氣後是理先乎氣之説也世之學者往往多以此為疑惟恐有理氣之分判為二物耳殊不知理勝乎氣氣載乎理雖不相離而亦不相雜也善乎孔子之論道必以形而上下言之則理氣之辨明矣蓋理虛也氣實也虛者常存而實者迭有也是以天地未判之初隂陽未生之始必有理以主宰之然後動靜有所分清濁有所别不然則成一氣塊耳何以為造化之機生物之本哉然而伏羲之作易兩儀之上未嘗言太極也至孔子始言之仲尼之贊易太極之上未嘗言無極也至周子始言之此皆人世之所駭而聖賢之不得已也何者弗烈其聲而聾者弗聞也不燭其形而昧者弗睹也如孔子不言太極則以氣為理者多矣周子不言無極則以道為氣者衆矣故聖賢不得已而後有是言也是豈好為竒怪之論也哉愚謂太極一圖不出伏羲範圍之外其曰太極動而生陽靜而生隂即伏羲初畫之兩儀也其曰陽變隂合而生水火木金土即伏羲次畫之四象也其曰乾道成男坤道成女即三畫之八卦也其曰萬物化生即因重之六爻也夫豈有二致哉蓋天地造化之具不過陰陽五行而已而萬物生成之理不過氣化形化而已是以伏羲之畫卦必始於三畫而終於六畫也傳曰剛柔相摩八卦相蕩此之謂與若夫邵子一每生二之説亦以見畫卦自然之妙而變化之無窮耳是豈伏羲之本旨哉愚敢著是説以袪世人之惑觀者恕其狂妄之罪則幸甚矣清源文獻參政黃以誠先生潤黃潤字以誠晉江人正德十六年進士授武進令值江南大飢流移數萬賑活有方邑賦重前巡撫周忱奏折布以輕之匹布扺糧一石吳廷舉議徵價匹銀五錢潤曰折布固將輕之若定五錢是重之也乃改徵三錢擢南刑部主事改兵部武選奏立選法遷車駕郎中出守松江丁外艱去松人舉前兩賢守以配潤作三清堂祀之服闋補東昌守升河南副使備兵信陽時章華臺等處劇盜盤踞流劫潤討平之擢山西左參政念母老乞終養歸先是潤在吏部冡宰欲以科道官潤使李默喻意固辭默曰有吏部郎登門送官而人不受者耶潤曰有吏部郎登門送人官者耶因大笑而去同年張孚敬用事時不一見及三去國三送之張欲處以文選堅謝如前張淨峰嶽嘗稱潤當於古人中求之曽與書曰僻居無朋友之助幾成惰棄想令眉宇每切夢寐官曹清暇日月新功必有可以見教者便中千萬不惜大扺吾輩年紀漸老大精力亦無多切在於要緊處用工如讀書專治一經打成片假儘有受用向在南宫讀易已有次第後來能不間斷否此如日用飲食頃刻不可放下今人苦苦要去學詩學字學文章聲口真所謂浪費精神可嘆也潤家東石時有東崖西郭之號西郭者同時同邑清節御史陳蕙也著有東石漫稿十卷經濟備考四十卷泉郡志張淨峰集教諭郭約之先生克一郭克一字約之惠安人正德八年鄉薦少從莆陳茂烈學嘉靖中署歸善教諭捐俸新學舍復分齋肄業之規申飭條教講説經旨士心竦異閩書閩中理學淵源考卷五十八
