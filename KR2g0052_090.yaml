body:
  text: 閩中理學淵源考卷九十廣平府知府李清馥撰嘉隆以後諸先生學派嘉隆以後諸儒述録頗少恐遺闕必多俟再攷庠生王昭武先生岳王岳字昭武邵武人邑庠生資性純潛喜談性命有志聖賢之學聞四方高雅洞見性宗者不憚跋涉北面之遊近溪羅先生門以明徳為宗遂為羅門高足生平矩步繩趨有儼若思氣象居家嚴正動遵古禮閩書貢士高先生尚賢高尚賢邵武人沈潛善文辭究心性命確然以聖賢自勵清貧有守幼年失怙事母孝待弟友愛淹貫百家善於開誘後學生平得力惟毋自欺三字凡對之人矢之己無非是者有書數篇未付剞劂氏以貢卒學使者熊公按臨舉鄉賢不果别號文台居士丘子聚先生九奎丘九奎字子聚邵武人性端直凝重動循矩度常慕臺溪先生之為人年未四十謝去青衿于凡經子史百家九流三教靡不擷咀聞有竒書不逺百里借閲率手録之常曰聖賢心法寄於六經佛老之精不出吾道範圍而諸子之散見者亦足資羽翼所謂莫不有文武之道者也居家不尚巫覡祭喪用家禮所著有弋獲解六卷臺溪浣花詩集二卷黄世表先生克正黄克正字世表泰寧人性資純樸潛心道學遊李見羅之門講脩身為本之學江仰齋先生嶠江嶠字維鎮泰寧人私淑朱子之學孝弟端謹篤志力行以五經教授鄉里嘗語學者曰正心誠意在格致後原非一味寂守常時提醒此心使動無不當便是身修見羅先生呼為老友世稱仰齋先生縣令蕭先生重熙蕭重熙泰寧人生平砥行希蹤聖賢以選貢令靖安地苦賊而民疲多方綏靖以艱子乞休空槖而歸饘粥不繼主事黄先生世忠黄世忠建寧縣人嘉賓孫萬厯中舉人為東陽教諭擢刑部主事乞歸居小園抱甕灌蔬長吏罕識其面著有經濟集十二卷麟經㫖定四卷碧澗流玉四卷舉人張禮言先生能恭張能恭字禮言邵武人崇禎庚午鄉薦第一所述有李忠定奏議選禹貢訂傳天地大文八十卷通志閩中理學淵源考卷九十
