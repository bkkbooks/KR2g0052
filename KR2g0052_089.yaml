body:
  text: 閩中理學淵源考卷八十九廣平府知府李清馥撰邵武明初諸先生學派按邵武宋代人文特盛逮元諸儒學不衰大抵皆闡經論道之作至有明講述者頗少若朱氏欽陳氏泰之風節鄒氏大猷之經術一時風表尚有典型焉教諭鄒星臺先生大猷鄒大猷字星臺建寧人歷益陽教諭矩步動遵先民傳經授徒務在實行遇人雖年少必均以禮或訓以格言云道南源委督學花藴玉先生潤生花潤生字藴玉邵武人永樂二年進士幼穎敏書史過目不忘知古田縣創公署興學政教民種藝為子弟置書籍親課其業轉知鳳陽太和二縣歷浙江僉事吏部尚書王直薦其經學通明轉提督浙江學政年七十引年歸行李蕭然家居二十餘年風節愈勵自號介軒有介軒集閩書巡撫陳吉亨先生泰陳泰字吉亨邵武人舉鄉試第一除安慶府學訓導正統初廷臣交薦擢監察御史巡按貴州大軍征麓川嵗取土兵二千為鄉導戰或失利輒取土兵首級冒功賞泰奏罷之再按山西時百官俸薄泰言羣臣祿入厚者三石薄者一二石所折鈔又不能即得乞量增祿廩俾足養亷然後治贓則貪風自息事格不行六年夏以災異下詔求言恭請言官糾彈大臣去其尤不職者而後所司各考核其屬帝從之言官劾者甚衆賜罷者數人而己後出按山東擢四川按察使不踰年蜀中大治鎮守都御史寇深忌其才名隂諷所私參議陳敏誣奏泰杖殺人下刑部獄其人實自溺水死久始白復官于謙薦守紫荆關額森入犯關門不守復論死景帝宥之命充僉事官自劾景泰改元升大理寺右少卿守備白羊口轉都察院右僉都御史鎮守易州節制紫荆倒馬等關及沿河關口五年升左僉都御史疏理徐州呂梁二洪及臨清濟寧諸處河道七年巡按蘇松常鎮及嘉湖諸大郡免租詔下泰知恩未得均有富室田多額輕其重者多在貧下因推廣周文襄法令以五升之田倍其賦而官田之重止取正額於是賦額不損貧富均適英廟復辟被譖左遷廣東按察副使連丁內外艱會四川寇亂復起為左僉都御史巡撫其處蜀中老稚聞泰至奔走相告曰陳憲使復來矣州郡望風解組者數百人升右副都御史巡撫淮揚等處兼督漕運成化元年乞歸甚切許之泰儀度修整天性孝友常慕鄉先哲李忠定之為人平居謹默似不能言立朝論事纚纚如倒囊出珠素勵操行三為巡按懲姦去貪風稜甚峻纍保障重地積有勳勞未嘗矜色於官無行誼者怒目切齒必除之乃已以此被讒貶斥其志不少回致仕歸囊無長物閉戶理舊書間出遊山水哦詩酌酒囂然有餘安成彭文憲時嘗與莆田柯詹事論人物柯曰清操如吉亨吾閩少有文憲曰天下士也何止閩中晉王亦稱陳御史剛風徑節須於古人中求之明史閩書教諭陳先生子良陳子良邵武人永樂間以貢任光澤教諭學規嚴整訓迪有方邑士以經術顯者多其造就閩書員外郎余孟高先生隆余隆字孟高邵之建寧人聰敏慷慨仕吏部員外郎居官恬退自守不履豪貴門少師楊文貞楊文敏先後冢宰蹇義及師逵黃福皆器重之子志僉事鄒先生允隆鄒允隆名昌以字行泰寧人博學多才舉正統壬戌進士授太常博士升寺丞改太僕丞天順改元與翰林侍講學士王諫並使安南時安南經黎季犂之變久昧朝儀允隆與諫據禮裁正夷酋悚服還復命丁外艱服除仍丞太僕尋轉廣東提學僉事教諸生以立身行道不徒習章句文詞而已尋卒巡撫朱懋恭先生欽朱欽字懋恭邵武人少與寧堅友共志考亭學聞吳康齋倡道西南不逺師之成化壬辰進士授寧波推官潔白自持讞獄惟允召入為御史論列侃侃銜命視河遇潦災輒發陳賑乏見尸橫野掘廣冢掩葬之旋敕巡按貪吏望風解綬出為浙江按察副使進按察使升左布政使儼恪端莊官常整肅節濫觴之費謹啓鑰簿正之司秩祿外秋毫無茍取積羡財倍夙昔勒石以示後來擢都御史巡撫山東首劾方面官不公不法事某等若而人正德初逆瑾氣焰遣使詣治索綵繒五百匹有司具以請欽呵斥使者輒趨歸遂與瑾隙會瑾嫉同監王嶽譖謫守陵南京抵臨清賜死欽疏言陛下首政朝野仰望威福之權不宜下移刑賞惟公方能即敘太監王嶽謫守皇陵既不白其罪狀賜死中道尤未厭乎人心臣諗嶽為劉瑾所忌必瑾讒毁以惑陛下雖嶽死弗足惜而瑾漸甚可畏伏望察嶽非辜誅瑾讒賊庶天下臣子頌陛下之仁恩睿斷草就遣人齎進有止之者欽曰此瑾矯制擅柄之漸吾守土大臣安得無言瑾奪欽疏不奏乃媒糵其短欲擠之先是欽以東人酣酒遂嚴鬻酒之禁至行連坐法使濟南推官陳元魁覺之犯者枷其項有民汝林之鄰人為酒林懼自縊死林母欲奏聞元魁與之十金知府趙璜亦與穀二石至是為東厰所詗瑾敕錦衣衛百戶陳俊束欽逮獄欽即去冠裳跣步就束立就道不內顧既入京師結竟其罪與璜同坐免官而元魁為謫戍吏以失解弓張事罰粟三百石輸大同府欽躬詣互納家人請代不許曰天威咫尺萬里敢罔耶尋又文致其罪罰粟輸甘肅未行而瑾伏誅赦復原秩致仕家居衣冠儼坐竟夕無惰與鄉人語必依孝弟禮義每嵗孟春舉行冠射古禮示人與新會陳文恭獻章晉江蔡文莊清相善其辨王嶽事詳蔡虛齋集作文典實詳贍善書有晦翁風骨卒年七十有七所著有畏庵集庠生朱德夫先生昻朱昻字德夫邵武人郡庠生穎異有文才嘗從教授宜興周衝講致良知之學鋭然以聖賢自勵事二親孝待戚屬仁郡守吳國倫稱有古人風旌之扁閩書縣令黃廷獻先生琮學派按廷獻先生志乘稱其自少即志為己之學教士先德行而後文藝大端可識矣縣令黃廷獻先生琮黃琮字廷獻邵武人以太學生知安逺縣亷謹靖恭以愛人為主被搆逮繫未白而卒民哀慕之琮自少即志為己之學繩趨尺步不茍徇時事親盡孝居喪謹禮與人交誠信不欺教人先德後文一時造就為多閩書同知寧永真先生堅寧堅字永真邵武人九嵗補弟子員師事黃琮弱冠遊吳聘君之門比壯領鄉薦屢試禮部不偶卒業太學大司成邱文莊器重之年五十授鳳陽府同知未及再期卒堅早失怙事母至孝母有疾視起居奉湯藥夜則假寐母側衣不解帶家居講授善開發人志意從遊之士多所成就所得修脯之資悉以歸母與弟共之尤致力冠昏喪祭鄉射諸禮一時風俗為變其蒞官寬而不縱正而不激嘗以巡撫大臣檄督開郵湖畔新河區畫有方功成而民不擾鳳陽民思之閩中理學淵源考卷八十九
