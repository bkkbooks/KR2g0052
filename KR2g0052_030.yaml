body:
  text: 閩中理學淵源考卷三十廣平府知府李清馥撰文忠真西山先生德秀學派榕村語録論孟子敘道統曰見知聞知道豈不貴行而云知者正派要緊如領路人領差了行更有害當下不覺到歸宿處便大壞嗚呼公值宋季之時紫陽門徒次第零落矣如楊慈湖諸公遞有異論楊沒後公辭行狀之作為之别識觀其平昔所學所守不為依違遷就而確乎篤信師傳公於慶元元年登第於時學禁議起越五年而晦翁沒公雖未親承指授然尚及私淑其髙弟如詹元善蔡節齋兄弟陳復齋李果齋諸前輩切磋講論至黃勉齋晚嵗與李敬子書云真景元陳師復二公異日所就又當卓然先師沒今賴有此耳又與李公晦書云真文所刋近思小學皆已得之後語亦得拜讀觀此則西山先生與勉齋諸公當日扶持學脈風流相接厥後與魏鶴山身任斯道之責步履程朱正路絲毫不差一代斯文於兹未墜噫若先生於紫陽誠所謂見而知之者矣文忠真西山先生德秀真先生名德秀字景元後更景希浦城人慶元五年進士授南劍州判官繼試中博學宏詞科入閩帥募召為太學正嘉定元年遷博士時韓托胄已誅入對言托胄自知不為清議所貸至誠憂國之士則名以好異於是忠良之士斥正心誠意之學則誣以好名於是偽學之論興今日改絃更張正當褒崇名節明示好尚召試學士院改祕書省正字二年遷祕書郎四年遷著作佐郎兼禮部郎上疏言金有必亡之勢然金亡則上恬下嬉憂不在敵而在我多事之端恐自此始六年遷起居舍人奏權姦擅政嘉泰之失已深於慶元往者朱熹彭龜年以抗論逐吕祖儉周端朝以上書斥當時近臣猶有爭者其後吕祖泰之貶非惟近臣莫敢言而臺諫且出力擠之更化之初羣賢皆得自奮未幾傅伯成蔡幼學鄒應龍許奕諸人相繼以論事去繇是人務自全一辭不措設有大安危大利害豈不殆哉尋兼太常少卿充金國賀登位使至盱眙聞金人內變而還言於朝曰臣自揚之楚自楚之盱眙沃壤無際陂湖相連民皆堅悍強忍足為大江屏障若大修墾田之政領以專官數年之後積儲充實邊民父子自保因其什伍勒以兵法不待糧餉皆為精兵矣時史彌逺以爵祿縻天下士先生慨然謂劉晦伯曰吾徒須急引去使廟堂知世亦有不茍為從官之人遂力請外出為祕閣修撰江東轉運副使江東方傷旱蝗廣德太平為甚先生遂與留守憲司分所部九郡大講荒政而自領廣德太平親至廣德與太守魏峴同以便宜發廩使教授林庠賑給竣事而還百姓數千人送之郊外指道旁叢塜泣曰此皆往嵗餓死微公我輩已相隨入此矣以右文殿修撰知泉州泉通外國自洋舶畏苛征至者嵗不三四先生首寬之驟增至三十六艘輸租令民自槩聽訟惟揭示姓名聽人自詣海賊作亂將逼城官軍敗衄先生祭死事者親授方略擒之巡歷海濵增屯要害以備不虞十二年以集英殿修撰知隆興府承寬弛之後乃稍濟以嚴尤留意軍政以母憂歸十五年以寶謨閣待制湖南安撫使知潭州以廉仁公勤四字勵僚屬以周濂溪胡文定朱考亭張南軒學術源流勉其士罷𣙜酤除斛靣米申免和糴立惠民倉慈幼倉社倉以蘇其民月試諸軍射捐其回易之利及官田租凡營中病者死未葬者孕者嫁娶者贍給有差理宗即位召為中書舍人尋擢禮部侍郎直學士院入見奏三綱五常扶持宇宙之棟幹奠安生民之柱石我朝立國先正名分陛下不幸處人倫之變流聞四方所損非淺霅川之變非濟王夲志前有避匿之迹後聞討捕之謀情狀本末燭然可考願討論雍熙追封秦邸故事濟王未有子息亦惟陛下興滅繼絶理宗曰朝廷待濟王亦至矣先生曰人主當以二帝三王為法觀舜之所以處象則陛下不及明甚理宗曰一時倉卒耳先生曰此已往之咎惟願陛下知有此失而益講學進德次言霅川之獄未聞參聽于公朝淮蜀二閫乃出於僉論所期之外天下之事非一家之私何惜不與衆共之且言乾道淳熙間有位于朝者以饋送及門為恥受任於外者以苞苴入都為羞今饋賂公行薰染成風恬不知怪廷臣敏鋭者多於老成雖嘗以耆艾褒傅伯成楊簡以儒學褒柴中行以恬退用趙蕃劉宰至忠亮敢言如陳宓徐僑未蒙録用理宗問廉吏先生以知袁州趙䈣夫對擢為監司具手劄入謝因言崔與之帥蜀楊長孺帥閩皆有廉聲乞廣加咨訪理宗初御清暑殿因侍經筵進曰此髙孝二祖儲神燕間之地仰瞻楹桷當如二祖實臨其上惟學可以明此心惟敬可以存此心惟親君子可以維持此心因極陳古者居喪之法與先帝視朝之勤寧宗小祥詔羣臣服純吉先生爭之曰自漢文帝率情變古惟我孝宗衰服三年朝衣朝冠皆以大布惜當時不并定臣下執喪之禮此千載無窮之憾孝宗崩從臣羅點等議令羣臣易月之後未釋衰服惟朝會治事權用黑帶公服時序仍喪服臨慰至大祥始除托胄柄政始以小祥從吉且帶不以金鞓不以紅佩不以魚鞍轎不以文繡此於羣臣何損朝儀何傷議遂格先生屢進鯁言理宗皆虛心開納而彌逺益嚴憚之謀所以相撼畏公議未敢發給事中王槩盛章始駁先生所主濟王贈典繼而殿中侍御史莫澤劾之遂以煥章閣待制提舉玉隆宫諌議大夫朱端常又劾之落職罷祠監察御史梁成大又劾之請加竄殛理宗曰仲尼不為已甚乃止既歸修讀書記語門人曰此人君為治之門如有用我者執此以往紹定四年改職與祠五年進徽猷閣冉知泉州迎者塞路深村百嵗老人亦扶杖出城中歡聲動地諸邑二稅嘗豫借至六七年先生入境首禁之諸邑有纍月不解一錢者郡計無出或咎寬恤太驟先生謂民困如此寧身代其苦決訟自卯至申未巳曰郡邑凋弊僅有政平訟理可以惠民建炎初置南外宗政司于泉中公族僅三百人而已至先生時增至二千三百餘人郡坐是愈不可為先生請於朝詔給度牒以足之尋以顯謨閣待制知福州時彌逺死上始親政赫然有為鄭清之亦慨然以天下為己任收召賢才擢之於是御史洪咨夔王遂等力請召崔與之魏了翁真德秀入朝是時聞金亡京湖帥奉露布欲進取潼關先生因上封事諫止召為户部尚書入見理宗迎謂曰卿去國十年每切思賢先生以大學衍義進復陳祈天永命之説謂敬者德之聚儀狄之酒南威之色盤遊弋射之娛禽獸狗馬之玩有一於茲皆足害敬理宗欣然嘉納改翰林院學士知制誥時政多所論建踰年知貢舉已得疾拜參知政事同編修敕令經武要略三乞祠祿理宗不得已進資政殿學士提舉萬事觀兼侍講辭疾亟冠帶起坐乞謝事猶神爽不亂時端平二年也遺表聞理宗震悼輟朝贈銀青光祿大夫諡曰文忠學者稱西山先生先生長身廣額容貌如玉望之者無不以公輔期之立朝不滿十年奏疏凡數十萬言皆切當世務四方人士想見其風采宦遊所至惠政深洽不愧其言由是中外交頌都城人不時驚傳先生將至傾擁出關咸切快覩時相益以此忌之輒擯不用及歸朝則既衰矣自托胄立偽學之禁以錮善類凡近世大儒之書顯被禁絶先生晚出獨慨然以斯文自任講習服行黨禁既開而正學遂明於天下後世多其力也所著有大學衍義讀書記文章正宗西山甲乙藳等書子志道戶部侍郎明正統間從祀孔廟成化三年追封浦城伯國朝康熙四十五年準學臣沈涵之請賜御書力明正學四大字匾於祠宋史道宏簡録書南源委閩聖學知統録翼聖門禮樂統歷代名儒傳西山真先生文洪範武王克商之初未皇他事首以彛倫之敘訪於亡國之臣訪云者不敢召而就問之也彛倫者治天下之常理先後本末各有自然次第非人之所為乃天之所設也天之於民既默陟之於善又助合厥攸居然君師治教之責則於我乎屬我乃未知常理之次敘焉此所以問於箕子也堯憂洪水使鯀治之鯀不能因性順導顧乃隄而塞之以激其勢水既失性火木金土從而汩亂蓋水者五行之首一行亂則五者皆亂矣五行天之道鯀汨而亂之則逆乎天矣故天動威怒而不與以大法九疇鯀以死禹繼而興隨山濬川行所無事而水患以平天乃以大法九疇與之神龜負文出於洛水龜所負者數耳大禹聖人心與天通見其數而知其理因次之以為九類即今九疇是也初一至次九即所謂彛倫也五行者天之所生以養乎人者也其氣運乎天而不息其材用於世而不匱以天道言莫大於此故居九疇之首五事者天之所賦而具乎人者也貌之恭言之從視之明聽之聰思之睿皆性之本然也必以敬用之則能保其本然之性不以敬用之則貌必至於嫚言必至於悖以視聽則昏且窒以思慮則粗且淺而本然之性喪矣五者治身治心之要以人事而言莫切於此故居五行之次身心既治然後可施之有政食貨生民之本衣食既足不可忘本故有祀焉司空居民既得其安矣又有司徒之教焉教之而不從者又有司冦之刑焉接逺人以禮而威天下以兵凡此皆所以厚民生故曰農用八政民政既舉則欽天授人有不可後於是繼以嵗月日時星辰厯數之紀推步占驗必求以合乎天故曰協用五紀皇者君之稱極者極至之義標凖之名位乎中而四方所取則也故居人君之位者由一身而至萬事莫不盡至而後可以為民之極建者立之於此而形之於彼之謂故曰建用皇極至於正直剛柔之施又必視時之治否因俗之強弱君當攬權無使威福之移乎下臣當循法無使顓恣而僣乎上為治之道無越乎此故曰乂用三德國有事必先詳慮於已而後謀之於人人不能決則又諏之卜筮以決之於天天人相參事無過舉故曰明用稽疑五事之得失極之所以建不建也然何從而驗之觀諸天而已雨暘寒燠風皆以其時則建極之驗也五者常而無節則不極之驗也天人相應若影響然人君所當念念而致察也故曰念用庶徴皇極建則舉世之人皆被其澤而五福應之故堯舜之民無不仁且夀者此人君之所當嚮慕也故曰嚮用五福皇極不建則舉世之人皆蒙其禍而六極隨之故桀紂之民無不鄙且夭者此人之所當畏懼也故曰威用六極洪範九疇六十有五字耳而天道人事無不該焉原其本皆自人君一身始此武王之問箕子之對所以為萬世著龜也丹書武王之始克商也訪洪範於箕子其始踐祚也問丹書於太公可謂急於聞道者矣而太公望所告不出敬與義之二者蓋敬則萬善俱生怠則萬事俱廢義則理為之主欲則物為之主吉凶存亡之所由分上古聖人已致謹於此矣武王聞之惕若戒懼而名之器物以自警焉蓋恐斯須不存而怠與欲得乘其隙也其後孔子贊易於坤之六二曰敬以直內義以方外先儒釋之曰敬立而內直義形而外方蓋敬則此心無私邪之纍內之所以直也義則事事物物各當其分外之所以方也自黃帝而武王孔子其皆一道與説命傳説言為學之要惟在遜志時敏遜志者卑遜其心雖有如未嘗有也時敏者進修及時日新而又新也凡人之害於學者驕與怠而已驕則志盈善不可入怠則志惰功不可進遜則不驕敏則不怠所修之道自將源源而來如井之泉愈汲愈有夫人孰不知此然體之不誠則雖得易失惟信之深念之篤然後道積於厥躬積猶積善之積今日造一理明日又造一理今日進一善明日又進一善持久不替則道積於身身即道道即身渾然無間矣學之一字前此未經見也髙宗與説始言之遂開萬世聖學之原厥功大哉周頌敬之成王即位之初羣臣進戒首以敬之敬之為言成王則謂子小子不聰而未能敬方期日有所就月有所進其道何由惟學而已蓋學則有緝熙光明之功凡人之性本自光明大學所謂明德是也惟其學力弗繼是以本然之光明日以暗昧今當從事於學猶婦功之績接續而不已以廣吾本性之光明然輔弼吾使能當此負任則羣臣之責也願示我以顯明之德行使曉然知用力之方蓋成王慮學之難成望於羣臣者如此成王之學惟欲充其性之光明進其身之德行豈後世務外者比哉湯誥成湯可謂知君師之職矣蓋天能豫人以至善之性而不能使之全其性能使人全其性者君師之任也𠂻即中也天之生民莫不各賦以仁義禮智之德渾然全具無所偏倚所謂中也自天所降則謂之𠂻自人所受則謂之性天之降於人者初無智愚之間而人之受於天者清濁粹駁隨所稟而不同必賴君師之作順其有常之性而開迪之虞之徽五典周之教六德六行皆其事也性本至善因而教之是之謂順若其本惡而強教以善則是逆之而非順之也然則人性之善可知矣猷者道也道即性也以體言則曰性以用言則曰道其實一也順其性使安其道非君不能何謂安父安於慈子安於孝知其自然而不可易與其當然而不容巳然後為安成湯有天下之初即以此自任故曰可謂知君師之職矣厥後秉彛受中之言相繼而發至於孔孟性善之理益明而開其源則自成湯始嗚呼聖哉易大傳繼善成性按程子曰隂陽氣也所以隂陽者道也朱子亦曰隂陽迭運者氣也而其理則所謂道蓋隂陽二氣流行於天地之間來往循環終古不息是孰使之然哉理也理之與氣未嘗相離繼繼而出莫非至善成之在人則曰性焉理無不善性豈有不善哉性善之理蓋至孟子而益明然其源實出乎此大雅抑此衛武公自警之詩也十有二章之中言及威儀者凡五六抑抑云者密而又密也觀威儀之嚴密則可知其德之嚴密猶見隅角之方正可知其宫庭之方正也有諸中必形於外其可掩也哉民視儀而動聽倡而應者也上能敬慎其威儀則可以為民之法矣上能淑慎其容止不愆於儀形無僣差無暴亂則民鮮不以為法矣溫者和易之意築室者以基為固修身者以敬為先故此溫溫恭謹之人有五德之基也首章曰德之隅後章曰德之基熟味其辭武公作聖之功於是焉在明道先生書堂記堯之授舜曰中而已舜之授禹加三言焉其曰人心人欲之謂也其曰道心天理之謂也擇之精守之一而後中可執也大學論語孟氏指言義利之分未嘗以天理言獨見於樂記曰不能反躬天理滅矣物至而人化物也者滅天理而窮人欲者也世謂禮記之書類出漢儒漢儒之言傳者多矣有及於是者乎自時厥後道日晦冥更千餘年以及我朝治教休明風氣醲厚於是始有濓溪周子獨得不傳之妙明道先生見而知之闡幽發微益明益章今觀遺書所載先生論學必以逹天德為本論治必以行王道為宗天人內外一以貫之故嘗語學者曰吾學雖有所受然天理二字自吾體驗而表出之嗚呼至哉維天之命於穆不已品物流行而理賦焉仁義禮智之性惻隱辭遜羞惡是非之情耳目口鼻四肢百骸之為用君臣父子兄弟夫婦朋友之為倫何莫而非天也人知人之人而不知人之天物欲肆行義理汨喪於禽獸奚擇焉知人之天而後知性善知性善然後能窮理能窮理然後能誠意以修其身推之於治國平天下無非順帝之則也自有載籍而天理之云僅一見於樂記先生始發揮之其説大明學者得以用其力焉所以開千古之祕而覺萬世之迷其有功斯道盛矣袁州濂溪昌黎二先生祠記昔者聖人言道必及器言器必及道自清淨寂滅之教行乃始以日用為粳粃天倫為疣綴韓子憂之於是原道諸篇相繼而作其語道德也必本於仁義而其分不離父子君臣之間其法不過禮樂刑政之際飲食裘葛即正理所存斗斛權衡亦至教所寓道之大用粲然復明者韓子之功也自湯誥論降𠂻詩人賦物則人知性之出於天而未知其為善也繼善成性見於繫易性無不善述於七篇人知性之善而未知所以善也周子因羣聖之已言而推其所未言者於圖發無極二五之妙於書闡誠源誠立之指昔也太極自為太極今知吾身有太極矣昔也乾元自為乾元今知吾身即乾元矣有一性則有五常有五常則有百善循源而流不假人力道之全體煥然益明者周子之功也二子之學所造不同而其扶持天常植立人極要皆有功於百世南雄州學四先生祠堂記道之大原出於天其用在天下其傳在聖賢此子思子之中庸所以有性道教之别也蓋性者智愚所同得道者今古之共由而明道闡教以覺斯人則非聖賢莫能與故自堯舜至於孔子率五百嵗而聖人出孔子既沒曾子子思與鄒孟子復先後而推明之百有餘嵗之間一聖三賢更相授受然後堯舜禹湯文武周公之所以開天常立人紀者粲然昭陳垂示罔極然則天之生聖賢也夫豈茍然哉不幸戰國嬴秦以後學術泮散無所統盟雖以董相韓文公之賢相望於漢唐而於淵源之正體用之全猶有未究其極者故僅能著衛道之功於一時而無以任傳道之責於萬世天啓聖朝文治休洽於是天禧明道以來迄於中興之世大儒繼出以主張斯文為己任蓋孔孟之道至周子而復明周子之道至二程子而益明二程之道至朱子而大明其視曾子子思鄒孟氏之傳若合符節豈人所能為也哉天也然四先生之學豈若世之立竒見尚新説求出乎前人所未及耶凡亦因乎天而已蓋自荀楊氏以惡與混為性而不知天命之本然老莊氏以虛無為道而不知天理之至實佛氏以剗滅彛倫為教而不知天敘之不可易周子生乎絶學之後乃獨深探本原闡發幽祕二程子見而知之朱子又聞而知之述作相承本末具備自是人知性不外乎仁義禮智而惡與混非性也道不離乎日用事物而虛無非道也教必本於君臣父子夫婦昆弟而剗滅彛倫非教也闡聖學之户庭袪世人之矇瞶千載相傳之正統其不在茲乎嗚呼天之幸斯文也其亦至矣南雄為郡邈在嶠南士習視中州號稱近厚夫以近厚之資迪之以至正之學必將有俯焉自力者然陳君之所望於學者果焉屬耶天之命我萬善具全一毫有虧是曠天職昔之君子凛然淵氷沒世弗懈者凡以全吾所受焉耳嗟後之學何其與古戾也利欲之風深入肺腑理義之習目為濶迂已之良貴棄置如辨髦而軒裳外物則決性命以求之弗舍也吁是可不謂之大惑乎志於道者其將奚所用力乎𬗟觀往昔百聖相傳敬之一言實其心法蓋天下之理惟中為至正惟誠為至極然敬所以中不敬則無以為中也敬而後能誠非敬則無以為誠也氣之決驟軼於奔駟敬則其御轡也情之橫放甚於潰川敬則其隄防也故周子主靜之言程子主一之訓皆其為人最切者而子朱子又丁寧反復之學者儻於是而知勉焉思慮未萌必戒必懼事物既接必恭必欽動靜相因無所間斷則天德全而人欲泯大本之所以立逹道之所以行其不由此歟送全永叔序陳良楚産也而北學於中國近世遊楊二先生亦自閩徂洛受業於程夫子之門昔之君子崇德廣業不安於耳目之近大抵若此使良之徒不中變於許行之學則傳周孔之道於南方必陳氏也龜山先生終身宗其師説故能得斯道而南卒啓延平紫陽之緒使其僅守鄉黨之舊聞而以間關河路為憚顧安有是哉世習日陋後生小子所志不越簮裳之末所玩不逾程試之文百金謁書肆閉門而誦之曰吾業足矣明師良友近在州里且弗暇過而問焉况逺乎今全君永叔乃獨慨然思廣其所聞束書辭親將北之信饒西之浙求師友以自益其志篤矣然士之於學寡聞固易以陋多聞亦易以雜夫並耕之説至淺也陳相且悅而從之况今之談者有侈於是乎吾州子朱子之學萬世之學也然其功循序而不躐其言平淡而無竒其守據正而不偷吾子槩嘗聞之而未知篤信否也一朝出門衆説交進子能不為變遷也乎吾懼其不得為遊楊而且將為陳相也子往矣嗚呼其亦謹所擇哉送周天驥序上饒周君天驥篤志於學願聞為學之要終其身而可行者豫之於學也涉獵而未醇粗淺而弗精將何以告子雖然亦嘗聞其略矣以聖賢大道為必當繇異端邪徑為不可蹈此明趨嚮之要也非義之富貴逺之如垢汙不幸而貧賤甘之如飴蜜志道而遺利重內而輕外此審取舍之要也欲進此二者非學不能學必讀書然書不可以泛讀先大學次論孟而終之以中庸經既明然後可觀史此其序也沈潛乎訓義反覆乎句讀以身體之以心驗之循序而漸進熟讀而精思此其法也然所以維持此心而為讀書之地者豈無要乎亦曰敬而已矣子程子所謂主一無適者敬之存乎中者也整齊嚴肅者敬之形於外者也平居齊栗如對神明言動酬酢不失尺寸則心有定主而理義可入矣蓋操存固則知識明知識明則操存愈固子朱子之所以教人大略如此心經贊舜禹授受十有六言萬世心學此其淵源人心伊何生於形氣有好有樂有忿有􅓰惟欲易流是之謂危須臾或放衆慝從之道心伊何根於性命曰義曰仁曰中曰正惟理無形是之謂微毫芒或失其存幾希二者之間曽弗容隙察之必精如辨白黑知及仁守相為始終惟精惟一惟一故中聖賢迭興體姚法姒持綱挈維昭示來世戒懼謹獨間邪存誠曰忿曰欲必窒必懲上帝實臨其敢或二屋漏雖隱寧使有愧四非當克如敵斯攻四端既發皆擴而充意必之萌雲捲席撤子諒之生春噓物茁雞犬之放欲知其求牛羊之牧濯濯是憂一指肩背孰貴孰賤簞食萬鍾辭受必辨克治存養交致其功舜何人哉期與之同維此道心萬善之主天之與我此其大者斂之方寸太極在躬散之萬事其用弗窮若寶靈龜若奉拱璧念茲在茲其可弗力相告先民以敬相傳操約施博孰此為先我來作州茅塞是懼爰輯格言以滌肺腑明忩棐几清晝爐熏開卷肅然事我天君夜氣針子蓋觀夫冬之為氣乎木歸其根蟄坯其封凝然寂然不見兆朕而造化發育之妙實胚胎乎其中蓋闔者闢之基正者元之本而艮所以為物之始終夫一晝一夜者三百六旬之積故冬為四時之夜而夜乃一日之冬天壤之間羣動具閴竊乎如未判之鴻濛維人之身嚮晦宴息亦當以造物而為宗必齊其心必肅其躬不敢弛然自放於牀簀之工使慢易非辟得以賊吾之衷雖終日乾乾靡容一息之間斷而昏冥易忽之際尤當致戒謹之功蓋安其身所以為朝聽晝訪之地而夜氣深厚則仁義之心亦浩乎其不窮本既立矣而又致察於事物周旋之頃敬義夾持動靜交養則人欲無隙之可入天理皎乎其昭融然知及之而仁弗能守之亦空言其奚庸爰見針以自砭常凛凛而瘝恫問答問新民章朱文公言洗濯其心以去惡猶沐浴其身以去垢斯言盡矣蓋身之有垢特形骸之凝耳然人猶知沐浴以去之惟恐塵垢存則其體汙穢至於心者神明之府乃甘心為利欲所溺以昏蔽之甚如積糞壤如聚蜣蛔而不肯一用其力以去之是以形體為重以心性為輕也豈不謬哉唐人有櫛銘曰人之有髮朝朝思理有身有心胡不如是深得成湯銘盤之意禪家亦有所謂身似菩提樹心如明鏡臺時時勤拂拭莫遣著塵埃之句雖云異端然此言亦自可取也禮記儒行篇云儒有澡身而浴德謂洗濯其身沐浴其德亦盤銘之義問格物致知物謂事物也自吾一身以至於萬事萬物皆各各有箇道理須要逐件窮究且如此一身是從何來須是知天地賦我以此形與我以此性形既與禽獸不同性亦與禽獸絶異何謂性仁義禮智信是也唯其有此五者所以方名為人我便當力行此五者以不負天之所與而所謂仁者是如何義者是如何禮智信又是如何一一須要理會得分曉此乃窮一心之理其次則我為人之子事親當如何為人之弟事兄當如何為人之幼事長當如何逐件理會如事親須知冬便須溫夏便須凊出便用告反便用靣如曲禮內則等書所載事親説話都要曉得以至事兄事長等事一一如此窮究此則窮一身之理也心之於身乃是最切要處其他世間事物皆用以漸考究令其一一分明皆所謂格物也格訓至言於事物之理窮究到極至處也窮理既到至處則吾心之知識日明一日既久且熟則於天下之理無不通曉故曰物格而後知至也此一段聖人教人最緊要處蓋緣天下之理能知得方能行得若知得一分只是行得一分知得十分方能行得十分所以用逐事窮竟也今學者窮理之要全在讀書如讀此一書須窮此一書道理一字一句都用考究如未曉了即須咨問師友求其指歸且如讀大學自頭至尾都窮究過既曉得此一書了又讀論語孟子亦自頭至尾窮究過理會既多自然通悟若泛泛讀過便以為了何緣知得義理透徹義理既不透徹胸中見識亦無由能進雖窮理不止於讀書而其大要却以讀書為本不可不知也萬物各具一理萬物同出一原所謂萬物一原者太極也太極者乃萬物總會之名有理即有氣分而二則為隂陽分而五則為五行萬事萬物皆原於此人與物得之則為性性者即太極也仁義即隂陽也仁義禮智信即五行也萬物各具一理是物物一太極也萬理同出一原是萬物統體一太極也太極非有形有器之物只是理之至者而已故曰無極而太極問其所當然而不容已與其所以然而不容易所當然如為君當仁為臣當敬為子當孝為父當慈與國人交當信之類此乃道理合當如此不如此則不可故曰所當然也然仁敬孝慈信之屬非是人力強為有生之初即稟此理是乃天之所與也故曰所以然所當然是知性知其理當如此也所以然是知天謂知其理所自來也問人之所以為學心與理而已或問中語存心窮理二者當表裏用功蓋知窮理而不知存心則思慮紛擾物欲交攻此心既昏且亂如何窮得義理但知存心而不務窮理雖能執持靜定亦不過如禪家之空寂而已故必二者交進則心無不正而理無不通學之大端唯此而已問端莊靜一乃存飬工夫語録中語下同端莊主容貌而言靜一主心而言蓋表裏交正之義合而言之則敬而已矣問學問思辨乃窮理工夫程子曰涵養須用敬進學則在致知欲窮理而不知持敬以養心則於義理必無所得知持敬以養心矣而不知窮理則此心雖清明虛靜而無許多義理以為之主其於應事接物必不能皆當釋氏禪學正是如此故必以敬涵養而又講學審問慎思明辨以致其知其靜則湛然寂然而有未發之中其動則泛應曲當而為中節之和天下義理學者工夫無以加於此者自伊川發出而文公又從而闡明之中庸尊德性道問學章皆同此意也問大學只説格物不説窮理器者有形之物也道者無形之理也明道先生曰道即器器即道兩者未嘗相離蓋凡天下之物有形有象者皆器也其理便在其中大而天地亦形而下者乾坤乃形而上者天地以形體言乾坤以性情言乾健也坤順也即天地之理日月星辰風雨霜露亦形而下者曰性曰心之理乃形而上者至於一物一器莫不皆然且如燈燭者器也其所以能照物形而上之理也且如床桌器也而其用理也天下未嘗有無理之器無器之理即器以求之則理在其中如即天地則有健順之理即形體則有性情之理精粗本末初不相離若舍器而求理未有不蹈於空虛之地非吾儒之實學也所以大學教人以格物致知蓋即物而理在焉庶幾學者有著實用功之地不至馳心於虛無之境也問誠意數條自慊是為己言己之所以為善者乃是我合當如此若不為善此心自不快足自不能安非是為他人而為善也自欺是為人本無實意為善但外靣略假借以欺人欲人稱好而已殊不知人心之靈昭如日月何可欺也只是自欺而已自慊是誠誠則一自欺是偽偽則二問正心修身章問聖人恐無怒容否朱子曰當怒時亦必形於色如治人之罪却為笑容則不可曰如此則恐涉忿厲之氣否曰天之怒雷霆亦震但當怒而怒便中節事過便消了更不積問古人喜怒不形於色是正否曰此是養得胸中和粹故雖中有喜怒而不形於色此正是涵養之效安得謂之不正又問古人憂國至於白首怒敵至於裂眥此正否曰憂國怒敵憂與怒之正者雖若太過然亦是不失其為正但此乃志義之士所為若聖人則未必然必如是觀之乃盡問體用二字大凡有體而後有用如天地造化發生於春夏元亨而斂藏於秋冬利貞發生是用斂藏是體自十月純坤陽氣既盡不知者謂生意已熄不知斂藏者乃所以為發生之根自此霜雪凝沍草木凋落蟲蛇伏藏微陽雖生於下隱而未露一年造化實基於此惟冬間斂藏凝固然後春來發生有力所以冬暖無霜雪則來嵗五榖不登正以陽氣發泄之故也人之一心亦是如此須是平居湛然虛靜如秋冬之閉藏皆不發露渾然一理無所偏倚然後應事之時方不差錯如春夏之發生物物得所若靜時先已紛擾則動時豈能中節故周子以主靜為本程子以主敬為本皆此理也動靜皆道而周子乃以主靜為本者蓋靜時養得虛明然後動而不失其時故中庸於喜怒哀樂未發之時須要戒謹恐懼以養本然之中然後發而為中節之和程子主敬之説即中庸之意也問仁字之義此下並論語仁之一字從古無訓且如義訓宜禮訓理又訓履智訓知皆可以一字名其義唯仁不可以一字訓孟子曰仁者人也亦只是言仁者乃人之所以為人之理亦不是以人訓仁蓋緣仁之道大包五常貫萬善所以不可以一言盡之自漢以後儒者只將愛字説仁殊不知仁固主乎愛然愛不足以盡仁孟子曰惻隱之心仁之端也惻隱者此心惻然有隱即所謂愛也然只是仁之發端而已韓文公言博愛之謂仁程先生非之以為仁自是性愛自是情以愛為仁是以情為性也至哉言乎朱文公先生始以愛之理心之德六字形容之所謂愛之理者言仁非止乎愛乃愛之理也蓋以體言之則仁之道大無所不包發而為用則主乎愛仁者愛之體也愛者仁之用也愛者如見赤子入井而惻然欲有以救之以至矜憐憫惜慈祥恩惠愛之謂也性中既有仁矣發出來便是愛仁如根上發出苖以苖為出於根則可以苖便為根則不可以愛出於仁則可以愛便作仁則不可故文公以愛之理三字言之方説得盡又曰心之德何也蓋心者此身之主而其理則得於天仁義禮智皆此心之德而仁又為五常之本如元亨利貞皆乾之德而元獨為四德之首天之元即人之仁也元為天之全德故仁亦為人心之全德然仁之所以為心之德者正以主乎愛故也仁所以能愛者蓋天地以生物為心而人得之以為心是以主乎愛也愛之理心之德六字之義乃先儒所未發而文公始發之其有功於學者至矣豈可不深味之乎問過化存神溫良注過化存神此四字本出孟子過化謂聖人凡所經歷處人皆化之存神謂其中所存神妙正意只是如此至橫渠先生乃謂性性為能存神物物為過化下性字指本然者而言上性字是謂我能存其性而不為情所蕩而失其性則其所存者神妙而不可測下物字指事物而言上物字指我之應物而言謂物物各自有理我隨其理以應之物各付物不以己之私意參乎其間則事過弗留如氷之釋如風之休後來諸老先生多本其説獨文公不以為然者蓋孟子之意未説到如此深故也文公解經每務平實如此然橫渠先生之説亦不可不知也問禮樂用和為貴章敬者禮之本制度威儀禮之文和者樂之本鐘鼓管磬樂之文禮樂二者闕一不可記曰樂由陽來禮由隂作天髙地下萬物散殊而禮制行焉天尊於上地卑於下萬物散殊有大有小此即制之所由起蓋禮主乎别故也流而不息合同而化而樂興焉隂陽二氣流行於天地之間未嘗止息二氣和合而化生萬物此樂之所由興蓋樂主乎和故也所謂隂陽二氣者日月雷霆風雨寒暑之類皆是二氣和合方能生成萬物故禮屬隂凡天地間道理一定而不可易者皆屬隂樂屬陽凡天地間流行運轉者皆屬陽禮樂之不可闕一如隂陽之不可偏勝一嵗之間寒暑之相易雨露霜雪之相濟方能氣候和平物遂其生陽太勝則亢而為旱隂太勝則溢而為水有隂無陽則物不生有陽無隂則生而不成禮勝則離以其太嚴而不通乎人情故離而難合樂勝則流以其太和而無所限節則流蕩忘返所以有禮須用有樂有樂須用有禮此禮樂只是就性情上説然精粗本末亦初無二理禮中有樂言嚴肅之中有自然之和此即是禮中之樂樂中有禮言和樂之中有自然之節此即是樂中之禮朱文公謂嚴而泰此即禮禮有樂和而節此即樂中有禮問仁字人而不仁章凡天下至微之物皆有箇心發生皆從此出緣是稟受之初皆得天地發生之心以為心故其心無不發生者一物有一心自心中發出生意又成無限物且如蓮實之中有所謂么荷者便儼然如一根之荷他物亦莫不如是故上蔡先生論仁以桃仁杏仁比之謂其中有生意才種便生故也惟人受中以生全具天地之理故其為心又最靈於物故其所藴生意才發出則近而親親推而仁民又推而愛物無所不可以至於覆冒四海惠利百世亦自此而推之爾此人心之大所以與天地同量也然一為利欲所汨則私意橫生遂流而為殘忍為刻薄則生意消亡頑如鐵石便與禽獸相去不逺豈不可畏也哉今為學之要須要常存此心平居省察覺得胸中盎然有慈祥惻怛之意無忮忍刻害之私此即所謂本心便當存之養之使之不失則萬善皆從此而生問理明誠格問禘章蓋凡人於世之近者如考妣祖考妣則意其精神未散或嘗逮事而記其聲容必起哀敬之心而不敢忽若世之逺者相去已久精神之存與否不可得而知人素不識其聲容則有易忽之意故禘禮非極其仁孝極其誠敬者不能知其禮不能行其事惟仁孝之深者能知此身之所自來惟誠敬之至者能知我之精神即祖考之精神茍能知此理矣至難知者鬼神之理則其他事物之理又何難知之有茍能感格矣則推而格天地者此誠而已推而感人心亦此誠而已故曰理無不明誠無不格於治天下何難矣問終食不違仁此章當作三節看處富貴貧賤之間而不茍此一節猶是粗底工夫至終食不違又是一節乃是存心飬性細密底工夫然猶是平居暇日之事可以勉而至者至於造次急遽之時患難傾覆之際若非平時存養已熟至此鮮有不失其存心者到此而猶不違乃是至細至密工夫其去安仁地位已不逺矣然此三節乃進德之始終若無粗底工夫作根腳基址豈有能進於細密之地者故必以審富貴安貧賤為本然後能進於終食不違之地能終食不違矣然後能進於造次顛沛不違之地用工之序蓋如此正與前章無諂無驕樂與好禮相似當考參而熟玩也問志氣晝寢章孟子曰志者氣之帥也蓋志強則氣亦強志惰則氣亦惰如將勇則士亦勇將惰則士亦惰也學者欲去昏惰之病必以立志為先問文章性與天道夫子平時以身教人凡形於威儀容止語默動靜自然成文自然有章者皆所以教學者所謂吾無行而不與二三子吾無隱乎爾者是也學者即其近者求之用功既久自然可到精微之地若遽以性命之理告之則恐其億度料想馳心元妙反無所益故於性與天道罕嘗言之學者不可得而聞其於論語僅有相近一語亦只是言氣質之性非指性之本至於易乾卦然後曰乾道變化各正性命大傳曰一隂一陽之謂道繼之者善也成之者性也此二條又是正説性與天道亦可謂罕言矣問敬字敬簡章伊川先生言主一之謂敬又恐人未曉一字之義又曰無適之謂一適往也主於此事則不移於他事是之謂無適也主者存主之義伊川又云主一之謂敬一者之謂誠主則有意在學者用功須當主於一主者念念守此而不離之意也及其涵養既熟此心湛然自然無二無雜則不待主而自一矣不待而自一即所謂誠也敬是人事之本學者用功之要至於誠則逹乎天道矣此又誠敬之分也問不違仁心者指知覺而言也仁者指心所具之理而言也蓋圎外竅中者是心之體虛靈知覺者是心之靈仁義禮智信是心之理知覺屬氣凡能識痛癢識利害識義理者皆是也若仁義禮智信則純是義理人能克去私欲則所知覺者皆義理不能克去私欲則所知覺者物我利害之私而已純是理即是不違仁雜以私欲便是違仁問手足不仁博施章手足民物之比也風邪私意之比也人無私意之害則民物之休戚自然相關一見赤子入井則此心為之怵惕無風邪之病則手足之癢痾亦自然相關雖小小疾苦此心亦為之痛楚當如此玩味方曉程子痿痺不仁之意問色舉翔集色斯舉矣去之速也衛靈公問陳而孔子行魯受女樂而孔子去即此義也翔而後集者就之遲也伊尹俟湯三聘而後幡然以起太公伯夷聞文王善養老而後出即此義也古人所謂三揖而進一辭而退雖相見聚會之間猶必如此况仕止久速之際乎賈誼賦所謂鳳縹縹而髙逝兮夫固自引而逺去此即色斯舉矣之意又曰鳳凰翔于千仭兮覽德輝而下之此即翔而後集之意後世如漢穆生以楚王戊不設醴而去諸葛武侯必待先主三顧而後從之皆有得乎此者也問太極中庸之義南雍李教授問今附此下問太極中庸二條自顧淺陋何足以辱姑即平時所讀朱文公先生之書及嘗見所窺者略陳一二夫所謂無極而太極者豈太極之上别有所謂無極哉特不過謂無形無象而至理存焉耳蓋極者至極之理也窮天下之物可尊可貴孰有加於此者故曰太極也世之人以北辰為天極以屋脊為屋極此皆有形而可見者周子恐人亦以太極為一物故以無極二字加於其上猶言本無一物只有此理也自隂陽以下則麗乎形氣矣隂陽未動之前只是此理豈有物之可名耶即吾一心而觀之方喜怒哀樂之未發也渾然一性而已無形無象之中萬理畢具豈非所謂無極而太極乎以是而言則思過半矣喜怒哀樂之未發即寂然不動之時思慮一萌則已動矣故程子以思為巳發此至論也來諭謂思是已發則致知格物亦是已發此則未然蓋格物致知自屬窮理工夫大凡講論義理最忌交雜今方論喜怒哀樂之發未發而以致知格物雜之則愈混雜而不明矣來諭又恐懸空無用力處此亦未然蓋未發之時則當戒謹恐懼其將發之時則當謹其獨逐時逐節皆有用功之地惟其未發也戒懼而不敢忘將發也謹獨而不敢肆則其發自然中節矣聖賢之學所以無弊者正緣句句著實未嘗説懸空道理且如中庸始言天命之性終言無聲無臭宜若髙妙矣然曰戒謹曰恐懼曰謹獨曰篤恭則皆示人以用力之方蓋必戒懼謹獨而後能全天性之善必篤恭而後能造無聲無臭之境未嘗使人馳心窈冥而不踐其實也太極圖説亦然首言無極太極次言隂陽五行亦可謂髙且逺矣要其歸宿只在中正仁義而主靜之一語其與中庸戒懼謹獨之云若合符節總而言之惟敬之一字可以該也蓋戒懼謹獨者敬也主靜亦敬也學者儻能居敬以立其本而又窮理以致其知則學問之道無餘藴矣大率此理自文公盡發其祕以洞然無疑所慮學者欲自立一等新竒之論而於文公之言反致疑焉不知此老先生是用幾年之功沈潛反覆參貫融液然後發出以示人今讀其書未能究竟底藴已先疑其説之未盡所以愈惑亂而無所明也故區區常勸朋友間且將文公四書朝夕涵咏既深達其旨矣然後以次及於太極西銘解近思録諸書如此作數年工夫則於義理之精微不患其無所見矣又必合所知所行為一致講貫乎此則必踐履乎此而不墮於空談無實之病庶乎其可耳此平時拙論如此故因垂問及之更望詳加鐫曉以補昏愚之所不逮幸甚論主靜周子嘗謂聖人定之以中正仁義而主靜要人靜定其心自作主宰程子又恐只管靜去與事物不相交涉却説個敬有問周先生説靜與程先生説敬義同而意異否曰程子是怕人不得他靜字意便似入禪坐定周子之説只是無欲故靜其意大抵以靜為主朱子發明二先生意如此至其為論有云明道教人靜坐李先生亦教人靜坐須靜坐始能收斂又云始學工夫須是靜坐則本原定又云心於未遇事時須是靜臨事方用便有氣力如當靜時不靜思慮散亂及至臨事已先倦了伊川解靜專處云不專一則不能直遂間時須是收斂做事便有精神又云心要精一方靜時便湛然在此不得困頓如鏡樣遇事時方好又云為學工夫須要靜靜多不妨才靜事都見得然總是一個敬又云主靜所以養其動又云靜者養動之根又云主靜夜氣一章可見以上數條蓋祖周子主靜之根也至其門人以靜坐工夫與役役應接不同為問則答之云不必如此反成坐馳但收斂勿令放逸到窮理精後自然思量不至妄動凡所云為莫非至理亦何必兀然靜坐然後為持敬又云明道説靜坐可以為學上蔡亦言多著靜不妨此説終是少偏才偏便做病道理自有動時自有靜時學者只是敬以直內義以方外見得世間無處不是道理不必專於靜處求所以伊川謂只用敬不用靜便説得平又云不可特地將靜坐做一件工夫但著一敬字通貫動靜則於二者之間自無間斷矣又云存養之功不專在靜坐時須於日用動靜之間無處不下工夫乃無間斷爾又云無事靜坐有事應酬隨時隨處無非自己身心運用但常自提撕勿與俱往便是工夫事物之來豈以漠然不應為是耶其答南軒書云來教謂言靜則溺於虛無然此二字如佛老之論則誠有此患若以天理觀之則物之不能無靜猶靜之不能無動也靜之不可不養猶動之不可不察也但見得一動一靜互為其根敬義夾持不容間斷之意則雖下靜字元非死物至靜之中自有動之端焉是乃所以見天地之心者而先王之所以至日閉關蓋當此之時則安靜以養乎此爾固非逺事絶物閉目兀坐而偏於靜之謂但未接物時便有敬以主乎其中則事至物來善端昭著所以察之者益精明爾來教又謂某言以靜為本不若遂言以敬為本此固然也然敬工夫通貫動靜而必以靜為本今若遂易為敬雖若完全然却不見敬之所施有先有後則亦未得為的當也至於來教所謂要須靜以涵動之所本察夫動以見靜之所存動靜相須體用不離而後為無滲漏也此數言卓然意語俱到謹以書之左席出入觀省以上數條則又本程子主敬之説而不專主於靜也論定性定性者理定於中而事不能惑也理定之中則當靜之時固定也動之時亦未嘗不定也不隨物而往不先物而動故曰無將迎理自內出而周於事事自外來而應以理理即事也事即理也故曰無內外夫能定能應有寂有感心之妙也所以然者性也若以定與寂為是而應與感為非則是以性為有內外也事物之來以理應之猶鑑懸於此而形不能遁也鑑未嘗隨物而照性其可謂隨物而在外乎故事物未接如鑑之本空者性也事物既接如鑑之有形者亦性也內外曷嘗有二本哉知此則知事物不能纍吾之性雖酬酢萬變未嘗不定也備考勉齋黃氏曰西山在朝屢進危言力扶大義公論藉以開明善類為之踴躍邵菴虞氏曰先生大學衍義之書本諸聖賢之學以明帝王之治據已往之迹以待方來之事慮周乎天下憂及乎後世君人之軌範蓋莫備斯焉敬齋胡氏曰自孟子後千四百年無人見得此道分明董子見其大意孔明天資有暗合處韓退之揣見倣佛至程朱方見得盡自朱子後無人理會得透徹真西山庶幾先文貞公觀瀾録曰朱子之後在宋魏之華不如真之實也在元吳之僻不如許之醇也在明則薛蔡守師傳而陳王立異户考其師友淵源所漸若猶慚于真許焉又榕村語録曰朱子後儒者真西山許魯齋氣象最好真醇正許篤實郡守江叔文先生塤江塤字叔文崇安人貌肅氣和學於真西山嘉定元年進士歷官靖州通判以廉白簡易稱遷知南平軍綏御有法四境帖然嘗條奏五事皆熟察民隱帥臣上績改知開州未任卒公自幼至老惟事問學在靖州日魏公了翁以言事謫至築鶴山書院居之茆簷竹几間青燈濁酒旦夕談論令其子鉌師事焉魏公稱之曰叔文表裏如一當於古人中求之子燧字華叔篤學有志操歷官臨安判鎔字成叔頴敏特立歷知福清縣各有政聲鉌見魏鶴山學派監院詹景憲先生淵詹淵字景憲崇安人慶元進士授臨江户掾江西俗嚚於訟案牘有數十年不決者淵一閲皆得其情凡所豫奪人皆無異論部使者知其材檄致幕下後監行在車輅院學士林以道先生存林存字以道閩縣人受業真西山之門舉嘉熙二年詞科纍官吏部侍郎中書舍人兼直學士院兼侍講時朝廷以參知政事蔡抗擅去國勉留不還詔除職豫祠存繳進奏寢其命寶祐五年秋明堂執綏偹顧問稱旨除禮部尚書兼侍讀提綱史事纍遷同知樞密院事兼參知政事後以資政殿學士知建寧府不赴遂提舉洞霄宫復起為湖南安撫使知潭州閩書新三山志少卿王實之先生邁王邁字實之自號臞軒仙逰人既冠以文謁鄉先正傅誠誠嗟異謂他日必以文名世嘉定十年進士第四人為潭州觀察推官丁內艱調浙西安撫司幹官會廷試詳定官王元春欲私所親置髙第邁顯摘其繆元春怒嗾諫官李知孝誣邁在殿廬聲髙免官調南外睦宗院教授真德秀方守福州邁竭忠裨郡政赴都堂審察丞相鄭清之曰學官掌故不足浼君俄召試學士院策以楮幣邁援據古今考究本末謂國貧楮多弊始於兵議者徒患楮窮弗懲兵禍今當以核軍實窒邊釁為救楮弊第一義又言修內司廣營繕內帑宣索多厚施緇黃濫豫嬪御未見裁撙徒聞有括田榷鹽之議向使二事可行故相行之久矣又因楮以及時事言君子之類雖進而道未行小人之迹雖屏而心未服真德秀在告聞邁對善之帝再相喬行簡或傳史嵩之復用邁言舊相姦險刻薄天下所知復用則君子空於一網矣邁由疏逺見上空臆無隱上為之改容言者劾邁論邊事過實魏了翁在經筵為理宗言惜邁去改通判漳州禋祀雷雨應詔言天與寧考之怒久矣麯糵致疾妖冶伐性初秋踰旬曠不視事道路憂疑天與寧考所以怒也隱刺覆絶攸嬉尊寵綱淪法斁上行下效京卒外兵狂悖迭起天與寧考所以怒也陛下不是之思方用漢災異免三公故事環顧在廷莫知所付遙相崔與之臣恐與之不至政柄必他有所屬此世道否泰君子小人進退之機於是臺官李大同言邁交結德秀了翁及洪咨夔以收虛譽削一秩免蔣峴劾邁前疏妄論倫紀請坐以非所宜言之罪削二秩久之復通判贑州改福州建康府信州皆不行淳祐改元通判吉州右正言江萬里袖疏榻前曰邁才可惜不即召將有老不及用之歎理宗方然忽有尼者祗除知邵武軍以亢旱應詔驛奏七事復以立濟王後為先鄭清之再相以左司郎官召力辭以直祕閣提點廣東刑獄亦辭改右侍郎官諫官焦炳炎論罷豫祠卒贈司農少卿邁本以學問詞章發身尤練世務李宗勉嘗論邁然邁獨評宗勉為近世賢相徐清叟與邁有違言邁應詔謂清叟有人望可用故世服其公宏簡録莆陽文獻鄭先生寧鄭寧按劉後村題鄭寧文卷詩云昔侍西山講習時頗於函文得精微書如逐客猶遭絀辭取橫汾亦恐非爭笛豈能諳雅樂綺紈原未識深衣嗟余老矣君方少勤向師門叩指歸又小注後云西山先生編文章正宗如逐客書之類只作小字附見內詩歌一門初委子裒輯余取秋風辭西山欲去之蓋其議論森嚴如此鄭君試以此意求之可也按此跋語自注云西山作跋考西山集中未得再鄭君或即後村門士未可知也録此待考直閣鄭子敬先生寅鄭寅字子敬永福人以父任補官歷知吉州召對言濟邸寃狀指斥權臣坐罷端平初調為左司郎中兼權樞密院副都承旨又請為濟邸立廟具言三邊無備宿患未除宜正紀綱抑僥幸裁濫賞汰冗兵以張國勢竟出知漳州除直寶章閣致仕卒寅靜重博洽多識典故家所藏書分為七略曰經曰史曰子曰藝曰方伎曰文曰類真德秀李燔陳宓皆與為友燔嘗疏薦海內名士十二人寅其一云閩書宗教詹叔簡先生師文詹師文字叔簡崇安人舉慶元二年進士刻意好學調婺源尉捕盜有功不欲上以希賞再調江西憲司檢法官讞獄無寃後授西外宗教以歸與真德秀鄒應龍交遊有幔亭遺稿及通典編要建寧府志閩中理學淵源考卷三十
