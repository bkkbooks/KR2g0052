body:
  text: 閩中理學淵源考卷七十八廣平府知府李清馥撰清溪李氏家世學派嘗讀曽祖伯漁仲先生敘族譜繫略云余家世相傳系出李唐江王之後曩甲午見族人參軍孔文於延平手家乘相示自武陽流移之後數世昭穆具存其散處他州者記次甚有序謂余為其宗人蓋灼灼也歸檢舊譜讀朴祖自序稱先世家尤溪尤為延屬邑竊意孔文為不謬夙聞奉常曽經田陽奉羊豕登絶巘祭所謂先廟者子孫村朴業樵漁所居里名翰林﨑在大田縣治之東十里大田未建昔𨽻尤溪嗣後在明檢討亦過而拜焉問其髙年具稱一支徙湖頭在季元之世然則朴祖距前祖未逺所聞有據合諸斯言殆不誣也清馥謹按漁仲先生所敘皆係始祖以上者今據舊譜斷自君達公為始祖君達公感化里河洋保人元泰定二年置田莊貫常樂里而住在清溪藍湖之感化里其溪據湖之端水流而下其色藍故曰藍湖也二世祖名號無傳惟舊木主題干五位三世祖玊山公行善好施老而彌篤至六世祖旌義朴菴府君力行仁義家聲始大再世而第二子南豐令公煜舉景泰庚午鄉薦受書於户部主事莆陽黃公聲仲刻志問學詩書之澤已顯逮萬厯庚辰公之五世孫心湖先生𢡟檜始登甲科由是人文踵起遂稱安溪名族嘗考正嘉以前時潛修亮節之士亦有應述者如紀善先生亮清風夙學望著鄉閭載在志乘至前修所品待如九世祖羅峯府君受知於周公孟中中藍先生瀾受學於蔡公元偉何公炯瑞峯先生鳴陽從遊於莊公履豐其親師問學皆有派别可尋已附見之學派矣今録自朴菴府君而下并諸前輩派繫逮隆萬以降心湖諸公蓋心湖先生立朝忠讜清修有進退大節仍朴先生仕亨懷藍先生栻以易學相師授而幹宇先生楨有循聲亮節與李公衷一相友善若吾髙祖念次府君卓犖好義敦説詩書有朴祖遺風其樹義尤宏逺矣若餘隱先生明季遺獻實曽祖伯漁仲公先曽祖惟念公受業之師也家世隱德未能詳述敬附其大略待考焉念次府君及漁仲府君惟念府君本傳别見國朝編録旌義李朴菴先生森李公諱森字俊茂號朴菴先世肇於唐江王元祥之後遷江南分居於泉之安溪感化里髙曽皆隱德大父則成公洪武初應詔舉孝亷授將仕郎判大名府內黃縣簿父宗江公修身慎行不樂仕進拻拓田廬以遺安於子孫公少慷慨有志向早嵗從師獵涉經史事親奉公式由其道二親謝人間事禮儀畢備追慕未嘗頃刻忘也公席先世遺産復自居積日起輕財重義賙窮恤匱凡遇假貸貧不能償者悉焚券契喪不能舉者終不能斂者即助以資捨藥以資貧病一日道經邑之劍口川見負擔者涉水被溺其心惻然詢諸故舊曰是路正當延汀漳泉要衝何不作輿梁以濟之衆皆以無力辭公遂發心捐資造橋至再不就間忽逢老人有言曰此溪險急難成長者欲造此橋須先造石塔以鎮之言訖不見公依言表浮圖數級而橋告成又往莆造江口大石橋本邑復造龍津鳯池等二十五橋事具邑乘正統間協造本府黃堂及本邑琴堂又修郡庠黌門及本邑大成殿以至東嶽五帝殿元妙觀及一應神祠聖像莫不助資理粧飾正統中遭嵗飢荒應詔出粟五千石賑濟又慕義輸邊三千石有司具名以聞以上參陳公巘送公之官序朱公撰墓志陳公紹功撰本傳及縣志詔旌義民詣闕謝復拜賜贈帛酒饌由是聞望顒昻聲譽益彰方嶽郡邑循例交薦授官保障鄉邦疏纍上核實命未下適沙尤寇發公以旌義奉檄統鄉之義勇子弟數千𠞰殄總兵官具功次奏聞授清漳九龍嶺巡檢輿論咸以為未足以償其敵愾之績而公處之泰然且曰三世荷列聖子惠洪恩兹值梗化陸梁當捐軀戮力服勤皇家不避艱險衝冒矢石固分內事也豈可計資秩之崇卑哉茍能盡職萬一則銓衡自有公論聞者莫不壯其志而期於逺大也瀕行薇垣名卿守令將師咸以禮餞旌其折衝防禦之勞晉江親舊友契供帳於石筍江之滸時處士陳氏瓛素知公者撰序以華其行景泰元年庚午九月也以上見陳氏瓛送公之官序三年從安溪耆民請調公源口渡至則建廳事修房舍以綏兵卒永春德化前後缺令監司命公攝其篆公所至多惠績二邑咸謳頌之已攝安溪則修公館整儀門以安吏民數年之間邑政具舉凡百廢墜煥然一新天順癸未暑雨彌月大浸稽天公所建劍口及龍津三大橋圯公冒雨省視太息曰百年之功盡於此乎由是民復病涉公因之抑欎成疾遂至不起見朱公撰墓志及陳氏紹功撰本傳公自微有官迄白首大都折莭為義矜已諾其急人之困先於己公事既畢然後乃嘗酒食人以是嚴重之計五十年無曠時虛嵗公其性命於功德者乎里中人視公猶父望公家若庫庾尊之不名稱朴菴長者即有競不從邑令訊而信李長者之言化逮其弟俊德咸駢為義公生洪武三十一年戊寅二月卒天順七年癸未八月享年六十有六娶黃氏本邑感德處士黃氏胄之女有賢行子五人公既不得志於儒别立書孰置書田積書萬卷課諸子五子皆賦質超穎凡異卓犖咸有衣冠長烜義官先逝仲煜受書於戶部主事莆陽黃聲仲刻志學問應庚午鄉試中式見陳氏紹功撰本傳及陳氏瓛送公之官序後為南豐令炳承事郎炯散官不就焯貢太學為南雄司理十世孫清馥謹述按公事實見於邑郡志清源文獻陳氏紹功撰本傳詳哉其言之矣家譜中家傳之外亦陳公紹功所撰傳為詳而都憲朱簡齋所撰墓志譜中未及録刻只有公及妣黃氏遷墓記而處士陳氏瓛所撰公之官序亦未及登載二藁藏於從祖茂夫先生家前嵗於從弟清柱處持出鈔録蓋陳瓛先生字微仲號柏崖為明初髙士性孝友不求聞達宣德間纍召不起號為徵君載在志乘要其人為不茍作者且此公筆札殊少亦吉光片羽也簡齋朱公當日負碩望其所志皆精核今此藁集中亦未載兹就陳紹功先生藁本及郡縣志之外再莭録朱陳二先生曩時撰述略補本傳所未登載云爾再按朱簡齋先生願學藁天順七年十月十六日往湖頭祭公詩曰乘興相邀弔故人不辭艱險不辭辛湖頭紅日湖間雨林外青山林下津云云又題云同寺丞蔡公翼太守楊公輿知州陳惠提舉賀文通判陳睿往安溪湖頭弔祭朴菴李公讀此知公當時所交契者皆碩彥舊德志乘俱有傳表表而一時氣類之同逺從弔唁仰見公之德誼所孚矣清馥謹識縣令李勤齋先生煜李煜字秉常朴菴次子時清溪科第寥如公獨自奮發號勤齋以見志用壁經舉景泰庚午鄉試甲戌春闈副榜署福州羅源縣諭一切謝諸生常禮以大成殿明倫堂暨東西廡之圯也慨然笈家資重建之成化六年移諭江西建昌之南城其庀堂齋饌堂如教羅源時十三年江右直指保升南豐令下車詢民利病為之興除邑城依江旦夕假舟楫渡人不便即屣址鳩工築通濟橋延袤數百步人德公甚立石于橋左頌焉已復建山川社稷壇壝立曽子固先生書院設鋪舍建衆安亭政績詳載太史青齋劉公太常卿廣平程公碑暨太學生興造記中時豸繡屢以最聞擢有日矣顧公非其好也致政歸為鄉名德凡若而年今名宦鄉賢並祀之平生慷慨好施不事家人生産自博士至牧長二十餘年所至以清白稱宦逰資用悉從家輦致獨喜營建造福於民宛然先公遺意焉紀善李東臯先生亮李亮字文誠家貧植品嗜學事親盡孝邑令以孝友大書于旌善亭見邑志由明經教潮陽調任四明升淮王府紀善正德間致政歸老進階長史淮王賜之詩云論道經邦得老成年華驚見鬢絲盈丘園思切三章疏魚水難禁十載情酒􅍄山中應索醉鷗間海上可無盟明朝遣問須經對莫使江都獨擅名公之為紀善也傅王世子一日戲捋公鬚公正色拂袖引疾抗辭王數慰留不可居家絶迹公門士論髙之督學髙公委官存問嘉靖癸巳冬姪婦林陷賊投水死公年八十又一矣為詩三章以弔之如古風人之長言嗟嘆公生平不隱惡不虛美其莭概有如此者夀八十五終祀鄉賢名宦文學李羅峯先生鏜李公諱鏜字時和號羅峯事繼母張盡孝愛諸弟養而教之無同異少俊穎督學周公孟忠行部延平過湖夜宿清溪宫竒湖中山水曰是必有俊彥數顧問此間佳子弟盍與俱來公年十三長未四尺踊於叢而觀貴人周從髙望見一少小衣服嫺雅傳呼以入公躡級及堂拜起有儀試一題即其旁立成呈畢出周曰雖其齒未也作養則有餘立與附庠既去留題宫壁曰迢遞漳平四日程清溪夜卧到天明年豐已喜民安堵村靜不聞犬吠聲自是山川留過客却教風雨阻行旌搜求俊彥充庠序從此湖頭多顯名為公作也題在嘉靖癸卯後三十餘年奉常成進士族中纍登科第踐班行踵相接為達官卿相先正篤學清修精爽不二言若持券可謂先覺公治家嚴肅祭先必豐潔簋有常物晚稍耗當祀少一鵝恚纍旬不自懌蓋至性之厚鄉里推重此其一端也清溪李氏家譜傳附文貞公識詩後明嘉靖季學使者周公取道吾鄉阻雨信宿羣兒聚觀因試以文拔二人入泮髙祖與焉臨行留此詩署曰木鐸道人題時鄉族間發解者才一二自後科第遂盛今四十餘人矣長老以為詩讖故勒石所駐山隈不忘其志也玄孫光地謹識通判李中藍先生瀾李瀾字子觀别號中藍自幼警敏刻勵嘉靖丙午鄉薦凡九上春官弗售至隆慶辛未年望艾矣遂謁銓為衢州府通判仁心為質上下信之嘗攝郡篆又嘗假令於龍遊常山江山開化諸邑諄諄曉諭無煩鈎巨獄訟衰息政教流行倅掌錢穀瀾矢心氷糵毫無緇染性朴呐不能與世俗低昻適當事者媒蘖之瀾方送織造留都聞其萌芽即拂衣歸里杜門謝客居五載而子栻生瀾志行敦篤事父母至孝每先形聲迎志意曲當其歡心居喪號劈如不欲生兄沒諸子未長瀾子之平生所為在倡義舉恤貧乏割私田以充公祀時時捐槖金佐族衆婚嫁死喪之不贍給者郡飢出粟數百斛賑救郡人德之文簡黃公鳯翔嘗曰公里居嘗招余與詹司寇飲儀制君即心湖先生之封君在焉公縷談今古間一舉觴封君侑以壺榼代勸酬而公泊如也若不知人間有引滿浮白事者其真朴類如此又云某嘗過衢郵邸問郵卒李使君昔日治衢何如卒曰清甚宗伯曰使君故有家無藉衢為肥也卒曰公見肥人不喫酒炙乎恨不兼人噉耳宗伯笑頷之歎曰李公李公當於古人中求之矣鏡山何公又云公所居在喧湫闤闠中以道自髙漻然如深山大谷寡接於世無競於物而其無名之朴自足鎮俗而維風可謂先進君子矣公仕本非好出見人之求致髙官大爵者真不覺如野人畸客見夥頥之為沉沉者爾先生受學豫先子有子栻舉進士卒年八十九崇祀鄉賢黃文簡公撰墓志先生撰本傳閩書縣志何鏡山太常李心湖先生懋檜李𢡟檜字克蒼號心湖安溪人旌義朴菴公六世孫總角馳文譽才擅一時萬厯八年進士除六安知州以愷悌稱入為刑部員外郎長二舒公耿公雅相慕嚮𢡟檜一日抗顔而前言讞獄非是者三其一謂中官與兵馬司詔獄失出可慮一則臨江守錢若賡罪逮父老詣闕誦寃者年俱近百並謫口外可矜一則侍郎洪朝選以勘遼藩忤江陵相指閩撫勞堪希相意窘死之獄中莫為申理者最後司寇僅當勞近戍其假旨及擅殺大臣法皆不蔽罪可恨𢡟檜言之激切二公斂容謝之舒竟致其事去緣是負伉直聲會詔求言𢡟檜上疏陳九事以應曰保聖躬安宫闈莭內供御近習開言路議蠲賑慎刑罰重舉敕制限田纚纚千百言皆切中利病其中安宫闈御近習二事尤聞者縮頸噤舌大略謂上近封貴妃為皇貴妃矣而恭妃尚仍故秩臣願亟行册封如皇貴妃之例何者貴妃以皇子得封乃恭妃則誕元子者元子國之本恭妃異日為國之母夫使國母位次皇貴妃下臣有以知皇貴妃之必不安也寧惟貴妃即皇上心亦必不安也臣不揣自今以往恭妃見皇貴妃禮能如前日乎能無局蹐自疑乎夫使儲君國母兩懷自疑恐非皇貴妃之福臣以為宜益封恭妃位在皇貴妃上即不然亦當使與貴妃徽號同恭妃安則國本安矣而左右􅉏御宜凖周禮冢宰之制三載别其淑慝而去留之是時上意淵深無人敢涉國本事獨𢡟檜與部郎劉復初顯指貴妃言之同日章並上上怒欲加重譴言者猶不已閣臣請上詔諸曹建言止及所司職掌以慰解上意居數日上亦霽威諸疏皆留中而𢡟檜所條餘七事亦寢不行會邵庶上疏請禁各官非言責者毋輒言又欲令各堂官禁其屬言𢡟檜上言庶因世延條奏波及言者欲概絶之防人之口甚於防川庶豈不聞斯語哉今天下民窮財殫所在飢饉山陜河南婦子仳離僵仆滿道疾苦危急之狀蓋有鄭俠所不能圖者陛下不得聞且見也邇者雷擊日壇星墜如斗天變示警於上畿輦之間子弒父僕弒主人情乖離於下庶以為海內盡無可言羣臣盡可依違淟涊默默固位已乎夫在廷之臣其為言官者十僅一二言官不必皆智不為言官者不必皆愚也無論往事即如邇嵗馮保張居正交通亂政其連章保留頌功詡德若陳三謨曽士楚者並出臺垣而請劍引裾杖謫以去者非庶僚則新進書生也果若庶言天下幸無事則可脫有不虞之變陛下何從而知庶復以堂上官禁止司屬為得計伏覩大明律百工技藝之人若有可言之事直至御前奏聞但有阻遏者斬大明會典及皇祖卧碑亦屢言之百工技藝之人有言尚不敢阻况諸司百執事乎庶言一出志士解體善言日壅主上不得聞其過羣下無所獻其忠禍天下必自庶始陛下必欲重百官越職之禁不若嚴言官失職之罰當言不言坐以負君誤國之罪輕則記過重則褫官科道當遷一視其章奏多寡得失為殿最則言官無不直言庶官無事可言出位之禁無庸太平之效自致矣上責其沽名命貶一秩科道合救不允庶偕同列胡時麟梅國樓郭顯忠復交章論劾乃再降一秩為湖廣按察司經歷𢡟檜雖放斥外幕而忠益勵氣益奮至謫所聞邊警復郵奏安邊之䇿宜用馬端肅俞武襄車制禦邊而薦趙文毅有文武才大將則舉朱先郭成黎國耀等疏再上不報久之量移南通政司經歷歷禮部主事丁外艱歸服除赴補牘數上不獲命旅食京師者三年而不知已疏名御屏錮不用矣乃告歸自是里居者二十年當道屢薦無虛月神宗晚亷其忠丙辰即家起南兵部主事𢡟檜念母老乞養歸遂轉員外郎尋丁內艱光宗立録舊臣起禮部郎中遷光祿少卿轉太僕少卿一嵗三改命已復不調者三年天啓四年以北太常召而𢡟檜已於是嵗卒時年七十有一𢡟禬為人見事敏審機豫方蚤嵗即已留神世務練習朝章而精心密理足以運之藉令循循任職拾級而上亦足以致功而夷然不屑繇其謇諤之素遇觸必發蓋根於天性然也居家篤根本落戌籍搆宗祠表揚祖德縑緗捆載平生廓落無町畦無賢不肖咸以為親已素所交遊如鄒吉水薑丹陽吕竇陵魏南樂顧錫山許東陽蔡龍巖等皆號知交然時相規正有不與俱靡焉者衡文取士則李長庚魏説李若愚陳所藴何慶元宋之禎亦當世名卿其直言敢諫安邑自詹仰庇而後僅見𢡟檜一人耳明史邑志家傳墓志李仍朴先生仕亨李仕亨字克淡號仍朴生性朴厚少清苦讀書淹究經史早有文名天啓二年成進士年已五十九矣初授户部主事監大通橋丙寅督餉山西革招買蠧規商人歡悅時二閹至頗有忤言然終敬其清白莫能涅也戊辰出守嘉興三載政簡刑清凡父母子弟相為訟俱不譴訶而使自化其自志云不取一虧心錢不受一無處餽覲後即引疾歸著書課讀修葺宗譜皆崇厚力本之事閉戶絶應接復自號迂叟仕亨為諸生時力學傳教名輩多出其門族叔中藍公延請教其子栻孫日曄皆積年受業所著有四書注翼易本義翼四書解易解雜著迂言編皆以迂名焉崇禎丙子年卒郡志家傳邑志臬長李懷藍先生栻李栻字克儼號懷藍安溪人父瀾鄉榜官别駕有清望見蔡松莊學派栻萬厯庚子鄉書癸丑進士授刑部主事多所平反出守維揚加意恤民治漕理鹽善政猶傳舊有織造稅例一切革除之丁艱補潮陽潮故多盜至則立里保嚴警衛自是盜患寖熄有巨猾勢厚黨劇播惡莫敢忤視栻剪除惟亟需時屬托千函悉委于焰既斃而歡歌者比户時擬之除人鱷焉注意作士譽髦鵲起潮人衣冠之盛則自栻作牧始轉升髙肇副使七載緝盜安民聲績顯著晉大參分鉞端州道威望益隆最為百世利者造太平驛通濟橋為文記之廣人士誦德嵗餘升雲南按察使值土酋跳梁栻承委督餉鞅掌匪遑卒于官栻受易學於族兄仍朴先生自齠齔至登第無二師凡承易旨皆集而演之刻趨對編栻守先世田廬退不營山海之利進不取公帑之餘以經術垂訓子曰曄天啓五年進士由中書歷官至廣東副使郡志邑志家傳審理李幹宇先生楨李楨字克輔别號幹宇安溪人萬厯丙子舉人授安化令時萬厯之季海內蓋有開採之役璫陳鳳指縣有硃砂礦剋期興役上官莫敢議楨曲奉而陰阻之事得寢升茶陵州知州鋤姦剔蠧視安化有加以不能結奉上官再調臨髙縣因地震請罷稅礦一郡俱席其庇遷王府審理歸卒年七十有四何鏡山先生撰墓志略曰公椎魯狷介一似木強人而中懷潔白先哲自將心常在國家意常係斯民第不能修上官之名譽而候其顔色所以三仕不失令三令不能得美遷者乎公三調劑開採之役其大者矣其他省訟絶饋興學慎獄緩征斂重符信鋤姦梗以公亷自誓而以移風易俗望民蓋所至若一是以上官有商彛秦鏡之褒楚民有耳徑筆貴之謠至楚值征播之役粵值欽州之變公佐飛挽靖羽檄其通變之才不可以木強論者也余與公早嵗悉有四方之役逮公懸車則余謫宦里居二十餘年矣居常過公但見公編蒲緝栁無虛日月暇則鼓漁陽撾為三弄而已所著有狷介編若自為譜者外有問竒便覽仕隱緒言家藏年譜宦中獨鑑諸書何司徒撰墓志李瑞峯先生鳴陽李鳴陽字克儀别號瑞峰十洲公長子鳴陽學問根柢馬班於博士家言涉獵耳少壯甚自負久之數困棘闈兼家喪頻仍而父祖户務殷繁悉身肩之用此紛拿決棄纓鎖性伉爽輕財慕范文正公陶靖節為人有急必赴有侮不恥信心而行不求人知習與遊者如莊梅谷黃一龍兩先生蓋相知之深者也鳴陽檢身方正嘗思謹言慎動寡欲節飲四針以自警所稱述皆先獻格言一夕獨坐書室有美姝搴簾求貸鳴陽正色不動量探篋中錢遣去人方為魯男子云晚退居先公舊隱自為舊隱歌留心家譜綜核詮次特詳要於闡揚先德誘誨族屬文翰炳然誠家世之琬琰也自為壙志曰年近古稀不可謂不夀學知崇正不可謂俗流生平抱莫知之歎不可謂終身皆未定之天蓋自信無所愧怍齊順逆一死生非深於道不及比家譜進士李在明先生光龍李光龍字蟠卿號在明安溪人誕生時祖瑞峰公夢杜工部來訪覺值光龍生七嵗父命對乘桴浮於海光龍應聲束帶立于朝年十三從族叔肖巖公偕芳受易時里中多治尚書惟肖巖素治易精熟光龍年雖稚殊有悟稍長與閬瀛叔父鳳鳴同學又偕叔寶峰受業于孫伯紫先生疑即本傳中孫司理胎湖俟詳考每搆義屈行輩自言稍長為舉子業亦能帖括一二歸索家中遺書得馬班全集縱觀之玩味至忘寢食益厭時師訓詁學遂上及六經旁及諸子下至宋諸儒近代諸名公俱欲究其指歸汰其緒論又言自戊午以後讀書仲悔兄齋中桃源陳子因公車歸必攜笈就焉三人同席相證者不斤斤舉業專以品行相朂旁及經濟深究性命壬午出揭潛銘重熙房薦於主司稱光龍易學純深備采作程會試過江上阻寇而反里中士大夫競勸曰時事須公豈為斗祿哉於是強行癸未登進士第後為本房薛行塢所藴推重而房首為白東谷胤謙尤一見傾服是時光龍名重有速之應中祕之選者顧光龍愀然私謂薛師曰京師棼埃黯黯磚瓦咸碧即不習五行傳而吉凶居可知矣不廷試遂歸山中日與宗黨親朋沉淪詩酒間尋方外交戊午之間里中大變光龍深心潛力委蛇而坐消之事平後人始推其安鄉里之功光龍生於郡城負郭窮巷屬家道中衰旋移故里稍長即問家世之所以廢興狀因就外傅家貧素不事生産業浮沉諸生者最久然其才為國幹學足世儀郡邑大夫數式閭問政嘗講切師友於同郡黃東崖林平菴諸公有往復載集中可考平生著作不甚篋藏諸子頗收十之三未刻目曰閬山集卒年七十五時康熙乙巳年也宗中受業者族叔漁仲先生日燝惟念先生兆慶皆稱髙弟焉家傳山墓志閬集邑志閩中理學淵源考卷七十八
