body:
  text: 閩中理學淵源考卷二十二廣平府知府李清馥撰朱子延平門人并交友延平蕞爾土也自龜山先生載道而南一時從遊若吳國華陳了翁陳知黙諸賢同時講明正學迨羅豫章李文靖一脉相傳至朱子續楊羅李之宗恢大其統緒及門之彦若余氏大雅廖氏徳明其較著者也夫一郡英賢後先倡學盛矣而四賢者同時同郡仔肩往聖道脉抑又盛焉後之至斯土者如登東魯廟堂髙山景慕低回不能去云山長鄧先生邦老鄧邦老以字行将樂人朱子門人陳宓守延日以邦老道徳隆重而且耆年延入書院與李燔林羽蔡念成楊復余道夫李伯武趙師恕為堂長道南源委鄧衛老先生絅鄧絅字衛老将樂人與其兄邦老同遊朱子之門著有近思録問答考亭淵源録按近思録問答一條問昔受學於周茂叔每令尋仲尼顔子樂處所樂何事絅謂孔顔之所樂者循理而已矣朱子答云此等處未易一言斷且宜虚心玩味兼考聖賢為學用力處實下功夫方自見得如此硬説無益於事也竊謂前哲求此義多矣莫如熟復文公數語為切要間嘗三復易通中論顔子一簞食一節曰不愛不求曰見其大而忘其小曰見其大則心泰心泰則無不足無不足則富貴貧賤處之一此元公述顔子之樂之處最為親切且孔顔之樂似當就孔顔當身境遇憂樂相尋處體認尤切似難一蹴而可立談者紛紛推析繪畫乾坤之容恐未能肖似也余正叔先生大雅弟大猷余大雅字正叔順昌人父良弼博學明經為政知大體每以教化為先聚書數萬卷官廣西經略大雅與劍浦游敬仲同時從朱文公每見必告以簡約切實工夫歸於求放心一言兩領鄉薦省試不遇有朱子語録一卷余大猷字方叔亦從文公游文公稱其看得道理儘穏實道南源委朱子大全按文公答正叔書云所論正為敬義工夫不可偏廢彼専務集義而不知主敬者固有虚憍急迫之病而所謂義者或非其義然専言主敬而不知就日用間念慮起處分别其公私義利之所在而決取舍之幾焉則恐亦未免於昬憒雜擾而所謂敬者有非其敬矣且所謂集義正是要得看破那邊物欲之私却來這下認得天理之正事事物物頭頭處處無不如此體察觸手便作兩片則天理日見分明所謂物欲之誘亦不待痛加遏絶而自然破矣若其本領則固當以敬為主但更得集義之功以祛利欲之蔽則於敬益有助蓋不待著意安排而無昬憒雜擾之病上蔡所謂去却不合做底事則於用敬有功恐其意亦謂此也又曰前者所論未嘗欲専求息念但以為不可一向専靠書冊故稍稍放教虚閑務要親切自己然其無事之時尤是本根所在不可昬憒雜擾故又欲就此便加持養立个主宰其實只是一个提撕警䇿通貫動静但是無事時只是一直如此持養有時便有是非取舍所以有直内方外之别非以動静真為判然二物也上蔡之説便是如此亦甚要切但如此警覺久逺須得力爾千萬且於日用間及論語中著力令有箇會通處即他書亦不難讀爾再按傳中正叔與游敬仲同時從文公游按朱子語録考之姓氏録文公語淳熙五年戊戌以後所聞者從游俟再考朱再按陸稼書先生讀朱随筆論後一條按云凡子所言内外動静處可見其未嘗有所偏矣果齋李氏所謂晚見諸生繳繞於文義之間始頗指示本體者亦是此意而豈如姚江所謂晚年定論也哉宋先生宰宋宰字闕沙縣人張敬之先生顯父張顯父字敬之順昌人游連叔先生敬仲游敬仲字連叔南劍人閩中理學淵源考卷二十二
