body:
  text: 閩中理學淵源考卷二十七廣平府知府李清馥撰文簡劉晦伯先生鑰學派按真西山先生撰公神道碑略曰公平生大節雖未易以一善名然溯其學問源流與夫見諸謀謨事業則惟正之一言足以蔽之蓋公顯考銀青府君即恆軒先生懋蚤受學於屏山劉先生籍溪胡先生盡得義理精微之藴公幼在家庭耳濡目染朱文公以道德為學者師公出入其門切磨講貫者數十年視他從游之士為最久又曰公天資厚重而不浮純一而不雜又嘗用力於致知力行之地每於夜間斂衽默坐虛心省察嘗曰不於定靜時體察則應事接物或至有差嘗取節孝徐先生帖教子弟其言曰日入之後至於夜中事物俱靜志氣俱定是君子思慮經綸之時晝之所行夜之所思也至其立朝大節在乞罷僞學之禁以正人心息邪說又嘗言舍法兼取行藝今但考其藝而略其行請以朱某白鹿洞書院學規頒下兩學為諸生齊規與舊學規並行又取朱文公集注刋行胄監一時太學諸生稍務以道義相勉而知窮理居敬之說至講筵講論每援師說其奮忠陳謀察微慮逺於啓沃君心有獨至者今撮其大略著於篇文簡劉晦伯先生鑰劉鑰字晦伯懋子乾道八年進士歷官連城令蠲無名征斂新學宫教諸生八德之方改知閩縣清簡為治與民有信大族貴宦頑庶奸胥莫敢撓法諸臺府合詞列薦先生自謂與趙丞相汝愚有連避嫌乞通判潭州以歸寧宗受內禪先生寓書丞相曰前日之事如病寒熱一旦解散即無所苦至於蠱毒中人初不自覺觸物而發則殆矣蓋指韓托胄而丞相不能用丁父艱學禁方嚴從朱子於講學武夷築雲莊山房為終老計寧宗初知德慶府興學校練軍實入對請恐懼修省開言路進人才飭邊備執政議欲留先生宰臣陳自强曰斯人閩縣之政吾知之然真僞學也托胄誅自强逐遂以先生提舉廣東常平茶鹽嘉定二年召對帝嘉奬除吏部郎中輪對請開張聖聽於經筵講讀大臣奏對反覆問難以采義理之當否政事之是非乞外除浙西提㸃刑獄所劾不避權要所舉不受干求召國子司業言治道原於士風士風本於學術藝祖干戈甫定召處士王昭素講易禁中纍聖相承以為先務治教休明儒宗間出然後六經遺㫖孔孟微言復明於千載之後天下學者誦而習之以論語孟子大學中庸為準故其事父則孝事君則忠世之所謂道學也慶元以來權佞當國惡人議已指道為僞屏其人禁其書十餘年間學者無所依向義利不明趨向汚下望其立名節修職業胡可得也乞降明詔罷僞學之禁息邪說正人心宗社之福又言舍法兼取行藝今但考其藝而略其行故侍講朱某白鹿洞揭示學規皆聖賢教人大㫖謹録以進請頒下兩學與舊學規並行從之嘗言於丞相史彌逺請以朱子所著論語中庸大學孟子之說以備勸講後先生在成均遂以數書鋟於胄監俾學者誦習焉除權刑部侍郎兼祭酒左諭德同修撰時羣臣爭務容默先生疏請崇奬忠讜以作士氣深戒諛佞以肅百僚固藩籬選將帥尤今日不可緩者除刑部侍郎權工部尚書兼右庶子仍兼講讀於東宫每講論至經史所陳聲色嗜欲之戒輒懇切敷陳以年過七十乞休疏凡二十餘上許之積階大中大夫以通奉大夫致仕遺表聞贈光祿大夫官其後賜諡文簡先生為人簡質端重而天性孝友少習家訓長得名師如張宣公吕成公皆前修巨儒相與往復講論其學以不欺為主其接物夷易與人言心平氣和語簡而當聽者心服稱人之善無溢美其惡惡亦無深疾每病學者空談無實嘗為天台學四先生學記曰學者當窮理以致其知反躬以踐其實若趨其名以為髙入耳而出乎口皆四先生之罪人也其平生所素戒在此每夜斂衽默坐虛心省察嘗取徐節孝帖教子弟其言曰日入之後至於夜中事物俱靜志氣俱定是君子思慮經綸之時晚號雲莊居士著有奏議史稿經筵故事東宫詩解易經說禮記解講堂故事雲莊外稿續稿若干卷子垕道南源委閩書西山撰神道碑司農詹元善先生體仁學派按西山真先生敘公行狀詳矣但舊傳俱載西山從遊於公而行狀並未敘及及讀祭文有云若某之不才顧何足以語上而公獨以為可教每更以留連讀此似平昔曽親炙論說非同及門受業者不然行狀獨無一語敘及耶今仍採舊傳録出以待考訂再按先生之父詹公慥與胡公宏劉公子翬游而先生又出紫陽之門其於當世名臣如梁公克家趙公汝愚周公必大皆與往復人才商論國是而蔡西山被謫時留在邑中甚得公調護之力真公稱其立朝當官自信所學於辭受出處之槩尤不茍云司農詹元善先生體仁詹體仁字元善建寧崇安人父慥與胡五峯劉屏山游先生登隆興元年進士第調饒州浮梁尉郡上先生獲盜功狀當賞謝不就為泉州晉江丞程尚書大昌司馬侍郎汲相繼為守賞待特異郡有疑獄必咨焉宰相梁克家泉人也始知先生薦於朝入為太學録遷太學博士尋遷太常博士時髙宗廟諡或謂宜稱堯宗先生言諡法雖有之於古無據且大行功莫盛於中興請比殷武丁諡為髙議遂決纍官太常少卿時上以積疑成疾久不過重華宫先生陛對首陳父子至恩引易睽孤之說以開廣聖意孝宗崩先生率同列抗疏請駕詣重華宫親臨祥祭時趙汝愚將定大策外庭無預謀者密令先生及左司郎官徐誼達意少保吳琚請憲聖太后垂簾為援立計寧宗登極天下晏然先生密贊汝愚之力也時議大行皇帝諡先生言夀皇帝事德夀二十餘年極天下之養諒隂三年不御常服漢唐以來未之有宜諡曰孝卒用其言先生深於禮故前後定兩朝廟諡異論莫能奪議者韙之孝宗將復土先生言永阜陵地勢卑下非所以妥安神靈與宰相異議除太府卿尋直龍圖閣知福州言者竟以前論山陵事罷之屏處者八年退居霅川日以經史自娛人莫窺其際始復直龍圖閣知靜江府移守鄂州除司農卿復總湖廣餉事時嵗凶艱食即以便宜發廩賑救而後以聞托胄議開邊一時爭談兵以規進用先生移書廟堂言兵不可輕動皇甫斌自以將家子好言兵先生語僚屬謂斌必敗已而果然開禧二年卒年六十四先生天姿超邁志守卓然自擢第歸即從朱先生遊講質疑義其學以存誠慎獨為主患世儒論經多失本㫖曰惟皇上帝降衷於下民若有恆性克綏厥猷惟后此即天命之謂性率性之謂道修道之謂教也人能知此則知觀書之要而無穿鑿之患矣博覽羣書自天文地理卜筮醫藥百氏雜說靡不通於渾儀漏刻俱自親製以測驗皆合趙渙造新厯以獻先生為作序中書舍人黃裳一見嗟異因以定交為文若不經意而明白暢遂悉根於理致神識恬暢喜論說古今遇佳士良友窮日夜語不厭立朝當官自信所學於辭受出處之際尤不茍周公必大當國先生嘗疏薦三十餘人皆當世知名士後多所收擢郡人真公德秀早從之遊嘗問居官蒞民之法先生曰盡心平心而已盡心則無愧平心則不偏世服其確論云所著象數總義厯學啓䝉莊子解諸書真西山撰行狀閩書吏部廖子晦先生德明學派按考亭淵源録載德明所問朱子所答皆論學的要如論敬之該貫動靜變化氣質須是勉强講論文字不可與自家身心都無干涉又言閒散不是真樂論前輩諸賢多是略綽見得箇道理便休少有苦心理會又論太極朱子答書曰來諭一一皆契鄙懷足見精敏又文公嘗稱曰德明學有根據為政能舉先王已墜之典以活中路無告之人固學道愛人之君子所樂聞而願為者觀此可知先生造詣為師門所心許者矣吏部廖子晦先生德明廖德明字子晦南劍州人少學釋氏及得龜山楊氏書讀之大悟遂受業朱子登乾道中進士第知莆田縣民有奉淫祠者罪之沈像於江會有顯者欲取邑地廣其居先生堅持不可纍官至潯州有聲諸司交薦之先生曰今老矣况以道徇人乎固辭不受遷廣東提㸃刑獄彈劾不避權要嵗當薦士朝貴多以書託之先生曰此國家公器也悉不啓封還之有鄉人為主簿先生聞其能薦之會先生行縣簿感其知己置酒延之悉假富人觴豆甚盛先生怒曰一主簿乃若是侈耶必貪也於是追還薦章其公嚴類此時盜陷桂陽迫韶韶人懼先生燕笑自如遣將馳擊而親持小麾督戰大敗之乃分戍守逺斥堠明審賞罰宣布威信韶晏然如平時徙知廣州遷吏部左選郎官奉祠卒先生初為潯州教授為學者講明聖賢心學之要手植三柏於學潯士愛敬之如甘棠在南粵時立師悟堂刻朱子家禮及程氏諸書公餘延僚屬及諸生親為講說逺近化之嘗語人以仕學之要曰德明自始仕以至為郡惟用三代直道而行一句而已所著有朱子語録春秋會要槎溪集諸書按朱子語録姓氏廖子晦先生録語在乾道九年癸巳以後所聞時朱子年四十四此為早嵗及門者再按黃勉齊答李貫之書論語録以所記年月為序以為未安又稱記録之人如子晦文漢卿文之類絶少今閲現今所刋語録姓氏以廖子晦輔漢卿為首或本勉齊所答之語所更訂耳考亭淵源録源委道南閩書提刑鄒先生應博鄒應博泰寧人受學於廖公德明寶慶中監行在都進奏院奏對引書危微精一以朱子之說進嘗知婺州蘇州提㸃江南西路刑獄為真公德秀所薦鄭先生師尹鄭師尹字未詳按建安郡守王氏遂撰建安書院記言前守王公野以廖公德明之門人鄭師尹為賢而開館迎之尤以蔡公元定之孫模為賢而移書致之會書院成請蔡君典教事適公入覲鄭以故歸蔡亦憂去士不能不觖望云考蔡先生模已見蔡氏家學鄭先生師尹未詳疑是延建人必當時表著者今附之廖公學派待考王氏遂撰建寧府書院記言淳祐三年夏前建安守王野陛辭理宗命之曰游胡朱真流風未泯表宅里以善其民則豫汝懌野再拜稽首奉命至郡以游胡舊嘗有祠乃創建安書院祠朱子而又以真西山配享請於朝許之按是時理宗淳祐元年方幸學從祀周程張朱五子并求訪遺書而於郡守到官之日訓辭復及之故所在興起書院獨多蓋自端平初召用正人時稱小元祐自是數年崇奬正學一時師席類多名儒耆彥為紫陽文公派澤故鄭氏師尹蔡氏模自皆一時之選也再按王氏野王氏遂亦皆宗仰朱子之學王野為金華人王遂為金壇人王野曽友教於蔡節齊父子王遂號潛軒曽撰節齊墓志序述學派源流闡發特詳二公宦學皆卓然者也附此備考提刑楊淡軒先生方學𣲖按長汀斯時惟淡軒先生及紫陽之門外此寥寥亦風氣初開之始也傳稱其清修篤孝行已拔俗到官操履剛正廉介不可干以私至論學之詳朱子集中往復諸書可檢也提刑楊淡軒先生方楊方字子直長沙人清修篤孝行已拔俗隆興元年登進士調弋陽尉還特取道崇安參謁朱子面受所傳未赴改清逺簿廣廉憲姚孝資檄攝曲江以廉介剛直聞改武寧丞秩滿趙公汝愚帥蜀辟管機宜尋薦於朝召對擢宗正寺簿乞外通判吉州淳熙末知建昌軍召為樞密院編修官首疏乞朝重華宫辭甚懇切寧宗立除祕書郎出知吉州僞學禁興坐汝愚朱子黨罷居贛州閉户讀書學禁稍弛起知攝州至官未數月乞祠以歸嘉定更化召為右侍郎官進考功郎官操履剛正終與時忤尋復去國越二年以鯁介老成除直寶謨閣提刑廣西循歷屬部發摘奸貪官吏重足而立至桂嶺卒所居植淡竹自號淡軒老叟學者稱為淡軒先生所著有寒泉語録按朱子語録姓氏楊淡軒先生録語在乾道六年庚寅所聞時朱子年四十一此為早嵗及門記語録之最早者縣令丘啓潛先生鱗丘方附丘鱗字啓潛連城人少師事楊淡軒方嘉定十三年特奏名調贛縣尉有廉聲歸值紹定寇發檄攝連城令畫計禦寇率民登東田石全活甚衆招捕使陳韡奏其功辟知建寧縣姪丘方字正叔寶慶二年進士任寧都縣丞興學課士有政聲同受業於淡軒先生閩書黎氏撰邱先生書院記汀郡選舉志備考黎氏士宏撰丘氏二先生書院記略曰連城踞萬山中重巒疊峙覽竒者目不暇給矧東田數片石屹立一方石之麓為宋儒丘二先生讀書舍後人即其遺址祠以祀之按郡縣志丘鱗字啓潛嘉定十三年進士姪丘方字正叔寶慶二年進士同受業楊淡軒先生淡軒先生為朱門髙弟其時同學諸子罕出其右及學成歸鄞江考道問德與朱子往復辨論折衷至當載在語録者章章可考二先生從之學盡得其傳至啓潛先生禦寇有功辟知邵武軍建寧縣承直郎日與劉德言梁文叔馮作肅吳大年葉直翁吳仲玉諸先儒切磋友善講道不倦遡其所從皆朱門嫡傳也又曰吾獨慨閩自龜山道南後羣英萃興號為鄒魯名邦汀距延咫尺間何從學者寥寥唯楊先生謁朱子受所傳於前二先生從楊學紹所聞於後倡明聖道引誘善類汀人始知詩書禮樂之學是先生德業未顯於當時教化尚留於後世自是士子爭自濯磨敦倫紀勵名節稱先則古代有聞人孰非二先生教澤之所遺耶林存齊先生憲卿學派黃氏日抄言晦菴先生沒後公亦在髙弟之列勉齊祭先生文稱栗山之陽無百室之聚家絃誦而人縫掖又皆知義理之訓公之教也又曰吾鄉之士遊晦菴之門晚嵗能自守者不過三數人如公之醇厚質直樂善不倦則又朋友之所敬愛云林存齊先生憲卿林憲卿字公度福州懷安人居大山長谷之中與世異趨不妄交遊慎擇師友醇厚質直樂善不倦從晦菴先生遊知所自守以忠信見稱於師門以義理化導乎鄉里年七十猶嗜學不衰學者稱為存齊先生及卒黃勉齊志其墓其徒吳宗萬林士蒙皆知名考亭淵源録閩書潘瓜山先生柄學派朱子答謙之書曰所示問目如伊川亦有時教人靜坐然孔孟以上却無此說要須從上推尋見得靜坐與觀理兩不相妨乃為的當耳按謙之在朱門為髙弟其所問心性分别與夫靜坐及存養數條俱為涵養本原切己功夫慈溪黃氏嘗言晦菴沒後閩中門人如潘謙之楊志仁林正卿林子武李守約李公晦皆在髙弟之列以此知其選矣又按公之父滋從林先生之奇遊聞晦菴講道武夷遂命公兄弟從遊皆以弱冠摳衣有道厲志前修蓋貽謀有自來矣潘瓜山先生柄潘柄字謙之懷安人父滋林公之奇髙弟也黃勉齊嘗受業焉兄植字立之工於文不赴場屋勵志潛修専以務實為本兄弟承父命俱往事文公於武夷公稱曰立之有說得到處先生年十六即有志於道文公悉以所學授之遂取聖賢格言為訓又以吕氏鄉約櫽括繼其後凡存心養性之道律己治人之功條目具列終身所行不出於此著易解尚書解學者稱瓜山先生按朱子語録姓氏潘瓜山先生録語在淳熙十年癸卯以後所聞時朱子年已五十四此為中嵗及門者閩書南考亭淵源録道源委蘇先生國台蘇國台其先德化人曽祖欽遷於仙遊父權從祖總龜皆為名儒國台從瓜山潘公學楊信齊先生復學派考公平昔多講貫於制度典章之學文公沒後又從勉齊黃氏游稱朱門髙弟西山真氏蒞官至閩於三山築尊德堂以待之是時公年已老所造有更超然者矣楊信齊先生復楊復字志仁福州長溪人朱子門人後又受業於黃勉齊徑特通敏考索最精見者無不嘆取陳師復稱其學問精深服膺拳拳真西山知福州即郡學創貴德堂以處之著祭禮圖十四卷儀禮圖解十七卷又有家禮雜說附注二卷學者稱信齊先生道南源委録閩書考亭淵源林先生桂發林桂發福寧人父艾隱先生志晦菴之學子三宗旦如坦皆有文名桂發受業晦菴之門人信齊楊公復以繼先志云東發黃氏震撰公父墓志略曰寶祐乙卯嵗余應鄉書聞有髙才卓識持衡風簾間者是為林公桂發而未果識也余既竊第歸君來從事府幕一見如平生歡而末由欵誨益也後四三年再會君吳門與語夜參半君衮衮談古今析義理如傾河漢不可休知其學必有自來而未能悉也自是每見閩之士必問君家世皆言君艾隱先生之子艾隱古學古心超然不與世接君亦刻厲先志坐是偃蹇於世余於是益敬之後之又十年余歸自江西君適從事沿海制司之幕秩滿赴班因得請問艾隱先生詳委君乃愀然言曰宦遊日久先君墓猶未銘正欲屬之子余謝不能再三明日以其狀來又辭至再三皆不獲乃敬為敘其事而次之朝奉李公晦先生方子學派文公嘗言公晦資稟自是寡過然開濶中又須縝密寬緩中又須謹嚴先生曽與真文忠公為僚於泉山文忠公言公晦學邃而氣平本經術明世用事之大者余必咨而後行其撰清源文集序言公晦仕泉時為郡守程公所囑輯清源文集七百餘篇集成而某至又為先生子祝辭贊先生為朱門髙弟觀此知先生其有體有用之學者歟又虞邵菴撰雲巖書院記其言曰先生祖子孫三世受學朱子之門當是時閩之學者比於鄒魯余得先生所為年譜序知其於朱氏之學確守而不變所謂豪分縷析致知力行蓋終身焉雲巖即先生講學故處也今録其梗概著於編朝奉李公晦先生方子李方子字公晦吕之孫少博學能文為人端謹純篤初見朱子謂曰觀公為人自是寡過但寬大中要規矩和緩中要果決遂以果名齊長遊太學學官李道傳折官位輩行具刺就謁嘉定七年登進士廷對第三人調泉州觀察推官真西山為守稱其學邃氣平本經術明世用每有大事必咨決而行暇則辨論經訓至夜分不倦故事秩滿必先通書廟堂乃除先生曰是求也可乎哉丞相史彌逺怒之踰年始除國子録將選入官僚不少貶以希合或告彌逺曰此真德秀黨也使臺臣劾罷之既歸從遊者盈門竟日危坐未始傾側對賔客一語不妄發雖奴𨽻亦不加詬詈然皆嚴憚之其學得諸心傳親切超詣嘗語人曰吾問學未能周盡幸於大本有見此心常覺泰然不為物欲所漬若得真實務學之人發明綱領斯道庶幾不墜爾起辰州通判尋卒著有朱子行狀傳道精語等書又有禹貢解朱子嘗稱許之寶慶二年真公德秀官樞密與尚書袁甫進於朝特㫖授朝奉郎致仕與一子恩澤弟文子按朱子語録姓氏李公晦先生録語在淳熙十五年戊申以後所聞時朱子年已五十九此為晚嵗及門者閩書名道南源委歷代儒傳蔡白石先生學派泉南人文之盛自紫陽文公倡興同安繼以白石蔡先生北溪陳先生宗主文公家法而士習翕然嚮風由是濂洛關閩之書家絃戶誦號為紫陽别宗其時王梅溪真西山諸賢後先蒞官至止主盟斯道人文愈著五百年來知朱真諸大儒之澤矣而白石北溪輔翼踵起之功未有表章者三山蔣氏閩學源流有議公及黃氏巖孫張氏巽郡中宜建以特祠者後之君子折衷詳考必有取焉乾隆十三年戊辰七月初六日書蔡白石先生和蔡先生和字廷傑晉江人願從朱文公遊以親老不能去勉友人陳易往受業數以書從易請質無虛日居白石村喪祭酌古禮鄉閭化之真西山守郡李果齊以文公弟子佐幕議創書院於東湖延和為堂長會易鎮不果同時有北溪陳淳往來道泉學者勉留講授一時如同邑蘇思恭王次傳王雋黃必昌安溪鄭思忱思永惠安江與權永春卓琮黃以翼皆從先生與淳學先是郡士専經者泥章句業文者競浮華析理者駕𤣥虛自文公導其源白石北溪濬其流條理明備講論平實由是關洛考亭之書家誦人習理學之盛號為紫陽别宗居白石村學者稱為白石先生著有易說監院鄭景千先生思忱鄭思忱字景千安溪人授尚書於西溪李季辨解析精詣生徒常百數嘉定三年以詞賦領鄉薦第一中第為新興令除遺利錢三百萬再知崇安縣以譖左遷浦城丞謁真文忠公與語知其賢言於太守得復任知南恩州歷浙東參議雷變上封事言士溺苞苴習久難化民坐困且盜宜去貪恤人節用蓄力除監登聞鼓院卒年七十二公少年豪爽晚而和粹凝然有守君子也著有詩書釋按先生與景修先生思永皆從蔡公和與陳公淳學時稱紫陽别宗清溪傳入朱門派繫自二先生始鄭景修先生思永鄭思永字景修安溪人好學篤行蔡白石愛其朴粹妻以女從學終身著有易說閩書王嵓父先生次傳王次傳字嵓父晉江人善講析指授生徒多貴顯再預薦不第閩中理學淵源考卷二十七
