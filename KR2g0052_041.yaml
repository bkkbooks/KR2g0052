body:
  text: 閩中理學淵源考卷四十一廣平府知府李清馥撰三山明初諸先生學派嘗聞三山前輩言晉安襟帶列郡數世枌榆百年桑梓流風善政猶有存者自李氏椅常氏衮而後若蔡忠惠李忠定梁文靖諸公遺教未冺而一時閩産逓有碩彦大賢接踵繼起山川啟運人傑挺生章章如是今考自洪永以降風氣初開諸儒説經考道尚有典型三山舊志曽言明初諸子其學多以濓洛為宗正嘉間新進後起一唱百和晉安諸先正不敢倍其師説盖自鄭氏景初而下闡明道術演繹聖真修己誨人篤學力行庶幾升洙泗之堂尊博約之訓矣兹録國初諸儒本傳其門徒尚待考訂至正嘉以後迄於隆萬而下按時世分録之大抵世道升降消長學術之淳漓繋之矣尚論者溯厥源流尚有可稽焉乾隆丙子九月望日司訓鄭景初先生旭鄭旭字景初閩縣人居家孝友有信義其學主以五經旁獵子史與王偁林誌友善以學行辟為國子掌儀太祖選徳望十人傅東宫旭名第二後以蜚語謫吏雲南餘二十年建文中薦起為髙安訓導所著有詩經總㫖初學提綱咏竹稿等書閩書考道南源委分省人物編修陳先生景著陳景著名湜以字行閩縣人舉永樂十三年進士第三人授翰林院編修預修五經四書性理大全以母老乞便養改福州教授生徒多所造就閩書御史游伯方先生義生游義生字伯方連江人洪武二十一年進士仕御史議論慷慨太祖欲撒亞聖配享義生極諫忤㫖繋獄死道南源委恭議孫庭秀先生芝孫芝字庭秀連江人洪武中以嵗貢授慶都知縣陞沔陽知州太祖從劉三吾之議欲削孟子書如視君冦讐聞誅獨夫等語共八十五條不以命題取士芝上疏極論以為不可其議遂息歴官山西參議乞歸道南源委閩書恭政鄭先生居貞鄭居貞侯官人洪武中舉明經歴河南左𠫭政與方正學孝孺友善孝孺教授漢中居貞作鳯雛行贈之孝孺難作居貞亦坐死所著有閩南闗隴歸来檜庭諸稿孫垍亦能詩閩書學正鄭先生濟鄭濟閩縣人任嘉定教諭儋州學正日進諸生與啟廸所著四書書經講解行世閩書按察洪遵道先生順洪順字遵道懐安人永樂二年進士時初選翰林庶吉士二十八人以比二十八宿順與焉引見上勉以立志進學久之授刑部主事有李將軍者詐取囚金反誣吏張縁受之同列畏李之强皆欲坐縁順曰李固可畏縁不可憐耶竟坐李仁宗監國稱其亷潔持法賜勑褒嘉未㡬左遷行人尋命與修五經四書性理大全諸書丁艱起復陞山東按察僉事時山東邅唐賽兒之亂順至剗理寃抑撫循凋瘵青州有趙訓𨗳年老無僕妾諸生為娶一婦時時􅒬酒詈趙諸生張剛惡婦無禮殺之尋迯去婦家訟趙抵罪獄已具順讞獨心疑召諸生詢之惟剛三月不至齋舎退而訊之剛自伏曰公神人也諸生娶此婦以事吾師而背戾若此恐師老命懸此人是以殺之今師存剛死固所甘心順義其所為請於朝趙得釋而剛亦免死嵗旱蝗發賑倉儲數萬不待上報尋陞按察使命下而卒從弟英閩書遺佚鄧子靜先生定鄧定字子静閩縣人洪武初與兄誠並徴遺佚誠應聘定獨不出削跡東郊結廬竹嶼同時名士如王恭陳亮鄧誠陳申相與詠賡有畊隠二卷閩書侍郎薩廷圭先生琦薩琦字廷圭閩縣人舉宣徳五年進士選翰林庶吉士授編修預修仁廟實錄陞禮部右侍郎詹事府少詹事為人狷潔不茍合學有源委閩書主事鄭汝明先生亮鄭亮字汝明閩縣人宣徳八年進士仕户部主事有文名家居學徒造門問業孫伯和閩書訓導游汝哲先生宣游宣字汝哲連江人天順中恩貢授博羅訓導成化初上疏以宋熊禾闡明儒教表章經㫖宜隨楊羅諸儒後從祀廟庭下廷議大學士彭時言禾原籍建陽立祠致祭為宜從之以父老乞歸養禮部言宣年力未衰教職修明乞宣年俸一半着原籍支領代養其親庶臣職子道兩無虧缺此特典也士林榮之通志孝亷髙秦仲先生淮髙淮字秦仲長樂人永樂丁酉舉人貫通三禮嘗代邑令作諭俗文為時所稱以鄉舉入都時同里姻舊多居要地淮自守嚴正不徃謁居國學數嵗以祖母父母春秋髙乞歸養自稱竹所老人著書三十餘卷觧縉馬鐸為之序新福州府志教諭曽先生師孔曽師孔懷安人景泰癸酉鄉薦初授嘉善諭再補合肥師孔宅心嚴正問學有淵源勢利聲華未嘗一渉胸臆諸生貧者徃徃捐常祿助之兩地弟子交稱為良師閩中理學淵源考卷四十一
