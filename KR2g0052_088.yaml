body:
  text: 閩中理學淵源考卷八十八廣平府知府李清馥撰嘉隆以後諸先生學派嘉隆以後諸先生皆崇尚閩學宗派而品式規畫猶儒者之選也彼時時尚異趨而沈氏士鑑李氏世熊皆能求師問學卓有豎立其論著亦多足稱可覘風尚之懿云通判陳體元先生仁陳仁字體元歸化人嘗從湛甘泉若水學嘉靖元年由明經授廣西府通判時粤地文教未闢仁至大為闡揚激勵士𩔖蒞民有惠政致仕歸以講究性命為事士林宗之通志州守鄧元植先生向榮鄧向榮字元植自清流徙居長汀嘉靖甲辰進士授户部主事監督淮運杜絶諸弊以直言忤時謫六安同知轉嘉定州甫二日聞父病遂棄官歸舊業腴者悉推與弟著有正學準則太極通書考惜隂考等書通志恭靖裴元闇先生應章裴應章字元闇清流人隆慶戊辰進士授行人奉使徳晉二府陛見奏對進止有度神宗目屬焉擢吏科給事遷兵部都給事所奏制馭悉中機宜念邊將玩愒大吏相與為欺蔽遂劾罷撫臣之棄師憲臣之昏庸與勲臣之不法將臣之縱賊唆卒者風采肅然江陵當國嘗建議三嵗一遣大臣行邊應章言糜費當罷大璫保欲取冏寺馬三千疋應章議勿予遷太僕少卿所上疏給闗防嚴舉劾戒侵剋覈寄養諸事皆稱㫖著為令力請歸省抵舍旬餘而母氏病終轉太常正卿議侑享祔葬禮下禮臣報可鄖卒辱撫臣將為亂廷議非應章莫能定被命馳往未至先檄諭以禍福語甚切至亂卒計窮自縛至數百里外迎應章應章集衆斬其魁餘無所問闔境晏如自鄖入為戸部右侍郎復請歸養久之而父沒神宗即家起應章為少宰所推轂皆海内賢士已請歸襄葬事晉南司空遂得疾力辭屢疏不允乃强赴立法疏錢幣諫採鷹架木糾中貴人濫索省水衡錢甚多尋乞歸復起南太宰累疏懇辭虚席者三年卒諡恭靖有集若干卷通志閩書黄士登先生科黄科字士登永定人學問淵美博究羣書學者多師事之將貢而歿士類惜焉子益純領鄉薦閩書教授賴公弼先生祐賴祐字公弼清流人才敏博學治書經旁通春秋以監生任臨桂教授一時科甲多出其門閩書訓導蔣先生永洪蔣永洪連城人授訓導莅教三年引疾歸晚彌好學鄉弟子從受業者日衆守道安貧恬如也閩書教授盧念潭先生一松盧一松號念潭永定人萬厯間以貢授吉王府教授謂宗藩之學與韋布異乃摘四書中切於修齊治平者各一條名曰要學三編以進王嘉納之所著學道要端井田議化俗議醒心詩宗孔集行於世通志閩書李嗣英先生穎李穎字嗣英上杭人天資雋異年十三或授以老子書曰學者當師孔孟何用此為從永豐邱賢遊都諫邱𢎞謂穎詩文煙霞風月陶寫性情皆自然流出居梅坡著有梅隠稿又輯宋元鄉先輩詩名杭州風雅集通志教授李安定先生瀾李瀾長汀人孝友端方學遵朱子以躬行實踐為主萬厯間由明經授松溪訓之任距松溪三十里遇鄉人言母卒瀾痛哭不俟家報即馳歸服闋改訓漳平陞諭安定再陞授平海未任卒縣令賴巒宗先生維嶽賴維嶽字巒宗永定人萬厯間舉人由永春教諭歴興寧令嗜古學多著述有古今裘金湧集半豹集行世通志孝亷沈先生士鑑沈士鑑長汀人少孤力學博洽羣籍崇禎己卯舉於鄉有清夢齋詩集四書㕘註孔門崇祀議藏於家通志裴先生汝申裴汝申清流人善詩文與李本寧曹學佺相唱和後挈家入南山有薜月軒文集十卷行世通志督學李不磷先生于堅李于堅字不磷清流人崇禎辛未進士起家汾州司理遷禮部郎中提督浙江學政著有呉楚遊集西河集水花長句通志李元仲先生世熊李世熊字元仲寧化諸生受業於漳浦黄道周性穎悟博極羣書論著褎然成一家凡墳典經史以及釋典道書醫卜星緯之學靡不淹貫著有寒支集寒支二集行世又修寧化縣志新裁獨抒為通儒所稱通志集二希堂文汀州府志閩中理學淵源考卷八十八
