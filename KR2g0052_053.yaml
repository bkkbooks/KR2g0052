body:
  text: 閩中理學淵源考卷五十三廣平府知府李清馥撰布政周翠渠先生瑛學派莆中先正綽有典型攷公同時有彭從吾黄未軒諸公論學切磋皆負一時之望讀公題嘉魚李氏大厓義學記語夫功夫次第而箴砭後學共師白沙之失前輩持守之嚴可見矣再按公生漳之鎮海早嵗淵源授受皆得之布衣陳公故其所學所守醇然洛閩派的焉布政周翠渠先生瑛周瑛字梁石其先莆人父洪武間自莆田調戍於漳浦之鎮海衛因家焉惟時衛所雖建而學校未興瑛由邑學生領正統癸酉鄉薦不第乃博覽羣籍鈎深探賾成化己丑成進士知廣徳州興文教絶淫祠嚴生女不舉者之禁陞南禮部郎中出為撫州知府調改鎮逺府秩滿歸省𢎞治初王端毅恕為吏部即家起四川參政尋轉右布政使丁内艱除服乞致仕給事中楊亷呉世中交薦其學行起用竟弗赴瑛未第時受學於陳布衣真晟尊嚮而篤信之及舉進士與新㑹陳白沙遼左賀克恭上下議論然瑛以居敬窮理為鵠白沙之學有所不契寓書李大厓承箕以辨之曰某聞人心無外為有外者非也聖人静有以立天下之大本動有以行天下之逹道由體及用一以貫之其餘為學皆由博以反約博者萬殊也約者一本也求諸萬殊而後一本可得一本既得則所謂萬殊者亦可推此以貫之矣某請得以言其功程次第盖始學之要以收放心為先務收放心居敬是也居敬則心存聰明睿智皆由此出然後可以窮理所謂窮理者非謂静守此心而理自見也盖亦推之以極其至焉耳孟子曰萬物皆備於我此言人心無外也不即物以窮理其能盡此心之體乎故自性情之㣲以及形骸之粗自食息之末以及綱常之大自六經之奥以及天地萬物之廣皆不可不求其理求其理謂求其自然與其當然又於自然當然求其所以然積累既多自然融㑹貫通而於一本者亦自得之矣一本固非學者所易言然聞之中庸有曰喜怒哀樂之未發謂之中又曰上天之載無聲無臭至矣此譬如榖種雖自塊然而根苗花實皆聚於此又如雞卵雖自渾然而羽毛觜角皆具於此及其發見於行事在聖人體用一貫在學者未免差互盖在已者有所拘蔽故所發不無偏重之殊在外者有所揺奪故所施不無遷就之異然而既見本源則於處善亦安循理亦樂至於患難事變雖以死易生亦甘心為之此聖賢之大畧也今不務此乃塊然静坐求畢體用之學吾見其難矣瑛自得第後歸於莆所著有經世管鑰律吕管鑰字書纂要翠渠類藁廣徳志蜀志漳志等編嘗與黄仲昭同修府志議論間有不合自謂莆陽抝史云卒年八十九學者稱為翠渠先生縣令鄭文坡先生衷鄭衷字世和龍溪人自㓜向上學務踐履嘗㳺周翠渠瑛之門每見稱許事父及繼母以孝聞丁繼母憂念䘮母年㓜追服三年正徳癸酉鄉舉令南康作興學校俸給外一毫不取以不善事上官謫廣徳州學正提學顧陽和薦其古行古心與世殊調轉揚州教授陞武陵令致仕歸晚益嗜學築精舍於文山之坡鄉人稱文坡先生閩書郡志縣令施近甫先生仁施仁字近甫龍溪人少以聖賢自期博洽善屬文顧舉業非其好也同邑林魁一見奇之弱冠負笈逰莆者三載於黄未軒周翠渠諸先生靡不論世尚友歸而躬行孝弟父母兄弟間動相規切期諭諸道與同時潘鳴時髙則賢潘桂芳周一陽稱五賢當道如沈寵周賢宣姜寳延致書院以訓多士嘉靖丙寅選貢北上復與貢安國參証異聞選授紹興司訓王龍溪畿其邑人也時過從論説宗良知之㫖已轉諭建安與諸士㑹水西觀以實修相砥所梓有建安興學録復古議太上感應篇八事圖説無非誘翼人心還古之道用薦擢龍門知縣政尚清簡懸趙清獻遺像於退食之堂焚香告之曰倘有負心願公示譴暇與諸生講論不輟自縣治至村落並開立社學鄉約課督曉解改東筦以内艱歸不復出四壁恬然坐次左右經史矻矻誦讀倦則正襟危坐凝神定慮與友人談道外無他營其接引後學提闗啟鑰心口無留隠焉年八十九卒所著有修正要語及諸詩文多根極理要之言姪三畏任教諭好古力行家庭間自相師友云閩書郡志僉事宋立齋先生端儀宋端儀字孔時莆田人㓜嘗侍父助教公校文江右時御史天台陳選監塲屋因私試以文深器之父為安州學正每令預堂試諸生皆歎服以為弗如也舉成化辛丑進士拜禮部主事歴主客員外郎凡四裔朝貢之使以方物贄見一毫不苟取其或有所求請必條舉典故辨析開諭使心服而去乆之遷廣東提學僉事既至嚴立教法務欲以身表率而痛抑其浮誕竒險之習在廣五年列郡之士知所嚮方年甫五十六卒於官端儀居家孝友動循禮法自其少時已有志泛濫羣籍尚友古人凡鄉之先輩皆考究而知其邪正賢否郡守青田潘琴以郡學所祀鄉賢多弗稱典禮乃發䇿詢於諸生惟端儀所對䇿考論精審潘大加歡賞其在禮部署清務簡无留意正學而於程朱㣲言緒論無不究極㫖歸平生不作韻語間有議論皆根據義理闗渉世教不規規麗藻之工而已嘗考正宋史道學傳進程氏門人吕大臨謂其深潛縝宻當不在劉李尹謝游楊之下又以程氏師友淵源朱子已有録以示後學而朱子門人亦多哲士尚未有表著之者因集黄勉齋以下及私淑有得如真文忠諸公凡若干人為考亭淵源録又嘗修祠部典故廣東通志畧宋行朝録皆未脱稿其修道南三先生遺書朱子事類鄉賢考證莆陽遺事莆陽舊事偶録立齋閒録立齋稿髙科考宋氏族譜等書藏於家洛閩源流録莆陽文獻忠裕黄後峰先生鞏黄鞏字伯固號後峰莆田人𢎞治十八年進士推官徳安府陞刑部主事歴兵部郎中丁内艱守制家居三年不出戸庭鄉前輩如鄭山齋方松厓陳時周周翠渠咸推重之與為忘年友見素林公尤愛之戊寅春服除將赴部㑹武宗北廵人心危疑或沮鞏行鞏題書屋曰石田茅屋為生太拙鴟夷馬革自許何愚衆不能沮竟北上補武選正徳十四年春上將南廵時寧庶人乆蓄逆謀蕭敬朱寧張銳在司禮錦衣東厰與庶人交通江彬又握勁兵在上左右中外為憂公卿交疏不聽鞏以事由彬而言者怵彬威鮮指及乃獨疏六事其畧曰陛下臨御以來祖宗之紀綱法度一壊於逆瑾再壊於佞倖又再壊於邉帥至是將蕩然無餘矣天下知有權臣而不知有陛下寧忤陛下而不敢忤權臣亂本已生禍變將起竊恐陛下知之晚矣試舉圖治六事於今為最急者陳之其一曰崇正學臣聞聖人主静君子慎動陛下盤逰無度流連忘反者無乃動之過乎伏望陛下髙拱九重凝神定慮屏紛華斥異端逺佞人延故老訪忠良可以涵養氣質薫陶徳性而聖學惟新聖政自舉其二曰通言路言路者國家之命脈也言路之通塞國家之治亂係焉竊見近時臣僚奏牘間或言及時政往往匿不以聞其或事闗權臣則又留中不出而中傷以他事由是雖有安民長䇿謀國至計無因以逹雖有必亂之事不軌之臣陛下無由而知之矣天下烏得而不亂哉伏望陛下廣開言路不責以出位不加以好名如此則忠言日進聰明日廣雖亂臣賊子亦將有所畏而不敢肆矣其三曰正名號陛下近日以來無故自稱為威武大將軍太師鎮國公逺近傳聞莫不驚疑夫陛下自稱為公誰則為陛下者伏望陛下即日削去諸名號以昭上下之分以明示天下之人庶幾體統以正而朝廷自尊矣其四曰戒逰幸陛下始時逰戲不出大庭馳逐止於南内既而幸宣府幸大同幸太原幸陜西榆林諸處所至費財動衆郡縣騷然至使民間一夫一婦不能相保陛下為民父母何忍使民至此近者復有南廵之命南方之民争先挈妻子避去者流離奔踣敢怨而不敢言即今江淮之饑父子兄弟相食天時人事如此加以休息愛養尤恐不支况又重以蹙之其何不流而為盗賊也奸雄窺伺待時而發變生在内則欲歸無路變生在外則望救無及陛下斯時悔之晚矣彼居位大臣用事中官親暱羣小皆欲陛下逺出而後得以擅權自恣乘機為利也其不然則亦袖手旁觀如秦人視越人休戚不相渉也伏望陛下翻然悔悟下哀痛罪巳之詔罷南廵撤宣府行宫示不復出發内帑以賑江淮散邉軍以歸卒伍雪既往之謬舉收既失之人心如是則尚可為也其五曰去小人自古小人用事未有不亡國而喪身者也謹按今之小人簸弄威權貪圖富貴者實繁有徒至於首開邉事以兵為戲使陛下勞天下之力竭四海之財傷百姓之心者則江彬之為也彬本行伍庸流兇狠傲誕無人臣禮臣等但見其有可誅之罪不見其有可賞之功今乃賜以國姓封以伯爵託以心腹付以京營之寄此養亂之道也天下切齒唾罵皆欲食彬之肉陛下亦何惜一彬以謝天下哉其六曰建儲貳陛下春秋漸髙前星未耀祖宗社稷之託懸懸無所寄方且逺事逰觀屢犯不測收置義子布滿左右獨不能豫建親賢以承大業臣以為陛下太倒置也伏望陛下將近時羣臣建儲章疏付在廷文武大臣共圖大議即於宗室中遴選親賢一人養於宫中以繫四海之望待他日誕生皇子之後俾其出就外藩實宗社無疆之休也車駕員外郎陸震見公疏即碎已疏草曰願同署名進疏入上怒甚下詔獄鉗校於廷五日三訊杖百餘坐繫逾月除名鞏體最羸衆咸謂必死乃死得甦震竟死當是時海内盛傳其疏歸後杜門著述家素貧客至留飯或至日中未舉火貸米隣家恬不屑意嘉靖改元召為南京大理寺丞疏請稽古正學敬天勤民取則堯舜保全君子辨别小人明年入賀卒於京師年只四十三無子素翁山齋謀以弟布之子為其後行人張净峰岳訟其直節贈大理少卿天啓初諡忠裕鞏嘗曰人生仕宦至公卿大都三四十年惟立身行道斯千載不朽世之人頋以彼易此何耶鞏沉敏好學雖疾病支離手不釋卷詩文清粹和婉自成一家所著有後峰文集又有讀書録山居筆記諸作皆未成書吾學編張先生元紳張元紳莆田人以字行與呉繹思魏時敏諸人結社放情世外性坦易自稱坦齋山人嘗預修八閩通志又與方伯周翠渠編修黄未軒共修郡志郡多韋布獨行之士往林貞肅以名節髙一世於時雲蒸躍起不獨冠紳即如處士張元紳劉文暘方在源陳夀徴輩咸鞠躬質行貞肅居恒數招邀此數人奬引甚至以故更相淬礪以成一時之盛縣令呉淳夫先生仲珠學派按呉公亦留心經學者縣令呉淳夫先生仲珠呉仲珠字淳夫莆田人少精學業踈於世故登成化乙未進士授義烏知縣以公錢助䘮為御史所按嘆曰士何往不自得哉遂拂衣歸家居授徒分晰經傳奥語以訓後學著有四書詩經講説道南源委閩中理學淵源考卷五十三
