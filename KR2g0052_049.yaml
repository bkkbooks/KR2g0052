body:
  text: 閩中理學淵源考卷四十九廣平府知府李清馥撰莆陽明初諸先生學派按莆陽諸先正當明代開創之初吳公即膺選擢輔導依日月之光其抱遺經而晦草澤者或秉鐸序庠或師資閭里各著隠見之跡其風流及乎苖裔逺矣兹録其著者載于篇端司業呉性傳先生源呉源字性傳莆田人源蚤孤力學通經尤深於易惇禮好義洪武三年授興化府教授十三年以林廷綱薦召赴闕綱源門人也既召見首以得賢才敦教化養黎元為對時太祖方立四輔官兼太子賓客位列公侯都府之次源與杜斆龔斆李祐趙民望同膺其選太祖遊東苑命源與斆等應制聫句恩禮優洽尋以老乞歸明年上念源賢復賜詔召之曰朕選公侯子弟入國子學司業員缺卿為朕一來講道授經無筋力之勞而有成就後學之益亦儒者素志也源復赴京授司業未幾卒官有文集二十卷莆陽名公事述二編閩書莆陽志學正鄭用舟先生濟鄭濟字用舟莆田人永樂六年鄉薦為儋州學正按彭惠安公與郡守岳公書曰故學正鄭濟著書經大學中庸講説至今學者遵之彭惠安集莆陽選舉志教諭陳廷傑先生賢陳賢字廷傑靖之後治春秋經結廬西山巖瀑間以耕以學洪武末舉儒士為興化訓導秩滿遷南康教諭永樂中召入館閣預修大典改任湖口致仕賢為人嚴毅方直安貧好古其學以躬行為先雅志恤物勤心職事及門弟子成就者衆號為古道先生湖人塑像於學沒因以祀之泰和楊文貞士竒為表墓稱其士行可質於神明盖實録云子淮以孝行稱莆陽文獻閩書御史陳孔昭先生道潛陳道潛字孔昭莆田人建文庚辰進士授給事中與楊文敏榮同修國史文敏時稱其學行又著有拙齋存稿永樂初謫判夷陵起監察御史預修性理大全諸書于時纂修諸儒即翰林春坊多不得預道潛行已恭慎學問該博故得在選時閩縣陳景著長樂陳全莆田黄約仲陳用亦皆預修道南源委教授曽先生景修曽景修名生以字行莆田人學尚躬行好深沉之思持辨博之論永樂間貢入太學歴官徳安教授與諸生處情同家人答問講解終日不倦出其門者才質髙下各有成立著大學中庸詳説道南源委布政呉思周先生繹思呉繹思字思周莆田人天順元年進士令饒之徳興遷瑞州府同知俱有惠政陞惠州知府屬邑有巨蠧怙勢虐民繹思以法繩之守禦軍政為上官所更張卒伍忿其不便將為變繹思諭之禍福皆羅拜丁内艱起復除潮州海㓂竊發躬率吏民激以忠義遂殱之陞浙江參政尋轉右布政使繹思丰神秀整孝敬樂易接鄉隣子弟雖困倦未嘗不衣冠早以經學名及門多所造就若戸部尚書周經工部郎張憲都御史汪奎皆終身不忘其教云莆陽文獻閩書教授鄭拙菴先生立鄭立字克豫號拙菴莆田人彭惠安公撰墓志畧曰先生少沉潛頴敏善記過人長逰翁司訓長劉僉憲武之門翁公優於史學劉公長於經義先生從之皆得其所傳古今事多通知於尚書講究精㣲大有造詣故製文字語新理到名輩讓之他經諸子亦時搜覽方先輩玭期之甚重正統甲子鄉薦授易州學正改六安州遷饒州教授所至與諸生共治經史情同一家嵗丙子江西聘為同考官鑒裁惟謹若謝大韶羅應魁二殿元皆是科所取治書士也後乞老歸養疴數嵗親朋過從談論不廢後學多私淑者壬寅六月卒先生氣宇峻整動止矜嚴取與不茍交逰以類加以學問之充敦行之實主學南北并善舉職士大夫無識不識交嘆為名師儒云郡守王士俊先生偉王偉字士俊第永樂十六年進士授大理寺評事陞雲南府知府以仁厚為政夷民悦服常遇嵗旱禱雨有應兵部尚書王驥征麓川道經其郡美以聫句曰三旬亢旱黎民悴一雨滂沱太守功鎮守雲南都督沐昻尤重其為人及卒民哀慕之偉邃經學工文辭宣徳正統間莆諸老在翰林者凋謝已盡惟偉與陳㑹元中並以文章擅重一時云出景泰志檢討黄先生約仲黄約仲名守以字行少負才名永樂初開館徴天下名儒應詔至京成祖試上林曉鶯詩天馬歌擢第一官翰林典籍預修永樂大典四書五經及性理大全諸書書成進檢討學士曽棨胡儼更相引重珥筆西清扈從北伐俱有著述在翰苑二十年疏乞終養約仲精楷法其詩語意清婉得唐人門徑莆田志學士呉汝賢先生希賢呉希賢字汝賢唐屯田員外郎祭之後希賢㓜敏異精毛氏經天順甲申進士改庶吉士時同年李東陽以敏贍稱希賢與之齊名授檢討預修英宗實録有貴家子寇姓者密以賄丐希賢致半詞於其父希賢拒之曰茍如此他日何以見董狐於地下耶進修撰陞左春坊左諭徳南京翰林侍讀學士卒於官希賢性豪邁負奇氣於人少許可兩考㑹試所得多俊偉士為文章意新語壯有聽雨亭稿四卷曽孫三畏字曰寅嘉靖癸夘鄉薦授寧海教諭擢嵊縣令縣故無城三畏始建議築之城成而倭至竟不能犯遷廣信同知歸以子獻台贈江西左布政使莆田志侍講陳時顯先生用陳用字時顯永樂癸未鄉試第一辛夘進士選庶吉士時行在開東館徴天下名儒纂修五經四書及性理大全諸書用預焉書成授檢討歴侍講卒用為人質實醇厚言動不茍身殁無嗣士類傷之莆田志御史丘恒吉先生天祐丘天祐字恒吉成化辛丑進士授瑞安知縣改饒平下車即訪陳獻章於白沙究性命之學縣時遭燬天祐經營締構不以擾民有芝産於輿人以為徳政所致秩滿召入授監察御史彈劾不避權貴威寧伯王越附汪直啟釁榆林已褫爵矣復附李廣引復都御史總制三邉又綰院篆天祐率同列抗疏極言之略曰爵賞予奪人主之操柄也公則治私則亂出於臺閣則為公出於近倖則為私忤㫖廷杖六十下錦衣獄尋釋弗問又連劾廣恃權縱恣賍賄狼籍未報而清寧宫灾廣飲鴆死遂與給事中華㫤共檢廣貲數十百萬疏籍沒之差按廣西又按南北畿郡故事江南葦塲嵗遣巨璫一人往覈實多賈怨病民天祐復疏止之由是葦塲事權盡歸工部矣居臺凢十三年以疾乞歸卒曽孫憲周萬厯乙酉舉人文章行誼見重於時而厥施未竟人咸惜之莆田志教授李乾遂先生文利李文利字乾遂元弟成化庚子鄉薦授桂陽教諭陞思南教授家傳理學行已清修著書有律吕元聲圖解盖據吕氏春秋并隋志劉恕通鑑外紀所載伶倫制律三寸九分為黄鍾之宫因而詳加考證以三寸九分正司馬遷黄鍾九寸之誤以太極隂陽五行由一生二由少及多見黄鍾數少極清正宫聲為極濁之誤以左右對待各得一百二十九分正三分損益上生下生至仲吕而窮之誤以正徴循環無窮正隔八相生往而不還之誤畫圖立説凢六卷楊月湖亷稱其天授獨見門人范輅為序而刻傳之厥後有蔡于榖者字虞璧由嵗貢入太學授湖廣行都司經歴修行積學博通古今在國子時禮曹鄭善夫疏薦其明習理數請召擢以正司天之謬不果用嘗輯開國事畧十卷有抄其稿者乆而易名曰龍飛紀畧刋布人不知其出於榖也時論以於榖之學與文利頡頏云莆田志參政陳三渠先生仁陳仁字子居號三渠少從其從父兄翰林庶吉士邦瑞治書經多所通觧任提學彦常按莆試士摘史命題時莆人専治經通史者尚少仁援據精博議論層出任公得之大驚成化癸夘發解第一丁未第二甲進士授戸部主事歴江西司郎中在部乆明習條格部堂有大事輙與咨議洪洞韓公文尤倚任之屬陜西邉餉繁急因奏調仁為陜西司郎中未幾逆璫劉瑾擅政深忌韓公因摘其屬官細過仁坐降鈞州同知轉汝州知州遷南京兵部員外郎掌武學事瑾誅擢浙江提學副使浙俗喜生謗仁按試不以吏胥從手自披閲去取惟公士論大服轉本省參政以疾乞休吏部奏言本官乆歴中外學行有聞例應加秩詔進本司右布政使准致仕命未下而仁卒矣仁質重沉敏議論剛正嘗疏止給事中林廷玉外謫追復御史彭程官闕里及禮部災條陳時弊言多剴切政暇輙討習文事晚年造詣益深文章奥美有機軸時譽歸之陳氏自邦瑞舉進士以經學擅名弟邦器亦舉進士官至雲南副使仁之子懋舉鄉薦布政黄汝器先生璉黄璉字汝器别號求我第成化二年進士授南京戸科給事中丁外艱服闋改南京禮科滿九載陞浙江布政司右參議廵視温處銀塲𢎞治五年上慮各處銀塲礦脉或㣲或絶嵗課未免取盈於民乃詔所司體究裁豁凢官為是設者俱調别用璉於是改雲南其屬衛糧儲多衛僚攬之輸不以時廵撫大臣乃以屬璉因嚴設禁限桀驁者置之於法自是七八年逋負悉輸納轉貴州參政璉以其地夷獠雜居鎮以簡静撫按交章以操履端方政事修舉薦之陞本司右布政使尋轉左屬普安夷叛朝命大臣率兵征勦特委璉總督糧儲璉處置有方饋餉頼以不乏賊平方將論功而璉以疾卒于官璉天性淳實且有量在浙時年勞當遷適廵按御史張文意不滿於璉叙考有貶辭遂不果遷後璉在貴州文以他事謫本司照磨璉不介意且薦其才於當道識者多之所居里東南諸村落土田嵗常苦旱璉乃白諸郡邑發民鑿渠由金墩抵巖沁數里引木蘭延夀餘水溉之遂變磽瘠為膏腴鄉人徳之居官三十餘年不以生産為念自奉極儉約死之日家無餘貲遺孤奔官所扶柩歸未免稱貸於人庶幾清白之遺云出府志教諭茅常清先生陽茅陽字常清仙逰人頴敏簡樸成化中以貢入京聞河東閻氏禹錫得薛文清之傳遂往師之授新城訓導陞河源教諭所至以師道自尊嘗疏時弊十條詞㫖愷切皆中㫖施行所著有勉齋稿閩中理學淵源考卷四十九
