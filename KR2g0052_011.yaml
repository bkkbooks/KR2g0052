body:
  text: 閩中理學淵源考卷十一廣平府知府李清馥撰浦城楊氏家世學派真氏西山曰國朝南方人物之盛自浦城始浦城人物之盛自文莊公及文公始再考史稱宋一海內文治日起楊文公首以辭章擅天下為時所宗蓋其清忠鯁亮之氣未卒大施仁宗嘗稱其有君子大節特贈其官諡以文蓋有由來也文莊為文公從父史稱其純厚清介尚名教非道干進尤所痛嫉蓋亦卓然儒者程矩矣兹録二公著其家世源流所自焉文莊楊仲猷先生徽之楊徽之字仲猷一名儀之浦城之祖郜仕閩為義軍校家世尚武父澄獨折節為儒終浦城令徽之甫冠通群經尤刻意於詩與邑人江文蔚江為齊名嘗肄業廬山白鹿洞時李氏據有江表徽之恥官僞廷乃潜服至汴洛以文投竇儀王朴深賞遇之周顯德中舉進士歷著作佐郎右拾遺力言太祖人望所歸不宜典禁兵太祖既得天下將因事誅之晉王諌曰周室忠臣也乾德初出為大興令開寶中遷左拾遺右補闕寖以登用太宗尤深器之時青宫初建命為首僚寄之羽翼因索其所著書徽之以數百篇奏御復獻詩為謝太宗稱賞遷侍御史權判刑部轉庫部員外郎奉詔彚編文苑英華歷遷刑兵二部郎中端拱初拜左諫議大夫出知許州入判史館事加修撰因次對上言陛下嗣統鴻圖闡揚文治廢墜修舉儒學響臻然擅文章者多超遷明經業者罕除用向非振舉曷勸專勤師法不傳祖述安在且京師四方之會太學首善之地今五經博士並闕其員非所以崇教化奬人材由內及外之道也望發明詔博求通經之士簡之朝著拔自草萊增置員數分教胄子隨其所業授以廪稍且優加旌别使淹貫經士皆蒙厚賞則天下知所勸矣太宗嘉納謂宰相曰徽之儒雅􅍾履無玷宜置館閣未幾改判集賢院坐漏泄張洎語出為山南東道行軍司馬改鎮安軍真宗咸平初加禮部侍郎以足疾請告真宗駐蹕大名特降手詔存諭明年春車駕還遣使臨問卒年八十贈兵部尚書賜其家錢五十萬絹五百匹無子録其外孫宋綬太常寺太祝姪孫偃集並同學究出身徽之純厚清介多識典故守規矩尚名教非道干進尤所痛嫉嘗言溫仲舒寇凖用搏擊取貴位使後輩務習趨競禮俗寖薄世謂其知言寡諧於俗惟李昉王祐深所推服石熙載李穆賈黃中則與為文義友既沒有集二十卷留於家真宗令夏侯嶠取以進後徽之妻卒乃葬復以緡帛賜其家景祐間賜太子太師諡文莊祀白鹿洞從孫億閩書莊真西山撰文公書堂記録宏簡文公楊大年先生億楊億字大年浦城人天資頴悟七歲對客談論為文揮翰不輟有老成風雍熙初年十一博覽强記太宗聞其名詔江南轉運使張法華就試詞藝送闕下連三日得對試詩賦五篇下筆立成太宗深加賞歎即授祕書省正字俄丁外艱服除會徽之知許州億往依之晝夜務學不息徽之嘆曰興吾門者汝矣淳化中改太常寺奉禮郎仍令讀書祕閣獻二京賦命試翰林賜進士第遷光祿寺丞直集賢院表求歸鄉里賜錢十五萬至道二年遷著作佐郎帝知其貧屢頒霑賚每有奏頌時時稱善真宗即位超拜左正言詔錢若水修太宗實録奏億參預凡八十卷億獨草五十六卷書成乞外補就養知處州真宗知其才長史學留不遣固請乃許之召還拜左司諫知制誥賜金紫咸平中西鄙未寧詔近臣議靈州棄守之事億上疏言存有大害棄有大利灑灑千餘言景德初以家貧乞典郡江左詔令知通進銀臺司兼門下封駁事俄伴史館會修冊府元龜與王欽若同總其事序次體制皆億所定羣僚分撰篇序詔經億竄改乃用三年召為翰林學士又同修國史凡變例皆出億手大中祥符初加兵部員外郎户部郎中五年以疾在告遣中使致太醫視之億拜章謝上作詩批紙尾有副豫前席待名賢之句以久疾求解近職優詔不許但權免朝直億剛介寡合在書局惟與李繼路振刁衎陳鉞劉筠輩厚善當時文士咸賴其品題或被貶議者退多怨謗王欽若驟貴億素薄其人欽若銜之屢抉其失陳彭年方以文史售進忌億名出其右相與毁訾真宗皆不惑其說天禧二年冬拜工部侍郎四年復為翰林學士卒年五十七初真宗欲立德妃為后欲得億草詔使丁謂諭㫖億卒不草及卒仁宗令議追贈有司言故事非曽任二府及事東宫法不應贈仁宗曰億有君子大節可贈禮部尚書諡曰文億文格雄健才思敏捷精密有規裁尤長典章制度喜誨誘後進以成名者甚衆人有片詞可紀必為諷誦一時學者翕然宗之手集當世述作數千篇為筆苑時文録性耿介重交遊尚名節多周給親友故所得祿俸亦隨而盡所著括蒼武彛潁陰韓城退居汝陽蓬山冠鼇等集內外制刀筆共一百九十四卷立從子絃為後録為奉禮郎閩書通宏簡録志備考范文正公贊楊文公畫像曰公以命世之才其位不充故天下知公之文而未知公之道也昔王文正公居宰府僅二十年未嘗見愛惡之迹天下謂之大雅萊公當國真宗有澶淵之幸而能左右天子如山不動却戎狄保宗社天下謂之大忠樞密扶風馬公慷慨立朝有犯無𨼆天下謂之大直此三君子者一代之偉人也公與三君子深相交許情如金石則公之道其正可知矣王沂國文正公曽嘗語曰昔楊文公有言人之操履無若誠實吾每欽佩斯言茍執之不渝夷險可以一致楊文公在翰林以讒佯狂去職然聖眷之不衰聞疾愈即起為郡未幾復以判祕監召既到闕以詩賜之曰瑣闥往年司制誥共嘉藻思類相如蓬山今日詮墳史還仰多聞過仲舒報政列城歸覲後疏恩髙閣拜恩初諸生濟濟彌瞻望鉛槧咨詢辨魯魚祖宗愛惜人材保全忠賢之意如此文公後卒與寇萊公力排宫闈協定大策功雖不終其盡力於國者亦可以無愧也石林詩話真文忠公德秀撰楊文莊公書堂記曰浦城夢筆山等覺院邑人禮部侍郎楊公澄為本縣令日所建也侍郎之子文莊公少讀書於此山既去以文學節義擅聲中朝為薦紳標式後人即其處為書堂繪公父子祠之按公名徽之字仲猷甫冠通羣經尤刻意於詩得騷人之趣時李氏王江表公恥官僞廷杖䇿走中原以周顯德三年登第入文館升諌垣嘗論太祖有人望不可典禁兵國初出司征於方城繼為大興峨眉二縣令開寶中召還寖以登用太宗尤深器之世謂帝以能詩知公而不知公之受知聖明者不專在是也當公之去國也一遷而楚再徙而秦又再轉而蜀山川益寥逺而公嘉陽諸詠皆翛然自得亡秋毫隕穫意胸中所存其亦逺矣入侍禁中新承聖眷至摘其詩雋語筆之御屏中辭章翰墨同時豈乏其人而公獨得此者非重其詩重其節也晚事定陵尤被寵渥初置翰林講讀學士公與邢昺首與其選雖未及大用以終而平生所立凛凛玉雪無一節可疵從孫文公億少依公以學既皆以文章名天下而清風雅􅋵奕奕相望浦城人物之盛自二公始紹定改元七世孫震榮將新其書堂之舊謂某盍為之記藐是晚出匪工於辭獨念前輩風流相去日逺後生小子鮮或聞知故為推迹本末刻之堂中使吾黨之士聞而慕之平居講學以淬磨志行自期有位於時以扶植世道自許則公之遺風庶幾復見而吾邦之人物其亦有興乎若夫卑陬淟涊志於榮寵利事溫飽而已豈惟重桑梓之羞過公之堂當必有泚其顙者矣浦城章氏家世學派按志乘稱浦城甲族盛矣蓋楊起於文莊章肇自郇公蓋練夫人孫夫人陰德世多傳焉今約録楊章二家為宋代閩中文獻所始餘未得槩及云文簡章希言先生得象章得象字希言世家泉州髙祖仔鈞以戰攻守三策投王審知審知命為將戍浦城遂家焉咸平五年進士及第為大理評事知玉山縣遷大理寺丞歷知台州南雄州徙洪州楊億以公輔器薦之未幾召試為史館安撫京東權三司度支判官纍遷尚書刑部郎中使契丹遂以兵部郎中知制誥踰年為翰林學士遷右諫議大夫以給事中為群牧使纍遷户部侍郎遂拜同中書門下平章事集賢殿大學士仁宗謂曰向者太后臨朝群臣邪正朕皆默識之卿清忠無所干附今日用卿職此也陜西用兵加中書侍郎兼工部尚書兼樞密使辭所加官明年以工部尚書為昭文館大學士慶歷五年拜鎮安軍節度使同平章事封郇國公徙判河南府守司空致仕卒贈大尉兼侍郎諡文憲皇祐中改諡文簡得象在翰林十二年憲章太后臨朝宦官方熾太后每遣內侍至學士院得象正色待之或不交一言在中書八年宗黨親戚一切抑而不進以簡重鎮止浮競而已他無所建明至其渾厚有容喜薦拔人天下終以為長者閩書朝奉章端叔先生甫章甫字端叔年十四辭親求師友薄遊江淮間殆十年卒以名聞熙寧三年進士調臨州尉邑有盜獄株連至不可詰訊甫按實抵三人於法餘悉不問哲宗即位轉承議郎通判宿州先是南京押綱侍禁史士宗侵耗官米數百石反訟倉官交納不公獄久不决朝廷以委甫甫至以片言折之士宗雖坐流竄自以為不寃兩遷為朝散郎繼丁親憂纍遷至太府寺丞召對稱㫖除府界提舉常平等事鄢陵舊有雙泊河數溢為民害為增濬河外故道是歲河朔饑甫召而廪給之因以用其力興築堤成民不告病饑者得全活徽宗立轉朝奉大夫未幾除知處州時承平日久年榖屢豐天下諱言災傷甫還朝首言淮甸歲凶宜加賑恤朝命遣使大發倉廪民賴以濟崇寧初黨論復興甫除郎官得㫖陛對抗言元祐臣僚削秩投荒皆緣國事陛下即位稍令內徙道路交慶今復刻言著籍禁錮其子孫恐非陛下本意由是與時論不合尋知泰州遂掛冠退居吳門未幾時㫖落致仕復知泰州之官數月乞宫祠卒甫莊重簡默接人以和行已蒞官一本於誠其論天下事不茍不隨期當理讀書萬卷增校精至有文集二十卷孟子解義十四卷閩書通志州守章榮之先生授章授字榮之得象從孫少從得象游京師學擅辭場紹聖四年省試第一元符中陳瓘薦其賢除知海州閩書章表民先生望之章望之字表民浦城人以伯父得象蔭除祕書省校書郎監杭州茶庫踰年辭疾去上書論時政凡萬餘言不報兄拱之知晉江縣忤其守得罪望之號訴於朝拱之竟得脫歐陽修韓絳吳奎劉敞范鎮同薦其才除簽書建康軍節制判官又除知烏程縣俱不赴遂以光祿寺丞致仕卒望之喜議論宗孟軻言性善排斥荀卿揚雄韓愈李翺之說著救性七篇歐陽修論魏梁為正統望之以為非著明統三篇李覯謂仁義禮知信樂政刑皆出於禮望之著禮論一篇以訂其說又有歌詩雜文數百篇集為三十卷莆陽蔡氏家世學派按公當時與歐陽文忠犯顔廷諍培沃朝廷正直忠厚之風與歐陽徂徠尹公並稱四君子惜其設施措畫未盡著廟廊而多布在列郡歐公撰墓志言往時閩人多好學而專用賦以應科舉公得先生周希孟以經術教授學者親至學舍執經講問為諸生率又尊禮陳氏烈陳氏襄鄭氏穆一時人士感奮是公與海濱四先生同時倡學於閩而後學尚有未及詳考者也其涖溫陵造建萬安橋樹植松陰七百餘里兩至斯郡惠澤尤深王忠文公十朋踵公後者道泉人稱太守之賢者必以公為首云馥嘗往來莆之楓亭蓋公故里也遺風八百餘年訪求舊跡莫可追尋拜仰公之墳塋逼近行路墓木剃然而後嗣亦式微播遷莫可考矣不禁低徊嗟嘆夫公之功烈德誼列郡後嗣尚有追祀馨香者何獨故邦寂然衰落至此耶因輯公家世學派而重興感云乾隆丙子十月下浣書忠惠蔡君謨先生襄蔡襄字君謨仙逰人年十八天聖八年舉進士調西京留守推官改著作佐郎館閣校勘范仲淹以言事忤丞相吕夷簡落職知饒州余靖論救之尹洙請與同貶歐陽修移書責司諫髙若訥不言由是三人者皆坐譴公作四賢一不肖詩以識其事詩成都人士爭相傳寫契丹使者至買歸張於幽州之館一時稱重慶厯初天下無事士大夫寬弛久安仁宗慨然思正百度以修太平排羣議進退二三大臣親擢靖修及王素三人為諫官使拾遺補闕公又以詩賀三人者以其詩聞仁宗亦命公知諫院兼修起居注遇之甚寵公值事感激無所廽避權幸畏斂不敢撓法干政而仁宗益與大臣圖議屢下詔書勸農桑興學校革弊修廢天下悚然知其鋭於治於此之時言事之臣無日不進公補益尤多四年以右正言直史館出知福州以便親遂為福建路轉運使復古五塘以溉民田奏減五代時丁口稅之半丁父憂服除復入修起居注進知制誥兼判注內銓御史吕景初吳中復馬遵坐論梁丞相適罷臺職除他官公封還辭頭不草制其後屢有除授非當者必皆封還而仁宗遇公益厚曰有子如此其母之賢可知命特賜冠被以寵之至和元年遷龍圖閣直學士知開封府三年以樞密直學士知福州未幾復知泉州公在福州禮其士之賢者以勸學興善而變民之故俗除所甚害往時閩人專用賦以應科舉公得鄉先生周希孟以經術傳授學者常至數百人公為親至學舍執經講問為諸生率延見處士陳烈尊以師禮而陳襄鄭穆輩其德行著稱公皆折節下之以風教生徒又作五戒以教民若浮屠巫覡蓄蠱之害一切禁止其在泉州距州二十里萬安橋絶海而濟行旅苦其險公立石為梁長三百六十丈種蠣於礎以固梁基又植松數十里蔭芘凃行至今賴焉嘉祐五年召拜翰林院學士權三司使三司開封世稱省府為難治公居之談笑無留事破姦發𨼆吏不能欺至商確財利則較天下盈虛出入量力制用必使下完上給剗剔蠧弊簿書紀綱皆有法程英宗即位以母老求知杭州即拜端明殿學士治平三年丁母憂卒年五十有六贈吏部侍郎公文章清遒粹美工於書而仁宗尤愛稱之詔書御製元舅隴西王碑其後命學士撰溫成皇后碑文又敕公書則辭不肯曰待詔職也於朋友尚信義聞其喪不御酒肉為位哭盡哀乃止公三子勻旬皆早世朝廷録季子旻及旬子傳乾道中孫伸請於朝賜諡忠惠有莆陽居士集行於世特進蔡伸道先生伸蔡伸字伸道襄子旻之子也與兄胄佃入太學俱有聲時號三蔡佃崇寧二年進士方廷對時從祖京當軸使謂曰能過我第一人可得佃不屈及揭卷佃舉首京詭辭曰陛下不以佃不肖而使冠多士恐天下以陛下私臣上以為誠乃置第二㑹星異上疏論宰相非人宜舉漢汲黯故事以應天變責監溫州稅官至朝奉郎直龍圖閣胄大觀三年進士官至徽猷閣待制伸政和五年進士纍遷通判徐楚饒真四州在徐州時禁卒謀亂約夜半舉火伸聞密為之備故緩更籌以誤之比舉火則黎明矣叛卒盡就擒在真州日值火災民露處雪中伸插置有方且欲發常平廪以賑守者不可伸曰此國家所以備非常也如得咎請獨當之事聞釋不問改知徐德安和四州初伸與秦檜同舍又同年後伸以趙鼎黨丐祠者纍年檜一日訪伸叙舊好伸不應出為浙東帥司恭謀官建炎紹興間盜賊蜂起伸嘗曰國步多艱中原未復豈能以書生餘技取爵祿耶時戚方既降而叛伸單騎至其麾下說之就招州民以寧官至左中大夫卒贈特進子洸以父任歷官尚書學士自有傳從孫戡進士僑居毗陵歷官寶謨閣直學士著定齊集四十卷朝請蔡子應先生樞蔡樞字子應傳仲子政和五年同從父伸登第歷官西京提舉學司主管文字御史常安民在黨籍人多疏之樞獨事以師禮提舉湖南學事時殿中侍御史張所教授潭州未知名會所白事樞問曰時事如此度今誰可任國事者所舉劉安世樞瞿然曰自崇觀來禁錮元祐之學文字言語稍涉疑似者必置之法子為教官乃敢伸公論若是耶即薦所後果知名年四十五慨然嘆曰先公掛冠之年吾已遇之時方多事其可無功冒寵乎致仕去榜所居堂曰世隱宣和末興燕雲之師主兵者欲引樞為謀議官樞以書止之纍官朝散郎守職方員外郎贈朝請大夫子頔進士宣教郎知寧德縣孫師言敷言皆登第備考明成化六年巡撫滕昭修墓建祠立碑每歲重陽令有司遣官致祭郡人柯潜記略曰成化六年春四方多以災沴奏聞當寧選大臣巡行天下凡民間利病可興可罷者皆許便宜行之庶幾格天心召和氣以康惠億兆民而都察院右副都御史滕自明公在選中乃奉璽書建節以來吾閩首訪百司吏以貪殘著聞及衰耄庸懦不事事者皆斥去而褒奬亷勤慎厚者使益修其政興太平之治既又巡行諸郡過興化仙遊之楓亭見道傍有巨碑刻云宋端明殿學士忠惠蔡公神道悚然曰此非嘗為四賢一不肖詩世稱直臣者耶遂下馬周視其墓䝉翳榛莽中亟發從吏馳諭分巡按察司僉事周君謨亟俾督所司修之乃以夏六月始事先封填頺塘次作享堂刻歐陽文忠公所撰墓志立於堂中以冬十月畢工方其經始也或謂公墓在赤湖焦坑而此為非是按墓志載公葬於莆田將軍山當時豈地屬莆田後又屬仙遊因此近有將軍墓故名曰將軍山今俗人又呼為蔡山則因公姓而得名又況有碑石題識可據則此為公墓無疑赤湖焦坑去此六七里則其為父母之墓文忠公亦嘗銘之所謂其里慈孝其岡平井即其地也歷歲既久地里紛更為子孫者尚亦遺忘況鄉里之人得於傳聞者安得不謬誤哉任其事而考視詳審者知府蔣君雲漢協力而成者同知習君襄推官李君俊莆田縣王君玉既成合言屬余記云閩中理學淵源考卷十一
