body:
  text: 閩中理學淵源考卷六十廣平府知府李清馥撰涵江陳氏家世學派按丁氏三陵藁云昔在成化以後迄嘉靖間泉中人文蓋斌斌然矣其一門諸父昆弟相為師友者則涵江陳氏為盛自太守敏菴公以明經起家時則有微菴先生肩隨衽接髙談周子太極之奧稍後紫峰出益昌明其學為儒者宗而侍御見吾與南樓並執經授業翹然稱髙弟諸先生造詣淵醇追古學者仕亦有聞於時微菴雖少一第而晚嵗學成德尊以其身為後進矩矱者垂八十年南樓為之從子獨以恂恂謹飭最得其歡及紫峰辭官侍養質齋公父兄子姪朝夕相從嘯咏其一門行義孚於家庭而文學推重無愧鄒魯矣再按陳氏先世家青陽山元延祐間碧溪公始遷涵江今為涵江陳云陳微菴先生洪璧陳洪璧號微菴晉江人世居涵江之濱兄洪載公腆𢎞治癸丑進士厯官髙州知府洪璧於腆為從弟其文字之雅為所深器大司成蔡虛齋先生亦加愛重蓋其平日刻苦工夫多在於易而於太極圗參同契人所難讀之書務鑽研而入其奧勤學到老而不得行其志布衣疏食安於草茅之下因以微名其菴焉紫峰先生集閩書侍御陳見吾先生讓陳讓字源禮號見吾少從從兄紫峰氏逰傳其學紫峰以易學名讓以春秋名一時學者師之嘉靖十年鄉試第一十一年登進士授紹興推官聽獄稱平暇則進諸生校藝講學徴為監察御史當世宗既立迎興獻太后入仁夀張太后仍以藩妃禮遇之兩宫以此有隙巨俠劉東山者睥睨兩宫間將以竒論取富貴乃令其黨搆誣張鶴齡兄弟有逆謀左道咒詛詞連宫禁逮繫無辜數十百人都城駭動諸司不敢出一語讓方視事東城遂捕東山下獄究其罪東山度不可脫令其黨告變且誣讓為張氏羽翼併下獄讓從獄中上疏辨上意稍解而西曹鞫東山所奏悉無驗併其黨坐欺謾伏誅讓得還職京師宴然當是時微讓仁壽宫危而人心搖矣及興獻太后殂廷議遷興獻帝合葬天壽山讓以藩王不宜入祔皇陵乃借言顯陵氣脈不可泄又重於勞民請以衮帔交葬便上初覽奏怒甚投疏於地頃復取視曰此言亦是於是定不遷之議而執政從旁擠讓竟賜罷歸里居日靜坐讀書孜孜學問口不及當世事惟地方利病則亹亹為上官陳之期有濟讓為人剛方亷介見者竦憚然與之久處談論慷慨真意溢出人信慕之上自承天還猶問其姓名臺使者至閩輒疏薦而執政多忌之置不用家食十五年而卒隆慶改元録先朝諌者贈光祿少卿所著有見吾文集二十卷邵武府志若干卷行于世讓在臺二年疏屢上皆侃侃大計獨處劉東山及議祔葬二事尤人所不敢出者特著之篇張氏儒林傳曽承芳撰文稿序陳南樓先生陳某某字某某南樓其别號也少穎敏融貫經史百氏為文嚼理敷詞操筆立就時紫峰先生聚徒講學于紫雲寺授淺説通典諸經南樓默記疾抄傳誦于人尤虛懷奬善見人文義有會于心者無論名下雖下于已者必録在郡庠取友以文學意氣相感摩有岱峰冠山二郭氏伯仲譽髦南樓引以為切磋之助比部郎林六川未第時所交慎許可一叩其學知有淵源以其子象川使就學焉于時橫經立堂下者不下數十人南樓升座肅講細繹經旨聲吐洪亮能使諸生竦然起奮至評駁文字一核諸理必取平易疏暢不眩竒詭恢張之説以故及門多所成逹涵江自敏菴以明經起家微菴肩隨衽接髙談周子太極之奧紫峰出益昌明其學為儒者宗而見吾與南樓並執經授業及紫峰辭官就養好從杯酒嘯咏終日顧獨愛南樓雅趣與合然南樓終不以同行故略師弟之分雖頻燕見不異紫雲聽講時也卒時年四十七初𢎞正嘉靖間泉中人文蔚起其一門父子兄弟相為師友者涵江陳氏為最盛云按紫峰先生年譜載族弟文學良莭與侍御讓同受業紫峯據友人徐簡之云閲涵江陳氏族譜良節即南樓云丁氏三陵稿撰本傳陳德基先生敦履陳敦履字德基别號靜心紫峰先生子也生而剛方嗜學好修嘗書先儒主敬窮理之言貼于座隅以自省弱冠從給事史筍江于光學易推髙弟年二十補郡諸生再試不利以紫峯家食戀戀膝下歡絶進取念菽水事親志不茍取友人侍御某曰德基至孝天成言不及勢利動不踰法則古心古行可於塵壒中求耶紫峰沒後益以讀書課子為務其論學大都專主性命根極理本不喜為時尚詞華之習嘗語其子復曰孔孟而後惟周程張朱真蔡得其宗國朝自薛敬軒陳克菴胡敬齋陳布衣蔡虛齋諸賢之外鮮有及者近時種種新説為學大蠧兒輩無惑也一切佛老莊列之書屏勿視而於紫峰遺集謂其源虛齋而述朱程窮編纍帙字讐句校壽于梓即老不少廢己未泉中兵冦後遷徙靡定德基恐後世子孫昧其所自因修譜為合族計尋覔祖墳而追祀之年八十餘丰神峻整無論見賓承祭雖子弟必正衣冠見之嚴寒威暑無少頃惰容子復又以孝聞學能世其家云莊氏履豐為志其墓曰陳氏潁川代以益貴人乃稱公慚卿卿慚長然則士君子所不墮其家聲者固不在區區名位間乎德基好學不厭好禮不倦耄耋稱道不亂無慚乎紫峰子矣莊氏履豐撰墓志陳及峰先生敦豫陳敦豫别號及峰紫峰先生季子資稟沉靜少即知學步履進退雅有常度年十七補弟子員從何怍菴受業紫峰下世敦豫逾弱冠哀毁骨立至性絶人彚聚紫峰著作旁搜遺軼並編次年譜梓行于世與諸弟子員告當路請專建紫峰特祠以發明羽翼斯道之美其立祀田修家譜撫恤宗黨水旱荒歉關民疾病者多方所為惟力是視雖悍夫惡少望而敬愛之不義者惟畏其知晚年充養完粹春溫襲人嘗曰學顧躬行何如耳豈必講哉既棄去弟子員堅卧涵江之湄名賢述作朝夕几案手抄性理全書稍增減之謂蔡虛齋所著易蒙引有繭絲牛毛之精而人病煩紫峰先生所著易通典有渾合未破之天而人病略乃以通典為訓箋採蒙引切要為主意合名典引以藏諸家門無俗賓論文尊酒輒為知己留連雅有豪興引觴浮白不以既醉爽度鄉先生林象川家與相近時過從為快嘗曰安得斯人消今世頑懦鄙薄之風云何鏡山先生撰本傅陳爾身先生欲潤陳欲潤字爾身御史讓子也刻志聖賢之學正立危坐矩言法論不輟於口閩書督學陳紫峰先生琛學派張陽和元忭曰自考亭朱子倡道閩中一時及門髙弟砥行植節者滿郡邑故閩中之學在有宋孝寧之之世為最盛逮明以來朱子之書布四方家傳而人誦之然時習其説以獵取科名影響剽竊而朱子之宗旨轉晦夫自蔡虛齋陳紫峰兩先生相繼出乃始一洗俗儒之陋習獨採朱子之精微而閩中之學在明正嘉之間又最盛再考虛齋之學方顯時士猶鮮能習其傳稍後紫峰出摳衣稱弟子於是虛齋得紫峰而學益尊今紫峰四書淺説與文莊蒙引並傳垂三百年鄉邦後先遺獻講明紹述誦仰師法者皆二先生餘烈也然則有志先生之學者慎毋固陋薄淺牿其心志如淨峰所謂務求之身心踐履之實以進於出處去就之大節如是益見先生孝養之誠勇退之決其紀綱乎彛常者厚矣李氏叔元嘗言前輩有及見文莊者曰與虛齋先生坐半晷則胸中半晷聖賢也有及見紫峰者曰紫峰表裏洞徹似青出於藍其氣象可想矣先生與淨峰筍江次崖並以正德丁丑聨第其講學論道皆淵源於蔡子上溯紫陽不離其宗云再按曾氏承芳王氏慎中為見吾先生門人見曽氏撰見吾文集序及王氏撰見吾祭文林氏一新丁氏自申為南樓門人見丁氏三陵藁莊氏士元為蔡于省先生門人見李氏叔元撰蔡于省傳皆附私淑之列焉督學陳紫峰先生琛陳先生琛字思獻别號紫峰晉江人杜門獨學不為茍同初受業於木齋李聰一日蔡文莊得其文于木齋所嗟異久之曰吾得友此人足矣先生乃介木齋稟學於文莊文莊曰吾所發憤沉潛辛苦而僅得者以語人嘗不解不意子已自得之今且盡以付子矣督學江右請與偕行教其二子歸而設教學宫之傍與郡城之月臺寺四方從學甚衆文莊沒將十年先生舉正德丁丑進士初考官尹編修襄得其文以語總考靳公曰造詣精深出舉業溪徑之外此必陳白沙門人不則蔡虛齋也釋褐授刑部主事乞南得户部𣙜淮安舟稅正額既足之後大開關門恣商人來往轉吏部考功郎會上兩宫徽號例得封贈先生曰吾持此歸足以慰吾母矣於是乞終養嘉靖七年大臣有薦先生有用之學不宜在散地下詔徵用辭又一年即家起貴州僉事旋改江西提督學校並以母老力辭不赴村居足迹不入城府不通逹官貴人書問却掃一室偃仰其中靜觀天地萬物消長之變古今興衰治亂之迹與夫世俗炎涼向背之態或逌然發笑或喟然太息時或縱步阡陌與農叟談俗敘故為樂發為詩歌往往自在灑脫超然物表為文層層嶄嶄發性露光如危峰矗石枯條潤葉文莊沒道德行誼無愧師門者先生一人而已初𢎞治間理學中輟虛齋先生起希曠之後以深微踐履之學教人由場屋之業而入於聖賢之道及門之士率常數十百人能得其言語者有矣未必得其精微或能并精微之意傳之者其於反躬踐履未必能如其言至出處去就大莭其能悉合於義無愧師門者鮮矣先生資稟明邁其為學先得大旨宏濶流轉初若不由階序而其功夫細密意味悠長非一經專門之士所能企及其淵源承授之功不可誣也所記述以授弟子則有四書易經淺説二書其族弟御史讓謂文莊蒙引得聖學精微間有意到而言或未到及其所獨到則可以發文公未發紫峰淺説得聖學之光大意到則言無不到及其獨到又可發文莊未發而先生猶自謂此訓詁之屬更欲門徒得夫勵進退大節破名利兩關言峻行古與之遊塵埃之外而細論夫顔子所謂彌髙彌堅者是以一時從學之士多有洞視今古傲睨宇宙之懷先生歸養若干年母吳氏以夀考終先生年幾六十矣後十一年先生卒時嘉靖二十四年所居後浦潮汐不至者數日士大夫聞之相與嘆息有司為祀之學宫張襄惠嶽志其墓銘曰道宗先覺學異專門精詣洞觀貫于本原鍾鼎非豐菽水非貧求仁而得時哉屈伸又祭之文曰嗚呼紫峰一世人豪有蟠屈萬古之心胸有瀉落長江之辨論有避世之深心而非玩世無道學之門戶而有實學世論以為平當張淨峰撰墓志王遵巖撰本傳備考王氏遵巖曰鳴呼士敝於場屋之業而固陋浮淺牿其心腑專一經以自業茫然皓首尚不能通其義以傳於繩尺之文又烏知所謂聖賢之學哉宿輩末生相尋以敝自虛齋蔡先生出乃始融釋羣疑張皇新意推明理性於字析句義之間以與前儒相統承夫所謂聖人之學者其駢拇於條畫枝指於解訓要以詳夫場屋之業而其意則進乎此矣虛齋之學方顯士猶鮮能習其傳而紫峰陳先生生稍後自以其意為前儒文公朱氏之學未嘗聞虛齋之説也一日虛齋得其文於故長史李木齋公所嗟異久之於是先生乃介李公稟學於虛齋請為師弟子虛齋得先生而其學益尊又云始丁丑榜得士吾郡最有名給事史筍江公于光今僉事林次崖公希元中丞張淨峰公嶽與先生並以經學為海內巨工張公尤號為閎博而傑於文給事公淡於仕進與先生同趨好滯一官以卒僉事公喜事功齟齬於世迭起迭仆卒無所就中丞公方據融顯事功為一時絶出然林公悔其顛躓張公亦以酬俗成務為多憂而恨道之難行未嘗不髙先生之決而慕其清也某生最晚猶及侍言於給事公林公張公皆辱俯與為友忘其年輩之後也謬學乖駁與二公有所往反二公不以為是豫猶謬自信且不揣而思有以易二公也獨不及事先生而請其説然以二公推之知其不豫是而豫亦宜無以易先生也然而知先生之心而能言之者某則不敢讓也先生之書其天趣極詣神機妙契在於言語文義之外而已至於言語文義之所存字謹其訓句詳其義顓名一門粥粥然如恐涉他足而誤塗徑固與治場屋者設為如是耳其超然會心離去形迹而遺忘物纍庶幾所謂不枝葉於道而全其真者由是以推先生之大然則論先生者不徒有考於其書而論其書者尚當有以求先生也與何氏鏡山撰陳紫峰先生言行略序曰紫峰先生既沒其學尊表於世祀學宫有年矣其孫復欲推明而大之以貽諸後命喬逺次其生平言行及當世學士大夫所尊重先生者彚為一帙而為之序序曰聖人之道大矣包乎天地而不見其元虛統乎萬物而不見其繁萃兼言之未嘗不精微言之未嘗不該其深入於性命者常顯於事物其博散於事物者常通乎性命後世名儒君子得其一指一歸發揮昌明之可以淑身而善人何其犬哉後世之儒所發揮昌明其一指一歸以淑身而善人者非有所擇之也其性有近焉其力有入焉而以至聖人猶渡津之有筏適國之有徑其理未始二也夫三代之世人共明一道士共修一學則既無異同矣異同生於漢然所謂膏盲墨守者特以守其師門訓詁之傳非聖門安身立命之大端也而後世乃以膏盲墨守乎訓詁之説者膏盲墨守乎聖門安身立命之道夫聖人之道之不能不雜於異端也猶太空之不能不隂翳大道之不能不荆榛也所賴名儒君子羽而翼之使之垂光於中天廓清乎四逹以盡後死者之責而已豈可有彼此之間哉君子之學動則踐履靜則涵泳天髙地下萬物散殊莫非吾心之化工誠有以盡其廣大髙明之量使之昭暢洞逹其內無纎欲之可留則其中無一理之不存仁義禮智以為徵應孝弟忠信以為躬行皆其必然之效自至之符故日用飲食可以盡神化愚夫愚婦莫不與知能此聖人之道所以性命事物顯微精粗一貫無二而剖析其同異較論於毫釐者雖忘言可也先生之學得之蔡虛齋虛齋之學宗之朱晦菴而所歸宿獨詣實在於此先生固不輕以語人世之尊先生者徒謂其髙潔不滓光明無纍亦未有得其精微者也至論先生出處之際則其肥遁不仕蓋為太夫人之養而非以隱為髙者令太夫人下世之日先生暮齡未艾廟堂一日用先生則又必有為世道之光者非但如斯而已也某生先生之鄉最後私有志聖人之道而不敢以語人間嘗竊取蔡虛齋與先生所著遺書及其平日尚論玩索蓋亦有年反躬內鑒不得其髣佛而先生之孫復以此相命遂擷掇先生所學之大要與其切近精實者如此嗚呼論先生之世豈特可以祀學而已以躋有宋諸儒俎豆聖人之廡可也又年譜序略曰吾泉鄉先輩德行文章氣節可謂盛矣最著莫如蔡虛齋陳紫峰二先生虛齋謹密精微涵而揉之而不見其端紫峰光霽峻潔融而超之而莫得其迹蓋虛齋聖門曽閔之徒而紫峰琴張曽晳牧皮之侣也聖門而後其悠然溫厚者莫如陶元亮其脫然瀟灑者莫如邵堯夫紫峰先生殆欲兼之先生自其布衣時則已亢自矯厲入仕三年世利皭無磷緇告滿得恩以榮其母便挂冠歸養聲名特達朝命屢下堅卧不出卒奉菽水終厥天年林居二十餘載秕垢塵俗飲酒賦詩飄然有物表之致而卒歸之精義正學可謂風舉雲停鴻飛鳯立嗚呼先生於古人真豪傑之士矣先生冡子敦豫躬行實踐無愧先生嘗有志修先生年譜而不逮季嗣敦履屬稿未就先生冡孫復乃與同志考核論次又請蘇君民孚李君叔元重加削訂復使卒其業某皓首老大於虛齋與先生望之不得其津涯序先生年譜不覺爽然自失也郡守黃孟偉先生偉黃偉字孟偉同安人性敏而慤貌古心淳年二十三領正德庚午鄉薦自歉未學不赴春官更受業陳紫峰琛之門甲戍成進士授南刑部主事所治獄情法既得執不可奪暇則讀道南四先生書溯頴昌授受微旨以自勵嘉靖初應詔陳九事皆切中治體出守南雄明禮教去淫祠罷不給之徵禁晝逰之女不以升科困羸民不以官稅入私帑不以非禮阿上官甫三月遂疏歸老稚遮留不得以薦起改知松江府時張孚敬當國霍韜偉同年也造謂曰兄向者應詔疏語嘗及張公某私為解張公亦自知兄矣宜一謁之偉曰昨出墮馬今方病足未能也即投牒歸家居食貧養親日惟講學正家為事丁艱三載足絶卧內晨興率子弟展拜家廟諸子或晏起斥跪庭中須拜畢乃去冠昏喪祭盡革舊俗鄉人顧化不敢為不義值郡嵗大飢臺察請偉尸賑事偉旦暮區畫食寢幾廢及竟以劇瘁卒郡守以偉及李源田嵓立坊以旌之閩書舊郡志新郡志清源文獻行人傅廷濟先生楫傅楫字廷濟南安人正德辛未進士祖父凱父浚相繼登第楫年方冠有文學授行人司行人志尚皭然時浚為山東鹺司同知先是楫母沒父繼娶王從之官私其二蒼頭浚未及處分而暴死訃聞楫疑其遽也奔至察所由則二蒼頭先期遁矣楫痛憤祕不言每哭輒嘔血數升義不與王共居宅密求者久之一人傭匿德化深山巨姓家微行至其所謂曰聞君家一人力作可出見之奴出楫曰是也有罪然不可面數君幸且入則出袖錘破其囟立殺之而其一不可迹喪葬畢慟而矢曰父讐尚在曷為人也乃狂易出次于外裂衣冠屏妻逺子晝暴烈風日中夜則寢地以為常垢面穢骸故不為訾省兾或致讐而甘心焉親戚知友見以為真狂者也而侘傺之懷時發之詩歌及文辭黏坊市門壁間若顛若醒隂自見志云其遇迅雷爍電中夜則興正衣冠拱立武宗哀詔至則具衰杖朝夕臨終期始釋服至其子死不哭也或問之則曰吾不能子而敢為父乎諸父不忍其瘁也屢請歸舍竟不可既而王氏死乃歸又十五嵗卒蓋自廢自謫自創自罰者三十九年萬厯己卯翰林習孔教司理泉州榜其廬曰苦節純孝越章録教授蔡于省先生黃卷蔡黃卷字子省晉江人嘉靖二十年以貢授睢州訓導擢汝陽教諭貧士十脡悉捐之薄俸所入又推與貧者共之約諸生講易期以昧爽士爭佩習教汝陽士亦如睢兩地人文鵲起南太宰趙賢及吾郡太守孔惟德其最注意者以唐藩教授歸為鄉表正孔惟德守泉自答禮外無他謁孔朔望及門且語所知曰吾師何無隻字見教寄聲曰但願君侯愛民如子老夫聞教已深矣永寧城陷將坐指揮王國瑞重辟則曰法無可貸情有可矜孔乃從末減指揮齎金謝愕然曰吾為理爾為利耶峻麾之當孔踵門時請以師道前席而三僚俱隨太守小凳隅坐二守即周道光及周代孔守泉仍敦請為正賓衡門忘人之勢而郡有司亦自忘其勢若此初黃卷受易於陳紫峰精詣其旨善以妙義教誘後進莊氏士元亦傳其學云李鹿巢撰本傳閩書州守王紫南先生承箕王承箕字維肖别號紫南南安人少竒頴父疇官廣文闢小軒延紫峰陳先生訓督其中承箕稟學惟謹授易講解輒了奧義弱冠補諸生讀書以宋箋為宗以子史宏覽博極為詞人冠嘉靖十九年領鄉薦久之授沅州守時年已五十餘矣沅州政多可紀何公鏡山為志其墓稱其約已裕民庭無暮金性坦直不隂附上官意幾三年解組歸家近紫帽之南故號紫南壽八十二子十有登科目應篤見何怍菴學派御史曽美遇先生承芳以下私淑曽承芳字美遇惠安人嘉靖丁未進士授鄞縣令時倭擾江南海濱若岩諸旁邑多被陷而鄞縣獨完詔賜金幣擢為監察御史烙馬順天行裝三夾而已時呼夾版御史以疾歸卒按清源文獻公撰陳見吾先生選稿序云吾溫陵陳見吾先生以直道節概表重當世雖厄塞廢退不盡宣其用而道業文章巋然一時學士大夫咸亟稱之余從遊垂十餘年方欲從公棲遲相與論文於涵江紫亭山水之間比余乙卯謝病歸溫陵公則宛然長往矣公之子爾身懼其遺緒弗宣梓其選稿凡若干卷委序於余云觀此則公於見吾在師友之間故附之紫峰先生私淑之列又按公之弟偉方號蒼巖與李孟誠何鏡山講德論學亦以志節文章著見泉郡述志藁不另録馬郡守丁槐江先生自申丁自申字朋嶽晉江人嘉靖庚戌進士授南京工部主事進郎中出守順慶三年調梧州性嗜書南中間曹無事多購古文竒書昕夕翻閲宦遊邸舍載書自隨為文出入歐曽之間居官以振救平反為主順慶困採木之役閭里雕敝緩征寬徭户有逃亡者核除之嵗飢富人閉糶夜數十人劫取其粟官當之劫盜律其實姻也自申曰是為親相盜况閉之糶固可貰矣遂從末減龍州夷酋爭界相讐殺奉檄同保寧守訊之保寧守請具甲胄以從自申單車抵其壘酋惶恐囚服謝罪及至梧梧為督臣開府鎮百事蝟集關決於守應之如流會大勦猺冦將領掠平民為功俘至令妻孥自識别驗實縱還諸所全活無算自申所至以循良稱而性抗直恥為妸嬆態某僉事子上舍生託省覲來順慶頗通所屬饋遺自申弗為禮曰君子愛人以德耳監亭令受賕事發有力者為居間監司亦陰授意指自申不為動竟按致之法故於上官多忤云歸而杜門讀書撰述益富扁所居曰希鄴所著有三陵稿子日近孫啓濬見科目志李文節撰公墓志云吾郡中先輩士大夫田居讀書慕古以著作自命遵巖王先生而後惠安李抑齋愷同安洪芳洲朝選而槐江先生相繼起再先生為南樓傳自言髫年嘗供灑掃之役過辱與誨今附之南樓學派焉李文節先生撰墓志訓導王間齋先生疇以下交友王疇字體範號間齋南安人世耕紫帽之陰𢎞治中以貢授常寧訓導棄官不仕與陳紫峰友契其讀書多實體處王遵岩目為今之仁人自幼至老無惰容與人推誠無猜其祭紫峰文曰大道久荒正人希濶談理學者多隱僻而不經張氣節者每詭異而無實求純粹無瑕而髙明不纍如吾先生者天下鮮矣先生之未仕也著書立言剔髓入神深而明微而顯其既仕也不為勢誘不為利奪兩京郎署各羡清苦之名再起儒宗不易終養之孝論者謂先生有渾雄之文章不知先生所以開來學者有出文章之外謂先生有恬退之髙節不知先生所以立大本者不專在恬退之間也蓋先生平日之心不求人知惟求天知不求同俗惟求同理故其功名不必大顯天下而教澤垂後世其特立不必盡悅當時而行誼擬前修又曰先生未遇時讀書豫館著述三年蔬粥共歡如兄如弟既仕之日往來書問以陳情共隱為教告歸之後時常携手秀林之麓紫帽之巔談吐生平蓋相知者四十年而吾兒承箕又荷先生教育云閩中理學淵源考卷六十
