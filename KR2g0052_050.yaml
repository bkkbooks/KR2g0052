body:
  text: 閩中理學淵源考卷五十廣平府知府李清馥撰簡討黃行中先生夀生學派按莆中諸名儒碩彥其問學大都不僅屑屑章句維時俗化朴茂諸公蓋承明初風氣之始者莆自艾軒先生開派以質行為先至季世節槩愈著宋元之際諸儒如存碩果然公其道以私淑諸人者所在講席尚多故明代英才蔚起士風家法遞有師授今録自黃氏行中先生而下其派繫可考者著於篇簡討黃行中先生夀生黃夀生字行中莆田人滔十五世孫壽生洪武末與兄同舉鄉薦以親老求歸侍養水南諸賢率從之遊若會元陳中進士徐資用皆門下士也親終入太學永樂六年再試京闈第一九年登進士選翰林庶吉士預修性理大全諸書既成授簡討九載將滿考試禮闈得疾卒壽生莊重孝友通史百家尤邃於詩莆之詩學以壽生為初祖子子嘉亦以孝聞子嘉長子深次子仲昭見家學莆陽文獻閩書副郎陳舜用先生中陳中字舜用莆田人永樂十八年鄉試第二明年會試第一資性簡率才思豐贍文章健直類其為人正統初自南京戶部主事就留史館預修文廟仁宗實録成升本部員外郎滿九載無意榮宦遂致仕幽巷貧居吟咏自樂公門關節終身未嘗及之卒年八十三縣令徐先生資用徐資用莆田人永樂戊戍進士令揭陽博洽有才舉動端謹興學訓士有良吏聲疾作辭歸與弟資茹講行禮學以肅家教鄉人稱為二徐吳時耕先生稔吳稔字時耕水南人叔告之後性頴悟嘗賦廬山瀑布詩有入雲聲作雨映地色涵秋之句初從黃檢討行中學詩經復從廬縣尹質中學書經講習之下皆能逆意而解嘗試鄉闈不利遂不復應舉後進延以為師舉業詩課立為改定諸生以其學取科第者甚衆中年以知者兩薦為訓導以母老辭不就僉事黃未軒先生仲昭黃仲昭名潛以字行莆田人性端謹年十五六即有志正學舉成化二年進士與羅倫章懋賀欽莊昶等同榜以名節相激勵逾年以庶吉士除編修與懋同官而昶官除檢討是冬命詞臣預撰明嵗元夕煙火花燈詩且出舊製令擬述以進先生以其詞多鄙俚近俳優非儒臣所宜為與同官章懋檢討莊昶共疏論之忤旨廷杖於是先生調湘潭知縣懋臨武知縣昶桂陽州判官未行明年正月刑科給事中毛𢎞等言三臣初出草茅敢言直諫實盛世事乞復其職特旨改先生右評事懋南京大理寺左評事昶南京行人司左司副蓋是時先生除官才四十日耳京師稱三君子而羅倫以編修論學士李賢坐謫又通稱翰林四諫云先生氣岸屹立思致安詳既改南大理清守執法連居父母憂却去葷酒不離苫塊者四年遂辭疾乞休家居十年𢎞治元年以御史薑浩薦起為江西提學僉事誨士先行檢而後文藝以身倡率之宦家子弟未嘗假借識拔皆名士如羅欽順劉玉汪偉陳鳯梧是也𢎞治丙辰再疏乞致仕先生前後所居官不滿三考家居之日最久儒雅藴藉為鄉邦儀表嘗與陳獻章周翠渠往來議論凡聖賢一言一行惟求踐履之實平生刻苦為學務究道德性命之原羽翼程朱而精於校閲嘗辨易卦未濟春秋褒貶雅風升降及編次或問裁定通鑑證異書法咸有發明又刋布冠婚喪祭之儀以示後學所修有八閩通志延平邵武府南平縣志又與周瑛共修興化府志有未軒集若干卷正德戊辰卒年七十有四學者稱未軒先生豐城楊亷採其學行入理學而子孫多以科第顯閩書獻莆陽文縣令林先生廷芳學派按先生為宋林氏沖之之裔彭惠安公稱其負重望為學者師考志乘柯氏潛丘氏山其學徒也丘之派有朱氏悌鄭氏繼今附識之縣令林先生廷芳林廷芳先世福清人父震徙居莆之橫塘廷芳永樂十六年進士知新會縣罷歸敦朴能詩尤善選體柯殿元潛早從之學姪棨天順元年進士終廣東僉事子敷成化二年進士終韶州知府少詹事柯竹巗先生潛柯潛字孟時號竹巗莆田人弱冠領正統鄉薦當赴春試未忍離親隨師入蓮峯僧舍講讀不輟景泰二年廷對第一授翰林修撰益自淬勵學行日以進明年升右春坊右中允兼修撰預修歷代君鑒寰宇通志既成升司經局洗馬仍兼修撰英廟復辟授尚寶少卿兼職如故憲廟嗣位以隨侍恩升翰林院學士奉旨教習庶吉士李東陽等一十八人纂修英宗實録成化改元再奉旨教習庶吉士林瀚等二十四人命掌翰林院印三年實録成升詹事府少詹事兼翰林院學士四年命日侍經筵講讀未幾丁父憂踰年復丁母憂詔起復為祭酒疏乞終制服闋卒於家潛質貌俊偉容止雅飭文章妥整有法詩尤清婉接人外若樂易而內實狷介鄰郡有中貴人寵冠一時士大夫欲求薦拔者爭趨其門潛獨不往供職之暇時偕二三知己覽勝賦詩襟度豁如至於遇事感發言論侃侃在庶僚時已繫天下之望位日通顯雖嘗以聖賢之學啓沃聖心平生藴蓄未及少施於天下其殁也士大夫多傷之潛院中所搆亭旁植二柏後進慕其風采謂之柯亭柯柏所著有竹巗稿玄孫維祺别見閩書莆田志副使丘安重先生山丘山字安重知瑞安縣捕治老猾豪置之法嚴禁溺女教以婚嫁之宜以革奢風以旌異擢監察御史奉敕清理兩廣軍政逺惡州郡無不身涉從容逮踐根究始卒親與定奪軍民交口稱便巡按應天被璽書恤刑並寬嚴得中獄無寃濫滿九載擢雲南按察副使致仕山少慕元儒盧齊韓之為人諷其遺編甚習有所吟作類其格調而興致尤逺雅妙書法刻石崖州大忠祠一時重之子茂楧教諭德平嘗上革弊安民疏仕淳安知縣孫茂中正德進士至河南右布政使凝重簡默蒞事詳慎曽孫秉文從姪泰閩中理學淵源考卷五十
