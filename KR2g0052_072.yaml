body:
  text: 閩中理學淵源考卷七十二廣平府知府李清馥撰趙氏家世學派按吾郡有明以來傳習諸經惟易獨多凈峰張氏嘗言彼時蔡虚齋易學盛行于泉詩道幾絕惟朱氏軫獨與師友潛心講究由是泉人業詩者多從之春秋之學獨推趙氏家學為最著考宗伯文簡每述海内學士知吾邑有特峰著春秋錄疑與蔡文莊四書易經䝉引並為後學指南可與漢唐儒林相頡頏至尚書尚有數家如林氏鴻儒黄氏光昇蘇氏鼎實黄氏道煥莊氏竒顯皆著其說至三禮自元丘氏釣磯之後成絕學矣明初如趙氏珤有禮經解疑之書厥後楊氏道會有周禮詳節鄭氏維嶽有禮記解李氏如玊有周禮會註亦多散佚莫考竊窺鄉先正敘述經訓每勤懇備書可知彼時崇尚實學有兩漢儒林傳經遺意葢欲以一經之士入于繩墨其學術途轍必出于一其所以移易耳目開拓心志以造就黨塾之士者非無謂也前哲維持學術惓惓如此謹備書之遺漏尚多偶舉記憶所及者錄焉郎中趙惟德先生瑺趙瑺字惟德晉江人少通春秋不務俗學而得聖人之意成化丙午領鄉薦𢎞治元年進士授户部主事歴員外陞郎中監薊州太倉黄土諸倉壩上御馬諸廐臨清鈔關皆秉正執法常祿外錙銖不染在官手不釋卷𣙜關歸事親盡孝撫寡姊孤姪甚有恩環堵蕭然獨以行誼經術遺訓子孫著有春秋管見孫恒主事趙用甫先生日新趙日新字用甫恒子隆慶五年進士好讀竒書署其齋曰潛所以矯也筮仕分宜令有賢聲中讒改教旌德遷國子博士歴户部主事性介特不屑為阿匼以媚上官視貴勢漠如以故仕路沉淪後乞歸終養卒弟日榮黄文簡撰墓志郎中趙因甫先生日崇趙日崇字因甫恒子萬厯丙子舉人授南康令治民如家疾苦纎細皆為區理遷應天司李積年滯牘剖决無餘請托不行轉南刑部郎忌者中之謫新城令未幾以母老告歸圖書四壁蕭然自樂而贖宗女撫孤甥義行尤為鄉里所矜式新郡志郡守趙特峰先生恒學派馥嘗讀鏡山司徒文稱怍菴公之景慕先生若趨父兄而奉蓍蔡而鏡山數過先生問業實亦以師禮事之爾及讀田亭草又知文簡黄公亦私淑之列也觀文簡之言曰某自曩受經時從學士先生訂繹疑義剖析異同必曰特峰趙先生云何即未及門實私淑焉今代逺風微所著曰春秋錄疑者聞郡友人尤氏際坦家有其書其餘亦多散佚即當日門徒亦寥寥莫考謹將文簡并鏡山二先生錄附焉儻後續考有人再備列之夫前輩流風師表日久寖湮而稽經考傳之事派别益難尋緒矣先生以經學貽謀一時多聞蓄德之士多宗之而文簡鏡山二公尤為隆萬間儒林典則傾心景慕豈僅獻老乞言哉文簡鏡山二公之學另於家世學派敘述此不具論郡守趙特峰先生恒趙恒字志正號特峰晉江人祖瑺𢎞治元年進士歴官皆有清望著春秋管見恒警頴負竒十三充弟子員家傳春秋學謂胡氏春秋闡素王心法功令標以錄士而末學穿求崖穴繁綴枝條如捕風射影奮然以推明經術為己任著春秋錄疑讀書武夷山中建州士多就問業嘉靖十七年成進士乞就教職得教授袁州督學使者延主白鹿洞集諸郡㒞乂而師之遷國子監丞尋改南都南中辟雍士請所著錄疑梓之居二載遷南户部主事尋進郎中是時承平久四方漕餉率重北而輕南歲押運一二縣簿領之所積負以百萬計恒謂留都根本地廥庾虚竭何以應猝請之司農陳儒疏部運之規令諸省分漕以郡佐總漕以藩司各詣部庭稽覈如輦下例疏上得請後遂載令甲恒居部署聲籍甚苐以鯁介無援遷浙江鹽運司同知未幾擢守姚安姚安俗狃淫僻恒為定婚娶之禮土酋歙然又嚴鑄銅之禁居九月乞養親歸士民祠之名宦里居杜門寡接邦君式閭存訪悉引疾避之交遊中以道義相期許者莫如同安洪司冦朝選朝選為權奸所穽逮繫會城獄瀕發訣於恒曰茲行也吾必死之嵇紹不孤無煩多囑恒呼其仲子日榮命之曰若受洪先生國士知勉旃以報毋令魏邵郭亮千載笑人日榮方馳謀槖饘則虎冠吏已毒斃朝選諸親故無得近者日榮撞突而前殮其尸以歸人咸稱日榮義士實稟前訓也蒞家儼勅雖燕閒必整冠危坐對子孫終日無惰容或有軼越譴訶立至諸子孫聯翩仕路顧多躓困又皆不屑營私恒每談及津津喜曰吾道如是晚歲築精廬於茂趣山中足跡不窺城市覃思著述秉燭讀書其文一以歐陽文忠為宗近述鄉先生王遵巖之遺論醇然先正典型年九十四卒所著有莊子涉筆史記涉筆與春秋録疑並行于世其忠愛堂稿經濟錄抄及文集若干卷藏于家子日新日榮日崇孫世典世徵世攽等俱見科目志舊郡志撰新郡志黄文簡墓志青陽莊氏家世學派先文正公撰方塘先生傳曰泉郡之南聳起而特秀者為紫帽山山之下村落繡錯巨宗名人輩出相望往往為吾郡冠而青陽莊氏尤擅科甲人物之盛非諸族所及也馥按莊之先系出永春桃源自宋少師藻齋公賜第郡城因家焉其姪孫古山復自郡城遷青陽青陽之有莊自古山始傳至方塘十一世矣考方塘先生用賔其後為宫詹際昌羮若氏竒峰先生偁其後為侍郎國楨陽山氏石山先生一俊其後為脩撰履豐梅谷氏餘派系俱未及詳考其家世抑由内行脩潔隱德弗耀累功積厚而致然歟其收名藴發于後有以哉今錄其表著者載於篇太僕莊方塘先生用賔莊用賔字君采號方塘晉江人生而卓犖聰頴邑先達陳紫峰琛聞其名召試庭草交翠論嗟異久之與后峰氏壬春石山氏一俊同登嘉靖七年進士第初授行人使蜀盡却藩國供餽給事中劉侃當使琉球以母老且未子相持泣用賔奮然曰古有以栁易播者何人哉願得身代未幾陟司副遷刑部員外郎出為浙江僉事用賔為人木强又少戅嘗稱士為知己者用當昻首伸眉論列天下事奚取局促效轅下駒為每遇權貴人直睨之不能刓方為圓而於嫉惡尤甚不中意輙面頳怒目甚或發憤呵叱之故卒為時所中太宰汪鋐生貴甚嘗以事怒其屬長跪不解賔為不平愬之永嘉張相所汪適從直房見之恚甚用是出之浙浙所轄寧紹台三郡多權貴人一繩以法無敢輙居請者仕中不廢學多記覽益精於文藝臨歲比時缺督學用賔署事校寧波郡揭以袁元峰煒為第一時煒久困未知名即許其文首天下已而果如其言餘姚令顧存仁以不阿權貴得謗用賔亷知其賢特誇奬之遂得擢黄門以直諫顯視事纔八月理寃獄靜譁伍奬㧞亷吏所部肅然有屬官倚勢貪横用賔執法治之拂巡鹽御史意疏劾用賔值汪脩前憾遂從中覆罷用賔時年方三十一如是家食四十餘載絶意仕進宦囊蕭然居鄉一介取予不茍孝親睦族行鄉約開水利邑人愛敬鄉評至今重之自嘉靖三十八年倭冦犯閩中連歲猖獗攻入興化府戕殺民人無數沿海衞所相繼告陷而泉之劇賊黄元爵等因機交煽自郡之内外所在皇皇勢且不保用賔為當事畫䇿浚城濠部署城中守卒使各為營伍民心遂定城頼以安當倭賊突犯時逺近村民爭入城逃生勢甚急城門晝閉避冦者不得入幾相擁入水中用賔力請當事願身守南門乃操管鑰坐城門外命開門内之而身自當賊所活人以數萬計時賊野掠無所得奸民導之發塜取贖用賔與其弟用晦募鄉兵後先殺賊多賊大恨乃剜用賔父塜刦屍去用賔聞之拊膺號慟與用晦徑走賊壘戰於南安雙溪賊大潰連破十三壘負父骸歸賊追之用晦殿與其僕鬭死會僉事萬民英指揮歐陽深以官兵繼至翼而前又大破賊前後斬倭首百有十顆生擒一十四人奪囘被擄生口二百七十餘人時嘉靖壬戍五月初二也倭冦既潰黄元爵勢窮遂就撫泉郡悉平當道屢上其事為冒功者掩抑久之未敘而用賔終身不自論列萬厯二十二年倭冦朝鮮子鳳章乃上言於朝下其事部議贈用賔太僕寺少卿官用晦子百户世襲以風勵天下士葢去用賔破倭之年且四十載矣其後曾孫際昌舉萬厯己未會試第一廷對復第一人咸以為用賔開門活人之報際昌天啟中任脩撰不附魏閹沉廢數年愍帝立起春坊庶子未幾卒以風節故追贈詹事所著有周易解意一編黄文簡為之序云史館擬筆傅錦泉撰墓志先文正公撰本傳莊先生鳳章莊鳳章晉江青陽人守闕上書言其父僉事方塘用賔與其叔父用晦嘉靖中所為禦冦扞城狀晚歲有志斯道游李見羅先生之門何鏡山撰莊孝子述侍郎莊陽山先生國禎莊國禎字君祉晉江人少竒頴王遵巖慎中器之妻以女舉嘉靖四十一年進士授會稽令出諸生趙日新於寃獄贊直指倡行條鞭法以卓異徵拜給事中先後疏論大臣如郭宗臯游震得遲鳳翔皆夤緣有奥援者出浙江按察僉事遷江西參議廣西副使復改視江西學政累遷廣東按察使轉雲南江西左右布政丁外艱服除補河南值兩河大祲白兩臺請發臨德倉改折漕糧三歲倣趙閱道荒政選丞倅分地經理之民藉以全活甚衆潞邸新開中貴人蒞事所為裁經費汰浮冗無少假借事以就緒而民亦不告疲以資望擢副都御史巡撫江西先一年水次年大旱復以河南例題請改折計部初猶難之再疏得請晉南京刑部右侍郎旋改户部以内艱歸國禎器度端凝貌寛和而衷嚴整有屹然不可奪者所至守官盡職循級而登不屑借譽養交以營速化性坦夷樂道人善非意之加恬然不掛胸臆每謂昔人理遣情恕兩言終身誦之可也為文喜典重深厚而厭鈎棘為詩喜舂容雅渾而薄纎巧大都得遵巖之指授為多歲時伏臘率宗之子孫敬共祀事每與人語好稱引國家典制往哲節概行誼祖先以來積功累行之跡旁及今昔人情善敗隆汙之變聽者聳然感動居常所過從不過一二故人厚善者當路諸公及門未嘗峻拒利病未嘗不以告里黨有負枉不能直者語次間為直之然不任受德也卒年七十有八子懋華懋聲見科目志舊郡志新郡志黄文簡撰墓志郎中莊仁山先生士元莊士元字君聘晉江青陽里人自童年端重不煩父師教詔而言動盡有繩檢人稱謂莊家顔回閉户下帷窮探玩索庶幾深潛純粹之學嘉靖三十二年試春官編脩胡公杰得其文以白大學士徐公亟加稱賞洎揭榜置名第二時方試館職士元以濡迹權門為恥竟不入選授知廣德州原本經術飾吏而政尚簡靜輕徭省訟吏戢民安尤興學勸禮垂意作人廣德自前守歐陽南野而後州人以士元並稱焉轉比部員外郎己未會試檄入簾所得皆知名士給事呉時來抗章劾嚴相嵩逮治獄士元為問官改擬謫戍當國怒甚持卷四日不下然畏公議不果駁呉公得棲遲嶺外旋復柄用士元曲全之力為多已而轉本部郎中曹銓預有江西督學之注會當慮囚士元得命廣東行抵家已有足疾披閱招移用是勞勩疾劇卒於髙之化州士元寛宏簡黙近於仁者仁山乃其自號要其質與行誠足當之李氏叔元曰敏德為泉南易宗而陳氏琛其傳心髙弟蔡于省之授莊士元李維徵之授蘇濬皆易學淵源云清源文獻李叔元青陽五先生傳賛莊明齋先生龍光莊龍光字自昭别號明齋用賔冡孫甫四歲父沒少負頴質九歲能屬文弱冠補弟子員嗣是祖父母及母繼沒龍光以嫡冢持服不與棘試者十年時以積毁故遂得疾病良已猶理故業沒時年三十有四龍光篤有至性内行脩飭母病忘食飲非子手調進不御日侍匕箸間間以文事出必歸上食食已復赴日數還往以為常母不喜服藥籲天頌禱宛轉進之如是者五年母頼以坐起比母沒事二叔父甚恭所有遺田悉推與之少時師黄文振先生經術之外尤以行誼相慕合遇友人困戹鋭身救之乏者不待告賑之王生為舞文吏所陷竟得直有司而金生妻子恒待以舉火龍光死交友無不雪涕者而文振先生與金生各為之服視小功此以知其義矣子二夢岳更名際昌重岳史文簡雲臺藏稿詹事莊羮若先生際昌莊際昌字景說號羮若曾祖用賔夢張襄惠岳投刺相謁而際昌生因名夢岳以試更今名九歲善屬文十一而孤萬厯己未會試廷試皆第一泉掄魁天下自宋己未曾樞密從龍而後五百年始克再覩邦人士艷傳之廷對制策一字偏傍偶誤被勘遂乞假歸天啟元年授翰林院脩撰經筵展書起居注纂脩國史編葺六曹章奏乙丑分校禮闈尋管理誥勅時魏璫擅權求為撰祠記拒不應璫銜之視事數日奉使趙藩卻諸餽遺無所納便道抵家丙寅秋當復命會脩三朝要典蹙然曰是固欲以國史為刑書者奈何居詞垣受璫指使哉丁卯天下大比士論資當衡文兩京親友勸駕長安中有促之者曰公速來可步武三事也夷猶不赴會部推遷秩為魏璫所擠奪職崇禎初璫誅即家起諭德道陞左庶子至京召對陞侍讀兼記注官時懷宗勵精宵旰五漏入侍率二皷方罷際昌赴召時途中已得末疾用是困􅉵卒于邸年五十二上聞心悼降㫖莊際昌起廢詞臣効勞卒官贈詹事葢示優異云際昌胸次坦洞絶不為矜倨態而性峭直好引掖後進孝友切至傷其弟重岳孝亷早卒撫遺孤如己子終身茹素午惟一葷而已為文泚筆立就初若不經思索而天動輒隨入仕若干年里居强半族經倭難脩譜牒葺祠屋家居肅飭自將蒼頭戢戢不敢問户外事獨好為德于鄉嘗與鄉先輩合力築溜石陡門濬新溪水道獨捐費二百金增舊規三之二四十二鄉咸利之天啟末海氛不靖鄉人將逺竄為立約編伍守望相助瀕海以安焉孫延裕好古鯁亮有祖風新郡志名史文簡撰墓志八閩掇記閩書林麟禎補脩撰莊梅谷先生履豐學派按吾郡青陽莊氏世多令德代有偉人梅谷先生資禀篤厚孝友肫至以文學著稱傳稱其力䕶趙公用賢贈賻洪公朝選其扶持善𩔖誠可風世也再洪公一事文簡黄公撰封翁小石公墓志謂公適竣事北上與相值頌言出之且周旋禭賵或怵太史是相君所甘心也而奈何强預人事封公獨寄聲慰曰兒即以此得罪無恨老父亦無恨矣即此可想見家學之槩餘鏡山先生敘文備詳云脩撰莊梅谷先生履豐莊履豐字中熙晉江人祖一俊仕浙江參政有詩才履豐萬厯五年進士選庶吉士授翰林編脩轉脩撰尋題注起居充經筵官丁外艱卒履豐天性至孝事父望槐飲食起居惟恐傷之弟履朋舉進士為郎早天無嗣當其病時度不可起中夜籲天願以身代為人長厚冲抑見人一善若自己出或聞有過葢覆周旋如其自計惟恐失名而喪位其他所先容而汲引者惟恐人知至其邁往之氣有時勃發必奮為義常熟趙檢討用賢抗疏忤時相張居正杖闕下人多避聲迹履豐獨左右之同郡洪司冦朝選為勞堪陷斃獄中適履豐還朝北上屬所善為經紀禭賵乃去才具敏贍每有撰屬當食篝燈率爾成文不勞草創而雋氣颷舉博達宏濶川湧嶽停世人推服之弟履朋亦有雋聲舊郡志集序何鏡山撰文閩中理學淵源考卷七十二
