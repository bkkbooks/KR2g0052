body:
  text: 閩中理學淵源考卷六十五廣平府知府李清馥撰訓導諸葛文敏先生駿學派按泉南成化以後師席踵起其潛身草澤者豈碌碌隨世以就講肄之業哉考文敏先生論文必傅經義以理勝其立教也以德行為本舉業為用如此則豈有昔人荒功奪志之患耶師道之立人才之樹宜已訓導諸葛文敏先生駿諸葛駿字文敏晉江人究心經史為文傅經義以理勝泉士宗之陳琛李源詹源顧珀諸公皆出其門以鄉薦授永嘉訓導教人以德行為體舉業為用朝夕程課鑄冶不懈永嘉學祠之名宦駿居家孝友周窮恤匱冠婚喪祭一依古禮所著有易經集説家訓彚編閩書侍郎顧新山先生珀顧珀字載祥晉江人少而忠信好義𢎞治十二年進士除知虹縣丁父憂服除正德元年補旌德令擢守和州嵗大飢不俟申詳發倉庫賑恤時巡按奉檄督逋甚亟珀計民貧無措召富商諭以大義悉代輸貨秋成還之商民兩無所纍坐忤劉瑾被逮廷杖四十瑾敗乃以治行旌擢南吏部考功郎丁母憂服闋除兵部武庫司當正德頺綱之日事多因循珀秉正執法凡兵器出納京衛勾解極意振刷宿蠧一清升湖廣布政參議行部至蘄有妖僧詐稱奉敕往名山挂幡所在恣橫密發其姦置之法寧藩反南昌珀扼黃梅為池皖援會武宗親征民爭逃竄榜諭安輯之事平乞休不允世宗入承大統以護送聖母勞賜銀幣復上疏乞休遂升湖廣按察副使豫致仕都御史秦金吳廷舉席書御史何鰲唐符馬紀前後薦聞而桂文襄公蕚為縣時為珀所知文襄當國欲大用之嘉靖五年起四川按察副使整飭威茂二州既至修理城堢墩臺召募武勇彈壓羌夷核厯年賞番虛糜嵗省萬金土酋入貢令釋刀易馬乃入遂為定規踰年升河南右參政以薦升江西左布政尋擢南京太僕寺卿升南京太常寺卿尋升南戶部右侍郎署篆疏上便宜十二事悉蒙嘉納施行在部五年清望一時推重屢行乞休乃許致仕年八十六卒撫按表聞賜祭葬贈都察院右都御史珀清坦簡諒恬淡寡欲厯官未嘗以家纍自隨室中絶媵侍之奉聲樂之娛比休官晚節益堅罔犯在得之戒平居燕處如齋端坐如塑遇二親諱素食悲悼老如一日教子姪以守法循義窮民有喪葬不能舉者竭力周恤居常絶意干謁至一方利病則不憚肫切上説下教力可為者即自任之其於息爭諭善常以懿言代鈇鉞和色當醴醪不義者忌珀之知而衣冠後進望以為楷陳琛稱珀厯仕中外如凝冰出壑素月懸秋張氏天敘序公教劄曰公之宦績收之志傳勒之碑板采之實録天下所共知也至於鄉行家範非其鄉人後學受教而知德者則未易知也遡公之貴幾五十年自少至耄氣靜神間筋強骨竦望之儼然如泰山喬嶽即之溫然如霽月光風少讀書泰嘉巖每朔望月考或值煙雨衣巾靴屐自山而下事竣即還山讀易每三百遍如是者十年其資深邃養發為文章措諸事業以當大任者夫豈偶然哉閩書文獻舊郡志清源少卿李竹坡先生源李源字士逹别號竹坡晉江人𢎞治十八年進士初仕戶部主事差監臨清倉儲倉故置中貴人一人董視之中貴人數治酒饌為好會源每會舉杯濡唇而已中貴人恚不得恣所欲則搆兵備趙副使侵撓倉事擾吏徒源疏以聞并劾中貴人罪狀事下戶部尚書孫九峯交歎為得職數稱源於曹中時逆瑾用事以源嘗劾中貴人記其名遣轉餉遼左故縮其期隂欲中以失期源晝夜行風雪中日二百里竣事以報瑾不能中也是時相楊文襄一清知源無繇一見心尤器之楊與孫並一時名臣將殊用源為逆瑾憾沮而源亦乞歸養矣其後言者屢薦于朝就家起南京文選司郎中久之遷尚寶司少卿竟不起源為文法左氏其所獨到斫破規矩亦自為方圓一時銘幽記逺之文非出源手皆以為不得所託學行為時師表尤不自標特謙沖下接好奬誘人材汲引後進如恐不及清約自將自幼學至壯以老無燕僻之朋好義逺利篤於天稟而修之以不倦先是卒業成均故相楊廷和在翰林以禮來聘為其子慎師曰吾求士於都下非先生莫可屬以此子源感其意終以濡迹貴門為不樂辭以疾自其未遇不近於榮利己如此家居前後薦者凡七章雖知源有詳略大指皆以為廉孝人也後宅燬於火貧不能建郡守王士俊捐資助之為立善俗坊於四逹之衢閩書行狀新郡志王遵巖撰參政洪新齋先生富學派按閩書先生受學蔡虛齋之門人吳氏銓林氏同苦心學易因以所得著為淺説與文莊蒙引並行于世泉中學士多尊師之蔡松莊其一也再青陽莊氏受其業者三人石山氏一俊壁崖氏思寬方塘氏用賔兹録方塘一人附焉參政洪新齋先生富洪富字國充晉江人嘉靖八年進士富寬凝簡重默守稱長者初授刑部郎人謂法律非其任乃執法求情侃然不徇阿有巡按劾某憲副憲副為時相私人時相托巡按一事欲抵以重法者富言於尚書如法而止相不能奪以次受提牢役冬月囚多凍死日製薑湯分給之囚羣號為彌陀佛出守雷州興學訓士築海捍潮有憲司牙卒以賭殺人富廉知悉置之法憲司以情請不聽憲司怒易他官治之富以獄成否為去留竟論卒抵罪升兩浙轉運使有巡鹽御史示以私意富不從或勸之富曰汙身以媚人吾不能也御史怒隂托其短無所得丁內艱服除補兩淮運使半載升四川參政蜀人樂其廉恕又呼為洪佛焉會張襄惠嶽以督師征蠻徵餉於雲貴湖川川撫李香有違議富與之爭嶽又欲調土兵萬人應役香欲以先年調征之兵應之富曰年遷人易奈何以紙上虛名應軍前實用乎屢與巡撫違忤遂乞歸歸十餘年卒年七十餘富為諸生時受學蔡文莊之門人若吳銓林同二公苦心易學因以所得著為淺説與文莊蒙引並行於世而泉中學士多尊事之既登鄉薦讀書國子時嚴相嵩方為祭酒知其深於易延為其子世蕃師及嵩為相絶不與通時論重之孫澄源從子猷别見閩書通志新郡志縣令張南溪先生文應學派按先生師事林誠齋治春秋義據通深治三傳者多師之今考門人只浯溪徐氏一人餘待考再先生子天衢天敘學行為一時推重曽切磋于王一臞朱荒山二先生今附家學焉縣令張南溪先生文應張文應字廷鳳晉江人師事林誠齋數輩治春秋學義據通深讀三傳者多師之門人如浯溪輩錚錚有聲正德二年舉鄉試第二人乞瑞安教諭鄰邑諸生聞其文質競爽皆來就學遷樂平知縣縣當姚源冦甫定之後民疲兵燹文應撫摩綏輯以寬徭息衆為務宸濠稱亂執戈從勤王師王文成奏功之日奬賞有加去官士民書石紀政去之七年百姓復裹糧赴闕乞留子天衢天敘長史徐浯溪先生榮徐榮字仁卿晉江人幼篤孝登嘉靖十一年進士授嘉善令丁內艱服闋補東明遷南户部主事故為夏文愍所知及分宜為相遂左遷趙府長史卒為人恢宏肅給磊落開敏以春秋起家三山王應鐘郡中王慎中皆事焉子用賔孫縉芳閩書司訓張月洲先生天衢弟天敘張天衢號月洲晉江人文應子仕訓導以學行見重於時弟天敘嘉靖十年鄉薦官至遂溪縣政尚廉平以好學稱其祭王氏一臞文曰敘偕兄衢亦惟匪肖濫分半席於退省披拂數月之春風先生髙揭德行道藝之條發明大易學庸之旨凌晨而集肅爾傾聽薄暮而退充然容與云清源文獻新郡志藝文閩書閩中理學淵源考卷六十五
