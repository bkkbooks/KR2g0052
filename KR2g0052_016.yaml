body:
  text: 閩中理學淵源考卷十六廣平府知府李清馥撰文公朱晦菴先生學派按周程張朱五子從祀定於宋理宗淳祐元年自此之後國無異論士無異習宋史言後世有以理學復古帝王之治者考論匡直輔翼之功實自理宗始自元迄明宗仰專師風同道一迨我朝推崇特厚至表章朱子典禮尤超越前代康熈五十二年御纂朱子全書告竣刋布天下先公承脩編校上表文有曰發凡起例無非稟聖心之裁成提要刋繁逐一經御筆之親定沍寒蒸暑未嘗輟誦於萬幾之餘夜漏晨壺不聞停披於寸晷之暫是用規模畫一條理分明自小學大學以開端漸及四書六藝合道徳性命而一貫極於聖統王功又曰頒諸宇内使儒林有入聖之階梯布在學宫凡來者得窮經之指要嗚呼聖祖崇重紫陽之學至矣世宗憲皇帝及我皇上又頒發各省家絃户誦百餘年來儒術統一道教脩明實列聖尊經崇儒之效培萬年有道之長端有在矣因敘述學派而敬書之至朱子之學内聖外王之要全體大用之詳前賢述之備矣謹録之評論中可攷焉文公朱晦菴先生熹朱文公諱熹字元晦後更仲晦父韋齋公因仕入閩尉尤溪以建炎四年庚戌九月十五日午時生先生於溪南鄭氏館舍後寓崇安又徙建陽之考亭而家焉先生幼穎悟莊重甫能言韋齋公指天示之曰天也問曰天之上何物韋齋公異之八歳示以孝經一閲題其上曰不若是非人也嘗從羣兒戲沙上獨端坐以指畫沙作八卦十一歳受學於家庭時韋齋公為吏部郎以不附和議請祠在家十三年韋齋公病革以後事囑忠定劉公子羽謂先生曰籍溪胡原仲白水劉致中屏山劉彦沖三人吾友也學有淵源汝往父事之後忠定為築室於其里奉母祝夫人以居白水妻以女籍溪屛山撫教如子姪既冠屏山為祝辭命字曰元晦紹興十七年年十八貢於鄉十八年舉進士第二十一年銓授泉州府同安縣主簿二十三年夏始受學延平李先生之門秋七月赴同安任蒞事勤敏職兼學事整飭風教選邑之秀民充弟子員厲以誠敬開以義理逺近人士皆竦而尊師之舉柯翰徐應中王賔為學中表率二十六年秋七月秩滿冬奉檄留安溪按事集中有安溪書事詩二十七年遷同安候代不至許升之徐元聘等從學二十八年見李先生於延平論忠恕一貫之㫖以養親請祠差監潭州南嶽廟二十九年詔赴行在以執政陳俊卿薦會言路有託抑奔競以沮之者遂以疾辭是歳蔡季通師事先生劉應李撰蔡氏言行録云季通見先生於崇安遂師事焉三十二年六月孝宗即位詔求直言八月先生應詔上封事首言帝王之學不可不熟講夫記誦辭藻非所以探淵源而出治道虛無寂滅非所以貫本末而立大中必先格物致知使義理所存纖悉畢照則自然意誠心正而可以應天下之務矣次言今日之計所不時定者由講和之説疑之也請罷和議為修復之計再次言四海利病係斯民之休戚斯民之休戚係守令之賢否監司者守令之綱朝廷者監司之本欲斯民之得所本原之地亦在朝廷而已是冬與程允夫書畧曰近見延平李先生始畧窺門户大概此事以涵養本源為先講論經㫖特以輔此而已向來泛濫出入無所適從名為學問而實何有如今不須雜博却不濟事無收拾也若果如此有味則世間一種無要𦂳文字自無功夫看得矣隆興初元三月再召辭不許十月入對垂拱殿先是將趨召命問所宜言於延平遂首用其説所奏凡三劄所陳不出封事之意而加剴切焉首言大學之道平治之效次言君父之讐不共戴天三言古聖王制馭之道其本不在强威而在徳業其任不在邊疆而在朝廷其具不在兵食而在紀綱時宰臣湯思退力主和議不悦其言除武學博士拜命遂歸十月延平先生卒乾道元年趣就職既至而洪适為相復主和議不合請監南嶽廟以歸六月讀魏元履戊午讜議為之流淚因序之時汪玉山知福州未幾升敷文閣待制舉先生自代二年林擇之用中從學答何叔京鎬書畧曰李先生教人大抵令於靜中體認大本未發時氣象分明即處事應物自然中節此乃龜山門下相傳指訣然當時親炙之時貪聽講論又方竊好章句訓詁之習不得盡心於此三年八月訪張敬夫於長沙論中庸未發之㫖道經邵武謁端明黄通老請納再拜之禮而見之十二月除樞密院編修用執政陳俊卿劉珙薦四年崇安饑貸粟於府賑之上王龜齡書時王公自䕫郡移湖州書末言欲待公歸方敢前進時汪玉山陳正獻梁文靖龔參政及王公皆與先生志同道合故先生書末寓濟時行道之志特惓惓焉五年三促就職會魏掞之以布衣召為國子録因論曾覿而去遂力辭先生常兩進絶和議抑佞幸之戒言既不行雖擢用不敢茍就出處之義凜然不可易是歳與蔡季通辨中和説又與張南軒林擇之并湖南諸公書皆論中和之㫖互相往復九月丁母祝孺人憂六年正月葬祝孺人七月遷吏部公墓冬胡銓薦復召以未終喪辭八年既免喪復召以禄不及養辭八月作中和舊說序畧曰余蚤從延平先生學求喜怒哀樂未發之㫖未達而先生沒聞張欽夫得衡山胡氏學則往從而問焉欽夫告子以所聞退而沈思一日喟然嘆曰人自嬰兒以至老死雖語黙動靜之不同然其大體莫非已發特其未發者為未嘗發耳自此不復有疑乾道己丑之春為友人蔡季通言之問辨之餘子忽自疑復取程氏書虛心平氣而徐讀之未及數行凍解氷釋然後知情性之本然聖賢之微㫖其平正明白乃如此而前日讀之不詳妄生穿穴適足以自誤而已暇日料檢故書得當時往還書稿一編輒序其所以而題之曰中和舊説獨恨不得奉而質諸李氏之門然以先生之所已言者推之知其所未言者其或不遠矣九年梁克家為相奏先生屢辭不出宜蒙褒録有㫖言朱某安貧守道亷退可嘉特改秩宫觀先生以求退得進於義未安辭淳熈二年四月吕東萊訪先生於寒泉精舍編次近思録及歸先生送至信州鵝湖寺與陸子夀子靜共講所聞議論不合而罷七月作晦菴於廬峰之雲谷自為記三年春黄直卿幹因劉子澄拜文公於屏山受業焉六月龔茂良行丞相事薦先生除秘書郎先生力辭會有言虛名之士不可用者故再辭益力即從其請改主武夷山沖祐觀與吕東萊書言道間與季通講論因悟向來涵養工夫全少而講説又多强探必取尋流逐末之弊恍然自失似有頓進之功然非如近日諸賢所謂頓悟之機云十一月令人劉氏卒五年史浩相除知南康軍事辭者四始受命先生自同安歸奉祠於家幾二十年間關貧困不以累心六年三月始受命至南康首下教三條興利除害尤以厚彞常美教化為首務訪白鹿洞書院遺址奏復其舊約聖賢教學大端為學規每休沐輒詣學與諸生質疑問難風教大行七年二月張南軒訃至罷宴為位哭之四月應詔上封事畧曰天下之務莫大於恤民而恤民之本在人君正心術以立紀綱今宰相臺省師𫝊賔友諫諍之臣皆失其職而陛下所與親密謀議者不過一二近習之臣使陛下不信先王之大道而悦於功利之卑説不樂莊士之讜言而安於私􅉏之鄙態交通貨賂所盜者皆陛下之財命卿置將所竊者皆陛下之柄莫大之禍必至之憂近在旦夕而陛下獨未之知疏入上讀之大怒命先生分析宰相趙雄救解乃已先是大旱以人户逃移自劾不報至是措置備荒之政多所全活八年二月陸子靜來訪先生率僚友諸生與俱至白鹿洞書院請登講席尋以講義刻石七月以修舉荒政民無流殍除直秘閣凡三辭吕東萊訃至為位哭之會浙東大饑改除提舉浙東常平茶鹽事遂拜命不敢辭即日單車就道且乞奏事之任十一月入對延和殿極陳災異之由與夫修徳任人之説凡七事上深納之方拜命即移檄旁郡募米商蠲其征及至客舟之米已輻輳按行境内鈎訪民𨼆拊問存恤郡縣官吏憚其風采所部肅然大抵措畫悉如南康時而用心尤苦九年上謂宰相王淮曰朱某政事却有可觀夏詔捕蝗復奏疏言事畧曰為今之計獨有斷自聖心沛然發號責躬求言然後君臣相戒痛自省改詔宰臣沙汰被災路分州軍監司守臣之無狀者遴選賢能責以荒政庶幾猶足下結人心消其乘時作亂之意不然臣恐所憂者不止於饑殍而將在於盜賊䝉其害者不止於官吏而上及於國家也得㫖頒行社倉法於諸郡復奏諸州利病首言紹興和買之弊欲乞痛減歳額然後用貫頭均紐仍用高下等第均敷而免下户出錢使得相乗除以優之次言台州丁絹錢有抑納倍輸之患奏乞每丁納半錢半絹次言諸郡義役之法請令民均出義田罷去役首免排役次官差保正副長輸收義田仍令上户兼充户長次言本路沿海四州産鹽法乞倣福建下四州産鹽法行之次言諸郡酒坊亦乞改照處州萬户酒法移文永嘉毁秦檜祠行部至台前知台州唐仲友為其民所訟先生按得其實劾之仲友與宰相王淮同里為婣婭已除江西提刑未行而先生論之淮匿其奏不以聞先生疏十上愈力淮不得已奪仲友新命以授先生先生謂是蹊田而奪之牛辭不拜淮因銜之御史陳賈鄭丙希淮意上疏毁程氏學以隂沮先生遂奉祠十年差主台州崇道觀先生守南康使浙東始得行其所學已試之效卓然而卒不果用及是知道難行退而奉祠杜門不出學者尊信益衆是歳年五十四四月武夷精舍成是冬重到温陵與陳休齋黄維之傅伯成兄弟游山倡詠先生還自浙東見其士習馳騖於外每語學者且觀孟子道性善及求放心兩章務收斂凝定以致克己求仁之功而深斥其所學之誤以為舍六經語孟而尊史遷舍窮理盡性而談世變舍治心修身而喜事功大為學者心術之害極力為吕祖儉潘景愈孫應時輩言之由是奉祠五年時周必大為相上諭之曰朱某久閒可與監司除提㸃江西刑獄公事先生以疾辭不許十五年正月且趣入對遂拜命會淮罷相力疾入奏首言州縣近年刑獄失當有涉綱常風化之重者有司亦從流宥輕之失宜卒乃拳拳以謹察天理人欲為説有要之於路以正心誠意上所厭聞戒以勿言者先生曰吾平生所學只有此四字豈可𨼆黙以欺君乎及奏上未嘗不稱善曰久不見卿浙東之事朕自知之今當處卿清要不復以州縣為煩也除兵部郎官以足疾丐祠兵部侍郎林栗嘗與先生論易西銘不合遂劾先生欺慢會太常博士葉適侍御史胡晉臣先後劾栗狠愎自用欺罔無實乃貶栗知泉州而先生亦除寶文閣奉祠嵩山崇福宫時廟堂知上眷厚憚先生復入故為兩罷之䇿上悟復召先生受職先生以為遷官進職皆許其閒退方竊難進易退之褒復為彈冠結綬之計則其為世觀笑不但往來屑屑之譏也又促召再辭遂併具封事投匭以進凡數千言大要言天下大本在陛下一心而其急務則輔翼太子選任大臣振舉綱維變化風俗愛養民力修明軍政六者是已疏入夜漏下七刻上已就寢亟起秉燭讀之終篇明日除主管太乙宫兼崇政殿説書辭改秘閣修撰又辭先生當孝宗朝陛對者三上封事者三其初固以講學窮理為出治之大原其後則直指天理人欲之分精一克復之義其初固以當世急務一二為言其後封事之上則心術宫禁時政風俗披肝瀝膽極其忠鯁蓋所望於君父愈深而其言愈切故於封事之末有曰臣之得事陛下於今二十七年而其間得見陛下者數不過三自其始見於隆興之初固嘗輒以近習為言矣辛丑再見又嘗論之今歳三見而其所言又不過此自頃年以來日月逾邁如川之流一往而不可復不惟臣之蒼顔白髪已迫遲暮而竊仰天顔亦覺非昔時矣忠誠懇惻至今讀者猶為之涕下先生進疏雖切孝宗亦開懷容納先生之盡忠孝宗之受盡言亦未為不遇也然先生痛詆大臣近習而孝宗之眷愈厚嫉者愈深是以不能一日安其身於朝廷之上而孝宗内禪矣是年始出太極通書西銘解以授學者與陸氏兄弟辨無極太極亦在斯時十六年二月光宗即位再辭職名許之降詔奬諭改江東運副十一月改知漳州再辭不允以光宗初政遂不敢辭始拜命紹熈元年之漳州任以節民力易風俗為首務先奏除屬縣無名之賦七百萬減經總制錢四百萬以俗未知禮揭示古喪葬嫁娶之儀并命父老解說以教子弟訪察俗尚男女聚佛廬為傳經會及女不嫁而私創為菴舎以處者嚴禁之俗為一變時詣學訓迪諸生薦知學録趙師虙又牒延郡士黄樵仲施允夀石洪慶李唐資等數人入學表率陳北溪淳亦與焉淳於時初從學於先生也又奏乞褒旌忠節高氏登續刻五經四書於郡適朝議欲行漳泉汀三州經界先生乃訪事宜擇人物及丈量諸法上之後不果行明年以子喪請祠時史浩入見請收天下人望乃除秘閣修撰主管南京鴻慶宫先生再辭詔論撰之職以寵名儒乃拜命四月去郡頃之除荆湖南路轉運副使四辭二年春與永嘉陳君舉論學是年南康李敬子燔受業三年復請補祠職始築室於建陽之考亭從韋齋公日記所擇也永康陳同甫來訪先生往歳曾與書往復箴其義利雙行王霸並用嘗曰海内學術之弊不過兩端江西頓悟永康事功若不極力明辨此道無由得明是冬除知靜江府辭四年乃差知潭州荆湖南路安撫辭不許是冬使者至金還金人問南朝朱先生安在答以見擢用歸白廟堂遂有是除會長沙有峒獠之擾即拜命五年五月至鎮至則諭以禍福皆降之乃申飭屬郡令嚴武備戢奸豪興學校湖湘士子素知向學為之崇奬教厲改建嶽麓書院多訓以切已務實工夫六月孝宗升遐先生慟不自勝又聞上不任執喪中外洶洶益憂懼乞歸田里未幾趙汝愚以太皇太后詔尊上為太上皇而奉嘉王即位主喪是為寧宗於是汝愚為相首薦先生有㫖召赴行在初上在潛邸聞先生名每恨不得先生為講官至是首召奏事八月除煥章閣待制侍講先生行且辭於道聞南内朝禮尚闕近習已有用事者遂因辭章微辭以諷諫疏再上不許十月朔乃乞帶原官奏事首言天運艱難國有大咎然有可諉者陛下前日未嘗有求位之心今日未嘗忘思親之懷而已夫充未嘗求位之心可以盡負罪引慝之誠充未嘗忘親之懷可以致温凊定省之禮次言為學莫先於窮理窮理必在於讀書讀書之法莫貴於循序而致精致精之本又在於居敬而持志既對面辭職名不許翌日又辭待制乞改說書上報以手札乃拜命會有㫖集議孝宗山陵先生上議狀畧曰夀皇聖徳神功宜得吉土以奉衣冠之藏當廣求術士博訪名山不宜偏信臺史罔上誤國之言固執紹興坐南向北之説委之水泉砂礫之中殘破浮淺之地受詔進講大學先生每以所講編次成帙以進務積誠意以感悟上心上亦開懷容納時太上意未釋然上未即還大内將葺東宫居之先生於講筵留身奏四事畧曰願陛下首罷修葺東宫之役而以其工料回就慈福重華之間草創寢殿一二十間使粗可居若夫過宫之計則臣又願陛下下詔自責減省輿衛入宫之後暫變服色如唐肅宗之改服紫袍執控馬前者以伸負罪引慝之誠至若朝廷之紀綱則臣又願陛下深詔左右勿預朝政而凡號令之弛張人才之進退則委之二三大臣使之反復較量勿循已見若夫山陵之卜則願黜臺史之說别求草澤以營新宫使夀皇之遺體得安於内而宗社生靈皆䝉福於外矣以諫不報他日講至盤銘日新因編述成湯有盤銘武王有丹書皆人主憂勤警戒之意奏勸上於日用之間以求放心為本而於玩經史親儒學益用力焉數召大臣切劘治道俾陳今日要務略如仁祖開天章閣故事又講奏禮律乞遵行孝宗通喪之禮謂夀皇至性自天易月之外朝衣朝冠皆以大布超越千古宜著方冊為世法程又上廟祧議時孝宗將祔廟詔集議宗廟迭毁之次初太祖尊僖順翼宣四祖之廟寔奉僖祖為始祖治平間議者以僖祖無功徳世數寖逺遷於夾室未數年王安石復之是時趙汝愚雅不以熈寧中復祖僖祖為然復議祧之而奉太祖為始祖先生入議以僖祖乃始祖不宜祧復奏疏論之謂今日基本啟自僖祖狀上宰相持不以聞上頗聞先生有狀召問内殿先生具劄及圖以進上再三稱善命即榻前撰内批直罷其事時先生方懲内批之弊因乞再令集議上然之先生退即以上意諭廟堂則聞已毁四祖廟而徑創别廟以奉四祖先生再與汝愚書妄議毁撤之罪丞相寔任其責也始寧宗之立丞相趙汝愚密與知閤門事韓侂胄謀之侂冑于太皇太后為親屬因得通中外之言自謂有定策功居中用事汝愚既相方收召四方知名之士中外引領望治先生獨惕然以侂胄為慮既屢言於上又約吏部侍郎彭龜年請共論之龜年出䕶使客侂胄益得志先生又數以手書密白汝愚宜酬以厚賞勿使預政汝愚不以為意先生乃因講筵畢奏疏極言之甫退即降内批云憫卿耆艾恐難立講除卿宫觀汝愚袖御筆還上且拜且諫内侍王徳謙徑以御筆付先生先生遂行臺諫爭留不可樓鑰陳傅良旋封還籙黄劉光祖鄧驛封章交上皆不報乃除寶文閣待制知江陵府先生辭且乞追還新舊職名詔仍煥章閣待制予祠及龜年出䕶客回而先生已去國矣龜年即上疏攻侂胄云止縁陛下近日逐朱某太暴故亦欲陛下亟去此小人既而侂胄聲勢益張羣憸附和並疑及丞相視正士如深仇衣冠之禍蓋始此云是冬竹林精舍成先生率諸生行釋菜禮於先賢復更名曰滄洲精舍慶元元年先生又乞追還舊職不許是年作學校貢舉私議又草奏欲乞修三禮劄子畧曰周官一書固為禮之綱領至其議法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義説耳自王安石廢罷儀禮而獨存禮記之科棄經任傳其失已甚頃在山林嘗與一二學者考訂其説欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆附於本經之下具列注疏諸儒之說畧有端緒而私家無書檢閲無人望聖明特詔有司許臣就秘書省假借禮樂諸書自行招致舊日學徒數十人令其編類可以興起廢墜異時為聖朝制作之助會去國不及上初韓侂胄即欲併逐趙丞相而難其辭及是誣以不軌謫永州而朝廷大權悉歸侂胄矣先生自念身雖閑退尚帶侍從職名不敢自黙乃草疏萬言極論姦邪蔽主因以明汝愚之寃詞㫖痛切諸生交諫不從蔡元定請以筮決之遇遯之同人先生黙然退取諫稿焚之自號遯翁因六辭職名詔仍秘閣修撰是時侂胄勢益張鄙夫憸人迎合其意以學為偽劉徳秀仕長沙不為張敬夫之徒所禮及為諫官首論留正引偽學之罪偽學之稱自此始科舉取士稍涉經訓者悉見排黜文章議論根於理義者並行除毁六經語孟為世大禁繩趨尺步稍以儒名者無所容其身於是從游之士特立不顧者屛伏邱壑依阿巽懦者更名他師甚者變易衣冠狎游市肆以自别其非黨臺諫爭承風㫖排詆萬端而胡紘遂與沈繼祖輩共誣先生十罪詔落職罷祠門人蔡元定亦送道州編管省劄至先生方與諸生講論有以小報書來者先生略起視之復坐講論如初或勸先生謝絶生徒者笑而不答五年以年屆懸車致仕始以野服接賔客六年三月寢疾猶日為諸生講太極西銘及為學之要辛酉訂大學誠意章句癸亥諸生入問疾先生曰誤諸君遠來然道理亦只是如此但相率下堅苦功夫牢固著足方有進步處諸生退乃作三書與子在及門人黄幹范念徳拳拳勉學及修正遺書為言甲子移寢中堂諸生因請曰夫子之疾革矣萬一不諱當用書儀乎不允用儀禮乎亦不允然則參用之乎乃頷之遂正坐整衣冠而逝是日大風拔木洪流崩岸時年七十一十一月壬申葬於建陽縣唐石里之大林谷嘉泰初學禁稍弛侂胄伏誅詔賜先生遺表恩澤諡曰文尋贈中大夫特贈寶謨閣直學士理宗朝贈太師封信國公改徽國公先生平居惓惓無一念不在於國聞時政之缺失則戚然有不豫之色語及國勢之未振則感慨以至泣下然謹難進之禮則一官之拜必抗章而力辭厲易退之節則一語不合必奉身而亟去其事君也不貶道以求售其愛民也不徇俗以茍安故其與世動輒齟齬自筮仕至屬纊五十年間歴事四朝仕於外者僅九考立於朝者四十日道之難行也如此然紹道統立人極為萬世宗師則不以用舎為加損也初韋齋公得中原文獻之傳聞河洛之學推明聖賢遺意日誦大學中庸以用力於致知誠意之地先生蚤歳已知其説而心好之及韋齋公托孤於三先生屏山白水籍溪已見上先生奉而禀學焉時年十有四慨然有求道之志博求之經傳徧交當世有識之士雖釋老之書亦必究其歸趣訂其是非其後二劉下世籍溪尚在先生自見於此道未有所得乃見延平蓋延平李氏學於豫章羅氏羅氏學於龜山楊氏延平於韋齋為同門友先生歸自同安不逺數百里再見李先生往復問學秩滿丐祠奉母兩被召不赴嘗云自見李先生後為學始就平實乃知向日從事釋老之說皆非其為學也窮理以致其知反躬以踐其實而以居敬為主謂致知不以敬則昏惑紛擾無以察義理之歸躬行不以敬則怠惰放肆無以致義理之實持敬之方莫先主一既為之箴以自警又筆之書以為小學大學皆本於此終日儼然端坐一室討論典訓未嘗少輟周程張邵之書所以繼孔孟道統之傳歴時未久㣲言大義鬱而不彰先生為之裒集發明而後得以盛行於世太極先天二圖精微廣博不可涯涘為之解剥條畫而後天地本原聖賢蘊奥不至於泯沒從游之士迭誦所習以質其疑意有未喻則委曲告之而未嘗倦問有未切則反覆戒之而未嘗𨼆務學篤則喜見於言進道難則憂形於色講論經典商畧古今率至夜半雖疾病支離至諸生問辨則脫然沈疴之去體一日不講學則惕然常以為憂摳衣而來遠自川蜀文詞之傳流及海外至於絶域亦知慕其道竊問其起居窮鄉晚出家藏其書私淑諸人者不可勝數所著有論語要義論語訓䝉口義隆興元年成程氏遺書乾道四年成家禮乾道六年成論孟精義初名要義又改精義最後改集義資治通鑑綱目宋名臣言行録乾道八年成西銘解義乾道八年成太極圖說通書解義程子外書乾道九年成近思録淳熈二年成易本義蓍卦考誤淳熈四年成詩集傳淳熈四年成論語孟子集註或問淳熈四年成易學啟蒙孝經刋誤淳熈十三年成小學書淳熈十四年成大學中庸章句又著或問及中庸輯略淳熈十六年序大學中庸二書定著已久時加改竄至是始序之楚辭集註辨證慶元元年成韓文考異慶元二年成皆行於世先生沒朝廷以其大學語孟訓說立於學宫又有儀禮經傳通解未脱稿亦在學宫平生為文凡一百卷生徒問答凡八十卷别録十卷按宋史立道學傳論曰道學盛於宋宋弗究於用甚至有厲禁焉後之時君世主欲復天徳王道之治必來取法矣門人黄氏幹曰道之正統待人而後傳自周以來任傳道之責者不過數人而能使斯道章章較著者一二人而止耳由孔子而後曾子子思繼其㣲至孟子而始著由孟子而後周程張子繼其絶至先生而始著識者以為知言子在紹定中為侍郎理宗寳慶三年贈太師追封信國公改徽國公淳祐元年正月上視學手詔以周張二程及先生從祀孔子廟廷四年詔改滄洲精舍為考亭書院理宗御書額扁賜之國朝康熈五十一年壬辰聖祖仁皇帝特㫖詔升入大成殿配享位列十哲之次備考果齋李氏曰先生之道之至原其所以臻斯閾者無他焉亦曰主敬以立其本窮理以致其知反躬以踐其實而敬者又貫通乎三者之間所以成始而成終也故其主敬也一其内以制乎外齊其外以養其内内則無二無適寂然不動以為酬酢萬變之主外則儼然肅然終日若對神明而有以保固其中心之所存及其久也靜虛動直中一外融而人不見其持守之力則篤敬之驗也其窮理也虛其心平其氣字求其訓句索其㫖未得乎前則不敢求乎後未通乎此則不敢志乎彼使之意定理明而無躁易凌躐之患心專慮一而無貪多欲速之蔽始以熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心必若先儒所謂沛然若河海之浸膏澤之潤煥然氷釋怡然理順而後為有得焉若乃立論以驅率聖言鑿説以妄求新意或援引以相糾紛若假借以相混惑麄心浮氣意象匆匆常若有所迫逐而未嘗徘徊顧戀如不忍去以待其浹洽貫通之功深以為學者之大病不痛絶乎此則終無入徳之期葢自孔孟以降千五百年之間讀書者衆矣未有窮理若此其精者也先生天資英邁視世之所屑者不啻如草芥翛然獨與道俱卓然獨與道立固已迥出庶物之表及夫理明義精養深積盛充而為徳行發而為事業人之視之但見其渾灝磅礴不可涯涘而莫知為之者又曰先生以訂正羣書立為凖則使學者先讀大學以立其規模次及語孟以盡其藴奥而後會其歸於中庸尺度權衡之既定由是以窮諸經訂羣史以及百氏之書則將無理之不可精無事之不可處矣又嘗集小學使學者得以先正其操履集近思録使學者得以先識其門庭羽翼四子以相左右盖此六書者學者之飲食裘葛凖繩規矩不可須臾離也若夫析世學之謬辨異教之非擣其巢穴砭其𨼆微使學者由於大中至正之則而不躓於荆棘擭阱之途摧陷肅清之功固非近世諸儒所能髣髴其萬一也自周衰教失禮樂養徳之具一切盡廢所以維持此心者惟有書耳謂可躪躒經傳遽指為糟粕而不觀乎要在以心體之以身踐之而勿以空言視之而已矣以是存心以是克己仁豈逺乎哉至於晚歳徳尊言立猶以義理無窮歳月有限慊然有不足之意洙泗以還博文約禮兩極其至者先生一人而已先生教人規模廣大而科級甚嚴循循有序不容躐等凌節而進至於切已務實辨别義利毋自欺謹其獨之戒未嘗不丁寧懇到提耳而極言之晚見諸生繳繞於文義之間深慮斯道之無傳始頗指示本體使深思而自得之其望於學者益切矣合濓溪之正傳紹魯鄒之墜緒前聖後賢之道該徧全備其亦可謂盛矣夫子之經得先生而正夫子之道得先生而明起斯文於將墜覺來裔於無窮雖與天壤俱敝可也鶴山魏氏曰天生斯民必有出乎其類者為之君師以任先覺之責然而非一人所能自為也必並生錯出交修互發然後道章而化成是故有堯舜則有禹臯陶有湯文則有伊尹萊朱太公望散宜生各當其世觀其會通以盡其所當為之分然後天衷以位人極以立萬世之標凖以定雖氣數詘信之不齊而天之愛人閱千古如一日也自比閭接授之法壞飲射讀法之禮無所於行君師之材移於孔子則又有冉閔顔曾羣弟子左右羽翼之微言大義天開日揭萬物咸覩自孔子沒則諸子已有不能盡得其傳者於是子思孟子又為闡幽明微著嫌辨似而後孔氏之道歴萬古而無弊嗚呼是不曰天之所命而誰為之秦漢以來諸儒生於籍去書焚師異指殊之後不惟孔道晦蝕孟氏之説亦鮮知之千數百年間何可謂無人則往往孤立寡儔唱焉莫之和也絶焉莫之續也乃至國朝之盛南自湖湘北至河洛西極關輔地之相去何啻千餘里而大儒輩出聲應氣求若合符節曰極曰誠曰仁曰道曰忠曰恕曰性命曰氣質曰天理人欲曰隂陽鬼神若此等類凡皆聖門講學之樞要而千數百年習浮踵陋莫知其說者至是脱然如沈痾之開大寐之醒至於吕謝游楊尹張侯胡諸儒切磋究之分别白之亦幾無餘藴矣然而絶之久而復之難傳者寡而咻者衆也朱文公先生始以彊志博見凌高厲空自受學延平李先生退然如將弗勝於是斂華就實反博歸約迨其蓄久而思渾資深而行熟則貫精粗合内外羣獻之精藴百家之異指毫分縷析如示諸掌張宣公吕成公同心協力以閑先聖之道而僅及中身論述靡竟惟先生巍然獨存中更學禁自信益篤葢自易詩中庸大學論語孟子悉為之推明演繹以至三禮孝經下迨屈韓之文周程張邵之書司馬氏之史先正之言行亦各為之論著然後帝王經世之規聖賢新民之學燦然中興學者習其讀推其義則知三才之本道器一致幽探乎無極太極之妙而實不離乎匹夫匹婦之所知大至於位天地育萬物而實不外乎暗室屋漏之無愧蓋至近而逺至顯而微非若棄倫絶學者之慕乎高而譁然取寵者之安於卑也猗其盛歟嗚呼帝王不作而洙泗之教興微孟子吾不知大道之與異端果孰為勝負也聖賢既熄而關洛之學興微朱子亦未知聖傳之與俗學果孰為顯晦也韓子謂孟子之功不在禹下予謂朱子之功不在孟子下黄氏日抄曰六經之文皆道秦漢以後之文鮮復關於道甚者害道韓文公始復古文而猶未必盡純於道我朝諸儒始明古道而又未嘗盡廢於文至晦菴先生表章四書開示後學復作易本義作詩傳面授作書傳分授作禮經疏義且謂春秋本魯史舊文於是明聖人正大本心以破後世穿鑿凡例謂周禮周公未必盡行於是教學者非所宜先於身事一句無預提絜綱維疏别緩急無一不使復還古初六經之道賴之而昭昭乎如揭中天之日月其為文也孰大於是宜不必復以文集為矣然其天才卓絶學力宏肆落筆成章殆於天造其剖析性理之精微則日精月明其窮詰邪説之𨼆遁則神搜霆擊其感慨忠義發明離騷則苦雨凄風之變態其泛應人事遊戲翰墨則行雲流水之自然究而言之皆此道之流行猶化工之妙造也程夫子有言觀萬物而後盡化工之妙愚故一一伏讀之而抄記如右又曰孔子元氣也孟子泰山巖巖氣象也故孟子於議論排闢之間亦有隨時而異者而晦菴先生似之如荆公誤國東坡忠讜先生平日蓋所屢言及汪玉山主張蘇學太過先生則又寧以荆公為賢故讀先生之書者其别有三如語類則門人之所記也如書翰則一時之所發也如論著則平生之所審定也語類之所記或遺其本㫖則有書翰之詳説在書翰之所説或異於平日則有著述之定説在然議論固至著述而定若其欲復肉刑恐亦不可不審蓋天下之義理無窮先生未嘗自足學者所當㕘考而謹思咸淳八年五月十一日後學黄震再書於臨川郡齋又曰愚苦多忘凡讀書必畧記所見至讀朱子語類則如仰觀造化之大莫知所措辭然嘗詳之夫子作六經後來者溺於詁訓未害也濓洛言道學後來者借以談禪則其害深矣此無他凡近者猶可進而至於高明一流於高空則恐無復可返之期誤人未央也乃今朱子解剥濓溪之圖象裒列二程之遺書以明道學之正傳者如此窮極釋氏之作用為性辨詰諸老之流入禪學以明其徒之似是而非者如彼使學道之源不差而夫子之道復明此其有功天下萬世教之施於用世者撥亂反正豈足喻勞烈之萬分一哉至若謂易本卜筮詩非美刺謂春秋初不以一字為褒貶皆曠世未聞之高論而實皆追復古始之正説乍見駭然熟輒心靡卓識雄辨萬古莫儔而世俗猶以一時異論之士對言之何耶嗚呼此固難與世俗言也又曰門人所記或主靜坐或以靜坐為非或主博覽或以博覽為雜均一朱子之言而相反類如此葢隨其人之病而藥之耳要之靜而可施之動博而必求其要此中持其衡之説觀者謹母執其一為據其間亦有門人記録之太過者又當㕘以朱子平日自著之言文公遺文與汪尚書諭及二程之於濓溪亦若横渠之於范文正耳先覺相傳之秘非後世所能窺測誦其詩讀其書則周范之造詣固殊程張之契悟亦異如曰仲尼顔子所樂吟風弄月以歸皆是當時口傳心授的當親切處後來二先生舉似後學亦不將作第二義看然則行狀所謂反求之六經而後得之者特語夫功夫之大全耳至其入處則自濓溪不可誣也若横渠之於文正則異於是葢當時粗發其端而已受學乃先生自言此豈自誣者耶答汪尚書程邵之學固不同然二先生所以推尊康節者至矣盖以其信道不惑不雜異端班於温公横渠之間則亦未可以其道不同而遽貶之也抑康節之學摘抉窈微與佛老之言豈無一二相似而卓然自信無所汚染此其所見必有端的處比之温公欲䕶名教而不言者又有間矣答鄭自明吾人所立已如此使天無意於右宋則已若有此意異日之事豈得而辭其責哉然則吾人今日之進徳修業乃是異時國家撥亂反正之所繫惟髙明深念之向來一畨前輩少日粗有時望晚年出來往往不滿人意正坐講學不精不見聖門廣大規模少有所立即自以為事業止此不求長進荆公所謂末俗易高險塗難盡者亦可念也人材衰少風俗頽壞之時士有一善即當扶接導誘以就其器業此亦吾輩將來切身利害葢士不素養臨事倉卒乃求非所以為國逺慮而能無失於委任之間也答張欽夫儒者之學大要以窮理為先然後心之所發輕重長短各有準則書謂天敘天秩天命天討孟子所謂物皆然心為甚若不於此先致其知泛然無所凖則則其所存所發亦何自而中於理乎且如釋氏之説非不見心非不識心而卒不可與入堯舜之道前輩有言聖人本天釋氏本心蓋謂此也來示又謂心無時不虛熹以為心之本體固然然而人欲己私汨沒久矣故聖人必曰正心而正心必先誠意誠意必先致知然後可以得心之正而復本體之虛非一日矣今曰無時不虛又曰既識此心則用無不利若儒者之言則必也精義入神而後用無不利可得而語矣孟子存亡出入之説欲學者操而存之似不為識心發也夫能操而存者顔子以上方可言此今又曰識則能守則僕亦恐其言之易也明道先生曰既能體之而樂則亦不患不能守矣須似此言方絶滲漏無病敗髙明之意大抵於施為運用求之而優游涵泳之功未甚留意是以求之太迫而得之若驚資之不深而發之太露易謂寛以居之正不如此不知髙明以為何如答張欽夫某窮居如昨無足言者但逺去師友之益兀兀度日讀書反已固不無警省處終是旁無彊輔因循汨沒尋復失之近日一種向外走作心悦之而不能自止者皆凖止酒戒而絶之此前輩所謂下士晚聞道聊以拙自修者若充擴不已補復前非庶其有日舊讀中庸慎獨大學誠意毋自欺處常若求之太過近日乃覺其非此正是切近分明處乃舍而談空於冥漠之間其亦誤矣方竊以此意痛自檢勒凜然度日惟恐有怠而失之也至於文字之間亦覺向來病痛不少葢平日解經最為守章句者然亦多是推衍自作一片文字非惟意味淡薄且使觀者將註與經作兩段功夫下梢支離本㫖全不相照方知漢儒可謂善説經者不過只説訓詁使人以此玩索經文訓詁經文不相離異一道看去直是意味深長也近又讀易見一意思聖人作易本為使人卜筮以決可否而因以教人為善如嚴君平所謂與子言依於孝與臣言依於忠故卦爻之辭只是因依象類虛設於此以待扣而決者使以所值之辭決所疑之事然必有是理而後有是辭理無不正故其丁寧告戒之辭皆依於正天下之動所以正夫一而不繆於所之也此説乍聞之必未以為然然且置之勿以示人也子夀兄弟氣象甚好其病却是盡廢講學而專務踐履却於踐履之中要人提撕省察悟得本心此為病之大者要其操持謹質表裏不二實有以過人者惜乎自信太過規模窄狹不復取人之善將流於異學而不自知耳答張欽夫論仁説謹按程子言仁本末甚備今撮其大要不過數言葢曰仁者生之性也而愛其情也孝弟其用也公者所以體仁猶言克己復禮為仁也學者於前三言可以識仁之義於後一言可以知用力之方矣今不深考其本末指意但見其分别性情之異便謂愛之與仁了無干涉見其以公為近仁便謂直指仁體最為深切殊不知仁乃性之徳而愛之本因其性之有仁是以其情能愛但或蔽於私則不能盡其體用之妙惟克己復禮廓然大公然後體用昭著血脈貫通爾由漢以來以愛言仁之弊正謂不察性情之辨而遂以情為性今矯其弊反使汎然無所歸宿而性情遂至於不相管其弊將使學者終日言仁而實未嘗識其名義且與天地之心性情之徳而昧焉程子之意必不如此答張欽夫來教謂言靜則溺於虛無此固所當深慮然此二字如佛氏之論誠有此患若以天理觀之則動之不能無靜猶靜之不能無動也靜之不能無養猶動之不可不察也至靜之中葢有動之端焉是乃所謂見天地之心而先王之所以至日閉關葢當此之時則安靜以養乎此爾固非遠事絶物而偏於靜之謂來教又謂熹言以靜為本不若遂言以敬為本此固然也然敬字工夫通貫動靜而必以靜為本故熹向來輒有是語今遂易為敬雖若完全然却不見敬之所施有先有後則亦未得為諦當也答吕伯恭持養斂藏之誨敢不服膺然有所不得已者世衰道微邪詖交作他紛紛者固所不論而賢如吾伯恭者亦尚安於習熟見聞之地見人之詭經誣聖肆為異説而不甚以為非則如熹者誠亦何心安於獨善而不為極言覈論以曉一世之昏昏也使世有任其責者熹亦何苦而譊譊若是耶設使顔子之時上無孔子則彼所以明道救世亦必有道決不退然安坐陋巷獨善其身而已惟孟子見此道理如楊子雲之徒葢未免以顔子為塊然自守者近世則又甚焉其論顔子幾於釋老之空寂矣觀伊川先生十八歳時上書論顔子武侯所以不同及上蔡論韶武異處可見聖賢心無私意畏天命循天理而已此義與近日内脩外攘之説亦相貫夫吾之所以自治者雖或未足豈可以是而遽廢其討賊之心哉答吕伯恭讀易之法竊疑卦爻之詞本為卜筮者斷吉凶而因以訓戒至彖象文言之作始因其吉凶訓戒之意而推説其義理以明之後人但見孔子所説義理而不復推本文王周公之意因鄙卜筮為不足言而所以言易者類皆牽合委曲偏主一事而言無復包含該貫曲暢旁通之妙若但如此則聖人當時自可别作一書明言義理以詔後世何用假托卦象為此艱深𨼆晦之辭乎故今欲凡讀一卦一爻便知占筮所得虛心以求其辭義之所指考其象求其理而推之於事使上自王公下至民庶所以脩身治國皆有可用私竊以為如此求之似得三聖之遺意答吕伯恭昨見奇卿敬扣之以比日講授次第聞只令諸生讀左氏及諸賢奏疏至於諸經論孟則恐學者徒務空言而不以告也不知是否若果如此則恐未安葢為學之序為已而後可以及人達理而後可以制事故程夫子教人先讀論孟次及諸經然後看史其序不可亂也若恐其徒務空言但當就論孟經書中教以躬行之意庶不相遠至於左氏奏疏之言則皆時事利害而非學者切身之急務也其為空言亦益甚矣而欲使之從事其間而得躬行之實不亦背馳之甚乎愚見如此不敢不獻所疑答陸子靜來書云云極是名此理之至極中是狀此理之不偏雖然同是此理然其名義各有攸當雖聖賢言之亦未嘗有所差互也若皇極之極民極之極乃為標凖之意猶曰立於此而示於彼使有所向望取正焉爾非以其中而命之也中者天下之大本乃以未發渾然無所偏倚而言太極固無偏倚而為萬化之本然其得名自為至極之極而兼有標準之義初不以中而得名也來書云云若以隂陽為形而上者則形而下者復是何物更請見教若熹愚見與其所聞則曰凡有形象皆器也其所以為是器之理則道也如是則來書所謂始終晦明奇偶之屬皆隂陽所為之器獨其所以為是之理乃為道耳如此分别似差明白不知尊意以為何如來書云云周子言中而以和字釋之又曰中節又曰達道彼非不識字者而其言顯與中庸相戾則必有説矣蓋此中字是就氣稟發用而言非直指本體無所偏倚者而言也豈可以此而訓極為中也哉來書引經必盡全章雖煩不厭而所引通書乃獨截自中焉止矣而下此安得為不誤來書云云無極而太極其意若曰非如皇極民極屋極之有方所形象而但有此理之至極耳若曉此意則於聖門有何違叛而不肯道乎上天之載是就有中説無無極太極是從無中説有若實見得即説有説無或先或後都無妨礙今必如此强生分别曾謂不尚空言專務事實而反如此乎來書云云太極固未嘗隠於人然人之識太極者少矣往往只是於禪學中認得昭昭靈靈能作用者謂是太極而不知所謂太極乃天地萬物本然之理亘古亘今者也今曰私其説以自神妙而又秘之又曰寄此以神其姦又曰繫絆多少好氣質學者則恐世間自有此人可當此語熹雖無狀自省得與此語不相似也子美尊兄質實重厚見理未盡自信太過遂不可回見雖有病意實無他老兄乃是先立一説務在突過有若子貢以上更不數近世周程諸公正使説之無病此意已非況不能無病乎夫子之學固非以多學得之然觀其好古敏求實未嘗不多學但其中自有一以貫之處耳顔曾獨得聖學之傳正為博文約禮足目俱到亦不但空疏杜撰而已子貢雖未得承道統然其所知不在今人之下周程之生時世雖後其道則有不約而合者反覆來書竊恐老兄於其所言多有未解未可遽以顔曾自處而輕之也顔子以能問於不能以多問於寡有若無實若虛犯而不校曾子三省其身惟恐謀之不忠交之不信傳之不習豈有一毫滿足强辨取勝之心乎來書之意所以見教甚至區區鄙見亦不敢不為老兄傾倒也不審尊意以為何如如曰未然則我日斯邁而月斯征各尊所聞各行所知亦可矣無復可望於必同也言及於此悚息之深千萬幸察答陳同甫天理人欲二字不必求之古來王霸之迹但反之於吾心義利邪正之間察之愈密則見之愈明持之愈嚴則發之愈勇孟子所謂浩然之氣者葢斂然於規矩凖繩之中而其自任以天下之重者雖賁育莫能奪也此豈才能血氣之所為哉漢髙帝唐太宗直以其能假仁借義以行其私而當時與之爭者才能知術既出其下又不知有仁義之可借是以彼善於此得成其功若以其能建立國家傳世久逺便謂其得天理之正此正以成敗論是非但取其獲禽之多而不羞其詭遇千五百年之間正坐如此其間雖或不無小康而堯舜三王周孔所傳之道未嘗一日得行於天地之間也若論道之常存又初非人所能預雖千五百年被人作壞終殄滅他不得耳漢唐所謂賢君又何嘗有一分氣力扶助耶老兄人物奇偉英特恐不但今日所未見向來得失短長正自不須更挂齒牙向人分説但鄙意更欲賢者百尺竿頭進取一步將來不作三代以下人物省得氣力為漢唐分疏即更脱灑磊落李孔霍張則吾豈敢然夷吾景畧之事亦不敢為同父願之也答陳同甫三才固未嘗有二道然天地無心而人有欲是以天地之運行無窮而在人者有時而不相似葢義理之心頃刻不存則人道息人道息則天地之用雖未嘗已而其在我者固即此而不行矣不可但見其穹然頽然便以為人道無時不立天地賴之以存之驗也盖道未嘗息而人自息之非道亡也幽厲不由也惟聖盡倫惟王盡制固非常人所及然立心之本當以盡者為法而不當以不盡者為凖故曰不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也況謂其非盡欺人以為倫非盡罔世以為制是雖以來書之辨固不謂其絶無欺罔之心矣欺人者人亦欺之罔人者人亦罔之此漢唐之治所以雖極其盛而人不心服終不能無媿於三代之盛時也今必欲撤去限隔無古無今則莫若深考堯舜相傳之意湯武反之之功以為凖的而求諸身却就漢祖唐宗心術微處痛加繩削取其合而察其所自來黜其悖而究其所從起庶幾天地之經古今之義有以得之不當坐譚既往之迹追飾已然之非指其偶同者為全體而謂其真不異於聖賢也葢後之觀者於根本功夫自有欠闕故不知其非而以為無害於理抑或以為雖害於理而不害其獲禽之多觀所謂學成人而不必於儒攪金銀銅鐵為一器而主於適用則亦見其立心之本在於功利有非辨説所能文者矣夫成人之道以儒者之學求之則夫子所謂成人也不以儒者之學求之吾恐其畔繩墨畧規矩進不得為君子退不得為小人正如攪金銀銅鐵為一器不惟壞却金銀而銅鐵亦不得盡其銅鐵之用也竊恐後生傳聞輕相習染使義利之别不明舜蹠之塗不分眩流俗之觀聽壞學者之心術此熹之所深憂而甚懼者故敢極言以求定論答林黄中邵氏先天之説以鄙見窺之如井蛙之議滄海而髙明直以不知而作斥之則小大之不同量有不可同年語者示喻邵氏本以發明易道而於易無所發明熹則以為易之與道非有異也道既明則易之為書卦爻象數皆在其中豈曰道明而書不白乎熹請以邵氏之淺近疎畧者言之蓋一圖之内生出次第位置行列不待安排而粲然有序比之并累三陽以為乾連疊三隂以為坤然後以意交錯而成六子旋相加而後得為六十四者其出於天理之自然與人為之造作蓋不同矣況其髙深閎闊精密微妙有非熹之所能言者今不之察而遽以不知而作詆之熹恐後之議今猶今之議昔是以竊為門下惜之答韓無咎誨諭儒釋之異在乎分合之間既聞命矣頃見蘇子由張子韶書皆以佛學有得於形而上者而不可以治世嘗竊笑之是豈知天命之性而敘秩命討已粲然無所不具於其中乎彼其所以分者亦未嘗真有得於斯耳不審髙明以為何如答陳體仁來教謂詩本為樂而作故今學者必以聲求之則知其不茍作矣此論善矣然愚意有不能無疑者葢以虞書考之則詩之作言志而已方其詩也未有歌也方其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也三代之時禮樂用於朝廷達於閭巷學者諷誦其言以求其志詠其聲執其器舞蹈其節以涵養其心則聲樂之所助於詩者為多然猶曰興於詩成於樂其求之固有序矣是以聖賢言詩主於聲者少而發其義者多仲尼所謂思無邪孟子所謂以意逆志得其志而不得其聲者有矣未有不得其志而能通其聲者也就使得之止其鐘鼓之鏗訇而已豈聖人樂云樂云之意哉況今千有餘年古樂散亡無復可考而欲以聲求詩則未知古樂遺聲今皆已推而得之乎三百五篇皆可協之音律被之絃歌已乎誠既得之則所助於詩多矣然未得為詩之本也況未必可得則今之所講得無有畫餅之饑乎愚意竊以為詩出乎志者也樂出乎詩者也然則志者詩之本樂者其末也末雖亡不害本之存顧所得之淺深如何耳有舜文之徳則聲為律而身為度簫韶二南之聲不患其不作此雖未易言然其理葢不誣也二南之應似亦不可專以樂聲之應為言蓋必有理存乎其間豈有無事之理無理之事哉答袁機仲以河圖洛書為不足信自歐公以來已有是説然顧命繫辭論語皆有是言而諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱横曲直皆有明法不可得而破除也至如河圖與易之天一至地十者合而載天地五十有五之數則固易之所自出也洛書與洪範初一至次九者合則固洪範之所自出也繫辭雖不言受圖作易然安知觀察求取圖非其中之一事耶至卦畫之説孔子而後千載不傳至康節先生始得之然猶不肯容易輕説非偶然也横圖乃是今日以意為之寫出奇偶相生次第令人易曉於此有得則知六十四卦天理自然不用一毫智力添助及至卦成之後逆順縱横都成義理千般萬種其妙無窮雖若各不相資而實未嘗相悖葢自未有畫時至於六畫邵子所謂先天之學也卦成之後各因一義推説邵子所謂後天之學也當日諸儒既失其傳而方外之流隂相付受以為丹竈之術至希夷康節乃反之於易而後其説始得復明於世然與今周易次第行列多不同者故聞者創見多不能曉而莫之信只據見行周易縁文生義穿鑿破碎此啟䝉之書所為作也若其習聞易曉則又何必更著此書哉更願髙明無以為熹之説而忽之答袁機仲來諭以東南之温厚為仁西北之嚴凝為義此鄉飲酒義之言也雖無隂陽剛柔之别但其後復有陽氣發於東方之説則固以仁為陽而義之隂從可推矣乃不察此而欲以仁為柔以義為剛又病夫柔之不可為陽剛之不可為隂也於是移北之隂以就南而使主乎仁之柔移南之陽以就北而使主乎義之剛其於方位氣候悉反易之又使東北之為陽西南之為隂亦皆得其半而失其半北方雖曰嚴凝而東方已為温厚南方雖曰温厚而西方已為嚴凝也葢嘗論之進而息者其氣强退而消者其氣弱此隂陽之所以為柔剛也陽剛温厚居東南而以作長為事隂柔嚴凝居西北而以斂藏為事此剛柔之所以為仁義也以此觀之隂陽剛柔仁義之位豈不曉然彼楊子雲所謂於仁也柔於義也剛乃自其用處末流言之葢所謂隂中之陽陽中之隂不妨自為一義但不可以雜而論之爾誠翻然改正仁義二字却將隂陽剛柔一切發回原處如熹新圖之位則易簡圓成不費詞説而三才五行天理人事已各得其所矣既未䝉省察執之愈堅區區之愚尚復何説竊意兩家之論各自為家不若自此閉口不談以俟羲文而正焉然以髙明自信之篤竊恐羲文復生亦未肯信其説也世間事吾人身在閒處言之無益此正可從容講論以慰窮愁而枘鑿之不合又如此是亦深可歎者而信乎其道之窮矣答趙提舉易之書本為卜筮而作故其詞必根於象數而非聖人己意之所為其所勸戒亦以施諸筮得此卦此爻之人而非反以戒夫卦爻者近世言易者殊不知此其説雖有義理而無情意雖大儒先生有所不免比因玩索偶幸及此私竊自慶以為天啟其衷而以語人人亦未見有深曉者答林巒辱示書及所為文三篇若以是質於熹者熹少不喜辭長復嬾廢無以副足下意然嘗聞之學之道非汲汲乎辭也必其心有以自得之則其見乎辭者非得已也是以古之立言者其辭粹然不期以異於世俗而後之讀之者卓然知其非世俗之士也今足下之辭富矣其主意立説髙矣然類多採摭先儒數家之説以就之耳足下之所以自得者何如哉夫子所謂徳之棄者葢傷此也足下改之甚善示喻推所聞以講學閭里間亦甚善記曰教然後知困知困則知所以自强矣答柯國材觀聖賢之學與近世諸先生長者之論所謂高遠者葢不在乎剏意立説之間伊川云吾年二十時解釋經義與今無異然思今日意味覺與少時自别尹和靖門人稱尹公於經書不為講解而耳順心得如誦己言此豈必以創意立説為高哉今吾輩望此地位甚遠大槩讀書且因先儒之説通其文義而玩味之使之浹洽於心自見意味可也如舊説不通不妨偶自見得意思但必欲於傳註之外别求所謂自得者而務立新説則用心愈勞而去道愈逺非學問之本意也且謂之自得則是自然而得豈可强求也哉今人多是認作獨自之自故不安於他人之説而必已出耳答范伯崇前書所詢民可使由之一段熹竊謂兩説似不相妨葢民但可使由之耳至於知之必待其自覺非可使也由之而不知不害其為循理及其自覺此理而知之則沛然矣必使之知則人求知之心勝而由之不安甚者遂不復由而惟知之為務其害豈可勝言釋氏之學是已大抵由之而自知則隨其淺深自有安處使之知則知之必不至至者亦過之而與不及者無以異此機心惑志所以生也答何叔京子莫執中與舜禹湯之執中不同葢聖人義精仁熟非有意於執中而自然無過不及故有執中之名而實未嘗有所執也以其無時不中故又曰時中若學未至理未明而徒欲求所謂中者執之則所謂中果何形狀而可執也殆愈執而愈失矣子莫是也既不識中乃慕夫時中者而欲隨時以為中吾恐失之彌逺未必不流為小人之無忌憚也中庸但言擇善不言擇中其曰擇乎中庸亦必繼之曰得一善豈不以善端可求中體難識乎夫惟明善則中可得而識矣答何叔京龜山人欲非性之語自好昨來胡氏深非之來教謂不知自何而有人欲此問甚緊切熹竊以謂人欲云者正天理之反耳謂因天理而有人欲則可謂人欲亦是天理則不可葢天理中本無人欲惟其流之有差而人欲生焉程子謂善惡皆天理此句若甚可駭謂之惡者本非惡此句便都轉了但過與不及便如此自何而有人欲之問此句答了所引惡亦不可不謂之性意亦如此答程允夫能持敬則欲自寡此語甚當但紙尾之意以為須先有所見方有下手用心處則又未然夫持敬之功伊川言之詳矣只云但莊整齊肅則心便一一則自無非僻之干又云動容貌整思慮則自然生敬此便是下手用功處不待先有所見而後能也須是如此方能窮理而有所見惟其有所見則自然樂於從事欲罷不能而敬日躋矣伊川又言涵養須用敬進學則在致知又言入道莫如敬未有致知而不在敬者考之聖賢之言如此類者亦衆是知聖門之學别無要妙徹頭徹尾只是一敬而已答胡廣仲天下事物之理亭當均平無無對者惟道為無對然以形而上下論之則亦未嘗不有對也所謂對者或以左右或以上下或以前後或以多寡或以類而對或以反而對反覆推之天地之間真無一物兀然孤立者此程子所以中夜以思不知手舞而足蹈也究觀來教條目固多而其意常主於别有一物之無對故凡以左右而對者則扶起其一邊以前後而對者則截去其一段既强加所貴者以無對之名而於所賤而有對者又不免别立一位以配之於是左右偏枯首尾斷絶位置重疊條理交并凡天下理勢一切畸零贅剩側峻尖斜更無齊整平正之處凡所論隂陽動靜善惡仁義等説皆此一模中脱出也此書前文甚多中論性一條云性善之善不與惡對此本龜山所聞於浮屠常摠者宛轉説來似亦無病然謂性之為善未有惡之可對則可謂終無對則不可葢性一而已既曰無有不善則性之中無復有惡與善為對亦不待言而可知若善所以得名是乃對惡而言天理人欲雖非同時並有之物然自其反而言之亦不得不為對也今必别謂有無對之善此又熹之所疑者也此一段尤關係故録答吳晦叔泛論知行之理而就一事觀之則知先行後無可疑者然合夫知之淺深行之大小而言則非先成乎小亦將何以馴致乎大哉葢古人之教自其孩幼而教之以孝弟誠敬之實少長而博之以詩書禮樂之文皆使之即事物之間知義理之所在而致涵養踐履之功焉及其學於大學則所以涵養踐履畧已小成於是不離乎此而教之以格物致知因其所已知推而致之以及其所未知然後為知之至而所謂誠正脩齊治平至是而無所不盡其道焉故大學之書雖以格物致知為用力之始然非初不涵養踐履而直從事於此也又非物未格知未至則意可以不誠心可以不正身可以不脩家可以不齊也葢以為必知之至然後脩己治人始有以盡其道若曰必俟知至而後行則夫事親從兄奉上接下乃人生所不能一日廢豈謂吾知未至而蹔輟以俟其至而後行哉答李伯諫來書云儒佛見處既無二理其設教何異也葢儒教本人事釋教本死生本人事故緩於見性本死生故急於見性熹謂既謂之本則此上無復有物矣今既二本不知所同者何事而所謂儒本人事緩見性者亦殊無理三聖作易首曰乾元亨利貞子思作中庸首曰天命之謂性孔子言性與天道而孟子道性善此為本於人事乎本於天道乎緩於性乎急於性乎俗儒正坐不知天理之大故為異説所迷反謂聖學知人事而不知死生豈不誤哉聖賢教人盡心以知性躬行以盡性始終本末自有次第一皆本諸天理緩也緩不得急也急不得直是盡性至命方是極則非如見性之説一見之而遂已也上蔡云釋氏之論性猶儒者之論心釋氏之論心猶儒者之論意此語剖析極精細思之如何來書所謂發明西洛諸公所未言者即其過處也嘗聞之師曰二蘇聰明過人所説語孟儘有好處葢天地道理不過如此有時便見得到皆聰明之發也但見到處却有病若欲窮理不可不論也見到處却有病此語極有味試一思之不可以為平常而忽之也答吳公濟來書云儒釋之道本同末異熹謂本同則末必不異末異則本必不同一木之根無縁却生兩木之實來書云夫子專言人事生理而佛氏則兼人鬼生死言之不知死生人鬼為一乎為二乎若以為一則專言人事生理者兼之矣不待兼之而後兼也若須别作一頭窮究曉會則是始終幽明却有間隔答林擇之程子言敬必以整齊嚴肅正衣冠尊瞻視為先又言未有箕踞而心不慢者如此乃是至論先聖言克己復禮尋常講説於禮字每不快意必訓理而後已今乃知其精微縝密非常情所及爾近畧整頓孟子説見得此老真把得定常放到極險處方一斡轉便見天理人欲直是判然非有命世之才見道分明不能如此然此便是英氣害事便是才高無可依據學者亦不可不知也答林擇之前日中和之説㸔得如何數日來玩味此意日用間極覺得力乃知目前所以若有若亡不能純熟氣象浮淺易得動搖其病皆在此近看南軒文字大抵都無前面一截功夫也大抵心體通有無該動靜故功夫亦通有無該動靜方無透漏若必待其發而後察察而後存則所不至多矣惟涵養於未發之前則其發也自然中節者多不中節者少體察之際亦甚明審易為著力與異時無本可據之説大不同矣答胡伯逢男女居室人事之至近而道行乎其間此君子之道所以費而𨼆也然幽闇之中衽席之上人或䙝而慢之則天命有所不行矣此君子之道所以造端乎夫婦之微密而語其極則察乎天地之高深也然非知幾慎獨之君子其孰能體之易首於乾坤而中於咸恒禮謹大昏而詩以二南為正始之道其以此與知言亦曰道存乎飲食男女之事而溺於流者不知其精又曰接而知有禮焉交而知有道焉惟敬者能守而不失耳亦此意也答黄直卿先天乃伏羲本圖非康節所自作雖無言語而所該甚廣易中一字一義無不自其中流出者太極乃濓溪自作發明易中大槩綱領意思而已規模不同而太極終在先天範圍之内又不若彼之自然不待思慮安排也答吕子約示喻縷縷備見篤學力行之意然未免較計務獲之病横此意方寸間日夕擾擾非所以進於日新也所讀書亦太多如人大病在牀而衆醫雜進百藥交下決無見效之理不若盡力一書令其反覆通透而復易一書之為愈葢不惟專力易見功夫且是心定不雜於涵養功夫亦有助也又謂不欲但為聞見之知固善然聞見之知要得正當亦非易事誠未可輕厭而躐等也答王子合致生之者如事死如事生事亡如事存是也致死之者如絶地天通廢撤淫祀之類是也若於所當祭者疑其有又疑其無則誠意不至矣是不得不致生之也於所不當祭者疑其無又疑其有則不能無恐懼畏怯矣是不得不致死之也人以為神是致生之以為不神是致死之然亦當見道理實處不是私意造作不然者即是觀法界性一切心造之説矣答吳伯豐所論看大學曲折則未然如看大學當且專看若不知有他書者逐字逐句一一推窮逐章反覆觀其血脈全篇反覆觀其次第終而復始莫論遍數通貫浹洽顛倒熟爛然後别觀他書今方觀大學一句便説向中庸上支離蔓衍彼此迷暗互相連累況所比校初無補於用力之意徒然枉費心力閒立議論語言轉多而於自家分上轉無交涉不可不察也元來道學不明不是上面欠闕功夫乃是下面原無根脚若信得及脚踏實地如此做去良心自然不放踐履自然純熟不但讀書一事而已答劉公度講學不厭其詳凡天下事物之理方册聖賢之言皆當反覆究竟至於持守其事無多若覺未安惟有黙自加功著力向前爾今聞廢書不講而反以持守之事為誦説之資是乃兩失其宜至謂彼中朋友只有季章一人可望此未論許與之當否而言之發亦太輕矣向見伯恭説孔子順答魏王問天下之髙士而曰世無其人此言非是孔氏家法此語有味試思之如何答項平甫所論義襲猶未離乎舊見告子之病葢不知心之慊處即是義之所安其不慊者乃是不合於義故直以義為外而不求今人因孟子之言固有見得此意而識義之在内者然又不知心之慊與不慊亦有不待講學省察而後能得其精微者故於學聚問辨之所得皆指為外而以為非義之所在遂一切棄置而不為此與告子之言雖若小異然其實五十百步之間耳以此相笑是同浴而譏裸裎也孟子之意須從上文看其為氣也配義與道無是餒也是集義所生者非義襲而取之也上三句説氣下三句是字與非字為對襲字與生字為對葢曰此氣乃集義而自生於中非行義而襲取之於外云爾非謂義不是外襲也今人讀書不精細將聖賢言語錯看又復將此草本立一切法横説豎説狂嘑衆生恐其罪不止如范甯之議王弼而已答王季和學者之志固不可不以逺大自期然觀孔門之教則其所從言之者至為卑近不過孝弟忠信持守誦習之間而於學問之全體初不察察言之也若其髙第弟子多亦僅得其一體夫以夫子之聖諸子之賢其於道之全體豈不能一言盡之以相授納而顧為是拘拘者以狹道之傳畫人之志何哉葢所謂道之全體雖髙且大而其實未嘗不貫乎日用細微切近之間茍悦其髙而忽於近慕於大而畧於細則無漸次經由之實而徒有懸想跂望之勞亦終不能以自達矣故聖人之教循循有序不過使人反而求之至近至小之中博之以文以開其講學之端約之以禮以嚴其踐履之實使之得寸則守其寸得尺則守其尺如是久之日滋月益然後道之全體乃有所鄉望而漸可識有所循習而漸可能自是而往俛焉孳孳斃而後已而其所造之淺深所説之廣狹亦非可以必詣而預期也故夫子嘗謂先難後獲為仁又以先事後得為崇徳葢於此小差則心失其正雖有鑽堅仰髙之志而反為計功謀利之私矣仁何自而得徳何自而崇哉答陳抑之年歳以來私家多故不獲以聲問先自通於隸人兹承枉書感媿無量顧陳義髙逺雖古之賢人君子懼不足以堪足下之意而熹之愚何敢當之然曩亦嘗有聞於先生長者矣勤勞半世汩沒於章句訓詁之間黽勉於規矩繩約之内卒無髙奇深渺之見可以驚世而駭俗者獨幸年來於聖賢遺訓粗若見其坦易明白之不妄而必可行者私竊以為儻得當世明達秀穎之士相與講之抑彼之過强此之不及吾道庶其明且行乎三復來書果若有意於此幸甚幸甚竄伏窮山未知見日繼此書疏之往來猶足以見區區也答陳正已示喻為學大致及别紙數條皆已深悉但區區有不能無疑者葢上為靈明之空見所持而不得從事於學問思辨之實下為俊杰之豪氣所動而不暇用力於格致誠正之間是以所論常有厭平實而趨髙妙輕道義而喜功名之心絶不類聖門學者氣象不知向來伯恭亦嘗以是相規否也熹自十四五時即嘗有志於此中間非不用力而所見終未端的所幸内無空寂之誘外無功利之貪全此純愚以至今日反覆舊聞而有得焉乃形也上下千有餘年之間言者非一人記者非一筆而其説之同如合符契非能牽聨配合而强使之齊也此義理之原不可不察答林徳久易象説似未條暢熹所論别紙録去然其大意不過欲姑存而未論耳後書所疑不知後來看得曉然未耶熹嘗愛韓子説所以為性者五而今之言性者皆雜佛老而言之所以不能不異在諸子中最為近理葢如吾儒之言則性之本體即仁義禮智之實如老佛之言則先有虛空之性而後有此四者不然亦謂性為虛空之物而可以包乎四者爾不知性之為體不離四者而四者又非有形象方所但於渾然一理之中似有界限而實亦非有遮闌間隔也然此處極難言故孟子只於發處言之答歐陽希遜程子曰四徳之元猶五常之仁偏言則一事專言則包四者惻𨼆之類偏言之也克己之類專言之也然即此一事便包四者葢亦非二物也論語集註云仁者心之徳愛之理也此言有味可更思之不可謂孟子之言不如孔子之周徧孟子亦有專言之者仁人心是也孔子亦有偏言之者愛人是也又謂孟子以世人好殺而言惻𨼆尤非也孔子雖不以義對仁然每以智對仁更宜思之答黎季忱示及兩卷各已批註封還幸細考之語孟更須寛心游意看令通徹易則恐未易讀如此穿鑿枉費心力也葢易本卜筮之書故先王設官掌於太卜而不列於學校學校所教詩書禮樂而已至孔子乃於其中推出所以設卦觀象繫辭之意而因以識夫吉凶進退存亡之道葢聖人當時已曉占筮之法及其詞意所在故就其間推出義理若在今日則已不得其法又不曉其詞而暗中摸索横起私意竊恐聖賢復生亦未易通曉與其虛費心力於此不若且從事於詩書禮樂之為易知也大學論孟中庸又在四者之先尤須理會透徹與湖南諸公論中和第一書中庸已發未發之義前此認得此心流行之體又因程子凡言心者皆指已發而言遂目心為已發性為未發然觀程子之書多所不合因復思之乃知前日之説非惟心性之名命之不當而日用功夫全無本領葢所失者不獨文義之間而已按文集遺書諸説似皆以思慮未萌事物未至之時為喜怒哀樂之未發當此之時即是此心寂然之體而天命之性具焉以其不偏不倚故謂之中及其感通天下之故則喜怒哀樂發焉而心之用可見以其無不中節故謂之和此人心之正情性之徳然也然而未發之前不可尋覓已覺之後不容安排但平日莊敬涵養之功至而無人欲之私亂之則其未發也鏡明水止而其發也必中節矣此是日用本領功夫至於隨事省察即物推明亦必以是為本而於已發之際觀之則其具於未發之前者固可黙識向來講論思索直以心為已發而日用之間亦止以察識端倪為下手處以故闕平日涵養一段功夫使人胷中擾擾無深潛純一之味發之言語事為亦常急逼浮露無雍容沈厚之風葢所見一差其害如此程子所謂凡言心者皆指已發而言此葢指赤子之心而謂凡言心者則其為説之誤故自以為未當而復正之固不可執其已改之言而盡疑諸説也不審諸君子以為何如元亨利貞説元亨利貞性也生長收藏情也以元生以亨長以利收以貞藏者心也仁義禮智性也惻𨼆羞惡辭讓是非情也以仁愛以義惡以禮讓以智知者心也性者心之理也情者心之用也心者性情之主也程子曰其體則謂之易其理則謂之道其用則謂之神又曰言天之自然者謂之天道言天之付與萬物者謂之天命又曰天地以生物為心皆謂此也程子養觀說程子曰存養於未發之前則可又曰善觀者却於已發之際觀之何也曰此持敬之功貫通乎動靜之間者也就程子此章論之方其未發必有事焉是乃所謂靜中之知覺復之所以見天地之心也及其已發隨事觀省是乃所謂動上求靜艮之所以止其所也然則靜中之動非敬其孰能形之動中之靜非敬其孰能察之故又曰學者莫若先理會敬則自知此矣然則學者豈可舍是而他求哉太極説動靜無端隂陽無始天道也始於陽成於隂本於靜流於動者人道也然陽復本於隂靜復根於動其動靜亦無端其隂陽亦無始則人葢未始離乎天而天亦未始離乎人也元亨誠之通動也利貞誠之復靜也元者動之端也本乎靜貞者靜之質也著乎動一動一靜循環無窮而貞也者萬物之所以成終而成始者也故曰雖不能不動而立人極者必主乎靜惟立乎靜則其著乎動也無不中節而不失其本然之靜矣靜者性之所以立也動者命之所以行也然其實則靜亦動之息耳故一動一靜皆命之行而行乎動靜者乃性之真也故曰天命之謂性情之未發者性也是乃所謂中也天下之大本也性之已發者情也其皆中節則所謂和也天下之達道也皆天理之自然也妙性情之徳者心也所以致中和而立大本行達道者也天理之主宰也知明道先生所謂天理二字却是自家體貼出來者真不妄也答鄭子上易之為書本為卜筮而作然其義理廣大精微不可以一法論葢有此理則有此象有此象則有此數各隨問者意所感通如利涉大川或是渡江或是濟險不可預為定説但其本指即是渡江而推類旁通則各隨其事論易傳此書從前為人説得太高更不細推文意若詳讀而深味之其條理脈絡曉然可見非是固欲剖析自是合并不聚以此知古人文字關鍵深密直不草草如庖丁眼中自是不容有全牛也請更詳之論中庸答黄道夫天地之間有理有氣理也者形而上之道也生物之本也氣也者形而下之器也生物之具也是以人物之生必稟此理然後有性必稟此氣然後有形其性其形雖不外乎一身然其道器之間分際甚明不可亂也若劉康公所謂天地之中所謂命者理也非氣也所謂人受以生所謂動作威儀之則者性也非形也今不審此而以魂魄鬼神解之則是指氣為理而索性於形矣豈不誤哉所引禮運之言本亦自有分别其曰天地之徳者理也其曰隂陽之交鬼神之會者氣也今乃一之亦不審之誤也詩曰天生烝民有物有則周子曰無極之真二五之精妙合而凝所謂真者理也所謂精者氣也所謂則者性也所謂物者形也靜而無不該者性之所以為中也寂然不動者也動而無不中者情之發而得其正也感而遂通者也靜而常覺動而常止者心之妙也寂而感感而寂者也定性説定性者存養之功至而得性之本然也性定則動靜如一而内外無間矣天地之所以為天地聖人之所以為聖人不以其定乎君子之學亦以求定而已矣故擴然而大公者仁之所以為體也物來而順應者義之所以為用也仁立義行則性定而天下之動一矣所謂貞也夫豈急於外誘之除而反為是憧憧哉然常人之所以不定者非其性之本然也自私以賊夫仁用智以害夫義是以情有所蔽而憧憧耳不知自反以去其所蔽顧以惡外物累心而反求照於無物之地亦見夫用力愈勞而燭理愈昧益以憧憧而不自知也艮其背則不自私矣行無事則不用智矣内外兩忘非忘也一循於理不是内而非外也不是内而非外則大公而順應尚何事物之為累哉聖人之喜怒大公而順應天理之極也衆人之喜怒自私而用智人欲之盛也忘怒則公觀理則順二者所以為自反而去蔽之方也夫張子之於道固非後學所敢議然意其彊探力取之意多涵泳完養之功少故不能無疑於此程子以是發之其㫖深哉讀吕氏詩紀桑中篇詩體不同固有鋪陳其事而意自見者清人之詩是已至於桑間洧外之篇則雅人莊士葢難言之孔子之稱思無邪也必曰彼以無邪之思鋪陳淫亂之事曷若曰彼以有邪之思作之而我必以無邪之思讀之耶若夫雅鄭衞之説雅則小雅大雅是已鄭則鄭風是已衞則邶鄘衞風是已是則自衞反魯以來未之有改桑中小序政散民流而不可止其文與樂記合則是詩之為桑間又不為無据今曰三百篇皆雅而大小雅不獨為雅鄭風不為鄭邶鄘衞風不為衞桑中不為桑間篇帙混亂邪正錯糅非復孔子之舊矣夫二南正風房中之樂也鄉樂也二雅之正朝廷之樂也商周之頌宗廟之樂也是見於序義傳記皆有可考至變雅固已無施於事而變風者又特里巷之謳謠其領在樂官以為可以識俗變知土風而賢於四夷之樂爾今曰三百篇者皆祭祀朝聘之用則未知桑中溱洧之詩當以薦何鬼神奉何賔客耶古者天子巡狩陳詩以觀民風固不問其美惡悉陳以觀也既已陳之固不問其美惡悉存以訓也然與雅頌之正篇帙不同施用亦異固不嫌於龎雜也今於雅鄭之實察之不詳龎雜之名畏之太甚引風刺之美説文浮放之鄙詞而置諸先王雅頌之列是反為龎雜之甚而不自知也記程門諸子論學同異熹讀程門諸子之書見其所論為學之方有不同者因以程子之言質之而竊記之如左胡氏曰物物致察宛轉歸已楊氏曰物不可勝窮也反身而誠則舉天下之物在我矣程子曰所謂窮理者非必盡窮天下之物又非止窮一物而衆理皆通但要積累多後脱然有貫通處又曰物我一理纔明彼即曉此不必言因見物而反求諸身也然語其大至天地之所以高厚語其小至一物之所以然學者皆當理會胡氏曰只於已發處用功却不枉費心力楊氏曰未發之際以心體之則中之體自見執而勿失無人欲之私焉發必中節矣程子曰思於未發之前求中即是已發但言存養於未發之時則可惟涵養久則喜怒哀樂之發自中節矣學者莫若先理會敬能敬則自知此矣謝氏曰明道先生先使學者有所知識却從敬入又曰既有知識窮得物理却從敬上涵養出來自然是别正容謹節外面威儀非禮之本尹氏曰先生教人只是專令用敬以直内習之既久自然有所得也程子曰入道莫如敬未有能致知而不在敬者又曰動容貌整思慮則自然生敬存此久之則自然天理明又曰涵養須用敬進學則在致知又曰敬只是涵養一事必有事焉須當集義只知用敬不知集義却是都無事也右諸説之不同者以程子之言質之唯尹氏之言為近所少者致知集義之功耳不知其言之序有未及耶抑其意果盡於此也然大本既立則亦不患於無地以崇其徳矣故愚於此竊願盡心焉因書其後以自詔云記論性答稿後此篇出於論定之初徒以一時之見驟正累年之失向背出入之際猶有未服習者又持孤論以當衆賢心不自安故自今讀之尚多遺恨如廣仲之言既以靜為天性之妙又論性不可以真妄動靜言是知言所謂歎美之善而不與惡對者云爾應之宜曰善惡真妄動靜皆以對待而得名者也不與惡對不名為善不與動對不名為靜既非妄又非真則亦無物之可指矣今不知性之善而未始有惡也真而未始有妄也主乎靜而涵乎動也顧曰凡有對者皆不可以言性而别有無對之善與靜焉然後可以形容天性之妙不亦異乎當時酬對既不出此他所自言亦多曠闕如論性無不該不可專以靜言此固是也然其説當云性之分雖屬乎靜而其藴則該動靜而不偏故樂記以靜言性則可廣仲以靜形容天性之妙則不可如此則語意圓矣如論程子真靜之説以真為本體靜為未感此亦是也然當云下文所謂未發即靜之謂也所謂五性即真之謂也然則仁義禮智信乃所謂未發之藴而性之真也與如此則文義備矣論語課會説古之學者潛心乎六藝之文退而考諸日用有疑則問問之弗得弗措也古所謂傳道授業解惑者如此而已後世設師弟子員學校以羣之師之所講不待弟子之問而弟子之聽於師亦非其心之所疑也汎然相與以具一時之文學問之道豈止此哉秦漢迄今千有餘年所謂師弟子不過如此此聖人之緒言餘㫖所以不白於後世後世之風流習尚所以不及於古人也與學者將求古人之所至不可以不務古人之所為今將以論語之書與諸君相從學而惟今之所謂講者不足事也是以不敢以區區薄陋所聞告諸君其因先儒之説以逆聖人之志孜孜焉蚤夜精思考諸日用必將有以得之而以幸教熹也其有不合熹得為諸君言之諸君其無勢利之急而盡心於此一有得焉守之以善其身不為有餘推之一鄉一國而至天下不為不足熹不肖不敢以是欺諸君也講禮記序説學者博學乎先王六藝之文誦焉以識其辭講焉以通其意而無以約之非學也故曰博學而詳説之將以反説約也何謂約禮是也禮者履也謂昔之詳説者至是可踐履也故夫子曰博學於文約之以禮顔氏之稱夫子亦曰博我以文約我以禮禮之義不其大哉然古禮非必有經葢先王之世上自朝廷達於閭巷其儀品有章動作有節故曰禮儀三百威儀三千待其人而後行則豈必簡册而傳哉其後禮廢儒者惜之乃始論著以傳於世今禮記四十九篇則其遺説已學而求所以約不可以莫之習也今柯君直學將為諸君誦其説而講明之諸君其聽之毋忽易曰知崇禮卑禮以極卑為事故自飲食居處灑掃欬唾之間皆有儀節聞之若可厭行之若瑣碎而不綱然惟愈卑故愈約與所謂極崇之智殆未可以差殊觀也夫如是故成性存存而道義出矣此造約之極功也諸君其聽之毋忽諭諸生古之學者八歳而入小學學六甲五方書計之事十五而入大學學先聖之禮樂焉非獨教之固有以養之也葢理義以養其心聲音以養其耳采色以養其目舞蹈降登疾徐俯仰以養其血脈左右起居盤盂几杖有銘有戒養之之具可謂備至爾矣夫是故學者有成材而庠序有實用自學絶而道喪至今千有餘年學校之官有教養之名而無教之養之之實學者挾䇿相嬉其間有傑然者乃知以干禄蹈利為事至語聖賢之緒㫖究學問之本原罔乎莫知所以用其心者其規為動息無以異於凡民而有甚者焉嗚呼此教者過也而豈學者之罪哉然君子以為亦有罪焉爾夫今所異於古特聲音采色之盛舞蹈降登疾徐俯仰之容左右起居盤盂几杖之戒至推其本則理義之養心者固在也諸君日相與誦而傳之顧不察耳此之不為而彼之久為又豈非學者之罪哉補試榜諭君子之學以誠其身非直為觀聽之美而已古之君子行之其身推之教其子弟莫不由此此其風俗所以醇厚而徳業所以崇高與近世之俗不然自父母所以教使之假手程文以欺罔有司而已新學小生自為兒童時習見其父兄之誨如此因恬不知愧而安受無實之名内以傲其父兄外以驕其閭里終身不知自力以至卒就小人之歸未必不由此也故今勸諭縣之父兄有愛其子弟之心者其為求明師賢友使之究義理之指歸而習為孝弟馴謹之行禄爵之不至名譽之不聞非所憂也何必使之汲汲俯心下首因人成事幸一朝之得貽終己之羞乎今兹試補縣學弟子員屬熹典領故兹勸諭論語訓蒙口義序書所以作取便於童子之習而已故名之曰訓䝉口義嗚呼小子來前予幼承父師之訓從事於此二十餘年材資不敏未能有得今乃妄意採掇先儒有所取捨度徳量力夫豈所宜然施之汝曹取其易曉本非述作以是庶幾無罪夫其訓釋之詳且明也日講焉則無不通矣義理之精且約也日誦焉則無不識矣通者已知而時習識者未解而勿忘予之始學亦若斯而已矣嗚呼小子其懋敬之哉汲汲焉毋欲速也循循然毋敢惰也毋牽於俗學而以為迂且淡也毋惑於異端而以為近且卑也窮理盡性修身齊家葢取諸此亦終吾身而已矣嗚呼小子其懋敬之哉孟子集義序二程先生出然後斯道之傳有繼其於孔孟之心葢異世同符也其所以發明二書之説言雖近而索之無窮指雖逺而操之有要讀者非徒可得其言而又可得其意非徒可得其意而又可并其所以進於是者得之可謂至矣間嘗蒐輯條疏以附本章之次既又取横渠張公范氏二吕氏謝氏游氏楊氏侯氏尹氏凡九家之説附之名曰論孟精義以備觀省抑嘗論之論語之言無所不包而所以示人者莫非操存涵養之要七篇之指無所不究而所以示人者類多體驗充擴之端夫聖賢之分不同然而體用一源也顯微無間也非夫先生之學之至其孰能知之張公之於先生論其所至其猶伯夷伊尹之於孔子而一時及門之士又未知孰為孔氏之顔曾也今録其言亦曰大者既同則淺深疏密毫釐之間正學者所宜盡心焉至於近歳以來學於先生之門人者又或出其書則意者源逺末分醇醨異味而不敢載矣江州重建濓溪先生書堂記道之在天下者未嘗亡惟其託於人者或絶或續故其行於世者有明有晦是皆天命之所為非人智力之所能及也夫天高地下而二氣五行紛綸錯糅升降往來於其間其造化發育品物散殊莫不各有固然之理而最其大者則仁義禮智之性君臣父子昆弟夫婦朋友之倫是已是其周流充塞無所虧閒夫豈以古今治亂為存亡者哉然氣之運也則有醇醨判合之不齊人之稟也則有清濁昏明之或異是以道之所以託於人而行於世者惟天所畀乃得與焉河圖出而八卦畫洛書呈而九疇敘而孔子於斯文之興喪亦未嘗不推之於天聖人於此其不我欺也審矣若濓溪先生者其天之所畀而得乎斯道之傳者與不然何其絶之久而續之易晦之甚而明之亟也葢自周衰孟軻氏沒而此道之傳不屬更秦及漢歴晉隋唐以至於我有宋聖祖受命五星集奎實開文明之運然後氣之漓者醇判者合清明之稟得以全付乎人而先生出焉不由師傳黙契道體建圖屬書根極領要當時見而知之有程氏者遂擴大而推明之使夫天理之微人倫之著事物之衆鬼神之幽莫不洞然畢貫於一而周公孔子孟氏之傳煥然復明於當世有志之士得以探討服行而不失其正如出於三代之前者嗚呼盛哉非天所畀其孰能與於此閩中理學淵源考卷十六
