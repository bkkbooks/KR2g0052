body:
  text: 閩中理學淵源考卷七十廣平府知府李清馥撰按察蘇紫溪先生濬學派吾郡自蔡文莊陳紫峰而後崇奬後學開發經㫖者必推先生其韋編微言雞鳴偶記前輩謂可與虛齊密針並傳信不誣也其解易生生篇諸解自謂補程朱蔡陳之遺善乎文節李公之言曰先生學宗虛齊節侔紫峰其出處相類其講解足相發明云再按先生自述先世之著於泉者自宋司空忠勇公緘始其後或居清溝或徙龜湖又徙郡郭具在家乘又敘留耕公自宋鼎革後長懷髙隱子隱德公砥行匿名大致相類焉按察蘇紫溪先生濬蘇濬字君禹晉江人宋忠勇緘之後萬厯元年鄉試時大司馬郭子章為建州司理與試事夢蔡虛齊出其門既得濬卷大竒之薦為第一五年成進士會榜制舉之文出經入史大變衰薾之習海內翕然宗之授南刑部主事丁外艱服除補工部江陵相張居正有疾九列為祝釐部尚書以青詞命濬濬不屬也癸未禮闈分校得士為多會元李文節廷機其最著者尋改禮部出為浙江提學僉事開門試士士卷未竟濬閲已遍氷鑑獨操剗除常調士始怪駭久益信服遷陜西參議領商洛道衙齊無事與秦士談經講藝時屏騶從行村落或登臨山水悠然自適父老具園蔬斗酒來餉濬酹而嚼之若親父兄秦中苦役白兩臺用條鞭法民困以蘇商洛有礦盜數百列柵拒守移檄諭之皆解去遷廣西按察副使備兵蒼梧尋轉參政領桂林道政尚簡易興文化俗岑溪猺變起廢將陳遴以吳廣為先鋒身自督戰平之擢貴州按察使辭病歸有彊留者曰用世如虛舟存而不繫過而不留不以天下為己有出世如游魚游乎江湖忘乎江湖不以己為天下有亡何卒門人文節李公廷機曰君子之道始於淡而不厭淡則欲寡外不足而內乃有餘余嘗持是以觀世之士大夫賢者必淡未有爽者而於吾鄉得紫溪先生先生才髙而學博科巍而名章環海之人讀先生制舉之文與所為兒說生生篇諸書莫不知有紫溪先生者先生泊然介然視世之腆膴紛華一切不以入其靈府故其視學兩浙惟知興古學樹真才盡謝諸干請即有謡諑之者不顧也其副粵憲參粵藩時有門下士為政先生移書語某寄語之第曰某賢未遷某賢未起語不及私也其致政也銓部更推擇為貴州觀察先生益堅臥不起蓋先是黃州耿公嘗對某談先生某曰先生忠信孝友仕不擇官不擇地家不求田不問舍是其為人耳吾郡有虛齊紫峰二先生祠皆特祀至先生而三先生學宗虛齊節侔紫峰其進退相類其講解足相發明而其文詞風雅抑亦軼而上之乃其味之淡一也當斯世頽靡而祀先生以嫓紹前修激勵後死維持風教砥柱波流所關巨矣所著四書解醒易冥冥篇在粵修廣西通志三餘集等書又有雞鳴偶記則躬行心得之言讀者謂與虛齊密針相表裏學者稱紫溪先生按近代先生所傳書有易經兒說生生篇韋編微言四書兒說著解醒篇雞鳴偶記綱鑑紀要三餘集等書閩書舊郡志新郡志按察王當世先生道顯王道顯字當世同安人從蘇紫溪濬游邃於易萬厯十一年進士任台州司理慮囚多平反署台州府及天台黃巖太平三邑所到常例盡却之擢御史疏核兵部尚書王鶚失兵備請以王遴代出為青州僉事設法擒治響馬賊甚多遷雲南參議丁內艱服闋補浙東兵備整肅衛伍倭不敢犯升湖廣按察使尋歸杜門著書卒舊郡志少司寇蔡體國先生獻臣蔡獻臣字體國同安人萬厯十七年進士授刑曹時上久不視朝獻臣抗疏定國儲忠愛懇切言人所不敢言凡所讞理一歸明允司寇王元美歎為用世才調主職方推補將辨惟才遷主客郎四方朝貢一依典制再調儀司郎冬至習儀臺省爭班獻臣力執舊典後為楚藩假子一案忤右宗伯意宗伯遽罷深憾獻臣已又疏請福藩之國鄭貴妃恚甚夜令內使執之聞者震栗獻臣不稍屈及旦以舊典爭於上前上深嘉其直遣出轉參政旋知湖廣按察使有為宗伯修憾者借楚事劾獻臣罷歸百姓遮留獻臣歸讀書東山修邑乘尋起浙江寧海道升浙省督學擢光祿少卿所著有清白堂稿仕學潛學講義筆記等稿行世年七十九卒贈少司寇按獻臣為紫溪先生門徒其撰紫溪易經生生篇序曰蘇君禹先生以羲經冠鄉書魁海內既行其兒說為經生嚆矢矣然兒說猶帖括家言耳先生藩臬粵西時冥思韋編時發其所獨得至再三削牘名冥冥更名生生即先生亦自謂抉羲文周孔之祕而補程朱蔡陳之遺在茲篇矣獻臣初受是經已去而受詩然自角丱即承下風不意其終茫然也今讀茲篇始覺了了如象非潛龍見龍之謂變非損來既濟來之謂係則勿用亦詞占則潛龍亦占斯言也使考亭復生亦必首肯云同安邑志生蔡體國撰生篇序省元李衷一先生光縉學派按衷一先生師事蘇紫溪又與黃文簡何鏡山諸公交好同時誘掖後進其持論一以紫陽為宗時良知之說朋興先生於文莊紫峰紫溪屢述淵源以闡明師㫖於不墜亦一時師表云省元李衷一先生光縉李光縉字宗謙號衷一晉江人父仁舉光縉四歲而見背稍長受業外傅寓目輒誦舉筆成章為諸生厭薄舉子業閎覽博物為古文辭師事蘇紫溪先生濬每嘉歎異日必為閩大儒萬厯十三年鄉薦第一偕計後不問家人生産不溷有司日研經史及朝章民隱以備經濟尤喜敘述節烈忠義事其文章悉嘔心而出不輕下一語又痛士之為制藝者竄入二氏擯棄紫陽為文彀文則以示之的家居及北上時就正者盈函席歸益潛心大業著書授徒以終學者稱衷一先生所著有易經潛解四書要㫖新志作臆說中庸臆說及景璧集二十餘卷平生行實詳所作獨照醒言中卒年七十五卒之前十日為銘授其子曰文之不用道之不行不處不去總以成仁京山李氏維楨撰墓志新郡志道南原委參政林璞所先生一柱林一柱字廷郢號璞所同安人啓口山五代孫萬厯三十八年進士授揚州司理歷署三篆分校南闈天啓五年御史卓邁薦擢御史疏奏切直請臨朝振紀綱歷陳賣士餉卒名存實亡之弊雪幽忠明功罪至有世運當厄舉國若狂之句留都東宮火請復建文廟號劾織造監李實制官虐民必亂天下閹黨側目因請告例轉廣東參政拂袖歸隱東山以仁孝稱為李衷一先生門人曾序衷一易經潛解云同安邑志縣令蘇子介先生懋祉蘇懋祉字子介晉江人萬厯三十五年進士由南召令移寧陵丁內艱服除補歙縣卒于官囊槖蕭然無忝清白鄭三俊督福建檄祀懋祉于學宮懋祺亦篤于學問何鏡山撰本傳李衷一撰墓志閩書陳千仭先生陳闕字千仭三山人按聊城鄧秉恆撰三山陳氏夢璧蔬園小牘序云陳子尊甫千仭先生為李衷一先生髙弟淵源澄邃云餘名字事實未詳待考增入再按夢璧曾為莆陽教職著有全史比事文學梁吸泉先生朝挺梁朝挺字吸泉安溪人廩生受業李衷一先生之門博涉經史讀書求奧義晚益大進襟懷灑脫有所觸輒形諸歌咏間著有剪江靈應集安溪邑志縣令蘇阜山先生希栻學派余乾隆乙亥秋九月到郡從山人徐簡之家借觀鹿巢李氏叔元集得鹿巢撰蘇阜山先生本傳并賔席詞言因撮其略為敘其學派焉按鹿巢為阜山之甥在明季派别不雜他岐以紫陽為宗閲集中表章諸先正緒言甚悉今考之南安邑志謂前壬申志竟遺阜山之傳即族黨鄉閭亦不得聞其詳後得之故老私傳為增其傳云夫晉南耳目之近阜山又耄年碩德為時望人鹿巢之集亦流布當時而其鄉其族尚搜羅缺遺如此則深山崇邑湮沒不傳者多矣非賴有道能文發潛表述焉得信而有徵哉茲撮其本傳大略并附賔席文于後縣令蘇阜山先生希栻蘇希栻字于欽號阜山南安人初試有司督學朱衡拔首泉士所登答子書策有老宿未經見聞者萬厯二年成進士上公車朱督學時為大司空御史大夫葛端肅皆遣子受業希栻雅明經術先是以諸生設帳蔣氏時馨從于漳平楊氏道賔從于紫雲後所造皆聞人也初仕許昌甫數月清節大著會直指按部繩以拜跪之節遂拂衣歸時年四十五後田居之年恰如之歸田後與里中黃文簡詹司寇諸耆英結社賦詩老年治莵裘阜陽山之阿遂斷城市而専山林修族譜清理義倉建始祖祠宇墓寮葺治梅隴阡履濡橋此為政于宗者修霞舒里社築月半泮水壩溉田五十頃栽植苦叢以障曲溪水患重新雪峰寺名勝築太湖民堡以豫不虞此為政于鄉者凡所心畫制朴而詳費巨而省興利除害而可久至兒曹則土室衡門八口不能三釜食平生克耐堅苦老眼昏花而對書瞭然自著管斑存質注莊子注離騷諸書又選詩集解杜詩選注二部尤時所傳誦其根本則在族譜義倉設圖立格條理整然嘗手簡子姪曰凡幹公事如己事則事無不濟惜公錢如己錢則費無不省吾半生任勞任怨惟仰不愧祖俯不愧心而已爾曹慎之卒年九十附李氏叔元撰賔席文曰先生誠心為質直道而行夙抱時名濟南葛端肅曾遣子受業雅明經術宗伯楊文恪曾執贄及門晚登甲第出守輿州骨鯁忤上官彭澤之腰不折芰荷返初服衡宇之賦遂成扄户著書茹蔬課子丘園四十載突煙時斷時續而建家廟築墓庭拳拳以木本水源為先宗族五百人食指如櫛如星而修譜牒揭規條諄諄以孝友睦姻為重云南安邑志李鹿巢集閩中理學淵源考卷七十
